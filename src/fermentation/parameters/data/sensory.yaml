# Odor perception (detection) thresholds — the sensory / OAV readout layer (decision D-67).
#
# STANDALONE, NOT a compile-seam file. Unlike acidbase.yaml / vicinal_diketones.yaml (merged
# into every CompiledScenario at compile.py's `shared_files` because a *Process/RHS* reads
# them), NO right-hand side reads a perception threshold: the sensory layer is a pure readout
# that consumes a finished Trajectory. So this file is loaded on its own by
# fermentation.sensory.oav.load_thresholds() and is NEVER merged into param_values — the
# chemistry never even sees these numbers. This is a stronger isolation than any Tier-2
# readout, and it is why dosing/aroma chemistry stays byte-for-byte unchanged by the readout.
#
# OAV = concentration / threshold (dimensionless). Both sides in µg/L: state concentration is
# canonical g/L, crossed to µg/L at the sensory boundary via units.convert.gpl_to_ugl; every
# threshold below is stored in µg/L so the ratio is directly dimensionless.
#
# TIER. ALL thresholds are `speculative`, and — more fundamentally — the OAV *mapping itself*
# is the canonical speculative case (tiers.py docstring names "sensory mapping"). So the
# readout floors every output at speculative regardless of these tiers (oav_tier combines in
# Tier.SPECULATIVE explicitly): even a validated input concentration reads speculative through
# this lens. Odor thresholds swing by orders of magnitude with panel, reference, and matrix, so
# the uncertainty bands are wide (often a factor of several) and honest.
#
# MATRIX (a provenance requirement, §4.2). Ethanol and the wine/beer matrix shift odor
# thresholds substantially, so a threshold is matrix-specific: keys are `threshold_<pool>_beer`
# and `threshold_<pool>_wine`. `conditions` records the MATRIX THE VALUE WAS MEASURED IN, which
# is NOT the same as the application medium the key is filed under — where a key is backed by a
# water/model-solution measurement rather than the real medium, that MATRIX GAP is flagged in
# `notes`. (The sensory layer selects the key set by medium; it does not claim the measurement
# matrix equals the medium.)
#
# LUMPED POOLS (the D-66 owner call, NARROWED at D-96). `fusels` and `mercaptans` are single g/L
# pools that really mix several molecules whose thresholds span orders of magnitude. Each is
# assigned the threshold of ONE named representative compound — the stand-in its VarSpec
# description already names — and the "assumes fixed lump composition" honesty cost is flagged
# loudly in that threshold's `notes`, which MUST open with the marker `LUMPED POOL` (tested both
# ways: a lumped pool declares it, a single-molecule pool must not). Single-molecule pools
# (diacetyl, acetaldehyde, h2s, 4-EP, 4-EG, and since D-96 the three esters) carry no such
# assumption and are the cleaner OAVs.
#
# `esters` LEFT THIS LIST AT D-96, and why is worth stating. It was the worst lumped case — not
# because the lump was coarse, but because the pool was carbon-weighted as ETHYL ACETATE on the
# ledger (D-19) while being read here against ISOAMYL ACETATE's threshold (D-67): one pool, two
# molecular identities, in two different layers. Ethyl acetate dominates the mass; isoamyl
# acetate's threshold is ~300x lower; so the OAV was inflated by roughly that factor and a Brett
# wine read 761 — implying ~23 mg/L isoamyl acetate against a real ceiling of ~1-3. That is a
# category error in the NUMERATOR, not an uncertain ratio, and no lump caveat could honestly
# cover it. The pool is now three single-molecule pools, each weighted AND perceived as itself.
# The rule the episode leaves behind: a `lumped` flag can excuse a COARSE reading; it can never
# excuse reading a pool against a molecule the pool is not made of. The honest fix is another
# pool, never another disclaimer.
#
# iso_alpha / IBU is DELIBERATELY ABSENT — it is a TASTE (bitterness), not an odor, already read
# out directly as IBU (analysis.ibu_series, D-64). An odor-threshold OAV does not apply to it.

# =====================================================================================
# BEER matrix (Meilgaard beer-flavour thresholds) — the 5 common aroma-active pools.
# =====================================================================================

threshold_diacetyl_beer:
  value: 100.0
  unit: "ug/L"   # ~0.10 mg/L, the classic lager "buttery" flavour threshold
  tier: speculative
  uncertainty: { low: 30.0, high: 200.0, note: "commonly cited 0.10-0.15 mg/L in lager; lower in pale lager, higher in ales where malt masks it" }
  provenance:
    source: "Meilgaard 1975, 'Flavor chemistry of beer' (MBAA Tech. Q. 12:151-168), diacetyl (2,3-butanedione) beer flavour threshold ~0.10-0.15 mg/L; corroborated by Krogerus 2013 review (doi:10.1002/jib.84)"
    conditions: "measured in beer (matrix-matched); 2,3-butanedione, the single molecule of the diacetyl pool"
    notes: "Single-molecule pool — clean OAV, no lump-composition assumption. Matrix-matched (measured in beer)."

threshold_acetaldehyde_beer:
  value: 10000.0
  unit: "ug/L"   # ~10 mg/L, 'green apple' / fresh-cut
  tier: speculative
  uncertainty: { low: 5000.0, high: 25000.0, note: "Meilgaard ~10 mg/L; some panels report up to ~25 mg/L in beer" }
  provenance:
    source: "Meilgaard 1975 (MBAA Tech. Q. 12:151-168), acetaldehyde beer flavour threshold ~10 mg/L"
    conditions: "measured in beer (matrix-matched); acetaldehyde (ethanal), the single molecule of the pool"
    notes: "Single-molecule pool — clean OAV. Matrix-matched (measured in beer)."

threshold_h2s_beer:
  value: 5.0
  unit: "ug/L"   # 'rotten egg'; a very low, potent threshold
  tier: speculative
  uncertainty: { low: 1.0, high: 15.0, note: "H2S is extremely potent; reports span ~1-10 µg/L in beer" }
  provenance:
    source: "Meilgaard 1975 (MBAA Tech. Q. 12:151-168), hydrogen sulfide beer flavour threshold ~5 µg/L (0.005 mg/L)"
    conditions: "measured in beer (matrix-matched); hydrogen sulfide (H2S), the single molecule of the residual dissolved pool"
    notes: "Single-molecule pool — clean OAV. Matrix-matched. The most potent (lowest-threshold) aroma pool tracked."

# --- The three ester thresholds, beer (decision D-96) -------------------------------------
# Each ester pool is now read against ITS OWN molecule's threshold. The pre-D-96 single
# `threshold_esters_beer` read a pool whose mass was booked as ethyl acetate against isoamyl
# acetate's threshold - a split identity between the ledger and this lens that made the OAV
# non-physical rather than merely uncertain. None of the three carries a lump caveat now.

threshold_ethyl_acetate_beer:
  value: 30000.0
  unit: "ug/L"   # ethyl acetate, 'solventy/nail-polish'
  tier: speculative
  uncertainty: { low: 20000.0, high: 40000.0, note: "Meilgaard reports ~30 mg/L; band reflects panel spread only - no lump-composition term is needed any more (D-96)" }
  provenance:
    source: "Meilgaard 1975 (MBAA Tech. Q. 12:151-168), ethyl acetate beer flavour threshold ~30 mg/L"
    conditions: "measured in beer (matrix-matched); ethyl acetate read against the `ethyl_acetate` pool - the SAME molecule the carbon ledger weights that pool by (D-96)"
    notes: "SINGLE-MOLECULE POOL (D-96): the pool is ethyl acetate, weighted as ethyl acetate, read against ethyl acetate's own threshold. Sound ale sits at or below this threshold (~10-30 mg/L), so a healthy beer reads OAV around or under 1 and ethyl acetate is correctly NOT a dominant note - the solventy/nail-polish character is a fault-level reading, which is what this molecule's threshold is for."

threshold_isoamyl_acetate_beer:
  value: 1200.0
  unit: "ug/L"   # isoamyl acetate, 'banana'
  tier: speculative
  uncertainty: { low: 1000.0, high: 1600.0, note: "isoamyl acetate ~1.0-1.6 mg/L in beer; band is now the reported range ALONE - the D-66 lump-composition widening is retired (D-96)" }
  provenance:
    source: "Meilgaard 1975 (MBAA Tech. Q. 12:151-168), isoamyl acetate (3-methylbutyl acetate) beer flavour threshold ~1.0-1.6 mg/L"
    conditions: "measured in beer (matrix-matched); isoamyl acetate read against the `isoamyl_acetate` pool - the SAME molecule the carbon ledger weights that pool by (D-96)"
    notes: "SINGLE-MOLECULE POOL (D-96). Value unchanged from the pre-D-96 `threshold_esters_beer`, but it now reads a pool that IS isoamyl acetate (~2.2 mg/L in a finished ale) rather than the whole ester mass (~64 mg/L) - which is the entire fix: same threshold, physical numerator, OAV ~1.8 instead of ~53. The uncertainty band NARROWED because the D-66 'assumes fixed lump composition' term no longer applies; what remains is the panel spread Meilgaard reports."

threshold_ethyl_hexanoate_beer:
  value: 210.0
  unit: "ug/L"   # ethyl hexanoate, 'apple/pineapple'
  tier: speculative
  uncertainty: { low: 150.0, high: 300.0, note: "Meilgaard reports ~0.21 mg/L; band reflects panel spread only" }
  provenance:
    source: "Meilgaard 1975 (MBAA Tech. Q. 12:151-168), ethyl hexanoate (ethyl caproate) beer flavour threshold ~0.21 mg/L"
    conditions: "measured in beer (matrix-matched); ethyl hexanoate read against the `ethyl_hexanoate` pool - the SAME molecule the carbon ledger weights that pool by (D-96)"
    notes: "SINGLE-MOLECULE POOL (D-96). Added at D-96 alongside the pool itself, so the fruity descriptor axis keeps the apple/pineapple ethyl-ester note instead of narrowing to banana alone when the lumped pool was split."

threshold_fusels_beer:
  value: 50000.0
  unit: "ug/L"   # isoamyl alcohol (3-methylbutan-1-ol), 'solventy/fusel'
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "isoamyl alcohol ~50-70 mg/L in beer; band also carries the fixed-lump-composition assumption" }
  provenance:
    source: "Meilgaard 1975 (MBAA Tech. Q. 12:151-168), isoamyl alcohol (3-methylbutan-1-ol) beer flavour threshold ~50 mg/L"
    conditions: "measured in beer (matrix-matched); isoamyl alcohol, the representative of the LUMPED fusels pool (the Ehrlich higher-alcohol stand-in)"
    notes: "LUMPED POOL — assumes the fusels pool is dominated by isoamyl alcohol. Propanol/isobutanol/2-phenylethanol have different thresholds, so the OAV rides on the fixed-composition assumption (D-66)."

# =====================================================================================
# WINE matrix — the 5 common pools + 3 wine-only (ethylphenols, ethylguaiacols, mercaptans).
# =====================================================================================

threshold_diacetyl_wine:
  value: 200.0
  unit: "ug/L"   # ~0.2 mg/L in red wine; 'buttery'
  tier: speculative
  uncertainty: { low: 100.0, high: 900.0, note: "Martineau: ~0.1 mg/L in Chardonnay, ~0.2 mg/L in Pinot noir, up to ~0.9 mg/L in some reds where fruit masks it" }
  provenance:
    source: "Martineau, Acree & Henick-Kling 1995 (Food Research International 28:139-143), sensory threshold of diacetyl ~0.2 mg/L (red), ~0.1 mg/L (Chardonnay)"
    conditions: "measured in wine (matrix-matched); 2,3-butanedione; threshold is strongly cultivar/matrix dependent"
    notes: "Single-molecule pool — clean OAV. Matrix-matched (measured in wine). Value taken at the red-wine ~0.2 mg/L; wide band spans white-to-red matrix variation."

threshold_acetaldehyde_wine:
  value: 100000.0
  unit: "ug/L"   # ~100 mg/L; 'bruised apple / sherry (oxidative)'
  tier: speculative
  uncertainty: { low: 10000.0, high: 125000.0, note: "wine acetaldehyde odor threshold is contested and matrix-bound; reports span ~10-125 mg/L. Very wide band reflects genuine disagreement" }
  provenance:
    source: "wine aroma-threshold literature (Guth 1997 model-wine descriptors; general enology references cite ~100 mg/L for the aroma detection threshold in wine)"
    conditions: "measured in/near wine matrix; acetaldehyde (ethanal), single molecule"
    notes: "Single-molecule pool. Threshold is unusually contested for wine (binding to SO2 and matrix effects confound panels), hence the very wide band. Treat directionally."

threshold_h2s_wine:
  value: 1.6
  unit: "ug/L"   # 'rotten egg'; extremely potent in wine
  tier: speculative
  uncertainty: { low: 1.0, high: 15.0, note: "Goniak & Noble report ~1.1-1.6 µg/L in wine; other panels up to ~10 µg/L" }
  provenance:
    source: "Goniak & Noble 1987 (Am. J. Enol. Vitic. 38:223-227), hydrogen sulfide detection threshold ~1.6 µg/L in wine"
    conditions: "measured in wine (matrix-matched); hydrogen sulfide (H2S), single molecule"
    notes: "Single-molecule pool — clean OAV. Matrix-matched. The most potent aroma pool tracked in wine."

# --- The three ester thresholds, wine (decision D-96) -------------------------------------
# Each ester pool is read against ITS OWN molecule's threshold. The pre-D-96
# `threshold_esters_wine` was the sim's most misleading number: 30 ug/L (isoamyl acetate's
# threshold) divided into the WHOLE ester mass (~23 mg/L, mostly ethyl acetate) gave a Brett
# wine a 'fruity' OAV of 761 - implying ~23 mg/L of isoamyl acetate when real wine tops out
# near 1-3. The MATRIX GAP caveat below survives the split; the LUMPED caveat does not.

threshold_ethyl_acetate_wine:
  value: 7500.0
  unit: "ug/L"   # ethyl acetate, 'solventy/nail-polish'; model wine
  tier: speculative
  uncertainty: { low: 5000.0, high: 12000.0, note: "commonly cited ~7.5-12 mg/L in wine; band reflects the reported spread and the model-vs-real matrix gap - no lump-composition term is needed any more (D-96)" }
  provenance:
    source: "Guth 1997 (J. Agric. Food Chem. 45:3027-3032) and the standard wine-chemistry range for ethyl acetate odor threshold, ~7.5-12 mg/L in model wine"
    conditions: "MATRIX GAP - measured in ~10% ethanol MODEL wine, not real wine; ethyl acetate read against the `ethyl_acetate` pool - the SAME molecule the carbon ledger weights that pool by (D-96)"
    notes: "SINGLE-MOLECULE POOL + MATRIX GAP (D-96): the lump caveat is retired, the model-solution caveat is not. Sound wine carries ~30-80 mg/L ethyl acetate against this ~7.5 mg/L threshold, so it reads a modest OAV of order 2-10 - present but not dominant, which is correct: ethyl acetate is the ester you notice only when it goes wrong (>150-200 mg/L reads as a volatile-acidity fault)."

threshold_isoamyl_acetate_wine:
  value: 30.0
  unit: "ug/L"   # isoamyl acetate, 'banana'; model wine (10% ethanol)
  tier: speculative
  uncertainty: { low: 15.0, high: 60.0, note: "Guth ~30 µg/L in model wine; band widened for the matrix gap ONLY - the D-66 fixed-lump-composition widening is retired (D-96)" }
  provenance:
    source: "Guth 1997 (J. Agric. Food Chem. 45:3027-3032), isoamyl acetate odor threshold ~30 µg/L in model wine (10% ethanol)"
    conditions: "MATRIX GAP - measured in 10% ethanol MODEL wine, not real wine; isoamyl acetate read against the `isoamyl_acetate` pool - the SAME molecule the carbon ledger weights that pool by (D-96)"
    notes: "SINGLE-MOLECULE POOL + MATRIX GAP (D-96). The value is UNCHANGED from the pre-D-96 `threshold_esters_wine` - the 761 was never this threshold's fault. What changed is the numerator: this reads a pool that IS isoamyl acetate (~0.76 mg/L in a finished wine) instead of the entire ester mass (~23 mg/L), so the OAV lands ~25 instead of 761. Real wine isoamyl acetate at 0.1-3 mg/L against a 30 ug/L threshold genuinely does run OAV ~3-100, so a value in the tens is the physical reading, not a suppressed one."

threshold_ethyl_hexanoate_wine:
  value: 5.0
  unit: "ug/L"   # ethyl hexanoate, 'apple/pineapple'; model wine (10% ethanol)
  tier: speculative
  uncertainty: { low: 3.0, high: 14.0, note: "Guth ~5 µg/L in model wine; band widened for the matrix gap" }
  provenance:
    source: "Guth 1997 (J. Agric. Food Chem. 45:3027-3032), ethyl hexanoate odor threshold ~5 µg/L in model wine (10% ethanol)"
    conditions: "MATRIX GAP - measured in 10% ethanol MODEL wine, not real wine; ethyl hexanoate read against the `ethyl_hexanoate` pool - the SAME molecule the carbon ledger weights that pool by (D-96)"
    notes: "SINGLE-MOLECULE POOL + MATRIX GAP (D-96). Added at D-96 with the pool. Very low threshold against a ~0.39 mg/L concentration puts this among wine's HIGHEST-OAV odorants (Guth ranks it so), running OAV ~79 at this value. Consequence worth stating: under the D-95 MAX rule this molecule - not banana - is the DOMINANT contributor to wine's `fruity` axis. THIS VALUE IS THE LEVER FOR THAT HEADLINE, AND THE MARGIN IS THIN - flagged rather than buried (advisor's done-call catch). Apple-dominance needs ethyl hexanoate's OAV to beat isoamyl acetate's ~25, i.e. it holds only while this threshold is below ~15.6 ug/L. It survives this entry's own band (at the 14 ug/L ceiling: OAV 28.1 vs banana 25.2 - a ~12% margin), but reported wine/model thresholds for this compound span roughly 5-60 ug/L across sources, and ANYWHERE ABOVE ~15.6 THE DOMINANT LABEL FLIPS TO BANANA. So: the fruity axis VALUE is robust (tens either way - the D-96 fix) but its ATTRIBUTION is threshold-sensitive. Deliberately NOT pinned by a test asserting apple-dominance - that would harden a result this uncertain; the D-96 regression test accepts either dominant and bounds only the physical OAV band. Worth confirming against Guth 1997's primary table before any claim leans on apple specifically."

threshold_fusels_wine:
  value: 30000.0
  unit: "ug/L"   # isoamyl alcohol (3-methylbutan-1-ol), 'fusel/solventy'; model wine
  tier: speculative
  uncertainty: { low: 10000.0, high: 60000.0, note: "Guth ~30 mg/L in model wine; band carries matrix + fixed-lump-composition uncertainty" }
  provenance:
    source: "Guth 1997 (J. Agric. Food Chem. 45:3027-3032), 3-methylbutanol (isoamyl alcohol) odor threshold ~30 mg/L in model wine (10% ethanol)"
    conditions: "MATRIX GAP — measured in 10% ethanol MODEL wine; isoamyl alcohol as the representative of the LUMPED fusels pool"
    notes: "LUMPED POOL + MATRIX GAP: fixed-composition assumption plus a model-solution threshold. Directional only."

threshold_ethylphenols_wine:
  value: 425.0
  unit: "ug/L"   # 4-ethylphenol, 'horse-sweat / barnyard' (Brett)
  tier: speculative
  uncertainty: { low: 130.0, high: 620.0, note: "Chatonnet ~425 µg/L in red wine; the ~230 µg/L 4-EP + 4-EG combined 'Brett character' onset is lower" }
  provenance:
    source: "Chatonnet, Dubourdieu, Boidron & Pons 1992 (J. Sci. Food Agric. 60:165-178), 4-ethylphenol perception threshold ~425 µg/L in red wine"
    conditions: "measured in RED WINE (matrix-matched); 4-ethylphenol, single molecule"
    notes: "Single-molecule pool — clean OAV, matrix-matched. One of the FIRMEST thresholds tracked (well-characterised Brett spoilage marker). Wine-only pool."

threshold_ethylguaiacols_wine:
  value: 110.0
  unit: "ug/L"   # 4-ethylguaiacol, 'clove / smoky' (Brett)
  tier: speculative
  uncertainty: { low: 30.0, high: 200.0, note: "Chatonnet ~110 µg/L in red wine" }
  provenance:
    source: "Chatonnet, Dubourdieu, Boidron & Pons 1992 (J. Sci. Food Agric. 60:165-178), 4-ethylguaiacol perception threshold ~110 µg/L in red wine"
    conditions: "measured in RED WINE (matrix-matched); 4-ethylguaiacol, single molecule"
    notes: "Single-molecule pool — clean OAV, matrix-matched. Firmly characterised (Chatonnet). Wine-only pool."

threshold_mercaptans_wine:
  value: 3.0
  unit: "ug/L"   # methanethiol, 'reductive / drains / rotten cabbage'
  tier: speculative
  uncertainty: { low: 1.5, high: 10.0, note: "methanethiol in wine ~1.8-3.1 µg/L; band widened for the fixed-lump-composition assumption" }
  provenance:
    source: "wine volatile-thiol literature (methanethiol / methyl mercaptan detection threshold ~1.8-3.1 µg/L in wine; e.g. Mestres et al. 2000 review, J. Chromatogr. A 881:569-581)"
    conditions: "measured in/near wine matrix; methanethiol, the representative of the LUMPED mercaptans pool (the pool's named stand-in)"
    notes: "LUMPED POOL — assumes the volatile-thiol pool is dominated by methanethiol. Ethanethiol/H2S-adjacent thiols differ, so the OAV rides on the fixed-composition assumption (D-66). Wine-only pool."

# -- Strecker aldehydes (decision D-75): the oxidative-aging aroma markers ------------------
threshold_methional_wine:
  value: 0.5
  unit: "ug/L"   # methional, 'cooked potato / oxidative' (the oxidative-aging off-note)
  tier: speculative
  uncertainty: { low: 0.3, high: 1.0, note: "methional perception threshold in wine ~0.5 µg/L (a very potent odorant); band ~0.3-1 µg/L across the literature" }
  provenance:
    source: "wine aroma literature: methional (3-(methylthio)propanal) perception threshold ~0.5 µg/L in wine (Escudero et al. 2000, 2002; Ferreira et al. — methional the marker of oxidative/aged 'cooked-potato' character in white wine)"
    conditions: "measured in/near wine matrix; methional, a single molecule (the methionine-derived Strecker aldehyde)"
    notes: "Single-molecule pool — clean OAV, matrix-matched. One of the sharpest oxidative-aging markers; very potent (low threshold). Wine-only pool. The D-45-style arginine-lump means the MODELLED methional is booked from arginine carbon, not literal methionine — exact on the ledger, approximate on provenance (decision D-75)."

threshold_phenylacetaldehyde_wine:
  value: 1.0
  unit: "ug/L"   # phenylacetaldehyde, 'honey / floral' (the pleasant Strecker note)
  tier: speculative
  uncertainty: { low: 0.5, high: 5.0, note: "phenylacetaldehyde perception threshold in wine ~1 µg/L (reported ~1-5 µg/L depending on matrix); band widened accordingly" }
  provenance:
    source: "wine aroma literature: phenylacetaldehyde perception threshold ~1 µg/L in wine (Escudero et al. 2000, 2002; the honey/floral marker of aged white and dessert wines)"
    conditions: "measured in/near wine matrix; phenylacetaldehyde, a single molecule (the phenylalanine-derived Strecker aldehyde)"
    notes: "Single-molecule pool — clean OAV, matrix-matched. The pleasant-valence Strecker aldehyde (contrast methional's off-note); the two share the D-75 Strecker Process. Wine-only pool. Same arginine-lump provenance caveat as methional."

# -- Non-oxidative THERMAL Strecker aldehydes + sotolon (decision D-87): the sweet-wine / Madeira ---
# aroma markers the MaillardStrecker route produces from residual sugar + amino acids + heat, with
# NO O2. Single-molecule pools, each read against its own wine threshold. The three branched-chain
# aldehydes are the "malty/oxidised" notes; sotolon is the curry/maple furanone. Same arginine-lump
# provenance caveat as the D-75 pair (modelled carbon booked from arginine, not the literal amino
# acid). methional / phenylacetaldehyde thresholds (above) are SHARED with this route (same molecule).
threshold_2_methylbutanal_wine:
  value: 16.0
  unit: "ug/L"   # 2-methylbutanal, 'malty / almond' (branched-chain Strecker aldehyde of isoleucine)
  tier: speculative
  uncertainty: { low: 5.0, high: 50.0, note: "2-methylbutanal perception threshold in wine ~10-25 µg/L (reported ~16 µg/L in wine-like matrix); band widened for matrix dependence." }
  provenance:
    source: "wine/beverage aroma literature: 2-methylbutanal (malty/almond, the isoleucine Strecker aldehyde) perception threshold ~10-25 µg/L in wine-like matrices (Ferreira et al.; beer-staling aldehyde literature — 2-/3-methylbutanal canonical malty staling markers)."
    conditions: "measured in/near wine matrix; 2-methylbutanal, a single molecule (the isoleucine-derived Strecker aldehyde)"
    notes: "Single-molecule pool — clean OAV, matrix-matched. A malty/oxidised marker of thermally-aged sweet wine. Wine-only pool. arginine-lump provenance caveat (decision D-87)."

threshold_3_methylbutanal_wine:
  value: 15.0
  unit: "ug/L"   # 3-methylbutanal, 'malty / dark chocolate' (branched-chain Strecker aldehyde of leucine)
  tier: speculative
  uncertainty: { low: 4.0, high: 50.0, note: "3-methylbutanal perception threshold in wine ~10-20 µg/L; band widened for matrix dependence." }
  provenance:
    source: "wine/beverage aroma literature: 3-methylbutanal (malty/chocolate, the leucine Strecker aldehyde) perception threshold ~10-20 µg/L in wine-like matrices (Ferreira et al.; the dominant malty staling aldehyde in beverage aging literature)."
    conditions: "measured in/near wine matrix; 3-methylbutanal, a single molecule (the leucine-derived Strecker aldehyde)"
    notes: "Single-molecule pool — clean OAV, matrix-matched. Typically the most prominent branched-chain thermal/staling aldehyde. Wine-only pool. arginine-lump caveat (decision D-87)."

threshold_2_methylpropanal_wine:
  value: 6.0
  unit: "ug/L"   # 2-methylpropanal (isobutyraldehyde), 'malty / grainy' (Strecker aldehyde of valine)
  tier: speculative
  uncertainty: { low: 2.0, high: 20.0, note: "2-methylpropanal / isobutyraldehyde perception threshold in wine ~5-10 µg/L; band widened for matrix dependence." }
  provenance:
    source: "wine/beverage aroma literature: 2-methylpropanal (isobutyraldehyde, malty/grainy, the valine Strecker aldehyde) perception threshold ~5-10 µg/L in wine-like matrices (Ferreira et al.; beer-staling aldehyde literature)."
    conditions: "measured in/near wine matrix; 2-methylpropanal, a single molecule (the valine-derived Strecker aldehyde)"
    notes: "Single-molecule pool — clean OAV, matrix-matched. A malty/grainy thermal-aging marker. Wine-only pool. arginine-lump caveat (decision D-87)."

threshold_sotolon_wine:
  value: 8.0
  unit: "ug/L"   # sotolon, 'curry / maple / nutty' (the botrytized-sweet-wine / Madeira furanone)
  tier: speculative
  uncertainty: { low: 2.0, high: 20.0, note: "sotolon perception threshold in wine ~5-19 µg/L (reported ~8 µg/L in white wine; potent); band ~2-20 µg/L across matrices." }
  provenance:
    source: "wine aroma literature: sotolon (4,5-dimethyl-3-hydroxy-2(5H)-furanone) perception threshold ~5-19 µg/L in wine (Cutzach et al.; Pham et al. 1995; the curry/fenugreek/maple marker of botrytized sweet wine, vin jaune, aged Port and Madeira)."
    conditions: "measured in/near wine matrix; sotolon, a single molecule (the threonine/acetaldehyde-derived furanone)"
    notes: "Single-molecule pool — clean OAV, matrix-matched. THE diagnostic marker of aged sweet/oxidative wine (curry/maple). Trace by mass but potent (low threshold). Wine-only pool. arginine-lump caveat, and its 2 acetaldehyde-derived carbons are lumped into the arginine draw (decision D-87)."

# -- Oak extractives (decision D-77): the barrel/chip aroma markers (non-oxidative aging axis) -----
