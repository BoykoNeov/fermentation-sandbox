# -- Furaneol (decision D-94): the caramel/toffee oak+bourbon furanone. The fifth oak aroma marker,
# SHARED by wine and barrel-beer like the D-77 four (the oak axis is a wood property). Furaneol
# (HDMF) is a POTENT caramel odorant (low threshold), so a modest µg/L level reads strongly caramel-
# forward — the point of choosing it over the higher-threshold oak-toast markers (maltol/furfural),
# which would rarely clear OAV>1. Descriptor kept DISTINCT from sotolon's curry/maple. Beer <= wine
