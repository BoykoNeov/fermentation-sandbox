# Winemaking-addition conversion constants (decision D-36).
#
# SHARED, medium-agnostic parameter file: loaded alongside the <medium>_<strain>.yaml by the
# compile seam (the store merges paths; these names are collision-free with the per-medium
# kinetic parameters). These are NOT physics — no Process reads them in the ODE hot loop. They
# are the *industry-unit → canonical-unit* conversion constants the discrete-intervention verb
# registry uses at the scenario→core compile boundary (the same role must_fermentable_fraction
# plays for Brix, decision D-16): a winemaker doses a *mass* of a commercial additive, and the
# verb converts that to the canonical state jump the runtime's external-flow ledger books.
#
# They live in a Parameter file (not inlined in compile.py) because prime directive #2 admits no
# magic numbers even for exact stoichiometry — the value must travel with its provenance. A
# stoichiometric mass fraction is *exact*, so it is VALIDATED with a zero-width uncertainty band
# (never swept by the stochastic ensemble); it is a physical constant, not an estimate.

# -- DAP (diammonium phosphate) nitrogen content (add_dap verb) ------------------------------
#
# Diammonium phosphate (NH4)2HPO4 is the standard fermentation nitrogen supplement. The add_dap
# verb doses it by mass (dap_gpl) and converts to the assimilable-nitrogen jump on the lumped N
# slot via this fraction. Both ammonium groups are immediately assimilable YAN, so the whole
# nitrogen content counts. The PHOSPHATE is a scoped omission — the model tracks no phosphorus
# pool (P is not limiting in normal must), so the dose's phosphate is dropped; add_dap injects
# only the nitrogen. Molar mass (NH4)2HPO4 = 132.06 g/mol; 2 N = 28.014 g/mol; fraction =
# 28.014 / 132.06 = 0.2121 g N / g DAP.
dap_nitrogen_fraction:
  value: 0.2121
  unit: "g/g"   # g assimilable nitrogen / g diammonium phosphate
  tier: validated
  uncertainty: { low: 0.2121, high: 0.2121, note: "exact stoichiometry; not an uncertain parameter" }
  provenance:
    source: "exact stoichiometry of diammonium phosphate (NH4)2HPO4"
    conditions: "commercial DAP fermentation supplement; both ammonium groups counted as immediately assimilable YAN"
    notes: "M((NH4)2HPO4) = 132.06 g/mol, 2 N = 28.014 g/mol -> 28.014/132.06 = 0.2121 g N/g DAP. Phosphate is DROPPED (no phosphorus pool in the model; P is non-limiting in normal must), so add_dap injects nitrogen only (decision D-36)."

# -- Copper H2S-binding capacity (add_copper verb, decision D-44) ----------------------------
#
# Copper fining (copper sulfate) is the standard remediation for a reductive (H2S) fault: Cu(2+)
# precipitates dissolved sulfide as insoluble copper sulfide (Cu2+ + H2S -> CuS(s) + 2 H+), a 1:1
# molar reaction, and the CuS drops out with the lees. The add_copper verb doses copper by mass
# (copper_mgl, mg/L Cu, the industry unit) and converts to the mass of H2S it can bind via this
# factor; the verb then removes min(h2s_present, capacity) from the h2s pool (copper in excess
# simply removes all dissolved H2S — the real "clears reduction" outcome). H2S is carbon-free, so
# the removal perturbs neither elemental ledger (the add_so2 precedent). SCOPE (v1): the removal
# lever only — RESIDUAL copper (excess Cu left in the wine, a haze/toxicity concern with its own
# legal limit) is NOT tracked, and copper binding of MERCAPTANS (the other reductive off-aroma) is
# deferred with the mercaptan pool (decision D-44). M(H2S) = 34.076 g/mol, M(Cu) = 63.546 g/mol =>
# stoichiometric ceiling 34.076/63.546 = 0.536 g H2S bound / g Cu.
copper_h2s_binding:
  value: 0.536
  unit: "g/g"   # g H2S bound per g copper (Cu), stoichiometric CuS (1:1 mol)
  tier: plausible
  uncertainty: { low: 0.27, high: 0.536, note: "0.536 = stoichiometric 1:1 CuS ceiling (M_H2S/M_Cu); real fining is imperfect (kinetics, competing ligands, colloidal CuS re-dissolution), so effective binding can be lower — banded down to ~50% efficiency (0.27). Cannot EXCEED the ceiling (1 Cu binds at most 1 H2S)" }
  provenance:
    source: "stoichiometry of copper sulfide precipitation Cu2+ + H2S -> CuS(s) + 2 H+ (1:1 mol); the standard copper-fining remediation for reductive H2S (general enology; Rankine)"
    conditions: "copper(II) fining of dissolved H2S in wine; g H2S bound per g Cu dosed, at (idealised) stoichiometric completion"
    notes: "Read by the add_copper verb to convert a copper dose (copper_mgl) into the H2S mass it removes. M(H2S) = 34.076, M(Cu) = 63.546 => 34.076/63.546 = 0.536 g H2S/g Cu at 1:1 stoichiometry. VALUE sits at the stoichiometric ceiling (near-complete binding, the demonstration lever); tier PLAUSIBLE (not validated like dap_nitrogen_fraction) because real copper fining is NOT perfectly stoichiometric — the 1:1-and-complete assumption is a model idealisation, banded down for imperfect efficiency. Residual copper is untracked (v1 scope, decision D-44)."

# -- Copper mercaptan-binding capacity (add_copper verb, decision D-45) ----------------------
#
# Copper also precipitates MERCAPTANS (thiols) as copper mercaptide (Cu2+ + 2 RSH -> Cu(SR)2(s) +
# 2 H+, a 1:2 Cu:thiol reaction), the SECOND half of copper fining. The add_copper verb binds H2S
# FIRST (CuS is far more insoluble, Ksp ~1e-36, so sulfide is preferentially bound) and then binds
# mercaptans with the LEFTOVER copper via this factor. Removing mercaptans removes CARBON from the
# wine (methanethiol carries carbon, D-45), booked as a negative external flow (the racking-debris
# precedent), so the run-wide ledger identity still holds. M(methanethiol CH3SH) = 48.107 g/mol,
# M(Cu) = 63.546 g/mol, 1 Cu : 2 thiol => 2*48.107/63.546 = 1.514 g MeSH bound / g Cu (a gram of
# copper binds ~2.8x the thiol mass it does sulfide, since sulfide is 1:1). BANDED HARD: copper
# fining is notably LESS effective on mercaptans than on H2S (slower, incomplete) and USELESS on
# the disulfides mercaptans oxidise to (a real limitation of copper as a reduction fix), so the
# effective binding can be well below stoichiometric.
copper_mercaptan_binding:
  value: 1.514
  unit: "g/g"   # g methanethiol bound per g copper (Cu), stoichiometric Cu(SR)2 (1:2 mol)
  tier: plausible
  uncertainty: { low: 0.3, high: 1.514, note: "1.514 = stoichiometric 1:2 Cu(SR)2 ceiling (2*M_MeSH/M_Cu); copper fining is markedly INCOMPLETE for mercaptans (and useless on the disulfides they oxidise to), so effective binding is often well below stoichiometric — banded down HARD to ~20% (0.3). Cannot EXCEED the ceiling (1 Cu binds at most 2 thiol)" }
  provenance:
    source: "stoichiometry of copper mercaptide precipitation Cu2+ + 2 RSH -> Cu(SR)2(s) + 2 H+ (1:2 mol); copper fining of reductive thiols (general enology; Rankine). The incompleteness/disulfide caveat: copper is an imperfect mercaptan fix (Swiegers et al. 2005; Ugliano volatile-sulfur reviews)"
    conditions: "copper(II) fining of dissolved mercaptans (methanethiol stand-in) in wine; g MeSH bound per g Cu, bound with copper LEFT after H2S, at (idealised) stoichiometric completion"
    notes: "Read by the add_copper verb (D-45) to convert leftover copper into the mercaptan mass it removes. M(MeSH) = 48.107, M(Cu) = 63.546, Cu(SR)2 is 1 Cu : 2 thiol => 2*48.107/63.546 = 1.514 g MeSH/g Cu. VALUE at the stoichiometric ceiling (the user-chosen stoichiometric lever); tier PLAUSIBLE and banded DOWN HARDER than copper_h2s_binding because real copper fining is notably less complete for mercaptans than for sulfide and cannot touch the disulfides they oxidise to. Residual copper is untracked (v1 scope, decision D-45)."
