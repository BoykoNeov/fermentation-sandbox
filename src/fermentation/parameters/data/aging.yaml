# Aging chemistry — ester hydrolysis kinetics (decision D-69, the first §4.1 aging Process).
#
# SHARED, medium-agnostic parameter file (the vicinal_diketones.yaml / acidbase.yaml pattern):
# these names are collision-free with the per-medium kinetic parameters, and — like the
# non-enzymatic VDK decarboxylation — acid-catalysed ester hydrolysis is a property of the
# MOLECULE and the wine/beer pH, not of the beverage's biology, so its rate constant and
# activation energy live in ONE shared file rather than per medium. Merged into compile.py's
# shared_files at D-70, so every compiled scenario carries these params — but INERT until a
# begin_aging intervention enables EsterHydrolysis (disabled at compile, since aging is inherently
# post-ferment): an un-aged scenario loads the params and never reads them.
#
# THE PROCESS (fermentation.core.kinetics.aging.EsterHydrolysis):
#
#   d(esters)/dt = -k_ester_hydrolysis * f(T) * max(0, esters - esters_eq)
#
# a first-order NET decay of the lumped ``esters`` pool toward a lower equilibrium floor
# ``esters_eq`` (NOT decay-to-zero), warmed by an Arrhenius factor f(T) = arrhenius_factor(
# T, E_a_ester_hydrolysis, T_ref) so warm aging degrades the fruity acetate esters faster.
# The released ester carbon (ledger-fixed at c(ethyl_acetate), the D-19 esters mass weighting)
# is routed to ``fusels`` (the alcohol product) + ``Byp`` (the acid product) — see the Process
# docstring for the 5:2 split and the stand-in seam it inherits.
#
# CARBON is the invariant (closes to machine precision); MASS carries a small (~4.5%) documented
# gap — splitting a carbon-exact budget across pools with heterogeneous fixed weightings is not
# mass-conserving (real hydrolysis consumes untracked water). The same stand-in gap as D-8 (beer
# hydrolysis water) / D-16 (Byp/Gly redox, which scopes total_mass to {S,E,CO2}) / D-26 (VDK
# O2/NAD(P)H). See the EsterHydrolysis docstring.
#
# WHY "NET DECAY TOWARD A LOWER EQUILIBRIUM" (the honest v1 scope, D-68):
#   * Acetate esters (isoamyl acetate, the D-67 esters representative; ethyl acetate) form
#     ABOVE their hydrolysis equilibrium during fermentation, so on aging they HYDROLYSE back
#     toward equilibrium — the fruity "banana/pear" young-wine character fades (Ramey & Ough
#     1980; Marais 1978). This is the half v1 models.
#   * The DEFERRED half: ethyl esters of fatty acids (ethyl hexanoate/octanoate) are BELOW
#     equilibrium young and slowly FORM on aging. The bidirectional equilibrium is not
#     modelled; framing the lumped pool as "net decay toward a lower floor" is the same
#     fixed-composition honesty the D-67 sensory lump carries (the pool is dominated by the
#     hydrolysing acetate esters). Below esters_eq the rate is zero (no spurious formation).
#
# TIER. ALL speculative. Ester hydrolysis is real, textbook acid-catalysed chemistry and the
# WARMER-IS-FASTER direction (E_a_ester_hydrolysis > 0) is a sourced ordering, but every
# magnitude here is an order-of-magnitude estimate and the whole aging axis is the Tier-3
# speculative frontier (milestone-3-plan.md). The Process floors its outputs at speculative
# regardless of input tiers (parameter-tier propagation, D-1).

# -- FIRST-ORDER HYDROLYSIS RATE: esters -> alcohol + acid, toward equilibrium -----------
k_ester_hydrolysis:
  value: 1.0e-4
  unit: "1/h"   # d(esters)/dt = -k_ester_hydrolysis * f(T) * max(0, esters - esters_eq)
  tier: speculative
  uncertainty: { low: 3.0e-5, high: 3.0e-4, note: "first-order rate at T_ref = 20 C => half-life ln2/k ~ 2300-23000 h (~3 months to ~2.6 years) for the excess above equilibrium — the observed timescale over which young wine's fruity acetate esters fade. Slower cold-cellar aging, faster warm (see E_a_ester_hydrolysis)" }
  provenance:
    source: "author estimate anchored to the acetate-ester hydrolysis timescale in wine (Ramey & Ough 1980, 'Volatile ester hydrolysis or formation during storage of model solutions and wines', J. Agric. Food Chem. 28:928-934 — first-order approach to an esterification equilibrium; Marais 1978 review of ester changes on wine aging). Acetate esters half-lives of order months-to-a-year at cellar temperature."
    conditions: "generic wine/beer at cellar pH (~3.2-4.4); first-order in the lumped esters excess over equilibrium, at T_ref = 293.15 K. Represents the aggregate hydrolysis of the acetate-ester-dominated lump (isoamyl acetate the D-67 representative), not a single molecule."
    notes: "SOURCED FORM (first-order approach to equilibrium, Ramey & Ough) + SPECULATIVE magnitude (order-of-magnitude, banded to the months-to-year acetate-ester half-life). The load-bearing sourced claim is the warmer-is-faster ORDERING carried by E_a_ester_hydrolysis, not this absolute rate."

# -- ACTIVATION ENERGY: warmer aging hydrolyses faster (sourced ordering) ----------------
E_a_ester_hydrolysis:
  value: 60000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 40000.0, high: 80000.0, note: "Q10 ~1.7-2.9 at 20 C. Typical of acid-catalysed ester hydrolysis (~50-70 kJ/mol). The SOURCED, load-bearing claim is the sign (warmer => faster aging degradation, the owner's stated aging direction); the magnitude is speculative and banded" }
  provenance:
    source: "SOURCED ORDERING: acid-catalysed ester hydrolysis accelerates with temperature (textbook Arrhenius kinetics; ester hydrolysis activation energies ~50-70 kJ/mol, e.g. ethyl acetate acid hydrolysis). Warmer storage degrades young esters faster is the well-established direction (Marais 1978; Ramey & Ough 1980 measured faster hydrolysis at higher storage T)."
    conditions: "equivalent Arrhenius activation energy of the aggregate ester hydrolysis at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster) is the sourced, load-bearing claim — it is why warm cellars age wine 'faster' and why cold storage preserves fruity esters. Exact magnitude speculative and banded around a Q10 ~2."

# -- EQUILIBRIUM FLOOR: the residuum the pool decays TOWARD, not to zero ------------------
esters_eq:
  value: 0.005
  unit: "g/L"   # the lower equilibrium the lumped esters pool relaxes toward (net decay floor)
  tier: speculative
  uncertainty: { low: 0.001, high: 0.02, note: "the hydrolysis equilibrium level of the lumped ester pool, ~1-20 mg/L as ethyl-acetate-equivalent — well below typical young-wine ester levels (tens of mg/L) so most of the fruity acetate fraction hydrolyses, a residuum remains" }
  provenance:
    source: "author estimate: the esterification/hydrolysis equilibrium leaves a nonzero residual ester concentration (Ramey & Ough 1980 — esters approach an equilibrium set by their acid+alcohol, not zero). A single absolute floor stands in for what is really a per-ester, composition- and acid/alcohol-concentration-dependent equilibrium."
    conditions: "generic wine/beer; the lumped ester pool's aggregate equilibrium, booked as ethyl-acetate-equivalent g/L (the D-19 esters mass weighting)"
    notes: "CRUDE STAND-IN, flagged loudly: a fixed absolute equilibrium replaces the true composition-dependent one — the aging analogue of the D-67 fixed-lump-composition assumption. Its role is only to make the decay NET (toward a lower floor) rather than decay-to-zero, which would over-strip the pool (D-68). Below this floor the rate is zero (the reverse ester FORMATION half is the deferred bidirectional term)."

# ======================================================================================
# OXIDATIVE aging (decision D-71, the first §4.1 OXIDATIVE aging Process). The head of the
# dissolved-O2 sub-axis.
#
# THE PROCESS (fermentation.core.kinetics.aging.OxidativeAcetaldehyde):
#
#   d(o2)/dt          = -k_ethanol_oxidation * f(T) * [o2]           # O2-limited, Arrhenius
#   d(acetaldehyde)/dt = +y_acetaldehyde_per_o2 * (r_o2 / M_O2) * M_acetaldehyde
#   d(E)/dt           = -d(acetaldehyde)/dt * M_ethanol / M_acetaldehyde   # carbon-exact C2 borrow
#
# As a finished wine/beer takes up oxygen (bottle ingress, micro-oxygenation, barrel), O2 oxidises
# ethanol to ACETALDEHYDE — the 'sherry'/bruised-apple/nutty OXIDISED note the D-67 OAV lens already
# reads (the same acetaldehyde pool the D-27 buffer fills, 'green apple' fresh vs 'oxidised' when it
# climbs). So — like ester hydrolysis — this moves an OAV the lens already reads and needs no new
# aroma pool; the one new slot is the ``o2`` SUBSTRATE (dosed by add_oxygen).
#
# WHY FIRST-ORDER IN O2, NOT ETHANOL (the D-71 crux). Ethanol sits at ~100 g/L, essentially
# constant across aging, so a rate first-order in ethanol is a constant rate in disguise —
# acetaldehyde would rise LINEARLY and UNBOUNDED, pinning the kinetic limit on the wrong species.
# O2 is the rate-limiting reactant, so a rate first-order in the FINITE o2 pool gives the correct
# SATURATING behaviour (acetaldehyde plateaus as the O2 charge is spent — the bottle-aging reality).
# Mechanistically the real path is COUPLED oxidation (O2 -> quinone + H2O2 via o-diphenols; H2O2 +
# ethanol -> acetaldehyde; Wildenradt & Singleton 1974) — the phenolic catalyst is folded into
# k_ethanol_oxidation in v1 (a documented lump; no general phenol pool is tracked).
#
# SHARES, NOT THE WHOLE FLUX (the D-73 rework). Each O2 consumer draws its OWN share of the shared
# o2 pool via its own rate constant; ProcessSet SUMS them, so the pool depletes ONCE and the O2
# splits among the sinks by k_i / sum(k) (the pattern SulfiteOxidation established at D-72). So
# k_ethanol_oxidation is the ETHANOL-OXIDATION SHARE of the total O2-depletion rate, NOT the total
# (D-71 originally framed it as the total — D-73 supersedes that; see the k_ethanol_oxidation and
# y_acetaldehyde_per_o2 entries below). y_acetaldehyde_per_o2 is then the TRUE per-O2 stoichiometric
# yield of the ethanol route ALONE — the sink competition lives in the k's, NOT in a sub-unity yield.
#
# LEDGER. o2 is CARBON-FREE and off every conservation ledger (total_carbon/total_mass/
# total_nitrogen weight only their named pools) — like h2s/iso_alpha. The carbon that DOES move
# (E -> acetaldehyde) is borrowed carbon-exactly (C2 -> C2, the D-27 reduction reversed), so
# total_carbon closes to machine precision. MASS carries the standing E<->acetaldehyde gap (the D-27
# seam), scoped out because total_mass ({S,E,CO2}) is never asserted on an aging run.
#
# TIER. ALL speculative — the oxidation FORM (O2-limited, warmer-faster) is sourced, but every
# magnitude is an order-of-magnitude estimate and the aging axis is the Tier-3 frontier.

# -- ETHANOL-OXIDATION SHARE OF THE O2-DEPLETION RATE (first-order in o2, O2-limited) -----
# D-73: this is the ETHANOL-OXIDATION SHARE of the total O2-depletion rate, NOT the total (D-71
# framed it as the total; D-73 supersedes that). Each always-on O2 sink owns its own first-order-in-
# o2 rate; ProcessSet sums them, so the pool depletes once and O2 splits by k_i/sum(k). The empirical
# TOTAL O2-scavenging timescale (weeks-to-months) is the ANCHOR the shares partition. TODAY ethanol
# oxidation is the SOLE always-on O2 sink, so its share EQUALS the total => value stays 5.0e-4 and the
# depletion timescale is unchanged. When phenolic browning / Strecker land (each an always-on sink
# with its own k), THIS value is REDUCED so k_ethanol_oxidation + k_browning + ... ~ 5.0e-4 stays the
# total (see the D-73 worked drop-in). Substrate-gated sinks (SO2, D-72) add on top without touching
# this, since they are zero without their substrate.
k_ethanol_oxidation:
  value: 5.0e-4
  unit: "1/h"   # d(o2)/dt = -k_ethanol_oxidation * f(T) * [o2]  (ethanol route's share of O2 depletion)
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 2.0e-3, note: "ethanol-oxidation share of the first-order O2-consumption rate at T_ref = 20 C. While ethanol oxidation is the sole always-on O2 sink this share IS the total => half-life ln2/k ~ 350-7000 h (~2 weeks to ~10 months) for the dissolved-O2 charge (wine scavenges a saturating O2 dose over weeks-to-months at cellar temperature). As always-on sinks (browning/Strecker) are added, this share is reduced so their sum reproduces that total depletion timescale — the total is the anchor, the shares partition it (D-73)." }
  provenance:
    source: "author estimate anchored to the timescale over which dissolved oxygen is consumed in stored wine (Singleton 1987, oxidation of wines; Wildenradt & Singleton 1974, 'The production of aldehydes as a result of oxidation of polyphenolic compounds and its relation to wine aging'). A saturating O2 charge is scavenged over weeks-to-months at cellar temperature; this rate is the ethanol-oxidation share of the pseudo-first-order O2-depletion constant, folding the o-diphenol/Fe catalyst concentration into k (no general phenol pool tracked in v1)."
    conditions: "generic wine/beer at cellar pH/temperature; pseudo-first-order in the dissolved-o2 pool at T_ref = 293.15 K, the ethanol route's share of the total depletion. The catalytic phenol/metal chemistry is lumped into this constant; the per-O2 acetaldehyde yield of the route is y_acetaldehyde_per_o2."
    notes: "SOURCED FORM (O2-limited, first-order in the finite O2 pool => SATURATING acetaldehyde, not the unbounded ethanol-first alternative — the D-71 design crux) + SPECULATIVE magnitude (order-of-magnitude, banded to the weeks-to-months O2-scavenging timescale). The load-bearing sourced claims are (1) O2 is the rate-limiter and (2) warmer oxidises faster (E_a_ethanol_oxidation). D-73: this is the ethanol SHARE of the depletion rate — currently == the total (sole always-on sink), reduced when browning/Strecker add their shares."

# -- ACTIVATION ENERGY: warmer aging oxidises faster (sourced ordering) -------------------
E_a_ethanol_oxidation:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Wine oxidation/browning activation energies ~30-70 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster oxidation, faster acetaldehyde accumulation and browning); the magnitude is speculative and banded." }
  provenance:
    source: "SOURCED ORDERING: wine oxidation and oxidative browning accelerate with temperature (textbook Arrhenius; measured browning/oxidation activation energies ~30-70 kJ/mol, e.g. Singleton 1987; the coupled-oxidation cascade is temperature-driven). Warm storage oxidises wine faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2-consumption / ethanol-oxidation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster) is the sourced, load-bearing claim — why warm/hot storage oxidises (maderises) wine faster and cold cellars slow it. Exact magnitude speculative and banded around a Q10 ~2, deliberately a touch below the ester-hydrolysis E_a (oxidation's temperature sensitivity is broadly comparable-to-slightly-lower)."

# -- ACETALDEHYDE YIELD: mol acetaldehyde per mol O2 consumed BY THE ETHANOL ROUTE --------
# D-73: this is the TRUE per-O2 stoichiometric yield of the ethanol-oxidation route ALONE, NOT a
# sub-unity fudge for competing sinks. The sink competition now lives in the rate constants (each
# sink draws its own O2 share via its own k; ProcessSet sums), so this yield is the ethanol route's
# OWN conversion of the O2 it consumes — free to sit near the coupled-oxidation mechanistic yield.
# Re-baselined 1.0 -> 1.5 (D-73). NOTE (interim, until browning is built): because ethanol oxidation
# is currently the SOLE always-on O2 sink, it transiently receives the whole always-on O2 flux, so
# aged-with-O2 acetaldehyde is an UPPER estimate; when browning/Strecker land and divert their O2
# share (k reduced), the acetaldehyde partitions down to its true fraction.
y_acetaldehyde_per_o2:
  value: 1.5
  unit: "mol/mol"   # acetaldehyde produced per O2 consumed by the ethanol-oxidation route (true yield)
  tier: speculative
  uncertainty: { low: 1.0, high: 2.0, note: "coupled oxidation yields ~1-2 mol acetaldehyde per mol O2. The H2O2 arm (1 O2 -> 1 H2O2 -> 1 acetaldehyde) reliably gives ~1; the theoretical ceiling of 2 needs FULL coupling (O2's four-electron reduction O2->H2O2->H2O driving two 2-electron ethanol oxidations, the o-quinone re-oxidising a second ethanol). In real wine that ceiling is not reached — the quinone is usually reduced by OTHER diphenols/sulfite rather than ethanol, and H2O2 partitions to non-ethanol fates — so realised yield sits NEARER 1. Central 1.5 is a mid-band estimate, not the best case. Now that competing O2 sinks are EXPLICIT siblings (each with its own k), this is the ethanol route's OWN yield, not shaded down for them (D-73). Sanity: a ~40 mg/L (~0.04 g/L) cumulative O2 exposure x 1.5 => ~82 mg/L acetaldehyde (fresh wine ~10-40, moderately oxidised ~100-300 mg/L) — in range for an oxidative aging." }
  provenance:
    source: "author estimate from the coupled-oxidation stoichiometry (Wildenradt & Singleton 1974: polyphenol oxidation by O2 generates H2O2, which oxidises ethanol to acetaldehyde). Per O2, the H2O2 arm gives ~1 acetaldehyde reliably; up to ~2 is possible only if the catalytic o-diphenol/o-quinone couple carries a fully-coupled second oxidation, which real wine approaches but does not reach (competing quinone reductants and H2O2 fates). Central 1.5 is the mid-band estimate for the ETHANOL ROUTE ALONE — above the reliable ~1, below the ~2 best case."
    conditions: "mol acetaldehyde per mol O2 consumed by the ethanol-oxidation route, generic wine/beer; the route's true per-O2 yield at T_ref = 293.15 K. Competing O2 sinks (o-diphenol browning, Strecker degradation, direct SO2 oxidation) draw their OWN O2 share via their own rate constants (SO2, D-72; browning/Strecker to come, D-73), NOT out of this yield."
    notes: "SPECULATIVE magnitude. D-73 re-baseline 1.0 -> 1.5: the old 1.0 was the sub-unity 'leave headroom for unmodeled sinks' framing, which was muddled — cutting the yield never freed O2 for other sinks (the O2 partition lives in the k's, not here). With competition moved to explicit sibling rate constants this is the ethanol route's genuine yield (mid-to-upper coupled-oxidation band). INTERIM CAVEAT: until browning/Strecker are built to divert their O2 share, ethanol oxidation gets the whole always-on flux, so aged-with-O2 acetaldehyde is an upper estimate. The acetaldehyde it produces still binds any dosed SO2 via the D-47 equilibrium for free (SO2 mops up oxidative acetaldehyde — handled by the existing readout)."

# ======================================================================================
# SULFITE OXIDATION (decision D-72, the FIRST oxidative sub-axis sink to claim its share of the
# shared o2 budget opened at D-71). The head of the "SO2 protects until exhausted" threshold.
#
# THE PROCESS (fermentation.core.kinetics.aging.SulfiteOxidation, WINE-ONLY):
#
#   d(o2)/dt        = -k_so2_oxidation * f(T) * [o2] * [HSO3-]        # BILINEAR, Arrhenius
#   d(so2_total)/dt = -2 * (r_o2 / M_O2) * M_SO2                      # 2 mol SO2 per mol O2
#
# where [HSO3-] is the FREE-bisulfite driver (free_SO2 * bisulfite_fraction(pH); acidbase.
# bisulfite_so2_at_ph). SO2 is wine's antioxidant because bisulfite scavenges O2 FASTER than
# ethanol does: competing for the SAME o2 pool (ProcessSet summing, not a new mechanism), the O2 is
# preferentially spent oxidising bisulfite -> sulfate rather than ethanol, so WHILE FREE SO2 LASTS
# oxidative acetaldehyde is suppressed and ONCE IT IS EXHAUSTED acetaldehyde climbs (the celebrated
# threshold, emergent). No new pool: it decrements the existing so2_total slot.
#
# WHY BISULFITE, NOT MOLECULAR SO2 (the D-72 crux). Molecular SO2.H2O is the reactive ANTIMICROBIAL
# form (D-22); the HSO3- anion is the reactive ANTIOXIDANT nucleophile (reduces o-quinones, scavenges
# H2O2 — Danilewicz; acidbase.bisulfite_fraction already names HSO3- "the reactive nucleophile"). At
# wine pH bisulfite is ~0.94-0.99 of free, so the pH-coupling is mild — but a STRONGER coupling
# enters through FREE SO2: as the sibling OxidativeAcetaldehyde makes acetaldehyde, that acetaldehyde
# binds SO2 (D-47), free SO2 falls, and this scavenging self-throttles (the emergent feedback the
# bilinear form buys over a plain SO2-presence gate).
#
# STOICHIOMETRY is a CODE constant, not a parameter (aging.py _SO2_PER_O2 = 2): the Danilewicz
# coupled oxidation spends one bisulfite reducing the o-quinone and one scavenging the H2O2 per O2,
# = 2 mol SO2 : 1 mol O2 = the classic "~4 mg SO2 per mg O2" mass rule. Distinct from D-47 BINDING
# (reversible free<->bound repartition of so2_total): this OXIDISES SO2 to sulfate and removes it,
# so the two do not double-count.
#
# LEDGER. Both o2 (D-71) and so2_total (D-22/D-28) are carbon-free and off every conservation ledger
# (there is no sulfur ledger), so oxidising SO2 to untracked sulfate moves nothing conserved — no
# carbon/mass/nitrogen term, nothing asserted. WINE-ONLY (so2_total + the acid-pH slots are wine-only,
# D-18; wired into the wine medium only, like MLF/Brett), and disabled at compile until begin_aging.
#
# TIER. ALL speculative — the oxidation FORM (O2-limited, bisulfite-driven, warmer-faster, 2:1) is
# sourced, but the rate MAGNITUDE is an order-of-magnitude estimate and the aging axis is the Tier-3
# frontier. The load-bearing SOURCED claims are (1) bisulfite scavenges O2 faster than ethanol (=>
# SO2 protective), (2) the 2:1 stoichiometry, (3) warmer oxidises faster (E_a_so2_oxidation > 0).

# -- BILINEAR O2xBISULFITE SCAVENGING RATE: SO2 out-competes ethanol for O2 ---------------
k_so2_oxidation:
  value: 0.2
  unit: "L/(g*h)"   # d(o2)/dt = -k_so2_oxidation * f(T) * [o2] * [HSO3-]  (bilinear, both g/L)
  tier: speculative
  uncertainty: { low: 0.05, high: 2.0, note: "bimolecular O2xbisulfite rate constant at T_ref = 20 C. The LOAD-BEARING claim is the ORDERING, not the magnitude: at cellar free SO2 (~20-40 mg/L => [HSO3-] ~0.02-0.04 g/L) the pseudo-first-order O2 rate k_so2_oxidation*[HSO3-] ~ 0.004-0.008 /h is ~8-16x the ethanol-oxidation k_ethanol_oxidation (5e-4 /h), so SO2 wins the great majority of the O2 while present. As SO2 depletes the route slows and ethanol takes over — the threshold. Absolute O2-scavenging speed banded loosely (real sulfite autoxidation is metal/o-diphenol-catalysed, days-to-weeks); the threshold is set by STOICHIOMETRY (2:1, mass-limited), robust to this magnitude." }
  provenance:
    source: "author estimate anchored to the ORDERING that free bisulfite is a faster O2 scavenger than ethanol in wine (Danilewicz 2003/2007, oxygen-reduction mechanism; Boulton et al. 1996, Principles and Practices of Winemaking — SO2 protects wine by intercepting the O2/H2O2/quinone oxidation cascade). The bimolecular constant folds the metal/o-diphenol catalysis into k (no explicit catalyst pool tracked in v1, as with k_ethanol_oxidation)."
    conditions: "generic wine at cellar pH/temperature; bilinear in the dissolved-o2 pool and the free-bisulfite driver (free_SO2 * bisulfite_fraction(pH)) at T_ref = 293.15 K."
    notes: "SOURCED FORM (bilinear O2xbisulfite, bisulfite out-competing ethanol for O2 => SO2 protective while present, acetaldehyde suppressed then climbing — the D-72 threshold) + SPECULATIVE magnitude. The mass-limited 2:1 stoichiometry (_SO2_PER_O2, code constant) — not this rate — sets HOW MUCH O2 a given SO2 charge neutralises (~1 mg O2 per ~4 mg SO2); this rate only sets how sharply SO2 wins the competition."

# -- ACTIVATION ENERGY: warmer aging oxidises SO2 faster (sourced ordering) ---------------
E_a_so2_oxidation:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Sulfite autoxidation / wine oxidation activation energies ~30-70 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster SO2 loss to oxidation, so warm storage burns through the protective SO2 faster); the magnitude is speculative and banded. Its OWN parameter (not reused from E_a_ethanol_oxidation) per prime directive #2: sulfite autoxidation is a distinct reaction from ethanol oxidation, so its temperature dependence gets its own provenance entry even though the two bands coincide." }
  provenance:
    source: "SOURCED ORDERING: sulfite autoxidation and the coupled wine-oxidation cascade accelerate with temperature (textbook Arrhenius; wine oxidation activation energies ~30-70 kJ/mol, Danilewicz 2003; Boulton et al. 1996). Warm storage consumes protective SO2 faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2xbisulfite scavenging at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster SO2 oxidation) is the sourced, load-bearing claim. Exact magnitude speculative and banded around a Q10 ~2, mirroring E_a_ethanol_oxidation (the two oxidation reactions have comparable temperature sensitivity), but kept a SEPARATE parameter — distinct reaction, distinct provenance (prime directive #2)."
