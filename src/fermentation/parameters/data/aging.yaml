# Aging chemistry — ester hydrolysis kinetics (decision D-69, the first §4.1 aging Process).
#
# SHARED, medium-agnostic parameter file (the vicinal_diketones.yaml / acidbase.yaml pattern):
# these names are collision-free with the per-medium kinetic parameters, and — like the
# non-enzymatic VDK decarboxylation — acid-catalysed ester hydrolysis is a property of the
# MOLECULE and the wine/beer pH, not of the beverage's biology, so its rate constant and
# activation energy live in ONE shared file rather than per medium. Merged into compile.py's
# shared_files at D-70, so every compiled scenario carries these params — but INERT until a
# begin_aging intervention enables EsterHydrolysis (disabled at compile, since aging is inherently
# post-ferment): an un-aged scenario loads the params and never reads them.
#
# THE PROCESS (fermentation.core.kinetics.aging.EsterHydrolysis):
#
#   d(isoamyl_acetate)/dt
#       = -k_ester_hydrolysis * f(T) * h(pH, [tartrate]) * max(0, isoamyl_acetate - isoamyl_acetate_eq)
#
# a first-order NET decay of the ``isoamyl_acetate`` pool toward a lower equilibrium floor
# ``isoamyl_acetate_eq`` (NOT decay-to-zero), warmed by an Arrhenius factor f(T) = arrhenius_factor(
# T, E_a_ester_hydrolysis, T_ref) so warm aging degrades the fruity banana ester faster, AND
# acid-catalysed by a normalized MULTI-SPECIES factor (D-124 built the dominant [H+] term; D-125
# added the tartrate terms):
#
#   h(pH, [tartrate]) = N(pH, [tartrate]) / N(pH_ref, tartaric_ref)
#   N(pH, T)          = [H+] + r_h2t_ester_hydrolysis*[H2T] + r_ht_ester_hydrolysis*[HT-]
#
# — Ramey & Ough 1980's FULL rate law k_obsd = k_H+[H+] + k_H2T[H2T] + k_HT-[HT-] (Table VII, their
# 3x3 matrix solve), divided through by k_H+ so only the two dimensionless RATIOS survive (k_H+
# cancels; the D-97 identifiability discipline). [H2T]/[HT-] are the undissociated-tartaric and
# bitartrate concentrations from the sim's OWN tartaric speciation (neutral_fraction/bisulfite_
# fraction on the `tartaric` state slot, D-18) — the same machinery the pH solver runs. h = 1 at
# (pH_ref, tartaric_ref) => byte-for-byte the D-123/D-124 anchor there. A LOWER-pH wine hydrolyses
# FASTER (R&O's "pH matters more than total acidity"; the [H+] backbone dominates), and off the
# reference the tartrate terms bite: near-null at typical red pH (~3.3-3.6) but +16%/+31%/+40% at pH
# 3.8/4.1/4.3 — the high-pH-white correction D-124's pure-[H+] law under-predicted. WINE-ONLY (beer
# has no pH system, D-18 => h == 1, the pH_ref rate). tartaric_ref-vs-0 tartrate: an UNDOSED wine
# (tartaric = 0) is NOT byte-for-byte with D-124 — it runs ~0.9% faster than the tartrate-bearing
# reference, the correct tartrate-dependence D-124 lacked (see r_h2t/r_ht/tartaric_ref below).
# The released carbon (c(isoamyl_acetate) — the REAL molecule since D-96, not a stand-in) is
# routed to ``isoamyl_alcohol`` (the alcohol product, its own D-99 pool — not the retired
# ``fusels`` lump) + ``Byp`` (the acid product) — see the Process docstring for the 5:2 split,
# which D-96 made EXACT (5 + 2 = 7 = isoamyl acetate's carbons).
#
# CARBON is the invariant (closes to machine precision); MASS carries a small (~4.5%) documented
# gap — splitting a carbon-exact budget across pools with heterogeneous fixed weightings is not
# mass-conserving (real hydrolysis consumes untracked water). The same stand-in gap as D-8 (beer
# hydrolysis water) / D-16 (Byp/Gly redox, which scopes total_mass to {S,E,CO2}) / D-26 (VDK
# O2/NAD(P)H). See the EsterHydrolysis docstring.
#
# WHY "NET DECAY TOWARD A LOWER EQUILIBRIUM" (the honest v1 scope, D-68; direction corrected D-121):
#   * Acetate esters of higher alcohols (isoamyl acetate) AND straight-chain ethyl esters of fatty
#     acids (ethyl_hexanoate) BOTH form ABOVE their hydrolysis equilibrium during fermentation, so
#     on aging BOTH HYDROLYSE back toward it — the fruity "banana/pear" young-wine character fades
#     (Ramey & Ough 1980, Tables IX/X for isoamyl acetate and Table I for ethyl hexanoate; Marais
#     1978). v1 models this fade on ``isoamyl_acetate`` ALONE (D-96), and D-123 re-anchors its
#     k / E_a to R&O's real-wine measurement.
#     k / E_a to R&O's real-wine measurement. ``ethyl_hexanoate`` hydrolysis NOW SHIPS TOO
#     (EthylHexanoateHydrolysis, D-126) — its own sibling Process, anchored to Makhotkina &
#     Kilmartin 2012's real-wine kinetics (see the ETHYL HEXANOATE HYDROLYSIS block below).
#   * The family that FORMS on aging is the BRANCHED / polyprotic-acid ethyl esters (diethyl
#     succinate, ethyl lactate, ethyl isovalerate), which sit BELOW equilibrium young — and the sim
#     tracks NONE of them (D-121 retired D-69's original claim that ``ethyl_hexanoate`` was that
#     family; it is not — it hydrolyses WITH the acetates). ``ethyl_acetate`` is the one acetate
#     exception: it too FORMS on storage (ethanol ~2 M + accumulating acetic acid put it below its
#     esterification equilibrium). Its FORMATION term still does NOT ship: ethyl_acetate is absent
#     from BOTH R&O and Makhotkina & Kilmartin 2012 (which measures no ethyl acetate at all), so it
#     stays BLOCKED ON SOURCING (D-121/D-126). D-126 unblocked ONE ester's hydrolysis
#     (ethyl_hexanoate), NOT a whole ethyl-ester sub-axis. Below each ester's eq the rate is zero
#     (no spurious motion).
#
# TIER. ALL speculative — but since D-123 that is a FLOOR choice, not an admission the numbers are
# guesses. k_ester_hydrolysis and E_a_ester_hydrolysis are now MEASURED (Ramey & Ough 1980,
# real-wine isoamyl acetate; E_a at r ~ -1.00), re-anchored from D-69's author estimates. They are
# kept at speculative to preserve the aging axis's uniform speculative floor (relied on by
# test_tier_floored_at_speculative and the milestone-3 framing) and because the Process is
# speculative in FORM (Tier-3 frontier), so it floors its outputs at speculative regardless of input
# tiers (parameter-tier propagation, D-1). E_a alone would justify PLAUSIBLE; k carries a
# floor-graft (its D-123 single-pH pin is RETIRED at D-124 — pH is now explicit via
# pH_ref_ester_hydrolysis, R&O-measured first-order [H+] catalysis). The tartrate refinement
# (r_h2t_ester_hydrolysis / r_ht_ester_hydrolysis / tartaric_ref_ester_hydrolysis) is BUILT at D-125
# from R&O Table VII, retiring D-124's high-pH-white under-prediction; kept speculative because R&O
# themselves flag their matrix solve as "not exact" (the negative k_H2T; see r_h2t). isoamyl_acetate_eq
# remains a genuine author estimate (R&O measures no floor).

# -- FIRST-ORDER HYDROLYSIS RATE: esters -> alcohol + acid, toward equilibrium -----------
k_ester_hydrolysis:
  value: 2.2e-4
  unit: "1/h"   # d(isoamyl_acetate)/dt = -k_ester_hydrolysis * f(T) * max(0, isoamyl_acetate - isoamyl_acetate_eq)
  tier: speculative
  uncertainty: { low: 1.6e-4, high: 2.5e-4, note: "NARROWED AT D-124: the band is now the AT-REFERENCE-pH uncertainty, because the pH spread that used to dominate it (model 1.06e-4 / Pinot pH 3.36 1.80e-4 / Chardonnay pH 2.94 3.22e-4) is now carried EXPLICITLY by the 10^(pH_ref - pH) factor (see pH_ref_ester_hydrolysis) rather than lumped into k. What remains is the Pinot k_obsd measurement SD (Table IX, ~11%: 54.72 +/- 6.32 e-9 => ~1.6-2.0e-4 /h at 20 C) times the 1.0-1.25 floor-graft range => ~1.6-2.5e-4. Half-life ln2/k ~ 3100 h (~4 months) at the value and pH 3.36, the observed timescale over which young wine's fruity acetate esters fade" }
  provenance:
    source: "Ramey & Ough 1980, 'Volatile ester hydrolysis or formation during storage of model solutions and wines', J. Agric. Food Chem. 28(5):928-934 — MEASURED (was author-estimate until D-123, when the paper became readable as an open scanned PDF on the author's winery site; the ACS copy is paywalled). Table IX (Pinot noir, pH 3.36): isoamyl (+active amyl) acetate pseudo-first-order k_obsd = 54.72e-9 /s at 21.1 C => 1.80e-4 /h at T_ref = 20 C (shifted via E_a_ester_hydrolysis). Table VIII (Chardonnay, pH 2.94): 98.73e-9 /s => 3.22e-4 /h; Table I (model solution): 32.60e-9 /s => 1.06e-4 /h. The old D-69 estimate (1.0e-4) coincided with R&O's MODEL-solution value; this re-anchors to the real-WINE measurement."
    conditions: "wine matrix, the rate AT THE REFERENCE pH 3.36 (R&O's Pinot noir, a typical red); first-order in the `isoamyl_acetate` excess over equilibrium AND (since D-124) first-order in [H+] via the 10^(pH_ref - pH) factor, at T_ref = 293.15 K. R&O's headline STEEP [H+] dependence (Table V/VI, ~x9-x10 per pH unit, r=0.999) is now CARRIED by that factor (D-124 built the pH-explicit rate D-123 flagged as deferred). k is thus the value at pH_ref; off-reference wines scale by [H+]/[H+]_ref. See pH_ref_ester_hydrolysis for the FORM's provenance and the tartrate-intercept known limit."
    notes: "RE-ANCHORED AT D-123 (D-121's 'reopens the moment a rate constant lands' trigger). Two author modeling choices ride on the measured core, which is why the composite stays SPECULATIVE though k_obsd itself is plausible-grade: (1) the x1.25 FLOOR-GRAFT — R&O saw log-linear decay over 200 d (NO floor; k_obsd is a pure first-order disappearance constant), whereas EsterHydrolysis decays toward isoamyl_acetate_eq, so at the sim's ~1 mg/L young level the floor eats ~20% of the driving force and k_sim*(ester-eq) must be inflated to reproduce R&O's observed k_obsd*ester (test_reanchored_rate_reproduces_ramey_ough_young_wine_fade); (2) the single pinned pH. Owner chose 'match R&O's observed fade' over 'match R&O's number' (k_sim = k_obsd, ~15-25% slower than they saw). The +active amyl coelution (R&O's wine peak is isoamyl + active amyl acetate) is a minor same-ester-bond C5-acetate proxy. Process floors outputs at speculative regardless (D-1)."

# -- ACTIVATION ENERGY: warmer aging hydrolyses faster (now a measured magnitude) --------
E_a_ester_hydrolysis:
  value: 59000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 55000.0, high: 69000.0, note: "the R&O-measured isoamyl-acetate range: 59.0 kJ/mol (Pinot noir wine, r=-1.00) to 64.0 (Chardonnay wine, r=-0.997) to 69.0 (model solution); banded a little below the Pinot anchor to allow wine-to-wine spread. Q10 ~2.0 at 20 C." }
  provenance:
    source: "Ramey & Ough 1980, J. Agric. Food Chem. 28(5):928-934 — MEASURED (was author-estimate/ordering-only until D-123; see k_ester_hydrolysis for the open-PDF provenance). Table X (activation energies in WINE): isoamyl (+active amyl) acetate E_a = 14.1 kcal/mol (Pinot noir, r=-1.00) and 15.3 kcal/mol (Chardonnay, r=-0.997); Table II (model solution): 16.5 kcal/mol. 14.1 kcal/mol x 4184 = 59.0 kJ/mol. Anchored to Pinot noir, the same wine as the k_ester_hydrolysis anchor."
    conditions: "Arrhenius activation energy of isoamyl-acetate hydrolysis in a wine matrix, at T_ref = 293.15 K. Pinot noir value."
    notes: "RE-ANCHORED AT D-123 from D-69's author estimate (60000, 'only the ORDERING sourced, magnitude speculative'). The old guess already sat inside R&O's measured wine range (59-64 kJ/mol), so the value barely moved (60->59); the substance of the change is PROVENANCE — the magnitude is now a real measurement (r ~ -1.00 across model + both wines), not an estimate. Kept SPECULATIVE to preserve the aging axis's uniform speculative floor (relied on by test_tier_floored_at_speculative and the milestone-3 framing); on its own this measurement would justify PLAUSIBLE, a clean future promotion should the axis-wide floor be revisited. The warmer-is-faster DIRECTION (E_a > 0) remains the load-bearing behavioural claim — why warm cellars age wine faster and cold storage preserves fruity esters."

# -- REFERENCE pH: hydrolysis is FIRST-ORDER in [H+]; k is anchored at this pH (decision D-124) --
# EsterHydrolysis scales its rate by [H+]/[H+]_ref = 10^(pH_ref - pH), so acetate fade tracks wine
# pH (the sim solves pH in acidbase.py, D-18). At pH_ref the factor is 1.0, so k is the rate there
# and every pre-D-124 pH-3.36 trajectory is byte-for-byte unchanged (the D-123 anchor preserved).
pH_ref_ester_hydrolysis:
  value: 3.36
  unit: "pH"   # dimensionless; the wine pH k_ester_hydrolysis is anchored to
  tier: speculative
  uncertainty: { low: 3.36, high: 3.36, note: "PINNED (zero-width => never sampled by the ensemble; the runtime pins high<=low to value). It is DEGENERATE with k_ester_hydrolysis: only the product k/[H+]_ref = R&O's true second-order k_H+ (Table VI/VII, isoamyl acetate ~1.11-1.24e-4 L/mol/s) is identifiable, so a band on pH_ref would just reshuffle into k and double-count k's spread. The identifiable uncertainty lives entirely in k; pH_ref is a fixed anchor definition, not an uncertain quantity." }
  provenance:
    source: "Ramey & Ough 1980, J. Agric. Food Chem. 28(5):928-934, page 929: 'The pH was 3.36' (the Pinot noir, Oakville CA, whose k_obsd anchors k_ester_hydrolysis via Table IX). Readable as the open scanned PDF on the author's winery site (rameywine.com); the ACS copy is paywalled (D-123)."
    conditions: "the reference pH of the first-order [H+] scaling 10^(pH_ref - pH) that EsterHydrolysis applies; wine-only (beer has no pH system, D-18, so a beer state keeps the factor at 1.0 and hydrolyses at the pH_ref-anchored rate)."
    notes: "ADDED AT D-124 (the pH-explicit hydrolysis build; the natural follow-on D-123 flagged). R&O measured, in MODEL SOLUTIONS where pH was the only variable, that isoamyl-acetate hydrolysis varies DIRECTLY with [H+] in a LINEAR (first-order) manner: Table V k_obsd at pH 2.95/3.58/4.10 = 129.2/32.60/14.10 e-9 /s, fit by Table VI's graphic second-order constant k_H+ = 1.111e-4 L/mol/s at r=0.999 (and Table VII's matrix k_H+ = 1.24e-4). R&O: 'pH is far more important in determining rates of ester hydrolysis than is total acidity', 'H+ ~100x more active than tartrate', and 'in both wines the acetate esters behaved as in model solutions'. So the FORM is first-order in [H+], anchored at the Pinot reference. (The earlier reading of a sub-first-order slope from the two WINES was CONFOUNDED - Pinot vs Chardonnay differ in matrix, not just pH; R&O also states ethanol 10-14% has no effect, ruling out an ethanol attenuation.) KNOWN LIMIT (the tartrate intercept, honest): R&O's [H+] plots do NOT pass through the origin - a pH-INVARIANT tartaric/bitartrate catalysis term (Table VII k_H2T/k_HT-, ~8% of the rate at pH 3.36 rising to ~30% by pH 4.1) that this pure-[H+] law wrongly scales with [H+]. Net error vs R&O's model-solution law: the pure-[H+] law under-predicts ~-16% at 3.8, ~-31% at 4.1 (high-pH whites). BUILT AT D-125: the full k_H+[H+] + k_H2T[H2T] + k_HT-[HT-] law (Table VII constants, divided through by k_H+ into the two ratios r_h2t/r_ht below, + the tartrate speciation the sim already computes for pH) retires that high-pH under-prediction. D-125 ALSO CORRECTED this note's magnitude: reading Table VII, the tartrate NET contribution at pH 3.36 is ~-1% (NOT the +8% D-124 estimated from a crude linear-intercept proxy) — the two tartrate terms nearly cancel at reds (see r_h2t) — so the pure-[H+] law was already essentially exact for typical reds, and the real correction is entirely at high-pH whites. Kept speculative for the aging axis's uniform floor (test_tier_floored_at_speculative); on its own 3.36 is a measured value."

# -- TARTRATE CATALYSIS: the two non-[H+] catalytic species, as ratios to k_H+ (decision D-125) --
# R&O's FULL solved rate law is k_obsd = k_H+[H+] + k_H2T[H2T] + k_HT-[HT-] (Table VII, their 3x3
# matrix solve on Table V's three model-solution pH points; k_0/k_OH- explicitly dropped as
# negligible in acid). Dividing through by k_H+ leaves the two DIMENSIONLESS ratios below — the only
# identifiable new numbers, since k_H+ cancels in EsterHydrolysis's normalized factor h = N(pH,T)/
# N(pH_ref,T_ref) (the D-97 discipline: store the identifiable quantity, not a degenerate constant).
# [H2T]/[HT-] come from the sim's own tartaric speciation (neutral_fraction/bisulfite_fraction on the
# `tartaric` state slot). PAYOFF: the tartrate terms are near-null at typical red pH (~-1% at 3.36 —
# the two nearly cancel) but bitartrate (HT-) wins as pH rises off the reds, giving +16%/+31%/+40% at
# pH 3.8/4.1/4.3 — the high-pH-white correction D-124's pure-[H+] law under-predicted.
r_h2t_ester_hydrolysis:
  value: -3.266e-3
  unit: "dimensionless"   # k_H2T / k_H+ (both L mol^-1 s^-1, so the ratio is dimensionless)
  tier: speculative
  uncertainty: { low: -8.0e-3, high: 0.0, note: "NEGATIVE, and R&O say so is 'not likely' — a negative rate constant would mean undissociated tartaric acid INHIBITS hydrolysis. R&O read it as evidence 'the simplified catalytic model is not exact' (the 3x3 matrix absorbing model error into the low-pH-dominant H2T term). The PHYSICS: bitartrate (HT-) is the real catalyst (positive r_ht); the negative H2T term partially cancels it at reds (largest [H2T] at low pH) and fades toward whites, giving the ~-1% net at pH 3.36 and the clean +30% at pH 4.1. Banded to 0 at the high end (R&O's own doubt: the inhibition may be an artifact) and ~2.4x the point value at the low end (Table VII cross-ester k_H2T scatter -1.09e-7..-8.82e-7 => factor-of-several). Single-point matrix solve, no SD reported." }
  provenance:
    source: "Ramey & Ough 1980, J. Agric. Food Chem. 28(5):928-934, Table VII (isoamyl acetate row, matrix solution of second-order constants in model solutions, L mol^-1 s^-1): k_H+ = 1.24e-4, k_H2T = -4.05e-7, k_HT- = 1.78e-7. r_h2t = k_H2T/k_H+ = -4.05e-7/1.24e-4 = -3.266e-3. Open scanned PDF on the author's winery site (rameywine.com); the ACS copy is paywalled (D-123)."
    conditions: "the H2T (undissociated tartaric acid) catalysis coefficient of isoamyl-acetate hydrolysis RELATIVE to the [H+] coefficient, applied to [H2T] in mol/L from the sim's tartaric speciation; wine-only (beer has no pH system, D-18)."
    notes: "ADDED AT D-125 (the multi-species tartrate law D-124 flagged as its deferred refinement; the owner's call to build it). SHIPPED AS R&O'S EMPIRICAL VALUE, negative and all — reducing it to zero would be un-sourced tampering (the D-98 trap: invent a physically-nicer number no measurement supports). The negative sign is explained by the physics (above), not apologised for. R&O speciated with Usseglio-Tomasset 12%-ethanol dissociation constants; the sim speciates with its own aqueous pKa (3.04/4.37), a documented ~5% mismatch that the normalized ratio form washes out near the reference. The non-circular validation is the high-pH RATE RATIO, not absolute-k reproduction: measured k(4.10)/k(3.58) = 0.433, pure-[H+] predicts 0.302, this multi-species law gives ~0.41 — closing ~82% of the gap despite the pKa mismatch (test_high_ph_rate_ratio_matches_ramey_ough)."
  # r_ht is the bitartrate (HT-) catalysis coefficient — POSITIVE, the real catalyst, dominant at
  # high pH (its fraction peaks between the two tartaric pKas, ~3.7). The physics story pairs it with
  # r_h2t above: the two terms are a difference of ~10x-larger opposing contributions at reds (=> the
  # fragile ~-1% net there) and HT- wins cleanly at whites (=> the robust +30%).
r_ht_ester_hydrolysis:
  value: 1.436e-3
  unit: "dimensionless"   # k_HT- / k_H+ (both L mol^-1 s^-1, so the ratio is dimensionless)
  tier: speculative
  uncertainty: { low: 0.7e-3, high: 3.5e-3, note: "POSITIVE (bitartrate is a genuine catalyst) and the term DRIVING the high-pH-white correction. Banded ~+/-2.4x about the point value (single matrix-solve point, no SD; Table VII cross-ester k_HT- scatter 1.67e-7..8.69e-7 supports a factor-of-several). The high end steepens the white correction; the low end softens it, but the SIGN and the qualitative +30%-at-pH-4.1 result hold across the band." }
  provenance:
    source: "Ramey & Ough 1980, J. Agric. Food Chem. 28(5):928-934, Table VII (isoamyl acetate row): k_HT- = 1.78e-7, k_H+ = 1.24e-4 L mol^-1 s^-1. r_ht = k_HT-/k_H+ = 1.78e-7/1.24e-4 = 1.436e-3. Same open scanned PDF as r_h2t / D-123."
    conditions: "the HT- (bitartrate) catalysis coefficient of isoamyl-acetate hydrolysis RELATIVE to the [H+] coefficient, applied to [HT-] in mol/L from the sim's tartaric speciation; wine-only."
    notes: "ADDED AT D-125. Bitartrate is the physically-real tartrate catalyst; its fraction peaks near pH 3.7 (between tartaric pKa 3.04 and 4.37), which is why the tartrate correction grows from ~null at red pH to +30-40% at white pH. See r_h2t for the full physics + validation story."

# -- REFERENCE TARTRATE: the tartrate level the multi-species factor is normalized at (decision D-125) --
# h = N(pH, tartaric_wine) / N(pH_ref, tartaric_ref). This is R&O's model-solution tartrate (the matrix
# Table VII was solved in), and it is CLOSE to R&O's Pinot-noir wine TA (0.76 g/100mL as tartaric ~=
# 0.05 M) that k_ester_hydrolysis anchors to — so the sub-1% "k is a wine anchor but tartaric_ref is a
# model solution" inconsistency washes out. PINNED (a sourced reference definition, not an uncertain
# quantity — the identifiable uncertainty lives in the two ratios; the D-124 pH_ref precedent).
tartaric_ref_ester_hydrolysis:
  value: 7.5
  unit: "g/L"   # 0.75 g/100 mL tartaric = 7.5 g/L = ~0.05 mol/L (converted via M_TARTARIC in code)
  tier: speculative
  uncertainty: { low: 7.5, high: 7.5, note: "PINNED (zero-width => never sampled; the runtime pins high<=low to value). It is the fixed tartrate level of R&O's model solution (a sourced reference definition), at which h = 1 by construction => byte-for-byte the D-123/D-124 anchor. Sampling it would just reshuffle into the two ratios' normalization; the identifiable tartrate uncertainty lives entirely in r_h2t/r_ht." }
  provenance:
    source: "Ramey & Ough 1980, J. Agric. Food Chem. 28(5):928-934, Materials and Methods (page 929): model solutions were 'acidulated with tartaric acid to 0.75 g/100 mL' = 7.5 g/L. This is the matrix in which the Table VII second-order constants (r_h2t/r_ht) were solved, so it is the correct tartrate level to normalize the ratio factor at."
    conditions: "the reference total tartaric acid (g/L) at which EsterHydrolysis's normalized multi-species factor h(pH, tartrate) equals 1 (paired with pH_ref = 3.36); wine-only."
    notes: "ADDED AT D-125. A wine at pH_ref with tartaric != tartaric_ref is NO LONGER byte-for-byte with D-124: an UNDOSED wine (tartaric_gpl default 0) runs ~0.9% faster than this tartrate-bearing reference, which is the correct tartrate-dependence D-124 (pH-only) lacked — a small, honest supersession of D-124's 'byte-for-byte at pH 3.36 regardless of tartrate'. The beat is INERT (factor reduces to the pure-[H+] D-124 form to within that ~0.9%) unless the must doses tartaric_gpl."

# -- EQUILIBRIUM FLOOR: the residuum the pool decays TOWARD, not to zero ------------------
isoamyl_acetate_eq:
  value: 2.0e-4
  unit: "g/L"   # the lower equilibrium the isoamyl_acetate pool relaxes toward (net decay floor)
  tier: speculative
  uncertainty: { low: 5.0e-5, high: 5.0e-4, note: "the hydrolysis equilibrium level of ISOAMYL ACETATE specifically, ~0.05-0.5 mg/L — below typical young levels (~0.5-3 mg/L) so most of the banana note fades with age, a residuum remains" }
  provenance:
    source: "author estimate (UNCHANGED at D-123, when k_ester_hydrolysis/E_a_ester_hydrolysis were re-anchored to a now-readable Ramey & Ough 1980): R&O does NOT measure this floor — their 200-day storage is log-linear in log[ester] (Fig 2, r ~ -1.00), i.e. NO equilibrium was reached within the window, so a floor cannot be read off it. R&O's 'esters approach an equilibrium set by their acid+alcohol, not zero' is the stated MECHANISM (intro, Berthelot esterification equilibrium), not a measured isoamyl-acetate value. Anchored instead to ISOAMYL ACETATE's own scale: aged wines retain a fraction of their young isoamyl acetate (the classic loss-of-fruitiness with bottle age), not none of it."
    conditions: "generic wine/beer; the equilibrium of the `isoamyl_acetate` pool, in that molecule's own g/L (decision D-96)"
    notes: "RE-ANCHORED AT D-96, and the rename is the point. This was `esters_eq = 5 mg/L`, the LUMPED pool's floor 'booked as ethyl-acetate-equivalent g/L (the D-19 esters mass weighting)' — i.e. it carried the SAME ledger/lens split identity D-96 removed from the pools themselves, and its own notes called it 'the aging analogue of the D-67 fixed-lump-composition assumption'. Once EsterHydrolysis debits `isoamyl_acetate` (~0.76 mg/L in a young wine) a 5 mg/L floor sits ABOVE the entire pool, so `max(0, ester - eq)` is always 0 and the Process NEVER FIRES — D-69's whole fruity->fusel fade silently disabled, with every conservation test still green (a Process that does nothing conserves everything perfectly). Caught by `test_aging_does_not_strip_esters_below_the_equilibrium_floor`. At 0.2 mg/L the floor is ~26% of the young level, so aging strips ~74% of the banana and leaves a residuum. STILL A STAND-IN: a fixed absolute equilibrium replaces the true acid/alcohol-concentration-dependent one — but it is now a stand-in for ONE molecule's equilibrium rather than a lump's aggregate, so the composition half of the caveat is gone. Its role remains to make the decay NET (toward a floor) rather than decay-to-zero, which would over-strip (D-68). Below the floor the rate is zero (the reverse ester FORMATION half is the deferred bidirectional term)."

# ======================================================================================
# ETHYL HEXANOATE HYDROLYSIS (decision D-126, the SECOND hydrolysis Process on the ester axis).
#
# THE PROCESS (fermentation.core.kinetics.aging.EthylHexanoateHydrolysis):
#
#   d(ethyl_hexanoate)/dt = -k_ethyl_hexanoate_hydrolysis * f(T)
#                            * max(0, ethyl_hexanoate - ethyl_hexanoate_eq)
#
# Ethyl hexanoate (the APPLE/PINEAPPLE medium-chain fatty-acid ethyl ester, C8) hydrolyses on aging
# to ETHANOL + hexanoic acid, fading wine's apple/pineapple note the SAME direction the acetates fade
# (Makhotkina & Kilmartin 2012, real NZ Sauvignon blanc: 36% of the ethyl hexanoate present was lost
# over 12 months at 18 C). The released carbon (C8) splits 2:6 -> ETHANOL (C2, deposited in the core
# E slot) + hexanoic acid (C6, deposited in Byp, the succinic-acid stand-in — no dedicated hexanoic
# pool). See the EthylHexanoateHydrolysis docstring for the carbon algebra and why routing ethanol to
# E follows the OxidativeAcetaldehyde precedent (an aging Process MAY touch the total_mass{S,E,CO2}
# sub-ledger; total_mass is asserted only on byproduct-free configs where this Process is inert, so
# total_CARBON is the invariant it closes to machine precision).
#
# WHY BUILT NOW — D-126 retires D-121's "blocked on sourcing" for ethyl_hexanoate. D-121/D-123 left
# BOTH ethyl_hexanoate hydrolysis and ethyl_acetate formation blocked: R&O gave ethyl_hexanoate only
# a MODEL-solution k (its own WINE data showed no appreciable change), and ethyl_acetate is absent
# from R&O entirely. The Makhotkina & Kilmartin 2012 fetch (PMID 22868118) supplies the REAL-WINE
# ethyl-hexanoate hydrolysis kinetics R&O lacked — Table 2 pseudo-first-order k_obs at 5/10/18/28 C,
# Table 3 E_a = 68 kJ/mol / A = 4e4 /s — so the ethyl_hexanoate blocker LIFTS. ethyl_acetate
# formation STAYS BLOCKED: the paper measures NO ethyl acetate at all (Table 1 covers acetate esters
# of higher alcohols + ethyl esters of fatty/branched acids; ethyl acetate, the ethyl ester of acetic
# acid, is neither). So this fetch unblocks ONE ester's hydrolysis, NOT a whole ethyl-ester sub-axis:
# the branched-ester family that FORMS on aging (diethyl succinate / ethyl lactate / ethyl
# isovalerate, D-121) still has no pool, and ethyl_acetate formation still has no rate.
#
# FLOOR + GRAFT — house-consistent with isoamyl (D-123), the owner's D-126 choice over floor-less.
# Makhotkina's k_obs is a pure first-order DISAPPEARANCE constant (Eq 2: r = -k_obs*[ester], with NO
# equilibrium floor over the storage window), but esters approach a nonzero equilibrium, not zero
# (Makhotkina/R&O: esters "remain at a near constant equilibrium concentration depending on their
# initial, post-fermentation levels"; ethyl butanoate did NOT change over 12 months precisely because
# it was already at equilibrium). So EthylHexanoateHydrolysis decays toward ethyl_hexanoate_eq (author
# estimate, ~0.1 mg/L) and k is GRAFTED up (x1.33) so that k_sim*(ester - eq) reproduces Makhotkina's
# observed k_obs*[ester] at the sim's ~0.4 mg/L young level — exactly the D-123 floor-graft the
# isoamyl rate carries. Floor-less (eq = 0) was rejected: it would over-fade the apple note past
# ~1-2 y of aging (~85% lost at 2 y), destroying it past where the real equilibrium stops it.
#
# TIER — ALL speculative (the aging axis's uniform floor, test_tier_floored_at_speculative), and here
# an HONEST floor: Makhotkina's Arrhenius fit for THIS ester is poor (r^2 = 0.572, E_a SE = 30 on 68,
# ~44%), so while the 20 C anchor is robust (20 C sits mid-data, and the Table-2 interpolation and the
# Table-3 Arrhenius fit agree at ~1.1e-4 /h), the temperature SLOPE is weak. The DIRECTION
# (hydrolyses, warmer-faster, fades the apple note) is solid and confirmed (36% loss at 12 mo/18 C).
# NO pH FACTOR (minimal, D-126): unlike isoamyl (D-124 [H+], D-125 tartrate), ethyl hexanoate's
# pH/tartrate catalysis is DEFERRED — Makhotkina gives no per-pH ethyl-hexanoate series and R&O's
# Table VII per-ester constants are isoamyl-acetate's, not ported here (that would assume
# transferability the sources do not license). k is anchored at Makhotkina's Sauvignon-blanc wine pH.
# The pH-explicit refinement (R&O Table VII, IF it lists ethyl hexanoate/caproate) is the clean
# follow-on — the D-125 "reopens if another ester's hydrolysis is ever built" trigger, now tripped.

# -- FIRST-ORDER HYDROLYSIS RATE: ethyl hexanoate -> ethanol + hexanoic acid, toward equilibrium ----
k_ethyl_hexanoate_hydrolysis:
  value: 1.47e-4
  unit: "1/h"   # d(ethyl_hexanoate)/dt = -k_ethyl_hexanoate_hydrolysis * f(T) * max(0, ethyl_hexanoate - ethyl_hexanoate_eq)
  tier: speculative
  uncertainty: { low: 9.0e-5, high: 2.5e-4, note: "WIDE: Makhotkina's k_obs is poorly determined for this ester (Table 2 SE at 18 C is 1.35 on 2.72e-8 /s, ~50%; Table 3 r^2 = 0.572). The band spans roughly the graft (x1.33) applied to Makhotkina's k_obs range at 20 C. Half-life ln2/k ~ 4700 h (~6.5 months) at the value, T_ref, ~0.4 mg/L young level — consistent with the paper's 36% loss over 12 months at 18 C (a warmer, faster point)." }
  provenance:
    source: "Makhotkina & Kilmartin 2012, 'Hydrolysis and formation of volatile esters in New Zealand Sauvignon blanc wine', Food Chemistry 135(2012):486-493 (PMID 22868118; doi:10.1016/j.foodchem.2012.05.034). Table 2 pseudo-first-order k_obs for ETHYL HEXANOATE hydrolysis in REAL Sauvignon blanc (six 2009 wines): 0.29 / 2.49 / 2.72 / 4.71 e-8 /s at 5 / 10 / 18 / 28 C. Interpolating log(k) linearly in 1/T between 18 and 28 C to T_ref = 20 C gives ~3.05e-8 /s = 1.10e-4 /h; the Table 3 Arrhenius fit (E_a = 68 kJ/mol, A = 4e4 /s) gives 1.10e-4 /h INDEPENDENTLY — the 20 C anchor is robust even though the slope is not (r^2 = 0.572). GRAFTED x1.33 to 1.47e-4 /h (see notes)."
    conditions: "wine matrix (NZ Sauvignon blanc, ~3.0-3.5 pH — the paper does not tabulate per-wine pH), first-order in the `ethyl_hexanoate` excess over equilibrium, at T_ref = 293.15 K. NO explicit pH factor (D-126): the rate is anchored at Makhotkina's wine pH and the pH/tartrate dependence is DEFERRED (unlike isoamyl's D-124/D-125), because no per-pH ethyl-hexanoate data exist and R&O's per-ester Table VII constants are not ported."
    notes: "FLOOR-GRAFT (D-126, the isoamyl D-123 idiom): Makhotkina's k_obs is a pure disappearance constant (Eq 2, NO floor), but EthylHexanoateHydrolysis decays toward ethyl_hexanoate_eq, so at the sim's ~0.4 mg/L young level the ~0.1 mg/L floor eats ~1/4 of the driving force and k must be inflated by 0.4/(0.4-0.1) = 1.33 so k_sim*(ester - eq) reproduces the observed k_obs*[ester] (test_ethyl_hexanoate_rate_reproduces_makhotkina_young_wine_fade). Owner chose floored+grafted over floor-less eq=0 (D-126). Composite stays SPECULATIVE though k_obs is a real wine measurement: the graft, the eq floor, and the poor Arrhenius fit all ride on it; the Process floors its outputs at speculative regardless (D-1). E_a for the temperature shape is Makhotkina's compound-specific 68 kJ/mol (E_a_ethyl_hexanoate_hydrolysis)."

# -- ACTIVATION ENERGY: warmer aging hydrolyses ethyl hexanoate faster (a poorly-determined slope) --
E_a_ethyl_hexanoate_hydrolysis:
  value: 68000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 38000.0, high: 98000.0, note: "Makhotkina Table 3 gives E_a = 68 kJ/mol with SE = 30 kJ/mol (r^2 = 0.572 — the second-worst Arrhenius fit of the ten esters), so the band is the +/- 1 SE range 38-98 kJ/mol. Q10 ~2.0-2.5 at 20 C but very uncertain. Note isoamyl acetate's E_a is far better determined (R&O r ~ -1.00, 59 kJ/mol; Makhotkina's own isoamyl-acetate value is 68 kJ/mol SE 19) — 59 sits inside this band and would be a defensible better-determined proxy for the temperature SHAPE, but the compound-specific 68 is kept as what was actually measured for THIS ester." }
  provenance:
    source: "Makhotkina & Kilmartin 2012, Food Chemistry 135:486-493, Table 3: ethyl hexanoate hydrolysis in NZ Sauvignon blanc, E_a = 68 kJ/mol, SE = 30 kJ/mol, A = 4e4 /s, r^2 = 0.572. Arrhenius fit of the Table 2 k_obs over 5/10/18/28 C (Eq 3-4)."
    conditions: "Arrhenius activation energy of ethyl-hexanoate hydrolysis in a Sauvignon blanc wine matrix, at T_ref = 293.15 K. Compound-specific (this ester's own poorly-determined slope), not isoamyl-borrowed."
    notes: "The temperature SHAPE only — the 20 C rate itself is k_ethyl_hexanoate_hydrolysis (robustly anchored). Because r^2 = 0.572, the SLOPE is weak: 2-point subsets of Table 2 give E_a anywhere from ~40 (10<->28 C) to ~68 (full fit) kJ/mol. The load-bearing claim is only the DIRECTION (E_a > 0: warmer ages faster, cold storage preserves the apple note), which every subset and Makhotkina's headline agree on. Kept SPECULATIVE (aging-axis floor); the poor fit makes this an honest floor, not just a convention."

# -- EQUILIBRIUM FLOOR: the apple ester relaxes toward a nonzero equilibrium, not zero (author est.) -
ethyl_hexanoate_eq:
  value: 1.0e-4
  unit: "g/L"   # the lower equilibrium the ethyl_hexanoate pool relaxes toward (net-decay floor)
  tier: speculative
  uncertainty: { low: 3.0e-5, high: 2.5e-4, note: "the hydrolysis-equilibrium level of ethyl hexanoate, ~0.03-0.25 mg/L — below typical young levels (~0.1-1 mg/L; the sim calibrates ~0.4 mg/L) so most of the apple note fades with age, a residuum remains. ~25% of the sim's young level, mirroring isoamyl_acetate_eq's ~26%." }
  provenance:
    source: "author estimate: NEITHER Makhotkina & Kilmartin 2012 NOR Ramey & Ough 1980 measures this floor. Makhotkina's Eq 2 is pure log-linear disappearance (no equilibrium reached in the window), so a floor cannot be read off it; the 'esters approach a nonzero equilibrium set by their acid+alcohol' is the stated MECHANISM (Berthelot esterification equilibrium; ethyl butanoate's non-change over 12 months is cited AS an already-at-equilibrium ester), not a measured ethyl-hexanoate value. Anchored instead to ethyl hexanoate's own scale: aged wines retain a fraction of their young apple ester, not none of it — the same reasoning as isoamyl_acetate_eq (D-96)."
    conditions: "generic wine/beer; the equilibrium of the `ethyl_hexanoate` pool, in that molecule's own g/L. Its role is to make the decay NET (toward a floor) rather than decay-to-zero, which would over-strip the apple note (the D-68/D-126 floored-not-floorless choice)."
    notes: "AUTHOR ESTIMATE (D-126), the ethyl-hexanoate analogue of isoamyl_acetate_eq. Below the floor the rate is zero (no spurious motion; the reverse FORMATION half is not modelled). STILL A STAND-IN: a fixed absolute equilibrium replaces the true acid/alcohol-concentration-dependent one — but for ONE molecule, so no lump-composition caveat. The graft on k_ethyl_hexanoate_hydrolysis is calibrated to THIS floor at the ~0.4 mg/L young level; moving the floor moves the graft (they are jointly pinned by test_ethyl_hexanoate_rate_reproduces_makhotkina_young_wine_fade)."

# ======================================================================================
# ETHYL ACETATE esterification (decision D-127, the THIRD ester Process and the ONLY bidirectional
# one). fermentation.core.kinetics.aging.EthylAcetateEsterification:
#
#   d(ethyl_acetate)/dt = -k_ethyl_acetate_esterification * f(T) * h(pH) * (ethyl_acetate - eq)
#
# SIGNED (not max(0,...)): above eq the term FADES ethyl acetate (net hydrolysis -> ethanol + acetic
# acid), below eq it FORMS it (net esterification, ethanol + acetic acid -> ethyl acetate). Ethyl
# acetate sits ~AT its esterification equilibrium in sound wine (~10% of the acetic acid as ethyl
# ester; Shinohara 1979), so a sound wine barely moves while a high-VA / high-EtOAc wine fades toward
# eq and a low one forms toward it. It is the ONLY ester whose formation half the sim models (the
# other two defer it); the isolation-at-zero exception this creates is owner-accepted (D-127) and
# safe (total_carbon closes either sign; total_mass is asserted only on byproduct-free configs, where
# aging is disabled). f(T) is the Arrhenius warmer-faster factor; h(pH) = 10^(pH_ref - pH) the simple
# first-order [H+] acid catalysis (D-124 form, wine-only, NO tartrate law — the D-125 per-ester ratios
# are isoamyl-acetate's and are not ported, the D-126 restraint).
#
# WHY BUILT NOW / WHY SPECULATIVE ON BOTH RATE AND EQUILIBRIUM. D-121/D-126 left ethyl-acetate
# formation "blocked on sourcing": no study measures a wine-condition ethyl-acetate rate constant
# (absent from Ramey & Ough 1980's eight esters AND from Makhotkina & Kilmartin 2012). D-127 does NOT
# lift that with a measured k — it assembles a MODEL-DERIVED speculative term from open sources, and
# is tagged accordingly (both the two hydrolysis siblings anchor k to a real wine MEASUREMENT; this
# one does not, so it is the aging axis' most-speculative ester term). The sources: Shinohara, Shimizu
# & Shimazu 1979 (Agric. Biol. Chem. 43(11):2351-2358 — the equilibrium POSITION and the approach
# TIME), Berthelot & Pean de Saint-Gilles 1862-63 (Ke ~ 4, corroborating the ceiling), and Ramey &
# Ough 1980 (the MEASURED acetate-cluster k_H+, a consistent lower bound on the relaxation rate).
# Rayne & Forest 2016 lists ethyl acetate by name but its CALCULATED constants run 6-18x off R&O's
# MEASURED ones, so its absolute number is NOT used — only its confirmation that EtOAc is a
# hydrolysable acetate ester at wine pH, and its ethanol-insensitivity result (which, citing R&O's own
# model-wine-vs-real comparison, justifies porting these model-solution numbers to real wine).
# ALL speculative — the aging axis is the Tier-3 frontier and here the rate and equilibrium are both
# order-of-magnitude estimates; the Process floors its outputs at speculative regardless (D-1).

# -- RELAXATION RATE toward the ethyl-acetate esterification equilibrium (first-order, signed) -------
k_ethyl_acetate_esterification:
  value: 1.0e-3
  unit: "1/h"   # d(ethyl_acetate)/dt = -k_ethyl_acetate_esterification * f(T) * h(pH) * (ethyl_acetate - eq)
  tier: speculative
  uncertainty: { low: 4.6e-4, high: 1.4e-3, note: "WIDE (no measured k exists). The band is Shinohara's ~3-month-to-equilibrium approach at 20 C read as 1 time-constant (k = 1/2190 h = 4.6e-4 /h) to ~3 time-constants / 95% (k = 3/2190 h = 1.37e-3 /h). Ramey & Ough 1980's MEASURED acetate-cluster k_H+ (~1.1-1.5e-4 L/mol/s) gives the HYDROLYSIS component ~2.7e-4 /h at pH 3.3 — below the band, consistent (the relaxation constant this form needs is k_hydrolysis + k_esterification, so it must exceed the hydrolysis component alone). Half-life ln2/k ~ 700 h (~1 month) at the value and pH_ref — the timescale over which a high-EtOAc wine's excess relaxes toward equilibrium." }
  provenance:
    source: "MODEL-DERIVED author estimate (no wine-condition ethyl-acetate rate constant is published — absent from Ramey & Ough 1980's eight esters and from Makhotkina & Kilmartin 2012). Anchored to Shinohara, Shimizu & Shimazu 1979, Agric. Biol. Chem. 43(11):2351-2358, Fig. 2: ethyl acetate 'reached the maximum level after three months' at room temperature (20 +/- 5 C) in a 14% ethanol model solution — a first-order approach to equilibrium with k ~1e-3 /h. Cross-checked against Ramey & Ough 1980, J. Agric. Food Chem. 28(5):928-934, Table VI/VII acetate-cluster k_H+ (isoamyl/isobutyl/hexyl/2-phenylethyl acetate, sharing ethyl acetate's acetyl bond), ~1.1-1.5e-4 L/mol/s -> ~2.7e-4 /h hydrolysis component at pH 3.3, a consistent lower bound."
    conditions: "wine matrix, the relaxation rate AT THE REFERENCE pH 3.3 (Shinohara's table-wine / model-solution pH); signed first-order in the (ethyl_acetate - eq) gap AND first-order in [H+] via the 10^(pH_ref - pH) factor, at T_ref = 293.15 K. Shinohara: 30 C is 2-3x room temp and 5 C is <1/10, a steep temperature dependence CARRIED by f(T) (see E_a). k is thus the value at pH_ref; off-reference wines scale by [H+]/[H+]_ref."
    notes: "D-127. This is a RELAXATION constant (k_hydrolysis + k_esterification), which is what the signed toward-equilibrium form needs — NOT a one-directional disappearance constant, so unlike the two hydrolysis siblings there is NO floor-graft (the relaxation-to-a-fixed-floor form is self-limiting by construction). SPECULATIVE: no measured wine k exists; Shinohara gives an approach TIME (not a fitted rate) and Rayne 2016's calculated ethyl-acetate k_A runs 6-18x off R&O's measured acetate values so it is not usable as an absolute. Process floors outputs at speculative regardless (D-1)."

# -- ACTIVATION ENERGY: warmer relaxes ethyl acetate toward equilibrium faster ---------------------
E_a_ethyl_acetate_esterification:
  value: 75000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 50000.0, high: 100000.0, note: "Shinohara 1979: the ethyl-ester relaxation is ~2-3x faster at 30 C than at 20 C (Q10 ~2-3 => E_a ~50-75 kJ/mol) and <1/10 as fast at 5 C than at 20 C (a factor >10 over 15 C => Q10 ~4-5 => E_a ~90-110 kJ/mol) — a NON-Arrhenius steepening at low temperature, so the band 50-100 kJ/mol spans the two regimes. Consistent with the measured ester Arrhenius energies (Ramey & Ough 1980 isoamyl acetate 59 kJ/mol; Makhotkina 2012 ethyl hexanoate 68 kJ/mol), which sit inside it." }
  provenance:
    source: "MODEL-DERIVED author estimate from Shinohara, Shimizu & Shimazu 1979, Agric. Biol. Chem. 43(11):2351-2358 (p2355-2357): the speed of ethyl-ester formation/approach-to-equilibrium is ~2-3x faster at 30 C than at room temperature and <1/10 as fast at 5 C. Reading those two ratios as Q10 gives E_a ~50-110 kJ/mol; the value 75 kJ/mol is the mid of the high-temperature (20-30 C) regime, near the measured ester activation energies (R&O 1980 59 kJ/mol; Makhotkina 2012 68 kJ/mol)."
    conditions: "Arrhenius activation energy of the ethyl-acetate esterification/hydrolysis relaxation in a wine matrix, at T_ref = 293.15 K. The temperature SHAPE only — the 20 C rate itself is k_ethyl_acetate_esterification."
    notes: "D-127. The load-bearing claim is the DIRECTION (E_a > 0: warm cellars relax EtOAc toward equilibrium faster, cold storage holds it — Shinohara's explicit low-temperature-preservation recommendation). SPECULATIVE (aging-axis floor); the non-Arrhenius steepening at low temperature makes a single E_a an honest floor, not a precise slope."

# -- EQUILIBRIUM: the level ethyl acetate relaxes toward from EITHER side (~10% of acetic; author est.)
ethyl_acetate_eq:
  value: 0.051
  unit: "g/L"   # the esterification equilibrium the ethyl_acetate pool relaxes toward (signed, both sides)
  tier: speculative
  uncertainty: { low: 0.035, high: 0.084, note: "Shinohara's acetic E-rate spans ~6.8-16.4% in table wines (avg ~8-10%); at a representative sound-wine acetic ~0.35 g/L that is ethyl acetate ~35-84 mg/L (0.035-0.084 g/L). The value 51 mg/L is ~10% E-rate at 0.35 g/L acetic — right at the sim's calibrated ~50 mg/L young level, so a SOUND wine sits ~at equilibrium and barely moves, while a high-VA wine (>~60 mg/L) fades toward it and a low one forms toward it. Unlike isoamyl_acetate_eq / ethyl_hexanoate_eq (floors ~25% of the young level, esters far ABOVE equilibrium), EtOAc's eq is ~AT the young level because it is NOT far from equilibrium young." }
  provenance:
    source: "MODEL-DERIVED author estimate. Shinohara, Shimizu & Shimazu 1979, Agric. Biol. Chem. 43(11):2351-2358, Tables I-IV: the acetic-acid esterification rate (E-rate = acetic-as-ethyl-ester / total acetic) averages ~8-10% in table wine (12% EtOH, pH 3.3) — i.e. ~10% of the acetic acid sits as ethyl acetate at equilibrium. At a representative sound-wine acetic ~0.35 g/L: acetic-as-ester = 0.10 * 0.35 = 0.035 g/L, as ethyl acetate = 0.035 * (88.1/60.05) = 0.051 g/L. Berthelot & Pean de Saint-Gilles 1862-63 Ke ~ 4 corroborates the ~10-14% esterified ceiling; the two agree."
    conditions: "generic wine/beer; the esterification equilibrium of the `ethyl_acetate` pool in that molecule's own g/L. Its role is to make the relaxation SIGNED (toward a floor from either side) — this is the one ester the sim lets FORM as well as fade."
    notes: "D-127, FIXED-ABSOLUTE STAND-IN (owner call): the true equilibrium tracks the acetic-acid AND ethanol concentrations (Berthelot Ke = [ester][water]/([acid][alcohol])), but the sim has no clean acetic pool (acetic lives in the Byp succinic stand-in, D-16), so a concentration-coupled eq would be a stand-in on a stand-in; a fixed target sidesteps that. The consequence is deliberate and correct physics: a sound wine (~50 mg/L, ~at this eq) barely moves — EtOAc is roughly stable in sound aged wine — while the term acts mainly on high-VA / high-EtOAc wines (fading them toward equilibrium, the EtOAc DECREASE Shinohara observed in stored wine, p2357). The total EtOAc formed/faded is bounded by the (eq - pool) gap, so the acetic drawn from / added to Byp stays negligible vs the pool."

# -- REFERENCE pH the relaxation rate is anchored to (the [H+] acid-catalysis factor's pivot) -------
pH_ref_ethyl_acetate_esterification:
  value: 3.3
  unit: "pH"   # dimensionless; the wine pH k_ethyl_acetate_esterification is anchored to
  tier: speculative
  uncertainty: { low: 3.3, high: 3.3, note: "PINNED (zero-width => never sampled by the ensemble; the runtime pins high<=low to value). DEGENERATE with k_ethyl_acetate_esterification: only the product k/[H+]_ref is identifiable, so a band on pH_ref would just reshuffle into k (the pH_ref_ester_hydrolysis convention). The identifiable uncertainty lives entirely in k; pH_ref is a fixed anchor definition." }
  provenance:
    source: "Shinohara, Shimizu & Shimazu 1979, Agric. Biol. Chem. 43(11):2351-2358: the table wines whose ~8-10% acetic E-rate anchors ethyl_acetate_eq, and the 14% ethanol model solution whose ~3-month approach anchors k_ethyl_acetate_esterification, are both at pH ~3.3 (p2353-2354). The [H+] acid-catalysis FORM is Ramey & Ough 1980's (acetate esters hydrolyse first-order in [H+]); pH_ref is the pH at which k is quoted."
    conditions: "the reference wine pH at which k_ethyl_acetate_esterification is the relaxation rate; off-reference wines scale by 10^(pH_ref - pH) (D-124 form). Wine-only — beer holds h = 1 (no pH system, D-18)."
    notes: "D-127. Anchored at Shinohara's ~3.3, close to isoamyl's pH_ref_ester_hydrolysis 3.36 (R&O's Pinot). The tartrate refinement (D-125) is NOT applied — the per-ester tartrate ratios are isoamyl-acetate's and are not ported (the D-126 restraint), so this is the pure first-order [H+] factor only."

# ======================================================================================
# OXIDATIVE aging (decision D-71, the first §4.1 OXIDATIVE aging Process). The head of the
# dissolved-O2 sub-axis.
#
# THE PROCESS (fermentation.core.kinetics.aging.OxidativeAcetaldehyde):
#
#   d(o2)/dt          = -k_ethanol_oxidation * f(T) * [o2]           # O2-limited, Arrhenius
#   d(acetaldehyde)/dt = +y_acetaldehyde_per_o2 * (r_o2 / M_O2) * M_acetaldehyde
#   d(E)/dt           = -d(acetaldehyde)/dt * M_ethanol / M_acetaldehyde   # carbon-exact C2 borrow
#
# As a finished wine/beer takes up oxygen (bottle ingress, micro-oxygenation, barrel), O2 oxidises
# ethanol to ACETALDEHYDE — the 'sherry'/bruised-apple/nutty OXIDISED note the D-67 OAV lens already
# reads (the same acetaldehyde pool the D-27 buffer fills, 'green apple' fresh vs 'oxidised' when it
# climbs). So — like ester hydrolysis — this moves an OAV the lens already reads and needs no new
# aroma pool; the one new slot is the ``o2`` SUBSTRATE (dosed by add_oxygen).
#
# WHY FIRST-ORDER IN O2, NOT ETHANOL (the D-71 crux). Ethanol sits at ~100 g/L, essentially
# constant across aging, so a rate first-order in ethanol is a constant rate in disguise —
# acetaldehyde would rise LINEARLY and UNBOUNDED, pinning the kinetic limit on the wrong species.
# O2 is the rate-limiting reactant, so a rate first-order in the FINITE o2 pool gives the correct
# SATURATING behaviour (acetaldehyde plateaus as the O2 charge is spent — the bottle-aging reality).
# Mechanistically the real path is COUPLED oxidation (O2 -> quinone + H2O2 via o-diphenols; H2O2 +
# ethanol -> acetaldehyde; Wildenradt & Singleton 1974) — the phenolic catalyst is folded into
# k_ethanol_oxidation in v1 (a documented lump; no general phenol pool is tracked).
#
# SHARES, NOT THE WHOLE FLUX (the D-73 rework, spent by D-74). Each O2 consumer draws its OWN share
# of the shared o2 pool via its own rate constant; ProcessSet SUMS them, so the pool depletes ONCE
# and the O2 splits among the sinks by k_i / sum(k) (the pattern SulfiteOxidation established at
# D-72). So k_ethanol_oxidation is the ETHANOL-OXIDATION SHARE of the total O2-depletion rate, NOT
# the total (D-71 originally framed it as the total — D-73 supersedes that; see the
# k_ethanol_oxidation and y_acetaldehyde_per_o2 entries below). y_acetaldehyde_per_o2 is then the
# TRUE per-O2 stoichiometric yield of the ethanol route ALONE — the sink competition lives in the
# k's, NOT in a sub-unity yield. D-74: PhenolicBrowning is now a co-resident always-on sink, and the
# DOMINANT one (phenol autoxidation is the primary O2 consumer; ethanol oxidation is the secondary
# H2O2 fate) — so k_ethanol_oxidation was REDUCED 5.0e-4 -> 2.0e-4 and k_browning_base (3.0e-4) takes the
# larger share, with k_ethanol + k_browning_base = 5.0e-4 holding the calibrated total O2-depletion rate.
#
# LEDGER. o2 is CARBON-FREE and off every conservation ledger (total_carbon/total_mass/
# total_nitrogen weight only their named pools) — like h2s/iso_alpha. The carbon that DOES move
# (E -> acetaldehyde) is borrowed carbon-exactly (C2 -> C2, the D-27 reduction reversed), so
# total_carbon closes to machine precision. MASS carries the standing E<->acetaldehyde gap (the D-27
# seam), scoped out because total_mass ({S,E,CO2}) is never asserted on an aging run.
#
# TIER. ALL speculative — the oxidation FORM (O2-limited, warmer-faster) is sourced, but every
# magnitude is an order-of-magnitude estimate and the aging axis is the Tier-3 frontier.

# -- ETHANOL-OXIDATION SHARE OF THE O2-DEPLETION RATE (first-order in o2, O2-limited) -----
# D-73: this is the ETHANOL-OXIDATION SHARE of the total O2-depletion rate, NOT the total (D-71
# framed it as the total; D-73 supersedes that). Each always-on O2 sink owns its own first-order-in-
# o2 rate; ProcessSet sums them, so the pool depletes once and O2 splits by k_i/sum(k). The empirical
# TOTAL O2-scavenging timescale (weeks-to-months) is the ANCHOR the shares partition. D-74: phenolic
# browning is now a co-resident always-on sink, and the DOMINANT one, so this value was REDUCED
# 5.0e-4 -> 2.0e-4 and k_browning_base (3.0e-4) takes the larger share, with k_ethanol_oxidation +
# k_browning_base = 5.0e-4 HOLDING that total (the anchor, and the O2-depletion timescale, unchanged).
# The two shares carry the SAME E_a (same coupled-oxidation cascade — see E_a_browning), so their
# sum is exactly 5.0e-4 * f(T) at every temperature, not just at T_ref. Substrate-gated sinks (SO2,
# D-72) add on top without touching this, since they are zero without their substrate. A further
# Strecker sink was FORECAST here to "reduce this share again (its k joining the 5.0e-4 sum)", but
# D-75 SUPERSEDES that: StreckerDegradation is SUBSTRATE-GATED (on amino_acids) and wine-only, so it
# adds ON TOP without re-baselining the anchor (the SulfiteOxidation rule), and this value is
# UNCHANGED. See the STRECKER DEGRADATION section below and decision D-75.
k_ethanol_oxidation:
  value: 2.0e-4
  unit: "1/h"   # d(o2)/dt = -k_ethanol_oxidation * f(T) * [o2]  (ethanol route's share of O2 depletion)
  tier: speculative
  uncertainty: { low: 4.0e-5, high: 8.0e-4, note: "ethanol-oxidation share of the first-order O2-consumption rate at T_ref = 20 C, ~40% of the 5.0e-4 always-on total (browning takes the dominant ~60%, k_browning_base). Banded ~0.2-0.6x the total (the ethanol:browning split is uncertain — see k_browning_base); the SUM k_ethanol_oxidation + k_browning_base = 5.0e-4 => the total O2 half-life ln2/k ~ 350-7000 h (~2 weeks to ~10 months) for the dissolved-O2 charge is preserved (wine scavenges a saturating O2 dose over weeks-to-months at cellar temperature). D-74 reduced this from 5.0e-4 (the D-73 sole-always-on-sink value) as browning claimed its share." }
  provenance:
    source: "author estimate anchored to the timescale over which dissolved oxygen is consumed in stored wine (Singleton 1987, oxidation of wines; Wildenradt & Singleton 1974, 'The production of aldehydes as a result of oxidation of polyphenolic compounds and its relation to wine aging'). A saturating O2 charge is scavenged over weeks-to-months at cellar temperature; the TOTAL pseudo-first-order O2-depletion constant is ~5.0e-4/h, of which this is the ethanol-oxidation SHARE (~40%) and k_browning_base the dominant browning share (~60%), folding the o-diphenol/Fe catalyst concentration into the k's (no general phenol pool tracked in v1)."
    conditions: "generic wine/beer at cellar pH/temperature; pseudo-first-order in the dissolved-o2 pool at T_ref = 293.15 K, the ethanol route's share of the total depletion (k_ethanol_oxidation + k_browning_base = 5.0e-4). The catalytic phenol/metal chemistry is lumped into this constant; the per-O2 acetaldehyde yield of the route is y_acetaldehyde_per_o2."
    notes: "SOURCED FORM (O2-limited, first-order in the finite O2 pool => SATURATING acetaldehyde, not the unbounded ethanol-first alternative — the D-71 design crux) + SPECULATIVE magnitude (order-of-magnitude, banded to the weeks-to-months O2-scavenging timescale). The load-bearing sourced claims are (1) O2 is the rate-limiter, (2) warmer oxidises faster (E_a_ethanol_oxidation), and (3) ethanol oxidation is the SECONDARY O2 fate behind phenol autoxidation (=> this is the SMALLER share; k_browning_base the larger). D-74: reduced 5.0e-4 -> 2.0e-4 as the always-on PhenolicBrowning claimed the dominant share; the sum with k_browning_base holds the total depletion rate (the anchor)."

# -- ACTIVATION ENERGY: warmer aging oxidises faster (sourced ordering) -------------------
E_a_ethanol_oxidation:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Wine oxidation/browning activation energies ~30-70 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster oxidation, faster acetaldehyde accumulation and browning); the magnitude is speculative and banded." }
  provenance:
    source: "SOURCED ORDERING: wine oxidation and oxidative browning accelerate with temperature (textbook Arrhenius; measured browning/oxidation activation energies ~30-70 kJ/mol, e.g. Singleton 1987; the coupled-oxidation cascade is temperature-driven). Warm storage oxidises wine faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2-consumption / ethanol-oxidation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster) is the sourced, load-bearing claim — why warm/hot storage oxidises (maderises) wine faster and cold cellars slow it. Exact magnitude speculative and banded around a Q10 ~2, deliberately a touch below the ester-hydrolysis E_a (oxidation's temperature sensitivity is broadly comparable-to-slightly-lower)."

# -- ACETALDEHYDE YIELD: mol acetaldehyde per mol O2 consumed BY THE ETHANOL ROUTE --------
# D-73: this is the TRUE per-O2 stoichiometric yield of the ethanol-oxidation route ALONE, NOT a
# sub-unity fudge for competing sinks. The sink competition lives in the rate constants (each sink
# draws its own O2 share via its own k; ProcessSet sums), so this yield is the ethanol route's OWN
# conversion of the O2 it consumes — free to sit near the coupled-oxidation mechanistic yield.
# Re-baselined 1.0 -> 1.5 (D-73). D-74: the always-on PhenolicBrowning sink is now built and takes
# the DOMINANT O2 share (k_browning_base > k_ethanol_oxidation), so the "interim upper estimate" caveat is
# RESOLVED — the ethanol route now gets only its ~40% share of a consumed O2 charge, so cumulative
# aged acetaldehyde partitioned DOWN to ~0.4x the D-73 sole-sink value (this yield UNCHANGED at 1.5;
# the partition moved via the k's, exactly as the shares design intends).
y_acetaldehyde_per_o2:
  value: 1.5
  unit: "mol/mol"   # acetaldehyde produced per O2 consumed by the ethanol-oxidation route (true yield)
  tier: speculative
  uncertainty: { low: 1.0, high: 2.0, note: "coupled oxidation yields ~1-2 mol acetaldehyde per mol O2. The H2O2 arm (1 O2 -> 1 H2O2 -> 1 acetaldehyde) reliably gives ~1; the theoretical ceiling of 2 needs FULL coupling (O2's four-electron reduction O2->H2O2->H2O driving two 2-electron ethanol oxidations, the o-quinone re-oxidising a second ethanol). In real wine that ceiling is not reached — the quinone is usually reduced by OTHER diphenols/sulfite rather than ethanol, and H2O2 partitions to non-ethanol fates — so realised yield sits NEARER 1. Central 1.5 is a mid-band estimate, not the best case. Now that competing O2 sinks are EXPLICIT siblings (each with its own k), this is the ethanol route's OWN yield, not shaded down for them (D-73). Sanity (D-74, with the always-on browning sink built): of a ~40 mg/L (~0.04 g/L) cumulative O2 exposure the ethanol route takes ~40% (~16 mg/L O2; browning the dominant ~60%), x 1.5 => ~33 mg/L acetaldehyde (fresh wine ~10-40, moderately oxidised ~100-300 mg/L) — a modest oxidative note, with the balance of the O2 going to visible browning (A420). Pre-D-74 (ethanol the sole always-on sink) the same exposure gave ~82 mg/L; browning partitioned it down." }
  provenance:
    source: "author estimate from the coupled-oxidation stoichiometry (Wildenradt & Singleton 1974: polyphenol oxidation by O2 generates H2O2, which oxidises ethanol to acetaldehyde). Per O2, the H2O2 arm gives ~1 acetaldehyde reliably; up to ~2 is possible only if the catalytic o-diphenol/o-quinone couple carries a fully-coupled second oxidation, which real wine approaches but does not reach (competing quinone reductants and H2O2 fates). Central 1.5 is the mid-band estimate for the ETHANOL ROUTE ALONE — above the reliable ~1, below the ~2 best case."
    conditions: "mol acetaldehyde per mol O2 consumed by the ethanol-oxidation route, generic wine/beer; the route's true per-O2 yield at T_ref = 293.15 K. Competing O2 sinks (o-diphenol browning, Strecker degradation, direct SO2 oxidation) draw their OWN O2 share via their own rate constants (SO2, D-72; browning/Strecker to come, D-73), NOT out of this yield."
    notes: "SPECULATIVE magnitude. D-73 re-baseline 1.0 -> 1.5: the old 1.0 was the sub-unity 'leave headroom for unmodeled sinks' framing, which was muddled — cutting the yield never freed O2 for other sinks (the O2 partition lives in the k's, not here). With competition moved to explicit sibling rate constants this is the ethanol route's genuine yield (mid-to-upper coupled-oxidation band). D-74: the D-73 interim caveat is RESOLVED — the always-on PhenolicBrowning sink now diverts the dominant O2 share (k_browning_base > k_ethanol_oxidation), so ethanol oxidation gets only its ~40% share and aged-with-O2 acetaldehyde partitioned down to ~0.4x the sole-sink estimate (this yield unchanged; the k's moved). The acetaldehyde it produces still binds any dosed SO2 via the D-47 equilibrium for free (SO2 mops up oxidative acetaldehyde — handled by the existing readout)."

# ======================================================================================
# SULFITE OXIDATION (decision D-72, the FIRST oxidative sub-axis sink to claim its share of the
# shared o2 budget opened at D-71). The head of the "SO2 protects until exhausted" threshold.
#
# THE PROCESS (fermentation.core.kinetics.aging.SulfiteOxidation, WINE-ONLY):
#
#   d(o2)/dt        = -k_so2_oxidation * f(T) * [o2] * [HSO3-]        # BILINEAR, Arrhenius
#   d(so2_total)/dt = -2 * (r_o2 / M_O2) * M_SO2                      # 2 mol SO2 per mol O2
#
# where [HSO3-] is the FREE-bisulfite driver (free_SO2 * bisulfite_fraction(pH); acidbase.
# bisulfite_so2_at_ph). SO2 is wine's antioxidant because bisulfite scavenges O2 FASTER than
# ethanol does: competing for the SAME o2 pool (ProcessSet summing, not a new mechanism), the O2 is
# preferentially spent oxidising bisulfite -> sulfate rather than ethanol, so WHILE FREE SO2 LASTS
# oxidative acetaldehyde is suppressed and ONCE IT IS EXHAUSTED acetaldehyde climbs (the celebrated
# threshold, emergent). No new pool: it decrements the existing so2_total slot.
#
# WHY BISULFITE, NOT MOLECULAR SO2 (the D-72 crux). Molecular SO2.H2O is the reactive ANTIMICROBIAL
# form (D-22); the HSO3- anion is the reactive ANTIOXIDANT nucleophile (reduces o-quinones, scavenges
# H2O2 — Danilewicz; acidbase.bisulfite_fraction already names HSO3- "the reactive nucleophile"). At
# wine pH bisulfite is ~0.94-0.99 of free, so the pH-coupling is mild — but a STRONGER coupling
# enters through FREE SO2: as the sibling OxidativeAcetaldehyde makes acetaldehyde, that acetaldehyde
# binds SO2 (D-47), free SO2 falls, and this scavenging self-throttles (the emergent feedback the
# bilinear form buys over a plain SO2-presence gate).
#
# STOICHIOMETRY is a CODE constant, not a parameter (aging.py _SO2_PER_O2 = 2): the Danilewicz
# coupled oxidation spends one bisulfite reducing the o-quinone and one scavenging the H2O2 per O2,
# = 2 mol SO2 : 1 mol O2 = the classic "~4 mg SO2 per mg O2" mass rule. Distinct from D-47 BINDING
# (reversible free<->bound repartition of so2_total): this OXIDISES SO2 to sulfate and removes it,
# so the two do not double-count.
#
# LEDGER. Both o2 (D-71) and so2_total (D-22/D-28) are carbon-free and off every conservation ledger
# (there is no sulfur ledger), so oxidising SO2 to untracked sulfate moves nothing conserved — no
# carbon/mass/nitrogen term, nothing asserted. WINE-ONLY (so2_total + the acid-pH slots are wine-only,
# D-18; wired into the wine medium only, like MLF/Brett), and disabled at compile until begin_aging.
#
# TIER. ALL speculative — the oxidation FORM (O2-limited, bisulfite-driven, warmer-faster, 2:1) is
# sourced, but the rate MAGNITUDE is an order-of-magnitude estimate and the aging axis is the Tier-3
# frontier. The load-bearing SOURCED claims are (1) bisulfite scavenges O2 faster than ethanol (=>
# SO2 protective), (2) the 2:1 stoichiometry, (3) warmer oxidises faster (E_a_so2_oxidation > 0).

# -- BILINEAR O2xBISULFITE SCAVENGING RATE: SO2 out-competes ethanol for O2 ---------------
k_so2_oxidation:
  value: 0.2
  unit: "L/(g*h)"   # d(o2)/dt = -k_so2_oxidation * f(T) * [o2] * [HSO3-]  (bilinear, both g/L)
  tier: speculative
  uncertainty: { low: 0.05, high: 2.0, note: "bimolecular O2xbisulfite rate constant at T_ref = 20 C. The LOAD-BEARING claim is the ORDERING, not the magnitude: at cellar free SO2 (~20-40 mg/L => [HSO3-] ~0.02-0.04 g/L) the pseudo-first-order O2 rate k_so2_oxidation*[HSO3-] ~ 0.004-0.008 /h is ~8-16x the COMBINED always-on O2-depletion rate (k_ethanol_oxidation + k_browning_base = 5e-4 /h; D-74), so SO2 wins the great majority of the O2 while present. As SO2 depletes the route slows and the always-on sinks (ethanol oxidation + browning) take over — the threshold. Absolute O2-scavenging speed banded loosely (real sulfite autoxidation is metal/o-diphenol-catalysed, days-to-weeks); the threshold is set by STOICHIOMETRY (2:1, mass-limited), robust to this magnitude." }
  provenance:
    source: "author estimate anchored to the ORDERING that free bisulfite is a faster O2 scavenger than ethanol in wine (Danilewicz 2003/2007, oxygen-reduction mechanism; Boulton et al. 1996, Principles and Practices of Winemaking — SO2 protects wine by intercepting the O2/H2O2/quinone oxidation cascade). The bimolecular constant folds the metal/o-diphenol catalysis into k (no explicit catalyst pool tracked in v1, as with k_ethanol_oxidation)."
    conditions: "generic wine at cellar pH/temperature; bilinear in the dissolved-o2 pool and the free-bisulfite driver (free_SO2 * bisulfite_fraction(pH)) at T_ref = 293.15 K."
    notes: "SOURCED FORM (bilinear O2xbisulfite, bisulfite out-competing ethanol for O2 => SO2 protective while present, acetaldehyde suppressed then climbing — the D-72 threshold) + SPECULATIVE magnitude. The mass-limited 2:1 stoichiometry (_SO2_PER_O2, code constant) — not this rate — sets HOW MUCH O2 a given SO2 charge neutralises (~1 mg O2 per ~4 mg SO2); this rate only sets how sharply SO2 wins the competition."

# -- ACTIVATION ENERGY: warmer aging oxidises SO2 faster (sourced ordering) ---------------
E_a_so2_oxidation:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Sulfite autoxidation / wine oxidation activation energies ~30-70 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster SO2 loss to oxidation, so warm storage burns through the protective SO2 faster); the magnitude is speculative and banded. Its OWN parameter (not reused from E_a_ethanol_oxidation) per prime directive #2: sulfite autoxidation is a distinct reaction from ethanol oxidation, so its temperature dependence gets its own provenance entry even though the two bands coincide." }
  provenance:
    source: "SOURCED ORDERING: sulfite autoxidation and the coupled wine-oxidation cascade accelerate with temperature (textbook Arrhenius; wine oxidation activation energies ~30-70 kJ/mol, Danilewicz 2003; Boulton et al. 1996). Warm storage consumes protective SO2 faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2xbisulfite scavenging at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster SO2 oxidation) is the sourced, load-bearing claim. Exact magnitude speculative and banded around a Q10 ~2, mirroring E_a_ethanol_oxidation (the two oxidation reactions have comparable temperature sensitivity), but kept a SEPARATE parameter — distinct reaction, distinct provenance (prime directive #2)."

# ======================================================================================
# PHENOLIC BROWNING (decision D-74, the FIRST *always-on* sink on the shared o2 budget opened at
# D-71 and reworked for always-on sinks at D-73; the rate made PHENOLIC-DRIVEN at D-132). The
# oxidative-browning axis: aged wine goes brown.
#
# THE PROCESS (fermentation.core.kinetics.aging.PhenolicBrowning, MEDIUM-AGNOSTIC):
#
#   k_browning_eff = k_browning_base + k_browning_phenolic * ([tannin] + [anthocyanin])  # D-132
#   d(o2)/dt   = -k_browning_eff * f(T) * [o2]             # first-order in o2, O2-limited, Arrhenius
#   d(A420)/dt = +y_a420_per_o2 * (r_o2 / M_O2)            # optical browning index accumulates
#
# As a finished wine/beer takes up oxygen, dissolved O2 oxidises PHENOLICS (o-diphenols -> o-quinones,
# polymerising to brown melanoidin/quinone pigment) -- the gold->amber->brown of an aged/maderised
# white wine and the oxidative darkening of stale beer. This is the DOMINANT O2 consumer in wine
# oxidation (phenol autoxidation is the primary O2 sink; ethanol oxidation to acetaldehyde is a
# SECONDARY H2O2 fate), so k_browning_eff is the LARGER share of the shared o2 budget and browning
# DIVERTS most of the always-on O2 away from ethanol oxidation, SUPPRESSING oxidative acetaldehyde --
# the always-on analogue of SO2's protection (D-72), but permanent (a co-resident sink, not spent).
#
# D-132: THE RATE IS NOW PHENOLIC-DRIVEN (Marrufo-Curtido, Ferreira & Escudero 2015, J. Agric. Food
# Chem. -- 15 real red wines, repeated O2-saturation cycles). Ferreira measured red-wine O2 uptake at
# 0.5-0.7 mg/L/day (most wines, between-wine spread < 2.2x) -- the PREVIOUS medium-agnostic k_browning
# (3.0e-4 /h) under-predicted this ~6-8x (a ~40 mg/L charge would take years, not the observed
# ~10 days-to-months). Ferreira's own WITHIN-CYCLE diagnostic (Ln[O2] vs time, the standard
# first-order test) shows the bulk of a saturation cycle IS locally first-order -- the "cumulative
# uptake looks linear (R^2>0.989)" headline is a CROSS-CYCLE re-saturation artifact (5 same-start-
# point checkpoints, not an instantaneous-rate test), so first-order-in-o2 is RE-CONFIRMED, not
# replaced by zero-order or Michaelis-Menten (no Km needed). Rather than a global rate hike -- which
# would ALSO speed up white/beer browning, for which no comparable acceleration is evidenced -- the
# fix ADDS a phenolic-driven boost on top of the unchanged medium-agnostic baseline:
# k_browning_eff = k_browning_base + k_browning_phenolic * ([tannin] + [anthocyanin]). A white/beer
# run (grape tannin/anthocyanin = 0, untracked pools) stays at k_browning_base -- BYTE-FOR-BYTE the
# pre-D-132 rate -- while a red wine's grape phenolic load lifts k_browning_eff toward Ferreira's
# measured range. This is ADDITIVE, never pure proportionality (k_browning_phenolic * phenolics ALONE,
# with no baseline): a white/beer wine has essentially no tracked phenolics, and browning them to zero
# would contradict the A420 docstring's own gold->amber->brown / beer-staling-darkens claims -- whites
# and beer brown too, via phenolics this model does NOT speciate (flavanols/hydroxycinnamates), so the
# baseline stands in for that untracked chemistry.
#
# THE NEW OBSERVABLE IS AN OPTICAL INDEX, NOT AN AROMA OR A MASS (the D-74 crux). Unlike the other
# three aging Processes, browning moves NO pool the D-67 OAV lens already reads (its product is brown
# pigment -- seen, not smelled), so it needs ONE new observable: A420, the ABSORBANCE at 420 nm
# (dimensionless AU, 1 cm path -- the standard analytical browning measure), NOT a pigment mass. A420
# is a STATE SLOT (the iso_alpha off-ledger-pool pattern), NOT a post-hoc readout like the D-67 OAV
# series: browning pigment is CUMULATIVE and IRREVERSIBLE and its O2 flux is DYNAMIC (SO2 competes,
# temperature varies), so it must be INTEGRATED along the run -- it cannot be reconstructed after the
# fact from (dosed - remaining) O2. Because A420 is an optical index rather than a mass, its carbon
# (which would come from an UNTRACKED phenol pool) is sidestepped by construction: the Process touches
# only {o2, A420}, BOTH off every ledger, so it moves NOTHING conserved (cleaner even than
# OxidativeAcetaldehyde's E->acetaldehyde carbon borrow). d(A420)/dt >= 0 always (monotonic, no clamp).
#
# MEDIUM-AGNOSTIC WIRING, PHENOLIC-BOOST WINE-ONLY (D-74 supersedes D-73's provisional "wine-only";
# D-132 adds a wine-only READ on top). D-73's worked drop-in tentatively marked browning "wine
# (o-diphenols are a wine pool)", but there is NO o-diphenol pool (the catalyst is lumped into
# k_browning_base, as in k_ethanol_oxidation), and BOTH wine and beer carry autoxidising polyphenols
# that consume O2 and brown -- so browning is a property of the molecules, not the biology, and lives
# in this SHARED file wired into BOTH media (like ethanol oxidation). It is ALSO forced to be
# consistent: the k_ethanol_oxidation reduction lives in this shared file and applies to both media,
# so a wine-only baseline browning sink would leave BEER's total O2-depletion rate silently HALVED
# below the 5.0e-4 anchor -- the exact in-tree inconsistency the D-73 rework existed to remove. The
# D-132 phenolic BOOST reads the wine-only `tannin`/`anthocyanin` grape must-input slots (D-79) --
# absent from beer's schema, so the Process guards their absence and the boost term is simply 0 there
# (beer keeps the unchanged medium-agnostic baseline, exactly as before D-132).
#
# TIER. ALL speculative -- the browning FORM (O2-limited, warmer-faster, now phenolic-driven) is
# sourced, but the rate magnitude and (especially) the per-O2 absorbance yield are order-of-magnitude
# estimates, and the aging axis is the Tier-3 frontier. The load-bearing SOURCED claims are (1) phenol
# autoxidation is the dominant O2 sink (=> k_browning_eff is the LARGER share), (2) warmer browns
# faster (E_a > 0), and (3, D-132) more grape phenolics => faster O2 uptake (Ferreira's own between-
# wine spread tracks copper and an unmeasured "antioxidant" more than phenolics directly, but the
# CALIBRATION target -- a typical red landing at 0.5-0.7 mg/L/day -- is Ferreira's average, sourced).

# -- BASELINE SHARE OF THE O2-DEPLETION RATE (first-order in o2; the medium-agnostic floor D-132's
# phenolic boost adds on top of, UNCHANGED from the pre-D-132 k_browning value) -----------------------
# The larger share of the 5.0e-4 always-on total at zero grape phenolics: k_ethanol_oxidation (2.0e-4)
# + k_browning_base (3.0e-4) = 5.0e-4 holds the calibrated total O2-depletion timescale (the anchor;
# unchanged since D-74 -- D-132 does not touch it). Same E_a as the ethanol route (E_a_browning ==
# E_a_ethanol_oxidation; same coupled-oxidation cascade), so the two BASELINE shares scale together
# with temperature and their sum is exactly 5.0e-4 * f(T) at EVERY temperature (the
# ethanol:browning-baseline partition is thus temperature-INDEPENDENT -- a deliberately conservative
# choice, not a claim that browning and oxidation have identical activation energies; see E_a_browning).
# RENAMED k_browning -> k_browning_base at D-132 (value unchanged) so the phenolic-boosted effective
# rate (k_browning_eff, code-only, not a YAML parameter) has an unambiguous baseline to add onto.
k_browning_base:
  value: 3.0e-4
  unit: "1/h"   # d(o2)/dt = -k_browning_eff * f(T) * [o2]  (baseline share of O2 depletion at zero grape phenolics)
  tier: speculative
  uncertainty: { low: 2.0e-4, high: 4.0e-4, note: "medium-agnostic BASELINE browning share of the first-order O2-consumption rate at T_ref = 20 C (zero grape phenolics -- a white/beer run), ~60% of the 5.0e-4 always-on total (ethanol oxidation the secondary ~40%, k_ethanol_oxidation). Banded ~0.4-0.8x the total: phenol autoxidation is the DOMINANT O2 sink in wine oxidation, but the exact ethanol:browning split is uncertain (both routes are lumped, catalyst folded into k). The load-bearing claim is the ORDERING (k_browning_base > k_ethanol_oxidation -- browning gets the majority of the O2 even at the floor), NOT the exact fraction; the SUM k_browning_base + k_ethanol_oxidation = 5.0e-4 preserves the total O2-scavenging timescale regardless of the split. A REAL red wine's effective rate is higher still, via k_browning_phenolic (D-132)." }
  provenance:
    source: "author estimate anchored to the ORDERING that o-diphenol autoxidation is the PRIMARY consumer of dissolved O2 in wine oxidation, ahead of ethanol oxidation (Singleton 1987, oxidation of wines; Danilewicz 2003/2007, oxygen-reduction mechanism -- O2 reacts first with catechols/gallates to o-quinones + H2O2, and only a fraction of that H2O2 goes on to oxidise ethanol; Wildenradt & Singleton 1974). The pseudo-first-order rate constant folds the o-diphenol/Fe/Cu catalyst concentration into k (no explicit phenol pool tracked in v1, as with k_ethanol_oxidation). Retained as the medium-agnostic FLOOR at D-132 (Ferreira 2015 anchors the phenolic boost on top, not this baseline -- white/beer have no comparable measured acceleration)."
    conditions: "generic wine/beer at cellar pH/temperature and ZERO grape tannin/anthocyanin; pseudo-first-order in the dissolved-o2 pool at T_ref = 293.15 K, the browning route's baseline (dominant) share of the total depletion (k_browning_base + k_ethanol_oxidation = 5.0e-4). The catalytic phenol/metal chemistry is lumped into this constant; the per-O2 browning yield is y_a420_per_o2; a real red's effective rate is higher via k_browning_phenolic."
    notes: "SOURCED FORM (O2-limited, first-order in the finite O2 pool; browning the DOMINANT always-on O2 sink so it diverts the majority of the O2 from ethanol oxidation, suppressing acetaldehyde -- the always-on analogue of the D-72 SO2 threshold) + SPECULATIVE magnitude. Load-bearing sourced claims: (1) phenol autoxidation > ethanol oxidation for O2 (=> k_browning_base > k_ethanol_oxidation), (2) warmer browns faster (E_a_browning). The 5.0e-4 total is the anchor; this share and k_ethanol_oxidation partition it (D-74, the always-on sink D-73 enabled); D-132 leaves this floor untouched and adds the phenolic boost on top."

# -- PHENOLIC BOOST: grape tannin+anthocyanin lift the browning rate toward Ferreira's measured red-
# wine O2-consumption average (decision D-132) ----------------------------------------------------
# k_browning_eff = k_browning_base + k_browning_phenolic * ([tannin] + [anthocyanin])  (both g/L grape
# must-input state slots, D-79; wine-only, so this term is 0 on beer/white by construction -- the
# Process guards their absence). Calibrated so a TYPICAL red's phenolic load -- ~2.0 g/L condensed
# tannin + ~0.3 g/L anthocyanin (the polymerization.yaml D-79/D-81/D-84 "typical red" anchors) = 2.3
# g/L -- lands the TOTAL O2-depletion rate (k_ethanol_oxidation + k_browning_eff) * [o2] at Ferreira's
# measured ~0.5-0.7 mg/L/day average at a fresh ~8 mg/L O2 saturation charge: k_browning_eff needed =
# (0.6 mg/L/day) / (8 mg/L * 24 h/day) - k_ethanol_oxidation ~ 3.13e-3 - 2.0e-4 ~ 2.9e-3 /h, of which
# k_browning_base contributes 3.0e-4, leaving ~2.6e-3 /h for the phenolic term over 2.3 g/L =>
# k_browning_phenolic ~ 1.1e-3 L/(g*h). At this value a typical red lands at ~0.58 mg/L/day (in-band);
# a white/beer (phenolics = 0) is UNCHANGED at k_browning_base -- isolable at zero grape phenolics
# (the D-129/D-131 GATE-1 pattern). NOT the between-wine spread driver Ferreira actually measured
# (that tracks copper and an unmeasured antioxidant more than phenolics -- D-133's territory); this
# term only encodes the SOURCED red-vs-white/beer magnitude gap via the pools this model already
# tracks. A SIMPLE additive sum of the two grape pools (not a weighted blend): tannin (~2 g/L) is
# ~7x anthocyanin (~0.3 g/L) at the typical-red anchor, so tannin dominates regardless, and no
# sourced weighting between the two phenolic classes exists to justify anything more elaborate.
k_browning_phenolic:
  value: 1.1e-3
  unit: "L/(g*h)"   # k_browning_eff = k_browning_base + k_browning_phenolic * ([tannin]+[anthocyanin])
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 2.5e-3, note: "phenolic-boost coefficient at T_ref = 20 C. Banded around the central 1.1e-3 L/(g*h) that lands a typical red (2.3 g/L combined tannin+anthocyanin) at Ferreira's measured ~0.5-0.7 mg/L/day average O2-consumption rate; the low end (~5.0e-4) would under-shoot that band, the high end (~2.5e-3) would over-shoot it toward the upper edge of Ferreira's between-wine spread (never > factor 2.2). The load-bearing claim is that MORE grape phenolics => FASTER O2 uptake (a rising function), not this exact slope -- Ferreira's actual between-wine driver is copper and an unmeasured antioxidant (D-133), so this coefficient is a calibration device that reproduces the red-wine MAGNITUDE via the pools this model tracks, not a fitted phenolic-kinetics constant." }
  provenance:
    source: "Marrufo-Curtido, Ferreira & Escudero (2015), J. Agric. Food Chem. -- 15 real red wines, repeated O2-saturation cycles, average O2-consumption rate 0.5-0.7 mg/L/day (most wines; between-wine spread never > factor 2.2). The paper does not resolve rate against phenolic concentration directly (its measured between-wine correlates are Cu-positive, SO2/antioxidant-negative, phenolic-neutral) -- this coefficient is CALIBRATED (not fitted) to land the model's typical-red phenolic load at the paper's headline average rate, since the model tracks tannin/anthocyanin but not the copper/antioxidant axis Ferreira found load-bearing."
    conditions: "generic red wine at cellar pH/temperature; linear boost to k_browning_base per combined g/L of grape tannin + anthocyanin (D-79 must-input state slots) at T_ref = 293.15 K. Zero at zero combined phenolics (byte-for-byte the pre-D-132 k_browning rate); wine-only in effect (beer/white have no tannin/anthocyanin slots, so the Process treats the boost as 0 there)."
    notes: "SOURCED MAGNITUDE TARGET (Ferreira's 0.5-0.7 mg/L/day red-wine average) + SPECULATIVE mechanism (linear in combined tannin+anthocyanin is a minimal rising function, not a derived phenol-autoxidation kinetics law) + SPECULATIVE slope (this coefficient, banded an order of magnitude). ADDITIVE by design (D-132 correctness trap): k_browning_eff is k_browning_base PLUS this term, never pure proportionality in phenolics alone -- a white/beer wine has no tracked phenolics and would silently brown at ZERO if the baseline were dropped, contradicting the A420 docstring's own white/beer-browns-too claim. Does NOT feed k_ethanol_oxidation (the D-132 owner-confirmed scope: the phenolic boost is browning-side only, holding the existing 0.4:0.6 ethanol:browning partition of the BASELINE constant -- an explicit, documented caveat, not a derivation, since nothing sources how that partition should move with phenolic load; acetaldehyde may be under-produced at high phenolic load as a result, see D-133's antioxidant-pool scope)."

# -- ACTIVATION ENERGY: warmer aging browns faster (sourced ordering) ---------------------
E_a_browning:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Wine oxidative-browning activation energies ~30-70 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster browning, so warm/hot storage maderises and browns wine faster); the magnitude is speculative and banded. Set EQUAL to E_a_ethanol_oxidation (50 kJ/mol): browning and ethanol oxidation are the SAME coupled-oxidation cascade (O2 -> o-quinone + H2O2 -> pigment / ethanol -> acetaldehyde), so equal E_a is the honest default and keeps the ethanol:browning O2-partition temperature-INDEPENDENT (the 5.0e-4 total scales cleanly as 5.0e-4 * f(T)). A distinct (higher) browning E_a -- maderization is arguably more T-sensitive -- was considered and NOT adopted: it would encode a partition-shift direction that is not clearly sourced, and is not needed (the A420 observable already makes browning non-degenerate; a y-cut produces no A420)." }
  provenance:
    source: "SOURCED ORDERING: wine oxidative browning accelerates with temperature (textbook Arrhenius; measured browning/oxidation activation energies ~30-70 kJ/mol, e.g. Singleton 1987; the coupled-oxidation cascade is temperature-driven). Warm storage browns/maderises wine faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2-consuming phenol autoxidation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster browning) is the sourced, load-bearing claim -- why warm/hot storage browns (maderises) wine faster and cold cellars preserve colour. Its OWN parameter (not reused from E_a_ethanol_oxidation) per prime directive #2: browning is a distinct reaction from ethanol oxidation, so it gets its own provenance entry even though the value coincides (the E_a_so2_oxidation precedent). Value set EQUAL to the ethanol-oxidation E_a deliberately: same coupled-oxidation cascade => temperature-independent O2 partition, so k_browning_base + k_ethanol_oxidation = 5.0e-4 * f(T) exactly at every T (not just T_ref) -- the BASELINE identity D-132 leaves untouched; the same f(T) also scales the phenolic boost (D-132 does not give it a separate E_a)."

# -- PER-O2 BROWNING YIELD: how much A420 absorbance one mol of browning-route O2 builds ----------
# A420 is an OPTICAL INDEX (dimensionless absorbance units, 1 cm path), NOT a concentration -- so this
# yield is AU per (mol O2 / L), i.e. AU*L/mol. Highly speculative: A420-per-O2 is not a tabulated
# quantity; this is an author estimate anchored to observed white-wine A420 ranges (fresh ~0.05-0.1
# AU; browned/oxidised ~0.3-0.6 AU) against a plausible cumulative O2 exposure. A ~40 mg/L O2 dose,
# of which browning takes ~60% (~24 mg/L = 7.5e-4 mol/L O2), x 500 AU*L/mol => dA420 ~ 0.37 AU -- a
# clearly-browned wine, in range. Banded widely; the LOAD-BEARING claim is only that browning is
# VISIBLE and monotonic, not this magnitude (the aging axis is the Tier-3 frontier).
y_a420_per_o2:
  value: 500.0
  unit: "AU*L/mol"   # d(A420)/dt = y_a420_per_o2 * (r_o2 / M_O2);  A420 in AU, r_o2/M_O2 in mol/L/h
  tier: speculative
  uncertainty: { low: 250.0, high: 1000.0, note: "AU of 420 nm absorbance (1 cm path) built per mol O2 consumed by the browning route. Anchored to white-wine browning ranges (fresh A420 ~0.05-0.1; oxidised/maderised ~0.3-0.6+) over a plausible cumulative O2 exposure: ~24 mg/L O2 to browning (60% of a 40 mg/L dose) => 7.5e-4 mol/L, x [250,1000] => dA420 ~ 0.19-0.75 AU, spanning lightly-to-heavily browned. Highly speculative (A420-per-O2 is not a standard tabulated quantity, and it lumps all phenolic browning chemistry); banded an order of magnitude. Only the monotonic VISIBLE browning is load-bearing, not the exact absorbance." }
  provenance:
    source: "author estimate: no standard tabulated A420-per-O2 exists, so this is anchored to the observed white-wine browning index range (A420 at 420 nm, 1 cm; Singleton 1987 and standard enology practice: fresh white ~0.05-0.1 AU, oxidised/browned ~0.3-0.6+ AU) divided by a plausible cumulative browning-route O2 exposure. Lumps the whole o-quinone -> melanoidin/xanthylium pigment-forming chemistry into a single per-O2 absorbance coefficient (no phenol/pigment speciation tracked in v1)."
    conditions: "AU of A420 (dimensionless absorbance, 1 cm path) per mol O2 consumed by the browning route, generic wine/beer at T_ref = 293.15 K. Beer browning (oxidative staling darkening) is the same o-diphenol autoxidation, less dominant than in white wine; the same coefficient is used medium-agnostically as an order-of-magnitude stand-in."
    notes: "SPECULATIVE magnitude (the most speculative parameter in this file -- an order-of-magnitude author estimate for an untabulated quantity, banded an order of magnitude). The load-bearing claim is only that oxidative aging produces VISIBLE, monotonic browning (A420 climbs with O2 exposure) -- not the exact absorbance. A420 is an optical index off every ledger, so this yield moves nothing conserved (the pigment's carbon comes from an untracked phenol pool -- sidestepped by using an absorbance, not a mass)."

# ======================================================================================
# INITIAL-BURST ANTIOXIDANT POOL (decision D-133): a finite, fast-reacting non-SO2 antioxidant
# producing the Ferreira 2015 day-1 O2-consumption spike, ON TOP of (never inside) the D-132
# steady-state phenolic-driven rate above.
#
# THE PROCESS (fermentation.core.kinetics.aging.AntioxidantBurstOxidation, WINE-ONLY):
#
#   d(o2)/dt                = -k_burst_oxidation * f(T) * [o2] * [burst_antioxidant]  (bilinear)
#   d(burst_antioxidant)/dt = -y_burst_per_o2 * r_o2                                   (mass yield)
#
# Ferreira measured a day-1 O2-consumption rate of 0.54-8.2 mg/L/day -- more than an order of
# magnitude faster than, and UNCORRELATED with (R^2 = 0), the steady 0.5-0.7 mg/L/day average the
# D-132 phenolic-driven rate already reproduces. The paper's own between-wine correlates for BOTH
# rates are Cu-POSITIVE and SO2-/phenolic-INDEPENDENT ("an unknown antioxidant"), so this Process
# is deliberately its OWN pool: it does NOT read tannin/anthocyanin (D-132's driver -- reusing it
# would contradict the sourced finding that the burst is phenolic-independent) and does NOT touch
# so2_total (SulfiteOxidation's substrate, D-72 -- Ferreira's rates are reported SO2-independent,
# so this residual is genuinely separate, not a re-count of SO2 protection).
#
# CALIBRATED AS THE EXCESS OVER STEADY, NOT THE FULL INITIAL BAND (the D-132 additive-never-total
# trap, reapplied here). Both this Process and PhenolicBrowning draw the SAME shared o2 pool
# simultaneously, so on day 1 the TOTAL rate = D-132 steady + this Process's burst. Ferreira notes
# "in 12/15 wines initial >= 2.7x average" -- a representative day-1 TOTAL of ~2.7 * 0.58 =~ 1.57
# mg/L/day for a typical red. Sizing this Process to the FULL initial band on top of the
# already-Ferreira-calibrated D-132 steady rate would over-count the median wine by ~30%; this
# Process's target is the EXCESS, 1.57 - 0.58 =~ 1.0 mg/L/day at a fresh 8 mg/L O2 charge, T_ref
# = 20 C.
#
# TWO JOINT CONSTRAINTS pin k_burst_oxidation and the initial charge separately (one target alone
# under-determines the pair): (a) the excess RATE at t=0 (above); (b) Ferreira reports the average
# rate "constant across saturations 2-5" -- i.e. the burst is spent by the SECOND ~10-day
# saturation cycle. With y_burst_per_o2 = 1.0 g/g (the honest 1:1 default for an unidentified
# antioxidant -- no evidence, unlike ellagitannin's lumped macromolecule, of a multi-site
# stoichiometry), constraint (b) requires k_burst_oxidation * o2_0 =~ 3/240h =~ 0.0125/h (~95%
# spent in 10 days), giving k_burst_oxidation =~ 1.6 L/(g*h); constraint (a) then pins the typical
# initial charge burst_antioxidant_initial =~ 3.3e-3 g/L. Once exhausted, only the D-132 steady
# rate remains -- the "scavenges until exhausted" shape SulfiteOxidation (D-72) established, for a
# genuinely distinct, non-renewable, non-SO2 pool.
k_burst_oxidation:
  value: 1.6
  unit: "L/(g*h)"   # d(o2)/dt = -k_burst_oxidation * f(T) * [o2] * [burst_antioxidant]  (bilinear)
  tier: speculative
  uncertainty: { low: 0.5, high: 5.0, note: "bimolecular O2xburst_antioxidant rate constant at T_ref = 20 C. Sized (jointly with y_burst_per_o2) so the pool is ~95% spent within Ferreira's ~10-day saturation cycle (his average rate is 'constant across saturations 2-5' -- i.e. the burst does not recur). The load-bearing claim is the SHAPE (a fast, self-exhausting sink, the SulfiteOxidation precedent), not this exact rate constant -- burst_antioxidant_initial is the between-wine spread knob (Ferreira's initial rate spans 0.54-8.2 mg/L/day, R^2=0 vs average), not this rate. Banded an order of magnitude." }
  provenance:
    source: "Marrufo-Curtido, Ferreira & Escudero (2015), J. Agric. Food Chem. -- 15 real red wines, repeated O2-saturation cycles. The initial (day-1) O2-consumption rate is 0.54-8.2 mg/L/day, uncorrelated (R^2=0) with the steady 0.5-0.7 mg/L/day average, and both rates are Fe-/SO2-independent but strongly Cu-dependent (an 'unknown antioxidant'). The paper does not resolve a rate constant for this pool directly (it is not modelled as a discrete kinetic species in the source) -- this is CALIBRATED to reproduce the reported EXHAUSTION TIMESCALE (gone by saturation cycle 2) jointly with the excess-rate target below."
    conditions: "generic red wine at cellar pH/temperature; bilinear in the dissolved-o2 pool and the burst_antioxidant pool (both g/L) at T_ref = 293.15 K."
    notes: "SOURCED SHAPE (a finite, fast, self-exhausting O2 scavenger distinct from the renewable D-78 oak buffer and the always-on D-132 phenolic route -- the D-72 SulfiteOxidation 'protects until exhausted' analogue, but non-SO2) + SPECULATIVE magnitude. Does NOT read tannin/anthocyanin (D-132's driver) or so2_total (D-72's substrate) -- structurally independent, so it cannot double-count either sibling sink."

E_a_burst_oxidation:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Ferreira's saturation-cycle trials were not run across a temperature series (unlike the D-102 SMM-hydrolysis Arrhenius study), so no burst-specific activation energy is sourced. Set EQUAL to the sibling oxidative E_a's (E_a_browning/E_a_ethanol_oxidation/E_a_so2_oxidation, all 50 kJ/mol -- the same coupled O2-reduction chemistry), an explicit borrowed order-of-magnitude, not a derivation. Only the SIGN (warmer => faster scavenging, so warm storage burns through the burst pool faster) is load-bearing." }
  provenance:
    source: "author estimate, borrowed from the sibling O2-consuming Processes' activation energies (Singleton 1987; Danilewicz 2003/2007 coupled-oxidation mechanism) -- Ferreira 2015 itself gives no temperature series for the initial-burst rate."
    conditions: "equivalent Arrhenius activation energy of the burst-antioxidant O2-scavenging reaction at T_ref = 293.15 K."
    notes: "Its OWN parameter (not reused from E_a_browning/E_a_so2_oxidation) per prime directive #2 -- the burst pool is a chemically distinct, unidentified antioxidant, so it gets its own provenance entry even though the value coincides with its siblings (the E_a_so2_oxidation precedent). Only the DIRECTION is sourced; the magnitude is an explicit unverified borrow, documented rather than silently assumed."

# -- MASS-BASED CONSUMPTION YIELD: how much burst_antioxidant one g of its O2 draw spends ----------
y_burst_per_o2:
  value: 1.0
  unit: "g/g"   # g burst_antioxidant consumed per g O2 scavenged; d(burst_antioxidant)/dt = -y_burst_per_o2 * r_o2
  tier: speculative
  uncertainty: { low: 0.3, high: 3.0, note: "g unidentified antioxidant spent per g O2 it scavenges. Unlike y_ellag_per_o2 (2.0, a lumped macromolecule with multiple galloyl/gallate reactive sites), nothing is known about this pool's chemical identity, so 1.0 (a plain 1:1 mass ratio) is the honest 'no fake precision' default rather than an assumed multi-site stoichiometry. Banded an order of magnitude; sized jointly with k_burst_oxidation so the pool empties within Ferreira's ~10-day saturation-cycle timescale -- the LOAD-BEARING claim is that the pool IS finite and DOES exhaust, not this exact ratio." }
  provenance:
    source: "author estimate: absent any evidence for the burst antioxidant's chemical identity (Ferreira 2015 reports only that it correlates with Cu and not with SO2/phenolics), a 1:1 mass ratio is the minimal, unbiased assumption -- the y_ellag_per_o2 idiom (mass-based, no fake molar mass for an unspeciated pool) without borrowing that Process's multi-site multiplier."
    conditions: "g burst_antioxidant consumed per g O2 scavenged by this route, generic red wine at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude, MASS-based (no molar mass for an unidentified compound -- the y_ellag_per_o2 idiom). Off every ledger (burst_antioxidant, like o2/A420/ellagitannin), so this consumption moves nothing conserved. Jointly with k_burst_oxidation, sets the EXHAUSTION timescale (Ferreira: gone by saturation cycle 2) -- not independently meaningful."

# -- INITIAL CHARGE: the grape-composition burst_antioxidant dose a fresh wine carries ----------
burst_antioxidant_initial:
  value: 3.3e-3
  unit: "g/L"   # DMS-equivalent-style GRAPE composition input; seeds the burst_antioxidant state slot (D-133)
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 2.5e-2, note: "typical (central) charge sized so the day-1 EXCESS rate (over the D-132 steady rate) lands at ~1.0 mg/L/day at a fresh 8 mg/L O2 charge -- Ferreira's representative '2.7x average' case (2.7 * 0.58 - 0.58 =~ 1.0 mg/L/day). Banded to span Ferreira's full observed between-wine range: the low end (~5.0e-4) reproduces a near-zero-burst wine (his lowest initial rate, 0.54 mg/L/day, is actually BELOW the steady average -- essentially no burst); the high end (~2.5e-2) reproduces his most Cu-loaded outlier (initial ~8.2 mg/L/day, ~7.5 mg/L/day excess). This is the between-wine SPREAD knob -- Ferreira's actual driver (copper, unmeasured antioxidant chemistry) is untracked, so this initial charge is a calibration device standing in for that untracked variability, not a measured antioxidant concentration." }
  provenance:
    source: "Marrufo-Curtido, Ferreira & Escudero (2015) -- initial (day-1) O2-consumption rate 0.54-8.2 mg/L/day across 15 red wines, R^2=0 vs the steady average, Cu-positive/SO2-negative/phenolic-neutral. The paper does not identify or quantify the antioxidant species, so this initial charge is CALIBRATED (not measured) to reproduce the reported rate band via the model's own k_burst_oxidation/y_burst_per_o2."
    conditions: "GRAPE-composition input (like dms_potential_initial), g/L, generic red wine at crush. Scenarios override via burst_antioxidant_gpl (the tannin_gpl/anthocyanin_gpl pattern)."
    notes: "SOURCED MAGNITUDE TARGET (Ferreira's initial-rate band) + SPECULATIVE mechanism (a discrete finite pool is a modelling choice, not Ferreira's own framing) + SPECULATIVE central value. NOT a winemaking dose (the D-45/D-102 distinction): defaults to this sourced level rather than 0, so an un-overridden red wine still shows the day-1 burst Ferreira found in essentially every wine tested -- a 0 default would be the hard-zero defect (a Process that silently never fires)."

# ======================================================================================
# STRECKER DEGRADATION (decision D-75, the WINE-ONLY, SUBSTRATE-GATED oxidative aging sink that
# produces the Strecker aldehydes). The oxidative-aroma axis: aged wine smells of cooked potato +
# honey.
#
# THE PROCESS (fermentation.core.kinetics.aging.StreckerDegradation, WINE-ONLY):
#
#   gate       = amino_acids / (K_amino_acids + amino_acids)              # smooth availability, [0,1)
#   d(o2)/dt   = -k_strecker * f(T) * [o2] * gate                         # O2-limited, aa-gated
#   n_ald      = y_strecker_per_o2 * (r_o2 / M_O2)                        # mol total aldehyde /L/h
#   d(methional)/dt          = +f_methional     * n_ald * M_methional     # the cooked-potato share
#   d(phenylacetaldehyde)/dt = +(1-f_methional) * n_ald * M_phenylacetaldehyde  # the honey share
#   d(CO2)/dt      = +n_ald * M_CO2                                       # 1 CO2 per aldehyde (decarb)
#   d(<precursor>)/dt = -(that route's carbon rate) / c_<precursor>       # methionine -> methional,
#                                                                         # phenylalanine -> PAA (D-100)
#   d(N)/dt           = +(that precursor mass) * y_N_<precursor>          # DEAMINATION -> ammonium
#
# As a finished wine takes up oxygen, the o-quinones of phenol autoxidation (the PhenolicBrowning
# cascade, D-74) oxidatively deaminate + decarboxylate amino acids to STRECKER ALDEHYDES: methional
# (from methionine, "cooked potato" -- the classic OXIDATIVE off-note) and phenylacetaldehyde (from
# phenylalanine, "honey/floral" -- pleasant). These are aroma compounds the D-67 OAV lens did NOT
# previously read (no existing pool), so -- unlike ester hydrolysis / oxidative acetaldehyde -- this
# beat adds TWO new observable pools (owner fork D-75: two pools, not one lumped, since the two
# aldehydes have OPPOSITE sensory valence).
#
# SUBSTRATE-GATED, ADDS ON TOP -- NO RE-BASELINE (the D-75 crux, superseding the D-71..D-74 forward-
# guess). D-71..D-74 forecast Strecker as "the next ALWAYS-ON O2 sink -- reduce k_ethanol_oxidation
# again to its share." That guess assumed a significant, medium-agnostic sink. It is WRONG for
# Strecker: gating the O2 draw on amino_acids makes Strecker DOUBLY substrate-gated (on o2 AND
# amino_acids), exactly like SulfiteOxidation (o2 AND SO2). D-72 established the load-bearing rule --
# a substrate-gated sink adds on top WITHOUT any re-baseline (zero without its substrate => the
# default/beer trajectory is byte-for-byte preserved). So k_ethanol_oxidation + k_browning_base = 5.0e-4
# is UNTOUCHED; k_strecker is a small wine-only draw that only fires when amino_acids is present
# (dosed nutrient, or -- future -- lees autolysis refill). "Trace" is only the secondary reassurance
# that even at full aa gate the extra draw is within the anchor band.
#
# THE INHERITED QUINONE DOUBLE-COUNT LUMP (documented, not fixed). Mechanistically the O2 is consumed
# at the phenol-oxidation step (browning's draw), making o-quinones that then do the Strecker
# deamination (the quinone acting as the oxidant, regenerated). A separate k_strecker [o2] draw thus
# formally DOUBLE-COUNTS the shared quinone step. But browning and ethanol-oxidation ALREADY
# double-count it against each other (both independent [o2] draws for one coupled cascade) -- the
# additive-share v1 lump accepted at D-73. Strecker following suit is CONSISTENT; a two-stage
# (O2 -> quinone pool -> {pigment, aldehyde, acetaldehyde}) rework is deliberately OUT OF SCOPE for
# v1 (it is a larger structural beat). SCOPE: this is the OXIDATIVE (quinone-driven) Strecker route
# only; the non-oxidative Maillard/sugar-dicarbonyl route (sweet wines, thermal) is deferred, which
# keeps Strecker honestly on the o2 sub-axis.
#
# LEDGERS. o2 is off every ledger (D-71); the amino-acid draw + deamination is the EXACT D-45
# mercaptans idiom (carbon from the precursor amino acid, nitrogen deaminated to N, product N-free),
# extended with a CO2 decarboxylation term. CARBON closes to machine precision: C out of EACH
# precursor == C into the aldehyde it made + its own carboxyl CO2 (each draw is sized to match, the
# EsterHydrolysis multi-product split idiom). NITROGEN closes: all precursor N -> N pool, products
# N-free. Since D-100 each route draws the amino acid its chemistry actually names -- METHIONINE for
# methional, PHENYLALANINE for phenylacetaldehyde -- so the pre-D-100 arginine stand-in, exact on the
# ledger but approximate on provenance, is RETIRED here and in mercaptans (D-45) alike: every
# amino-acid-drawing Process now names its real precursor.
# TIER consequence (the D-45 note): Strecker WRITES N (deamination), so
# an enabled run drops structural tier_of("N") PLAUSIBLE->SPECULATIVE. total_mass ({S,E,CO2}) sees
# the CO2 term with no matching S/E debit, but it is never asserted on an aging run (aroma pools
# active) -- the standing OxidativeAcetaldehyde scope-out. WINE-ONLY (amino_acids + N-deamination
# read wine-only slots), disabled at compile until begin_aging.
#
# TIER. ALL speculative -- the Strecker FORM (O2-linked, amino-acid-driven, warmer-faster, aldehyde
# = amino acid minus CO2) is sourced, but every magnitude is an order-of-magnitude estimate and the
# aging axis is the Tier-3 frontier. Load-bearing SOURCED claims: (1) Strecker aldehydes are the
# markers of oxidative aging/staling, (2) they need both O2 (via quinones) and amino acids, (3)
# warmer ages faster (E_a > 0).

# -- STRECKER O2-DRAW RATE CONSTANT (first-order in o2, additionally aa-gated) ------------
# A SMALL wine-only ADD-ON sink (NOT part of the 5.0e-4 always-on anchor -- substrate-gated, so it
# adds on top like SulfiteOxidation, D-72). Its O2 draw is throttled by the amino_acids availability
# gate aa/(K_amino_acids+aa), so at cellar residual-aa levels (~tens of mg/L) it is a minor
# perturbation to the total O2 budget -- within the anchor's own uncertainty band. Strecker aldehydes
# are a minor O2 fate vs visible browning, so this is deliberately well below k_browning_base/k_ethanol.
k_strecker:
  value: 1.0e-5
  unit: "1/h"   # d(o2)/dt = -k_strecker * f(T) * [o2] * gate  (Strecker route's aa-gated O2 draw)
  tier: speculative
  uncertainty: { low: 3.0e-6, high: 5.0e-5, note: "Strecker-route O2-draw constant at T_ref = 20 C, at FULL amino-acid availability (gate -> 1). ~2% of the 5.0e-4 always-on total, but substrate-gated on amino_acids so the realised draw at cellar residual-aa (~10-40 mg/L => gate ~0.1-0.3) is well under 1% of the O2 -- a minor add-on, NOT re-baselined into the anchor (unlike browning, D-74). CALIBRATED to land the produced aldehydes in the observed oxidised-white-wine range (D-75 follow-up, advisor-flagged): at a 40-60 mg/L O2 + ~0.5 g/L amino-acid dose this gives phenylacetaldehyde ~tens-to-~100 µg/L (honey; can reach hundreds in strongly oxidised/botrytized whites) and methional ~single-digit-to-tens µg/L (the potent low-µg/L oxidative marker), both OAV-positive -- NOT the ~350 µg/L methional the pre-calibration 5.0e-5 x 0.6-split gave. The amino_acids pool is the true limiting reagent (finite dosed/lees-derived aa => finite aldehyde)." }
  provenance:
    source: "author estimate anchored to the ORDERING that Strecker aldehyde formation is a MINOR fate of the oxidative O2 flux (secondary to phenol autoxidation/browning and to ethanol oxidation), gated on amino-acid availability (Escudero et al. 2000, 2002 on oxidation-derived aldehydes in wine aroma; the Strecker mechanism requires both an alpha-dicarbonyl -- here the phenol-oxidation o-quinone -- and an amino acid). Folds the quinone/dicarbonyl catalyst into k (no dicarbonyl pool tracked in v1, as with k_browning_base/k_ethanol_oxidation)."
    conditions: "generic wine at cellar pH/temperature; pseudo-first-order in the dissolved-o2 pool, additionally gated by the amino-acid availability fraction aa/(K_amino_acids+aa), at T_ref = 293.15 K. A wine-only ADD-ON sink (substrate-gated, not part of the k_ethanol_oxidation + k_browning_base = 5.0e-4 anchor)."
    notes: "SOURCED FORM (O2-limited AND amino-acid-gated => doubly substrate-gated, warmer-faster) + SPECULATIVE magnitude. Load-bearing sourced claims: Strecker aldehydes are the oxidative-aging markers and require BOTH O2 (via quinones) and amino acids. This is deliberately a SMALL add-on (not re-baselined into the anchor) -- the D-75 correction to the D-71..D-74 'reduce k_ethanol again' forward-guess, which wrongly assumed a significant medium-agnostic sink."

# -- ACTIVATION ENERGY: warmer aging forms Strecker aldehydes faster (sourced ordering) ---
E_a_strecker:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Strecker degradation / oxidative-staling activation energies ~30-70 kJ/mol (beer staling aldehyde formation is strongly temperature-accelerated). The SOURCED, load-bearing claim is the SIGN (warmer => faster Strecker aldehyde accumulation, so warm storage stales/oxidises faster); the magnitude is speculative and banded. Its OWN parameter (not reused from E_a_browning) per prime directive #2: Strecker degradation is a distinct reaction, so it gets its own provenance entry even though the band coincides with the other oxidative E_a's." }
  provenance:
    source: "SOURCED ORDERING: Strecker degradation and oxidative staling accelerate with temperature (textbook Arrhenius; beer-staling aldehyde formation is a canonical warm-storage marker -- e.g. methional, 2-/3-methylbutanal rise with temperature and time). Warm storage stales/oxidises faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate quinone-driven Strecker degradation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster Strecker aldehydes) is the sourced, load-bearing claim. Exact magnitude speculative and banded around a Q10 ~2, mirroring the other oxidative E_a's, but kept a SEPARATE parameter -- distinct reaction, distinct provenance (prime directive #2, the E_a_so2_oxidation / E_a_browning precedent)."

# -- STRECKER ALDEHYDE YIELD: mol total aldehyde per mol O2 consumed by the Strecker route -
y_strecker_per_o2:
  value: 0.5
  unit: "mol/mol"   # total Strecker aldehyde (methional + phenylacetaldehyde) per O2 consumed by the route
  tier: speculative
  uncertainty: { low: 0.1, high: 1.5, note: "mol total Strecker aldehyde per mol O2 the Strecker route consumes. Lumps the quinone-mediated stoichiometry (one O2 -> one o-quinone can deaminate roughly one amino acid in the coupled scheme, but the realised yield depends on competing quinone fates -- pigment polymerisation, reduction). Central 0.5 is a mid-band estimate; the aldehyde level lands strongly OAV-positive across the whole band (the amino_acids cap and the ~0.5-1 µg/L thresholds are what matter, not this exact yield)." }
  provenance:
    source: "author estimate from the Strecker stoichiometry (one alpha-dicarbonyl -- here an o-quinone from one O2 -- deaminates + decarboxylates one amino acid to one aldehyde + CO2), discounted for the competing quinone fates (browning polymerisation, re-reduction) that keep the realised per-O2 aldehyde yield well below 1 (Escudero et al. 2000; Rizzi 2006 Strecker mechanism review)."
    conditions: "mol total Strecker aldehyde per mol O2 consumed by the Strecker route, generic wine; split between methional and phenylacetaldehyde by f_methional, at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude. The per-O2 yield lumps the quinone-mediated Strecker stoichiometry; the amino_acids pool is the hard cap on total aldehyde (finite aa => finite aldehyde), so this yield sets the RATE of approach to that cap, not the ceiling."

# -- ALDEHYDE COMPOSITION: methional (cooked-potato) mol share of the Strecker output ------
# The mol fraction of the Strecker aldehyde output that is methional; the remainder (1 - f_methional)
# is phenylacetaldehyde (honey). This is a PRODUCTION quantity -- the relative methionine- vs
# phenylalanine-derived Strecker FLUX (amino-acid abundance x reactivity) -- NOT a perceptibility
# quantity (potency is already carried by the per-compound thresholds in the OAV, so folding it in
# here would DOUBLE-COUNT it -- the D-75 follow-up correction). Phenylalanine is one of the MORE
# abundant amino acids in grape must while methionine is typically a MINOR one, so the flux favours
# phenylacetaldehyde => f_methional < 0.5 (methional the minority product). NOT a stoichiometric
# constant (contrast the EsterHydrolysis 5:2 carbon split, fixed by a named reaction) -- an empirical
# composition estimate, so a YAML parameter.
f_methional:
  value: 0.15
  unit: "1"   # mol fraction methional of total Strecker aldehyde (rest -> phenylacetaldehyde)
  tier: speculative
  uncertainty: { low: 0.05, high: 0.35, note: "methional mol share of the Strecker aldehyde output; the rest is phenylacetaldehyde. Phenylacetaldehyde-DOMINANT (central 0.15) because the split is set by amino-acid FLUX (abundance x reactivity), and phenylalanine is one of the more abundant must amino acids while methionine is a minor one -- so most of the Strecker flux goes to phenylacetaldehyde. (An earlier 0.6 was WRONG: it justified methional-dominance by its lower ~0.5 µg/L threshold, but potency belongs in the OAV threshold, not the production split -- a double-count, corrected here.) The exact ratio is must-composition-dependent; band spans phenylacetaldehyde-dominant to roughly-even. NOT RE-ANCHORED AT D-100, deliberately: precursor abundance is now modelled explicitly (must_aa_fraction_methionine / _phenylalanine), so this split's abundance half is in principle DERIVABLE rather than estimated — met/(met+phe) ≈ 0.136 from the sourced spectrum, close to this 0.15 but NOT equal, and equating them would silently assert methionine:phenylalanine Strecker REACTIVITY = 1, which is not sourced. Deriving it is queued as its own beat; until then this stays an independent estimate and the two abundance stories are free to drift (an ensemble sampling both bands asserts both)." }
  provenance:
    source: "author estimate of the relative phenylalanine- vs methionine-derived Strecker flux. Phenylalanine is consistently among the most abundant amino acids in grape must (tens+ mg/L) while methionine is a minor sulfur amino acid (low mg/L) -- so oxidation-derived phenylacetaldehyde generally exceeds methional in must-derived Strecker degradation (Escudero et al. 2000, 2002; Ferreira -- both aldehydes are the dominant oxidation-derived Strecker markers of aged white wine, with methional the potent low-µg/L trace and phenylacetaldehyde reaching tens-to-hundreds of µg/L)."
    conditions: "generic wine; mol fraction of the lumped Strecker aldehyde output booked as methional (C4H8OS) vs phenylacetaldehyde (C8H8O), at T_ref = 293.15 K. Since D-100 each route draws its REAL precursor (methionine / phenylalanine) and each is gated on its own pool, so this split is literal methionine:phenylalanine chemistry — the pre-D-100 arginine-lump caveat is retired. The split itself remains an estimate of abundance x reactivity (see the uncertainty note)."
    notes: "SPECULATIVE magnitude. Sets the BALANCE between phenylacetaldehyde's honey note (the majority product) and methional's cooked-potato off-note (opposite sensory valence -- the reason the owner chose TWO pools over one lump, D-75). The split is PRODUCTION flux only; per-compound perceptibility lives in threshold_methional_wine / threshold_phenylacetaldehyde_wine (so it is not double-counted here). Off the stoichiometric-constant track (contrast the 5:2 ester split): an empirical composition estimate, hence a YAML parameter."
