# Aging chemistry — ester hydrolysis kinetics (decision D-69, the first §4.1 aging Process).
#
# SHARED, medium-agnostic parameter file (the vicinal_diketones.yaml / acidbase.yaml pattern):
# these names are collision-free with the per-medium kinetic parameters, and — like the
# non-enzymatic VDK decarboxylation — acid-catalysed ester hydrolysis is a property of the
# MOLECULE and the wine/beer pH, not of the beverage's biology, so its rate constant and
# activation energy live in ONE shared file rather than per medium. Merged into compile.py's
# shared_files at D-70, so every compiled scenario carries these params — but INERT until a
# begin_aging intervention enables EsterHydrolysis (disabled at compile, since aging is inherently
# post-ferment): an un-aged scenario loads the params and never reads them.
#
# THE PROCESS (fermentation.core.kinetics.aging.EsterHydrolysis):
#
#   d(isoamyl_acetate)/dt
#       = -k_ester_hydrolysis * f(T) * h(pH) * max(0, isoamyl_acetate - isoamyl_acetate_eq)
#
# a first-order NET decay of the ``isoamyl_acetate`` pool toward a lower equilibrium floor
# ``isoamyl_acetate_eq`` (NOT decay-to-zero), warmed by an Arrhenius factor f(T) = arrhenius_factor(
# T, E_a_ester_hydrolysis, T_ref) so warm aging degrades the fruity banana ester faster, AND
# (since D-124) acid-catalysed by h(pH) = 10^(pH_ref_ester_hydrolysis - pH) = [H+]/[H+]_ref so a
# LOWER-pH wine hydrolyses FASTER (R&O's "pH matters more than total acidity"; first-order in [H+]).
# h(pH) = 1 at pH_ref, and is WINE-ONLY (beer has no pH system, D-18 => h == 1, the pH_ref rate).
# The released carbon (c(isoamyl_acetate) — the REAL molecule since D-96, not a stand-in) is
# routed to ``isoamyl_alcohol`` (the alcohol product, its own D-99 pool — not the retired
# ``fusels`` lump) + ``Byp`` (the acid product) — see the Process docstring for the 5:2 split,
# which D-96 made EXACT (5 + 2 = 7 = isoamyl acetate's carbons).
#
# CARBON is the invariant (closes to machine precision); MASS carries a small (~4.5%) documented
# gap — splitting a carbon-exact budget across pools with heterogeneous fixed weightings is not
# mass-conserving (real hydrolysis consumes untracked water). The same stand-in gap as D-8 (beer
# hydrolysis water) / D-16 (Byp/Gly redox, which scopes total_mass to {S,E,CO2}) / D-26 (VDK
# O2/NAD(P)H). See the EsterHydrolysis docstring.
#
# WHY "NET DECAY TOWARD A LOWER EQUILIBRIUM" (the honest v1 scope, D-68; direction corrected D-121):
#   * Acetate esters of higher alcohols (isoamyl acetate) AND straight-chain ethyl esters of fatty
#     acids (ethyl_hexanoate) BOTH form ABOVE their hydrolysis equilibrium during fermentation, so
#     on aging BOTH HYDROLYSE back toward it — the fruity "banana/pear" young-wine character fades
#     (Ramey & Ough 1980, Tables IX/X for isoamyl acetate and Table I for ethyl hexanoate; Marais
#     1978). v1 models this fade on ``isoamyl_acetate`` ALONE (D-96), and D-123 re-anchors its
#     k / E_a to R&O's real-wine measurement.
#   * The family that FORMS on aging is the BRANCHED / polyprotic-acid ethyl esters (diethyl
#     succinate, ethyl lactate, ethyl isovalerate), which sit BELOW equilibrium young — and the sim
#     tracks NONE of them (D-121 retired D-69's original claim that ``ethyl_hexanoate`` was that
#     family; it is not — it hydrolyses WITH the acetates). ``ethyl_acetate`` is the one acetate
#     exception: it too FORMS on storage (ethanol ~2 M + accumulating acetic acid put it below its
#     esterification equilibrium). Neither a formation term nor ethyl_hexanoate hydrolysis ships:
#     R&O gives ethyl_hexanoate only a MODEL-solution k (its own WINE data show no appreciable
#     change), and ethyl_acetate is absent from the paper entirely — so both stay BLOCKED ON
#     SOURCING (D-121). Below isoamyl_acetate_eq the rate is zero (no spurious motion).
#
# TIER. ALL speculative — but since D-123 that is a FLOOR choice, not an admission the numbers are
# guesses. k_ester_hydrolysis and E_a_ester_hydrolysis are now MEASURED (Ramey & Ough 1980,
# real-wine isoamyl acetate; E_a at r ~ -1.00), re-anchored from D-69's author estimates. They are
# kept at speculative to preserve the aging axis's uniform speculative floor (relied on by
# test_tier_floored_at_speculative and the milestone-3 framing) and because the Process is
# speculative in FORM (Tier-3 frontier), so it floors its outputs at speculative regardless of input
# tiers (parameter-tier propagation, D-1). E_a alone would justify PLAUSIBLE; k carries a
# floor-graft (its D-123 single-pH pin is RETIRED at D-124 — pH is now explicit via
# pH_ref_ester_hydrolysis, whose FORM is R&O-measured first-order [H+] catalysis but whose residual
# tartrate-intercept error keeps the composite speculative). isoamyl_acetate_eq remains a genuine
# author estimate (R&O measures no floor).

# -- FIRST-ORDER HYDROLYSIS RATE: esters -> alcohol + acid, toward equilibrium -----------
k_ester_hydrolysis:
  value: 2.2e-4
  unit: "1/h"   # d(isoamyl_acetate)/dt = -k_ester_hydrolysis * f(T) * max(0, isoamyl_acetate - isoamyl_acetate_eq)
  tier: speculative
  uncertainty: { low: 1.6e-4, high: 2.5e-4, note: "NARROWED AT D-124: the band is now the AT-REFERENCE-pH uncertainty, because the pH spread that used to dominate it (model 1.06e-4 / Pinot pH 3.36 1.80e-4 / Chardonnay pH 2.94 3.22e-4) is now carried EXPLICITLY by the 10^(pH_ref - pH) factor (see pH_ref_ester_hydrolysis) rather than lumped into k. What remains is the Pinot k_obsd measurement SD (Table IX, ~11%: 54.72 +/- 6.32 e-9 => ~1.6-2.0e-4 /h at 20 C) times the 1.0-1.25 floor-graft range => ~1.6-2.5e-4. Half-life ln2/k ~ 3100 h (~4 months) at the value and pH 3.36, the observed timescale over which young wine's fruity acetate esters fade" }
  provenance:
    source: "Ramey & Ough 1980, 'Volatile ester hydrolysis or formation during storage of model solutions and wines', J. Agric. Food Chem. 28(5):928-934 — MEASURED (was author-estimate until D-123, when the paper became readable as an open scanned PDF on the author's winery site; the ACS copy is paywalled). Table IX (Pinot noir, pH 3.36): isoamyl (+active amyl) acetate pseudo-first-order k_obsd = 54.72e-9 /s at 21.1 C => 1.80e-4 /h at T_ref = 20 C (shifted via E_a_ester_hydrolysis). Table VIII (Chardonnay, pH 2.94): 98.73e-9 /s => 3.22e-4 /h; Table I (model solution): 32.60e-9 /s => 1.06e-4 /h. The old D-69 estimate (1.0e-4) coincided with R&O's MODEL-solution value; this re-anchors to the real-WINE measurement."
    conditions: "wine matrix, the rate AT THE REFERENCE pH 3.36 (R&O's Pinot noir, a typical red); first-order in the `isoamyl_acetate` excess over equilibrium AND (since D-124) first-order in [H+] via the 10^(pH_ref - pH) factor, at T_ref = 293.15 K. R&O's headline STEEP [H+] dependence (Table V/VI, ~x9-x10 per pH unit, r=0.999) is now CARRIED by that factor (D-124 built the pH-explicit rate D-123 flagged as deferred). k is thus the value at pH_ref; off-reference wines scale by [H+]/[H+]_ref. See pH_ref_ester_hydrolysis for the FORM's provenance and the tartrate-intercept known limit."
    notes: "RE-ANCHORED AT D-123 (D-121's 'reopens the moment a rate constant lands' trigger). Two author modeling choices ride on the measured core, which is why the composite stays SPECULATIVE though k_obsd itself is plausible-grade: (1) the x1.25 FLOOR-GRAFT — R&O saw log-linear decay over 200 d (NO floor; k_obsd is a pure first-order disappearance constant), whereas EsterHydrolysis decays toward isoamyl_acetate_eq, so at the sim's ~1 mg/L young level the floor eats ~20% of the driving force and k_sim*(ester-eq) must be inflated to reproduce R&O's observed k_obsd*ester (test_reanchored_rate_reproduces_ramey_ough_young_wine_fade); (2) the single pinned pH. Owner chose 'match R&O's observed fade' over 'match R&O's number' (k_sim = k_obsd, ~15-25% slower than they saw). The +active amyl coelution (R&O's wine peak is isoamyl + active amyl acetate) is a minor same-ester-bond C5-acetate proxy. Process floors outputs at speculative regardless (D-1)."

# -- ACTIVATION ENERGY: warmer aging hydrolyses faster (now a measured magnitude) --------
E_a_ester_hydrolysis:
  value: 59000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 55000.0, high: 69000.0, note: "the R&O-measured isoamyl-acetate range: 59.0 kJ/mol (Pinot noir wine, r=-1.00) to 64.0 (Chardonnay wine, r=-0.997) to 69.0 (model solution); banded a little below the Pinot anchor to allow wine-to-wine spread. Q10 ~2.0 at 20 C." }
  provenance:
    source: "Ramey & Ough 1980, J. Agric. Food Chem. 28(5):928-934 — MEASURED (was author-estimate/ordering-only until D-123; see k_ester_hydrolysis for the open-PDF provenance). Table X (activation energies in WINE): isoamyl (+active amyl) acetate E_a = 14.1 kcal/mol (Pinot noir, r=-1.00) and 15.3 kcal/mol (Chardonnay, r=-0.997); Table II (model solution): 16.5 kcal/mol. 14.1 kcal/mol x 4184 = 59.0 kJ/mol. Anchored to Pinot noir, the same wine as the k_ester_hydrolysis anchor."
    conditions: "Arrhenius activation energy of isoamyl-acetate hydrolysis in a wine matrix, at T_ref = 293.15 K. Pinot noir value."
    notes: "RE-ANCHORED AT D-123 from D-69's author estimate (60000, 'only the ORDERING sourced, magnitude speculative'). The old guess already sat inside R&O's measured wine range (59-64 kJ/mol), so the value barely moved (60->59); the substance of the change is PROVENANCE — the magnitude is now a real measurement (r ~ -1.00 across model + both wines), not an estimate. Kept SPECULATIVE to preserve the aging axis's uniform speculative floor (relied on by test_tier_floored_at_speculative and the milestone-3 framing); on its own this measurement would justify PLAUSIBLE, a clean future promotion should the axis-wide floor be revisited. The warmer-is-faster DIRECTION (E_a > 0) remains the load-bearing behavioural claim — why warm cellars age wine faster and cold storage preserves fruity esters."

# -- REFERENCE pH: hydrolysis is FIRST-ORDER in [H+]; k is anchored at this pH (decision D-124) --
# EsterHydrolysis scales its rate by [H+]/[H+]_ref = 10^(pH_ref - pH), so acetate fade tracks wine
# pH (the sim solves pH in acidbase.py, D-18). At pH_ref the factor is 1.0, so k is the rate there
# and every pre-D-124 pH-3.36 trajectory is byte-for-byte unchanged (the D-123 anchor preserved).
pH_ref_ester_hydrolysis:
  value: 3.36
  unit: "pH"   # dimensionless; the wine pH k_ester_hydrolysis is anchored to
  tier: speculative
  uncertainty: { low: 3.36, high: 3.36, note: "PINNED (zero-width => never sampled by the ensemble; the runtime pins high<=low to value). It is DEGENERATE with k_ester_hydrolysis: only the product k/[H+]_ref = R&O's true second-order k_H+ (Table VI/VII, isoamyl acetate ~1.11-1.24e-4 L/mol/s) is identifiable, so a band on pH_ref would just reshuffle into k and double-count k's spread. The identifiable uncertainty lives entirely in k; pH_ref is a fixed anchor definition, not an uncertain quantity." }
  provenance:
    source: "Ramey & Ough 1980, J. Agric. Food Chem. 28(5):928-934, page 929: 'The pH was 3.36' (the Pinot noir, Oakville CA, whose k_obsd anchors k_ester_hydrolysis via Table IX). Readable as the open scanned PDF on the author's winery site (rameywine.com); the ACS copy is paywalled (D-123)."
    conditions: "the reference pH of the first-order [H+] scaling 10^(pH_ref - pH) that EsterHydrolysis applies; wine-only (beer has no pH system, D-18, so a beer state keeps the factor at 1.0 and hydrolyses at the pH_ref-anchored rate)."
    notes: "ADDED AT D-124 (the pH-explicit hydrolysis build; the natural follow-on D-123 flagged). R&O measured, in MODEL SOLUTIONS where pH was the only variable, that isoamyl-acetate hydrolysis varies DIRECTLY with [H+] in a LINEAR (first-order) manner: Table V k_obsd at pH 2.95/3.58/4.10 = 129.2/32.60/14.10 e-9 /s, fit by Table VI's graphic second-order constant k_H+ = 1.111e-4 L/mol/s at r=0.999 (and Table VII's matrix k_H+ = 1.24e-4). R&O: 'pH is far more important in determining rates of ester hydrolysis than is total acidity', 'H+ ~100x more active than tartrate', and 'in both wines the acetate esters behaved as in model solutions'. So the FORM is first-order in [H+], anchored at the Pinot reference. (The earlier reading of a sub-first-order slope from the two WINES was CONFOUNDED - Pinot vs Chardonnay differ in matrix, not just pH; R&O also states ethanol 10-14% has no effect, ruling out an ethanol attenuation.) KNOWN LIMIT (the tartrate intercept, honest): R&O's [H+] plots do NOT pass through the origin - a pH-INVARIANT tartaric/bitartrate catalysis term (Table VII k_H2T/k_HT-, ~8% of the rate at pH 3.36 rising to ~30% by pH 4.1) that this pure-[H+] law wrongly scales with [H+]. Net error vs R&O's model-solution law: EXACT at 3.36, within ~+/-6% over pH 3.0-3.5 (most reds), ~-13% at 3.8, ~-27% at 4.1 (high-pH whites). Still a large gain over the pH-BLIND model (which applied the pH-3.36 rate to a ~16x [H+] range with 0% tracking). The full k_0' + k_H+[H+] + k_H2T[H2T] + k_HT-[HT-] law (Table VII constants + the tartrate speciation the sim already computes for pH) is the DEFERRED refinement - one mechanism per beat; this beat delivers the dominant [H+] term. Kept speculative for the aging axis's uniform floor (test_tier_floored_at_speculative); on its own 3.36 is a measured value."

# -- EQUILIBRIUM FLOOR: the residuum the pool decays TOWARD, not to zero ------------------
isoamyl_acetate_eq:
  value: 2.0e-4
  unit: "g/L"   # the lower equilibrium the isoamyl_acetate pool relaxes toward (net decay floor)
  tier: speculative
  uncertainty: { low: 5.0e-5, high: 5.0e-4, note: "the hydrolysis equilibrium level of ISOAMYL ACETATE specifically, ~0.05-0.5 mg/L — below typical young levels (~0.5-3 mg/L) so most of the banana note fades with age, a residuum remains" }
  provenance:
    source: "author estimate (UNCHANGED at D-123, when k_ester_hydrolysis/E_a_ester_hydrolysis were re-anchored to a now-readable Ramey & Ough 1980): R&O does NOT measure this floor — their 200-day storage is log-linear in log[ester] (Fig 2, r ~ -1.00), i.e. NO equilibrium was reached within the window, so a floor cannot be read off it. R&O's 'esters approach an equilibrium set by their acid+alcohol, not zero' is the stated MECHANISM (intro, Berthelot esterification equilibrium), not a measured isoamyl-acetate value. Anchored instead to ISOAMYL ACETATE's own scale: aged wines retain a fraction of their young isoamyl acetate (the classic loss-of-fruitiness with bottle age), not none of it."
    conditions: "generic wine/beer; the equilibrium of the `isoamyl_acetate` pool, in that molecule's own g/L (decision D-96)"
    notes: "RE-ANCHORED AT D-96, and the rename is the point. This was `esters_eq = 5 mg/L`, the LUMPED pool's floor 'booked as ethyl-acetate-equivalent g/L (the D-19 esters mass weighting)' — i.e. it carried the SAME ledger/lens split identity D-96 removed from the pools themselves, and its own notes called it 'the aging analogue of the D-67 fixed-lump-composition assumption'. Once EsterHydrolysis debits `isoamyl_acetate` (~0.76 mg/L in a young wine) a 5 mg/L floor sits ABOVE the entire pool, so `max(0, ester - eq)` is always 0 and the Process NEVER FIRES — D-69's whole fruity->fusel fade silently disabled, with every conservation test still green (a Process that does nothing conserves everything perfectly). Caught by `test_aging_does_not_strip_esters_below_the_equilibrium_floor`. At 0.2 mg/L the floor is ~26% of the young level, so aging strips ~74% of the banana and leaves a residuum. STILL A STAND-IN: a fixed absolute equilibrium replaces the true acid/alcohol-concentration-dependent one — but it is now a stand-in for ONE molecule's equilibrium rather than a lump's aggregate, so the composition half of the caveat is gone. Its role remains to make the decay NET (toward a floor) rather than decay-to-zero, which would over-strip (D-68). Below the floor the rate is zero (the reverse ester FORMATION half is the deferred bidirectional term)."

# ======================================================================================
# OXIDATIVE aging (decision D-71, the first §4.1 OXIDATIVE aging Process). The head of the
# dissolved-O2 sub-axis.
#
# THE PROCESS (fermentation.core.kinetics.aging.OxidativeAcetaldehyde):
#
#   d(o2)/dt          = -k_ethanol_oxidation * f(T) * [o2]           # O2-limited, Arrhenius
#   d(acetaldehyde)/dt = +y_acetaldehyde_per_o2 * (r_o2 / M_O2) * M_acetaldehyde
#   d(E)/dt           = -d(acetaldehyde)/dt * M_ethanol / M_acetaldehyde   # carbon-exact C2 borrow
#
# As a finished wine/beer takes up oxygen (bottle ingress, micro-oxygenation, barrel), O2 oxidises
# ethanol to ACETALDEHYDE — the 'sherry'/bruised-apple/nutty OXIDISED note the D-67 OAV lens already
# reads (the same acetaldehyde pool the D-27 buffer fills, 'green apple' fresh vs 'oxidised' when it
# climbs). So — like ester hydrolysis — this moves an OAV the lens already reads and needs no new
# aroma pool; the one new slot is the ``o2`` SUBSTRATE (dosed by add_oxygen).
#
# WHY FIRST-ORDER IN O2, NOT ETHANOL (the D-71 crux). Ethanol sits at ~100 g/L, essentially
# constant across aging, so a rate first-order in ethanol is a constant rate in disguise —
# acetaldehyde would rise LINEARLY and UNBOUNDED, pinning the kinetic limit on the wrong species.
# O2 is the rate-limiting reactant, so a rate first-order in the FINITE o2 pool gives the correct
# SATURATING behaviour (acetaldehyde plateaus as the O2 charge is spent — the bottle-aging reality).
# Mechanistically the real path is COUPLED oxidation (O2 -> quinone + H2O2 via o-diphenols; H2O2 +
# ethanol -> acetaldehyde; Wildenradt & Singleton 1974) — the phenolic catalyst is folded into
# k_ethanol_oxidation in v1 (a documented lump; no general phenol pool is tracked).
#
# SHARES, NOT THE WHOLE FLUX (the D-73 rework, spent by D-74). Each O2 consumer draws its OWN share
# of the shared o2 pool via its own rate constant; ProcessSet SUMS them, so the pool depletes ONCE
# and the O2 splits among the sinks by k_i / sum(k) (the pattern SulfiteOxidation established at
# D-72). So k_ethanol_oxidation is the ETHANOL-OXIDATION SHARE of the total O2-depletion rate, NOT
# the total (D-71 originally framed it as the total — D-73 supersedes that; see the
# k_ethanol_oxidation and y_acetaldehyde_per_o2 entries below). y_acetaldehyde_per_o2 is then the
# TRUE per-O2 stoichiometric yield of the ethanol route ALONE — the sink competition lives in the
# k's, NOT in a sub-unity yield. D-74: PhenolicBrowning is now a co-resident always-on sink, and the
# DOMINANT one (phenol autoxidation is the primary O2 consumer; ethanol oxidation is the secondary
# H2O2 fate) — so k_ethanol_oxidation was REDUCED 5.0e-4 -> 2.0e-4 and k_browning (3.0e-4) takes the
# larger share, with k_ethanol + k_browning = 5.0e-4 holding the calibrated total O2-depletion rate.
#
# LEDGER. o2 is CARBON-FREE and off every conservation ledger (total_carbon/total_mass/
# total_nitrogen weight only their named pools) — like h2s/iso_alpha. The carbon that DOES move
# (E -> acetaldehyde) is borrowed carbon-exactly (C2 -> C2, the D-27 reduction reversed), so
# total_carbon closes to machine precision. MASS carries the standing E<->acetaldehyde gap (the D-27
# seam), scoped out because total_mass ({S,E,CO2}) is never asserted on an aging run.
#
# TIER. ALL speculative — the oxidation FORM (O2-limited, warmer-faster) is sourced, but every
# magnitude is an order-of-magnitude estimate and the aging axis is the Tier-3 frontier.

# -- ETHANOL-OXIDATION SHARE OF THE O2-DEPLETION RATE (first-order in o2, O2-limited) -----
# D-73: this is the ETHANOL-OXIDATION SHARE of the total O2-depletion rate, NOT the total (D-71
# framed it as the total; D-73 supersedes that). Each always-on O2 sink owns its own first-order-in-
# o2 rate; ProcessSet sums them, so the pool depletes once and O2 splits by k_i/sum(k). The empirical
# TOTAL O2-scavenging timescale (weeks-to-months) is the ANCHOR the shares partition. D-74: phenolic
# browning is now a co-resident always-on sink, and the DOMINANT one, so this value was REDUCED
# 5.0e-4 -> 2.0e-4 and k_browning (3.0e-4) takes the larger share, with k_ethanol_oxidation +
# k_browning = 5.0e-4 HOLDING that total (the anchor, and the O2-depletion timescale, unchanged).
# The two shares carry the SAME E_a (same coupled-oxidation cascade — see E_a_browning), so their
# sum is exactly 5.0e-4 * f(T) at every temperature, not just at T_ref. Substrate-gated sinks (SO2,
# D-72) add on top without touching this, since they are zero without their substrate. A further
# Strecker sink was FORECAST here to "reduce this share again (its k joining the 5.0e-4 sum)", but
# D-75 SUPERSEDES that: StreckerDegradation is SUBSTRATE-GATED (on amino_acids) and wine-only, so it
# adds ON TOP without re-baselining the anchor (the SulfiteOxidation rule), and this value is
# UNCHANGED. See the STRECKER DEGRADATION section below and decision D-75.
k_ethanol_oxidation:
  value: 2.0e-4
  unit: "1/h"   # d(o2)/dt = -k_ethanol_oxidation * f(T) * [o2]  (ethanol route's share of O2 depletion)
  tier: speculative
  uncertainty: { low: 4.0e-5, high: 8.0e-4, note: "ethanol-oxidation share of the first-order O2-consumption rate at T_ref = 20 C, ~40% of the 5.0e-4 always-on total (browning takes the dominant ~60%, k_browning). Banded ~0.2-0.6x the total (the ethanol:browning split is uncertain — see k_browning); the SUM k_ethanol_oxidation + k_browning = 5.0e-4 => the total O2 half-life ln2/k ~ 350-7000 h (~2 weeks to ~10 months) for the dissolved-O2 charge is preserved (wine scavenges a saturating O2 dose over weeks-to-months at cellar temperature). D-74 reduced this from 5.0e-4 (the D-73 sole-always-on-sink value) as browning claimed its share." }
  provenance:
    source: "author estimate anchored to the timescale over which dissolved oxygen is consumed in stored wine (Singleton 1987, oxidation of wines; Wildenradt & Singleton 1974, 'The production of aldehydes as a result of oxidation of polyphenolic compounds and its relation to wine aging'). A saturating O2 charge is scavenged over weeks-to-months at cellar temperature; the TOTAL pseudo-first-order O2-depletion constant is ~5.0e-4/h, of which this is the ethanol-oxidation SHARE (~40%) and k_browning the dominant browning share (~60%), folding the o-diphenol/Fe catalyst concentration into the k's (no general phenol pool tracked in v1)."
    conditions: "generic wine/beer at cellar pH/temperature; pseudo-first-order in the dissolved-o2 pool at T_ref = 293.15 K, the ethanol route's share of the total depletion (k_ethanol_oxidation + k_browning = 5.0e-4). The catalytic phenol/metal chemistry is lumped into this constant; the per-O2 acetaldehyde yield of the route is y_acetaldehyde_per_o2."
    notes: "SOURCED FORM (O2-limited, first-order in the finite O2 pool => SATURATING acetaldehyde, not the unbounded ethanol-first alternative — the D-71 design crux) + SPECULATIVE magnitude (order-of-magnitude, banded to the weeks-to-months O2-scavenging timescale). The load-bearing sourced claims are (1) O2 is the rate-limiter, (2) warmer oxidises faster (E_a_ethanol_oxidation), and (3) ethanol oxidation is the SECONDARY O2 fate behind phenol autoxidation (=> this is the SMALLER share; k_browning the larger). D-74: reduced 5.0e-4 -> 2.0e-4 as the always-on PhenolicBrowning claimed the dominant share; the sum with k_browning holds the total depletion rate (the anchor)."

# -- ACTIVATION ENERGY: warmer aging oxidises faster (sourced ordering) -------------------
E_a_ethanol_oxidation:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Wine oxidation/browning activation energies ~30-70 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster oxidation, faster acetaldehyde accumulation and browning); the magnitude is speculative and banded." }
  provenance:
    source: "SOURCED ORDERING: wine oxidation and oxidative browning accelerate with temperature (textbook Arrhenius; measured browning/oxidation activation energies ~30-70 kJ/mol, e.g. Singleton 1987; the coupled-oxidation cascade is temperature-driven). Warm storage oxidises wine faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2-consumption / ethanol-oxidation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster) is the sourced, load-bearing claim — why warm/hot storage oxidises (maderises) wine faster and cold cellars slow it. Exact magnitude speculative and banded around a Q10 ~2, deliberately a touch below the ester-hydrolysis E_a (oxidation's temperature sensitivity is broadly comparable-to-slightly-lower)."

# -- ACETALDEHYDE YIELD: mol acetaldehyde per mol O2 consumed BY THE ETHANOL ROUTE --------
# D-73: this is the TRUE per-O2 stoichiometric yield of the ethanol-oxidation route ALONE, NOT a
# sub-unity fudge for competing sinks. The sink competition lives in the rate constants (each sink
# draws its own O2 share via its own k; ProcessSet sums), so this yield is the ethanol route's OWN
# conversion of the O2 it consumes — free to sit near the coupled-oxidation mechanistic yield.
# Re-baselined 1.0 -> 1.5 (D-73). D-74: the always-on PhenolicBrowning sink is now built and takes
# the DOMINANT O2 share (k_browning > k_ethanol_oxidation), so the "interim upper estimate" caveat is
# RESOLVED — the ethanol route now gets only its ~40% share of a consumed O2 charge, so cumulative
# aged acetaldehyde partitioned DOWN to ~0.4x the D-73 sole-sink value (this yield UNCHANGED at 1.5;
# the partition moved via the k's, exactly as the shares design intends).
y_acetaldehyde_per_o2:
  value: 1.5
  unit: "mol/mol"   # acetaldehyde produced per O2 consumed by the ethanol-oxidation route (true yield)
  tier: speculative
  uncertainty: { low: 1.0, high: 2.0, note: "coupled oxidation yields ~1-2 mol acetaldehyde per mol O2. The H2O2 arm (1 O2 -> 1 H2O2 -> 1 acetaldehyde) reliably gives ~1; the theoretical ceiling of 2 needs FULL coupling (O2's four-electron reduction O2->H2O2->H2O driving two 2-electron ethanol oxidations, the o-quinone re-oxidising a second ethanol). In real wine that ceiling is not reached — the quinone is usually reduced by OTHER diphenols/sulfite rather than ethanol, and H2O2 partitions to non-ethanol fates — so realised yield sits NEARER 1. Central 1.5 is a mid-band estimate, not the best case. Now that competing O2 sinks are EXPLICIT siblings (each with its own k), this is the ethanol route's OWN yield, not shaded down for them (D-73). Sanity (D-74, with the always-on browning sink built): of a ~40 mg/L (~0.04 g/L) cumulative O2 exposure the ethanol route takes ~40% (~16 mg/L O2; browning the dominant ~60%), x 1.5 => ~33 mg/L acetaldehyde (fresh wine ~10-40, moderately oxidised ~100-300 mg/L) — a modest oxidative note, with the balance of the O2 going to visible browning (A420). Pre-D-74 (ethanol the sole always-on sink) the same exposure gave ~82 mg/L; browning partitioned it down." }
  provenance:
    source: "author estimate from the coupled-oxidation stoichiometry (Wildenradt & Singleton 1974: polyphenol oxidation by O2 generates H2O2, which oxidises ethanol to acetaldehyde). Per O2, the H2O2 arm gives ~1 acetaldehyde reliably; up to ~2 is possible only if the catalytic o-diphenol/o-quinone couple carries a fully-coupled second oxidation, which real wine approaches but does not reach (competing quinone reductants and H2O2 fates). Central 1.5 is the mid-band estimate for the ETHANOL ROUTE ALONE — above the reliable ~1, below the ~2 best case."
    conditions: "mol acetaldehyde per mol O2 consumed by the ethanol-oxidation route, generic wine/beer; the route's true per-O2 yield at T_ref = 293.15 K. Competing O2 sinks (o-diphenol browning, Strecker degradation, direct SO2 oxidation) draw their OWN O2 share via their own rate constants (SO2, D-72; browning/Strecker to come, D-73), NOT out of this yield."
    notes: "SPECULATIVE magnitude. D-73 re-baseline 1.0 -> 1.5: the old 1.0 was the sub-unity 'leave headroom for unmodeled sinks' framing, which was muddled — cutting the yield never freed O2 for other sinks (the O2 partition lives in the k's, not here). With competition moved to explicit sibling rate constants this is the ethanol route's genuine yield (mid-to-upper coupled-oxidation band). D-74: the D-73 interim caveat is RESOLVED — the always-on PhenolicBrowning sink now diverts the dominant O2 share (k_browning > k_ethanol_oxidation), so ethanol oxidation gets only its ~40% share and aged-with-O2 acetaldehyde partitioned down to ~0.4x the sole-sink estimate (this yield unchanged; the k's moved). The acetaldehyde it produces still binds any dosed SO2 via the D-47 equilibrium for free (SO2 mops up oxidative acetaldehyde — handled by the existing readout)."

# ======================================================================================
# SULFITE OXIDATION (decision D-72, the FIRST oxidative sub-axis sink to claim its share of the
# shared o2 budget opened at D-71). The head of the "SO2 protects until exhausted" threshold.
#
# THE PROCESS (fermentation.core.kinetics.aging.SulfiteOxidation, WINE-ONLY):
#
#   d(o2)/dt        = -k_so2_oxidation * f(T) * [o2] * [HSO3-]        # BILINEAR, Arrhenius
#   d(so2_total)/dt = -2 * (r_o2 / M_O2) * M_SO2                      # 2 mol SO2 per mol O2
#
# where [HSO3-] is the FREE-bisulfite driver (free_SO2 * bisulfite_fraction(pH); acidbase.
# bisulfite_so2_at_ph). SO2 is wine's antioxidant because bisulfite scavenges O2 FASTER than
# ethanol does: competing for the SAME o2 pool (ProcessSet summing, not a new mechanism), the O2 is
# preferentially spent oxidising bisulfite -> sulfate rather than ethanol, so WHILE FREE SO2 LASTS
# oxidative acetaldehyde is suppressed and ONCE IT IS EXHAUSTED acetaldehyde climbs (the celebrated
# threshold, emergent). No new pool: it decrements the existing so2_total slot.
#
# WHY BISULFITE, NOT MOLECULAR SO2 (the D-72 crux). Molecular SO2.H2O is the reactive ANTIMICROBIAL
# form (D-22); the HSO3- anion is the reactive ANTIOXIDANT nucleophile (reduces o-quinones, scavenges
# H2O2 — Danilewicz; acidbase.bisulfite_fraction already names HSO3- "the reactive nucleophile"). At
# wine pH bisulfite is ~0.94-0.99 of free, so the pH-coupling is mild — but a STRONGER coupling
# enters through FREE SO2: as the sibling OxidativeAcetaldehyde makes acetaldehyde, that acetaldehyde
# binds SO2 (D-47), free SO2 falls, and this scavenging self-throttles (the emergent feedback the
# bilinear form buys over a plain SO2-presence gate).
#
# STOICHIOMETRY is a CODE constant, not a parameter (aging.py _SO2_PER_O2 = 2): the Danilewicz
# coupled oxidation spends one bisulfite reducing the o-quinone and one scavenging the H2O2 per O2,
# = 2 mol SO2 : 1 mol O2 = the classic "~4 mg SO2 per mg O2" mass rule. Distinct from D-47 BINDING
# (reversible free<->bound repartition of so2_total): this OXIDISES SO2 to sulfate and removes it,
# so the two do not double-count.
#
# LEDGER. Both o2 (D-71) and so2_total (D-22/D-28) are carbon-free and off every conservation ledger
# (there is no sulfur ledger), so oxidising SO2 to untracked sulfate moves nothing conserved — no
# carbon/mass/nitrogen term, nothing asserted. WINE-ONLY (so2_total + the acid-pH slots are wine-only,
# D-18; wired into the wine medium only, like MLF/Brett), and disabled at compile until begin_aging.
#
# TIER. ALL speculative — the oxidation FORM (O2-limited, bisulfite-driven, warmer-faster, 2:1) is
# sourced, but the rate MAGNITUDE is an order-of-magnitude estimate and the aging axis is the Tier-3
# frontier. The load-bearing SOURCED claims are (1) bisulfite scavenges O2 faster than ethanol (=>
# SO2 protective), (2) the 2:1 stoichiometry, (3) warmer oxidises faster (E_a_so2_oxidation > 0).

# -- BILINEAR O2xBISULFITE SCAVENGING RATE: SO2 out-competes ethanol for O2 ---------------
k_so2_oxidation:
  value: 0.2
  unit: "L/(g*h)"   # d(o2)/dt = -k_so2_oxidation * f(T) * [o2] * [HSO3-]  (bilinear, both g/L)
  tier: speculative
  uncertainty: { low: 0.05, high: 2.0, note: "bimolecular O2xbisulfite rate constant at T_ref = 20 C. The LOAD-BEARING claim is the ORDERING, not the magnitude: at cellar free SO2 (~20-40 mg/L => [HSO3-] ~0.02-0.04 g/L) the pseudo-first-order O2 rate k_so2_oxidation*[HSO3-] ~ 0.004-0.008 /h is ~8-16x the COMBINED always-on O2-depletion rate (k_ethanol_oxidation + k_browning = 5e-4 /h; D-74), so SO2 wins the great majority of the O2 while present. As SO2 depletes the route slows and the always-on sinks (ethanol oxidation + browning) take over — the threshold. Absolute O2-scavenging speed banded loosely (real sulfite autoxidation is metal/o-diphenol-catalysed, days-to-weeks); the threshold is set by STOICHIOMETRY (2:1, mass-limited), robust to this magnitude." }
  provenance:
    source: "author estimate anchored to the ORDERING that free bisulfite is a faster O2 scavenger than ethanol in wine (Danilewicz 2003/2007, oxygen-reduction mechanism; Boulton et al. 1996, Principles and Practices of Winemaking — SO2 protects wine by intercepting the O2/H2O2/quinone oxidation cascade). The bimolecular constant folds the metal/o-diphenol catalysis into k (no explicit catalyst pool tracked in v1, as with k_ethanol_oxidation)."
    conditions: "generic wine at cellar pH/temperature; bilinear in the dissolved-o2 pool and the free-bisulfite driver (free_SO2 * bisulfite_fraction(pH)) at T_ref = 293.15 K."
    notes: "SOURCED FORM (bilinear O2xbisulfite, bisulfite out-competing ethanol for O2 => SO2 protective while present, acetaldehyde suppressed then climbing — the D-72 threshold) + SPECULATIVE magnitude. The mass-limited 2:1 stoichiometry (_SO2_PER_O2, code constant) — not this rate — sets HOW MUCH O2 a given SO2 charge neutralises (~1 mg O2 per ~4 mg SO2); this rate only sets how sharply SO2 wins the competition."

# -- ACTIVATION ENERGY: warmer aging oxidises SO2 faster (sourced ordering) ---------------
E_a_so2_oxidation:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Sulfite autoxidation / wine oxidation activation energies ~30-70 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster SO2 loss to oxidation, so warm storage burns through the protective SO2 faster); the magnitude is speculative and banded. Its OWN parameter (not reused from E_a_ethanol_oxidation) per prime directive #2: sulfite autoxidation is a distinct reaction from ethanol oxidation, so its temperature dependence gets its own provenance entry even though the two bands coincide." }
  provenance:
    source: "SOURCED ORDERING: sulfite autoxidation and the coupled wine-oxidation cascade accelerate with temperature (textbook Arrhenius; wine oxidation activation energies ~30-70 kJ/mol, Danilewicz 2003; Boulton et al. 1996). Warm storage consumes protective SO2 faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2xbisulfite scavenging at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster SO2 oxidation) is the sourced, load-bearing claim. Exact magnitude speculative and banded around a Q10 ~2, mirroring E_a_ethanol_oxidation (the two oxidation reactions have comparable temperature sensitivity), but kept a SEPARATE parameter — distinct reaction, distinct provenance (prime directive #2)."

# ======================================================================================
# PHENOLIC BROWNING (decision D-74, the FIRST *always-on* sink on the shared o2 budget opened at
# D-71 and reworked for always-on sinks at D-73). The oxidative-browning axis: aged wine goes brown.
#
# THE PROCESS (fermentation.core.kinetics.aging.PhenolicBrowning, MEDIUM-AGNOSTIC):
#
#   d(o2)/dt   = -k_browning * f(T) * [o2]                 # first-order in o2, O2-limited, Arrhenius
#   d(A420)/dt = +y_a420_per_o2 * (r_o2 / M_O2)            # optical browning index accumulates
#
# As a finished wine/beer takes up oxygen, dissolved O2 oxidises PHENOLICS (o-diphenols -> o-quinones,
# polymerising to brown melanoidin/quinone pigment) -- the gold->amber->brown of an aged/maderised
# white wine and the oxidative darkening of stale beer. This is the DOMINANT O2 consumer in wine
# oxidation (phenol autoxidation is the primary O2 sink; ethanol oxidation to acetaldehyde is a
# SECONDARY H2O2 fate), so k_browning is the LARGER share of the shared o2 budget and browning
# DIVERTS most of the always-on O2 away from ethanol oxidation, SUPPRESSING oxidative acetaldehyde --
# the always-on analogue of SO2's protection (D-72), but permanent (a co-resident sink, not spent).
#
# THE NEW OBSERVABLE IS AN OPTICAL INDEX, NOT AN AROMA OR A MASS (the D-74 crux). Unlike the other
# three aging Processes, browning moves NO pool the D-67 OAV lens already reads (its product is brown
# pigment -- seen, not smelled), so it needs ONE new observable: A420, the ABSORBANCE at 420 nm
# (dimensionless AU, 1 cm path -- the standard analytical browning measure), NOT a pigment mass. A420
# is a STATE SLOT (the iso_alpha off-ledger-pool pattern), NOT a post-hoc readout like the D-67 OAV
# series: browning pigment is CUMULATIVE and IRREVERSIBLE and its O2 flux is DYNAMIC (SO2 competes,
# temperature varies), so it must be INTEGRATED along the run -- it cannot be reconstructed after the
# fact from (dosed - remaining) O2. Because A420 is an optical index rather than a mass, its carbon
# (which would come from an UNTRACKED phenol pool) is sidestepped by construction: the Process touches
# only {o2, A420}, BOTH off every ledger, so it moves NOTHING conserved (cleaner even than
# OxidativeAcetaldehyde's E->acetaldehyde carbon borrow). d(A420)/dt >= 0 always (monotonic, no clamp).
#
# MEDIUM-AGNOSTIC (D-74 supersedes D-73's provisional "wine-only"). D-73's worked drop-in tentatively
# marked browning "wine (o-diphenols are a wine pool)", but there is NO o-diphenol pool (the catalyst
# is lumped into k_browning, as in k_ethanol_oxidation), and BOTH wine and beer carry autoxidising
# polyphenols that consume O2 and brown -- so browning is a property of the molecules, not the biology,
# and lives in this SHARED file wired into BOTH media (like ethanol oxidation). It is ALSO forced to
# be consistent: the k_ethanol_oxidation reduction lives in this shared file and applies to both media,
# so a wine-only browning sink would leave BEER's total O2-depletion rate silently HALVED below the
# 5.0e-4 anchor -- the exact in-tree inconsistency the D-73 rework existed to remove.
#
# TIER. ALL speculative -- the browning FORM (O2-limited, warmer-faster) is sourced, but the rate
# magnitude and (especially) the per-O2 absorbance yield are order-of-magnitude estimates, and the
# aging axis is the Tier-3 frontier. The load-bearing SOURCED claims are (1) phenol autoxidation is
# the dominant O2 sink (=> k_browning is the LARGER share), and (2) warmer browns faster (E_a > 0).

# -- BROWNING SHARE OF THE O2-DEPLETION RATE (first-order in o2, the DOMINANT always-on sink) ------
# The larger share of the 5.0e-4 always-on total: k_ethanol_oxidation (2.0e-4) + k_browning (3.0e-4)
# = 5.0e-4 holds the calibrated total O2-depletion timescale (the anchor). Same E_a as the ethanol
# route (E_a_browning == E_a_ethanol_oxidation; same coupled-oxidation cascade), so the two shares
# scale together with temperature and the sum is exactly 5.0e-4 * f(T) at EVERY temperature (the
# ethanol:browning partition is thus temperature-INDEPENDENT -- a deliberately conservative choice, not
# a claim that browning and oxidation have identical activation energies; see E_a_browning).
k_browning:
  value: 3.0e-4
  unit: "1/h"   # d(o2)/dt = -k_browning * f(T) * [o2]  (browning route's share of O2 depletion)
  tier: speculative
  uncertainty: { low: 2.0e-4, high: 4.0e-4, note: "browning share of the first-order O2-consumption rate at T_ref = 20 C, ~60% of the 5.0e-4 always-on total (ethanol oxidation the secondary ~40%, k_ethanol_oxidation). Banded ~0.4-0.8x the total: phenol autoxidation is the DOMINANT O2 sink in wine oxidation, but the exact ethanol:browning split is uncertain (both routes are lumped, catalyst folded into k). The load-bearing claim is the ORDERING (k_browning > k_ethanol_oxidation -- browning gets the majority of the O2), NOT the exact fraction; the SUM k_browning + k_ethanol_oxidation = 5.0e-4 preserves the total O2-scavenging timescale regardless of the split." }
  provenance:
    source: "author estimate anchored to the ORDERING that o-diphenol autoxidation is the PRIMARY consumer of dissolved O2 in wine oxidation, ahead of ethanol oxidation (Singleton 1987, oxidation of wines; Danilewicz 2003/2007, oxygen-reduction mechanism -- O2 reacts first with catechols/gallates to o-quinones + H2O2, and only a fraction of that H2O2 goes on to oxidise ethanol; Wildenradt & Singleton 1974). The pseudo-first-order rate constant folds the o-diphenol/Fe/Cu catalyst concentration into k (no explicit phenol pool tracked in v1, as with k_ethanol_oxidation)."
    conditions: "generic wine/beer at cellar pH/temperature; pseudo-first-order in the dissolved-o2 pool at T_ref = 293.15 K, the browning route's (dominant) share of the total depletion (k_browning + k_ethanol_oxidation = 5.0e-4). The catalytic phenol/metal chemistry is lumped into this constant; the per-O2 browning yield is y_a420_per_o2."
    notes: "SOURCED FORM (O2-limited, first-order in the finite O2 pool; browning the DOMINANT always-on O2 sink so it diverts the majority of the O2 from ethanol oxidation, suppressing acetaldehyde -- the always-on analogue of the D-72 SO2 threshold) + SPECULATIVE magnitude. Load-bearing sourced claims: (1) phenol autoxidation > ethanol oxidation for O2 (=> k_browning > k_ethanol_oxidation), (2) warmer browns faster (E_a_browning). The 5.0e-4 total is the anchor; this share and k_ethanol_oxidation partition it (D-74, the always-on sink D-73 enabled)."

# -- ACTIVATION ENERGY: warmer aging browns faster (sourced ordering) ---------------------
E_a_browning:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Wine oxidative-browning activation energies ~30-70 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster browning, so warm/hot storage maderises and browns wine faster); the magnitude is speculative and banded. Set EQUAL to E_a_ethanol_oxidation (50 kJ/mol): browning and ethanol oxidation are the SAME coupled-oxidation cascade (O2 -> o-quinone + H2O2 -> pigment / ethanol -> acetaldehyde), so equal E_a is the honest default and keeps the ethanol:browning O2-partition temperature-INDEPENDENT (the 5.0e-4 total scales cleanly as 5.0e-4 * f(T)). A distinct (higher) browning E_a -- maderization is arguably more T-sensitive -- was considered and NOT adopted: it would encode a partition-shift direction that is not clearly sourced, and is not needed (the A420 observable already makes browning non-degenerate; a y-cut produces no A420)." }
  provenance:
    source: "SOURCED ORDERING: wine oxidative browning accelerates with temperature (textbook Arrhenius; measured browning/oxidation activation energies ~30-70 kJ/mol, e.g. Singleton 1987; the coupled-oxidation cascade is temperature-driven). Warm storage browns/maderises wine faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2-consuming phenol autoxidation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster browning) is the sourced, load-bearing claim -- why warm/hot storage browns (maderises) wine faster and cold cellars preserve colour. Its OWN parameter (not reused from E_a_ethanol_oxidation) per prime directive #2: browning is a distinct reaction from ethanol oxidation, so it gets its own provenance entry even though the value coincides (the E_a_so2_oxidation precedent). Value set EQUAL to the ethanol-oxidation E_a deliberately: same coupled-oxidation cascade => temperature-independent O2 partition, so k_browning + k_ethanol_oxidation = 5.0e-4 * f(T) exactly at every T (not just T_ref)."

# -- PER-O2 BROWNING YIELD: how much A420 absorbance one mol of browning-route O2 builds ----------
# A420 is an OPTICAL INDEX (dimensionless absorbance units, 1 cm path), NOT a concentration -- so this
# yield is AU per (mol O2 / L), i.e. AU*L/mol. Highly speculative: A420-per-O2 is not a tabulated
# quantity; this is an author estimate anchored to observed white-wine A420 ranges (fresh ~0.05-0.1
# AU; browned/oxidised ~0.3-0.6 AU) against a plausible cumulative O2 exposure. A ~40 mg/L O2 dose,
# of which browning takes ~60% (~24 mg/L = 7.5e-4 mol/L O2), x 500 AU*L/mol => dA420 ~ 0.37 AU -- a
# clearly-browned wine, in range. Banded widely; the LOAD-BEARING claim is only that browning is
# VISIBLE and monotonic, not this magnitude (the aging axis is the Tier-3 frontier).
y_a420_per_o2:
  value: 500.0
  unit: "AU*L/mol"   # d(A420)/dt = y_a420_per_o2 * (r_o2 / M_O2);  A420 in AU, r_o2/M_O2 in mol/L/h
  tier: speculative
  uncertainty: { low: 250.0, high: 1000.0, note: "AU of 420 nm absorbance (1 cm path) built per mol O2 consumed by the browning route. Anchored to white-wine browning ranges (fresh A420 ~0.05-0.1; oxidised/maderised ~0.3-0.6+) over a plausible cumulative O2 exposure: ~24 mg/L O2 to browning (60% of a 40 mg/L dose) => 7.5e-4 mol/L, x [250,1000] => dA420 ~ 0.19-0.75 AU, spanning lightly-to-heavily browned. Highly speculative (A420-per-O2 is not a standard tabulated quantity, and it lumps all phenolic browning chemistry); banded an order of magnitude. Only the monotonic VISIBLE browning is load-bearing, not the exact absorbance." }
  provenance:
    source: "author estimate: no standard tabulated A420-per-O2 exists, so this is anchored to the observed white-wine browning index range (A420 at 420 nm, 1 cm; Singleton 1987 and standard enology practice: fresh white ~0.05-0.1 AU, oxidised/browned ~0.3-0.6+ AU) divided by a plausible cumulative browning-route O2 exposure. Lumps the whole o-quinone -> melanoidin/xanthylium pigment-forming chemistry into a single per-O2 absorbance coefficient (no phenol/pigment speciation tracked in v1)."
    conditions: "AU of A420 (dimensionless absorbance, 1 cm path) per mol O2 consumed by the browning route, generic wine/beer at T_ref = 293.15 K. Beer browning (oxidative staling darkening) is the same o-diphenol autoxidation, less dominant than in white wine; the same coefficient is used medium-agnostically as an order-of-magnitude stand-in."
    notes: "SPECULATIVE magnitude (the most speculative parameter in this file -- an order-of-magnitude author estimate for an untabulated quantity, banded an order of magnitude). The load-bearing claim is only that oxidative aging produces VISIBLE, monotonic browning (A420 climbs with O2 exposure) -- not the exact absorbance. A420 is an optical index off every ledger, so this yield moves nothing conserved (the pigment's carbon comes from an untracked phenol pool -- sidestepped by using an absorbance, not a mass)."

# ======================================================================================
# STRECKER DEGRADATION (decision D-75, the WINE-ONLY, SUBSTRATE-GATED oxidative aging sink that
# produces the Strecker aldehydes). The oxidative-aroma axis: aged wine smells of cooked potato +
# honey.
#
# THE PROCESS (fermentation.core.kinetics.aging.StreckerDegradation, WINE-ONLY):
#
#   gate       = amino_acids / (K_amino_acids + amino_acids)              # smooth availability, [0,1)
#   d(o2)/dt   = -k_strecker * f(T) * [o2] * gate                         # O2-limited, aa-gated
#   n_ald      = y_strecker_per_o2 * (r_o2 / M_O2)                        # mol total aldehyde /L/h
#   d(methional)/dt          = +f_methional     * n_ald * M_methional     # the cooked-potato share
#   d(phenylacetaldehyde)/dt = +(1-f_methional) * n_ald * M_phenylacetaldehyde  # the honey share
#   d(CO2)/dt      = +n_ald * M_CO2                                       # 1 CO2 per aldehyde (decarb)
#   d(<precursor>)/dt = -(that route's carbon rate) / c_<precursor>       # methionine -> methional,
#                                                                         # phenylalanine -> PAA (D-100)
#   d(N)/dt           = +(that precursor mass) * y_N_<precursor>          # DEAMINATION -> ammonium
#
# As a finished wine takes up oxygen, the o-quinones of phenol autoxidation (the PhenolicBrowning
# cascade, D-74) oxidatively deaminate + decarboxylate amino acids to STRECKER ALDEHYDES: methional
# (from methionine, "cooked potato" -- the classic OXIDATIVE off-note) and phenylacetaldehyde (from
# phenylalanine, "honey/floral" -- pleasant). These are aroma compounds the D-67 OAV lens did NOT
# previously read (no existing pool), so -- unlike ester hydrolysis / oxidative acetaldehyde -- this
# beat adds TWO new observable pools (owner fork D-75: two pools, not one lumped, since the two
# aldehydes have OPPOSITE sensory valence).
#
# SUBSTRATE-GATED, ADDS ON TOP -- NO RE-BASELINE (the D-75 crux, superseding the D-71..D-74 forward-
# guess). D-71..D-74 forecast Strecker as "the next ALWAYS-ON O2 sink -- reduce k_ethanol_oxidation
# again to its share." That guess assumed a significant, medium-agnostic sink. It is WRONG for
# Strecker: gating the O2 draw on amino_acids makes Strecker DOUBLY substrate-gated (on o2 AND
# amino_acids), exactly like SulfiteOxidation (o2 AND SO2). D-72 established the load-bearing rule --
# a substrate-gated sink adds on top WITHOUT any re-baseline (zero without its substrate => the
# default/beer trajectory is byte-for-byte preserved). So k_ethanol_oxidation + k_browning = 5.0e-4
# is UNTOUCHED; k_strecker is a small wine-only draw that only fires when amino_acids is present
# (dosed nutrient, or -- future -- lees autolysis refill). "Trace" is only the secondary reassurance
# that even at full aa gate the extra draw is within the anchor band.
#
# THE INHERITED QUINONE DOUBLE-COUNT LUMP (documented, not fixed). Mechanistically the O2 is consumed
# at the phenol-oxidation step (browning's draw), making o-quinones that then do the Strecker
# deamination (the quinone acting as the oxidant, regenerated). A separate k_strecker [o2] draw thus
# formally DOUBLE-COUNTS the shared quinone step. But browning and ethanol-oxidation ALREADY
# double-count it against each other (both independent [o2] draws for one coupled cascade) -- the
# additive-share v1 lump accepted at D-73. Strecker following suit is CONSISTENT; a two-stage
# (O2 -> quinone pool -> {pigment, aldehyde, acetaldehyde}) rework is deliberately OUT OF SCOPE for
# v1 (it is a larger structural beat). SCOPE: this is the OXIDATIVE (quinone-driven) Strecker route
# only; the non-oxidative Maillard/sugar-dicarbonyl route (sweet wines, thermal) is deferred, which
# keeps Strecker honestly on the o2 sub-axis.
#
# LEDGERS. o2 is off every ledger (D-71); the amino-acid draw + deamination is the EXACT D-45
# mercaptans idiom (carbon from the precursor amino acid, nitrogen deaminated to N, product N-free),
# extended with a CO2 decarboxylation term. CARBON closes to machine precision: C out of EACH
# precursor == C into the aldehyde it made + its own carboxyl CO2 (each draw is sized to match, the
# EsterHydrolysis multi-product split idiom). NITROGEN closes: all precursor N -> N pool, products
# N-free. Since D-100 each route draws the amino acid its chemistry actually names -- METHIONINE for
# methional, PHENYLALANINE for phenylacetaldehyde -- so the pre-D-100 arginine stand-in, exact on the
# ledger but approximate on provenance, is RETIRED here and in mercaptans (D-45) alike: every
# amino-acid-drawing Process now names its real precursor.
# TIER consequence (the D-45 note): Strecker WRITES N (deamination), so
# an enabled run drops structural tier_of("N") PLAUSIBLE->SPECULATIVE. total_mass ({S,E,CO2}) sees
# the CO2 term with no matching S/E debit, but it is never asserted on an aging run (aroma pools
# active) -- the standing OxidativeAcetaldehyde scope-out. WINE-ONLY (amino_acids + N-deamination
# read wine-only slots), disabled at compile until begin_aging.
#
# TIER. ALL speculative -- the Strecker FORM (O2-linked, amino-acid-driven, warmer-faster, aldehyde
# = amino acid minus CO2) is sourced, but every magnitude is an order-of-magnitude estimate and the
# aging axis is the Tier-3 frontier. Load-bearing SOURCED claims: (1) Strecker aldehydes are the
# markers of oxidative aging/staling, (2) they need both O2 (via quinones) and amino acids, (3)
# warmer ages faster (E_a > 0).

# -- STRECKER O2-DRAW RATE CONSTANT (first-order in o2, additionally aa-gated) ------------
# A SMALL wine-only ADD-ON sink (NOT part of the 5.0e-4 always-on anchor -- substrate-gated, so it
# adds on top like SulfiteOxidation, D-72). Its O2 draw is throttled by the amino_acids availability
# gate aa/(K_amino_acids+aa), so at cellar residual-aa levels (~tens of mg/L) it is a minor
# perturbation to the total O2 budget -- within the anchor's own uncertainty band. Strecker aldehydes
# are a minor O2 fate vs visible browning, so this is deliberately well below k_browning/k_ethanol.
k_strecker:
  value: 1.0e-5
  unit: "1/h"   # d(o2)/dt = -k_strecker * f(T) * [o2] * gate  (Strecker route's aa-gated O2 draw)
  tier: speculative
  uncertainty: { low: 3.0e-6, high: 5.0e-5, note: "Strecker-route O2-draw constant at T_ref = 20 C, at FULL amino-acid availability (gate -> 1). ~2% of the 5.0e-4 always-on total, but substrate-gated on amino_acids so the realised draw at cellar residual-aa (~10-40 mg/L => gate ~0.1-0.3) is well under 1% of the O2 -- a minor add-on, NOT re-baselined into the anchor (unlike browning, D-74). CALIBRATED to land the produced aldehydes in the observed oxidised-white-wine range (D-75 follow-up, advisor-flagged): at a 40-60 mg/L O2 + ~0.5 g/L amino-acid dose this gives phenylacetaldehyde ~tens-to-~100 µg/L (honey; can reach hundreds in strongly oxidised/botrytized whites) and methional ~single-digit-to-tens µg/L (the potent low-µg/L oxidative marker), both OAV-positive -- NOT the ~350 µg/L methional the pre-calibration 5.0e-5 x 0.6-split gave. The amino_acids pool is the true limiting reagent (finite dosed/lees-derived aa => finite aldehyde)." }
  provenance:
    source: "author estimate anchored to the ORDERING that Strecker aldehyde formation is a MINOR fate of the oxidative O2 flux (secondary to phenol autoxidation/browning and to ethanol oxidation), gated on amino-acid availability (Escudero et al. 2000, 2002 on oxidation-derived aldehydes in wine aroma; the Strecker mechanism requires both an alpha-dicarbonyl -- here the phenol-oxidation o-quinone -- and an amino acid). Folds the quinone/dicarbonyl catalyst into k (no dicarbonyl pool tracked in v1, as with k_browning/k_ethanol_oxidation)."
    conditions: "generic wine at cellar pH/temperature; pseudo-first-order in the dissolved-o2 pool, additionally gated by the amino-acid availability fraction aa/(K_amino_acids+aa), at T_ref = 293.15 K. A wine-only ADD-ON sink (substrate-gated, not part of the k_ethanol_oxidation + k_browning = 5.0e-4 anchor)."
    notes: "SOURCED FORM (O2-limited AND amino-acid-gated => doubly substrate-gated, warmer-faster) + SPECULATIVE magnitude. Load-bearing sourced claims: Strecker aldehydes are the oxidative-aging markers and require BOTH O2 (via quinones) and amino acids. This is deliberately a SMALL add-on (not re-baselined into the anchor) -- the D-75 correction to the D-71..D-74 'reduce k_ethanol again' forward-guess, which wrongly assumed a significant medium-agnostic sink."

# -- ACTIVATION ENERGY: warmer aging forms Strecker aldehydes faster (sourced ordering) ---
E_a_strecker:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Strecker degradation / oxidative-staling activation energies ~30-70 kJ/mol (beer staling aldehyde formation is strongly temperature-accelerated). The SOURCED, load-bearing claim is the SIGN (warmer => faster Strecker aldehyde accumulation, so warm storage stales/oxidises faster); the magnitude is speculative and banded. Its OWN parameter (not reused from E_a_browning) per prime directive #2: Strecker degradation is a distinct reaction, so it gets its own provenance entry even though the band coincides with the other oxidative E_a's." }
  provenance:
    source: "SOURCED ORDERING: Strecker degradation and oxidative staling accelerate with temperature (textbook Arrhenius; beer-staling aldehyde formation is a canonical warm-storage marker -- e.g. methional, 2-/3-methylbutanal rise with temperature and time). Warm storage stales/oxidises faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate quinone-driven Strecker degradation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster Strecker aldehydes) is the sourced, load-bearing claim. Exact magnitude speculative and banded around a Q10 ~2, mirroring the other oxidative E_a's, but kept a SEPARATE parameter -- distinct reaction, distinct provenance (prime directive #2, the E_a_so2_oxidation / E_a_browning precedent)."

# -- STRECKER ALDEHYDE YIELD: mol total aldehyde per mol O2 consumed by the Strecker route -
y_strecker_per_o2:
  value: 0.5
  unit: "mol/mol"   # total Strecker aldehyde (methional + phenylacetaldehyde) per O2 consumed by the route
  tier: speculative
  uncertainty: { low: 0.1, high: 1.5, note: "mol total Strecker aldehyde per mol O2 the Strecker route consumes. Lumps the quinone-mediated stoichiometry (one O2 -> one o-quinone can deaminate roughly one amino acid in the coupled scheme, but the realised yield depends on competing quinone fates -- pigment polymerisation, reduction). Central 0.5 is a mid-band estimate; the aldehyde level lands strongly OAV-positive across the whole band (the amino_acids cap and the ~0.5-1 µg/L thresholds are what matter, not this exact yield)." }
  provenance:
    source: "author estimate from the Strecker stoichiometry (one alpha-dicarbonyl -- here an o-quinone from one O2 -- deaminates + decarboxylates one amino acid to one aldehyde + CO2), discounted for the competing quinone fates (browning polymerisation, re-reduction) that keep the realised per-O2 aldehyde yield well below 1 (Escudero et al. 2000; Rizzi 2006 Strecker mechanism review)."
    conditions: "mol total Strecker aldehyde per mol O2 consumed by the Strecker route, generic wine; split between methional and phenylacetaldehyde by f_methional, at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude. The per-O2 yield lumps the quinone-mediated Strecker stoichiometry; the amino_acids pool is the hard cap on total aldehyde (finite aa => finite aldehyde), so this yield sets the RATE of approach to that cap, not the ceiling."

# -- ALDEHYDE COMPOSITION: methional (cooked-potato) mol share of the Strecker output ------
# The mol fraction of the Strecker aldehyde output that is methional; the remainder (1 - f_methional)
# is phenylacetaldehyde (honey). This is a PRODUCTION quantity -- the relative methionine- vs
# phenylalanine-derived Strecker FLUX (amino-acid abundance x reactivity) -- NOT a perceptibility
# quantity (potency is already carried by the per-compound thresholds in the OAV, so folding it in
# here would DOUBLE-COUNT it -- the D-75 follow-up correction). Phenylalanine is one of the MORE
# abundant amino acids in grape must while methionine is typically a MINOR one, so the flux favours
# phenylacetaldehyde => f_methional < 0.5 (methional the minority product). NOT a stoichiometric
# constant (contrast the EsterHydrolysis 5:2 carbon split, fixed by a named reaction) -- an empirical
# composition estimate, so a YAML parameter.
f_methional:
  value: 0.15
  unit: "1"   # mol fraction methional of total Strecker aldehyde (rest -> phenylacetaldehyde)
  tier: speculative
  uncertainty: { low: 0.05, high: 0.35, note: "methional mol share of the Strecker aldehyde output; the rest is phenylacetaldehyde. Phenylacetaldehyde-DOMINANT (central 0.15) because the split is set by amino-acid FLUX (abundance x reactivity), and phenylalanine is one of the more abundant must amino acids while methionine is a minor one -- so most of the Strecker flux goes to phenylacetaldehyde. (An earlier 0.6 was WRONG: it justified methional-dominance by its lower ~0.5 µg/L threshold, but potency belongs in the OAV threshold, not the production split -- a double-count, corrected here.) The exact ratio is must-composition-dependent; band spans phenylacetaldehyde-dominant to roughly-even. NOT RE-ANCHORED AT D-100, deliberately: precursor abundance is now modelled explicitly (must_aa_fraction_methionine / _phenylalanine), so this split's abundance half is in principle DERIVABLE rather than estimated — met/(met+phe) ≈ 0.136 from the sourced spectrum, close to this 0.15 but NOT equal, and equating them would silently assert methionine:phenylalanine Strecker REACTIVITY = 1, which is not sourced. Deriving it is queued as its own beat; until then this stays an independent estimate and the two abundance stories are free to drift (an ensemble sampling both bands asserts both)." }
  provenance:
    source: "author estimate of the relative phenylalanine- vs methionine-derived Strecker flux. Phenylalanine is consistently among the most abundant amino acids in grape must (tens+ mg/L) while methionine is a minor sulfur amino acid (low mg/L) -- so oxidation-derived phenylacetaldehyde generally exceeds methional in must-derived Strecker degradation (Escudero et al. 2000, 2002; Ferreira -- both aldehydes are the dominant oxidation-derived Strecker markers of aged white wine, with methional the potent low-µg/L trace and phenylacetaldehyde reaching tens-to-hundreds of µg/L)."
    conditions: "generic wine; mol fraction of the lumped Strecker aldehyde output booked as methional (C4H8OS) vs phenylacetaldehyde (C8H8O), at T_ref = 293.15 K. Since D-100 each route draws its REAL precursor (methionine / phenylalanine) and each is gated on its own pool, so this split is literal methionine:phenylalanine chemistry — the pre-D-100 arginine-lump caveat is retired. The split itself remains an estimate of abundance x reactivity (see the uncertainty note)."
    notes: "SPECULATIVE magnitude. Sets the BALANCE between phenylacetaldehyde's honey note (the majority product) and methional's cooked-potato off-note (opposite sensory valence -- the reason the owner chose TWO pools over one lump, D-75). The split is PRODUCTION flux only; per-compound perceptibility lives in threshold_methional_wine / threshold_phenylacetaldehyde_wine (so it is not double-counted here). Off the stoichiometric-constant track (contrast the 5:2 ester split): an empirical composition estimate, hence a YAML parameter."
