    source: "author estimate anchored to ellagitannin (vescalagin/castalagin and related hydrolysable tannins, ~tens-to-hundreds mg/L) levels in oak-aged wine and to the TOAST ORDERING (Chatonnet et al. barrel-toast studies; Cadahia et al. on ellagitannin degradation with oak toasting): ellagitannin is HIGHEST in light/untoasted oak and DEGRADES with heavier toast (thermolysis of the hydrolysable tannin), the SAME declining direction as whiskey lactone and the INVERSE of the guaiacol/eugenol pyrolysis phenols."
    conditions: "g ellagitannin (gallic/ellagic-acid-equivalent, lumped) extractable per g oak at LIGHT toast; * oak_gpl => the saturation ceiling (g/L) at T_ref = 293.15 K"
