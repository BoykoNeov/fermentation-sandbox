  tier: speculative
  uncertainty: { low: 6.0e-7, high: 8.0e-6, note: "furaneol at MEDIUM toast — rising as toasting caramelizes/degrades the wood sugars; ~8 ug/L ceiling at 4 g/L oak, clearly over the ~4-5 ug/L threshold (a real medium-toast caramel note, OAV ~2 beer — in the oak-sibling band)." }
  provenance:
