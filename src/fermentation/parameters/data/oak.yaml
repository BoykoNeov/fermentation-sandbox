# Oak extraction — the barrel/chip aroma-extractive aging axis (decision D-77, §4.1).
#
# SHARED across BOTH media (decision D-86, barrel-beer oak): like aging.yaml this file is medium-
# agnostic in its names (collision-free) and merged into every compiled scenario's ParameterSet at
# compile.py's shared_files. As of D-86 BOTH wine and beer carry the oak state slots (via
# core.media._oak_specs) and wire OakExtraction + EllagitanninOxidation, so these params drive oak
# extraction on either medium. Oak extraction is a WOOD property (these yields are g-extractive-per-
# g-oak, matrix-independent); only the OAV PERCEPTION thresholds are matrix-specific (sensory.yaml's
# threshold_<compound>_beer vs _wine). Barrel-aged beer (bourbon-barrel stouts, oak-aged sours,
# foeder-aged beer) extracts the same aroma four + ellagitannin the wine axis does.
#
# THE PROCESS (fermentation.core.kinetics.aging.OakExtraction, WINE + BARREL-BEER — D-86):
#
#   d(C_i)/dt = k_oak_extraction * f(T) * max(0, ceiling_i - C_i)   # per extractive i
#
# a FIRST-ORDER APPROACH FROM BELOW to a per-compound saturation ceiling — the exact inverse of
# EsterHydrolysis's `max(0, esters - isoamyl_acetate_eq)` net decay toward a floor. As a finished wine sits
# in oak (barrel or chips/staves), four wood extractives diffuse into the wine and rise toward a
# ceiling set by the oak-contact dose and toast level: WHISKEY LACTONE (cis/trans β-methyl-γ-
# octalactone, "coconut", the signature oak-lactone note, LIGHT-toast dominant), VANILLIN
# ("vanilla", from lignin, MEDIUM-toast peak), GUAIACOL ("smoky/toasty", a lignin-pyrolysis phenol,
# HEAVY-toast dominant) and EUGENOL ("clove/spice", HEAVY-toast). Each is a NEW aroma pool the D-67
# OAV lens did not previously read (2 -> 4 new wine slots + 4 thresholds).
#
# THE CEILING IS SET AT THE DOSE, NOT HERE. add_oak {oak_gpl, toast} computes each ceiling as
# `oak_gpl * oak_yield_<compound>_<toast>` (g extractive / L) and writes it to a SET-AND-HOLD
# ceiling state slot (the cation_charge idiom — constant state no Process touches, only the verb
# writes). So this file holds the PHYSICS (the shared rate + activation energy + the toast-specific
# per-gram yields); the scenario supplies the DOSE. Un-dosed => every ceiling is 0 => the Process is
# byte-for-byte inert (the ceiling<=0 guard), so a begin_aging run with no add_oak is byte-for-byte
# the case without oak (prime directive #3), exactly like an un-oxygenated aging is the reductive case.
#
# THE FOUR AROMA EXTRACTIVES ARE A SEPARATE AXIS, NO O2 (the D-77 scope). OakExtraction itself is
# DIFFUSION-driven, not oxidation-driven: it consumes NO o2, draws no share of the shared O2 budget,
# and is orthogonal to the browning/acetaldehyde/SO2/Strecker competition. It touches ONLY the
# extracted-compound slots — OFF EVERY LEDGER (exogenous WOOD-derived mass, like the hop-derived
# iso_alpha, D-64; the extractives' carbon comes from an UNTRACKED oak source, so booking it as a
# mass would demand a wood carbon pool that does not exist). So OakExtraction moves NOTHING conserved
# — total_carbon/total_mass/total_nitrogen all stay flat (cleaner even than PhenolicBrowning, which
# at least reads o2). Pure g/L transfer, so — like iso_alpha — it needs no chemistry.py species
# registration (no molar-mass conversion in the RHS).
#
# ELLAGITANNIN — THE BRIDGE TO THE O2 SUB-AXIS (decision D-78). D-77 deferred ellagitannins precisely
# because they are NOT purely diffusion-axis: oak's hydrolysable tannins are DIFFUSION-extracted like
# the aroma four (OakExtraction rises a fifth extractive toward its ceiling), but they are ALSO potent
# O2 SCAVENGERS — a sacrificial antioxidant reservoir that intercepts dissolved O2, PROTECTING the
# wine (the barrel-aging / micro-oxygenation reality). So a SECOND, oxidative Process
# (EllagitanninOxidation) draws the ellagitannin's share of the shared o2 budget (bilinear in o2 and
# the ellagitannin pool, the SulfiteOxidation form) and CONSUMES the tannin as it scavenges. The
# emergent payoff — the D-78 spine — is oak PROTECTION: an oaked + oxygenated wine browns LESS (lower
# A420) and accumulates LESS oxidative acetaldehyde than an un-oaked wine at the same O2 dose, exactly
# the D-72 "SO2 protects" threshold with a renewable buffer. Ellagitannin is thus the ONE oak
# extractive that bridges the diffusion axis to the O2 sub-axis; the aroma four remain O2-orthogonal.
# It also carries ASTRINGENCY — a TASTE, read out by analysis.astringency_series (the iso_alpha/IBU
# precedent), NOT the D-67 OAV odor lens. Both ellagitannin slots are OFF EVERY LEDGER (wood-derived),
# so EllagitanninOxidation — like SulfiteOxidation — moves nothing conserved (mass-based consumption
# yield y_ellag_per_o2, no fake molar mass for the lumped macromolecule). Its O2 draw is
# SUBSTRATE-GATED on the ellagitannin pool (zero unless oak is dosed), so — the D-72/D-75 rule — it
# adds on top of the anchor with NO re-baseline of k_ethanol_oxidation + k_browning_base = 5.0e-4.
#
# SCOPE (v1), flagged loudly:
#   * ELLAGITANNIN astringency SOFTENING here is the OXIDATIVE-CONSUMPTION contributor ONLY (the
#     sacrificial tannin is spent scavenging O2, so the pool — and the astringency — declines). The
#     DOMINANT real softening mechanism, tannin–anthocyanin CONDENSATION/POLYMERIZATION (red-wine
#     colour + astringency evolution), is the SEPARATE deferred beat the milestone plan names — the
#     `tannin` namespace is left free for it. This beat does NOT claim to reproduce astringency
#     softening, only one directional contributor to it.
#   * ELLAGITANNIN as an O2 buffer is RENEWABLE, not finite like SO2: while the wine is below the
#     ceiling the wood keeps re-supplying tannin as fast as O2 burns it (OakExtraction's approach
#     term), so oak buffers redox for months-to-years — an oaked+oxygenated wine's acetaldehyde may
#     never climb (contrast SO2, whose protection ENDS at exhaustion). This is physically correct (a
#     barrel is a large tannin reservoir); the eventual WITHIN-FILL wood exhaustion (the reservoir
#     depleting as one fill ages) is the deferred finite-reservoir refinement — distinct from D-91's
#     ACROSS-FILL fill_number, which lowers the STARTING ceilings of a reused barrel at dose time but
#     does not draw them down dynamically. k_ellagitannin_oxidation is banded so suppression is PARTIAL
#     (ellagitannin does not monopolize the O2 — oaked wines still show SOME oxidative character).
#   * oak_gpl is the GENERALIZED oak-contact dose, subsuming chips-g/L and barrel surface-to-volume
#     ratio (higher S:V or more chips => more contact => proportionally higher ceilings — the
#     ceilings scale LINEARLY with oak_gpl). BARREL AGE / FILL NUMBER (a used barrel extracts less)
#     is now MODELLED (D-91): add_oak's fill_number applies the ceiling multiplier < 1 this note
#     anticipated (oak_fill_retention ** (fill_number - 1)), an across-fill DOSE input (see below).
#   * SHARED k_oak_extraction across all four compounds this beat — the ceilings carry the toast
#     PROFILE (which compound dominates), the rate is common. Per-compound extraction rates (lactone
#     is slower than vanillin in reality) are a documented refinement, not this beat.
#   * WHISKEY LACTONE is a single lumped pool (cis + trans isomers together) — the cis/trans split
#     (different thresholds) is beyond Tier-3.
#
# TIER. ALL speculative — the extraction FORM (first-order diffusion-limited approach to a
# saturation ceiling, warmer-faster) is sourced, but every magnitude (rate, activation energy, and
# especially the toast-specific yields) is an order-of-magnitude author estimate, and the aging axis
# is the Tier-3 frontier. The Process floors its outputs at speculative regardless of input tiers
# (parameter-tier propagation, D-1). Load-bearing sourced claims: (1) oak yields these extractives
# with the stated TOAST ORDERING (lactone light -> vanillin medium -> guaiacol/eugenol heavy;
# ellagitannin DECLINES with toast, light > medium > heavy — thermolabile, degraded by toasting, so
# heavy-toast barrels are rounder/less astringent, D-78), (2) extraction approaches a ceiling
# (diffusion-limited, saturating), (3) warmer extracts faster (E_a > 0, but WEAKLY — diffusion, see
# below), and — for the ellagitannin O2-scavenging Process (D-78) — (4) ellagitannin is a faster O2
# scavenger than ethanol (=> it PROTECTS the wine), consumed sacrificially as it does so.

# -- FIRST-ORDER EXTRACTION RATE: extractives diffuse into the wine toward the ceiling ----------
k_oak_extraction:
  value: 5.0e-4
  unit: "1/h"   # d(C_i)/dt = k_oak_extraction * f(T) * max(0, ceiling_i - C_i)
  tier: speculative
  uncertainty: { low: 2.0e-4, high: 2.0e-3, note: "first-order approach rate at T_ref = 20 C => half-life to the ceiling ln2/k ~ 350-3500 h (~2 weeks to ~5 months) for the gap below the ceiling — the observed timescale over which barrel/chip aroma extractives build toward their plateau. Shared across the four compounds (the ceilings carry the toast profile); per-compound rates are a documented refinement." }
  provenance:
    source: "author estimate anchored to the timescale over which oak aroma compounds are extracted into wine in barrel/chip aging (barrel-aging and oak-chip contact studies — e.g. Spillman, Sefton & Gawel 2004; whiskey-lactone/vanillin extraction rises over weeks-to-months then plateaus as the accessible wood is exhausted)."
    conditions: "generic wine at cellar temperature; first-order in the gap (ceiling - concentration), shared across all four extractives, at T_ref = 293.15 K. The wood-diffusion physics is lumped into this single constant."
    notes: "SOURCED FORM (first-order diffusion-limited approach to a saturation ceiling => SATURATING extractive, not unbounded) + SPECULATIVE magnitude (order-of-magnitude, banded to the weeks-to-months barrel-extraction timescale). The load-bearing sourced claim is that extraction SATURATES (approaches a ceiling), not this absolute rate."

# -- BARREL FILL-NUMBER DEPLETION: a reused barrel extracts LESS (decision D-91) ----------------
# A barrel is a DEPLETING oak source: each successive fill draws down the wood's accessible
# extractable pool, so a second-/third-/fourth-fill barrel sets LOWER saturation ceilings than a
# fresh first-fill one from the same oak_gpl/toast. The add_oak verb multiplies every ceiling by
#   oak_fill_retention ** (fill_number - 1)
# so fill_number = 1 (a fresh, first-fill barrel) is UNSCALED (r**0 = 1, byte-for-byte the pre-D-91
# behaviour) and each prior fill geometrically discounts the extractables. This is an ACROSS-FILL
# DOSE INPUT (barrel history known when the oak is charged), NOT a within-fill dynamic reservoir
# OakExtraction draws down — the documented fill-number scope; the mechanistic finite-reservoir
# model (depletion emergent from cumulative extraction) is the deferred refinement. SHARED across
# both media (D-86): fill-number depletion is a WOOD property, and it is the signature lever of
# barrel-aged BEER programs (a first-fill bourbon barrel for the imperial stout, then the neutralised
# barrel for a sour where fresh oak would overwhelm). Per-compound retention (the lipophilic whiskey
# lactone persists across MORE fills than the readily-leached ellagitannin) is a documented
# refinement — one shared retention this beat, matching the single-shared-k_oak_extraction discipline.
# SCOPE: this is oak-EXTRACTABLE depletion only. A first-fill bourbon/whiskey barrel's residual-
# SPIRIT soak-back (vanilla/oak/ethanol leached from the spirit itself, not the wood) is a SEPARATE
# contribution, out of scope here (deferred) — "first oak fill" (full wood extractables) is not the
# same as "first-fill ex-bourbon barrel" (wood + spirit soak-back).
oak_fill_retention:
  value: 0.5
  unit: "1"   # dimensionless fraction of extractables retained per PRIOR fill; ceiling *= r**(fill-1)
  tier: speculative
  uncertainty: { low: 0.3, high: 0.7, note: "fraction of the accessible oak extractable pool a barrel retains for the NEXT fill. The SOURCED, load-bearing claim is the ORDERING and the observable it reproduces: barrels go effectively NEUTRAL by roughly the 4th-5th fill (winemaker/brewer barrel-management practice — first-fill barrels impart the most oak, and a barrel is treated as neutral after ~3-4 uses). r = 0.5 lands that (fill 3 -> 0.5**2 = 0.25, fill 4 -> 0.125, fill 5 -> 0.06 of a fresh barrel); r = 0.3 neutralises faster, r = 0.7 slower. Geometric per-fill discount is the simplest form consistent with monotone-decreasing reuse; the magnitude is a banded author estimate." }
  provenance:
    source: "author estimate anchored to the well-established ORDERING that oak barrels deplete with reuse — first-fill barrels impart the most oak character and a barrel is managed as effectively neutral after ~3-5 fills (standard cooperage/winemaking/barrel-aged-beer practice; e.g. first-use vs neutral-barrel programs in barrel-aged sour and stout production). The geometric per-fill retention lumps the wood's diminishing accessible extractable pool into one fraction."
    conditions: "dimensionless; multiplies every add_oak saturation ceiling by oak_fill_retention ** (fill_number - 1) at dose time, generic oak barrel, shared across both media (wood property)."
    notes: "SOURCED ORDERING (barrels deplete with reuse; neutral by ~4th-5th fill) + SPECULATIVE magnitude (banded 0.3-0.7). Geometric ACROSS-FILL discount at the dose (a barrel-history input), NOT a within-fill dynamic reservoir (the deferred mechanistic refinement). One shared retention across all five extractives (per-compound retention deferred). Off every ledger like the ceilings it scales (wood-derived, iso_alpha precedent) — moves nothing conserved."

# =============================================================================================
# BOURBON-BARREL SPIRIT SOAK-BACK: an ex-spirit barrel donates residual ETHANOL (decision D-92).
#
# A first-fill ex-bourbon (or whiskey/rum) barrel's staves are soaked with several litres of
# residual high-ABV spirit ("the devil's cut" — spirit absorbed into the wood plus wet-barrel
# residue). When the barrel is filled with beer/wine, that residual spirit leaches BACK OUT into
# the beverage, RAISING its ABV — the signature "a bourbon-barrel imperial stout gains ~1% ABV
# from the barrel" effect. This is a SEPARATE contribution from the wood EXTRACTIVES above
# (D-77/78) and from fill-number depletion (D-91): the ethanol comes from the SPIRIT that soaked
# the wood, NOT from the wood itself. D-91 flagged it out of scope; this beat models it.
#
# THE MODEL — a DISCRETE ETHANOL DOSE at charge time (the add_oxygen precedent), NOT a Process.
# add_oak {spirit: bourbon} adds a bolus of ethanol (the core E slot) to the beverage:
#   delta_E = spirit_soak_ethanol_<spirit> * spirit_soak_retention ** (fill_number - 1)  [g/L]
# UNLIKE the off-ledger wood extractives, ethanol is ON the carbon + mass ledger, so this dose
# INJECTS tracked carbon/mass — booked automatically as a POSITIVE external flow by the scheduler
# (post-minus-pre state delta), exactly like add_sugar, so the run-wide identity final == initial
# + Sigma flows still closes (the ledger is NOT violated; a within-Process leach WOULD violate it,
# which is why this is a dose). Anchored STRAIGHT to the observed ABV gain in g/L and DELIBERATELY
# DECOUPLED from oak_gpl: soak-back is a BARREL phenomenon (residual spirit in staves), not a
# chips/S:V contact one, so scaling it by the generalized oak_gpl dose would be wrong (oak chips
# carry no soaked spirit). The caller asserts an ex-spirit barrel via the categorical `spirit`.
#
# SCOPE (D-92): ETHANOL (ABV) ONLY. The bourbon AROMA soak-back (residual vanilla/coconut/char
# spirit congeners) is the SEPARATE second half — now modelled in D-93 below, as a bump to the
# SAME D-77 aroma ceilings (NOT a parallel pool: bumping one ceiling can't double-count; a parallel
# pool would). D-92 deferred it out of the double-count fear that a bolus DIRECTLY into the extracted
# pool would need; D-93 resolves that by bumping the CEILING (the only additive-with-wood option —
# see aging.py OakExtraction gate) and letting OakExtraction leach it gradually. So the ethanol and
# aroma halves are now BOTH done — D-92 ethanol + D-93 aroma.
#   * INSTANTANEOUS at charge, not the gradual weeks-months leach reality shows — the add_oxygen
#     dose simplification (front-loads the ABV vs a ramp). A gradual leach from a finite on-ledger
#     spirit RESERVOIR slot (drawn down into E, conserving WITHIN-segment with no external-flow
#     booking) is BOTH the more faithful AND the conservation-natural refinement, deferred — the
#     same reservoir machinery D-91 deferred for the wood extractables.
#   * fill-number depletes it with its OWN steep spirit_soak_retention (spirit ~gone by fill 2-3),
#     FAR faster than the wood's oak_fill_retention — "first-fill" is the term of art precisely
#     because a refill barrel has been rinsed of most residual spirit by its first fill.
spirit_soak_ethanol_bourbon:
  value: 8.0
  unit: "g/L"   # ethanol donated to the beverage by a FIRST-FILL ex-bourbon barrel; * retention**(fill-1)
  tier: speculative
  uncertainty: { low: 4.0, high: 12.0, note: "residual-spirit ethanol a first-fill ex-bourbon barrel leaches into the beverage. The SOURCED, load-bearing anchor is the observed ABV GAIN: a bourbon-barrel-aged imperial stout typically gains ~0.5-1.5% ABV from the barrel. At ethanol density 0.789 g/mL, 1% ABV = 10 mL/L * 0.789 = 7.89 g/L, so ~8 g/L is a ~1% ABV central estimate; 4 g/L ~ 0.5% ABV, 12 g/L ~ 1.5% ABV. Decoupled from oak_gpl (a barrel, not a chips/S:V, phenomenon). FIRST-FILL magnitude; refills deplete via spirit_soak_retention." }
  provenance:
    source: "author estimate anchored to the well-documented ABV gain of bourbon-/whiskey-barrel-aged beer (barrel-aged imperial stout / barleywine programs typically report ~0.5-1.5% ABV picked up from residual spirit in the staves — 'the angel's/devil's cut'). Converted to g/L at ethanol density 0.789 g/mL (1% ABV ~ 7.9 g/L)."
    conditions: "g/L ethanol donated by a FIRST-FILL (fill_number = 1) ex-bourbon barrel, decoupled from oak_gpl; * spirit_soak_retention ** (fill_number - 1) for reused barrels. Generic beverage at charge time."
    notes: "SOURCED ORDERING + MAGNITUDE-BY-CONVERSION (the ~1% ABV gain is a real, measurable observable; the g/L follows by the ethanol density) but SPECULATIVE in that the exact residual-spirit load varies widely by barrel/wetness. Ethanol is ON the carbon+mass ledger, so this dose books a POSITIVE external flow (add_sugar precedent) and the run-wide ledger closes. ETHANOL (ABV) ONLY — the bourbon AROMA congener soak-back is deferred (overlaps the D-77 oak aroma pools)."
spirit_soak_retention:
  value: 0.2
  unit: "1"   # dimensionless fraction of residual spirit retained per PRIOR fill; delta_E *= r**(fill-1)
  tier: speculative
  uncertainty: { low: 0.05, high: 0.4, note: "fraction of the residual spirit an ex-bourbon barrel retains for the NEXT fill. DELIBERATELY STEEPER than the wood's oak_fill_retention (0.5): a barrel's residual SPIRIT is largely rinsed out by its FIRST fill (that is why 'first-fill bourbon barrel' is the term of art), so r ~ 0.2 leaves fill 2 with ~20% and fill 3 with ~4% of the fresh soak — spirit effectively gone by the 2nd-3rd fill, far faster than the wood extractables (neutral by ~4th-5th). r = 0.05 near-total first-fill rinse-out, r = 0.4 slower. Geometric per-fill discount, the oak_fill_retention form." }
  provenance:
    source: "author estimate anchored to the ORDERING that residual barrel SPIRIT depletes FASTER than the wood extractables — an ex-bourbon barrel's soaked spirit is largely leached out by its first fill (first-fill vs neutral-barrel practice in barrel-aged beer), so the ABV pickup drops steeply after the first use, faster than the oak-character decline governed by oak_fill_retention (D-91)."
    conditions: "dimensionless; multiplies the spirit_soak_ethanol_<spirit> ethanol bolus by spirit_soak_retention ** (fill_number - 1) at charge time, generic ex-spirit barrel."
    notes: "SOURCED ORDERING (residual spirit depletes faster than wood extractables; steeper than oak_fill_retention) + SPECULATIVE magnitude (banded 0.05-0.4). Its OWN parameter, NOT reused oak_fill_retention (prime directive #2, and the value genuinely differs — spirit rinses faster than wood extracts). Geometric ACROSS-FILL discount; a gradual within-fill reservoir leach is the deferred refinement. Multiplies BOTH the ethanol soak (D-92) AND the aroma soak (D-93): same residual spirit, one depletion."

# =============================================================================================
# BOURBON-BARREL AROMA SOAK-BACK: an ex-spirit barrel donates residual CONGENERS (decision D-93).
#
# The SECOND half of the bourbon soak-back D-92 deferred. Bourbon is matured for years in CHARRED
# NEW OAK, so the residual spirit soaked into an ex-bourbon barrel's staves ("the devil's cut")
# carries the spirit's own aroma congeners — vanilla (vanillin), coconut/oak (oak lactone), and
# char/smoke (guaiacol) — which leach BACK into the beer/wine ON TOP of what the wood diffusion
# gives (D-77). This is why a bourbon-barrel imperial stout reads vanilla-/coconut-/char-FORWARD.
#
# THE MODEL — a CEILING BUMP, drawn in GRADUALLY by the existing OakExtraction Process (D-77), NOT a
# bolus. The ONLY way to make wood + spirit ADDITIVE: OakExtraction rises each pool toward its
# ceiling with gap = ceiling - conc, so a bolus straight into the extracted pool (the ethanol->E
# move) would be ERASED — extraction fills up to the wood ceiling regardless, giving max(bump, wood)
# not the sum (aging.py OakExtraction gate). Bumping the CEILING (ceiling = wood + spirit) is the
# only additive form, and it is BOTH more faithful (gradual weeks-months leach, not an instant
# jump) AND legal: the aroma ceilings are OFF the carbon/mass ledger (wood-derived, iso_alpha
# precedent), so — UNLIKE D-92's on-ledger ethanol, which was FORCED to a discrete dose to avoid
# creating carbon within-segment — a gradual off-ledger leach is available here for free. The ledger
# is what splits the two halves (ethanol=bolus, aroma=gradual), not caprice.
#
# NOT double-counting: one shared pool bumped, NOT a parallel pool. The D-77 oak_yield_* values are
# generic NEW-oak wood diffusion; this adds the ex-bourbon barrel's residual-SPIRIT congeners on top
# into the SAME measured pool. (The ex-bourbon barrel's DEPLETED WOOD — it extracted into the spirit
# for years — is the ORTHOGONAL third effect, represented by fill_number, D-91; not baked in here.)
#
# TOAST-INDEPENDENT and oak_gpl-INDEPENDENT (both DELIBERATE): the spirit's congener profile is set
# by the BOURBON's char, not the toast the cooper gave the new-oak dose, and the residual-spirit
# amount is a BARREL property, not a chips/S:V one — so these are flat per-first-fill g/L bumps,
# indexed by SPIRIT (spirit_soak_<compound>_bourbon), NOT by toast, and NOT scaled by oak_gpl. They
# deplete with reuse by the SAME spirit_soak_retention as the ethanol (one residual spirit, one
# depletion): ceiling_bump = spirit_soak_<compound>_bourbon * spirit_soak_retention ** (fill - 1).
#
# COMPOUND SUBSET (DELIBERATE, not all five): vanilla + coconut + char are bourbon's signature, so
# vanillin + whiskey_lactone + guaiacol are bumped; eugenol (CLOVE) is NOT a bourbon note and is left
# untouched; ellagitannin is a wood TASTE tannin, not a spirit aroma congener, also untouched.
# CARAMEL — a real bourbon note — had NO aroma pool at D-93 and a new furanone pool was feared to
# collide with the D-88 caramelization / A420 axis, so it was DEFERRED. It is now built as FURANEOL
# (D-94, below): a fifth oak aroma extractive on the OFF-LEDGER oak axis (so no collision with the
# on-ledger D-88 melanoidin), bumped by spirit_soak_furaneol_bourbon exactly like these three.
#
# PROVENANCE is SOFTER than the ethanol's: no clean measurable observable (the ethanol had the ~1%
# ABV gain). We have a sourced ORDERING (ex-bourbon beer reads vanilla/coconut/char-forward vs
# neutral oak) and SPECULATIVE magnitudes, sized clearly suprathreshold at first fill (beer
# thresholds: vanillin 130, whiskey_lactone 35, guaiacol 10 ug/L, sensory.yaml). Banded wide.
spirit_soak_vanillin_bourbon:
  value: 2.0e-4
  unit: "g/L"   # vanillin ceiling BUMP from a FIRST-FILL ex-bourbon barrel; * retention**(fill-1)
  tier: speculative
  uncertainty: { low: 5.0e-5, high: 4.0e-4, note: "vanillin (200 ug/L) the ex-bourbon barrel's residual spirit adds to the aroma ceiling at first fill — comparable to a medium-toast wood ceiling (~200 ug/L at 4 g/L), well over the ~130 ug/L beer threshold, so vanilla reads FORWARD. No clean observable; sized to the vanilla-forward character of bourbon-barrel beer. Banded 50-400 ug/L." }
  provenance:
    source: "author estimate anchored to the ORDERING that bourbon-barrel-aged beer reads VANILLA-forward (vanillin is the signature note of bourbon's charred-new-oak maturation, carried back in the residual spirit); magnitude sized clearly above the ~130 ug/L beer vanillin threshold (sensory.yaml)."
    conditions: "g/L bump to the vanillin_ceiling by a FIRST-FILL (fill_number = 1) ex-bourbon barrel, toast- and oak_gpl-INDEPENDENT; * spirit_soak_retention ** (fill_number - 1) for reused barrels; drawn in gradually by OakExtraction (D-77)."
    notes: "SOURCED ORDERING (vanilla-forward) + SPECULATIVE magnitude. OFF the carbon/mass ledger (aroma ceiling, iso_alpha precedent) — moves nothing conserved. Bumps the SAME D-77 vanillin pool (additive with wood, NOT a parallel pool ⇒ cannot double-count). Toast-INDEPENDENT (set by bourbon's char, not the cooper's toast)."
spirit_soak_whiskey_lactone_bourbon:
  value: 1.0e-4
  unit: "g/L"   # whiskey-lactone (coconut) ceiling BUMP from a FIRST-FILL ex-bourbon barrel
  tier: speculative
  uncertainty: { low: 2.0e-5, high: 2.5e-4, note: "whiskey/oak lactone (100 ug/L) — the COCONUT note — the residual spirit adds at first fill. Bourbon's coconut/oak character is prominent; sized well over the ~35 ug/L beer threshold (OAV ~3). Exceeds the medium-toast wood ceiling (~80 ug/L). Banded 20-250 ug/L." }
  provenance:
    source: "author estimate anchored to the ORDERING that bourbon-barrel beer reads COCONUT/oak-forward (whiskey (oak) lactone is the classic coconut note of bourbon's charred oak, carried in the residual spirit); magnitude sized clearly above the ~35 ug/L beer whiskey_lactone threshold (sensory.yaml)."
    conditions: "g/L bump to the whiskey_lactone_ceiling by a FIRST-FILL ex-bourbon barrel, toast- and oak_gpl-INDEPENDENT; * spirit_soak_retention ** (fill_number - 1); drawn in gradually by OakExtraction (D-77)."
    notes: "SOURCED ORDERING (coconut-forward) + SPECULATIVE magnitude. OFF the ledger (aroma ceiling). Bumps the SAME D-77 whiskey_lactone pool (additive, not parallel). Toast-INDEPENDENT. Lumped cis+trans oak lactone, the D-77 convention."
