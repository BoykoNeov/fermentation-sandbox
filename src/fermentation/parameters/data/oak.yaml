# -- BILINEAR O2xELLAGITANNIN SCAVENGING RATE: oak tannin protects the wine (the D-78 SPINE) ----
# d(o2)/dt = -k_ellagitannin_oxidation * f(T) * [o2] * [ellagitannin]  (bilinear, both g/L — the
# SulfiteOxidation form). Ellagitannin scavenges O2, diverting it from browning + ethanol oxidation,
# so an oaked+oxygenated wine browns less and accumulates less oxidative acetaldehyde — oak PROTECTION.
# SUBSTRATE-GATED on the ellagitannin pool => zero unless oak is dosed => adds ON TOP of the anchor
# with NO re-baseline (the D-72/D-75 rule; k_ethanol_oxidation + k_browning_base = 5.0e-4 untouched). BANDED
# so suppression is PARTIAL — a MAJOR but not total O2 sink: at a ~50–100 mg/L ellagitannin charge
# (0.05–0.1 g/L) the pseudo-first-order O2 rate k*[ellag] ~ 2.5e-4–5e-4 /h is ~0.5–1x the 5.0e-4
# always-on total, so ellagitannin takes roughly a third-to-half of the O2 (a clear, VISIBLE protection
# that still leaves oaked wines SOME oxidative character). Deliberately ~40x SMALLER per unit mass than
# k_so2_oxidation (0.2): a bulky tannin macromolecule is a slower O2 scavenger per gram than the
# bisulfite anion — but it is present at ~1000x the concentration and is RENEWABLE (wood re-supplies
# it below the ceiling), so it buffers redox for months-to-years (contrast SO2's finite, exhaustible
# pool). The load-bearing SOURCED claim is the ORDERING (tannin out-competes ethanol for O2 => oak
# protects), not this magnitude.
k_ellagitannin_oxidation:
  value: 5.0e-3
  unit: "L/(g*h)"   # d(o2)/dt = -k_ellagitannin_oxidation * f(T) * [o2] * [ellagitannin]  (bilinear)
  tier: speculative
  uncertainty: { low: 1.0e-3, high: 2.0e-2, note: "bimolecular O2xellagitannin rate constant at T_ref = 20 C. The LOAD-BEARING claim is the ORDERING (ellagitannin scavenges O2 faster than ethanol => oak protects), not the magnitude: at a 50–100 mg/L ellagitannin charge the pseudo-first-order O2 rate k*[ellag] ~ 2.5e-4–5e-4 /h is ~0.5–1x the always-on total (k_ethanol_oxidation + k_browning_base = 5e-4; D-74), so ellagitannin takes roughly a third-to-half of the O2 — a MAJOR, VISIBLE, but PARTIAL protection (banded so it never monopolizes the O2). Renewable (wood re-supplies below the ceiling), so buffering is SUSTAINED, unlike SO2's finite pool." }
  provenance:
    source: "author estimate anchored to the ORDERING that oak hydrolysable tannins (ellagitannins) are potent O2 scavengers that PROTECT wine from oxidation during barrel aging / micro-oxygenation (Vivas & Glories 1996 on ellagitannin oxygen consumption; Danilewicz on wine antioxidant phenolics; the galloyl/gallate groups reduce O2/H2O2 in the coupled-oxidation cascade). The bimolecular constant folds the catalysis into k (no explicit catalyst pool, as with k_so2_oxidation/k_browning_base)."
    conditions: "generic wine at cellar pH/temperature; bilinear in the dissolved-o2 pool and the ellagitannin pool (both g/L) at T_ref = 293.15 K."
    notes: "SOURCED FORM (bilinear O2xellagitannin, tannin out-competing ethanol for O2 => oak protects the wine, browning + acetaldehyde SUPPRESSED — the D-78 spine, the D-72 SO2-protection analogue with a RENEWABLE buffer) + SPECULATIVE magnitude. Banded so protection is PARTIAL (a third-to-half of the O2), never total. The mass-based consumption yield (y_ellag_per_o2) — not this rate — sets HOW MUCH tannin a given O2 flux spends."

# -- ACTIVATION ENERGY: warmer scavenges O2 faster (sourced ordering, REACTION-scale) ----------
# Its OWN parameter (prime directive #2) and REACTION-scale (~50 kJ/mol, like the other O2-sink E_a's
# — SO2/browning/ethanol/Strecker), NOT the weak DIFFUSION E_a_oak_extraction (20 kJ/mol): the
# EXTRACTION of ellagitannin is diffusion-limited (E_a_oak_extraction), but its O2 SCAVENGING is a
# chemical oxidation reaction, so it carries the reaction-scale temperature sensitivity of its oxidative
# siblings. Two distinct physics on one pool => two distinct activation energies.
E_a_ellagitannin_oxidation:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 70000.0, note: "Q10 ~1.5-2.6 at 20 C. Wine oxidation / tannin-autoxidation activation energies ~30-70 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster tannin O2 scavenging, so warm storage spends the protective tannin faster); the magnitude is speculative and banded. Its OWN parameter (prime directive #2) and REACTION-scale — distinct from the weak DIFFUSION E_a_oak_extraction (20 kJ/mol) that governs the tannin's EXTRACTION: scavenging is a chemical oxidation, extraction is diffusion." }
  provenance:
    source: "SOURCED ORDERING: tannin autoxidation and the coupled wine-oxidation cascade accelerate with temperature (textbook Arrhenius; wine oxidation activation energies ~30-70 kJ/mol, Danilewicz; Vivas & Glories 1996). Warm storage consumes the protective oak tannin faster is the well-established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2xellagitannin scavenging at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster tannin O2 scavenging) is the sourced, load-bearing claim. REACTION-scale (~50 kJ/mol), matching the oxidative siblings (E_a_so2_oxidation / E_a_browning / E_a_ethanol_oxidation / E_a_strecker) and DELIBERATELY well above the weak diffusion E_a_oak_extraction — the tannin's O2 scavenging is a chemical reaction, its wood extraction is diffusion, so the two get separate E_a's (prime directive #2)."

# -- MASS-BASED CONSUMPTION YIELD: g ellagitannin spent per g O2 scavenged -----------------------
# d(ellagitannin)/dt = -y_ellag_per_o2 * r_o2  (both g/L/h). MASS-based (g/g), NOT a molar stoichiometry:
# ellagitannin is a LUMPED hydrolysable-tannin macromolecule with no clean molar mass, so an
# M_ellagitannin would be fake precision (contrast _SO2_PER_O2, a real-molecule molar stoichiometry).
# The sacrificial tannin is CONSUMED as it scavenges (its astringency softens — one directional
# contributor, D-78 scope), but the wood RE-SUPPLIES it below the ceiling (OakExtraction), so the pool
# reaches a dynamic balance rather than exhausting like SO2. Both slots off every ledger => this
# consumption moves nothing conserved.
y_ellag_per_o2:
  value: 2.0
  unit: "g/g"   # g ellagitannin consumed per g O2 scavenged; d(ellag)/dt = -y_ellag_per_o2 * r_o2
  tier: speculative
  uncertainty: { low: 0.5, high: 6.0, note: "g lumped ellagitannin spent per g O2 the tannin route scavenges. Ellagitannins (MW ~900-1900) carry several O2-reactive galloyl/gallate sites, so one macromolecule scavenges multiple O2 — a mass ratio of order ~1 g tannin per g O2 (rough: ~1000 g/mol tannin, a few O2 at 32 g/mol each). Central 2.0 is a mid-band estimate; banded an order of magnitude. Not load-bearing precisely — it sets how fast the tannin (and its astringency) is drawn down; the wood re-supply and the ceiling govern the steady level." }
  provenance:
    source: "author estimate from the ellagitannin O2-scavenging stoichiometry: hydrolysable tannins reduce O2 (and the H2O2/quinones of the coupled cascade) at their galloyl/gallate sites, consuming the tannin (Vivas & Glories 1996 measured ellagitannin O2 consumption in wine). A MASS ratio (g tannin per g O2), not a molar one — the lumped macromolecule has no clean molar mass (contrast the real-molecule 2:1 SO2:O2)."
    conditions: "g lumped ellagitannin consumed per g O2 scavenged by the tannin route, generic wine at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude, MASS-based (no fake molar mass for the lumped tannin macromolecule — the advisor-flagged D-78 refinement over a molar stoichiometry). Both ellagitannin and o2 are off every ledger, so this consumption moves nothing conserved (the SulfiteOxidation precedent). Sets the astringency-softening RATE (one oxidative contributor; polymerization deferred), capped by the wood re-supply."
