    conditions: "g furaneol / g oak at LIGHT toast; * oak_gpl => the saturation ceiling (g/L) at T_ref = 293.15 K"
    notes: "SPECULATIVE magnitude, SOURCED toast ordering (furaneol RISES with toast — a thermal degradation product). Single-molecule pool. Off every ledger (wood-derived). Doubly caveated: order-of-magnitude yield AND a fixed dose->ceiling linearity."
oak_yield_furaneol_medium:
