# =============================================================================================
# BOURBON-BARREL CARAMEL SOAK-BACK + the caramel oak furanone FURANEOL (decision D-94).
#
# The caramel/toffee note D-93 DEFERRED. Bourbon reads strongly CARAMEL/toffee — from its charred-
# new-oak maturation (thermal degradation of wood sugars during charring makes caramel furanones)
# AND from the corn/rye distillate. D-93 modelled vanilla/coconut/char but left caramel out: it had
# no aroma pool, and a new furanone pool was feared to COLLIDE with the D-88 caramelization / A420
# axis. D-94 resolves it by adding FURANEOL (HDMF, 4-hydroxy-2,5-dimethyl-3(2H)-furanone — the
# canonical "caramel/burnt-sugar/toffee" odorant, potent, low threshold) as a FIFTH oak AROMA
# EXTRACTIVE on the OAK axis, exactly parallel to the D-77 four:
#   * a toast-specific WOOD yield (oak_yield_furaneol_<toast>, below), RISING with toast (furaneol
#     is a thermal sugar-degradation product of oak toasting/charring — same pyrolysis direction as
#     guaiacol/eugenol), so a heavily-toasted/charred barrel gives more caramel; and
#   * a bourbon SPIRIT soak-back ceiling BUMP (spirit_soak_furaneol_bourbon, below), the D-93
#     mechanism — furaneol is in _OAK_SPIRIT_AROMAS, so an ex-bourbon add_oak bumps its ceiling by
#     spirit_soak_furaneol_bourbon * spirit_scale, drawn in GRADUALLY by OakExtraction on top of the
#     wood. (eugenol/clove and the ellagitannin taste tannin stay unbumped, the D-93 subset.)
#
# THE COLLISION IS DISSOLVED, NOT RELOCATED. furaneol lives on the oak axis: OFF EVERY LEDGER
# (wood/spirit-derived, the iso_alpha precedent), so it NEVER touches core S or the on-ledger D-88
# `melanoidin` — it CANNOT perturb D-88's sugar->melanoidin carbon closure. `melanoidin` is
# caramelization's COLOUR body (on-ledger, raises A420); furaneol is the VOLATILE AROMA of the same
# browning chemistry (off-ledger, read by OAV). Two different measured quantities, only one of which
# D-88 modelled. The GENUINELY deferred beat is caramel aroma from the BEVERAGE'S OWN thermal
# caramelization (that WOULD be on-ledger — diverting a sliver of sugar carbon out of the melanoidin
# park — a separate beat); this D-94 pool is oak/spirit-derived only. Descriptor "caramel/toffee",
# kept DISTINCT from sotolon's "curry/maple" (D-87).
#
# TIER: all speculative. The load-bearing SOURCED claims are the FORM (furaneol is a real caramel
# furanone of toasted/charred oak and aged bourbon; RISING with toast) and the ORDERING (bourbon-
# barrel beverages read caramel-forward). Every magnitude is an author estimate, banded wide.

# -- FURANEOL BOURBON SPIRIT SOAK-BACK BUMP: the ex-bourbon barrel's residual caramel congener ----
spirit_soak_furaneol_bourbon:
  value: 2.0e-5
  unit: "g/L"   # furaneol ceiling BUMP from a FIRST-FILL ex-bourbon barrel; * retention**(fill-1)
  tier: speculative
  uncertainty: { low: 5.0e-6, high: 8.0e-5, note: "furaneol (~20 ug/L) the ex-bourbon barrel's residual spirit adds to the aroma ceiling at first fill. Bourbon's caramel/toffee is a PROMINENT note, and furaneol is POTENT (beer threshold ~4 ug/L), so ~20 ug/L already reads clearly caramel-FORWARD — the OAV increment (~5) is DELIBERATELY sized into the same band as the D-93 congener bumps (vanillin +1.5, whiskey_lactone +2.9, guaiacol +4.0 OAV), NOT larger: potency means a SMALL g/L reads forward, so a vanillin-sized ~200 ug/L bump would make caramel ~7x more forward than vanilla — a distortion of relative prominence the low mass avoids. No clean observable; sized to a prominent-but-coherent caramel. Banded 5-80 ug/L." }
  provenance:
    source: "author estimate anchored to the ORDERING that bourbon-barrel-aged beverages read CARAMEL/toffee-forward (furaneol/HDMF is a caramel-type furanone of bourbon's charred-new-oak maturation and the distillate, carried back in the residual spirit); magnitude sized so the caramel OAV lands in the SAME band as the D-93 bourbon congeners (a coherent prominent note, not a caramel bomb — furaneol's low ~4 ug/L beer threshold means a small g/L already reads forward)."
    conditions: "g/L bump to the furaneol_ceiling by a FIRST-FILL (fill_number = 1) ex-bourbon barrel, toast- and oak_gpl-INDEPENDENT; * spirit_soak_retention ** (fill_number - 1) for reused barrels; drawn in gradually by OakExtraction (D-77)."
    notes: "SOURCED ORDERING (caramel-forward) + SPECULATIVE magnitude, sized by OAV band not by mass (furaneol's potency makes a mass-matched vanillin bump over-forward — D-94 advisor catch). OFF the carbon/mass ledger (aroma ceiling, iso_alpha precedent) — moves nothing conserved, so NO collision with the on-ledger D-88 caramelization melanoidin (D-94). Bumps the SAME D-94 furaneol wood pool (additive with wood, NOT a parallel pool). Toast-INDEPENDENT (set by bourbon's char, not the cooper's toast). Reuses spirit_soak_retention (one residual spirit, one depletion — the D-92/D-93 pattern)."

# -- FURANEOL TOAST-SPECIFIC WOOD YIELDS: ceiling = oak_gpl * oak_yield_furaneol_<toast> (g/L) ----
# RISING with toast (light < medium < heavy), co-varying with guaiacol/eugenol: furaneol is a
# thermal sugar-degradation (caramelization/pyrolysis) product formed when the cooper toasts/chars
# the oak, so more heat => more caramel furanone (the inverse of the light-dominant lactone). Sized
# by OAV (furaneol is POTENT — ~4-5 ug/L threshold), so the g/L are SMALL: at a ~4 g/L oak dose
# light is sub-threshold (little caramel in lightly-toasted oak), medium reads clearly (OAV ~2 beer)
# and heavy is prominent (OAV ~5 beer — the charred-barrel caramel, matching guaiacol's heavy-toast
