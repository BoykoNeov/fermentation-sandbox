# =============================================================================================
# ELLAGITANNIN — THE BRIDGE EXTRACTIVE (decision D-78): diffusion-extracted like the aroma four,
# but ALSO an O2 scavenger (a sacrificial antioxidant that PROTECTS the wine) and an ASTRINGENCY
# contributor. Two Processes touch its pool: OakExtraction rises it toward the ceiling below (the
# same diffusion form as the aroma four), and EllagitanninOxidation (the D-78 oxidative Process)
# draws its share of the shared o2 budget and CONSUMES it. See the header for the full bridge story.
#
# TOAST ORDERING: ellagitannin DECLINES with toast (light > medium > heavy) — hydrolysable tannins
# are THERMOLABILE, degraded by the heat of toasting, so heavily-toasted barrels release LESS tannin
# and taste rounder/less astringent (Chatonnet et al. barrel-toast studies; Cadahia et al. on
# oak-toasting ellagitannin loss). SAME direction as whiskey lactone, OPPOSITE to guaiacol/eugenol.
#
# UNITS & SCALE: ellagitannin extracts at the mg/L scale (NOT the µg/L aroma scale) — oak-aged wine
# carries tens-to-~100+ mg/L ellagitannins (gallic/ellagic-acid-equivalent). Anchored so a ~4 g/L
# oak-chip-equivalent dose lands ~24–100 mg/L across toast levels. ALL speculative; the SOURCED,
# load-bearing claim is the toast ORDERING (declining) + the mg/L scale, not the exact magnitudes.

# -- WHISKEY-LACTONE-LIKE TOAST ORDERING (declining): light > medium > heavy -------------------
oak_yield_ellagitannin_light:
  value: 2.5e-2
