# Excreted keto-acid overflow kinetics (decisions D-49, D-50) — the non-acetaldehyde SO2-binders.
#
# SHARED, medium-agnostic parameter file: loaded alongside the <medium>_<strain>.yaml by the
# compile seam (the store merges paths; these names are collision-free with the per-medium
# kinetic parameters). Overflow keto-acid excretion is generic yeast metabolism — a property of
# the pathway, not the beverage — so, like acetaldehyde.yaml and vicinal_diketones.yaml, its
# constants live in one shared file: pyruvate (D-49) and alpha-ketoglutarate (D-50).
#
# THE MODEL (an EXCRETED SIDE POOL, not acetaldehyde's on-pathway precursor — decision D-49):
#
#   S --excretion--> pyruvate --reassimilation--> ethanol (E) + CO2
#    (draw C3)  (k_pyruvate_excretion)  (k_pyruvate_reassimilation)  (release C3 -> C2 + C1)
#
# Yeast EXCRETES overflow pyruvate during active fermentation; it persists in the finished wine
# (10s-100s mg/L, Jackowetz & Mira de Orduna 2013) as a real, measured SO2-binding carbonyl — the
# strongest after acetaldehyde. This is modelled as an excreted side pool, NOT by routing
# acetaldehyde's carbon through its metabolic precursor pyruvate: that "max fidelity" rework was
# designed and REJECTED (see the keto_acids module docstring) because it conflates the
# intracellular flux intermediate (never persists, never binds SO2) with the extracellular
# excreted residual (persists, binds SO2), and its persistence mechanism ("SO2 shields pyruvate
# from pyruvate decarboxylase") is not real and would make dosed SO2 SUPPRESS acetaldehyde — the
# opposite of the D-48 over-production. So acetaldehyde / D-27 / D-47 / D-48 stay untouched.
#
# WHY THE FROZEN RESIDUAL EMERGES (the phenomenon these parameters must reproduce):
#   * Excretion is FLUX-LINKED (shared K_sugar_uptake) -> strong during active fermentation,
#     stops at dryness. Held TEMPERATURE-FLAT as a documented v1 simplification (like the
#     acetaldehyde production D-27 and alpha-acetolactate excretion D-26).
#   * Reassimilation is ALSO FLUX-LINKED (co-metabolic, shared K_sugar_uptake) — NOT the no-flux
#     ADH idiom (D-27). Overflow-pyruvate reassimilation tracks ACTIVE fermentation, so it clears
#     pyruvate while the yeast ferments and STOPS AT DRYNESS. This is load-bearing: a normal ferment
#     finishes with the yeast still VIABLE (~0.4 g/L here), so a viable-X no-flux gate would drain
#     the pool to ~0 over the long post-dryness tail — a crash-dependent residual a clean ferment
#     never strands. Flux-linking pegs the residual to END-OF-FERMENTATION, not yeast death.
#   => Both terms ride X*S/(K+S), so the pool rises monotonically to the quasi-steady plateau
#      k_pyruvate_excretion / k_pyruvate_reassimilation and FREEZES there at dryness — a persistent
#      finished-wine residual that is crash- AND duration-independent. The residual is set HERE (by
#      the excretion/reassimilation RATIO), NOT by SO2 (decision D-49, owner's option A).
#
# V1 SIMPLIFICATION (documented, in-idiom with the temperature-flat calls). Because both terms ride
# the same flux shape, the pool rises monotonically to the plateau rather than showing the real
# mid-ferment PEAK-THEN-DECLINE (overflow pyruvate's exponential-growth excretion transient).
# Nothing reads the peak — D-51 reads only the finished-wine residual — so the transient is dropped
# in v1; the growth-coupled excretion that would restore it (option B) is deferred.
#
# QUASI-STEADY SIZING. Setting excretion = reassimilation, the X*S/(K+S) flux cancels (both ride
# it), so the plateau pyruvate ~ k_pyruvate_excretion / k_pyruvate_reassimilation = 3e-3 / 1e-1 =
# 0.03 g/L = 30 mg/L — squarely in the real finished-wine range (Jackowetz & Mira de Orduna 2013,
# ~10s mg/L commonly, up to 100s). The approach to the plateau is fast (rate k_reassim*X*phi ~
# 0.1*2*1 ~ 0.2/h, time constant ~5 h) so the pool reaches the plateau within a day and holds it
# until dryness freezes it, making the residual robustly ~= the ratio. Both magnitudes are
# order-of-magnitude estimates; it is their RATIO that is calibrated to the residual.
#
# TIERS. Both rate constants are order-of-magnitude estimates, so both Processes stay speculative;
# parameter-tier propagation (D-1) caps the pyruvate output tier at speculative regardless. The
# excreted-overflow MECHANISM (yeast excretes pyruvate during active fermentation, re-assimilating
# it late) is textbook (Boulton et al., Principles and Practices of Winemaking; Ribereau-Gayon et
# al., Handbook of Enology; Jackowetz & Mira de Orduna 2013 for the finished-wine residual range);
# only the RATE magnitudes are the author's estimates.
#
# CARBON. Excretion draws pyruvate carbon out of sugar (C3, at pyruvate's fraction) and
# reassimilation returns it to ethanol + CO2 (C3 -> C2 + C1, one mole each — carbon-closing like
# malic -> lactic + CO2, D-23), so total_carbon (which weights the pyruvate pool at its own C3
# fraction) closes to machine precision through the whole excrete-then-reassimilate course.
# Reassimilation returns to E/CO2 (not S) deliberately: post-dryness S is 0, so a refund-to-sugar
# would be a no-op that DESTROYS carbon exactly when reassimilation is doing its work. Mass carries
# the usual small gap (the oxidation moves untracked NAD(P)H / O) — carbon is the invariant, as for
# the diacetyl rest (D-26) and the acetaldehyde buffer (D-27).
#
# SCOPE (v1). Wine-only (the SO2-binding competition is a wine readout; no S2.2 beer benchmark
# asserts a keto-acid level). The SO2 these keto-acids bind is a SEPARATE readout beat (the D-51
# multi-carbonyl equilibrium generalises the D-28 free/bound split over acetaldehyde + pyruvate +
# alpha-KG); this beat (and D-50 below) only build the pools that binding will read, kept out per
# the one-Process-per-commit rhythm (the D-27 -> D-22 precedent).
#
# -- ALPHA-KETOGLUTARATE (decision D-50) -------------------------------------------------------
#
# SAME excreted-side-pool structure as pyruvate above:
#
#   S --excretion--> alpha_ketoglutarate --reassimilation--> ethanol (E) + CO2
#    (draw C5)  (k_alpha_kg_excretion)  (k_alpha_kg_reassimilation)  (release C5 -> ethanol+CO2)
#
# ONE load-bearing difference: pyruvate's reassimilation is C3 -> C2(ethanol) + C1(CO2)
# mole-for-mole, which happens to BE the Gay-Lussac fermentation carbon ratio (2 carbon to
# ethanol : 1 carbon to CO2) exactly, because pyruvate's 3 carbons = one Gay-Lussac unit. Alpha-KG's
# C5 does NOT divide evenly 1:1, so its reassimilation returns carbon at the SAME 2:1 ratio instead
# of mole-for-mole (5/3 mol ethanol + 5/3 mol CO2 per mole alpha-KG) -- see the
# AlphaKetoglutarateReassimilation docstring for why copying pyruvate's mole-for-mole form would
# have been wrong (it would divert reassimilation THROUGHPUT, not just the residual, away from
# ethanol at a volume large enough to threaten the S2.2 ABV/CO2 benchmarks).
#
# RESIDUAL TARGET. Alpha-ketoglutarate is typically somewhat LESS abundant in finished wine than
# pyruvate (Jackowetz & Mira de Orduna 2013), so the nominal ratio here targets ~20 mg/L (vs
# pyruvate's ~30): k_alpha_kg_excretion / k_alpha_kg_reassimilation = 2.0e-3 / 1.0e-1 = 0.02 g/L.
# Both magnitudes are order-of-magnitude author estimates; the RATIO sets the residual, exactly as
# for pyruvate.
#
# TIERS / SCOPE. Both speculative; wine-only (v1); the excreted-overflow mechanism is textbook
# (yeast de-represses alpha-KG-dehydrogenase-bypassing overflow under fermentative/anaerobic
# conditions), only the rate magnitudes are estimates.

# -- EXCRETION: sugar -> alpha_ketoglutarate (flux-linked draw, temperature-flat) --------
k_alpha_kg_excretion:
  value: 2.0e-3
  unit: "1/h"   # d(alpha_ketoglutarate)/dt = k_alpha_kg_excretion * X * S/(K_sugar_uptake + S); carbon drawn from S
  tier: speculative
  uncertainty: { low: 7.0e-4, high: 7.0e-3, note: "with k_alpha_kg_reassimilation 1e-1 the quasi-steady frozen residual ~ k_alpha_kg_excretion/k_alpha_kg_reassimilation ~ 7-70 mg/L; nominal 2e-3/1e-1 = 20 mg/L, somewhat below the pyruvate residual (Jackowetz & Mira de Orduna 2013). It is the RATIO to k_alpha_kg_reassimilation, not either magnitude alone, that sets the residual" }
  provenance:
    source: "author estimate bounded by typical finished-wine keto-acid levels (Jackowetz & Mira de Orduna 2013, Am. J. Enol. Vitic.; Ribereau-Gayon et al., Handbook of Enology), set somewhat below the pyruvate residual per the same sources. Yeast excretes overflow alpha-ketoglutarate during active fermentation (alpha-KG-dehydrogenase is de-repressed under fermentative/anaerobic conditions, the same overflow phenomenon as pyruvate)."
    conditions: "generic yeast; overflow-alpha-ketoglutarate excretion coupled to the biomass-catalysed sugar (fermentative) flux, shared K_sugar_uptake"
    notes: "SAME excreted-side-pool structure as pyruvate (decision D-49/D-50), NOT an on-pathway TCA-cycle rework: alpha-KG's real reassimilation fate (glutamate synthesis, N-coupled) is not modelled in v1, so the carbon destination is a lumped stand-in like pyruvate's, not a metabolic claim. Flux-linked so it stops at dryness leaving a full overflow pool; held TEMPERATURE-FLAT as a documented v1 simplification. Magnitude speculative."

# -- REASSIMILATION: alpha_ketoglutarate -> ethanol + CO2 (flux-linked / co-metabolic, Gay-Lussac split) --
k_alpha_kg_reassimilation:
  value: 1.0e-1
  unit: "L/(g*h)"   # d(alpha_ketoglutarate)/dt = -k_alpha_kg_reassimilation * X * S/(K_sugar_uptake+S) * [alpha_ketoglutarate]; returned to E + CO2 at the 2:1 Gay-Lussac carbon split (NOT mole-for-mole)
  tier: speculative
  uncertainty: { low: 3.0e-2, high: 3.0e-1, note: "sets the approach speed to (and, with k_alpha_kg_excretion, the level of) the frozen plateau; fast enough that the pool reaches the plateau within a day and holds it to dryness, so the residual robustly ~= k_alpha_kg_excretion/k_alpha_kg_reassimilation. It is the RATIO, not this magnitude alone, that sets the residual" }
  provenance:
    source: "author estimate; yeast co-metabolically re-assimilates excreted overflow alpha-ketoglutarate during active fermentation (Boulton et al.; Ribereau-Gayon et al.). Tracks the fermentative flux, so it stops at dryness and freezes the finished-wine residual (Jackowetz & Mira de Orduna 2013)."
    conditions: "generic yeast; overflow-alpha-ketoglutarate re-assimilation, first-order in alpha_ketoglutarate and FLUX-LINKED (co-metabolic — shares the X*S/(K_sugar_uptake+S) fermentative shape with excretion), so it dies at dryness"
    notes: "Returns carbon to ETHANOL + CO2 at the Gay-Lussac 2:1 carbon ratio (5/3 mol ethanol + 5/3 mol CO2 per mole alpha-KG) -- NOT mole-for-mole like pyruvate's C3 -> C2+C1 (that form only coincides with mole-for-mole because 3 carbons is exactly one Gay-Lussac unit; C5 does not divide evenly 1:1). Getting this wrong would divert reassimilation THROUGHPUT (not just the residual, ~10-20x larger) away from ethanol into CO2, large enough to threaten the S2.2 ABV/CO2 benchmarks -- see the AlphaKetoglutarateReassimilation docstring. FLUX-LINKING is load-bearing and DELIBERATELY the OPPOSITE of the no-flux ADH acetaldehyde reduction (D-27), exactly mirroring pyruvate's reasoning (D-49): a normal ferment finishes with the yeast still viable, so a no-flux viable-X gate would drain overflow alpha-KG to ~0 over the long tail. Co-metabolic flux-linking pegs the residual to END-OF-FERMENTATION (the dryness freeze), crash- and duration-independent. Magnitude speculative."

# -- EXCRETION: sugar -> pyruvate (flux-linked draw, temperature-flat) -------------------
k_pyruvate_excretion:
  value: 3.0e-3
  unit: "1/h"   # d(pyruvate)/dt = k_pyruvate_excretion * X * S/(K_sugar_uptake + S); carbon drawn from S
  tier: speculative
  uncertainty: { low: 1.0e-3, high: 1.0e-2, note: "with k_pyruvate_reassimilation 1e-1 the quasi-steady frozen residual ~ k_pyruvate_excretion/k_pyruvate_reassimilation ~ 10-100 mg/L; nominal 3e-3/1e-1 = 30 mg/L in the real finished-wine range (Jackowetz & Mira de Orduna 2013). It is the RATIO to k_pyruvate_reassimilation, not either magnitude alone, that sets the residual" }
  provenance:
    source: "author estimate bounded by typical overflow-pyruvate levels (Jackowetz & Mira de Orduna 2013, Am. J. Enol. Vitic. — finished-wine pyruvate 10s-100s mg/L; Boulton et al., Principles and Practices of Winemaking). Yeast excretes overflow pyruvate during active fermentation."
    conditions: "generic yeast; overflow-pyruvate excretion coupled to the biomass-catalysed sugar (fermentative) flux, shared K_sugar_uptake"
    notes: "MODELLED AS A DRAW FROM SUGAR into an EXCRETED SIDE POOL (decision D-49), NOT as routing acetaldehyde's carbon through its precursor pyruvate (rejected: conflates the intracellular flux intermediate with the extracellular excreted residual — see the keto_acids module docstring). Flux-linked so it stops at dryness leaving a full overflow pool; held TEMPERATURE-FLAT as a documented v1 simplification. Magnitude speculative."

# -- REASSIMILATION: pyruvate -> ethanol + CO2 (flux-linked / co-metabolic) --------------
k_pyruvate_reassimilation:
  value: 1.0e-1
  unit: "L/(g*h)"   # d(pyruvate)/dt = -k_pyruvate_reassimilation * X * S/(K_sugar_uptake+S) * [pyruvate]; returned to E + CO2
  tier: speculative
  uncertainty: { low: 3.0e-2, high: 3.0e-1, note: "sets the approach speed to (and, with k_pyruvate_excretion, the level of) the frozen plateau; fast enough (k*X*phi ~ 0.2/h) that the pool reaches the plateau within a day and holds it to dryness, so the residual robustly ~= k_pyruvate_excretion/k_pyruvate_reassimilation. It is the RATIO, not this magnitude alone, that sets the residual" }
  provenance:
    source: "author estimate; yeast co-metabolically re-assimilates excreted overflow pyruvate during active fermentation, oxidising it back into central metabolism (Boulton et al.; Ribereau-Gayon et al.). Tracks the fermentative flux, so it stops at dryness and freezes the finished-wine residual (Jackowetz & Mira de Orduna 2013)."
    conditions: "generic yeast; overflow-pyruvate re-assimilation, first-order in pyruvate and FLUX-LINKED (co-metabolic — shares the X*S/(K_sugar_uptake+S) fermentative shape with excretion), so it dies at dryness"
    notes: "Returns carbon to ETHANOL + CO2, not sugar (C3 -> C2 + C1, one mole each — carbon-closing): that is pyruvate's real forward metabolic fate, and a refund-to-sugar would be a no-op at post-dryness S=0 anyway. FLUX-LINKING is load-bearing and DELIBERATELY the OPPOSITE of the no-flux ADH acetaldehyde reduction (D-27): a normal ferment finishes with the yeast still viable, so a no-flux viable-X gate would drain overflow pyruvate to ~0 over the long tail (a crash-dependent residual a clean ferment never strands). Co-metabolic flux-linking pegs the residual to END-OF-FERMENTATION (the dryness freeze), not yeast death — crash- and duration-independent (decision D-49, option A). Magnitude speculative."

# =====================================================================================
# ALPHA-KETOBUTYRATE (2-oxobutyrate) -- THE KETO-ACID NODE (decision D-107)
# =====================================================================================
#
#   threonine --deamination(gate)--\
#                                   >-- [alpha_ketobutyrate] --aldol+acetaldehyde--> sotolon
#   sugar ------de novo (1-gate)---/          ^
#                                             |
#   methionine --demethiolation (D-45)--------+  (+ methanethiol + NH3)
#
# The third excreted overflow keto-acid, and THE ONLY ONE WITH A CONSUMER. Pyruvate (D-49) and
# alpha-KG (D-50) are terminal residuals that exist to bind SO2; this pool is a SUBSTRATE -- its
# frozen dryness residual is what the bottle-aging sotolon aldol eats over the following years
# (SotolonAldolCondensation, D-107). It also has a second PRODUCER: the D-45 mercaptan route is
# methionine -> methanethiol + 2-oxobutyrate + NH3, and until this pool existed that 2-oxobutyrate
# had nowhere to go -- which is exactly why that route drew methionine at 0.2 mol per mol thiol
# (a 5x under-draw, found at D-105 and unblocked here).
#
# STRUCTURE = pyruvate/alpha-KG (flux-linked excretion; co-metabolic flux-linked reassimilation
# that stops at dryness and FREEZES a persistent finished-wine residual), with ONE difference:
# the CARBON SOURCE SPLITS. Crepin et al. 2017 measures 2-ketobutyrate's source as intracellular
# threonine that is "19% consumed threonine (labeled fraction) and 81% newly synthesized", so the
# draw is gate:(1-gate) between the must `threonine` pool and the sugar de-novo stand-in, where
# `gate` is threonine's own D-100 relative-depletion gate. The RATE is flux-only (NOT gated on
# threonine): gating it would empty the pool in a threonine-free wine and kill sotolon -- the D-104
# canary, one pool upstream. This is D-104's structure with the gate finally on the molecule it was
# always about, and moved to where reality fixes enrichment: SYNTHESIS time, not consumption time.
#
# EVIDENCE GRADE -- stated because it bounds the residual below. Pons et al. 2010 (J. Agric. Food
# Chem. 58:7273, "Identification of a Sotolon Pathway in Dry White Wines") establishes the two
# claims this pool rests on: wine yeast "released large quantities of 2-ketobutyric acid" during
# alcoholic fermentation (so it IS an excreted pool, not only a flux intermediate), and the
# sotolon aldol is what consumes it. What that paper is NOT read for is a NUMBER: no measured
# finished-wine 2-oxobutyrate concentration is in hand (unlike pyruvate/alpha-KG, which Jackowetz &
# Mira de Orduna 2013 quantifies). So the residual below is anchored on an ORDERING, and it is
# labelled as one.
#
# -- EXCRETION: threonine + sugar -> alpha_ketobutyrate (flux-linked draw, temperature-flat) -----
k_alpha_kb_excretion:
  value: 2.0e-4
  unit: "1/h"   # d(alpha_ketobutyrate)/dt = k_alpha_kb_excretion * X * S/(K_sugar_uptake + S); carbon drawn threonine:S by threonine's depletion gate
  tier: speculative
  uncertainty: { low: 5.0e-5, high: 1.0e-3, note: "with k_alpha_kb_reassimilation 1e-1 the quasi-steady frozen residual ~ k_alpha_kb_excretion/k_alpha_kb_reassimilation ~ 0.5-10 mg/L; nominal 2e-4/1e-1 = 2 mg/L. It is the RATIO to k_alpha_kb_reassimilation, not either magnitude alone, that sets the residual" }
  provenance:
    source: "author estimate anchored on an ORDERING, not on a measurement: alpha-ketobutyrate is a MINOR keto acid relative to pyruvate (~30 mg/L) and alpha-ketoglutarate (~20 mg/L), the two that Jackowetz & Mira de Orduna 2013 quantifies -- so ~2 mg/L, an order below both. That yeast excrete it at all is sourced (Pons et al. 2010: strains 'released large quantities of 2-ketobutyric acid' in model wine, 'similar to those found in oxidized dry white wines'); the LEVEL is not. Corroborating the order of magnitude: 2-ketobutyrate's dominant fate is decarboxylation to propanal -> propanol (10s of mg/L in wine), so the excreted residual is a small leak off a much larger flux."
    conditions: "generic yeast; overflow-alpha-ketobutyrate excretion coupled to the biomass-catalysed sugar (fermentative) flux, shared K_sugar_uptake, at any temperature (held flat, v1)"
    notes: "SPECULATIVE MAGNITUDE, SOURCED STRUCTURE. The CARBON SOURCE is the load-bearing part and it is sourced (Crepin et al. 2017, 19% exogenous threonine / 81% de novo): the draw splits gate:(1-gate) between `threonine` (a real deamination, L-threonine -> 2-oxobutanoate + NH3 via ILV1, so ALL its nitrogen is released to N) and sugar (de-novo, nitrogen-free). The RATE is flux-only and deliberately NOT gated on threonine -- see the AlphaKetobutyrateExcretion docstring for why gating it would resurrect the D-104 sotolon canary. Held TEMPERATURE-FLAT (v1, the D-49/D-50 call)."

# -- REASSIMILATION: alpha_ketobutyrate -> ethanol + CO2 (flux-linked, Gay-Lussac split) ---------
k_alpha_kb_reassimilation:
  value: 1.0e-1
  unit: "L/(g*h)"   # d(alpha_ketobutyrate)/dt = -k_alpha_kb_reassimilation * X * S/(K_sugar_uptake+S) * [alpha_ketobutyrate]; returned to E + CO2 at the 2:1 Gay-Lussac carbon split
  tier: speculative
  uncertainty: { low: 3.0e-2, high: 3.0e-1, note: "sets the approach speed to (and, with k_alpha_kb_excretion, the level of) the frozen plateau; fast enough that the pool reaches the plateau within a day and holds it to dryness, so the residual robustly ~= k_alpha_kb_excretion/k_alpha_kb_reassimilation. It is the RATIO, not this magnitude alone, that sets the residual" }
  provenance:
    source: "author estimate, set EQUAL to the pyruvate and alpha-KG reassimilation constants (both 1e-1): there is no evidence that overflow alpha-ketobutyrate is re-assimilated at a different rate from its two siblings, and inventing a distinct number to look precise would be the D-98 trap. Yeast co-metabolically re-assimilate excreted overflow keto-acids during active fermentation (Boulton et al.; Ribereau-Gayon et al.)."
    conditions: "generic yeast; overflow-alpha-ketobutyrate re-assimilation, first-order in alpha_ketobutyrate and FLUX-LINKED (co-metabolic — shares the X*S/(K_sugar_uptake+S) fermentative shape with excretion), so it dies at dryness"
    notes: "Returns carbon to ETHANOL + CO2 at the Gay-Lussac 2:1 carbon ratio (4/3 mol ethanol + 4/3 mol CO2 per mole) -- alpha-ketobutyrate's C4 is NOT a whole Gay-Lussac unit, so this is alpha-KG's case, not pyruvate's mole-for-mole coincidence. D-50 already wrote that split generically in carbon_atoms, so the third pool needed no new arithmetic; D-107 EXTRACTED it into a shared helper (_gay_lussac_reassimilation) rather than making a third copy -- the D-104 lesson that a duplicated draw agrees by luck until it does not. THE FREEZE IS LOAD-BEARING FOR A SECOND REASON HERE: unlike pyruvate/alpha-KG (whose residual exists to bind SO2), this residual is the SUBSTRATE the in-bottle sotolon aldol consumes over years, which only makes sense because flux-linking pegs it to end-of-fermentation rather than draining it to ~0 over the long tail. Magnitude speculative."
