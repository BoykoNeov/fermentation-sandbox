# Per-compound Stevens exponents — the odor-intensity compression curves (decision D-98).
#
# READ THIS HEADER BEFORE READING A SINGLE VALUE BELOW. Every number in this file is an
# AUTHOR ESTIMATE. Not one of them is a measured exponent for the compound it is filed under.
# `source:` says "author estimate" on all 21 entries, and that is the literal truth, not a
# formality. This file is the most speculative in the repository and it is important that it
# reads that way.
#
# WHAT A STEVENS EXPONENT IS. Perceived odor intensity grows as a POWER of concentration,
# not linearly: I = k * C**n, with n < 1 for essentially all odorants (a nose compresses —
# doubling a compound less than doubles its smell). n is the compound-specific compression:
# n near 0.7 ramps up steeply, n near 0.25 plateaus almost at once. Reported odor exponents
# span roughly 0.2-0.8.
#
# WHY THIS FILE IS NOT `sensory.yaml`. Two reasons, both structural:
#   (1) `sensory.yaml` loads via `sensory.oav.load_thresholds()`; a threshold is a MEASURED
#       quantity with a real citation. Mixing 21 guesses into that file would let them borrow
#       Meilgaard's and Guth's credibility by adjacency — the §4.3 firewall in miniature.
#   (2) ISOLABILITY (prime directive #3). Slice 2 must be togglable OFF. It is: this file is
#       loaded only by `sensory.compression.load_exponents()`, consumed only by
#       `StevensProjector`, and the slice-1 `MaxRuleProjector` neither imports nor knows about
#       any of it. Delete this file and beat 1a + slice 1 are byte-for-byte unaffected.
#
# ===================================================================================
# WHAT THE THRESHOLD CANNOT DO — the reason these are guesses and not calibrations
# ===================================================================================
# The obvious idea is to calibrate each curve on the compound's detection threshold, which
# `sensory.yaml` already holds for all 33 keys, sourced and matrix-specific. IT DOES NOT WORK,
# and the algebra is worth stating once so it is never re-attempted:
#
#   I = k * C**n has TWO unknowns. A threshold T is ONE point, and by DEFINITION it is the
#   point where every compound is equally just-detectable: I(T) == I_thr for all compounds.
#   So  k * T**n == I_thr  =>  k = I_thr / T**n  =>  I(C) = I_thr * (C/T)**n = I_thr * OAV**n.
#
# The threshold therefore pins k GIVEN n, and NEVER pins n. Calibrating on it reproduces OAV
# exactly — a quantity beat 1a already computes — and leaves the curve's SHAPE completely
# undetermined. A threshold says WHERE a smell becomes detectable; it is silent on HOW FAST it
# grows thereafter. Those are independent facts and only the second one is this file.
# Consequence: with I_thr normalized to 1, this layer's intensity is exactly `OAV ** n`.
#
# ===================================================================================
# THE BASIS FOR THE ORDERING — Cain 1969, and precisely how far it is load-bearing
# ===================================================================================
# The estimates are NOT free-hand. Cain 1969 (Percept. Psychophys. 6:349-354, "Odor intensity:
# differences in the exponent of the psychophysical function") reports that exponent size is
# in near-perfect RANK-ORDER correlation with an odorant's WATER SOLUBILITY: completely
# water-soluble odorants (n-propanol, acetone) ran ~2.5x the exponents of insoluble ones
# (n-octanol, geraniol), and along the n-aliphatic alcohols both exponent and solubility fall
# with chain length. So the values below are ORDERED BY AQUEOUS SOLUBILITY, and the ~2.5x
# extreme-to-extreme ratio is Cain's stated figure, not one invented here (0.65 / 0.26 = 2.5).
#
# NOW THE HONEST LIMITS OF THAT, which matter more than the citation:
#   * Cain's compounds are NOT our compounds. Not one of the 21 below appears in his set. The
#     ORDERING is transferred by analogy; the ASSIGNMENT of any individual compound to a point
#     on the scale is an author estimate and nothing more.
#   * Cain's exponents are AIR-DELIVERY measurements. His own result is that absolute exponents
#     SHIFT with presentation method (olfactometer vs. sniffed swab) and only the RANK survives
#     the change. There is no evidence the rank survives transfer into an ETHANOLIC WINE/BEER
#     MATRIX, which is the matrix these are applied in and which is documented to reorder
#     perception outright.
#   * The solubility correlation may be partly PARTITIONING, not receptor psychophysics — which
#     is precisely the axis a wine matrix alters.
#   * THE SPREAD IS THE LOAD-BEARING QUANTITY, AND IT IS THE WEAKEST PART. Under the max rule
#     the only thing an exponent can change is WHICH compound is named dominant, and a flip
#     depends on the RATIO of two exponents, not their rank. Cain's 2.5x is a between-EXTREMES
#     figure for HIS compounds under AIR delivery; every intermediate spacing below is invented.
#
# So: Cain justifies the DIRECTION and the rough SCALE of the spread. Cain does not justify any
# single value. `source:` stays "author estimate" on every entry for that reason — the citation
# lives in `notes:`, where it belongs, and may never be read as vouching for these numbers.
#
# WHAT THIS BUYS, AND WHAT IT DOES NOT. `above_threshold` is UNCHANGED by compression: with
# I = OAV**n and n > 0, I > 1 iff OAV > 1. A GLOBAL exponent is a provable NO-OP on every
# observable (a monotone transform preserves argmax, so `dominant` is untouched too) — which is
# why one is not offered. PER-COMPOUND exponents can flip `dominant`, and that flip is this
# file's ENTIRE payload. See D-98's sensitivity pass for whether any flip actually survives the
# uncertainty bands below — the answer decides what, if anything, may be claimed from it.
#
# UNCERTAINTY. Bands are deliberately WIDE (roughly -40%/+50%, clipped into the reported
# 0.2-0.8 odor range) because a guess must state that it is one. They are NOT panel spreads;
# there is no panel. They are the author's honest ignorance. NB (D-24): like `sensory.yaml`,
# this file loads standalone and therefore sits OUTSIDE the ensemble parameter sweep —
# `simulate_ensemble` will not propagate these bands. The D-98 sensitivity pass is a MANUAL
# Monte Carlo over them, not automatic propagation.
#
# TIER. All `speculative`, necessarily. The consuming layer floors its outputs at speculative
# regardless (`descriptor_tier`), so nothing here can lift any output's tier.

# =====================================================================================
# TIER A — miscible / very soluble (>100 g/L in water). The steepest exponents.
# =====================================================================================

stevens_n_acetaldehyde:
  value: 0.65
  unit: "1"   # dimensionless Stevens exponent
  tier: speculative
  uncertainty: { low: 0.39, high: 0.80, note: "author's ignorance, not a panel spread. Top of the assumed range: acetaldehyde is fully miscible, the most water-soluble odorant in the set." }
  provenance:
    source: "author estimate"
    conditions: "no matrix — a matrix-agnostic estimate. Applied to both wine and beer; the matrix-dependence of exponents is UNMODELLED (see notes)."
    notes: "ORDERED per Cain 1969 (Percept. Psychophys. 6:349-354): exponent rank-order tracks aqueous solubility, soluble ~2.5x insoluble. Acetaldehyde is MISCIBLE => placed at the top of the assumed 0.2-0.8 odor range. Cain measured neither this compound nor any wine matrix; the ordering is transferred by analogy and the value itself is a guess."

