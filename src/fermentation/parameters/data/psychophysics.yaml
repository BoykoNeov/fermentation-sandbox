    conditions: "no matrix — matrix-agnostic; applied to wine and beer alike."
    notes: "ORDERED per Cain 1969's solubility-exponent rank correlation. Diacetyl is very water-soluble (~200 g/L) => a steep exponent. Not one of Cain's compounds; value is an author estimate."

