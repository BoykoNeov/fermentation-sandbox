# Acid dissociation constants for the wine pH charge-balance solver (decision D-18).
#
# SHARED, medium-agnostic parameter file: loaded alongside the <medium>_<strain>.yaml
# by the compile seam (the store merges paths; these pKa names are collision-free with
# the kinetic parameters). It holds only the pKa set the proton/charge-balance solver
# (fermentation.core.acidbase) needs; the ionic product of water Kw is an in-code
# physical constant (like GAS_CONSTANT), not an empirical parameter.
#
# VALUES: standard thermodynamic pKa at 25 C, zero ionic strength (CRC Handbook of
# Chemistry and Physics; corroborated by Boulton et al., Principles and Practices of
# Winemaking, and the wine-chemistry literature). These are textbook acid constants.
#
# TIER = plausible (NOT validated), uniformly. The pKa MEASUREMENTS are validated
# science, but applying 25 C / I=0 constants to real wine (ionic strength I ~ 0.05-0.1 M,
# 10-30 C) is an extrapolation: the concentration-based *apparent* pKa is the standard
# plausible-tier simplification, and inverse anchoring (the back-solved strong cation)
# folds the activity-coefficient error into the fitted cation at t=0 so it affects only
# the buffer-capacity SLOPE, where we claim only directional fidelity. Per decision D-18
# the derived pH/TA tier is computed EXPLICITLY (acidbase.ph_tier) as the lowest of these
# pKa tiers floored at plausible, so pH never inherits a VALIDATED default.
#
# Acetic acid (pKa 4.76) is folded into the succinic-equivalent Byp read for now (the Byp
# pool is lumped organic acids/polyols); add a separate `acetic` species only if Byp is
# later speciated.

# -- Tartaric acid, C4H6O6 (diprotic) — the dominant grape acid -----------------
pKa_tartaric_1:
  value: 3.04
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 2.9, high: 3.2, note: "thermodynamic pKa1 at 25 C, I=0; apparent value in wine shifts with ionic strength" }
  provenance:
    source: "CRC Handbook of Chemistry and Physics (ionization constants of organic acids); Boulton et al., Principles and Practices of Winemaking"
    conditions: "25 C, zero ionic strength (thermodynamic pKa); applied to wine as an apparent constant (decision D-18)"
    notes: "First dissociation of tartaric (2,3-dihydroxybutanedioic) acid, the principal grape acid. pKa1 ~ must pH, so tartaric buffers hardest near pitch — the reason the strong-cation term is mandatory (weak acids alone give pH ~2.3 at ~33 mM, real must ~3.3)."

pKa_tartaric_2:
  value: 4.37
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 4.2, high: 4.5, note: "thermodynamic pKa2 at 25 C, I=0" }
  provenance:
    source: "CRC Handbook of Chemistry and Physics; Boulton et al., Principles and Practices of Winemaking"
    conditions: "25 C, zero ionic strength; applied to wine as an apparent constant (decision D-18)"
    notes: "Second dissociation of tartaric acid. The HT-/T2- equilibrium governs bitartrate (KHT) chemistry; carried here for the charge balance, relevant to a future cold-stabilization Process."

# -- L-malic acid, C4H6O5 (diprotic) — the MLF substrate ------------------------
pKa_malic_1:
  value: 3.40
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 3.3, high: 3.5, note: "thermodynamic pKa1 at 25 C, I=0" }
  provenance:
    source: "CRC Handbook of Chemistry and Physics; Boulton et al., Principles and Practices of Winemaking"
    conditions: "25 C, zero ionic strength; applied to wine as an apparent constant (decision D-18)"
    notes: "First dissociation of L-malic (2-hydroxybutanedioic) acid. pKa1 sits right at must pH, so malic buffers strongly there — the reason malolactic fermentation (diprotic malic -> monoprotic lactic) raises pH appreciably (the D-18 headline coupling)."

pKa_malic_2:
  value: 5.11
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 5.0, high: 5.2, note: "thermodynamic pKa2 at 25 C, I=0" }
  provenance:
    source: "CRC Handbook of Chemistry and Physics; Boulton et al., Principles and Practices of Winemaking"
    conditions: "25 C, zero ionic strength; applied to wine as an apparent constant (decision D-18)"
    notes: "Second dissociation of L-malic acid. Above must pH, so the second proton is mostly bound at wine pH; it still contributes to the diprotic charge term that MLF removes."

# -- L-lactic acid, C3H6O3 (monoprotic) — the MLF product ----------------------
pKa_lactic:
  value: 3.86
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 3.7, high: 4.0, note: "thermodynamic pKa at 25 C, I=0" }
  provenance:
    source: "CRC Handbook of Chemistry and Physics; Boulton et al., Principles and Practices of Winemaking"
    conditions: "25 C, zero ionic strength; applied to wine as an apparent constant (decision D-18)"
    notes: "Lactic (2-hydroxypropanoic) acid is MONOPROTIC and weaker than malic's first proton, so converting diprotic malic to monoprotic lactic both removes a dissociable proton and softens the acid — why MLF deacidifies (pH up ~0.1-0.3). The softer perceived acidity at fixed pH is a separate sensory effect, not modelled here."

# -- Succinic acid, C4H6O4 (diprotic) — the Byp-pool representative -------------
pKa_succinic_1:
  value: 4.21
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 4.1, high: 4.3, note: "thermodynamic pKa1 at 25 C, I=0" }
  provenance:
    source: "CRC Handbook of Chemistry and Physics; Boulton et al., Principles and Practices of Winemaking"
    conditions: "25 C, zero ionic strength; applied to wine as an apparent constant (decision D-18)"
    notes: "First dissociation of succinic (butanedioic) acid, the representative species the lumped `Byp` minor-byproduct pool is carbon-accounted as (D-16). The charge balance READS the existing Byp pool through these pKas (include-by-reading, D-18 coupling #2): zero new carbon, so total_carbon is unchanged and the former double-count is closed."

pKa_succinic_2:
  value: 5.64
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 5.5, high: 5.8, note: "thermodynamic pKa2 at 25 C, I=0" }
  provenance:
    source: "CRC Handbook of Chemistry and Physics; Boulton et al., Principles and Practices of Winemaking"
    conditions: "25 C, zero ionic strength; applied to wine as an apparent constant (decision D-18)"
    notes: "Second dissociation of succinic acid. Mostly bound at wine pH. CAVEAT (D-18): Byp also lumps neutral 2,3-butanediol, so reading the whole pool as a diprotic acid slightly OVERSTATES its acid charge (~1-1.5 mM vs the ~20 mM buffer) — a documented minor approximation."

# -- Sulfurous acid, H2SO3 / SO2.H2O (diprotic) — the free-SO2 speciation set ----
#
# READOUT-ONLY (decision D-22). Unlike the acids above, these pKas are NOT in the
# pH-solver's acid set (acidbase.PKA_PARAM_NAMES / build_pka_map) and are NOT read by
# titratable_acidity. They are read only by the molecular-SO2 readout (acidbase.
# molecular_so2 / molecular_so2_fraction), which solves pH from the organic acids and
# then partitions the dosed free SO2 into molecular / bisulfite / sulfite at that pH.
# Free SO2's own (minor) back-reaction on pH — bisulfite is a charge-active anion — is a
# scoped omission for beat 1 (the inverse anchoring would absorb it into the fitted
# cation at t=0 anyway, so the t=0 molecular-SO2 number is identical with or without it;
# see D-22). OIV titratable acidity explicitly EXCLUDES sulfurous (and carbonic) acid,
# which the readout-only design gives for free. Add to the charge balance later via an
# `extra_acids` map if a mid-ferment SO2 addition event is built.
pKa_sulfurous_1:
  value: 1.81
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 1.77, high: 1.86, note: "effective wine value; literature 1.77-1.86 at cellar T / ionic strength" }
  provenance:
    source: "Usseglio-Tomasset & Bosia (1984), Bull. OIV; carried in Boulton et al., Principles and Practices of Winemaking, and Ribereau-Gayon et al., Handbook of Enology Vol. 1"
    conditions: "wine-relevant temperature/ionic strength; applied as an apparent constant (decision D-22)"
    notes: "First dissociation SO2.H2O <-> H+ + HSO3-. THE load-bearing constant: the molecular (undissociated SO2.H2O) fraction of free SO2 is 1/(1 + 10^(pH - pKa1)), and molecular SO2 is the antimicrobial species. With pKa1 ~ 1.81 the molecular fraction falls ~3x per 0.5 pH unit (~6% at pH 3.0, ~2% at pH 3.5, ~0.6% at pH 4.0) — the pH coupling the D-18 charge-balance keystone was built to make emerge. ~0.8 mg/L molecular (the microbial-stability target) needs ~40 mg/L free at pH 3.5."

pKa_sulfurous_2:
  value: 7.20
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 6.9, high: 7.3, note: "thermodynamic pKa2; well above wine pH so sulfite is negligible there" }
  provenance:
    source: "CRC Handbook of Chemistry and Physics; Usseglio-Tomasset & Bosia (1984); Boulton et al., Principles and Practices of Winemaking"
    conditions: "25 C; applied as an apparent constant (decision D-22)"
    notes: "Second dissociation HSO3- <-> H+ + SO3(2-). Far above wine pH (3-4), so the sulfite fraction is negligible (~1e-4) and the diprotic molecular fraction h^2/D reduces to the monoprotic 1/(1 + 10^(pH - pKa1)) there. Carried for an exact speciation and so the readout is correct up to the pH-8.2 TA endpoint, where sulfite IS partly formed — the reason excluding SO2 from titratable_acidity is load-bearing, not cosmetic (D-22)."

# -- Carbonyl-bisulfite binding: the free/bound SO2 split (decisions D-28, D-51) -
#
# Now that acetaldehyde exists as real state (decision D-27), the dosed SO2 slot is
# reinterpreted as TOTAL SO2 (conserved, inert) and the free/bound split is DERIVED at
# the solved pH by the binding equilibrium (acidbase.bound_so2 / free_so2 / speciate_so2):
#
#     CH3CHO + HSO3-  <->  CH3CH(OH)SO3-      K = [free acetaldehyde][HSO3-] / [adduct]
#
# referenced to BISULFITE (the reactive nucleophile), so pH enters via the bisulfite
# fraction of free SO2. Free = total - bound; molecular = free * neutral_fraction(pH), so
# D-22's molecular-SO2 readout survives unchanged at acetaldehyde = 0 (total == free).
#
# D-51 GENERALIZES this to a COUPLED MULTI-CARBONYL equilibrium: acetaldehyde is not the
# only bisulfite binder in real wine — the excreted keto-acid pools pyruvate (D-49) and
# alpha-ketoglutarate (D-50) compete for the SAME shared bisulfite pool. All three carbonyls
# now solve ONE equilibrium (acidbase.bound_so2_molar, a competitive-Langmuir partition over
# a single reactive-bisulfite root, N=1 reduces EXACTLY to the original D-28 quadratic).
# READOUT-ONLY, like D-22/D-28: the split does not add new state or touch conservation. The
# live consumers are the MLF antimicrobial gate (free-molecular SO2, D-28) and the
# acetaldehyde-reduction ADH protection (D-47) — the latter now reads a SMALLER
# acetaldehyde-bound share than the single-carbonyl D-28/D-47 form, because pyruvate/alpha-KG
# now soak up some of the dosed SO2 too.
K_acetaldehyde_so2:
  value: 1.5e-6
  unit: "mol/L"
  tier: plausible
  uncertainty: { low: 2.0e-7, high: 2.1e-6, note: "order-of-magnitude literature scatter: apparent Kd 1.5e-6 (pH 3.3) - 2.06e-6 (pH 3.5); Blouin's ~0.04% free acetaldehyde at 30 mg/L free SO2 implies ~2e-7. Wide band spans both." }
  provenance:
    source: "Burroughs & Sparks (1973), Sulphite-binding power of wines and ciders (the canonical carbonyl-bisulphite dissociation constants); apparent Kd 1.5e-6 (pH 3.3) - 2.06e-6 (pH 3.5) reported across the wine literature (e.g. Food Chemistry 2020, doi 10.1016/j.foodchem.2020.127173; AJEV 76:0760008, 2025); Blouin (1966) via SciELO S2224-79042018000200001"
    conditions: "wine, ~pH 3.3-3.5, cellar temperature; apparent (concentration-based) dissociation constant"
    notes: "Dissociation constant of the acetaldehyde-hydroxysulphonate adduct, the strongest carbonyl-SO2 bond in wine (acetaldehyde is the principal SO2 binder). REFERENCED TO BISULFITE HSO3- (the reactive species), so the binding solver uses [HSO3-] = free_SO2 * bisulfite_fraction(pH) and pH enters the equilibrium mechanistically. The literature apparent constants are usually quoted per TOTAL free SO2 at a stated pH; at wine pH bisulfite is ~0.94-0.99 of free SO2, so the bisulfite-vs-total-free basis differs by <=5% (well inside the order-of-magnitude band). tier=plausible: measured constants applied to wine as apparent values, with a wide band. SCOPE (pre-D-51): acetaldehyde-only binder — real bound SO2 also sits on pyruvate / alpha-ketoglutarate / sugars; D-51 adds the two keto-acid binders below to the SAME equilibrium (sugars remain unmodelled, so the 'total' slot is still a slight overclaim on the name, now smaller)."

# -- Pyruvate-bisulfite binding (decision D-51) -- the second-strongest carbonyl binder --
#
# Pyruvate (CH3-CO-COOH) + HSO3- <-> its alpha-hydroxysulphonate adduct, the SAME 1:1
# equilibrium form as acetaldehyde, referenced to bisulfite for the SAME reason. Roughly
# 370x WEAKER than acetaldehyde (Kd two orders of magnitude larger), consistent with
# pyruvate binding SO2 far less avidly per mole -- but its excreted-overflow pool (D-49,
# nominal ~30 mg/L residual) is persistent and measured, so it still competes materially
# for the shared bisulfite pool at typical dosed-SO2 concentrations (verified: captures a
# double-digit percent share of total SO2 at a 50 mg/L dose alongside alpha-KG, D-51).
K_pyruvate_so2:
  value: 5.55e-4
  unit: "mol/L"
  tier: plausible
  uncertainty: { low: 1.5e-4, high: 2.0e-3, note: "Burroughs & Sparks report 5.55e-4 at pH 3.3; a later secondary review rounds pyruvate's Kd to ~2e-4 mol/L, order-of-magnitude consistent. Band spans both plus apparent-pKa pH drift across the wine range (3.3-3.8, same drift acetaldehyde's band carries)." }
  provenance:
    source: "Burroughs & Sparks (1973), Sulphite-binding power of wines and ciders I: equilibrium constants for the dissociation of carbonyl bisulphite compounds (J. Sci. Food Agric. 24:187-198) -- apparent Kd 5.55e-4 mol/L at pH 3.3, the same canonical source as K_acetaldehyde_so2 (a direct cross-check: that paper's acetaldehyde value 1.5e-6 matches this codebase's independently-sourced K_acetaldehyde_so2 exactly)."
    conditions: "wine, ~pH 3.3, cellar temperature; apparent (concentration-based) dissociation constant, referenced to bisulfite HSO3- like K_acetaldehyde_so2"
    notes: "Second-strongest carbonyl-SO2 binder in wine after acetaldehyde (Jackowetz & Mira de Orduna 2013). Competes with acetaldehyde and alpha-ketoglutarate for the SAME shared bisulfite pool in the D-51 multi-carbonyl equilibrium (acidbase.bound_so2_molar) -- a competitive-Langmuir partition, NOT an independent binding (three carbonyls cannot each claim the same free SO2). tier=plausible: a measured constant applied to wine as an apparent value, banded for pH-drift and the secondary-source scatter."

# -- Alpha-ketoglutarate-bisulfite binding (decision D-51) -- the third carbonyl binder --
#
# Alpha-ketoglutarate (2-oxoglutaric acid) + HSO3- <-> its adduct, the SAME 1:1 form.
# Roughly 93x weaker than acetaldehyde but slightly STRONGER than pyruvate (smaller Kd),
# so per mole it is the second-most-avid binder even though its excreted pool (D-50,
# nominal ~20 mg/L residual) is smaller than pyruvate's.
K_alpha_kg_so2:
  value: 1.4e-4
  unit: "mol/L"
  tier: plausible
  uncertainty: { low: 4.0e-5, high: 5.0e-4, note: "Burroughs & Sparks report 1.4e-4 at pH 3.3; a later secondary review rounds oxoglutaric acid's Kd to ~5e-4 mol/L, order-of-magnitude consistent (the wider end of this band covers it). Band also spans the same apparent-pKa pH-drift margin as the other two binding constants." }
  provenance:
    source: "Burroughs & Sparks (1973), Sulphite-binding power of wines and ciders I (J. Sci. Food Agric. 24:187-198) -- apparent Kd 1.4e-4 mol/L at pH 3.3 for 2-ketoglutaric acid, the same canonical source and cross-checked acetaldehyde value as K_pyruvate_so2."
    conditions: "wine, ~pH 3.3, cellar temperature; apparent (concentration-based) dissociation constant, referenced to bisulfite HSO3- like K_acetaldehyde_so2"
    notes: "Third carbonyl-SO2 binder in the D-51 multi-carbonyl equilibrium, sharing the same bisulfite pool as acetaldehyde and pyruvate (acidbase.bound_so2_molar). tier=plausible: a measured constant applied to wine as an apparent value, banded for pH-drift and secondary-source scatter."
