# ============================================================================================
# THE NON-OXIDATIVE THERMAL AGING AXIS (decisions D-87, D-88)
# ============================================================================================
# The O2-INDEPENDENT thermal mirror of the oxidative aging sub-axis. Where the D-71..D-78 O2
# sub-axis needs dissolved oxygen (bottle ingress / micro-ox / barrel) to drive its chemistry,
# THIS axis is driven by RESIDUAL SUGAR and HEAT alone -- a sealed, sulfited, oxygen-free sweet
# wine still ages thermally. Two Processes:
#
#   * MaillardStrecker (D-87) -- the non-oxidative Strecker route: residual sugar forms
#     alpha-dicarbonyls (methylglyoxal, glyoxal, deoxyosones) via Maillard/caramelization, and
#     those dicarbonyls deaminate + decarboxylate amino acids to STRECKER ALDEHYDES with NO O2.
#     The thermal mirror of the oxidative (quinone-driven) StreckerDegradation (D-75): same
#     limiting reagent (amino_acids), same carbon/nitrogen ledger closure, but driven by sugar +
#     heat instead of dissolved O2. Produces the sweet-wine / Madeira aroma suite: methional +
#     phenylacetaldehyde (shared with D-75), the three branched-chain aldehydes 2-methylbutanal
#     (isoleucine), 3-methylbutanal (leucine), 2-methylpropanal (valine), and sotolon (the
#     curry/fenugreek/maple furanone of botrytized sweet wine / vin jaune / Madeira). See
#     fermentation.core.kinetics.aging.MaillardStrecker and decision D-87.
#
#   * Caramelization (D-88) -- the non-oxidative sugar-only browning route (params appended by
#     D-88): residual sugar thermally browns to melanoidin, raising A420 with no O2. The thermal
#     mirror of the O2-driven PhenolicBrowning (D-74). SUGAR-ONLY (no amino-acid nitrogen
#     incorporated), so it is caramelization, not true Maillard melanoidin -- a documented v1
#     scope (see D-88).
#
# BOTH Processes are WINE-ONLY (they read the wine-only amino_acids / the sweet-wine residual-sugar
# regime) and DISABLED at the compile seam, re-enabled by begin_aging alongside the rest of the
# aging axis. Both are SUBSTRATE-GATED (on residual sugar; MaillardStrecker additionally on
# amino_acids), so like the D-72/D-75 substrate-gated O2 sinks they add on top of the existing
# aging trajectory WITHOUT re-baselining anything: an amino-acid-free (MaillardStrecker) or
# sugar-free / dry (both) wine is left as it was. ISOLABILITY rests on the amino_acids HARD gate
# for MaillardStrecker (undosed => exactly zero); residual sugar is a SOFT driver (a "dry" wine
# still holds ~1-2 g/L, so the thermal route is negligible there, not byte-for-byte zero -- the
# physically-correct trace).
#
# TIER: all speculative -- the Tier-3 frontier. The load-bearing SOURCED claims are the FORMS
# (sugar + amino acid + heat => Strecker aldehydes / sugar + heat => browning, both O2-independent
# and strongly warmer-faster) and the ORDERING that the thermal route is far MORE temperature-
# sensitive than the oxidative one (Maillard/caramelization E_a ~100 kJ/mol, well above the
# oxidative sub-axis's ~50). Every magnitude is an order-of-magnitude estimate.

# ============================================================================================
# D-87 -- MaillardStrecker (non-oxidative thermal Strecker aldehydes + sotolon)
# ============================================================================================
# THE PROCESS (fermentation.core.kinetics.aging.MaillardStrecker, WINE-ONLY):
#
#   S_total    = sum of the residual-sugar vector (g/L)                    # the dicarbonyl driver
#   gate_i     = aa_i / (K_i + aa_i),  K_i = K_amino_acids * f_i           # PER-PRECURSOR (D-100)
#   n_ald      = k_maillard_strecker * f(T) * S_total * gate               # mol total product /L/h
#   f(T)       = arrhenius_factor(T, E_a_maillard_strecker, T_ref)         # STRONGLY warmer-faster
#   n_i        = (w_maillard_i / sum_j w_maillard_j) * n_ald               # per-product mol rate
#   d(product_i)/dt = +n_i * M_i                                           # each aroma pool, g/L/h
#   d(CO2)/dt  = +(n_ald - n_sotolon) * M_CO2   # 1 CO2 per DECARBOXYLATING aldehyde, NOT sotolon
#   d(<precursor_i>)/dt = -(product_i carbon rate) / c_<precursor_i>       # each sized to ITS C
#   d(N)/dt    = +(sum of those draws) * n_<precursor_i>                   # deamination -> N
#
# NO O2 term (the whole point -- this is the O2-independent route). S is a READ-ONLY driver, NOT
# consumed here (its consumption is booked by the Caramelization route, D-88; the aldehyde carbon
# is the AMINO ACID's, not the sugar's -- the sugar dicarbonyl is only the electron-accepting
# oxidant, and its own carbon goes to melanoidin, D-88). CARBON + NITROGEN close to machine
# precision exactly as D-75: EACH product's draw is sized to ITS OWN carbon (its aldehyde + its
# carboxyl CO2) and taken from ITS OWN precursor -- leucine -> 3-methylbutanal, isoleucine ->
# 2-methylbutanal, valine -> 2-methylpropanal, methionine -> methional, phenylalanine ->
# phenylacetaldehyde, threonine -> sotolon (decision D-100) -- and all that precursor nitrogen is
# deaminated to N (products N-free). Before D-100 every product drew the amino_acids arginine lump:
# exact on the ledger, approximate on provenance -- that stand-in is RETIRED. Sotolon remains
# approximate in one respect the split did not fix: it lumps its 2 acetaldehyde-derived carbons
# into its threonine draw (its true aldol route is deferred). total_mass ({S,E,CO2}) sees the CO2
# term with no matching S/E debit here, but is never asserted on an aging run (the standing
# OxidativeAcetaldehyde scope-out).

# -- THERMAL STRECKER RATE CONSTANT (first-order in residual sugar, aa-gated, O2-FREE) -------
# A lumped constant: n_ald = k_maillard_strecker * f(T) * S[g/L] * gate, so it directly yields mol
# total aldehyde /L/h (the per-sugar dicarbonyl yield is folded in -- no fake per-sugar molar
# conversion, since the wine sugar pool is a glucose/fructose vector stand-in). The amino_acids pool
# is the true limiting reagent (finite aa => finite aldehyde); this k sets the RATE of approach.
k_maillard_strecker:
  value: 6.0e-13
  unit: "mol/(g*h)"   # n_ald[mol/L/h] = k * f(T) * S[g/L] * gate  (mol aldehyde per g-sugar per h)
  tier: speculative
  uncertainty: { low: 5.0e-14, high: 2.0e-12, note: "Lumped non-oxidative Strecker rate at T_ref = 20 C. CALIBRATED (D-87, advisor-flagged must-anchor) to land the produced aldehydes in the observed aged-sweet-wine range at a sweet (residual S ~100 g/L) + amino-acid-dosed + WARM (25-30 C) sealed aging: sotolon ~5-20 µg/L (Sauternes/Madeira), methional low-single-digit µg/L, the branched-chain malty aldehydes ~single-digit-to-tens µg/L. Band ~1 order each way -- the magnitude is a Tier-3 estimate; only the FORM (sugar+aa+heat=>aldehyde, O2-free) and the strong thermal sensitivity are sourced." }
  provenance:
    source: "author estimate anchored to the ORDERING that non-oxidative (sugar-dicarbonyl) Strecker degradation is the dominant aldehyde route in aged SWEET/thermal wines (Sauternes, Madeira, fortified) where residual sugar is high and O2 is limited (Pripis-Nicolau et al. 2000 on dicarbonyl-mediated Strecker in wine model systems; Escudero et al. 2000, 2002 on Strecker aldehydes as aged-wine markers; the Maillard/caramelization dicarbonyl precursors form from residual sugar). Folds the dicarbonyl precursor into k (no dicarbonyl pool tracked in v1, as with the oxidative k_strecker)."
    conditions: "generic sweet wine at cellar-to-warm temperature; pseudo-first-order in the residual-sugar vector S (the dicarbonyl driver), additionally gated by the amino-acid availability fraction aa/(K_amino_acids+aa), at T_ref = 293.15 K. WINE-ONLY (reads amino_acids); O2-INDEPENDENT (no o2 term)."
    notes: "SOURCED FORM (sugar-driven, amino-acid-gated, heat-accelerated, O2-INDEPENDENT) + SPECULATIVE magnitude. This is the thermal MIRROR of the oxidative k_strecker (D-75): same limiting reagent (amino_acids), same ledger closure, different driver (residual sugar + heat, not dissolved O2). Both routes draw the shared amino_acids pool and SUM via ProcessSet -- additive over the limiting reagent, the o2-sharing pattern applied to amino_acids, no double-count."

# -- ACTIVATION ENERGY: the thermal route is STRONGLY warmer-faster (the sourced ORDERING) -----
# The load-bearing sourced claim is the ORDERING: Maillard/caramelization chemistry is far more
# temperature-sensitive than the oxidative aging reactions (Q10 ~3-4 vs the oxidative sub-axis's
# ~2), so E_a_maillard_strecker is set ABOVE the oxidative E_a's (~50 kJ/mol). This is why a
# WARM sweet wine (Madeira estufagem, baked wine) develops the thermal aldehyde suite so much
# faster than a cellar-cool one -- the classic thermal-aging acceleration.
E_a_maillard_strecker:
  value: 100000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 80000.0, high: 130000.0, note: "Q10 ~3-4.5 at 20 C. Maillard/caramelization activation energies are characteristically ~100-150 kJ/mol -- markedly ABOVE the ~30-70 kJ/mol oxidative-staling band (E_a_strecker, E_a_browning). The SOURCED, load-bearing claim is the ORDERING (thermal route >> oxidative route in temperature sensitivity, so warm/baked sweet wines age far faster); the exact magnitude is speculative and banded." }
  provenance:
    source: "SOURCED ORDERING: Maillard browning and caramelization are strongly thermally activated (E_a ~100-150 kJ/mol; classic food-chemistry Maillard kinetics -- Labuza, van Boekel), well above the ~30-70 kJ/mol of the oxidative wine-aging reactions. Thermal sweet-wine processes (Madeira estufagem at 45-50 C, baked/rancio styles) develop Strecker/furanone character on a timescale orders faster than cellar aging -- the temperature acceleration IS the sourced signature."
    conditions: "equivalent Arrhenius activation energy of the aggregate non-oxidative (sugar-dicarbonyl) Strecker degradation at T_ref = 293.15 K"
    notes: "Only the DIRECTION and the ORDERING (E_a_maillard_strecker > the oxidative E_a's; warmer => much faster thermal aldehydes) are the sourced, load-bearing claims. Exact magnitude speculative and banded around a Q10 ~3.5. Its OWN parameter (prime directive #2) -- a distinct reaction from the oxidative E_a_strecker, and the higher band is the whole point (the thermal route out-accelerates the oxidative one with temperature)."

# -- ALDEHYDE / FURANONE COMPOSITION: relative-abundance x reactivity weights (normalized) -----
# The six non-oxidative-route products are booked by RELATIVE weights, NORMALIZED in the Process
# (f_i = w_i / sum_j w_j), so they need not sum to 1 here (avoids the six-fractions-must-sum-to-1
# fragility; a test asserts the normalized split sums to 1). Each weight is a PRODUCTION flux
# quantity -- relative amino-acid abundance x Strecker/thermal reactivity -- NOT a perceptibility
# quantity (potency lives in the per-compound OAV thresholds, so folding it in here would DOUBLE-
# count it, the D-75 follow-up lesson). Phenylalanine, leucine and the other branched-chain amino
# acids are among the more abundant must amino acids; methionine is a minor sulfur amino acid; the
# threonine-derived sotolon route is a minor but characteristic flux.
w_maillard_phenylacetaldehyde:
  value: 0.30
  unit: "1"   # relative production weight (normalized against the other five in-code)
  tier: speculative
  uncertainty: { low: 0.15, high: 0.45, note: "Phenylalanine is among the most abundant must amino acids => phenylacetaldehyde (honey) a major thermal-Strecker product. Relative weight, normalized in-code." }
  provenance:
    source: "author estimate of relative phenylalanine-derived thermal-Strecker flux (abundance x reactivity). Phenylalanine consistently among the most abundant must amino acids (Escudero et al. 2000, 2002)."
    conditions: "generic sweet wine; relative production weight of phenylacetaldehyde (C8H8O) among the six non-oxidative-route products, at T_ref = 293.15 K. Since D-100 MaillardStrecker draws each product's REAL precursor (phenylalanine here), each gated on its own pool — the pre-D-100 arginine-lump stand-in is retired; this weight remains an estimate of relative production flux."
    notes: "SPECULATIVE. PRODUCTION flux only; perceptibility lives in threshold_phenylacetaldehyde_wine. Normalized against the other five weights in-code."
w_maillard_3_methylbutanal:
  value: 0.22
  unit: "1"   # relative production weight (normalized in-code)
  tier: speculative
  uncertainty: { low: 0.10, high: 0.35, note: "3-methylbutanal (leucine, malty/dark-chocolate) is typically the most prominent branched-chain thermal/staling aldehyde. Relative weight, normalized in-code." }
  provenance:
    source: "author estimate of relative leucine-derived thermal-Strecker flux. 3-methylbutanal is a canonical malty aldehyde of thermally-aged and stale beverages (leucine abundant, high Strecker reactivity)."
    conditions: "generic sweet wine; relative production weight of 3-methylbutanal (C5H10O) among the six products, at T_ref = 293.15 K. Drawn from LEUCINE, its real precursor, since D-100 (the arginine lump is retired)."
    notes: "SPECULATIVE. Production flux only; potency in threshold_3_methylbutanal_wine. Normalized in-code."
w_maillard_2_methylbutanal:
  value: 0.15
  unit: "1"   # relative production weight (normalized in-code)
  tier: speculative
  uncertainty: { low: 0.07, high: 0.28, note: "2-methylbutanal (isoleucine, malty/almond). Relative weight, normalized in-code." }
  provenance:
    source: "author estimate of relative isoleucine-derived thermal-Strecker flux (a canonical malty aldehyde, isoleucine moderately abundant)."
    conditions: "generic sweet wine; relative production weight of 2-methylbutanal (C5H10O) among the six products, at T_ref = 293.15 K. Drawn from ISOLEUCINE, its real precursor, since D-100 (the arginine lump is retired)."
    notes: "SPECULATIVE. Production flux only; potency in threshold_2_methylbutanal_wine. Normalized in-code."
w_maillard_2_methylpropanal:
  value: 0.15
  unit: "1"   # relative production weight (normalized in-code)
  tier: speculative
  uncertainty: { low: 0.07, high: 0.28, note: "2-methylpropanal / isobutyraldehyde (valine, malty/grainy). Relative weight, normalized in-code." }
  provenance:
    source: "author estimate of relative valine-derived thermal-Strecker flux (isobutyraldehyde, valine moderately abundant)."
    conditions: "generic sweet wine; relative production weight of 2-methylpropanal (C4H8O) among the six products, at T_ref = 293.15 K. Drawn from VALINE, its real precursor, since D-100 (the arginine lump is retired)."
    notes: "SPECULATIVE. Production flux only; potency in threshold_2_methylpropanal_wine. Normalized in-code."
# -- SOTOLON: NOT a Strecker weight any more -- its own second-order aldol rate (decision D-107) --
#
# `w_maillard_sotolon` IS RETIRED. It was sotolon's relative production weight among SIX thermal
# Strecker products, and sotolon is not a Strecker product: it is an aldol condensation of
# alpha-ketobutyrate + acetaldehyde (Pham et al. 1995 -- "under the conditions of temperature, pH,
# and alcoholic content similar to the ageing of wine in barrels ... by a purely chemical
# mechanism"). It carried TWO exception flags in the D-87 product table (decarboxylates=False,
# de_novo=True) for two decisions; both were the model reporting that this compound was in the
# wrong Process. D-107 moved it to SotolonAldolCondensation and both flags were deleted.
#
# THE SUGAR DRIVER WENT WITH IT, and that is an empirical correction, not a tidy-up. Riding
# k_maillard_strecker made sotolon pseudo-first-order in RESIDUAL SUGAR (the dicarbonyl driver a
# Strecker degradation needs and an aldol does not), i.e. a SWEETNESS marker. Pons et al. 2010
# identified this same aldol as the source of sotolon in prematurely aged DRY WHITE wines, where it
# is the premature-oxidation ('premox') marker. Sugar is absent from the rate law below because it
# is absent from the reaction.
k_sotolon_aldol:
  value: 2.0e-4
  unit: "L/(mol*h)"   # n_sotolon[mol/L/h] = k_sotolon_aldol * f(T) * [alpha_ketobutyrate][mol/L] * [acetaldehyde][mol/L]
  tier: speculative
  uncertainty: { low: 5.0e-5, high: 8.0e-4, note: "CALIBRATED (the D-87 anchor, inherited) to land sotolon at ~5-20 ug/L over a multi-year warm sealed sweet-wine aging -- the Sauternes/Madeira range -- against the ~2 mg/L alpha-ketobutyrate residual and the ~33 mg/L acetaldehyde this model produces. Band ~1 order each way: it is a Tier-3 magnitude. NOTE the band is not independent of k_alpha_kb_excretion -- the two multiply, so the residual's uncertainty rides into sotolon on top of this." }
  provenance:
    source: "SOURCED FORM (Pham et al. 1995, J. Agric. Food Chem. 43:2616 -- sotolon formed from alpha-ketobutyric acid + acetaldehyde in synthetic wine medium by a purely chemical mechanism, no enzyme and no yeast; Pons et al. 2010, J. Agric. Food Chem. 58:7273 -- the same aldol identified as the sotolon pathway in prematurely aged dry white wines) + SPECULATIVE magnitude (author estimate; Pham's actual rate data is paywalled and UNREAD -- what is taken from it is the mechanism and the direction of the temperature/pH/ethanol dependences, not a rate constant)."
    conditions: "generic wine; SECOND-ORDER (bimolecular, mass-action) in alpha_ketobutyrate x acetaldehyde, at T_ref = 293.15 K. Wine-only; O2-INDEPENDENT as a rate law (but see notes -- the O2 coupling arrives through acetaldehyde)."
    notes: |
      SPECULATIVE magnitude, SOURCED form. Three things follow from the rate law being mass-action in the two real substrates rather than gated:
      (1) ISOLABILITY IS EXACT AND FREE. A ProcessSet without the keto-acid Processes leaves alpha_ketobutyrate at 0 and this rate at EXACTLY 0 -- no clamp, no epsilon. Neither substrate can be driven negative (each draw is proportional to the pool it debits). A Michaelis-style availability gate would have needed a FABRICATED half-saturation per substrate; the faithful form needs none. The more-faithful rate law is the one with FEWER invented numbers -- the opposite of the usual trade, and the reason D-107 did not settle for re-routing sotolon's carbon while leaving it sugar-driven.
      (2) THE OXIDATION COUPLING IS EMERGENT. OxidativeAcetaldehyde (D-71) raises acetaldehyde when O2 is dosed, so an oxidised wine makes more sotolon BECAUSE it made more acetaldehyde -- Pons' premox mechanism, with nothing scripted. Same term explains vin jaune (flor acetaldehyde is very high => 120-268 ug/L over 6 years, Pham). SO2 enters for free too: it binds acetaldehyde (D-47), and this rate reads the pool that binding depletes.
      (3) CARBON CLOSES ON ATOM COUNTS. Sotolon C6 = alpha-ketobutyrate C4 + acetaldehyde C2, so total_carbon closes because the chemistry balances, not because a mass was SIZED to close it -- this route has no D-105 carbon-sized-draw blind spot to check. Mass carries a small gap: the aldol condenses out 1 mol H2O (C4H6O3 + C2H4O -> C6H8O3 + H2O), untracked.
      TEMPERATURE: reads E_a_maillard_strecker as a DELIBERATE CARRY-OVER, not a claim that this reaction shares the Strecker activation energy. Sotolon already rode that constant from D-87 to D-106, so carrying it is the status quo; Pham sources the DIRECTION ("formation of sotolon increases by increasing temperature") and nothing more. Inventing a sotolon-specific E_a to look precise is exactly the fabrication D-101 committed and D-102 had to retract. Re-sourcing it is a parameter-file change, not a structural one.
      SCOPE, named not hidden: Pham also measures sotolon rising with DECREASING pH and DECREASING ethanol -- neither term is modelled, and the model HAS both quantities, so these are real omissions rather than inexpressible ones. Botrytised sweet wines may carry an additional sugar/furanone contribution not modelled here. The ENANTIOMERS are not split: (S)-sotolon's threshold ~0.8 ug/L is ~100x below (R)'s ~89 ug/L (Pons et al.), so one racemic pool against one threshold is a lump -- see threshold_sotolon_wine.
w_maillard_methional:
  value: 0.08
  unit: "1"   # relative production weight (normalized in-code)
  tier: speculative
  uncertainty: { low: 0.03, high: 0.18, note: "Methional (methionine, cooked-potato) is a MINOR production share (methionine a minor sulfur amino acid) but potent. Relative weight, normalized in-code." }
  provenance:
    source: "author estimate of relative methionine-derived thermal-Strecker flux. Methionine is a minor must amino acid, so methional is a small production share -- but a potent low-µg/L marker (the same flux-not-potency logic as the oxidative f_methional, D-75)."
    conditions: "generic sweet wine; relative production weight of methional (C4H8OS) among the six products, at T_ref = 293.15 K. Drawn from METHIONINE, its real precursor, since D-100 (the arginine lump is retired)."
    notes: "SPECULATIVE. Production flux only; potency in threshold_methional_wine (shared with the D-75 oxidative route -- same molecule, same threshold). Normalized in-code."

# ============================================================================================
# D-88 -- Caramelization (non-oxidative sugar-only thermal browning)
# ============================================================================================
# THE PROCESS (fermentation.core.kinetics.aging.Caramelization, WINE-ONLY):
#
#   S_total  = sum of the residual-sugar vector (g/L)
#   r        = k_caramelization * f(T) * S_total                    # g sugar/L/h caramelized
#   f(T)     = arrhenius_factor(T, E_a_caramelization, T_ref)       # STRONGLY warmer-faster
#   d(S)/dt         = -r
#   d(melanoidin)/dt = +r * c(sugar) / c(melanoidin)               # carbon-exact carbon-park
#   d(A420)/dt       = +y_a420_per_melanoidin * d(melanoidin)/dt   # the SHARED browning index (D-74)
#
# The O2-INDEPENDENT thermal mirror of PhenolicBrowning (D-74): residual sugar browns to melanoidin
# by HEAT alone (thermal dehydration/caramelization), no O2 -- so a sealed sweet wine still darkens.
# The FIRST aging Process to consume core S, so the sugar carbon must land in a weighted pool: the
# melanoidin carbon-park (ON total_carbon, the debris/glucan precedent) closes the transfer exactly
# (release at the sugar fraction, redeposit at melanoidin's caramelan-stand-in fraction). Raises the
# SAME A420 index D-74 accumulates (oxidative + thermal browning are one observable). SUGAR-ONLY
# (no amino-acid N incorporated) => it is CARAMELIZATION, not Maillard melanoidin (that route
# deferred). WINE-ONLY v1 (a bundling choice with the sweet-wine axis, not a physics constraint --
# beer/wort melanoidins are real; beer thermal browning deferred, the D-86 oak-to-beer pattern).
# ALL speculative -- the FORM (sugar + heat => browning, O2-independent, strongly warmer-faster) is
# sourced; every magnitude an order-of-magnitude estimate.

# -- CARAMELIZATION RATE CONSTANT (first-order in residual sugar, O2-FREE) --------------------
# Small: only a few g/L of a sweet wine's residual sugar browns over years of cellar aging (thermal
# caramelization is slow at cellar temperature; it is the WARM styles -- Madeira estufagem, baked
# wines -- where it runs fast, via the high E_a below). CALIBRATED (D-88) so a warm multi-year sweet-
# wine aging raises A420 to a visible amber-brown (~0.3-1 AU) while leaving most residual sugar.
k_caramelization:
  value: 8.0e-8
  unit: "1/h"   # d(S)/dt = -k_caramelization * f(T) * S_total  (first-order in residual sugar)
  tier: speculative
  uncertainty: { low: 2.0e-8, high: 3.0e-7, note: "Pseudo-first-order caramelization rate at T_ref = 20 C. Deliberately SMALL: at cellar temperature only a few g/L of residual sugar browns over years (most sweet-wine sugar survives); the WARM styles (Madeira estufagem ~45-50 C, baked/rancio) brown fast via the high E_a. CALIBRATED so a warm multi-year sweet aging lands A420 in the visible amber-brown range without materially depleting the residual sugar. Only the FORM (sugar+heat=>browning, O2-free) and the strong thermal sensitivity are sourced." }
  provenance:
    source: "author estimate anchored to the ORDERING that thermal caramelization of residual sugar is the non-oxidative browning route of aged SWEET/thermal wines (Sauternes amber-to-brown, Madeira/baked-wine deep colour), distinct from the O2-driven phenolic browning of D-74. Caramelization/thermal-dehydration kinetics (classic food chemistry -- Kroh; caramel formation is a canonical thermal, O2-independent browning)."
    conditions: "generic sweet wine; pseudo-first-order in the residual-sugar vector S, at T_ref = 293.15 K. WINE-ONLY (v1 bundling); O2-INDEPENDENT (no o2 term). Consumes core S into the melanoidin carbon-park."
    notes: "SOURCED FORM (sugar-driven, heat-accelerated, O2-INDEPENDENT browning) + SPECULATIVE magnitude. The thermal MIRROR of the O2-driven k_browning (D-74). The FIRST aging Process to consume core S -- its carbon parks in the on-ledger melanoidin pool so total_carbon closes."

# -- ACTIVATION ENERGY: caramelization is STRONGLY warmer-faster (the sourced ORDERING) --------
# Same high band as E_a_maillard_strecker (D-87): caramelization/Maillard chemistry is far more
# temperature-sensitive than the oxidative aging reactions (Q10 ~3-4). This is why Madeira estufagem
# (45-50 C) and baked/rancio wines brown on a timescale orders faster than a cellar-cool sweet wine.
E_a_caramelization:
  value: 100000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 80000.0, high: 130000.0, note: "Q10 ~3-4.5 at 20 C. Caramelization/thermal-browning activation energies ~100-150 kJ/mol -- markedly ABOVE the ~30-70 kJ/mol oxidative-browning band (E_a_browning). The SOURCED, load-bearing claim is the ORDERING (thermal browning >> oxidative browning in temperature sensitivity, so warm/baked sweet wines darken far faster); the magnitude is speculative and banded." }
  provenance:
    source: "SOURCED ORDERING: caramelization is strongly thermally activated (E_a ~100-150 kJ/mol; classic caramel/Maillard kinetics -- Kroh, Labuza), well above the oxidative wine-browning reactions. Madeira estufagem and baked/rancio styles develop deep colour orders faster than cellar aging -- the temperature acceleration IS the sourced signature."
    conditions: "equivalent Arrhenius activation energy of the aggregate non-oxidative sugar caramelization at T_ref = 293.15 K"
    notes: "Only the DIRECTION and ORDERING (E_a_caramelization > the oxidative E_a's; warmer => much faster thermal browning) are sourced. Exact magnitude speculative, banded around Q10 ~3.5. Its OWN parameter (prime directive #2), matching E_a_maillard_strecker's band (both are the non-oxidative thermal axis)."

# -- A420 YIELD: browning-index absorbance per gram of melanoidin formed ----------------------
# A420 is the dimensionless 420 nm absorbance (1 cm path) -- the standard browning index (D-74).
# This yield converts the melanoidin MASS formed into the absorbance it contributes, so thermal
# browning raises the SAME A420 index the oxidative PhenolicBrowning (D-74) accumulates.
y_a420_per_melanoidin:
  value: 0.4
  unit: "1"   # A420 absorbance units per g/L melanoidin formed (dimensionless index per g/L)
  tier: speculative
  uncertainty: { low: 0.1, high: 1.5, note: "A420 (420 nm absorbance, 1 cm) per g/L caramelization melanoidin. An order-of-magnitude estimate: caramel/melanoidin has a broad brown chromophore absorbing at 420 nm, so ~a few tenths of an AU per g/L is plausible. CALIBRATED with k_caramelization so a warm multi-year sweet aging lands A420 in the visible amber-brown range (~0.3-1 AU)." }
  provenance:
    source: "author estimate: caramelization melanoidins are the brown chromophore of caramel/aged sweet wine, absorbing broadly through the visible incl. 420 nm. The per-mass absorbance is a lumped optical yield (no single extinction coefficient for a heterogeneous polymer)."
    conditions: "generic sweet wine; A420 (dimensionless, 1 cm path) contributed per g/L melanoidin formed, at T_ref = 293.15 K. Adds to the SAME A420 slot the O2-driven PhenolicBrowning (D-74) accumulates."
    notes: "SPECULATIVE magnitude. Ties the melanoidin MASS (on total_carbon) to the A420 optical index (off every ledger) -- so thermal browning is READ by analysis.a420 alongside the oxidative browning. A lumped optical yield, not a molar extinction coefficient (melanoidin has no clean molar mass -- the caramelan stand-in, D-88)."

# ============================================================================================
# D-89 -- MaillardBrowning (non-oxidative amino-acid-incorporating THERMAL browning)
# ============================================================================================
# THE PROCESS (fermentation.core.kinetics.aging.MaillardBrowning, WINE-ONLY):
#
#   S_total  = sum of the residual-sugar vector (g/L)                     # reducing-sugar substrate
#   gate     = amino_acids / (K_amino_acids + amino_acids)                # smooth availability [0,1)
#   r_sugar  = k_maillard_browning * f(T) * S_total * gate                # g sugar/L/h into browning
#   f(T)     = arrhenius_factor(T, E_a_maillard_browning, T_ref)          # STRONGLY warmer-faster
#   r_m      = r_sugar * c(sugar) / (c_m - n_m*R)                         # g melanoidin/L/h (sized)
#   r_aa     = r_m * n_m / n(blend)                                       # g/L/h of the IDENTITY-
#              # AGNOSTIC {arginine, generic} blend (D-100) -- melanoidin retains amino-acid N
#              # regardless of which molecule carried it, so this route draws the blend, never a
#              # precursor. R = the blend's mass C:N. Contrast MaillardStrecker, which draws each
#              # aldehyde's OWN precursor.
#   d(S)/dt                  = -r_sugar
#   d(amino_acids)/dt        = -r_aa
#   d(maillard_melanoidin)/dt = +r_m
#   d(A420)/dt               = +y_a420_per_maillard_melanoidin * r_m       # the SHARED browning index
#
# The amino-acid-incorporating browning branch D-88 (Caramelization, sugar-only) deferred. TRUE
# Maillard browning condenses a reducing SUGAR with an AMINO ACID (Amadori -> Maillard cascade) into
# a brown polymer that RETAINS the amino-acid nitrogen -- what makes a Maillard melanoidin
# nitrogenous. So this route consumes core S AND amino_acids by heat with NO O2, and books BOTH the
# sugar carbon and the amino-acid carbon+nitrogen into the new on-ledger `maillard_melanoidin` pool
# (the FIRST non-biomass, non-arginine species on total_nitrogen). It raises the SAME A420 index
# D-74/D-88 accumulate (all browning is one observable). The draws are SIZED to the melanoidin formed
# (its fixed C:N stand-in), so total_carbon AND total_nitrogen close to machine precision; ALL drawn
# nitrogen is RETAINED here (the deaminating/volatile branch is D-87's job -- putting a partial-
# deamination split here would double-count D-87 and add an un-pinnable parameter). The three thermal
# branches split the amino-acid/browning fate cleanly and sum over the shared S/amino_acids reagents
# via ProcessSet (the o2-sharing pattern, no double-count): sugar-only caramelization (D-88), the
# N-retaining melanoidin branch (D-89), and the N-releasing volatile Strecker branch (D-87).
#
# WINE-ONLY (reads amino_acids + the wine melanoidin park; beer thermal browning deferred, the D-86
# oak-to-beer pattern). ISOLABILITY on the amino_acids HARD gate (undosed => exactly zero); residual
# sugar is a SOFT driver. TIER: all speculative -- the Tier-3 frontier. The load-bearing SOURCED
# claim is the FORM (sugar + amino acid + heat => N-bearing browning, O2-independent, strongly
# warmer-faster; intrinsically amino-acid-catalysed but NITROGEN-LIMITED in wine, so a real but MINOR
# browning contributor vs the sugar-only caramelization on the abundant residual sugar). Every
# magnitude is an order-of-magnitude estimate. The `maillard_melanoidin` C8H12O5N stand-in formula
# (molar C:N ~= 8:1) is code-with-citation in chemistry.py, NOT here (only the uncertain magnitudes
# below are YAML) -- and its C-rich C:N is load-bearing: it keeps (c_m - n_m*c(arg)/n(arg)) > 0 so
# the sized sugar draw stays positive (a negative denominator would silently create sugar).

# -- MAILLARD BROWNING RATE CONSTANT (first-order in residual sugar, aa-gated, O2-FREE) -------
# First-order in residual sugar (like k_caramelization) but ADDITIONALLY gated by amino-acid
# availability -- so it is amino-acid-LIMITED: as amino acids exhaust the Maillard browning stops
# while D-88 caramelization keeps browning the sugar. Set COMPARABLE to (a bit below) k_caramelization
# (8.0e-8): though amino acids intrinsically catalyse browning, in wine the route is NITROGEN-LIMITED
# -- most YAN is assimilated during fermentation, so only a scarce residual amino-acid pool feeds
# aging-time Maillard browning. So this is a real but MINOR browning
# contributor next to the sugar-only caramelization that runs on the abundant residual sugar.
# CALIBRATED so a warm multi-year sweet + amino-acid-dosed sealed aging (i) forms a real N-melanoidin
# A420 bump (~0.05 AU) atop caramelization's larger share, WITHOUT (ii) so depleting the shared
# amino-acid pool that the diagnostic sotolon Strecker marker (D-87) drops below perceptibility --
# aged Sauternes shows BOTH deep amber-brown colour AND perceptible sotolon, so the model must keep
# both. The two constraints together pin k to the low-1e-7..1e-8 band.
k_maillard_browning:
  value: 5.0e-8
  unit: "1/h"   # r_sugar = k_maillard_browning * f(T) * S_total * gate(aa)  (first-order in sugar)
  tier: speculative
  uncertainty: { low: 2.0e-8, high: 2.0e-7, note: "Pseudo-first-order Maillard-browning rate at T_ref = 20 C, per g/L residual sugar, at the amino-acid-saturated gate. Set COMPARABLE to (a bit below) k_caramelization (8.0e-8): amino acids intrinsically catalyse browning, but in wine the route is NITROGEN-LIMITED (scarce residual YAN after fermentation), so its cumulative browning is MINOR vs the sugar-only caramelization on abundant sugar. CALIBRATED (advisor-flagged shared-reagent competition) so the N-melanoidin forms a real A420 bump WITHOUT depleting the shared amino-acid pool enough to erase the diagnostic sotolon marker (D-87). CAUTION: the UPPER band (>~1.5e-7) draws the shared amino_acids hard enough to push sotolon BELOW perceptibility (OAV<1) in the sweet-aging scenario -- the set value stays deliberately LOW for this reason; a future value bump must re-check test_maillard_raises_the_thermal_oavs. Only the FORM (sugar+aa+heat=>N-browning, O2-free) and the strong thermal sensitivity are sourced." }
  provenance:
    source: "author estimate anchored to the FORM that amino-acid-incorporating Maillard browning is the nitrogen-bearing thermal-browning route of aged SWEET/thermal wines (Sauternes amber-to-brown, Madeira/baked-wine deep colour), distinct from the sugar-only caramelization of D-88 and the O2-driven phenolic browning of D-74. Intrinsically the Maillard reaction is more facile than pure caramelization (amino acids catalyse sugar dehydration/fragmentation; Hodge 1953; van Boekel 2006), but in wine it is NITROGEN-LIMITED by the scarce residual amino-acid pool, so its EFFECTIVE cumulative contribution is comparable-to-minor vs caramelization. Folds the Amadori/dicarbonyl precursors into k (no intermediate pool tracked in v1, as with k_caramelization / k_maillard_strecker)."
    conditions: "generic sweet wine at cellar-to-warm temperature; pseudo-first-order in the residual-sugar vector S, additionally gated by the amino-acid availability fraction aa/(K_amino_acids+aa), at T_ref = 293.15 K. WINE-ONLY (reads amino_acids); O2-INDEPENDENT (no o2 term)."
    notes: "SOURCED FORM (sugar-driven, amino-acid-catalysed but nitrogen-LIMITED in wine, heat-accelerated, O2-INDEPENDENT, N-retaining) + SPECULATIVE magnitude. The N-incorporating sibling of the sugar-only k_caramelization (D-88): both browning routes draw S and SUM via ProcessSet (additive over sugar, split by rate -- the o2-sharing pattern), and this one additionally draws amino_acids (shared with k_maillard_strecker, D-87), so all three thermal branches split the shared reagents with no double-count. The shared-amino_acids competition is REAL PHYSICS: N-Maillard browning modestly suppresses the D-87 Strecker aldehydes by drawing the same pool -- calibrated so sotolon stays perceptible (the o2-sub-axis D-74-suppresses-acetaldehyde precedent, applied to amino_acids)."

# -- ACTIVATION ENERGY: Maillard browning is STRONGLY warmer-faster (the sourced ORDERING) ------
# Same high thermal band as E_a_caramelization / E_a_maillard_strecker (~100 kJ/mol): Maillard
# browning is far more temperature-sensitive than the oxidative aging reactions (Q10 ~3-4), which is
# why Madeira estufagem (45-50 C) and baked/rancio wines develop deep nitrogenous-melanoidin colour
# orders faster than a cellar-cool sweet wine. Its OWN parameter (prime directive #2), matching the
# non-oxidative thermal axis's band.
E_a_maillard_browning:
  value: 100000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 80000.0, high: 130000.0, note: "Q10 ~3-4.5 at 20 C. Maillard-browning activation energies ~100-150 kJ/mol -- markedly ABOVE the ~30-70 kJ/mol oxidative-browning band (E_a_browning). The SOURCED, load-bearing claim is the ORDERING (thermal Maillard browning >> oxidative browning in temperature sensitivity, so warm/baked sweet wines darken far faster); the magnitude is speculative and banded." }
  provenance:
    source: "SOURCED ORDERING: Maillard browning is strongly thermally activated (E_a ~100-150 kJ/mol; classic Maillard kinetics -- Labuza & Baisier, van Boekel, Hodge), well above the oxidative wine-browning reactions. Madeira estufagem and baked/rancio styles develop deep colour orders faster than cellar aging -- the temperature acceleration IS the sourced signature."
    conditions: "equivalent Arrhenius activation energy of the aggregate non-oxidative amino-acid Maillard browning at T_ref = 293.15 K"
    notes: "Only the DIRECTION and ORDERING (E_a_maillard_browning > the oxidative E_a's; warmer => much faster N-browning) are sourced. Exact magnitude speculative, banded around Q10 ~3.5. Its OWN parameter, matching E_a_caramelization / E_a_maillard_strecker's band (all the non-oxidative thermal axis)."

# -- A420 YIELD: browning-index absorbance per gram of N-bearing Maillard melanoidin formed -----
# A420 is the dimensionless 420 nm absorbance (1 cm path) -- the standard browning index (D-74).
# Set ABOVE the sugar-only y_a420_per_melanoidin (D-88, 0.4): nitrogenous Maillard melanoidins are
# the DOMINANT brown chromophores of thermally-aged sugar+protein systems, browner per unit mass
# than pure caramelization polymers (the sourced ordering that Maillard browning out-colours
# caramelization). Thermal Maillard browning thus raises the SAME A420 index the oxidative
# PhenolicBrowning (D-74) and the sugar-only Caramelization (D-88) accumulate.
y_a420_per_maillard_melanoidin:
  value: 0.8
  unit: "1"   # A420 absorbance units per g/L Maillard melanoidin formed (dimensionless index per g/L)
  tier: speculative
  uncertainty: { low: 0.2, high: 3.0, note: "A420 (420 nm absorbance, 1 cm) per g/L N-bearing Maillard melanoidin. An order-of-magnitude estimate set ~2x the sugar-only caramelan yield (D-88, 0.4): nitrogenous melanoidins are more strongly coloured per mass than caramelization polymers. CALIBRATED with k_maillard_browning so a warm multi-year sweet + amino-acid aging adds a comparable-to-caramelization A420 share." }
  provenance:
    source: "author estimate: nitrogenous Maillard melanoidins are the dominant brown chromophores of thermally-aged sugar+amino-acid systems (Hodge 1953; the deep colour of Madeira/baked wine, roasted/aged foods), browner per mass than sugar-only caramelization polymers. The per-mass absorbance is a lumped optical yield (no single extinction coefficient for a heterogeneous polymer)."
    conditions: "generic sweet wine; A420 (dimensionless, 1 cm path) contributed per g/L Maillard melanoidin formed, at T_ref = 293.15 K. Adds to the SAME A420 slot the O2-driven PhenolicBrowning (D-74) and the sugar-only Caramelization (D-88) accumulate."
    notes: "SPECULATIVE magnitude, set above y_a420_per_melanoidin (D-88) per the sourced browner-per-mass ordering. Ties the maillard_melanoidin MASS (on total_carbon + total_nitrogen) to the A420 optical index (off every ledger) -- so N-browning is READ by analysis.a420 alongside the oxidative + caramelization browning. A lumped optical yield, not a molar extinction coefficient."
