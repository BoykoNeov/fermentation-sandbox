    conditions: "O. oeni in wine; exponent of the ethanol wall on the conversion rate"
    notes: "Exponent n in g_EtOH = (1 - E/E_max)^n. Kept at n=2 (as for the yeast EthanolInhibition) so the rate eases to zero with no derivative kink at E_max - C1-smooth for the BDF solver. The form has literature backing (Luong); the exponent itself is a numerical choice, hence speculative."

molecular_so2_inhib_mlf:
  value: 2.0e-4
  unit: "g/L"   # decay scale of g_SO2 = exp(-[SO2]_molecular / molecular_so2_inhib_mlf)
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 5.0e-4, note: "molecular SO2 inhibitory scale ~0.1-0.5 mg/L (1e-4 - 5e-4 g/L); ~0.5-0.8 mg/L molecular strongly arrests MLF" }
  provenance:
    source: "author estimate encoding the antimicrobial action of MOLECULAR SO2 on O. oeni (Ribereau-Gayon et al., Handbook of Enology Vol. 1; the same molecular-SO2 antimicrobial basis as the D-22 readout, Usseglio-Tomasset & Bosia 1984)"
    conditions: "O. oeni in wine; exponential decay scale of the molecular-SO2 inhibition gate on the conversion rate"
    notes: "Read by MalolacticConversion: g_SO2 = exp(-[SO2]_molecular / s), where [SO2]_molecular (g/L) is partitioned from the dosed free SO2 at the SOLVED pH (D-22) - so this gate is the first RHS consumer of the molecular-SO2 readout, and rising pH (which LOWERS molecular SO2) further frees MLF. Scale ~0.2 mg/L molecular: g_SO2 ~ 0.018 at 0.8 mg/L molecular (strong arrest), ~1 when undosed. DIRECTION strongly sourced (molecular SO2 is THE antimicrobial species winemakers use to control/prevent MLF); the exact scale and exponential FORM are the speculative modelling choice."

