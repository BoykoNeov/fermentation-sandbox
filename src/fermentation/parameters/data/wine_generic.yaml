# -- MALOLACTIC GROWTH (Oenococcus oeni biomass, wine-only, the deferred growth beat, decision D-23) --
# MalolacticGrowth (fermentation.core.kinetics.malolactic) makes the X_mlf catalyst DYNAMIC:
#   dX_mlf/dt = mu_max_mlf * X_mlf * aa/(K_aa_mlf+aa) * S/(K_s+S) * g_pH*g_EtOH*g_SO2*gamma(T)
# Because MalolacticConversion is linear in X_mlf, growth makes deacidification ACCELERATE
# autocatalytically as bacteria multiply. Nitrogen-anchored: new bacterial biomass takes its
# nitrogen from the amino_acids pool (arginine; D-32/D-34) and its carbon shortfall from sugar
# (the mirror of yeast growth) - carbon and nitrogen close on the existing weighted ledger, with
# X_mlf now weighted at the biomass fractions (bacterial ~ yeast composition, a v1 simplification).
# Reuses K_s (sugar Monod) and the biomass_C/N_fraction composition above, and the shared MLF
# environmental gate. BOTH SPECULATIVE (author estimates; no per-catalyst bacterial growth law is
# sourced, and the bacterial-composition ~ yeast assumption is a lump). v1 is CO-INOCULATION only
# (the ethanol wall blocks a post-AF pitch), gated at compile on mlf_pitch_gpl>0 AND amino_acids_gpl>0.

mu_max_mlf:
  value: 5.0e-2
  unit: "1/h"   # O. oeni max specific growth rate: dX_mlf/dt = mu_max_mlf*X_mlf*Monod(aa)*Monod(S)*gates
  tier: speculative
  uncertainty: { low: 2.0e-2, high: 1.0e-1, note: "O. oeni doubling time in wine ~12-35 h under favourable co-inoculation conditions ⇒ mu_max ~0.02-0.06/h; wider band for the whole-cell lumped rate" }
  provenance:
    source: "author estimate from O. oeni growth timescales in wine (doubling times of order 0.5-1.5 d in co-inoculation; Ribereau-Gayon et al., Handbook of Enology Vol. 1; Lonvaud-Funel 1999, Antonie van Leeuwenhoek 76:317-331)"
    conditions: "S. cerevisiae/O. oeni co-inoculated wine, ~20 C, amino-acid- and sugar-replete early window; maximum specific growth rate scaling the amino-acid- and sugar-gated bacterial growth law"
    notes: "Read by MalolacticGrowth as the bacterial mu_max. SPECULATIVE: no kinetic model of our amino-acid-anchored per-catalyst growth form is sourced - O. oeni growth is usually reported as bulk OD/CFU timescales, not this rate constant - so it is tuned to give a realistic several-fold X_mlf increase within the low-ethanol co-inoculation window (the regime the D-23 conversion beat established as the only viable MLF window), NOT fitted. The growth is gated identically to conversion (same environmental gate) plus Monod terms on the amino-acid fuel and on sugar (the fermentable energy source O. oeni co-metabolises), so it self-limits to the sugar-present, low-ethanol early window."

K_aa_mlf:
  value: 5.0e-2
  unit: "g/L"   # amino-acid half-saturation in the bacterial growth Monod term aa/(K_aa_mlf+aa)
  tier: speculative
  uncertainty: { low: 2.0e-2, high: 2.0e-1, note: "half-saturation on the assimilable amino-acid pool; scaled to the g/L range of must amino acids, same order as K_amino_acids (yeast swap)" }
  provenance:
    source: "author estimate, same rationale as K_amino_acids (the yeast amino-acid swap half-saturation): scaled to the g/L range of assimilable amino acids in must"
    conditions: "O. oeni in wine; half-saturation in the smooth availability gate aa/(K_aa_mlf+aa) on the bacterial growth rate"
    notes: "Read by MalolacticGrowth: gate(aa) = aa/(K_aa_mlf+aa) ramps bacterial growth up from an empty amino-acid pool and down to zero as amino acids are exhausted (the same smooth-Monod shape the yeast swap and fermentative flux use, keeping the RHS C1 for the BDF solver). A SEPARATE parameter from the yeast K_amino_acids (the per-organism design lets them diverge), taken slightly lower here as O. oeni is a fastidious amino-acid auxotroph; an estimate, hence speculative."

# -- MALOLACTIC DEATH (Oenococcus oeni SO2-driven kill, wine-only, decision D-39) --
# MalolacticDeath (fermentation.core.kinetics.malolactic) is the counterpart of MalolacticGrowth
# that completes the MLF arc: it moves viable X_mlf into the non-viable X_mlf_dead pool when the
# wine is SULFITED, so bacteria DECLINE and the O. oeni activities that scale with X_mlf wind down.
#   r_death = k_death_mlf * X_mlf * (1 - g_SO2) * arrhenius(T, E_a_death_mlf, T_ref)
#   g_SO2   = exp(-[SO2]_molecular / molecular_so2_inhib_mlf)   (the SAME term the conversion gate uses)
# The driver is 1 - g_SO2 - MOLECULAR SO2 ALONE, NOT the full toxicity gate. Death is EXACTLY 0
# without SO2 (g_SO2 = 1) and rises toward its Arrhenius ceiling as molecular SO2 accumulates.
# Temperature enters through the Arrhenius factor (warm accelerates the kill, cold slows it - the
# autolysis shape), NOT the cardinal gamma(T) (which -> 0 in the cold and would spuriously make cold
# KILL bacteria; cold in fact PRESERVES them). The transfer X_mlf -> X_mlf_dead is CARBON- AND
# NITROGEN-NEUTRAL (both pools weighted at the biomass fractions since D-38, the yeast X -> X_dead
# precedent D-13), so it adds no conservation code.
# WHY SO2 ALONE (the D-39 crux, empirically settled): an earlier draft used 1 - TOXICITY
# (pH*ethanol*SO2). A probe killed it - the Luong ethanol wall already drives 1-toxicity to ~0.92 at
# ordinary post-AF ethanol (~75 g/L), so death was near-maximal FROM ETHANOL ALONE (bacteria gone in
# ~1 week), when in reality O. oeni PERSISTS for weeks-to-months in dry wine and is cleared
# deliberately by SO2 or racking. Ethanol's wall is a "can't grow" signal, not a "dying" one; no
# power transform of 0.92 is both ~0 (slow baseline) and clearly below the SO2-elevated value, so the
# driver must contain NO ethanol term. Co-inoculation-vs-post-AF dominance now rests entirely on the
# GROWTH gate's g_EtOH (high-ABV post-AF -> gamma*g_EtOH ~ 0 -> no growth); a high-ABV post-AF pitch
# simply sits INERT (no growth, no conversion, no death until sulfited).
# SCOPE (D-39): THIS param is the SO2-driven ACUTE kill only - death is EXACTLY 0 without SO2, so it
# stays unconfounded by ethanol and keeps k_death_mlf at its true SO2-kill magnitude. The slow
# ethanol/age decline of O. oeni over weeks-months - which v1 deferred, letting unsulfited bacteria
# persist forever - is now supplied by the SEPARATE k_senescence_mlf / MalolacticSenescence baseline
# (MLF v2, D-41 below), so this SO2 kill is unchanged. Total mortality is r_sen + r_death; a
# stabilizing SO2 dose still dominates (crash in ~1-3 d over the ~2-month benign half-life). Keeping
# them separate also keeps the D-31 SO2/rack lever UNCONFOUNDED (a deliberate action still removes
# viable bacteria fast, distinct from the slow baseline).
# BOTH PARAMS SPECULATIVE (author estimates; no per-catalyst mortality law of this form is sourced).
# Pitch-gated at compile (mlf_pitch_gpl>0), NOT amino-acid-gated - bacteria die whether or not they
# were growing.

k_death_mlf:
  value: 5.0e-2
  unit: "1/h"   # O. oeni specific death rate at FULL SO2 kill: r_death = k_death_mlf*X_mlf*(1-g_SO2)*f(T)
  tier: speculative
  uncertainty: { low: 2.0e-2, high: 1.0e-1, note: "specific mortality at a full molecular-SO2 kill ⇒ a bacterial half-life of ~7-35 h; a stabilizing SO2 addition (~30-50 mg/L free, ~0.6-1.0 mg/L molecular) crashes the population over ~1-3 d, while an unsulfited wine sees ZERO death (bacteria persist on lees)" }
  provenance:
    source: "author estimate; O. oeni is cleared from wine by SO2 addition within days - the standard tool to arrest MLF and stabilize a wine (Ribereau-Gayon et al., Handbook of Enology Vol. 1, malolactic fermentation & SO2 management; Bartowsky & Henschke 2004, Int. J. Food Microbiol. 96:235-252, on removing O. oeni to preserve/lock diacetyl)"
    conditions: "O. oeni in wine, ~20 C; specific death rate at a full molecular-SO2 kill (1 - g_SO2 = 1) scaling the viable X_mlf, read unscaled at T_ref by the Arrhenius factor"
    notes: "Read by MalolacticDeath as the death magnitude at a full SO2 kill. VALUE 0.05/h ⇒ a full-kill half-life of ~14 h (ln2/0.05); at a stabilizing dose (~40 mg/L free ⇒ ~0.8 mg/L molecular ⇒ g_SO2 ~ 0.02 ⇒ 1-g_SO2 ~ 0.98) the population drops ~90% in ~2 d - the physically-reasonable SO2-kill timescale, chosen on that physics, NOT to clear a test threshold. RE-TUNED UP from the 0.02/h of the abandoned (1-toxicity) draft: because death is now EXACTLY 0 without SO2, k no longer couples to the (unsulfited) early-pitch conversion, so it can take its true SO2-kill value. SPECULATIVE: no per-catalyst kinetic model of O. oeni SO2 mortality is sourced (viability is reported as CFU decline curves, not this rate constant), so it is tuned - NOT fitted - so a stabilizing SO2 dose crashes X_mlf within ~1-3 d while an unsulfited run leaves it untouched. DIRECTION is sourced (SO2 kills O. oeni; the basis of using SO2 to arrest MLF and lock diacetyl); the magnitude is the speculative modelling choice. SIMPLIFICATION: reuses molecular_so2_inhib_mlf as the kill scale (arrest-scale = kill-scale, bacteriostatic ~ bacteriocidal); a separate molecular_so2_death_scale is the v2 refinement. NOTE: killing the bacteria removes BOTH the diacetyl sink (reduction) AND source (citrate co-metabolism), so a single-run 'SO2 locks in diacetyl' demonstration is confounded in this model - the death MECHANISM is validated on X_mlf directly. A benign-environment baseline mortality (death without SO2) is now supplied by MalolacticSenescence (MLF v2, D-41) as a SEPARATE Process, so this SO2 kill stays exactly as built here (death is still identically 0 without SO2)."

E_a_death_mlf:
  value: 60000.0
  unit: "J/mol"   # Arrhenius activation energy for the temperature dependence of bacterial death
  tier: speculative
  uncertainty: { low: 40000.0, high: 90000.0, note: "generic biological/enzymatic-process activation energy (Q10 ~2 at 20 C); brackets the ~40-90 kJ/mol range the model's other enzymatic E_a (E_a_reduction 45k, E_a_autolysis 60k, E_a_decarb 90k) span" }
  provenance:
    source: "author estimate; no sourced Arrhenius fit for O. oeni death rate - taken equal to E_a_autolysis (60 kJ/mol), a generic enzymatic/biological-process activation energy (Q10 ~2.3 at 20 C), consistent with warm accelerating and cold slowing cell mortality"
    conditions: "O. oeni in wine; temperature factor arrhenius(T, E_a_death_mlf, T_ref) on the death rate, = 1 at T_ref (20 C)"
    notes: "Read by MalolacticDeath. Gives the temperature dependence of bacterial mortality so that warm lees clear/kill the culture faster and cold PRESERVES it (dormancy) - the physically correct direction the cardinal gamma(T) cannot supply for death (gamma(T) -> 0 in the cold would make cold kill, the opposite of reality). SPECULATIVE: the magnitude is an estimate equal to the autolysis E_a; the DIRECTION (warm accelerates, cold preserves) is sound. Uses the shared T_ref (20 C) so the factor is 1 at the wine benchmark temperature, like every other Arrhenius rate. ALSO read by MalolacticSenescence (D-41), which reuses this same warm-accelerates/cold-preserves Arrhenius shape for the benign baseline decline (no new temperature param)."

# -- MALOLACTIC SENESCENCE (Oenococcus oeni benign baseline mortality, wine-only, MLF v2, decisions D-41/D-52/D-53) --
# MalolacticSenescence (fermentation.core.kinetics.malolactic) LIFTS the owned v1 tradeoff of
# MalolacticDeath (D-39): "without SO2, bacteria NEVER die." This is that decline:
#   r_sen = k_senescence_mlf * X_mlf * arrhenius(T, E_a_death_mlf, T_ref) * stress
#   stress = 1 + k_senescence_ethanol_scale*[E/(E+ethanol_tolerance_mlf)]
#              + k_senescence_starvation_scale*[K_aa_mlf/(K_aa_mlf+amino_acids)]
# a small, always-on (when pitched) baseline first-order mortality moving viable X_mlf into the SAME
# non-viable X_mlf_dead pool the SO2 kill uses (a carbon/nitrogen-neutral transfer, both pools
# weighted at the biomass fractions since D-38/D-39 - no new conservation code). Total O. oeni
# mortality is r_sen + r_death (stress-modulated baseline + SO2-induced), built as SEPARATE
# isolable Processes so the D-39 SO2 lever stays byte-for-byte and this baseline toggles independently.
# D-52 lifted the D-41 "environment-free" deferral with a BOUNDED [0,1)-capped stress multiplier
# (not the Luong wall's near-binary shape that caused the D-39 wipeout) - see k_senescence_ethanol_scale
# and k_senescence_starvation_scale for that mechanism, still valid and unchanged.
# D-53 CORRECTED THE MAGNITUDE (not the mechanism): D-41's original k_senescence_mlf assumed O. oeni
# spontaneously declines over WEEKS-TO-MONTHS without SO2 - a real-wine literature check (deep research,
# 2026-07-07) found this UNSUPPORTED. Windholtz et al. 2025 (OENO One 59(3), doi:10.20870/
# oeno-one.2025.59.3.9346) and the Millet 2001 thesis it cites both show O. oeni/LAB populations STABLE
# at ~10^5-10^6 CFU/mL for 3-5 MONTHS in real, finished, SO2-free wine - no detectable spontaneous
# die-off. The steep decline the original citations pointed at (10^5-10^6 -> 10^3-10^4 CFU/mL by 3
# months, undetectable by 12) is documented ONLY when SO2 IS added (Kioroglou et al. 2020, Frontiers
# in Microbiology, doi:10.3389/fmicb.2020.562560) - i.e. it is MalolacticDeath's (D-39) territory, not
# this Process's. D-41's citations (Ribereau-Gayon Handbook of Enology; Bartowsky & Henschke 2004)
# conflated "SO2 is needed to reliably CONTROL spoilage LAB in general winemaking practice" (true) with
# "an already-stable wine spontaneously declines over weeks-months without it" (not supported) -
# CORRECTED here. k_senescence_mlf dropped ~50x (5e-4 -> 1e-5/h) so even D-52's worst-case combined
# stress (2.5x ceiling, unchanged) gives a multi-year half-life - i.e. this baseline is now honestly
# NEGLIGIBLE on every timescale this model simulates, an upper-bound-consistent (not fitted) value,
# since no source measures spontaneous decline kinetics past 5 months. ARRHENIUS temperature (NOT the
# cardinal gamma(T)): warm accelerates the decline, cold slows it to dormancy - gamma(T) peaks at
# T_opt_mlf (23 C) and vanishes past T_max_mlf, which would make senescence MAXIMAL at the growth
# optimum and switch OFF in the warm, exactly backwards. Pitch-gated at compile (mlf_pitch_gpl>0), NOT
# amino-acid-gated (bacteria age whether or not they grew). Reads no SO2/pH => NO brentq (cheaper than
# the SO2 kill), even with the D-52 stress terms (E/amino_acids read directly off state).

k_senescence_mlf:
  value: 1.0e-5
  unit: "1/h"   # O. oeni benign baseline specific death rate: r_sen = k_senescence_mlf*X_mlf*arrhenius(T)*stress
  tier: speculative
  uncertainty: { low: 2.0e-6, high: 3.0e-5, note: "upper-bound-derived from 'no significant decline detected in 3-5 months' in real SO2-free wine (Windholtz et al. 2025; Millet 2001) - the TRUE spontaneous decay constant is unmeasured past 5 months and could be far smaller; this is not a fitted point estimate" }
  provenance:
    source: "D-53 CORRECTION (2026-07-07, deep research): Windholtz, Miot-Sertier, Maupeu et al. 2025, 'Influence of sulphur dioxide management on microbial populations during wine ageing,' OENO One 59(3), doi:10.20870/oeno-one.2025.59.3.9346 - real Bordeaux red wine, SO2-free modalities show O. oeni/LAB 'high and stable population levels of around 10^5 CFU/mL' from end-of-MLF through 5 months of ageing to bottling; and Millet 2001 (Univ. Bordeaux 2 doctoral thesis, cited therein), which at 0 mg/L SO2 found the population 'maintained at around 10^6 CFU/mL' over 3 months across three Bordeaux varieties, even at pH 3.75-3.95. Both are real-wine, no-SO2, CFU-based studies - the most direct evidence available. Contrast: Kioroglou, Mas & Portillo 2020, Frontiers in Microbiology, doi:10.3389/fmicb.2020.562560, shows the steep 10^5-10^6 -> 10^3-10^4 CFU/mL decline by 3 months (undetectable by 12) ONLY in wines that DID receive SO2 - that decline belongs to MalolacticDeath (D-39), not this baseline. SUPERSEDES the D-41 citations (Ribereau-Gayon Handbook of Enology; Bartowsky & Henschke 2004), which supported general SO2-for-spoilage-control practice, not a specific weeks-to-months spontaneous decline claim - that inference is not supported by direct CFU evidence and is corrected here."
    conditions: "O. oeni in real finished wine, SO2-free, ~20 C; benign-environment specific death rate scaling the viable X_mlf, read unscaled at T_ref by the shared Arrhenius factor arrhenius(T, E_a_death_mlf, T_ref), stress=1 (D-52's stress multiplier is separate, see below)"
    notes: "Read by MalolacticSenescence (MLF v2, D-41/D-52/D-53) as the benign baseline mortality magnitude AT stress=1. VALUE 1e-5/h => a half-life of ~2888 d (~7.9 y) at T_ref, stress=1; at D-52's TYPICAL post-AF stress (~2x: ethanol near ethanol_tolerance_mlf + amino acids exhausted) the effective half-life is still ~3.96 y, and even D-52's WORST-CASE combined stress ceiling (2.5x) gives ~3.16 y - all far beyond the 3-5 month window Windholtz/Millet actually measured as 'stable,' so this value is DELIBERATELY conservative (upper-bound-consistent), not a fit to a specific decay curve (none exists past 5 months in the surviving literature). PRACTICAL CONSEQUENCE: on every timescale this model actually simulates (days to a few months), spontaneous senescence is now honestly NEGLIGIBLE - a pitched, unsulfited run is very close to flat, matching the real-wine finding, while a stabilizing SO2 dose (MalolacticDeath, D-39, unchanged) still crashes the population in ~1-3 d. HISTORICAL NOTE (D-41, corrected by D-53): the original ~2-month-half-life value was an author estimate that over-read general SO2-for-spoilage-control literature as a specific spontaneous-decline timescale; no real-wine CFU study supports it. D-52's stress-multiplier MECHANISM is unaffected by this correction (ethanol/starvation stress is still the right direction, still bounded to avoid the D-39 wipeout) - only the baseline magnitude it scales was wrong."

k_senescence_ethanol_scale:
  value: 1.0
  unit: "dimensionless"   # stress ceiling: ethanol term contributes up to +k_senescence_ethanol_scale*k_senescence_mlf at saturating ethanol
  tier: speculative
  uncertainty: { low: 0.5, high: 2.0, note: "order-of-magnitude ceiling on how much ethanol stress can accelerate the benign baseline; bounded well below the SO2-kill magnitude by construction" }
  provenance:
    source: "author estimate (D-52); direction sourced from the general mechanistic literature that ethanol damages the O. oeni cell membrane (da Silveira et al. 2002, Appl. Environ. Microbiol. 68(12):6087-6093, doi:10.1128/aem.68.12.6087-6093.2002 - acute flow-cytometric membrane-integrity assay), though that evidence is on minutes-to-hours acute-shock timescales and does not itself supply a weeks/months rate; magnitude is a modelling choice, D-53-corrected against k_senescence_mlf's new upper-bound-derived magnitude"
    conditions: "O. oeni in wine; dimensionless ceiling on the ethanol term of the MalolacticSenescence stress multiplier, stress = 1 + k_senescence_ethanol_scale*[E/(E+ethanol_tolerance_mlf)] + starvation term"
    notes: "Read by MalolacticSenescence (D-52) as the ethanol-stress ceiling. The bracketed term is a smooth Monod-type factor in E (half-saturation = the existing ethanol_tolerance_mlf, reused rather than adding a new concentration scale - the same 'arrest-scale reused as a death-adjacent scale' simplification k_death_mlf's molecular_so2_inhib_mlf reuse already makes), bounded in [0,1) so the ethanol contribution to `stress` can never exceed this ceiling no matter how high E runs. VALUE 1.0 => at saturating ethanol the baseline rate at most DOUBLES. Post-D-53, that doubling acts on a MUCH smaller baseline (k_senescence_mlf=1e-5/h), so even the fully-saturated ethanol term leaves senescence negligible on model timescales (see k_senescence_mlf's notes for the resulting half-lives) - the mechanism (direction, bounded shape) is unchanged from D-52, only what it scales was corrected. SPECULATIVE: no per-organism ethanol-stress-vs-senescence-rate curve is sourced for O. oeni; this is a bounded, physically-motivated shape, not a fit."

k_senescence_starvation_scale:
  value: 0.5
  unit: "dimensionless"   # stress ceiling: starvation term contributes up to +k_senescence_starvation_scale*k_senescence_mlf when amino_acids are exhausted
  tier: speculative
  uncertainty: { low: 0.2, high: 1.0, note: "order-of-magnitude ceiling on how much nutrient starvation can accelerate the benign baseline; set lower than the ethanol ceiling as a smaller, secondary stressor" }
  provenance:
    source: "author estimate (D-52); direction sourced from the general observation that nutrient exhaustion accelerates bacterial senescence, magnitude is a modelling choice, D-53-corrected against k_senescence_mlf's new upper-bound-derived magnitude"
    conditions: "O. oeni in wine; dimensionless ceiling on the nutrient-starvation term of the MalolacticSenescence stress multiplier, stress = 1 + ethanol term + k_senescence_starvation_scale*[K_aa_mlf/(K_aa_mlf+amino_acids)]"
    notes: "Read by MalolacticSenescence (D-52) as the starvation-stress ceiling. The bracketed term reuses K_aa_mlf (MalolacticGrowth's amino-acid half-saturation) as the concentration scale, INVERTED so it rises toward 1 as amino_acids are depleted rather than falling - the same fuel pool the growth beat reads, so the term tracks real nutrient dynamics (near-max once amino acids are exhausted at ~1.3 d post-pitch per the D-23 finding, falling back whenever autolysis, D-34, refills the pool) rather than acting as a flat multiplier. VALUE 0.5, LOWER than k_senescence_ethanol_scale (1.0): starvation is modelled as a smaller secondary stressor. Combined ceiling with the ethanol term is still 2.5x baseline - post-D-53 that now means a multi-year worst-case half-life rather than the ~23 d D-52 originally computed (see k_senescence_mlf's notes); the mechanism is unchanged, only the baseline it scales was corrected. SPECULATIVE: no per-organism starvation-vs-senescence-rate curve is sourced; this is a bounded, physically-motivated shape, not a fit."

# -- MLF-DERIVED DIACETYL (Oenococcus oeni citrate co-metabolism), wine-only (decision D-31) --
# The real coupling MLF unlocks: alongside malate, O. oeni co-metabolises CITRIC ACID and
# overflows alpha-acetolactate, which decarboxylates to DIACETYL (the buttery note post-MLF
# wines carry). Read by two Processes in fermentation.core.kinetics.malolactic:
#   MalolacticCitrateMetabolism: r_c = k_citrate * X_mlf * [citrate]/(K_citrate+[citrate]) * gate
#     with d(citrate) = -r_c*M_citric, d(acetolactate) = +r_c*M_acetolactate, d(CO2) = +r_c*M_CO2
#     (citrate C6 -> alpha-acetolactate C5 + CO2 C1; carbon closes 6 = 5 + 1; MASS carries a
#     small gap - the real acetate/redox branch is untracked, carbon is the invariant, as for
#     the VDK decarb / beer hydrolysis water D-8). The alpha-acetolactate feeds the SHARED VDK
#     reservoir, so diacetyl EMERGES from the always-on D-26 decarboxylation + reduction - no new
#     diacetyl kinetics. 'gate' is the SAME O. oeni environmental gate (g_pH*g_EtOH*g_SO2*gamma(T))
#     the malate conversion uses, so SO2/ethanol/low-pH arrest citrate metabolism too.
#   OenococcusDiacetylReduction: L = k_mlf_diacetyl_reduction * X_mlf * f(T) * [diacetyl], the
#     bacterial reductase that clears diacetyl on the lees (why leaving a completed MLF on lees
#     cleans up, and why early post-MLF SO2 - killing the bacteria - locks diacetyl in). Uses the
#     shared E_a_reduction (vicinal_diketones.yaml) for f(T); gated on the constant X_mlf.
#
# WHY A CITRATE POOL (the load-bearing scope decision, D-31). MLF-diacetyl is a late-MLF, often
# POST-DRYNESS phenomenon, so its carbon cannot come from sugar: the yeast VDK stand-in draws
# alpha-acetolactate carbon out of S, which correctly no-ops at S=0 - it would strand carbon
# (breaking total_carbon) or stop diacetyl exactly when this beat needs it. Citrate is present
# independent of sugar, so it is the honest source (a dosed must input, citrate_gpl).
#
# STOICHIOMETRY IS A LUMPED FICTION - OWNED. Real citrate metabolism is citrate -> acetate +
# oxaloacetate -> pyruvate + CO2, ~2 citrate per alpha-acetolactate, with ACETATE (a
# volatile-acidity contributor) the DOMINANT co-product. The single-reaction stand-in balances
# carbon exactly but drops the acetate/lactate branches; k_citrate is held LOW so citrate stays
# MOSTLY UNCONSUMED - the trace diacetyl branch only. ALL SPECULATIVE (order-of-magnitude
# estimates; no per-catalyst kinetic model of this flux form is sourced). SCOPE (v1): X_mlf is a
# constant inert catalyst (no bacterial growth/death), so the reduction has no ethanol/SO2 arrest
# gate and diacetyl is not permanently stranded while O. oeni is present (racking to remove X_mlf
# needs the deferred event loop). Citrate is carbon-active but NOT charge-active (kept out of the
# D-18 pH balance in v1; a scoped omission the inverse anchoring absorbs at t=0, as for SO2 D-22).

k_citrate:
  value: 3.0e-5
  unit: "mol/(g*h)"   # molar citrate turnover per g/L O. oeni: r_c = k_citrate*X_mlf*Monod*gate
  tier: speculative
  uncertainty: { low: 5.0e-6, high: 1.0e-4, note: "order-of-magnitude target: an MLF-derived diacetyl contribution that clearly exceeds the yeast-only baseline (~0.1 mg/L) and lands in the buttery wine range (peak ~0.3 mg/L at the reference dose, above the ~0.2 mg/L threshold), while consuming only a small fraction (~6%) of a ~0.1-0.5 g/L citrate dose (the trace diacetyl branch; the dominant acetate branch is untracked)" }
  provenance:
    source: "author estimate; O. oeni citrate co-metabolism yields diacetyl in the ~mg/L range in wine (Ribereau-Gayon et al., Handbook of Enology Vol. 1, malolactic fermentation & diacetyl; Bartowsky & Henschke 2004, Int. J. Food Microbiol. 96:235-252, the O. oeni diacetyl review)"
    conditions: "S. cerevisiae/O. oeni co-inoculated wine, ~20 C; specific citrate-to-acetolactate activity scaling the dosed (constant) X_mlf, feeding the shared VDK reservoir"
    notes: "SPECULATIVE magnitude: no per-catalyst kinetic model of citrate->diacetyl of our flux form is sourced (O. oeni diacetyl is usually reported as bulk mg/L yields, not a per-biomass rate), so this is tuned to a plausible diacetyl contribution, NOT fitted. Held LOW so citrate is mostly unconsumed - the trace diacetyl branch only (the dominant acetate/lactate branches are omitted from the single-reaction carbon-closing stand-in). Shares the environmental gate with MalolacticConversion, so ethanol/SO2/low-pH arrest it too - in co-inoculation, production is concentrated in the early low-ethanol window before the ethanol wall (~day 4 at 20 C), then the reservoir decarboxylates on to a late diacetyl peak that reduction clears. Direction (citrate co-metabolism makes diacetyl; more with active bacteria) is sourced; the magnitude is the speculative modelling choice."

K_citrate:
  value: 1.0e-3
  unit: "mol/L"   # Michaelis-Menten half-saturation in CITRATE (molar)
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 5.0e-3, note: "citrate lyase / uptake half-saturation of order ~mM; the term stays smooth over a typical ~0.1-0.5 g/L (~0.5-2.6 mM) citrate dose" }
  provenance:
    source: "author estimate of order the reported O. oeni citrate-metabolism half-saturation (~mM range; enology/biochemistry literature on citrate lyase and citrate uptake)"
    conditions: "O. oeni citrate co-metabolism; half-saturation in the citrate Monod term of MalolacticCitrateMetabolism (mol/L, matching the [citrate] the Process computes from g/L via M_citric)"
    notes: "Read by MalolacticCitrateMetabolism. Because k_citrate is held low (citrate mostly unconsumed), this term stays roughly constant over the ferment, so it mainly sets the initial rate scale rather than shaping a depletion tail. SPECULATIVE: the whole-cell citrate affinity our X_mlf lumps is not the isolated-enzyme Km, and the value is taken mid-range, not fitted."

k_mlf_diacetyl_reduction:
  value: 2.0e-2
  unit: "L/(g*h)"   # d(diacetyl)/dt = -k_mlf_diacetyl_reduction * X_mlf * f(T) * [diacetyl]
  tier: speculative
  uncertainty: { low: 5.0e-3, high: 1.0e-1, note: "with a dosed X_mlf ~0.1-0.5 g/L gives a bacterial diacetyl half-life of ~days - slower than the yeast reduction (k_reduction 5e-2, viable X ~1-5 g/L), so while the yeast is viable it dominates and O. oeni clearing matters mainly after ethanol-inactivation, on the lees" }
  provenance:
    source: "author estimate; O. oeni reduces diacetyl to acetoin/2,3-butanediol via diacetyl reductase, the lees-contact clearing step (Bartowsky & Henschke 2004, Int. J. Food Microbiol. 96:235-252; Ribereau-Gayon et al., Handbook of Enology Vol. 1)"
    conditions: "O. oeni in wine; enzymatic diacetyl reduction, first-order in diacetyl and in the dosed (constant) X_mlf, using the shared E_a_reduction temperature factor"
    notes: "Read by OenococcusDiacetylReduction. Complements the yeast DiacetylReduction (D-26): the yeast (higher rate x higher biomass) clears diacetyl fast while viable; this bacterial reducer keeps clearing it after the yeast is ethanol-inactivated, as long as O. oeni is present - the realistic lees-contact clean-up, and the reason removing the bacteria (SO2 / racking) locks diacetyl in. v1 has no bacterial death gate (X_mlf constant), so this does not stop at high ethanol/SO2 - a documented simplification; bacterial arrest/death is deferred with the MLF-growth beat. Magnitude speculative."

# -- BRETTANOMYCES VOLATILE PHENOLS (wine-only, decision D-40) -----------------------------------
# The mixed-culture beat that closes Milestone 2. Brettanomyces bruxellensis is the canonical wine
# spoilage yeast: it decarboxylates grape-must HYDROXYCINNAMIC ACIDS (p-coumaric, ferulic) to
# VINYLPHENOLS, then reduces those to the ETHYLPHENOLS (4-ethylphenol "barnyard", 4-ethylguaiacol
# "clove") that define Brett character. Read by two Processes in fermentation.core.kinetics.brett:
#   BrettDecarboxylation: r = k_brett_decarb * X_brett * [hc]/(K_hydroxycinnamic+[hc]) * gate
#     with d(hydroxycinnamics) = -r*M_p_coumaric, d(vinylphenols) = +r*M_vinylphenol,
#     d(CO2) = +r*M_CO2 (p-coumaric C9 -> vinylphenol C8 + CO2 C1; carbon closes 9 = 8 + 1).
#   BrettVinylphenolReduction: L = k_brett_reduction * X_brett * gate * [vinylphenols], with
#     d(vinylphenols) = -L, d(ethylphenols) = +L*M_ethylphenol/M_vinylphenol (mole-for-mole C8->C8).
# Brett carries BOTH enzymes, so a dosed culture spoils POF-negative wine unaided (the canonical
# funk). 'gate' = g_SO2 * gamma(T) - the Brett environmental gate has NO pH or ethanol term (Brett
# is acid- AND ethanol-tolerant, unlike O. oeni; copying the MLF gate would arrest it where it
# thrives, decision D-40). X_brett is a constant inert catalyst in pt1 (BrettGrowth D-40 pt2 makes
# it dynamic). ALL SPECULATIVE: no per-catalyst kinetic model of this flux form is sourced (Brett
# volatile phenols are reported as bulk mg/L end-yields, not per-biomass rate constants), so these
# are tuned to a plausible slow (weeks-months) spoilage, NOT fitted.

k_brett_decarb:
  value: 5.0e-6
  unit: "mol/(g*h)"   # molar hydroxycinnamate turnover per g/L X_brett: r = k_brett_decarb*X_brett*Monod*gate
  tier: speculative
  uncertainty: { low: 1.0e-6, high: 2.0e-5, note: "order-of-magnitude target: a dosed X_brett ~0.1-0.5 g/L converts a must hydroxycinnamic pool (~50-150 mg/L) over WEEKS-MONTHS (Brett spoilage is slow), not hours - the timescale that makes an SO2/rack control meaningfully interrupt it" }
  provenance:
    source: "author estimate; Brettanomyces cinnamate decarboxylase converts hydroxycinnamic acids to vinylphenols (Chatonnet et al. 1992, J. Sci. Food Agric. 60:165-178; Dias et al. 2003, Food Microbiol. 20:377-384 - the canonical 4-ethylphenol spoilage studies)"
    conditions: "Brettanomyces bruxellensis in wine, ~20 C; specific decarboxylase activity scaling the dosed (constant, pt1) X_brett"
    notes: "Read by BrettDecarboxylation as the specific decarboxylase rate. SPECULATIVE magnitude: no per-catalyst kinetic model of our flux form is sourced (Brett phenols are reported as bulk end-yields), so it is tuned to a slow weeks-months spoilage at a realistic dose, NOT fitted. The dose X_brett (g/L) sets the absolute timescale linearly, so k_brett_decarb and a realistic pitch trade off (the growth beat D-40 pt2 makes X_brett dynamic). DIRECTION sourced (Brett decarboxylates hydroxycinnamic acids); magnitude is the speculative choice."

K_hydroxycinnamic:
  value: 5.0e-4
  unit: "mol/L"   # Michaelis-Menten half-saturation in hydroxycinnamic precursor (molar)
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 2.0e-3, note: "decarboxylase / uptake half-saturation of order ~mM; near a typical must hydroxycinnamic pool (~50-150 mg/L ~ 0.3-0.9 mM), so the term is O(1) and declines as the precursor is consumed - a genuine depletion tail, not a near-constant scale" }
  provenance:
    source: "author estimate of order the reported hydroxycinnamate-decarboxylase half-saturation (~mM range; enzyme kinetics on cinnamate decarboxylase / p-coumaric acid uptake)"
    conditions: "Brettanomyces in wine; half-saturation in the precursor Monod term of BrettDecarboxylation (mol/L, matching the [hc] the Process computes from g/L via M_p_coumaric)"
    notes: "Read by BrettDecarboxylation. Sets where the precursor Monod [hc]/(K+[hc]) rolls off, giving a near-complete conversion of the must hydroxycinnamic pool over the ferment rather than an abrupt stop. SPECULATIVE: the whole-cell precursor affinity our X_brett lumps is not the isolated-enzyme Km, taken mid-range, not fitted."

# -- FERULIC-ACID BRANCH (decision D-55 - the D-40 pt4 "vinylguaiacol/vinylphenol split" deferral) -
# The p-coumaric branch above (k_brett_decarb/K_hydroxycinnamic) and this ferulic branch are the
# SAME enzyme (Brettanomyces hydroxycinnamate decarboxylase / POF+ yeast Pad1-Fdc1) acting on a
# second, genuinely distinct substrate (ferulic acid, C10, vs p-coumaric's C9) - not a fixed-ratio
# split of the same pool, because the two decarboxylate to different-carbon-count products
# (ferulic 10C -> vinylguaiacol 9C + CO2 1C; p-coumaric 9C -> vinylphenol 8C + CO2 1C). The two
# k/K values below are RATIO-DERIVED, not independently re-estimated: Edlin et al. 1998 (Appl.
# Microbiol. Biotechnol. 49:511-517) purified a hydroxycinnamate decarboxylase from Brettanomyces
# anomalus (the same enzyme family) and report PAIRED kinetics for both substrates in the SAME
# assay - Vmax 13,494 (ferulic) vs 22,256 (p-coumaric) nmol/min/mg, Km 1.15 (ferulic) vs 1.55
# (p-coumaric) mM. Those ratios (~0.606x rate, ~0.742x half-saturation) are real, sourced, paired
# data, applied to this model's own (still author-estimated) absolute k_brett_decarb/
# K_hydroxycinnamic scale - the RATIO is sourced even though the absolute magnitude it scales
# remains speculative, same epistemic status as k_brett_decarb itself.

k_brett_decarb_ferulic:
  value: 3.0e-6
  unit: "mol/(g*h)"   # molar ferulate turnover per g/L X_brett: r = k_brett_decarb_ferulic*X_brett*Monod*gate
  tier: speculative
  uncertainty: { low: 6.0e-7, high: 1.2e-5, note: "= k_brett_decarb's own band (1.0e-6 to 2.0e-5) scaled by the sourced 0.606x Vmax(ferulic)/Vmax(p-coumaric) ratio (Edlin et al. 1998)" }
  provenance:
    source: "Edlin et al. 1998 (Appl. Microbiol. Biotechnol. 49:511-517): paired Vmax for a homologous hydroxycinnamate decarboxylase on ferulic (13,494 nmol/min/mg) vs p-coumaric acid (22,256 nmol/min/mg) in the SAME assay - a directly comparable ratio (~0.606x) even though neither absolute Vmax transfers to this model's lumped whole-cell flux form"
    conditions: "Brettanomyces bruxellensis in wine, ~20 C; specific decarboxylase activity on ferulic acid scaling the dosed X_brett, the ferulic-branch analogue of k_brett_decarb"
    notes: "Read by BrettDecarboxylation's ferulic branch (decision D-55). VALUE = k_brett_decarb * 0.606 (the sourced Vmax ratio) - the RATIO between the two branches is real paired data, even though the absolute scale it is applied to (k_brett_decarb itself) remains an unranked author estimate. DIRECTION and RELATIVE magnitude sourced; absolute magnitude speculative (inherited)."

K_hydroxycinnamic_ferulic:
  value: 3.7e-4
  unit: "mol/L"   # Michaelis-Menten half-saturation in ferulic-acid precursor (molar)
  tier: speculative
  uncertainty: { low: 7.4e-5, high: 1.5e-3, note: "= K_hydroxycinnamic's own band (1.0e-4 to 2.0e-3) scaled by the sourced 0.742x Km(ferulic)/Km(p-coumaric) ratio (Edlin et al. 1998) - ferulic has slightly HIGHER affinity (lower Km) than p-coumaric for this enzyme" }
  provenance:
    source: "Edlin et al. 1998 (Appl. Microbiol. Biotechnol. 49:511-517): paired Km for the same hydroxycinnamate decarboxylase on both substrates in the same assay, 1.15 mM (ferulic) vs 1.55 mM (p-coumaric) - a directly comparable ratio (~0.742x)"
    conditions: "Brettanomyces bruxellensis (and POF+ S. cerevisiae) in wine; half-saturation in the ferulic-acid precursor Monod term of the ferulic branch (mol/L)"
    notes: "Read by BrettDecarboxylation and YeastPOFDecarboxylation's ferulic branch (decision D-55). VALUE = K_hydroxycinnamic * 0.742 (the sourced Km ratio) - like k_brett_decarb_ferulic, the RATIO is real paired data even though the absolute scale (K_hydroxycinnamic itself) is a whole-cell-affinity estimate, not fitted."

k_brett_reduction:
  value: 5.0e-2
  unit: "L/(g*h)"   # d(vinylphenols)/dt = -k_brett_reduction * X_brett * gate * [vinylphenols]
  tier: speculative
  uncertainty: { low: 1.0e-2, high: 1.5e-1, note: "held ABOVE the decarboxylase turnover so the shared vinylphenol reservoir is drained to ethylphenol faster than it fills - in Brett (which has both enzymes) the intermediate does not pile up, so ethylphenols track the decarboxylation; the reservoir only strands when Brett is absent and a POF+ yeast made the vinylphenol (D-40 pt4)" }
  provenance:
    source: "author estimate; Brettanomyces vinylphenol reductase reduces vinylphenols to ethylphenols, the second and Brett-specific step S. cerevisiae lacks (Chatonnet et al. 1992; Dias et al. 2003)"
    conditions: "Brettanomyces in wine, ~20 C; enzymatic vinylphenol reduction, first-order in vinylphenol and in the dosed (constant, pt1) X_brett, throttled by the shared Brett SO2/temperature gate"
    notes: "Read by BrettVinylphenolReduction. Set ABOVE k_brett_decarb so vinylphenol turns to ethylphenol faster than it is made - so in Brett the intermediate stays low and 4-EP accumulates (the reservoir strands only when a POF+ yeast fills it with no Brett present, the D-40 pt4 emergent case). Uses the SAME g_SO2*gamma(T) gate as the decarboxylase, so SO2 arrests both steps. Magnitude speculative; direction (Brett reduces vinylphenol to ethylphenol) sourced."

molecular_so2_inhib_brett:
  value: 2.0e-4
  unit: "g/L"   # decay scale of g_SO2 = exp(-[SO2]_molecular / molecular_so2_inhib_brett)
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 5.0e-4, note: "molecular SO2 inhibitory scale ~0.1-0.5 mg/L; ~0.5-0.8 mg/L molecular strongly suppresses Brett - the basis of the winemaker's ~0.5-0.8 mg/L molecular SO2 target to control Brettanomyces" }
  provenance:
    source: "author estimate encoding the antimicrobial action of MOLECULAR SO2 on Brettanomyces (the same molecular-SO2 antimicrobial basis as the D-22 readout; the ~0.5-0.8 mg/L molecular SO2 target is the standard Brett-control guideline, Ribereau-Gayon et al., Handbook of Enology Vol. 1)"
    conditions: "Brettanomyces in wine; exponential decay scale of the molecular-SO2 inhibition gate on the decarboxylase/reductase rates"
    notes: "Read by brett_environmental_gate: g_SO2 = exp(-[SO2]_molecular / s), where [SO2]_molecular (g/L) is partitioned from the dosed free SO2 at the SOLVED pH (D-22). Scale ~0.2 mg/L: g_SO2 ~ 0.018 at 0.8 mg/L molecular (strong suppression), ~1 when undosed. Taken equal to molecular_so2_inhib_mlf - both organisms respond to molecular SO2 on a similar ~0.1-0.5 mg/L scale (a v1 simplification; a Brett-specific scale is a v2 refinement). DIRECTION strongly sourced (molecular SO2 is THE tool to control Brett); exact scale and exponential FORM speculative. This same scale is reused as the SO2 KILL scale by BrettDeath (D-40 pt3)."

T_min_brett:
  value: 283.15
  unit: "K"   # cardinal minimum (10 C) of the Rosso CTMI temperature optimum gamma(T)
  tier: speculative
  uncertainty: { low: 279.15, high: 286.15, note: "Brettanomyces growth is slow but not zero in cold cellars; T_min ~8-12 C - Brett persists (slowly) at barrel-cellar temperatures, part of why it is hard to eradicate" }
  provenance:
    source: "author estimate from Brettanomyces cardinal temperatures (grows ~10-40 C, optimum warm; slow persistence in cool cellars; Brettanomyces/Dekkera physiology reviews)"
    conditions: "Brettanomyces in wine; minimum cardinal temperature of the CTMI gamma(T) factor (stored in K, sourced in C)"
    notes: "Read by brett_environmental_gate via cardinal_temperature_factor (Rosso et al. 1993 CTMI). 10 C. Below it gamma(T)=0. DIRECTION sourced (cold slows Brett); exact cardinal speculative. CTMI uses only temperature DIFFERENCES, so K and C give identical gamma (D-3)."

T_opt_brett:
  value: 305.15
  unit: "K"   # cardinal optimum (32 C) where gamma(T) = 1 - WARMER than O. oeni's 23 C
  tier: speculative
  uncertainty: { low: 298.15, high: 308.15, note: "Brettanomyces optimum ~25-32 C, distinctly WARMER than O. oeni MLF (~20-25 C) - warm cellars/late-season barrels favour Brett" }
  provenance:
    source: "author estimate from Brettanomyces growth optimum reports (~28-32 C; distinctly warmer than the O. oeni MLF optimum)"
    conditions: "Brettanomyces in wine; optimum cardinal temperature of the CTMI gamma(T) factor (stored in K, sourced in C)"
    notes: "Read by brett_environmental_gate via cardinal_temperature_factor. 32 C, where gamma(T)=1 (k_brett_decarb/k_brett_reduction read unscaled there). At a 20 C cellar gamma ~0.6, at a cool 15 C barrel cellar ~0.4 - so Brett is SLOW but active at cellar temperatures and faster in a warm room, the realistic direction. WARMER optimum than O. oeni is the load-bearing contrast (Brett is a warm-tolerant spoiler). Exact optimum speculative; a warm optimum ~28-32 C is well-established."

T_max_brett:
  value: 318.15
  unit: "K"   # cardinal maximum (45 C) of the CTMI temperature optimum gamma(T)
  tier: speculative
  uncertainty: { low: 313.15, high: 322.15, note: "Brettanomyces growth ceases by ~40-45 C; T_max ~45 C" }
  provenance:
    source: "author estimate from Brettanomyces upper cardinal temperature (growth ceases ~40-45 C)"
    conditions: "Brettanomyces in wine; maximum cardinal temperature of the CTMI gamma(T) factor (stored in K, sourced in C)"
    notes: "Read by brett_environmental_gate via cardinal_temperature_factor. 45 C. Above it gamma(T)=0. Far above any normal wine ferment/cellar, so it shapes only the high-T tail; exact value speculative, direction (a finite upper limit exists) sound."

# -- BRETT GROWTH (Brettanomyces biomass, wine-only, decision D-40 pt2) --------------------------
# BrettGrowth (fermentation.core.kinetics.brett) makes the X_brett catalyst DYNAMIC:
#   dX_brett/dt = mu_max_brett * X_brett * aa/(K_aa_brett+aa) * g_SO2*gamma(T)
# Because the decarboxylase/reductase are linear in X_brett, growth makes the volatile-phenol
# spoilage ACCELERATE as the population multiplies over the months a barrel sits. Nitrogen-anchored
# on the amino-acid pool (D-32, autolysis-refilled D-34); the carbon shortfall is drawn from
# ETHANOL, not sugar (owner fork, D-40) - the mechanistic reason Brett thrives in a DRY finished
# wine (its post-AF/barrel niche), where a sugar-anchored growth (MLF's) could not run. NO sugar
# Monod - growth is gated only by amino-acid fuel + the SO2/temperature environment, so a post-AF
# pitch_brett into a high-ethanol wine grows rather than sitting inert. X_brett is now weighted as
# real biomass in total_carbon/total_nitrogen (Brett ~ yeast composition, a v1 simplification).
# Gated at compile on amino_acids_gpl>0 (NOT the pitch - the X_brett<=0 guard handles that).
# ALL SPECULATIVE: no per-catalyst kinetic model of Brett growth of this form is sourced.

mu_max_brett:
  value: 8.0e-3
  unit: "1/h"   # Brett max specific growth rate: dX_brett/dt = mu_max_brett*X_brett*Monod(aa)*gate
  tier: speculative
  uncertainty: { low: 2.0e-3, high: 2.0e-2, note: "Brett is a SLOW grower (a defining trait vs S. cerevisiae); a specific growth rate ~2e-3 - 2e-2 /h gives a doubling time of ~1.5-15 d, so a small barrel inoculum multiplies over WEEKS-MONTHS - the timescale on which Brett spoilage worsens, and on which an SO2 addition can still catch it" }
  provenance:
    source: "author estimate; Brettanomyces bruxellensis is a characteristically slow-growing spoilage yeast (doubling times of days, much slower than S. cerevisiae; Brettanomyces/Dekkera physiology reviews, e.g. Wedral et al. 2010, the Brettanomyces review)"
    conditions: "Brettanomyces in wine, ~20 C; max specific growth rate scaling X_brett, read unscaled at the temperature optimum (gamma(T)=1) and near-saturating amino acids"
    notes: "Read by BrettGrowth as the Brett mu_max. SPECULATIVE: no kinetic model of our amino-acid-anchored, ethanol-carbon-sourced growth form is sourced (Brett growth is reported as bulk OD/CFU timescales), so it is tuned to a realistic slow (days-doubling) buildup, NOT fitted. Kept LOW to encode Brett's defining slow growth: the population builds over the months a barrel ages, so the spoilage worsens with time and an SO2 addition partway through can still arrest it. Gated by the same g_SO2*gamma(T) as the phenol Processes (no sugar Monod - Brett grows in a dry wine on ethanol carbon), so SO2/temperature throttle growth too."

K_aa_brett:
  value: 5.0e-3
  unit: "g/L"   # amino-acid half-saturation in the Brett growth Monod term aa/(K_aa_brett+aa)
  tier: speculative
  uncertainty: { low: 1.0e-3, high: 2.0e-2, note: "amino-acid availability half-saturation; ramps Brett growth up from an empty pool and down as amino acids are exhausted, over a typical autolysis-refilled ~0.01-0.1 g/L amino-acid range" }
  provenance:
    source: "author estimate of order the reported yeast amino-acid uptake half-saturation (~mg/L range); no Brett-specific value sourced"
    conditions: "Brettanomyces in wine; half-saturation in the smooth availability gate aa/(K_aa_brett+aa) on the Brett growth rate"
    notes: "Read by BrettGrowth: gate(aa) = aa/(K_aa_brett+aa) ramps Brett growth up from an empty amino-acid pool and down to zero as amino acids are exhausted (the same smooth-Monod shape the MLF growth and yeast swap use, keeping the RHS C1 for the BDF solver). A SEPARATE parameter from K_aa_mlf (the per-organism design lets them diverge); an estimate, hence speculative. Brett famously scavenges trace nutrients, so it is taken of the same order but not tuned to a source."

K_E_brett:
  value: 2.0
  unit: "g/L"   # ethanol half-saturation in the Brett growth Monod term E/(K_E_brett+E)
  tier: speculative
  uncertainty: { low: 0.5, high: 5.0, note: "ethanol-availability half-saturation; small vs any finished wine (~80-120 g/L ethanol) so the Monod is ~1 across the normal range and only ramps growth down toward an unfermented must (E~0). Bounds the near-zero crossing, not the working range" }
  provenance:
    source: "author estimate; Brettanomyces grows on ethanol as a carbon/energy source, so growth scales with ethanol availability (Brettanomyces/Dekkera physiology reviews, e.g. Wedral et al. 2010). No Brett-specific half-saturation sourced"
    conditions: "Brettanomyces in wine; half-saturation in the smooth availability gate E/(K_E_brett+E) on the Brett growth rate"
    notes: "Read by BrettGrowth: gate(E) = E/(K_E_brett+E) makes growth ~0 in an unfermented must (E~0) and ~1 in a finished wine (E >> K_E_brett) - Brett's post-AF/barrel niche - AND is the smooth shadow of the E<=0 growth guard (like aa/(K_aa_brett+aa) shadows the amino-acid guard and (1-X/K) shadows the carrying-capacity cap), so the BDF Jacobian never straddles an on/off step at E=0 during primary AF. Kept small so it does not otherwise change growth in the working ethanol range."

# Brett carrying capacity - the logistic ceiling on X_brett (decision D-40 pt2).
# Unlike MLF, Brett growth has NO sugar Monod and NO ethanol wall to self-arrest (that is its
# dry-wine, ethanol-tolerant niche), so the amino-acid Monod alone is not a brake: an autolysis-
# refilled amino-acid pool would let X_brett grow exponentially with no ceiling and drive the pool
# negative on a solver step. This intrinsic logistic factor (1 - X_brett/K) - the same lumped form
# as the D-30 yeast biomass_carrying_capacity - bounds X_brett to a realistic Brett cell density,
# which keeps the amino-acid draw rate small so the pool depletes SMOOTHLY to a positive residual.
# Real Brett saturates at a finite density (nutrient/quorum limits); the cap value is an estimate.
brett_carrying_capacity:
  value: 0.5
  unit: "g/L"   # logistic carrying capacity K in the Brett growth brake (1 - X_brett/K)
  tier: speculative
  uncertainty: { low: 0.1, high: 1.0, note: "Brett spoilage populations of ~1e6-1e7 CFU/mL correspond to a dry biomass of order 0.05-0.5 g/L; the cap sets the plateau X_brett approaches over a barrel's months and, with it, the ceiling on volatile-phenol production and on the amino-acid draw" }
  provenance:
    source: "author estimate; Brettanomyces bruxellensis spoilage densities (~1e6-1e7 CFU/mL) scaled to dry cell weight (order 0.05-0.5 g/L; Brettanomyces/Dekkera physiology reviews, e.g. Wedral et al. 2010)"
    conditions: "Brettanomyces in wine; logistic carrying capacity bounding X_brett in the growth brake (1 - X_brett/brett_carrying_capacity)"
    notes: "Read by BrettGrowth: the ONLY ceiling on Brett biomass (no sugar Monod / ethanol wall, unlike MLF). Linear 1 - X/K, clamped >= 0, mirrors the D-30 biomass_carrying_capacity form but is intrinsic and always-on (not the opt-in isolable modifier D-30 is). A SEPARATE parameter from that yeast cap (per-organism). Bounds X_brett small so the amino-acid draw stays small and the pool never overshoots negative."

# -- BRETT DEATH (Brettanomyces SO2-driven kill, wine-only, decision D-40 pt3) -------------------
# BrettDeath (fermentation.core.kinetics.brett) completes the Brett arc (pt1 pathway -> pt2 growth
# -> pt3 death): it moves viable X_brett into the non-viable X_brett_dead pool when the wine is
# SULFITED, so the spoilage population DECLINES and the volatile-phenol activities that scale with
# X_brett (decarboxylase + reductase) wind down.
#   r_death = k_death_brett * X_brett * (1 - g_SO2) * arrhenius(T, E_a_death_brett, T_ref)
#   g_SO2   = exp(-[SO2]_molecular / molecular_so2_inhib_brett)   (the SAME term the metabolic gate uses)
# The driver is 1 - g_SO2 - MOLECULAR SO2 ALONE. Death is EXACTLY 0 without SO2 (g_SO2 = 1) and rises
# toward its Arrhenius ceiling as molecular SO2 accumulates. Temperature enters through the Arrhenius
# factor (warm accelerates the kill, cold slows it - the autolysis/MLF-death shape), NOT the cardinal
# gamma(T) (which -> 0 in the cold and would spuriously make cold KILL Brett; cold in fact PRESERVES
# it, part of why Brett is so hard to eradicate from a cool cellar). The transfer X_brett ->
# X_brett_dead is CARBON- AND NITROGEN-NEUTRAL (both pools weighted at the biomass fractions since
# pt2, the yeast X -> X_dead precedent D-13), so it adds no conservation code.
# WHY SO2 ALONE IS NATURAL FOR BRETT (contrast MalolacticDeath D-39): MLF death had to DROP an
# ethanol/pH toxicity driver because O. oeni's Luong ethanol wall made bacteria spuriously "die" from
# ordinary post-AF ethanol. Brett has NO such wall - the Brett gate carries no ethanol/pH term at all
# (Brett is ethanol- and acid-tolerant) - so "molecular SO2 alone kills Brett" is not a correction of
# a confounder but the DIRECTLY correct physics: the winemaker's ~0.5-0.8 mg/L molecular-SO2
# Brett-control target is the real-world expression of this term. Without SO2 (or a rack) Brett
# PERSISTS indefinitely in v1 - the honest reflection of how tenacious a barrel Brett infection is; a
# slow benign-environment senescence is a deferred v2 refinement.
# BOTH PARAMS SPECULATIVE (author estimates; no per-catalyst mortality law of this form is sourced).
# Pitch-gated at compile (brett_pitch_gpl>0), NOT amino-acid-gated - Brett dies whether or not it grew.

k_death_brett:
  value: 3.0e-2
  unit: "1/h"   # Brett specific death rate at FULL SO2 kill: r_death = k_death_brett*X_brett*(1-g_SO2)*f(T)
  tier: speculative
  uncertainty: { low: 1.0e-2, high: 8.0e-2, note: "specific mortality at a full molecular-SO2 kill => a Brett half-life of ~9-70 h; a stabilizing molecular-SO2 dose (~0.5-0.8 mg/L, the Brett-control target) crashes the population over ~1-4 d, while an unsulfited wine sees ZERO death (Brett persists in the barrel)" }
  provenance:
    source: "author estimate; molecular SO2 is the winemaker's primary tool against established Brettanomyces - maintaining ~0.5-0.8 mg/L molecular SO2 suppresses and clears it, though Brett is notably SO2-tolerant relative to other spoilage organisms (Ribereau-Gayon et al., Handbook of Enology Vol. 1, SO2 & microbial stabilization; Wedral et al. 2010, the Brettanomyces review)"
    conditions: "Brettanomyces bruxellensis in wine, ~20 C; specific death rate at a full molecular-SO2 kill (1 - g_SO2 = 1) scaling the viable X_brett, read unscaled at T_ref by the Arrhenius factor"
    notes: "Read by BrettDeath as the death magnitude at a full SO2 kill. VALUE 0.03/h => a full-kill half-life of ~23 h (ln2/0.03); at a strong molecular-SO2 dose (1-g_SO2 ~ 1) the population drops ~90% in ~3 d - a physically-reasonable SO2-kill timescale for a SO2-tolerant organism, chosen on that physics, NOT to clear a test threshold. Set BELOW k_death_mlf (0.05/h): Brett is more SO2-tolerant than O. oeni, so it dies more slowly at the same molecular SO2. Because death is EXACTLY 0 without SO2, k does not couple to the unsulfited spoilage trajectory, so it can take its true SO2-kill value. SPECULATIVE: no per-catalyst kinetic model of Brett SO2 mortality is sourced (viability is reported as CFU decline curves, not this rate constant), so it is tuned - NOT fitted. DIRECTION is sourced (molecular SO2 kills/suppresses Brett; the basis of using SO2 to control it); the magnitude is the speculative modelling choice. SIMPLIFICATION: reuses molecular_so2_inhib_brett as the kill scale (arrest-scale = kill-scale, bacteriostatic ~ bacteriocidal); a separate molecular_so2_brett_death_scale is the v2 refinement. A benign-environment baseline senescence (death without SO2) is deferred to v2."

E_a_death_brett:
  value: 60000.0
  unit: "J/mol"   # Arrhenius activation energy for the temperature dependence of Brett death
  tier: speculative
  uncertainty: { low: 40000.0, high: 90000.0, note: "generic biological/enzymatic-process activation energy (Q10 ~2 at 20 C); brackets the ~40-90 kJ/mol range the model's other enzymatic E_a (E_a_reduction 45k, E_a_autolysis 60k, E_a_death_mlf 60k, E_a_decarb 90k) span" }
  provenance:
    source: "author estimate; no sourced Arrhenius fit for Brettanomyces death rate - taken equal to E_a_death_mlf / E_a_autolysis (60 kJ/mol), a generic enzymatic/biological-process activation energy (Q10 ~2.3 at 20 C), consistent with warm accelerating and cold slowing cell mortality"
    conditions: "Brettanomyces in wine; temperature factor arrhenius(T, E_a_death_brett, T_ref) on the death rate, = 1 at T_ref (20 C)"
    notes: "Read by BrettDeath. Gives the temperature dependence of Brett mortality so that a warm sulfited wine clears the culture faster and cold PRESERVES it (dormancy) - the physically correct direction the cardinal gamma(T) cannot supply for death (gamma(T) -> 0 in the cold would make cold kill, the opposite of reality). SPECULATIVE: the magnitude is an estimate equal to the MLF death / autolysis E_a; the DIRECTION (warm accelerates, cold preserves) is sound. Uses the shared T_ref (20 C) so the factor is 1 at the wine benchmark temperature, like every other Arrhenius rate."

# -- BRETT ETHANOL TOXICITY (wine-only, decision D-58) -------------------------------------------
# BrettEthanolToxicity (fermentation.core.kinetics.brett) closes a real gap D-58's research surfaced:
# D-52 correctly declined a generic age-based "BrettSenescence" (no source shows Brett declining from
# elapsed time alone), but Barata et al. 2008 (Int. J. Food Microbiol. 121(2):201-207) measured a
# DIFFERENT, real mechanism in closed-system model wine WITHOUT SO2: Brett grows normally at ~8% v/v
# ethanol, death onset by ~14%, and an upper growth ceiling ~14.5-15% - a bloom-then-death dynamic the
# model previously could not reproduce (BrettGrowth's only ceiling was a logistic PLATEAU brake, never
# a decline; BrettDeath is SO2-only, exactly 0 without SO2). This is a genuinely different driver from
# the declined senescence idea: threshold-gated on ethanol CONCENTRATION, not on elapsed time, and
# ZERO below Barata's onset (so normal-strength wine, ~90-105 g/L / 11-13% ABV, is unaffected).
# Shared survival factor (fermentation.core.kinetics.brett.brett_ethanol_survival_factor), reused by
# BOTH BrettGrowth (as an upper multiplicative wall easing growth to 0 near the ceiling - the
# reconciliation with BrettGrowth's existing ethanol-as-CARBON-SOURCE Monod on the same state
# variable, source at low E, toxin at high E) and BrettEthanolToxicity (driving death via
# 1 - survival, the BrettDeath 1-g_SO2 idiom):
#   remaining = 1 - max(0, E - brett_ethanol_toxicity_onset) / (brett_ethanol_toxicity_ceiling -
#               brett_ethanol_toxicity_onset)
#   survival  = max(0, remaining) ^ brett_ethanol_toxicity_exponent
# Exactly 1 (no effect) for E <= onset; eases smoothly (C1, no BDF kink, the D-40 pt2 shadow idiom) to
# 0 by the ceiling. k_death_brett/E_a_death_brett/T_ref are REUSED (not new params) for the toxicity
# death magnitude/temperature shape - a documented simplification (Barata ran at one fixed 25 C, so no
# independent activation energy is sourced; reusing the existing SO2-kill scale as the ethanol-kill
# scale mirrors D-40 pt3's own "arrest-scale = kill-scale" reuse). SCOPE LIMITATION (documented, not
# silently assumed): Barata's headline 12%-ethanol/no-SO2 50-day decline is explicitly described in
# the source as bloom-on-trace-carbon THEN starvation-plus-ethanol-stress - a confounded result this
# model does NOT attempt to reproduce (12% / ~95 g/L is below brett_ethanol_toxicity_onset, so this
# mechanism alone predicts no decline there); only the distinct, unconfounded per-concentration
# boundary data (grow at 8%, death onset ~14%, ceiling ~14.5-15%) is modelled. Pitch-gated (Brett dies
# whether or not it grew, the BrettDeath convention), NOT amino-acid-gated.
brett_ethanol_toxicity_onset:
  value: 110.0
  unit: "g/L"   # ~14% v/v; ethanol survival factor is exactly 1 (no effect) at or below this
  tier: speculative
  uncertainty: { low: 100.0, high: 115.0, note: "Barata et al. 2008 Table 2: death observed by ~14% v/v; per-strain variability means the true onset could sit slightly lower or higher" }
  provenance:
    source: "Barata, Caldeira, Botelheiro, Pagliara, Malfeito-Ferreira & Loureiro (2008), 'Survival patterns of Dekkera bruxellensis in wines and inhibitory effect of sulphur dioxide', Int. J. Food Microbiol. 121(2):201-207, doi:10.1016/j.ijfoodmicro.2007.11.020 — Table 2, ethanol boundary conditions in synthetic model wine, no SO2"
    conditions: "Brettanomyces bruxellensis in model wine, pH 3.50, 25 C, no SO2, no residual sugar; ethanol concentration (g/L) below which Barata's data shows no toxicity effect"
    notes: "Read by BrettGrowth (as the upper wall's onset) and BrettEthanolToxicity (as the death threshold). 110 g/L = 14% v/v via the standard ethanol density conversion (abv_from_ethanol / _ETHANOL_DENSITY_GPML = 0.78924 g/mL), matching Barata's ~14% death-onset boundary. Coincidentally equal to ethanol_tolerance_mlf (110 g/L) - a numerical coincidence, not a shared mechanism: that param is an O. oeni Luong-wall E_max (effect starts at E=0 and grows continuously), this one is a threshold (zero effect below it). SOURCED value, not fit to any model behaviour."

brett_ethanol_toxicity_ceiling:
  value: 118.0
  unit: "g/L"   # ~15% v/v; ethanol survival factor is 0 (growth fully arrested / death at its ceiling rate) at or above this
  tier: speculative
  uncertainty: { low: 114.0, high: 120.0, note: "Barata et al. 2008: upper growth ceiling reported as ~14.5-15% v/v" }
  provenance:
    source: "Barata et al. 2008 (see brett_ethanol_toxicity_onset) — Table 2, upper growth ceiling ~14.5-15% v/v"
    conditions: "Brettanomyces bruxellensis in model wine, no SO2; ethanol concentration (g/L) at or above which growth is fully arrested"
    notes: "Read by BrettGrowth/BrettEthanolToxicity as the far end of the survival-factor ramp. 118 g/L = ~14.95% v/v, the midpoint of Barata's reported 14.5-15% ceiling range via the same density conversion as brett_ethanol_toxicity_onset. The 8 g/L onset-to-ceiling span is deliberately narrow (Barata's data supports a fairly sharp cutoff near the ceiling, not a gradual decline starting at ordinary wine strength — see the module-level note on why a standard whole-range Luong wall, as used for O. oeni, would be the wrong functional form here)."

brett_ethanol_toxicity_exponent:
  value: 2.0
  unit: "dimensionless"   # toxic-power exponent n in survival = max(0, remaining)^n
  tier: speculative
  uncertainty: { low: 1.0, high: 3.0, note: "Levenspiel/Luong toxic-power exponent; n>1 keeps the touchdown C1-smooth, matching every other Luong-form exponent in this codebase (mlf_ethanol_exponent, ethanol_inhibition_exponent)" }
  provenance:
    source: "author estimate; Levenspiel 1980 / Luong 1985 inhibition form, matching mlf_ethanol_exponent and the yeast ethanol_inhibition_exponent choice"
    conditions: "Brettanomyces in wine; exponent of the shared ethanol survival-factor ramp between the onset and ceiling"
    notes: "Kept at n=2 (the codebase-wide convention) so the ramp eases to 0 with no derivative kink at the ceiling - C1-smooth for the BDF solver, the same reasoning as mlf_ethanol_exponent/ethanol_inhibition_exponent. The FORM has literature backing (Luong); the exponent itself is a numerical choice, hence speculative."

# -- POF+ YEAST DECARBOXYLASE (wine-only, decision D-40 pt4, temperature dependence D-54) --------
# YeastPOFDecarboxylation (fermentation.core.kinetics.brett) is the YEAST half of the volatile-phenol
# story: a POF+ (phenolic-off-flavour-positive) primary S. cerevisiae strain carries the cinnamate
# decarboxylase - the SAME reaction as BrettDecarboxylation, drawing must hydroxycinnamics into
# vinylphenols + CO2 (p-coumaric C9 -> vinylphenol C8 + CO2 C1; carbon closes 9 = 8 + 1) - but NOT
# the reductase, so it FILLS the shared vinylphenol reservoir it cannot drain. With no Brett the
# vinylphenols STRAND (nothing reduces them to ethylphenol); a Brett contamination arriving later
# gets a HEAD START on the pre-filled reservoir (the emergent yeast/Brett coupling, D-26/D-31
# parallel). Rate:
#   r = k_pof_decarb * arrhenius(T, E_a_pof) * X * S_total/(K_sugar_uptake+S_total) * [hc]/(K_hydroxycinnamic+[hc])
# FLUX-COUPLED to the yeast's fermentative activity (catalyst = viable X via fermentative_flux_shape,
# NOT X_brett), so POF decarboxylation runs during active fermentation and STOPS at dryness (S->0) -
# a primary-fermentation phenomenon. Reuses K_hydroxycinnamic (same whole-cell precursor affinity as
# Brett) and K_sugar_uptake (the shared fermentative-flux half-saturation). NO Brett SO2/temperature
# gate (this is yeast metabolism during AF).
# TEMPERATURE (decision D-54, v2 - supersedes D-40 pt4's "temperature-flat"): the rate now carries
# its OWN Arrhenius factor E_a_pof (the enzyme genuinely speeds up with warmth), but because r is
# FLUX-COUPLED, the NET finished-wine conversion (time-integral of r to dryness) is governed by the
# D-19 flux-coupled-byproduct ordering constraint: it scales as
# exp(-((E_a_pof - E_a_uptake)/R)(1/T-1/T_ref)) because a warmer ferment also finishes faster,
# shrinking POF's time window. E_a_pof is set BELOW E_a_uptake (55,100 J/mol) - the OPPOSITE
# ordering from E_a_esters/E_a_fusels (set above E_a_uptake so their totals RISE with T) - because
# the sourced real-world direction here is the opposite of theirs: net conversion FALLS with
# warmer fermentation. Enabled by the pof_positive opt-in (a binary strain trait), WHOLLY
# INDEPENDENT of the Brett pitch; a POF-negative default wine makes no vinylphenol. SPECULATIVE: no
# per-strain POF decarboxylase rate of this flux-coupled form is sourced (the DIRECTION - POF+ yeast
# decarboxylates hydroxycinnamics to vinylphenols during AF - is well established, Chatonnet et al.
# 1992 / 1997; Suarez et al. 2007 review).
k_pof_decarb:
  value: 2.5e-6
  unit: "mol/(g*h)"   # molar hydroxycinnamate turnover per (g/L) fermentative flux: r = k_pof_decarb*flux*Monod
  tier: speculative
  uncertainty: { low: 1.0e-6, high: 2.0e-5, note: "order-of-magnitude target: a POF+ yeast converts a PARTIAL fraction (~30-70%) of a typical must hydroxycinnamic pool (~50-150 mg/L) to vinylphenols over the days-long primary fermentation, leaving a real stranded reservoir when Brett is absent (not a near-complete or near-zero conversion). Coupled to the fermentative flux (X*S/(K+S)), which is O(1-10 g/L) during AF, so this scales like the Brett decarboxylase k but off a larger, sugar-linked activity that vanishes at dryness" }
  provenance:
    source: "author estimate; POF+ Saccharomyces cerevisiae expresses a cinnamate/ferulic-acid decarboxylase (PAD1/FDC1) that converts hydroxycinnamic acids to vinylphenols during fermentation (Chatonnet et al. 1992, J. Sci. Food Agric. 60:165-178; Chatonnet et al. 1997; Suarez et al. 2007, Food Chem. 102:10-21 - the 4-ethylphenol/POF review). No per-strain flux-coupled rate of this form is sourced"
    conditions: "POF+ S. cerevisiae in wine during active fermentation, ~20 C; specific decarboxylase activity scaling the biomass-catalysed fermentative flux X*S/(K_sugar_uptake+S)"
    notes: "Read by YeastPOFDecarboxylation. Set of the same order as k_brett_decarb (both are a lumped whole-cell cinnamate-decarboxylase turnover), but multiplies the fermentative FLUX (O(1-10 g/L) during AF) rather than the dosed X_brett (O(0.1-0.5 g/L)), and shuts off at dryness - so it fills the vinylphenol reservoir during primary fermentation only. Tuned for a partial conversion of the must hydroxycinnamic pool, leaving a stranded reservoir the emergent-coupling test relies on. SPECULATIVE: magnitude an estimate; the direction (POF+ yeast makes vinylphenols during AF) is well established."

E_a_pof:
  value: 25000.0
  unit: "J/mol"   # Arrhenius activation energy on the POF decarboxylase's OWN catalytic rate (embedded in r, D-54)
  tier: speculative
  uncertainty: { low: 10000.0, high: 40000.0, note: "kept comfortably BELOW E_a_uptake's own uncertainty floor (47,000) so the net finished-wine conversion falls with warmer fermentation across the full parameter range, not just at the point estimate - the sourced direction must survive the uncertainty band" }
  provenance:
    source: "Direction that the enzyme's OWN rate rises with warmth (well below any thermal denaturation optimum) from Edlin et al. 1998 (Appl. Microbiol. Biotechnol. 49:511-517): a hydroxycinnamate decarboxylase purified from Brettanomyces anomalus - the same enzyme family as this model's cinnamate/ferulic-acid decarboxylase - has an activity optimum at 40 C, i.e. still rising through the whole 10-35 C wine/beer fermentation range. The E_a_pof < E_a_uptake ORDERING (which sets the sign of the NET, finished-wine direction) is set by real-world practice on this exact enzyme: POF+ (Pad1/Fdc1) wheat-beer (Weizen) fermentation is unambiguous and widely corroborated - cooler fermentation retains more clove/4-vinylguaiacol character, warmer fermentation favours esters over phenolics (Brewing Science Institute wheat-beer fermentation guidance; Northern Brewer; Brulosophy fermentation-temperature exBEERiments). Extended by analogy from beer to this model's wine POF+ yeast: the SAME PAD1/FDC1 enzyme, as this module's own docstring already establishes for k_pof_decarb's direction."
    conditions: "POF+ S. cerevisiae in wine during active fermentation; Arrhenius factor on the decarboxylase's own molar turnover r (embedded in YeastPOFDecarboxylation.derivatives, not a ProcessSet RateModifier), reads the shared T_ref"
    notes: "Read by YeastPOFDecarboxylation. Per the D-19 flux-coupled-byproduct ordering constraint (see E_a_esters/E_a_fusels): because POF decarboxylation is coupled to the fermentative flux (fermentative_flux_shape), its NET finished-wine conversion (the time-integral of r to dryness) scales as exp(-((E_a_pof-E_a_uptake)/R)(1/T-1/T_ref)) - a warmer ferment finishes faster, shrinking the integration window. E_a_pof is kept POSITIVE (the enzyme genuinely accelerates with warmth, per Edlin et al.) but set BELOW E_a_uptake (55,100 J/mol) so the shrinking-window effect dominates and net conversion still FALLS with warmer fermentation - the OPPOSITE ordering from E_a_esters/E_a_fusels (set ABOVE E_a_uptake so their totals RISE with T), because the sourced real-world direction for THIS byproduct is opposite theirs. Supersedes the D-40 pt4 'temperature-flat' choice: that was a reasoned v1 simplification (no pt4 behaviour needed POF's intrinsic direction, and the implicit E_a_pof=0 already fell with warmer T through the flux-window effect alone, so the v1 direction was accidentally already right) - this v2 refinement replaces the implicit T-invariant placeholder with a genuine (if still speculative) intrinsic enzyme temperature term, sized to preserve and reinforce that same correct direction."

k_pof_decarb_ferulic:
  value: 1.5e-6
  unit: "mol/(g*h)"   # molar ferulate turnover per (g/L) fermentative flux: r = k_pof_decarb_ferulic*flux*Monod
  tier: speculative
  uncertainty: { low: 6.0e-7, high: 1.2e-5, note: "= k_pof_decarb's own band (1.0e-6 to 2.0e-5) scaled by the SAME sourced 0.606x Vmax(ferulic)/Vmax(p-coumaric) ratio (Edlin et al. 1998) as k_brett_decarb_ferulic - the same enzyme family, Pad1/Fdc1, this module's own long-standing equivalence (D-40 pt4)" }
  provenance:
    source: "Same Edlin et al. 1998 (Appl. Microbiol. Biotechnol. 49:511-517) Vmax ratio (ferulic/p-coumaric ~0.606) as k_brett_decarb_ferulic, applied here because YeastPOFDecarboxylation models the SAME cinnamate/ferulic-acid decarboxylase (Pad1/Fdc1) as BrettDecarboxylation"
    conditions: "POF+ S. cerevisiae in wine during active fermentation; specific decarboxylase activity on ferulic acid scaling the fermentative flux, the ferulic-branch analogue of k_pof_decarb"
    notes: "Read by YeastPOFDecarboxylation's ferulic branch (decision D-55). VALUE = k_pof_decarb * 0.606 (the sourced ratio, reused from the Brett branch since it is the same enzyme). K_hydroxycinnamic_ferulic (defined in the Brett section above) is shared between both Processes, exactly as K_hydroxycinnamic already is."
