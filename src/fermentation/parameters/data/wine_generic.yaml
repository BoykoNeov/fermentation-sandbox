# Generic wine-yeast kinetic parameters — PLACEHOLDERS.
#
# These exist to exercise the parameter schema and the loader. The *values* are
# order-of-magnitude placeholders, NOT sourced measurements, and are tagged
# accordingly (tier: speculative, source: "author estimate"). Milestone 1's
# parameter-sourcing task replaces each with a literature value carrying a real
# DOI and the conditions it was measured under, and re-tags it (typically
# plausible or validated). See docs/plans/milestone-1-*.md.
#
# Reading list to reconcile against (handoff section 2.1):
#   Coleman et al. 2007 (10.1128/AEM.00845-07); Cramer et al. 2002;
#   Malherbe et al. 2004.

mu_max:
  value: 0.33
  unit: "1/h"
  tier: speculative
  uncertainty: { low: 0.15, high: 0.55, note: "strain- and temperature-dependent" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae, ~20 C, placeholder"
    notes: "Reconcile vs Coleman et al. 2007 nitrogen-limited model."

K_s:
  value: 5.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 25.0, note: "Monod half-saturation for sugar" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae, placeholder"
    notes: "Often poorly constrained; wide range intentional."

K_n:
  value: 0.01
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.001, high: 0.05, note: "half-saturation for YAN" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae, placeholder"
    notes: "Nitrogen limitation is the textbook stuck-ferment mechanism."

# Sugar-uptake (fermentative flux) parameters — PLACEHOLDERS. The uptake Process
# is biomass-catalysed (rate ~ q_sugar_max * X * Monod(S)), independent of growth,
# so fermentation continues at a declining rate after nitrogen runs out and the
# yeast stops dividing — this is what carries a must to dryness. Ethanol/CO2 yields
# are NOT parameters: M1 uses the theoretical Gay-Lussac split from core.chemistry
# so carbon and mass conserve exactly (decision D-8); the realised-yield parameter
# Y_ethanol_sugar below is the Tier-2 (glycerol-diversion) hook, unused in M1.

q_sugar_max:
  value: 1.0
  unit: "g/g/h"   # g sugar consumed per g biomass per hour
  tier: speculative
  uncertainty: { low: 0.3, high: 2.5, note: "specific fermentative uptake rate; strain/T-dependent" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae, ~20 C, placeholder"
    notes: "Sets fermentation speed; reconcile vs Sablayrolles and Coleman et al. 2007 max-rate data."

K_sugar_uptake:
  value: 2.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.1, high: 10.0, note: "Monod half-saturation for fermentative uptake" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae, placeholder"
    notes: "Transporter affinity is high (low K): rate holds near-max until sugar is nearly gone."

K_repression:
  value: 2.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 5.0, note: "more-preferred-sugar conc. at half catabolite repression" }
  provenance:
    source: "author estimate"
    conditions: "beer wort sequential uptake (glucose > maltose > maltotriose)"
    notes: "Smooth catabolite repression: a higher sugar is suppressed while a more-preferred one remains. Beer-only — wine has a single sugar slot, so repression never applies."

Y_ethanol_sugar:
  value: 0.47
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.46, high: 0.48, note: "realised yield below 0.511 theoretical" }
  provenance:
    source: "Gay-Lussac stoichiometry; realised yield, handoff section 2.1"
    conditions: "after biomass and glycerol diversion"
    notes: "Theoretical max 0.511 g/g; realised 0.46-0.48 is well established. UNUSED in M1: the uptake Process uses the theoretical split (core.chemistry) for exact carbon/mass closure; this realised value is deferred to the Tier-2 glycerol-diversion Process (D-8)."

ethanol_tolerance:
  value: 110.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 95.0, high: 130.0, note: "~12-16.5% ABV equivalent" }
  provenance:
    source: "author estimate"
    conditions: "generic wine strain, placeholder"
    notes: "Viability collapses past a strain-specific tolerance."

E_a_growth:
  value: 50000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 80000.0, note: "Arrhenius activation energy" }
  provenance:
    source: "author estimate"
    conditions: "placeholder for Arrhenius temperature dependence"
    notes: "Reconcile against fitted Arrhenius constants in the reading list."

# Biomass elemental composition. Empirical and shared with the (forthcoming)
# growth Process, so it lives here as the single source of truth rather than as a
# code constant — the carbon/nitrogen conservation checks take these values so a
# check can never disagree with the kinetics (decision D-8). Derived from the
# canonical dry-yeast formula CH1.8O0.5N0.2 (formula weight ~24.6 g/C-mol):
#   C fraction = 12.011 / 24.626 = 0.488;  N fraction = 0.2*14.007 / 24.626 = 0.114.

biomass_C_fraction:
  value: 0.488
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.44, high: 0.50, note: "varies with growth conditions" }
  provenance:
    source: "canonical yeast elemental formula CH1.8O0.5N0.2 (Roels 1983; Heijnen)"
    conditions: "S. cerevisiae dry cell weight, carbon mass fraction"
    notes: "Well-supported across the bioprocess literature; not yet validated against our curves."

biomass_N_fraction:
  value: 0.114
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.08, high: 0.14, note: "C:N ~4-9 depending on N status" }
  provenance:
    source: "canonical yeast elemental formula CH1.8O0.5N0.2 (Roels 1983; Heijnen)"
    conditions: "S. cerevisiae dry cell weight, nitrogen mass fraction"
    notes: "Drops under nitrogen limitation; the textbook stuck-ferment regime sits at the low end."
