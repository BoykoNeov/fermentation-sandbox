# Generic wine-yeast kinetic parameters — strain Premier Cuvee (S. cerevisiae
# var. bayanus, the Prise de Mousse / EC-1118 strain).
#
# SOURCED (Milestone 1 parameter task). The growth and fermentative-uptake
# constants and their temperature sensitivity come from the keystone wine model:
#
#   Coleman, M. C., Fish, R., & Block, D. E. (2007). "Temperature-Dependent
#   Kinetic Model for Nitrogen-Limited Wine Fermentations." Appl. Environ.
#   Microbiol. 73(18): 5875-5884. doi:10.1128/aem.00670-07.
#
# Coleman's model (their eqs 1-8) is structurally close to ours: growth is Monod
# on nitrogen (mu = mu_max*N/(K_N+N)) and fermentative uptake is Michaelis-Menten
# on sugar. Its parameters are NOT tabulated at single temperatures; they are
# regressions in T (deg C), ln(param) = a0 + a1*T (+ a2*T^2 for k'_d only)
# (Table A2; "Log" is the NATURAL log — confirmed by the paper's own statement
# that mu_max ~ 0.05/h at 11 C, matching exp(-3.92 + 0.0782*11) = 0.047). We
# evaluate each regression at T_ref = 20 C (the wine benchmark temperature). One
# Table A2 exponent is typo-corrected (k'_d a1; see that entry). See
# docs/DECISIONS.md (D-12).
#
# Conditions throughout: Premier Cuvee (Red Star), diluted Chardonnay must,
# 265-300 g/L sugar, 70-350 mg N/L, isothermal 11-35 C.

# -- Growth (Monod, nitrogen-limited) -----------------------------------------

mu_max:
  value: 0.095
  unit: "1/h"
  tier: plausible
  uncertainty: { low: 0.04, high: 0.32, note: "11 C -> 0.047/h, 35 C -> 0.31/h (factor ~6); strain/T-dependent" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must, 20 C; Table A2 regression ln(mu_max) = -3.92 + 0.0782*T(degC)"
    notes: "Evaluated at T_ref = 20 C: exp(-3.92 + 0.0782*20) = 0.095/h. Was placeholder 0.33 (that is ~37 C on this regression). Range spans the measured 11-35 C window."

K_s:
  value: 5.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 25.0, note: "Monod half-saturation for sugar in the GROWTH term" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae, placeholder"
    notes: "Coleman's growth is Monod on nitrogen ONLY (no sugar term), so the literature gives no analogue for our growth-stage sugar co-limitation guard. Kept as a speculative guard that growth cannot proceed once sugar is exhausted; high K_sugar_uptake affinity means it rarely binds. Distinct from K_sugar_uptake (the fermentative-flux constant, which IS sourced)."

K_n:
  value: 0.0088
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 0.003, high: 0.03, note: "half-saturation for YAN; Coleman Fig 5a spread ~0.005-0.03 g/L" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; Table A2 ln(K_N) = -4.73 (found temperature-independent)"
    notes: "exp(-4.73) = 0.00884 g N/L. Nitrogen limitation is the textbook stuck-ferment mechanism. Coleman report K_N as the one growth constant insensitive to T and initial conditions."

# -- Fermentative sugar uptake (Michaelis-Menten, biomass-catalysed) ----------
# Decoupled from growth (decision D-9): ferments to dryness after N runs out.
# Ethanol/CO2 yields are NOT parameters in M1 — the uptake uses the theoretical
# Gay-Lussac split (core.chemistry) so carbon and mass conserve exactly (D-8);
# Y_ethanol_sugar below is the deferred Tier-2 (glycerol-diversion) hook.

q_sugar_max:
  value: 0.85
  unit: "g/g/h"   # g sugar consumed per g biomass per hour
  tier: plausible
  uncertainty: { low: 0.4, high: 2.7, note: "11 C -> 0.43, 35 C -> 2.7 g/g/h; specific fermentative uptake, strain/T-dependent" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must, 20 C; Table A2 ln(beta_max) = -2.30 + 0.0771*T(degC), ln(Y_E/S) = -0.598"
    notes: "Our uptake rate r is SUGAR consumed; Coleman eq 5 gives dS/dt = -(beta_max/Y_E/S)*[S/(K_S+S)]*X_A, so q_sugar_max = beta_max/Y_E/S = exp(-0.758)/exp(-0.598) = 0.469/0.550 = 0.85 g/g/h. (beta_max alone is the specific ETHANOL rate, eq 4; the 'g sugar' label on their Fig 3c is the loose one, eq 5 is authoritative.) CAVEAT for tuning: M1 applies this rate to TOTAL biomass with no active/inactive split, whereas Coleman's active X_A declines late — so M1 will over-catalyse the tail; revisit when fitting curves, do not pre-compensate the value here."

K_sugar_uptake:
  value: 10.3
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 5.0, high: 15.0, note: "Michaelis-Menten constant for sugar transport" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; Table A2 ln(K_S) = 2.33 (temperature-independent)"
    notes: "exp(2.33) = 10.3 g/L; the paper rounds it to '~10 g/liter'. Was placeholder 2.0."

K_repression:
  value: 2.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 5.0, note: "more-preferred-sugar conc. at half catabolite repression" }
  provenance:
    source: "author estimate"
    conditions: "beer wort sequential uptake (glucose > maltose > maltotriose)"
    notes: "Smooth catabolite repression: a higher sugar is suppressed while a more-preferred one remains. The form matches the Gee & Ramirez repression factors K'_G/(K'_G+G) etc.; their numeric constants were not accessible. Beer-only - wine has a single sugar slot, so repression never applies (kept here so the wine and beer files share one parameter set)."

Y_ethanol_sugar:
  value: 0.47
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.46, high: 0.48, note: "realised yield below 0.511 theoretical" }
  provenance:
    source: "Gay-Lussac stoichiometry; realised yield, handoff section 2.1"
    conditions: "after biomass and glycerol diversion"
    notes: "Theoretical max 0.511 g/g; realised 0.46-0.48 is well established. NOT read directly by the uptake Process: rather than swap this lower constant in (which would destroy carbon and double-count the biomass already modelled separately), the realised yield EMERGES from the explicit byproduct diversion below (decision D-16) - Y_glycerol_sugar + Y_byproduct_sugar scale the theoretical split down, giving an emergent realised Y_E ~ 0.487 that cross-checks this 0.47 (within its 0.46-0.48 band). Kept as that documented target/cross-check. NB Coleman's fitted Y_E/S ~0.55 g/g exceeds the 0.511 theoretical maximum (a fitting/measurement artefact), so we anchor to the well-established realised 0.47 rather than their value."

# -- Realised-yield byproduct diversion (decision D-16) ------------------------
# Real ferments divert a few percent of sugar carbon away from ethanol/CO2 into
# glycerol, organic acids and higher alcohols. Rather than lower Y_ethanol_sugar
# (which would destroy carbon), the uptake Process keeps the theoretical Gay-Lussac
# split and routes the diverted carbon into the Gly/Byp state pools, carbon-balanced
# by construction (D-16). These yields are sourced from MEASURED byproduct levels
# (not back-fitted from a target ABV), so the realised Y_E (~0.487) and the wine ABV
# fall out. Both default to 0 in code (theoretical core); beer carries 0.

Y_glycerol_sugar:
  value: 0.035
  unit: "g/g"   # g glycerol / g sugar consumed
  tier: plausible
  uncertainty: { low: 0.02, high: 0.05, note: "spans the 4-10 g/L dry-wine glycerol range at ~245 g/L fermentable sugar" }
  provenance:
    source: "UC Davis Waterhouse Lab 'Glycerol' (whats-in-wine); Scanes et al. 1998; Ribereau-Gayon et al., Handbook of Enology"
    conditions: "S. cerevisiae dry wine; glycerol as a fraction of sugar fermented"
    notes: "Dry wine glycerol is 4-10 g/L (Ribereau-Gayon; usual 4-9 g/L), formed at ~1:10 of the ethanol. At our ~245 g/L fermentable sugar that is Y_gly ~ 0.016-0.041 g/g; we take 0.035 (-> ~8.6 g/L, mid-range). The MAGNITUDE is well-corroborated (multiple sources, narrow range), hence plausible; the constant-fraction FORM is a simplification (glycerol is front-loaded with growth in reality, not a fixed share of every gram), noted as the speculative aspect. Booked into the Gly pool; carbon-accounted as glycerol (C3H8O3)."

Y_byproduct_sugar:
  value: 0.012
  unit: "g/g"   # g minor byproducts (succinic-equivalent) / g sugar consumed
  tier: speculative
  uncertainty: { low: 0.007, high: 0.018, note: "organic acids + polyols only (succinic + acetic + 2,3-butanediol), ~1.7-4.5 g/L; higher alcohols now in the fusels pool" }
  provenance:
    source: "author estimate lumping measured wine organic acids/polyols (succinic 0.5-1.5, acetic 0.3-0.6, 2,3-butanediol 0.5-1.5 g/L); per-g yields e.g. succinic ~0.005, acetic ~0.002 g/g"
    conditions: "S. cerevisiae dry wine; minor non-glycerol byproducts EXCLUDING higher alcohols, carbon-accounted as succinic acid (C4H6O4)"
    notes: "Glycerol is the dominant byproduct; this lump captures the rest of the ORGANIC ACIDS / POLYOLS (succinic, acetic, 2,3-butanediol), ~1.7-4.5 g/L -> Y ~ 0.007-0.018 g/g; we take 0.012 (-> ~2.9 g/L). DECISION D-19 RE-ANCHOR: was 0.014 and lumped higher alcohols too, but higher alcohols (~0.15-0.5 g/L, ~0.0017 g/g) now have their own carbon-routed `fusels` pool (booked as isoamyl alcohol), so they are carved OUT of Byp here to avoid double-counting that carbon in total_carbon - the reduction is exactly that higher-alcohol share. SPECULATIVE: still a lump of several species with a single representative carbon fraction (succinic acid), not a measured single quantity. Booked into the Byp pool. Together with Y_glycerol_sugar this gives an emergent realised Y_E ~ 0.486, consistent with the literature 0.46-0.48 (the carve-out plus the trace fusel/ester sugar draw nearly cancel, so ABV is essentially unchanged)."

must_fermentable_fraction:
  value: 0.93
  unit: "g/g"   # g fermentable hexose / g Brix-measured dissolved solids
  tier: plausible
  uncertainty: { low: 0.90, high: 0.95, note: "glucose+fructose share of ripe-must soluble solids" }
  provenance:
    source: "Ribereau-Gayon et al. 2006, Handbook of Enology (grape must composition)"
    conditions: "ripe Vitis vinifera must; fraction of refractometric soluble solids that is fermentable hexose"
    notes: "Brix measures TOTAL dissolved solids as sucrose-equivalent, but in ripe must glucose+fructose are ~90-95% of the soluble solids (the rest is organic acids, minerals, phenolics - not fermentable). brix_to_sugar_gpl therefore OVERSTATES fermentable sugar; this fraction corrects it at the compile boundary (decision D-16): fermentable S0 = brix_to_sugar_gpl(brix) * 0.93. A MUST-COMPOSITION constant, not a yeast-strain kinetic constant - it lives in this file for now but would need re-homing if a second wine strain file is added (it would duplicate). Without it, a 24 Brix must reads 263.8 g/L hexose (ABV ~15.7% even at realised yield); with it, ~245 g/L -> ABV ~14.9%, the realistic potential alcohol of 24 Brix."

# -- Ethanol inhibition (Luong wall on the uptake flux, decision D-10) ---------

ethanol_tolerance:
  value: 142.0
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 120.0, high: 150.0, note: "~15-19% ABV equivalent" }
  provenance:
    source: "Lallemand Lalvin EC-1118 / Premier Cuvee technical data sheet (alcohol tolerance 18% v/v)"
    conditions: "S. cerevisiae var. bayanus (Prise de Mousse), the strain Coleman 2007 used"
    notes: "18% v/v * 0.789 g/mL = 142 g/L. Read by EthanolInhibition as the wall E_max in f = (1 - E/E_max)^n. CAVEAT on tier: the VALUE is the strain's well-corroborated max-ABV spec (the same strain Coleman fitted), and the semantics line up (max ABV achievable ~ where rate->0 = E_max); but the Luong-wall FORM is our modelling choice, not Coleman's (they instead use an ethanol-driven death term k_d = k'_d*E). A 24 Brix must makes ~135 g/L ethanol at dryness, so this tolerance lets the strain finish - consistent with reality and NOT reverse-engineered from the benchmark."

ethanol_inhibition_exponent:
  value: 2.0
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 1.0, high: 3.0, note: "Levenspiel/Luong toxic-power exponent" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae; Levenspiel 1980 / Luong 1985 inhibition form"
    notes: "Exponent n in f = (1 - E/E_max)^n applied to the fermentative uptake flux. n=1 is the raw linear (Ghose-Tyagi) form with a derivative kink at E_max; de Andres-Toro et al. 1998 use exactly this n=1 wall (f = 1 - E/(0.5*S0)) for beer. We keep n=2 so the touchdown is C1-smooth for the BDF solver and gives a 'tolerant then collapse' viability shape; the form has literature backing but the exponent itself is our numerical choice, hence speculative."

biomass_carrying_capacity:
  value: 2.5
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 2.0, high: 5.0, note: "cap must bite below the ~2.6-3.0 g/L uncapped biomass (X0 + N0/f_N) to leave residual YAN; higher = less residual" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae wine ferment; opt-in residual-nitrogen floor (decision D-30)"
    notes: "Carrying-capacity cap K in the logistic factor (1 - X/K) that BiomassCarryingCapacity multiplies onto GrowthNitrogenLimited (decision D-30). OPT-IN ONLY: the modifier is wired into the wine medium but the compile seam DISABLES it unless a scenario passes carrying_capacity_gpl, so an undosed run is byte-for-byte the validated Coleman-anchored core and this value is not read there. A residual-N floor is a deliberate DEPARTURE from Coleman 2007 (which caps nothing and strips YAN to zero at every dose - see test_coleman_reconstruction), hence speculative and off-by-default. The value 2.5 g/L was chosen in a pre-check as the cap that restores the D-29 cross-must H2S lever (~1.8x span across 80-300 mg N/L) while leaving ~0 residual at low YAN (the correct clinical picture); scenarios may override it via carrying_capacity_gpl to sweep. Form (logistic) is textbook; the value is an estimate."

# -- Amino-acid ledger (opt-in, decision D-32) --------------------------------
# The toggleable amino-acid pool that funds a fraction of biomass from assimilable
# amino acids (represented as arginine) instead of sugar+ammonium, restoring carbon/
# nitrogen honesty for the yeast that build biomass mostly from amino acids. Read by
# AminoAcidAssimilation, a carbon- and nitrogen-neutral swap (refund sugar + ammonium
# N, debit the aa pool). OPT-IN: wired into wine but disabled at the compile seam
# unless a scenario doses amino_acids_gpl, so an undosed run is byte-for-byte the core.
# Both parameters are author estimates (speculative); the swap is directional, not fit.

amino_acid_assimilation_fraction:
  value: 0.5
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.2, high: 0.8, note: "max share of biomass nitrogen sourced from amino acids at saturating aa" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae wine ferment; assimilable amino acids as a nitrogen source"
    notes: "psi in rho = psi * gate(aa) * f_N * base_dx / y_N: the maximum fraction of biomass NITROGEN sourced from the amino-acid pool when amino acids are abundant. Grape-must amino acids (excluding proline) commonly supply a large share of YAN and yeast assimilate them preferentially, so ~0.5 is a plausible mid-estimate; the value is directional (the beat is not fit to data), hence speculative. Bounded to [0,1] by construction (the swap never refunds more nitrogen than growth's draw, so no deamination branch in v1). With arginine's N-rich C:N (~1.29) vs biomass (~4.3) the carbon refund stays <= 0.30*psi of growth's sugar-carbon draw, so no value in [0,1] can create sugar (decision D-32)."

K_amino_acids:
  value: 0.1
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.05, high: 0.4, note: "Monod half-saturation for amino-acid availability; YAN scale" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae wine ferment; smooth availability gate aa/(K+aa)"
    notes: "Half-saturation in the smooth availability gate gate(aa) = aa/(K_amino_acids + aa) that ramps assimilation up from an empty pool and down to zero as amino acids are exhausted (the same smooth-Monod shape the fermentative flux uses, keeping the RHS C1 for the BDF solver). Scaled to the g/L range of assimilable nitrogen in must; an estimate, hence speculative."

# -- Yeast autolysis (opt-in, decision D-34) ----------------------------------
# The autolytic-peptide source that REFILLS the amino-acid pool from dead biomass (X_dead)
# post-AF — the second prerequisite (after the D-33 fusel re-route) the deferred MLF-with-
# growth beat needs, since the pool is empty at the MLF pitch point (D-23). YeastAutolysis is
# the first consumer of X_dead: first-order in dead biomass, it liberates the dead-cell
# nitrogen as amino acids (arginine) and routes the carbon-rich remainder to the non-
# assimilable `debris` pool (glucan) so carbon and nitrogen close separately. OPT-IN: wired
# into wine but DISABLED at the compile seam unless a scenario passes autolysis_rate_per_h
# (which also overrides k_autolysis), so an undosed wine run is byte-for-byte the validated
# core. Both parameters are author estimates (speculative); the beat is directional.

k_autolysis:
  value: 1.0e-3
  unit: "1/h"   # r = k_autolysis * arrhenius(T, E_a_autolysis) * X_dead  [g X_dead/L/h]
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 1.0e-2, note: "sur-lie autolysis timescale: 1e-3/h ~ 29 d half-life (fast end of months-long sur lie); higher = faster refill" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae wine lees; first-order autolytic release of assimilable amino acids from dead biomass (decision D-34)"
    notes: "Specific first-order rate at which dead biomass X_dead autolyses into assimilable amino acids + cell-wall debris (r = k_autolysis * f_T * X_dead). Real sur lie autolysis releases amino acids / mannoproteins over months; 1e-3/h (half-life ~29 d) puts a visible refill inside a multi-week post-AF window while staying on the slow end. OPT-IN ONLY: the YeastAutolysis Process is wired into wine but the compile seam DISABLES it unless a scenario passes autolysis_rate_per_h, which also overrides this reference so a demonstration can sweep the timescale; an undosed run does not read this value. Directional (not fit to a release curve), hence speculative."

E_a_autolysis:
  value: 60000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 40000.0, high: 90000.0, note: "enzymatic (protease/glucanase) autolysis; warmer lees clear faster. Q10 ~ 2.2 near 20 C" }
  provenance:
    source: "author estimate; generic enzymatic activation energy (warmer sur lie autolyses faster — brewing/enology consensus)"
    conditions: "S. cerevisiae wine lees; equivalent Arrhenius activation energy at T_ref = 293.15 K"
    notes: "Temperature sensitivity of autolytic amino-acid release (f_T = arrhenius(T, E_a_autolysis, T_ref)). Autolysis is driven by intracellular proteases/glucanases, so it accelerates with temperature (the reason warm lees aging clears faster) — a moderate generic enzymatic E_a ~60 kJ/mol (Q10 ~2.2). No kinetic source measures an autolysis activation energy in our form; a bounded estimate, hence speculative. DIRECTION (rises with T) is the load-bearing property; the magnitude is a banded guess."

# -- Autolytic (sur-lie reduction) H2S yield (opt-in, decision D-44) -----------
# AutolyticHydrogenSulfide (fermentation.core.kinetics.hydrogen_sulfide) feeds the SHARED h2s pool
# the sulfide dead yeast release as they self-digest — a YIELD on the SAME first-order autolysis
# flux YeastAutolysis runs: d(h2s) = y_h2s_autolysis * (k_autolysis * f_T * X_dead). It recomputes
# that producer's rate internally (the D-33 FuselAminoAcidReroute idiom) so the autolysis_rate_per_h
# opt-in — which overrides k_autolysis to sweep the sur-lie timescale (D-34) — moves peptide release
# AND sulfide release on ONE clock. THE HEADLINE (why this is the reductive-fault H2S): unlike the
# D-29 flux-linked producer, this source is first-order in X_dead (which persists post-dryness), and
# the D-42 CO2-stripping sink is flux-linked, so it gates OFF at dryness and cannot sweep this H2S —
# post-fermentation autolytic sulfide ACCUMULATES as residual, the un-stripped "reduction" that
# develops on the lees (racking/aeration/copper remediate it). OPT-IN with YeastAutolysis (both
# disabled at the compile seam unless autolysis_rate_per_h is set), wine-only. Carbon-free (h2s is on
# no ledger, D-29), so the sulfur it carries is untracked exactly as the sulfate is.
#
# MAGNITUDE — anchored on biomass sulfur content. Yeast dry biomass is ~0.1-0.4% sulfur (w/w, in
# cysteine/methionine/glutathione); if ALL of it left as H2S the ceiling would be y_max ~ 1.06 (g
# H2S/g S) * 2.5e-3 (g S/g) ~ 2.6e-3 g H2S/g biomass. Only a TRACE actually leaves as sulfide (most
# stays in released S-amino acids/peptides/GSH), so y_h2s_autolysis = 2e-5 is ~1% of that ceiling —
# for a few g/L of X_dead fully autolysed, ~tens-to-100 ug/L cumulative autolytic H2S, a clear
# reductive signal well above the ~1-2 ug/L threshold yet far below the total-S ceiling. Directional
# (not fit to a release curve) and the release fraction is a guess, hence speculative.
y_h2s_autolysis:
  value: 2.0e-5
  unit: "g/g"   # g H2S released per g dead biomass (X_dead) autolysed
  tier: speculative
  uncertainty: { low: 2.0e-6, high: 2.6e-4, note: "release fraction of biomass sulfur as H2S: 2e-6 (~0.08% of the ~2.6e-3 g H2S/g total-S ceiling) to 2.6e-4 (~10%); default 2e-5 ~ 1% of biomass S released as sulfide, the rest retained in S-amino acids/peptides/GSH" }
  provenance:
    source: "author estimate anchored on yeast biomass sulfur content (~0.1-0.4% dry weight, cysteine/methionine/glutathione; general enology/microbiology) and the reductive-fault magnitude of sur-lie H2S (~tens of ug/L; Rauhut; Swiegers et al. 2005)"
    conditions: "generic S. cerevisiae wine lees; g H2S per g dead biomass autolysed, released on the same first-order autolysis flux as the D-34 amino-acid refill"
    notes: "Read by AutolyticHydrogenSulfide as the yield on the autolysis flux (d(h2s) = y_h2s_autolysis * k_autolysis * f_T * X_dead). Ceiling y_max ~ 2.6e-3 g H2S/g biomass = ALL biomass sulfur (~2.5e-3 g S/g) leaving as H2S (1.06 g H2S/g S); the model's 2e-5 is ~1% of that ceiling — the trace released as free sulfide during self-digestion, the rest retained in released S-amino acids / peptides / glutathione (untracked). OPT-IN ONLY (disabled with YeastAutolysis unless autolysis_rate_per_h is set); an undosed run does not read this value. Directional, hence speculative."

# -- Ethanol-driven cell inactivation (the timescale brake, decision D-13) -----
# Coleman split biomass into active cells X_A and modelled an ethanol-proportional
# specific death rate (their eqs 2, 7): dX_A/dt = mu*X_A - k_d*X_A, k_d = k'_d*E.
# This cumulative loss of viable (catalytic) biomass is what sets a wine's 10-14
# day timescale; it REPLACES the instantaneous Luong wall as the validated-core
# ethanol brake (D-13). Read by EthanolInactivation, which moves mass X -> X_dead.

k_prime_d:
  value: 4.28e-5
  unit: "(g/L)^-1 h^-1"   # k_d = k'_d * E has units 1/h
  tier: plausible
  uncertainty: { low: 3.0e-5, high: 4.4e-4, note: "11 C -> 3.0e-5, 35 C -> 4.4e-4 (factor ~15, matching the paper's stated ~13x); quadratic in T" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884, Table A2"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must, 20 C; Table A2 ln(k'_d) = -9.81 - 0.108*T + 0.00478*T^2 (T in degC, QUADRATIC; a1 exponent typo-corrected - see notes)"
    notes: >-
      Evaluated at T_ref = 20 C: exp(-9.81 - 0.108*20 + 0.00478*400) = exp(-10.06)
      = 4.28e-5 (g/L)^-1 h^-1. At E=100 g/L this gives k_d = 4.3e-3/h (viable-cell
      half-life ~160 h) - the gentle tail brake that lets a 20 C ferment finish.
      Verified by reconstruction: this value reproduces Coleman's own Fig 6c
      completion at 20 C, whereas the as-printed a1 (below) stalls even their model
      at ~108 g/L residual.
      PUBLISHED-TYPO CORRECTION (a1 exponent): Table A2 prints the a1 MEAN for
      Log(k'_d) as -1.08e-3, but its printed 95% credible region is
      [-1.94e-1, -3.30e-2] (centre -1.13e-1, half-width 8.1e-2). The corrected
      -1.08e-1 sits essentially AT that centre (where a near-symmetric posterior's
      mean belongs); the as-printed -1.08e-3 lands ~1.4 half-widths beyond the upper
      bound, on the OPPOSITE side of the interval. The journal typesetting dropped
      the x10^n exponent from the a1 mean column; the true value is -1.08e-1. Three
      independent checks confirm:
      (1) -1.08e-1 reproduces the paper's stated ~13x rise in k'_d from 11->35 C
      (the as-printed -1.08e-3 gives 191x); (2) it keeps k'_d(35 C)=4.4e-4 under
      Fig 3b's 6e-4 axis (the as-printed value overshoots to 1.8e-2, ~30x off the
      plotted scale); (3) the IDENTICAL defect appears in the Log(Y_X/N) row
      (printed a1 mean -3.61 vs its CR [-4.35e-3, -2.93e-3]; corrected -3.61e-3
      reproduces Fig 4), so it is a systematic typesetting fault, not a one-off.
      k'_d is the only QUADRATIC Coleman parameter and the steepest T-dependence -
      why high temperature drives stuck fermentations. M1 is isothermal at 20 C so
      no Arrhenius modifier is attached (the quadratic does not reduce to a single
      activation energy anyway)."

# -- Arrhenius temperature dependence (per-rate, decision D-11) ----------------
# f = exp(-(E_a/R)(1/T - 1/T_ref)), normalised so the rate constant is used
# unscaled at T_ref. Coleman models temperature as a log-linear regression in T,
# not Arrhenius; we convert the local sensitivity to an equivalent activation
# energy at T_ref: matching d(ln rate)/dT gives E_a = a1 * R * T_ref^2, where a1
# is Coleman's Table A2 slope and R = 8.314462618 J/(mol K). See D-12.

E_a_growth:
  value: 55900.0
  unit: "J/mol"
  tier: plausible
  uncertainty: { low: 49000.0, high: 63000.0, note: "from Coleman a1 95% credible region 0.0698-0.0879 /degC" }
  provenance:
    source: "Derived from Coleman, Fish & Block 2007 (doi:10.1128/aem.00670-07), Table A2 ln(mu_max) slope"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; equivalent Arrhenius E_a at T_ref = 293.15 K"
    notes: "E_a = a1*R*T_ref^2 = 0.0782 * 8.314462618 * 293.15^2 = 55,900 J/mol (~Q10 2.1 near 20 C, biologically standard). Coleman's growth is slightly MORE temperature-sensitive than uptake (a1 0.0782 vs 0.0771)."

E_a_uptake:
  value: 55100.0
  unit: "J/mol"
  tier: plausible
  uncertainty: { low: 47000.0, high: 63000.0, note: "from Coleman beta_max a1 95% CR 0.0666-0.0885 /degC" }
  provenance:
    source: "Derived from Coleman, Fish & Block 2007 (doi:10.1128/aem.00670-07), Table A2 ln(beta_max) slope"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; equivalent Arrhenius E_a at T_ref = 293.15 K"
    notes: "E_a = a1*R*T_ref^2 = 0.0771 * 8.314462618 * 293.15^2 = 55,100 J/mol. A SEPARATE parameter from E_a_growth (the per-rate design lets them diverge); here they are close because Coleman's mu_max and beta_max regressions have nearly equal slopes."

T_ref:
  value: 293.15
  unit: "K"
  tier: plausible
  uncertainty: { low: 288.15, high: 298.15, note: "the temperature the rate constants are anchored to" }
  provenance:
    source: "Coleman, Fish & Block 2007 regression evaluation temperature (doi:10.1128/aem.00670-07)"
    doi: "10.1128/aem.00670-07"
    conditions: "20 C: the temperature at which mu_max and q_sugar_max are read off Coleman's T-regressions, and the wine benchmark temperature"
    notes: "Reference temperature in f = exp(-(E_a/R)(1/T - 1/T_ref)); at T = T_ref the rate constants above are used unscaled. Shared by the growth and uptake Arrhenius modifiers (D-11). 20 C is the temperature mu_max/q_sugar_max are evaluated at, so by construction the Arrhenius factor is 1 there."

# -- Biomass elemental composition (decision D-8) -----------------------------
# Empirical, shared with the growth Process and the carbon/nitrogen conservation
# checks (single source of truth). Dry-yeast formula CH1.8O0.5N0.2 (FW ~24.6):
#   C fraction = 12.011 / 24.626 = 0.488;  N fraction = 0.2*14.007 / 24.626 = 0.114.
# Corroborated by Coleman 2007: their Y_X/N ~ 9-10 g cell / g N at normal nitrogen
# implies an N fraction of ~0.10-0.11, consistent with 0.114.

biomass_C_fraction:
  value: 0.488
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.44, high: 0.50, note: "varies with growth conditions" }
  provenance:
    source: "canonical yeast elemental formula CH1.8O0.5N0.2 (Roels 1983; Heijnen)"
    conditions: "S. cerevisiae dry cell weight, carbon mass fraction"
    notes: "Well-supported across the bioprocess literature; not yet validated against our own curves."

biomass_N_fraction:
  value: 0.114
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.08, high: 0.14, note: "C:N ~4-9 depending on N status" }
  provenance:
    source: "canonical yeast elemental formula CH1.8O0.5N0.2 (Roels 1983; Heijnen)"
    conditions: "S. cerevisiae dry cell weight, nitrogen mass fraction"
    notes: "The N-REPLETE elemental reference (the regression below gives ~0.114 near 370 mg N/L). Drops under nitrogen limitation; the textbook stuck-ferment regime sits at the low end. Coleman 2007 Y_X/N ~ 9-10 g/g at normal N corroborates (1/9.5 = 0.105). For wine this static value is RECOMPUTED at compile from the Coleman Y_X/N(N_init) regression below, evaluated at the scenario's YAN (decision D-14); it is used as-is only when that regression is absent (e.g. beer)."

# -- Nitrogen-dependent biomass yield (decision D-14) -------------------------
# Coleman Fig 4 / Table A2: the cell-mass-per-nitrogen yield Y_X/N is NOT a
# constant. It rises sharply as initial YAN falls because nitrogen-starved cells
# are elementally nitrogen-poorer, so each gram of N builds more dry mass. Coleman
# regress the natural log of Y_X/N linearly on the INITIAL nitrogen (mg N/L), not
# on temperature:
#     ln(Y_X/N [g cell / g N]) = a0 + a1 * N_init(mg/L)
# The compile seam evaluates this at the scenario's YAN and sets
#     biomass_N_fraction = 1 / Y_X/N
# (in our model all assimilated nitrogen enters biomass, so Y_X/N = 1/f_N
# identically). The nitrogen atom balance stays exact because the SAME f_N feeds
# the growth Process and the total_nitrogen conservation check. This regression
# cannot be pre-baked into a single value the way the temperature regressions are
# (T_ref is fixed at 20 C; the nitrogen evaluation point is scenario-specific), so
# it is the one parameter computed at the compile boundary - see docs/DECISIONS.md
# (D-14). Without this, a nitrogen-limited must builds too little biomass and our
# wine model STICKS where Coleman's finishes (the D-13 "uptake-speed gap" was a
# misdiagnosis: at ample N our model already matches Coleman to ~10%).

biomass_N_yield_log_intercept:
  value: 3.50
  unit: "dimensionless"   # a0 in ln(Y_X/N [g cell / g N]) = a0 + a1*N_init(mg/L)
  tier: plausible
  uncertainty: { low: 3.31, high: 3.70, note: "Table A2 Log(Y_X/N) a0 5%-95% credible region" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884, Table A2 + Fig 4"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; intercept of the ln(Y_X/N) regression on initial nitrogen"
    notes: "exp(3.50) = 33.1 g cell/g N is the (unphysical) zero-nitrogen extrapolation; the slope below pulls it down across the real 70-350 mg N/L range. Checks: at 330 mg N/L (Coleman normal-N) Y_X/N = exp(3.50 - 3.61e-3*330) = 10.1 g/g; at 80 mg N/L (low-N) = 24.8 g/g - both match Fig 4."

biomass_N_yield_log_slope:
  value: -3.61e-3
  unit: "(mg N/L)^-1"
  tier: plausible
  uncertainty: { low: -4.35e-3, high: -2.93e-3, note: "Table A2 Log(Y_X/N) a1 5%-95% CR; typo-corrected exponent" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884, Table A2 + Fig 4"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; slope of the ln(Y_X/N) regression on initial nitrogen (mg/L)"
    notes: >-
      PUBLISHED-TYPO CORRECTION - the IDENTICAL defect already established for k'_d
      (decision D-13). Table A2 prints the a1 mean for Log(Y_X/N) as -3.61, but its
      95% credible region is [-4.35e-3, -2.93e-3]; -3.61 lies ~3 orders of magnitude
      outside it. The journal typesetting dropped the x10^n exponent from the mean
      column, so the true value is -3.61e-3 (it sits at the centre of the CR and
      reproduces Fig 4 at both 80 mg/L -> 24.8 g/g and 330 mg/L -> 10.1 g/g). The
      as-printed -3.61 would collapse Y_X/N to ~0 by 2 mg N/L, which is absurd.

# -- Temperature-/metabolism-driven aroma byproducts (Milestone 2, decision D-19) --
# Esters and fusel (higher) alcohols: trace pools whose run-integrated total RISES with
# temperature (warm ferments are estery/fusel-heavy). SOURCED in the D-19 sourcing step
# (2026-06-30): the load-bearing E_a ORDERING is now backed by the literature; the rate
# MAGNITUDES (k_ester/k_fusel) and the exact E_a values remain speculative
# order-of-magnitude targets (directional validation only - handoff §3.5).
#
# THE ORDERING IS SOURCED, THE MAGNITUDE IS NOT - and the split is deliberate:
#   * de Andres-Toro et al. 1998 (Math. Comput. Simul. 48(1):65-74), the canonical beer
#     byproduct model, ties ETHYL ACETATE (an ester, and exactly our `ethyl_acetate`
#     booking species) to the yeast GROWTH rate: dC_EA/dt = Y_EA * mu_x * X_A, with BOTH
#     Y_EA AND mu_x strongly-T-increasing Arrhenius factors. Read IN-SOURCE via the open
#     CC-BY reproduction Pilarski & Gerogiorgis 2022 (Processes 10(11):2400,
#     doi:10.3390/pr10112400) Table 1, which transcribes de Andres-Toro's parameters
#     verbatim [form mu_i0 = exp(A_i + B_i/T), T in K; apparent E_a = -B_i*R]:
#       Y_EA  (ester yield)  A=89.92,  B=-26589  -> apparent E_a ~ 221 kJ/mol
#       mu_X0 (growth)       A=108.31, B=-31934  -> apparent E_a ~ 265 kJ/mol
#     So ester formation is FAR more temperature-sensitive than the fermentative flux:
#     the ORDERING (E_a_ester > E_a_uptake) is robustly supported by a real fitted model.
#   * But the de Andres-Toro MAGNITUDE does NOT transfer to our constraint. Its ester
#     rides on growth, while its own sugar-uptake term mu_S0 (A=-41.92, B=+11654) has a
#     NEGATIVE apparent E_a (~ -97 kJ/mol; sugar uptake falls with T in that fit). Its
#     internal dE_a (ester minus its flux) is ~480 kJ/mol within a model whose flux E_a
#     is negative - incommensurable with our +55,100 J/mol Coleman uptake E_a. Lifting
#     its ester E_a and differencing against Coleman would splice two incompatible
#     models. de Andres-Toro's apparent E_a's are also lumped empirical-fit artifacts
#     (growth ~265, ethanol ~10.5, sugar ~-97 kJ/mol - none physical), so we do NOT
#     transcribe their magnitude.
#   * MAGNITUDE: held GENERIC and beer-grounded at ~80 kJ/mol (a modest dE_a ~25 kJ/mol
#     above E_a_uptake), NOT split per medium. For BEER this matches the warmer-is-more
#     consensus (de Andres-Toro; ales estery when warm). For WINE the picture is more
#     complex - and the honest answer is that an E_a is the WRONG lever. Primary wine data
#     now read in-source (Mouret et al. 2015, Biochem. Eng. J. 103:211-218,
#     doi:10.1016/j.bej.2015.07.017; Rollero/Mouret et al. 2014, Appl. Microbiol.
#     Biotechnol. 99:2291-2304, doi:10.1007/s00253-014-6210-9) show wine ester SYNTHESIS
#     (total production, via gas-liquid balances) is WEAK and NON-MONOTONIC in temperature
#     (isoamyl acetate quadratic, lowest ~24 C; ethyl hexanoate ~T-INDEPENDENT). The
#     strong DECREASE of wine ester LIQUID concentration with temperature is LARGELY
#     EVAPORATION ("Evaporation largely accounted for the effect of temperature on the
#     accumulation of esters in liquid" - Rollero 2014) - a gas-stripping sink this model
#     does NOT yet simulate. So NO value of E_a_esters reproduces wine ester behaviour;
#     the missing physics is a volatilization loss term (FUTURE WORK, see D-19). For WINE
#     the "warmer => more aroma" benchmark direction is therefore carried by the FUSELS,
#     not the esters. We keep one generic E_a_esters > E_a_uptake (beer-grounded) and tell
#     this wine truth in the E_a_esters note: citing Mouret/Rollero as supporting a wine
#     ester RISE would be false provenance (they show the opposite for liquid, ~flat for
#     synthesis); a generic value with an explicit "wine differs, here's how" note is not.
#
# CARBON ACCOUNTING - option (a)/a1 (decision D-19): the ester/fusel Processes route
# their carbon OUT OF SUGAR (booked as ethyl acetate / isoamyl alcohol) and total_carbon
# weights the pools, so they are real carbon-accounted state under one rule with Gly/Byp.
# The Byp double-count is resolved by carving higher alcohols out of Y_byproduct_sugar
# above (Byp = organic acids/polyols only now). Both carbon sources are bookkeeping
# stand-ins: the Ehrlich fusel skeleton is amino-acid carbon (N carries none in the
# ledger) and an ester's ethanol moiety is already counted in E - exact on the ledger,
# approximate on the metabolism.
#
# KEY ORDERING CONSTRAINT (decision D-19): each E_a below must EXCEED E_a_uptake
# (55,100 J/mol). The run-integrated byproduct total scales as
# exp(-((E_a_byproduct - E_a_uptake)/R)(1/T - 1/T_ref)); only when the difference is
# positive does the total RISE with temperature (i.e. fall off toward colder T - the
# "cleaner when colder" half of the benchmark). This ordering is consistent with the
# de Andres-Toro ester/growth coupling above and the brewing consensus, NOT a
# first-principles claim about elementary-step activation energies.

k_ester:
  value: 4.0e-4
  unit: "1/h"   # d(esters)/dt = k_ester * X * S/(K_su+S) * f(T); per-biomass ester rate
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 1.0e-3, note: "order-of-magnitude target for total esters ~50-200 mg/L at 20 C" }
  provenance:
    source: "author estimate bounded by typical wine ester levels; structurally after de Andres-Toro et al. 1998 (ethyl acetate ~ growth flux), read via Pilarski & Gerogiorgis 2022 (doi:10.3390/pr10112400)"
    conditions: "S. cerevisiae wine; ester synthesis coupled to the biomass-catalysed sugar flux"
    notes: "Read by EsterSynthesis as the specific ester-formation rate on the fermentative-flux Monod shape (shares K_sugar_uptake). At T_ref the run-integrated total is ~ (k_ester/q_sugar_max)*S0 ~ (4e-4/0.85)*245 ~ 0.12 g/L (~120 mg/L), within the typical 50-200 mg/L range for total wine esters (ethyl acetate dominant). SPECULATIVE on magnitude: de Andres-Toro forms ethyl acetate as Y_EA*mu_x*X_A (a different coupling and unit system from our flux-coupled k_ester), so it gives no directly-transferable rate constant - we keep an order-of-magnitude target landing the trace in the right band, not a sourced fit. The wine aroma model Mouret 2015 BEJ (doi:10.1016/j.bej.2015.07.017) is now read, but it parameterises aroma as two-phase production YIELDS from sugar, linear in T and N0 (not a per-flux Arrhenius rate), so it too yields no constant transferable to our k_ester form."

E_a_esters:
  value: 55100.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 40000.0, high: 70000.0, note: "WINE: set ~ E_a_uptake (55,100) so run-integrated synthesis is ~T-INDEPENDENT - the Arrhenius representation of Mouret's flat/weak wine ester production. Held BELOW the stripping sensitivity (E_a_uptake + dH_ester_volatil ~ 100k) so the sink makes LIQUID esters fall with T. Contrast beer's ~200k" }
  provenance:
    source: "WINE-specific, sourced from primary wine data: Mouret 2015 (doi:10.1016/j.bej.2015.07.017) + Rollero/Mouret 2014 (doi:10.1007/s00253-014-6210-9) - wine ester SYNTHESIS (total production) is WEAK and NON-MONOTONIC in temperature (i.e. ~flat over the ferment)"
    conditions: "S. cerevisiae wine; equivalent Arrhenius activation energy at T_ref = 293.15 K"
    notes: "D-21 REVISION (was a generic beer-grounded 80,000 under D-19): the wine/beer ester direction lives HERE, in synthesis, not in the gas-stripping sink (medium-independent once sourced - see dH_ester_volatil). MAPPING (principled, not a coincidence): run-integrated synthesis scales as arrh(E_a_esters)/arrh(E_a_uptake) (the bare-flux integral to dryness is fixed by total sugar), so it is ~T-INDEPENDENT exactly when E_a_esters ~ E_a_uptake. Mouret 2015 reports wine ester synthesis (TOTAL production) is WEAK / non-monotonic in T (isoamyl acetate quadratic, lowest ~24 C; ethyl hexanoate ~T-independent) - so we set E_a_esters ~ E_a_uptake (55,100). The physical gas-stripping sink (sensitivity E_a_uptake + dH_ester_volatil ~ 100 kJ/mol) is then STEEPER than synthesis, so it OUTRUNS synthesis on the LIQUID and wine liquid esters FALL with T (Rollero 2014 evaporation inversion), while total production stays ~flat and the stripped fraction (esters_gas) RISES with T - WITHOUT any fudged stripping E_a (the D-20 approach, retired). The warmer=>more-aroma direction for wine is carried by the FUSELS. SPECULATIVE magnitude (the flat-production direction is sourced; the exact value is not). Verified empirically (14/20/25 C): wine liquid esters fall ~73/61/50 mg/L, total ~flat 114 mg/L, gas rises 41->64."

k_fusel:
  value: 2.5e-3
  unit: "1/h"   # d(fusels)/dt = k_fusel * X * S/(K_su+S) * N/(K_n+N) * f(T)
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 1.0e-2, note: "order-of-magnitude target; trace total fusels (our run ~0.05-0.15 g/L), low end of the 150-400 mg/L wine higher-alcohol range" }
  provenance:
    source: "author estimate bounded by typical wine higher-alcohol levels; N-gate structure corroborated by Mouret 2015 (doi:10.1016/j.bej.2015.07.017) + Rollero/Mouret 2014 (doi:10.1007/s00253-014-6210-9)"
    conditions: "S. cerevisiae wine; Ehrlich fusel formation, nitrogen-gated on the fermentative flux"
    notes: "Read by FuselAlcoholsEhrlich. Higher than k_ester because the N-gate (N/(K_n+N)) front-loads fusel formation into the nitrogen-replete early ferment and so cuts the production window short - the larger rate compensates. Total wine higher alcohols are ~150-400 mg/L; our N-gated trace lands ~0.05-0.15 g/L (low end), front-loaded as Mouret/Sablayrolles observe (higher alcohols are maximal once N is exhausted at the end of growth, ~30% sugar consumption). SPECULATIVE order-of-magnitude target - the WEAKEST-sourced k of the four: no kinetic model of OUR per-flux form exists (de Andres-Toro has no fusel term; Mouret's is a yield-from-sugar form). CORROBORATION (D-19 sourcing step): Mouret 2015 + Rollero 2014 confirm higher-alcohol synthesis is OPTIMAL at ~200-300 mg N/L and NON-MONOTONIC in nitrogen - exactly the non-monotonic-N behaviour our FuselAlcoholsEhrlich knowingly simplifies to a single monotone branch (the documented reason that Process stays speculative)."

E_a_fusels:
  value: 70000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 60000.0, high: 250000.0, note: "all > E_a_uptake (55,100); below E_a_esters as the ester/fusel ratio rises with T" }
  provenance:
    source: "Direction sourced from primary wine data (Mouret 2015, doi:10.1016/j.bej.2015.07.017: higher alcohols generally produced in larger amounts at higher temperature) + brewing/enology consensus (warmer => accelerated Ehrlich amino-acid conversion => more fusels). No fusel kinetic model of our form exists (de Andres-Toro has no fusel term)"
    conditions: "S. cerevisiae wine; equivalent Arrhenius activation energy at T_ref = 293.15 K"
    notes: "Sets the temperature sensitivity of Ehrlich fusel formation (Q10 ~ 2.6 near 20 C; +36% per 15 C). Held ABOVE E_a_uptake (55,100 J/mol) so total fusels rise with T (section header), and slightly BELOW E_a_esters because warmth shifts the balance toward esters (the fusel/ester ratio falls with T). This is the FUSEL half of the wine benchmark direction - and unlike the wine esters (whose warmer=>more is confounded by evaporation; see E_a_esters), the fusel direction IS supported for total production: Mouret 2015 reports higher alcohols generally rise with T (though compound-specific/non-systematic). ORDERING (> E_a_uptake) is the sourced, load-bearing constraint; the exact magnitude is speculative and banded - no kinetic source measures a fusel-formation activation energy in our form, so this is a bounded estimate, not a fit."

# -- ESTER VOLATILIZATION (PHYSICAL Henry's-law gas-stripping sink, decision D-21) -----
# EsterVolatilization strips liquid `esters` into the `esters_gas` headspace pool on the
# evolving-CO2 stream:
#   d(esters)/dt -= k_ester_volatil * X*S/(K_su+S) * f_gas(T) * f_part(T) * esters
#     f_gas(T)  = arrhenius(T, E_a_uptake)        -> the CO2 GAS FLOW (rides Arrhenius-scaled uptake)
#     f_part(T) = arrhenius(T, dH_ester_volatil)  -> the gas/liquid PARTITION (van't Hoff Henry's-law)
# So the stripping T-sensitivity is E_a_uptake + dH_ester_volatil ~ 100 kJ/mol - and CRUCIALLY
# this is PHYSICAL and MEDIUM-INDEPENDENT (Morakul et al. 2011: the partition coefficient
# depends only on composition + temperature, the same molecule in wine and beer).
#
# D-21 SUPERSEDES D-20: D-20 used a FUDGED per-medium E_a_ester_volatil (wine 130k / beer 40k)
# to invert wine while keeping beer rising. But a SOURCED Henry's-law stripping is the same
# in both media, so it CANNOT give opposite directions alone. The wine/beer direction
# therefore lives in SYNTHESIS E_a_esters (sourced per medium: wine flat ~15k / beer steep
# ~200k), and the stripping is one shared physical mechanism. dH_ester_volatil is the SOURCED
# ethyl-acetate partition enthalpy; E_a_ester_volatil (the fudge) is RETIRED.
# Verified empirically (14/20/25 C): wine liquid esters fall ~103/61/38 mg/L; beer rise.
k_ester_volatil:
  value: 5.0e-3
  unit: "L/(g*h)"   # stripping coeff: folds q_sugar_max*co2_yield*scale*(gas-volume/Henry-prefactor) into one constant
  tier: speculative
  uncertainty: { low: 1.0e-3, high: 2.0e-2, note: "order-of-magnitude target; with the physical stripping T-sensitivity it lands wine liquid esters ~50-100 mg/L (most produced ester is stripped to esters_gas, the evaporation-dominated fate Rollero reports)" }
  provenance:
    source: "author estimate (the absolute stripping efficiency / gas-volume prefactor is not separately sourced). Mechanism + loss form per Morakul et al. 2011 (Process Biochem 46:1125-1131, gas-liquid balance, L = integral of C_gas*Q_CO2 dt) and Rollero/Mouret 2014 (doi:10.1007/s00253-014-6210-9)"
    conditions: "S. cerevisiae wine; ester stripping coupled to the CO2-evolution (fermentative-flux x arrhenius(E_a_uptake)) proxy, first-order in liquid ester"
    notes: "Read by EsterVolatilization as the stripping coefficient. The T-DEPENDENCE is now physical+sourced (E_a_uptake gas flow + dH_ester_volatil partition); this constant only sets the absolute stripping MAGNITUDE (folding q_sugar_max, co2_yield, the realised-yield scale, the gas molar volume and the Henry prefactor into one number, since the bare flux shape omits them). SPECULATIVE order-of-magnitude target. Verified empirically (14/20/25 C): wine liquid esters ~103/61/38 mg/L (fall with T) as the gas pool fills."

dH_ester_volatil:
  value: 45000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 55000.0, note: "ethyl-acetate gas/liquid partition enthalpy; Q10 ~ 1.8 at 20 C - a PHYSICAL volatility value, not a fitted lever. Same in wine and beer (molecule property)" }
  provenance:
    source: "Ethyl-acetate Henry's-law solubility constant temperature dependence d(ln kH)/d(1/T) ~ 5300-5700 K (NIST Chemistry WebBook / Sander compilation, doi:10.5194/acp-15-4399-2015) => dissolution enthalpy ~ -46 kJ/mol => gas/liquid partition rises with T with effective enthalpy ~ +45 kJ/mol"
    conditions: "ethyl acetate, gas/liquid (air/water) partition; van't Hoff form anchored at T_ref = 293.15 K"
    notes: "Sets how steeply the ethyl-acetate gas/liquid partition (Henry's-law constant) rises with temperature - the PHYSICAL volatility lever that replaced D-20's fudged E_a_ester_volatil. d(ln kH)/d(1/T) ~ 5500 K (NIST/Sander) gives a dissolution enthalpy ~ -46 kJ/mol, so the air/water partition coefficient rises with T with effective enthalpy ~ +45 kJ/mol (Q10 ~ 1.8) - a real, physical Henry's-law value, NOT tuned to invert wine. MEDIUM-INDEPENDENT (a property of the molecule): the SAME value is used in beer_generic.yaml. The wine/beer direction comes from synthesis E_a_esters, not this. SIMPLIFICATION: the full Morakul 2011 partition is also ethanol-dependent (ln k_i = F1 + F2*E - (F3+F4*E)*R*(1000/T - 1000/T_ref)); we keep only the dominant temperature (van't Hoff) lever and omit the ethanol terms (the F coefficients are not openly available). SPECULATIVE tier because the simplification + the abs value transfer are not fully validated, though the enthalpy itself is sourced."

# -- MALOLACTIC FERMENTATION (Oenococcus oeni), wine-only, conversion-only (decision D-23) --
# MLF converts L-malic acid (C4, diprotic) to L-lactic acid (C3, monoprotic) + CO2,
# mole-for-mole, deacidifying the wine (pH up ~0.1-0.3). Read by
# fermentation.core.kinetics.malolactic.MalolacticConversion - the FIRST RHS consumer of
# the D-18 pH solver and the D-22 molecular-SO2 readout. The molar turnover is
#   r = k_mlf * X_mlf * [malate]/(K_mlf+[malate]) * g_pH * g_EtOH * g_SO2 * gamma(T)
# with d(malic) = -r*M_malic, d(lactic) = +r*M_lactic, d(CO2) = +r*M_CO2 (carbon AND mass
# close on the existing ledger: 134.087 = 90.078 + 44.009 g/mol, a clean decarboxylation).
#
# These describe the BACTERIUM (O. oeni), not the wine yeast strain above - they live here
# (rather than a separate file) for the same reason the ester/fusel aroma constants do: the
# wine compile loads exactly this <medium>_<strain>.yaml, beer never sees them (beer has no
# malic/lactic slots and MLF is never wired there), and the pKa set the gates need is
# already merged from acidbase.yaml. ALL SPECULATIVE: no kinetic model of this exact
# per-catalyst flux form is sourced, so k_mlf and every gate/cardinal constant are
# directional order-of-magnitude estimates (handoff-style directional validation only); the
# conversion STOICHIOMETRY and the gate DIRECTIONS are the sound part. v1 is conversion-only
# (no bacterial growth/lag) and CO-INOCULATION (bacteria from t=0); sequential/post-AF MLF
# needs the unbuilt event loop (decision D-23).

k_mlf:
  value: 1.5e-2
  unit: "mol/(g*h)"   # molar malate turnover per g/L O. oeni: r = k_mlf*X_mlf*Monod*gates*gamma(T)
  tier: speculative
  uncertainty: { low: 1.0e-3, high: 5.0e-2, note: "order-of-magnitude target: near-complete conversion of a few g/L malate within the low-ethanol co-inoculation window (~first 4 d, before AF ethanol crosses the O. oeni tolerance) at a realistic dose" }
  provenance:
    source: "author estimate bounded by practical co-inoculated MLF timescales (Ribereau-Gayon et al., Handbook of Enology Vol. 1, malolactic fermentation; Lonvaud-Funel reviews of O. oeni)"
    conditions: "S. cerevisiae/O. oeni co-inoculated wine, ~20 C; specific malolactic activity scaling the dosed (constant) X_mlf"
    notes: "Read by MalolacticConversion as the specific malolactic rate. SPECULATIVE magnitude: no kinetic model of our per-catalyst flux form (r = k_mlf*X_mlf*Monod*gates) is sourced - O. oeni MLF kinetics are usually reported as bulk malate-decline half-lives, not a per-biomass rate constant - so this is tuned, NOT fitted. EMERGENT CONSTRAINT (co-inoculation): a 24 Brix must reaches ~14% ABV (~135 g/L ethanol), which exceeds the O. oeni ethanol_tolerance_mlf (110 g/L), so the ethanol gate ARRESTS MLF once AF ethanol crosses ~110 g/L (~day 4 at 20 C). MLF must therefore largely COMPLETE in that early low-ethanol window - exactly why co-inoculation is used in practice - so k_mlf is set to give near-complete conversion of a malic-rich must within ~4 d at a realistic dose, not a slow weeks-long decline. The dose X_mlf (g/L) sets the absolute timescale linearly, so k_mlf and a realistic pitch trade off; the later MLF-growth beat replaces the constant X_mlf with a dynamic one (decision D-23)."

K_mlf:
  value: 2.5e-3
  unit: "mol/L"   # Michaelis-Menten half-saturation in MALATE (molar)
  tier: speculative
  uncertainty: { low: 1.0e-3, high: 1.5e-2, note: "malolactic-enzyme malate Km ~ 1-15 mM in the literature; low affinity-constant keeps the Monod term ~1 until malate is nearly gone" }
  provenance:
    source: "author estimate in the range of reported malolactic-enzyme (malate) Km values (~mM; e.g. O. oeni malolactic enzyme Km for L-malate of order a few mM, enology/biochemistry literature)"
    conditions: "O. oeni malolactic enzyme, L-malate; half-saturation in the conversion Monod term"
    notes: "Read by MalolacticConversion as the malate half-saturation (in mol/L, matching the [malate] the Process computes from g/L via M_malic). Deliberately LOW (high malate affinity) so [malate]/(K_mlf+[malate]) stays near 1 until malate is nearly exhausted, giving a clean near-complete conversion rather than a long substrate-starved tail. SPECULATIVE: the enzyme Km is for the isolated enzyme, not the whole-cell catalyst our X_mlf lumps, and the value is taken mid-range, not fitted."

pH_half_mlf:
  value: 3.0
  unit: "pH units"   # logistic gate g_pH = 1/(1 + 10^(pH_half_mlf - pH)); 0.5 at this pH
  tier: speculative
  uncertainty: { low: 2.8, high: 3.2, note: "O. oeni MLF strongly inhibited below ~pH 3.0, robust above ~3.2-3.5" }
  provenance:
    source: "author estimate encoding the well-established O. oeni pH dependence (Ribereau-Gayon et al., Handbook of Enology Vol. 1; Lonvaud-Funel 1999, Antonie van Leeuwenhoek 76:317-331): MLF slows sharply below pH ~3.0 and proceeds readily above ~3.3"
    conditions: "O. oeni in wine; midpoint of the smooth logistic pH gate on the conversion rate"
    notes: "Read by MalolacticConversion: g_pH = 1/(1 + 10^(pH_half_mlf - pH)) rises smoothly with pH (0.5 here, ~0.71 at pH 3.4, ~0.86 at pH 3.8). DIRECTION is well-sourced (low pH inhibits O. oeni, the textbook reason MLF can stick in acidic musts); the exact midpoint and the logistic FORM are the speculative modelling choice. The gate makes the deacidification self-reinforcing (malate->lactate raises pH -> g_pH rises), bounded by 1 and self-limited by malate depletion - the emergent coupling the D-18 keystone exists for."

ethanol_tolerance_mlf:
  value: 110.0
  unit: "g/L"   # Luong wall E_max for O. oeni: g_EtOH = max(0, 1 - E/E_max)^n
  tier: speculative
  uncertainty: { low: 95.0, high: 125.0, note: "O. oeni ~12-16% ABV tolerance (95-126 g/L); below the yeast's 142 g/L" }
  provenance:
    source: "author estimate from O. oeni ethanol-tolerance reports (~13-14% ABV typical for wine MLF strains; Ribereau-Gayon et al., Handbook of Enology Vol. 1; G-Alegria et al. 2004, FEMS Microbiol. Lett. 230:53-61)"
    conditions: "O. oeni in wine; ethanol wall on the conversion rate (Luong/Levenspiel form, mirroring EthanolInhibition)"
    notes: "Read by MalolacticConversion as E_max in g_EtOH = max(0, 1 - E/E_max)^n (n = mlf_ethanol_exponent). Set to ~14% ABV (110 g/L), BELOW the yeast ethanol_tolerance (142 g/L) - O. oeni is less ethanol-tolerant than the yeast, the reason high-alcohol musts challenge MLF. v1 is CO-INOCULATION, so ethanol is still low while malate converts and this gate is ~1 over most of the conversion; it matters mainly for late/high-ethanol musts. DIRECTION sourced (ethanol inhibits O. oeni); exact value/form speculative."

mlf_ethanol_exponent:
  value: 2.0
  unit: "dimensionless"   # Luong toxic-power exponent n in g_EtOH = (1 - E/E_max)^n
  tier: speculative
  uncertainty: { low: 1.0, high: 3.0, note: "Levenspiel/Luong toxic-power exponent; n>1 keeps the touchdown C1-smooth at E_max" }
  provenance:
    source: "author estimate; Levenspiel 1980 / Luong 1985 inhibition form, matching the yeast ethanol_inhibition_exponent choice"
    conditions: "O. oeni in wine; exponent of the ethanol wall on the conversion rate"
    notes: "Exponent n in g_EtOH = (1 - E/E_max)^n. Kept at n=2 (as for the yeast EthanolInhibition) so the rate eases to zero with no derivative kink at E_max - C1-smooth for the BDF solver. The form has literature backing (Luong); the exponent itself is a numerical choice, hence speculative."

molecular_so2_inhib_mlf:
  value: 2.0e-4
  unit: "g/L"   # decay scale of g_SO2 = exp(-[SO2]_molecular / molecular_so2_inhib_mlf)
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 5.0e-4, note: "molecular SO2 inhibitory scale ~0.1-0.5 mg/L (1e-4 - 5e-4 g/L); ~0.5-0.8 mg/L molecular strongly arrests MLF" }
  provenance:
    source: "author estimate encoding the antimicrobial action of MOLECULAR SO2 on O. oeni (Ribereau-Gayon et al., Handbook of Enology Vol. 1; the same molecular-SO2 antimicrobial basis as the D-22 readout, Usseglio-Tomasset & Bosia 1984)"
    conditions: "O. oeni in wine; exponential decay scale of the molecular-SO2 inhibition gate on the conversion rate"
    notes: "Read by MalolacticConversion: g_SO2 = exp(-[SO2]_molecular / s), where [SO2]_molecular (g/L) is partitioned from the dosed free SO2 at the SOLVED pH (D-22) - so this gate is the first RHS consumer of the molecular-SO2 readout, and rising pH (which LOWERS molecular SO2) further frees MLF. Scale ~0.2 mg/L molecular: g_SO2 ~ 0.018 at 0.8 mg/L molecular (strong arrest), ~1 when undosed. DIRECTION strongly sourced (molecular SO2 is THE antimicrobial species winemakers use to control/prevent MLF); the exact scale and exponential FORM are the speculative modelling choice."

T_min_mlf:
  value: 281.15
  unit: "K"   # cardinal minimum (8 C) of the Rosso CTMI temperature optimum gamma(T)
  tier: speculative
  uncertainty: { low: 277.15, high: 285.15, note: "O. oeni MLF effectively stops by ~4-10 C; T_min ~8 C" }
  provenance:
    source: "author estimate from O. oeni MLF cardinal temperatures (winemaking practice: MLF is slow/stalled below ~12-15 C, effectively off near ~4-8 C; Ribereau-Gayon et al., Handbook of Enology Vol. 1)"
    conditions: "O. oeni in wine; minimum cardinal temperature of the CTMI gamma(T) factor (stored in K, sourced in C)"
    notes: "Read by MalolacticConversion via cardinal_temperature_factor (Rosso et al. 1993 CTMI). 8 C. Below it gamma(T)=0 (MLF off). DIRECTION sourced (cold stalls MLF); exact cardinal speculative. CTMI uses only temperature DIFFERENCES, so K and C give identical gamma - stored in K for canonical units (D-3)."

T_opt_mlf:
  value: 296.15
  unit: "K"   # cardinal optimum (23 C) where gamma(T) = 1
  tier: speculative
  uncertainty: { low: 293.15, high: 300.15, note: "O. oeni MLF optimum ~20-25 C" }
  provenance:
    source: "author estimate from O. oeni MLF optimum reports (~20-25 C; Ribereau-Gayon et al., Handbook of Enology Vol. 1; winemaking practice runs MLF warm, ~18-22 C, often warmer to speed it)"
    conditions: "O. oeni in wine; optimum cardinal temperature of the CTMI gamma(T) factor (stored in K, sourced in C)"
    notes: "Read by MalolacticConversion via cardinal_temperature_factor. 23 C, where gamma(T)=1 (the rate constant k_mlf is read unscaled there, like the Arrhenius factor at T_ref). At the 20 C wine benchmark gamma ~0.93. The OPTIMUM (not a monotone Arrhenius) is the load-bearing scope choice of D-23: MLF DECLINES in the warm, which an Arrhenius factor cannot represent. Exact optimum speculative; the existence of an optimum ~20-25 C is well-established."

T_max_mlf:
  value: 310.15
  unit: "K"   # cardinal maximum (37 C) of the CTMI temperature optimum gamma(T)
  tier: speculative
  uncertainty: { low: 306.15, high: 315.15, note: "O. oeni growth ceases by ~37-45 C; T_max ~37 C for MLF activity" }
  provenance:
    source: "author estimate from O. oeni upper cardinal temperature (growth ceases ~40-45 C; MLF activity falls off well before that; Ribereau-Gayon et al., Handbook of Enology Vol. 1)"
    conditions: "O. oeni in wine; maximum cardinal temperature of the CTMI gamma(T) factor (stored in K, sourced in C)"
    notes: "Read by MalolacticConversion via cardinal_temperature_factor. 37 C. Above it gamma(T)=0. This is the cardinal that makes the warm-side DECLINE explicit (the qualitative correctness a monotone Arrhenius lacks). Far above any normal wine ferment, so it shapes only the high-T tail; exact value speculative, direction (a finite upper limit exists) sound."

# -- MALOLACTIC GROWTH (Oenococcus oeni biomass, wine-only, the deferred growth beat, decision D-23) --
# MalolacticGrowth (fermentation.core.kinetics.malolactic) makes the X_mlf catalyst DYNAMIC:
#   dX_mlf/dt = mu_max_mlf * X_mlf * aa/(K_aa_mlf+aa) * S/(K_s+S) * g_pH*g_EtOH*g_SO2*gamma(T)
# Because MalolacticConversion is linear in X_mlf, growth makes deacidification ACCELERATE
# autocatalytically as bacteria multiply. Nitrogen-anchored: new bacterial biomass takes its
# nitrogen from the amino_acids pool (arginine; D-32/D-34) and its carbon shortfall from sugar
# (the mirror of yeast growth) - carbon and nitrogen close on the existing weighted ledger, with
# X_mlf now weighted at the biomass fractions (bacterial ~ yeast composition, a v1 simplification).
# Reuses K_s (sugar Monod) and the biomass_C/N_fraction composition above, and the shared MLF
# environmental gate. BOTH SPECULATIVE (author estimates; no per-catalyst bacterial growth law is
# sourced, and the bacterial-composition ~ yeast assumption is a lump). v1 is CO-INOCULATION only
# (the ethanol wall blocks a post-AF pitch), gated at compile on mlf_pitch_gpl>0 AND amino_acids_gpl>0.

mu_max_mlf:
  value: 5.0e-2
  unit: "1/h"   # O. oeni max specific growth rate: dX_mlf/dt = mu_max_mlf*X_mlf*Monod(aa)*Monod(S)*gates
  tier: speculative
  uncertainty: { low: 2.0e-2, high: 1.0e-1, note: "O. oeni doubling time in wine ~12-35 h under favourable co-inoculation conditions ⇒ mu_max ~0.02-0.06/h; wider band for the whole-cell lumped rate" }
  provenance:
    source: "author estimate from O. oeni growth timescales in wine (doubling times of order 0.5-1.5 d in co-inoculation; Ribereau-Gayon et al., Handbook of Enology Vol. 1; Lonvaud-Funel 1999, Antonie van Leeuwenhoek 76:317-331)"
    conditions: "S. cerevisiae/O. oeni co-inoculated wine, ~20 C, amino-acid- and sugar-replete early window; maximum specific growth rate scaling the amino-acid- and sugar-gated bacterial growth law"
    notes: "Read by MalolacticGrowth as the bacterial mu_max. SPECULATIVE: no kinetic model of our amino-acid-anchored per-catalyst growth form is sourced - O. oeni growth is usually reported as bulk OD/CFU timescales, not this rate constant - so it is tuned to give a realistic several-fold X_mlf increase within the low-ethanol co-inoculation window (the regime the D-23 conversion beat established as the only viable MLF window), NOT fitted. The growth is gated identically to conversion (same environmental gate) plus Monod terms on the amino-acid fuel and on sugar (the fermentable energy source O. oeni co-metabolises), so it self-limits to the sugar-present, low-ethanol early window."

K_aa_mlf:
  value: 5.0e-2
  unit: "g/L"   # amino-acid half-saturation in the bacterial growth Monod term aa/(K_aa_mlf+aa)
  tier: speculative
  uncertainty: { low: 2.0e-2, high: 2.0e-1, note: "half-saturation on the assimilable amino-acid pool; scaled to the g/L range of must amino acids, same order as K_amino_acids (yeast swap)" }
  provenance:
    source: "author estimate, same rationale as K_amino_acids (the yeast amino-acid swap half-saturation): scaled to the g/L range of assimilable amino acids in must"
    conditions: "O. oeni in wine; half-saturation in the smooth availability gate aa/(K_aa_mlf+aa) on the bacterial growth rate"
    notes: "Read by MalolacticGrowth: gate(aa) = aa/(K_aa_mlf+aa) ramps bacterial growth up from an empty amino-acid pool and down to zero as amino acids are exhausted (the same smooth-Monod shape the yeast swap and fermentative flux use, keeping the RHS C1 for the BDF solver). A SEPARATE parameter from the yeast K_amino_acids (the per-organism design lets them diverge), taken slightly lower here as O. oeni is a fastidious amino-acid auxotroph; an estimate, hence speculative."

# -- MALOLACTIC DEATH (Oenococcus oeni SO2-driven kill, wine-only, decision D-39) --
# MalolacticDeath (fermentation.core.kinetics.malolactic) is the counterpart of MalolacticGrowth
# that completes the MLF arc: it moves viable X_mlf into the non-viable X_mlf_dead pool when the
# wine is SULFITED, so bacteria DECLINE and the O. oeni activities that scale with X_mlf wind down.
#   r_death = k_death_mlf * X_mlf * (1 - g_SO2) * arrhenius(T, E_a_death_mlf, T_ref)
#   g_SO2   = exp(-[SO2]_molecular / molecular_so2_inhib_mlf)   (the SAME term the conversion gate uses)
# The driver is 1 - g_SO2 - MOLECULAR SO2 ALONE, NOT the full toxicity gate. Death is EXACTLY 0
# without SO2 (g_SO2 = 1) and rises toward its Arrhenius ceiling as molecular SO2 accumulates.
# Temperature enters through the Arrhenius factor (warm accelerates the kill, cold slows it - the
# autolysis shape), NOT the cardinal gamma(T) (which -> 0 in the cold and would spuriously make cold
# KILL bacteria; cold in fact PRESERVES them). The transfer X_mlf -> X_mlf_dead is CARBON- AND
# NITROGEN-NEUTRAL (both pools weighted at the biomass fractions since D-38, the yeast X -> X_dead
# precedent D-13), so it adds no conservation code.
# WHY SO2 ALONE (the D-39 crux, empirically settled): an earlier draft used 1 - TOXICITY
# (pH*ethanol*SO2). A probe killed it - the Luong ethanol wall already drives 1-toxicity to ~0.92 at
# ordinary post-AF ethanol (~75 g/L), so death was near-maximal FROM ETHANOL ALONE (bacteria gone in
# ~1 week), when in reality O. oeni PERSISTS for weeks-to-months in dry wine and is cleared
# deliberately by SO2 or racking. Ethanol's wall is a "can't grow" signal, not a "dying" one; no
# power transform of 0.92 is both ~0 (slow baseline) and clearly below the SO2-elevated value, so the
# driver must contain NO ethanol term. Co-inoculation-vs-post-AF dominance now rests entirely on the
# GROWTH gate's g_EtOH (high-ABV post-AF -> gamma*g_EtOH ~ 0 -> no growth); a high-ABV post-AF pitch
# simply sits INERT (no growth, no conversion, no death until sulfited).
# SCOPE (D-39): THIS param is the SO2-driven ACUTE kill only - death is EXACTLY 0 without SO2, so it
# stays unconfounded by ethanol and keeps k_death_mlf at its true SO2-kill magnitude. The slow
# ethanol/age decline of O. oeni over weeks-months - which v1 deferred, letting unsulfited bacteria
# persist forever - is now supplied by the SEPARATE k_senescence_mlf / MalolacticSenescence baseline
# (MLF v2, D-41 below), so this SO2 kill is unchanged. Total mortality is r_sen + r_death; a
# stabilizing SO2 dose still dominates (crash in ~1-3 d over the ~2-month benign half-life). Keeping
# them separate also keeps the D-31 SO2/rack lever UNCONFOUNDED (a deliberate action still removes
# viable bacteria fast, distinct from the slow baseline).
# BOTH PARAMS SPECULATIVE (author estimates; no per-catalyst mortality law of this form is sourced).
# Pitch-gated at compile (mlf_pitch_gpl>0), NOT amino-acid-gated - bacteria die whether or not they
# were growing.

k_death_mlf:
  value: 5.0e-2
  unit: "1/h"   # O. oeni specific death rate at FULL SO2 kill: r_death = k_death_mlf*X_mlf*(1-g_SO2)*f(T)
  tier: speculative
  uncertainty: { low: 2.0e-2, high: 1.0e-1, note: "specific mortality at a full molecular-SO2 kill ⇒ a bacterial half-life of ~7-35 h; a stabilizing SO2 addition (~30-50 mg/L free, ~0.6-1.0 mg/L molecular) crashes the population over ~1-3 d, while an unsulfited wine sees ZERO death (bacteria persist on lees)" }
  provenance:
    source: "author estimate; O. oeni is cleared from wine by SO2 addition within days - the standard tool to arrest MLF and stabilize a wine (Ribereau-Gayon et al., Handbook of Enology Vol. 1, malolactic fermentation & SO2 management; Bartowsky & Henschke 2004, Int. J. Food Microbiol. 96:235-252, on removing O. oeni to preserve/lock diacetyl)"
    conditions: "O. oeni in wine, ~20 C; specific death rate at a full molecular-SO2 kill (1 - g_SO2 = 1) scaling the viable X_mlf, read unscaled at T_ref by the Arrhenius factor"
    notes: "Read by MalolacticDeath as the death magnitude at a full SO2 kill. VALUE 0.05/h ⇒ a full-kill half-life of ~14 h (ln2/0.05); at a stabilizing dose (~40 mg/L free ⇒ ~0.8 mg/L molecular ⇒ g_SO2 ~ 0.02 ⇒ 1-g_SO2 ~ 0.98) the population drops ~90% in ~2 d - the physically-reasonable SO2-kill timescale, chosen on that physics, NOT to clear a test threshold. RE-TUNED UP from the 0.02/h of the abandoned (1-toxicity) draft: because death is now EXACTLY 0 without SO2, k no longer couples to the (unsulfited) early-pitch conversion, so it can take its true SO2-kill value. SPECULATIVE: no per-catalyst kinetic model of O. oeni SO2 mortality is sourced (viability is reported as CFU decline curves, not this rate constant), so it is tuned - NOT fitted - so a stabilizing SO2 dose crashes X_mlf within ~1-3 d while an unsulfited run leaves it untouched. DIRECTION is sourced (SO2 kills O. oeni; the basis of using SO2 to arrest MLF and lock diacetyl); the magnitude is the speculative modelling choice. SIMPLIFICATION: reuses molecular_so2_inhib_mlf as the kill scale (arrest-scale = kill-scale, bacteriostatic ~ bacteriocidal); a separate molecular_so2_death_scale is the v2 refinement. NOTE: killing the bacteria removes BOTH the diacetyl sink (reduction) AND source (citrate co-metabolism), so a single-run 'SO2 locks in diacetyl' demonstration is confounded in this model - the death MECHANISM is validated on X_mlf directly. A benign-environment baseline mortality (death without SO2) is now supplied by MalolacticSenescence (MLF v2, D-41) as a SEPARATE Process, so this SO2 kill stays exactly as built here (death is still identically 0 without SO2)."

E_a_death_mlf:
  value: 60000.0
  unit: "J/mol"   # Arrhenius activation energy for the temperature dependence of bacterial death
  tier: speculative
  uncertainty: { low: 40000.0, high: 90000.0, note: "generic biological/enzymatic-process activation energy (Q10 ~2 at 20 C); brackets the ~40-90 kJ/mol range the model's other enzymatic E_a (E_a_reduction 45k, E_a_autolysis 60k, E_a_decarb 90k) span" }
  provenance:
    source: "author estimate; no sourced Arrhenius fit for O. oeni death rate - taken equal to E_a_autolysis (60 kJ/mol), a generic enzymatic/biological-process activation energy (Q10 ~2.3 at 20 C), consistent with warm accelerating and cold slowing cell mortality"
    conditions: "O. oeni in wine; temperature factor arrhenius(T, E_a_death_mlf, T_ref) on the death rate, = 1 at T_ref (20 C)"
    notes: "Read by MalolacticDeath. Gives the temperature dependence of bacterial mortality so that warm lees clear/kill the culture faster and cold PRESERVES it (dormancy) - the physically correct direction the cardinal gamma(T) cannot supply for death (gamma(T) -> 0 in the cold would make cold kill, the opposite of reality). SPECULATIVE: the magnitude is an estimate equal to the autolysis E_a; the DIRECTION (warm accelerates, cold preserves) is sound. Uses the shared T_ref (20 C) so the factor is 1 at the wine benchmark temperature, like every other Arrhenius rate. ALSO read by MalolacticSenescence (D-41), which reuses this same warm-accelerates/cold-preserves Arrhenius shape for the benign baseline decline (no new temperature param)."

# -- MALOLACTIC SENESCENCE (Oenococcus oeni benign baseline mortality, wine-only, MLF v2, decision D-41) --
# MalolacticSenescence (fermentation.core.kinetics.malolactic) LIFTS the owned v1 tradeoff of
# MalolacticDeath (D-39): "without SO2, bacteria NEVER die." In reality O. oeni does not persist
# forever in an untreated dry wine - over WEEKS-TO-MONTHS the population slowly declines from age,
# ethanol stress, low pH and nutrient exhaustion even with NO SO2 and NO rack. This is that decline:
#   r_sen = k_senescence_mlf * X_mlf * arrhenius(T, E_a_death_mlf, T_ref)
# a small, always-on (when pitched) baseline first-order mortality moving viable X_mlf into the SAME
# non-viable X_mlf_dead pool the SO2 kill uses (a carbon/nitrogen-neutral transfer, both pools
# weighted at the biomass fractions since D-38/D-39 - no new conservation code). Total O. oeni
# mortality is now r_sen + r_death (benign baseline + SO2-induced), built as SEPARATE isolable
# Processes so the D-39 SO2 lever stays byte-for-byte and this baseline toggles independently.
# ENVIRONMENT-FREE (no pH/ethanol/SO2 term) - the load-bearing D-39 crux reused: ANY ethanol term
# reintroduces the wipeout bug (the Luong wall drives 1-g_EtOH to ~0.92 at ordinary post-AF ethanol,
# which coupled to a mortality rate kills the culture in ~1 week, not the ~2 months reality shows).
# So "benign" MEANS environment-independent; the ethanol/starvation MODULATION of the baseline stays
# a deferred refinement. ARRHENIUS temperature (NOT the cardinal gamma(T)): warm accelerates the
# decline, cold slows it to dormancy - gamma(T) peaks at T_opt_mlf (23 C) and vanishes past T_max_mlf,
# which would make senescence MAXIMAL at the growth optimum and switch OFF in the warm, exactly
# backwards. Pitch-gated at compile (mlf_pitch_gpl>0), NOT amino-acid-gated (bacteria age whether or
# not they grew). Reads no SO2/pH => NO brentq (cheaper than the SO2 kill). SUPERSEDES the v1
# "no-SO2 pitched run is byte-for-byte inert" property: a pitched unsulfited run now shows a slow
# monotone X_mlf decline - the point of v2.

k_senescence_mlf:
  value: 5.0e-4
  unit: "1/h"   # O. oeni benign baseline specific death rate: r_sen = k_senescence_mlf*X_mlf*arrhenius(T)
  tier: speculative
  uncertainty: { low: 3.0e-4, high: 1.5e-3, note: "benign-environment specific mortality => an O. oeni half-life of ~3 weeks (high) to ~3 months (low) in an untreated dry wine at 20 C; ~100x below the full-SO2-kill k_death_mlf (0.05/h), so a stabilizing SO2 dose still dominates the trajectory" }
  provenance:
    source: "author estimate; O. oeni viability declines over weeks-to-months in dry, unsulfited wine as age/ethanol/low-pH/nutrient stress accumulate (Ribereau-Gayon et al., Handbook of Enology Vol. 1, on O. oeni persistence and the need for SO2 to reliably clear it; Bartowsky & Henschke 2004, Int. J. Food Microbiol. 96:235-252). No per-catalyst baseline-mortality law of this form is sourced - viability is reported as CFU decline curves, not this rate constant - so the value is a physically-anchored estimate, hence speculative."
    conditions: "O. oeni in wine, ~20 C; benign-environment (no SO2) specific death rate scaling the viable X_mlf, read unscaled at T_ref by the shared Arrhenius factor arrhenius(T, E_a_death_mlf, T_ref)"
    notes: "Read by MalolacticSenescence (MLF v2, D-41) as the benign baseline mortality magnitude. VALUE 5e-4/h => a half-life of ~58 d (ln2/5e-4 ~1386 h ~8.2 weeks) at T_ref - so a pitched, unsulfited wine loses ~half its O. oeni over ~2 months, the WEEKS-TO-MONTHS decline D-39 deferred. Chosen on that physics, NOT to clear a threshold. ~100x below k_death_mlf (0.05/h) so it is negligible over the ~4-day co-inoculation MLF window (over 96 h, ~5% X_mlf loss - it does NOT perturb the D-23 deacidification control-difference or the growth beat's several-fold X_mlf rise) and a stabilizing SO2 dose still crashes the population in ~1-3 d on top of it. ENVIRONMENT-FREE by design (the D-39 crux): NO ethanol term - the Luong wall would drive a ~1-week wipeout, the exact bug that deferred this to v2 - so k_senescence_mlf is a constant, decoupled from ethanol/pH/SO2. SIMPLIFICATION (owned, deferred): the real decline IS ethanol/starvation-driven; modulating this baseline by ethanol or the amino-acid pool is a further v2 refinement, left out so the baseline cannot reintroduce the wipeout. DIRECTION is sourced (unsulfited O. oeni eventually dies; SO2 is needed to clear it reliably); the magnitude is the speculative modelling choice."

# -- MLF-DERIVED DIACETYL (Oenococcus oeni citrate co-metabolism), wine-only (decision D-31) --
# The real coupling MLF unlocks: alongside malate, O. oeni co-metabolises CITRIC ACID and
# overflows alpha-acetolactate, which decarboxylates to DIACETYL (the buttery note post-MLF
# wines carry). Read by two Processes in fermentation.core.kinetics.malolactic:
#   MalolacticCitrateMetabolism: r_c = k_citrate * X_mlf * [citrate]/(K_citrate+[citrate]) * gate
#     with d(citrate) = -r_c*M_citric, d(acetolactate) = +r_c*M_acetolactate, d(CO2) = +r_c*M_CO2
#     (citrate C6 -> alpha-acetolactate C5 + CO2 C1; carbon closes 6 = 5 + 1; MASS carries a
#     small gap - the real acetate/redox branch is untracked, carbon is the invariant, as for
#     the VDK decarb / beer hydrolysis water D-8). The alpha-acetolactate feeds the SHARED VDK
#     reservoir, so diacetyl EMERGES from the always-on D-26 decarboxylation + reduction - no new
#     diacetyl kinetics. 'gate' is the SAME O. oeni environmental gate (g_pH*g_EtOH*g_SO2*gamma(T))
#     the malate conversion uses, so SO2/ethanol/low-pH arrest citrate metabolism too.
#   OenococcusDiacetylReduction: L = k_mlf_diacetyl_reduction * X_mlf * f(T) * [diacetyl], the
#     bacterial reductase that clears diacetyl on the lees (why leaving a completed MLF on lees
#     cleans up, and why early post-MLF SO2 - killing the bacteria - locks diacetyl in). Uses the
#     shared E_a_reduction (vicinal_diketones.yaml) for f(T); gated on the constant X_mlf.
#
# WHY A CITRATE POOL (the load-bearing scope decision, D-31). MLF-diacetyl is a late-MLF, often
# POST-DRYNESS phenomenon, so its carbon cannot come from sugar: the yeast VDK stand-in draws
# alpha-acetolactate carbon out of S, which correctly no-ops at S=0 - it would strand carbon
# (breaking total_carbon) or stop diacetyl exactly when this beat needs it. Citrate is present
# independent of sugar, so it is the honest source (a dosed must input, citrate_gpl).
#
# STOICHIOMETRY IS A LUMPED FICTION - OWNED. Real citrate metabolism is citrate -> acetate +
# oxaloacetate -> pyruvate + CO2, ~2 citrate per alpha-acetolactate, with ACETATE (a
# volatile-acidity contributor) the DOMINANT co-product. The single-reaction stand-in balances
# carbon exactly but drops the acetate/lactate branches; k_citrate is held LOW so citrate stays
# MOSTLY UNCONSUMED - the trace diacetyl branch only. ALL SPECULATIVE (order-of-magnitude
# estimates; no per-catalyst kinetic model of this flux form is sourced). SCOPE (v1): X_mlf is a
# constant inert catalyst (no bacterial growth/death), so the reduction has no ethanol/SO2 arrest
# gate and diacetyl is not permanently stranded while O. oeni is present (racking to remove X_mlf
# needs the deferred event loop). Citrate is carbon-active but NOT charge-active (kept out of the
# D-18 pH balance in v1; a scoped omission the inverse anchoring absorbs at t=0, as for SO2 D-22).

k_citrate:
  value: 3.0e-5
  unit: "mol/(g*h)"   # molar citrate turnover per g/L O. oeni: r_c = k_citrate*X_mlf*Monod*gate
  tier: speculative
  uncertainty: { low: 5.0e-6, high: 1.0e-4, note: "order-of-magnitude target: an MLF-derived diacetyl contribution that clearly exceeds the yeast-only baseline (~0.1 mg/L) and lands in the buttery wine range (peak ~0.3 mg/L at the reference dose, above the ~0.2 mg/L threshold), while consuming only a small fraction (~6%) of a ~0.1-0.5 g/L citrate dose (the trace diacetyl branch; the dominant acetate branch is untracked)" }
  provenance:
    source: "author estimate; O. oeni citrate co-metabolism yields diacetyl in the ~mg/L range in wine (Ribereau-Gayon et al., Handbook of Enology Vol. 1, malolactic fermentation & diacetyl; Bartowsky & Henschke 2004, Int. J. Food Microbiol. 96:235-252, the O. oeni diacetyl review)"
    conditions: "S. cerevisiae/O. oeni co-inoculated wine, ~20 C; specific citrate-to-acetolactate activity scaling the dosed (constant) X_mlf, feeding the shared VDK reservoir"
    notes: "SPECULATIVE magnitude: no per-catalyst kinetic model of citrate->diacetyl of our flux form is sourced (O. oeni diacetyl is usually reported as bulk mg/L yields, not a per-biomass rate), so this is tuned to a plausible diacetyl contribution, NOT fitted. Held LOW so citrate is mostly unconsumed - the trace diacetyl branch only (the dominant acetate/lactate branches are omitted from the single-reaction carbon-closing stand-in). Shares the environmental gate with MalolacticConversion, so ethanol/SO2/low-pH arrest it too - in co-inoculation, production is concentrated in the early low-ethanol window before the ethanol wall (~day 4 at 20 C), then the reservoir decarboxylates on to a late diacetyl peak that reduction clears. Direction (citrate co-metabolism makes diacetyl; more with active bacteria) is sourced; the magnitude is the speculative modelling choice."

K_citrate:
  value: 1.0e-3
  unit: "mol/L"   # Michaelis-Menten half-saturation in CITRATE (molar)
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 5.0e-3, note: "citrate lyase / uptake half-saturation of order ~mM; the term stays smooth over a typical ~0.1-0.5 g/L (~0.5-2.6 mM) citrate dose" }
  provenance:
    source: "author estimate of order the reported O. oeni citrate-metabolism half-saturation (~mM range; enology/biochemistry literature on citrate lyase and citrate uptake)"
    conditions: "O. oeni citrate co-metabolism; half-saturation in the citrate Monod term of MalolacticCitrateMetabolism (mol/L, matching the [citrate] the Process computes from g/L via M_citric)"
    notes: "Read by MalolacticCitrateMetabolism. Because k_citrate is held low (citrate mostly unconsumed), this term stays roughly constant over the ferment, so it mainly sets the initial rate scale rather than shaping a depletion tail. SPECULATIVE: the whole-cell citrate affinity our X_mlf lumps is not the isolated-enzyme Km, and the value is taken mid-range, not fitted."

k_mlf_diacetyl_reduction:
  value: 2.0e-2
  unit: "L/(g*h)"   # d(diacetyl)/dt = -k_mlf_diacetyl_reduction * X_mlf * f(T) * [diacetyl]
  tier: speculative
  uncertainty: { low: 5.0e-3, high: 1.0e-1, note: "with a dosed X_mlf ~0.1-0.5 g/L gives a bacterial diacetyl half-life of ~days - slower than the yeast reduction (k_reduction 5e-2, viable X ~1-5 g/L), so while the yeast is viable it dominates and O. oeni clearing matters mainly after ethanol-inactivation, on the lees" }
  provenance:
    source: "author estimate; O. oeni reduces diacetyl to acetoin/2,3-butanediol via diacetyl reductase, the lees-contact clearing step (Bartowsky & Henschke 2004, Int. J. Food Microbiol. 96:235-252; Ribereau-Gayon et al., Handbook of Enology Vol. 1)"
    conditions: "O. oeni in wine; enzymatic diacetyl reduction, first-order in diacetyl and in the dosed (constant) X_mlf, using the shared E_a_reduction temperature factor"
    notes: "Read by OenococcusDiacetylReduction. Complements the yeast DiacetylReduction (D-26): the yeast (higher rate x higher biomass) clears diacetyl fast while viable; this bacterial reducer keeps clearing it after the yeast is ethanol-inactivated, as long as O. oeni is present - the realistic lees-contact clean-up, and the reason removing the bacteria (SO2 / racking) locks diacetyl in. v1 has no bacterial death gate (X_mlf constant), so this does not stop at high ethanol/SO2 - a documented simplification; bacterial arrest/death is deferred with the MLF-growth beat. Magnitude speculative."

# -- BRETTANOMYCES VOLATILE PHENOLS (wine-only, decision D-40) -----------------------------------
# The mixed-culture beat that closes Milestone 2. Brettanomyces bruxellensis is the canonical wine
# spoilage yeast: it decarboxylates grape-must HYDROXYCINNAMIC ACIDS (p-coumaric, ferulic) to
# VINYLPHENOLS, then reduces those to the ETHYLPHENOLS (4-ethylphenol "barnyard", 4-ethylguaiacol
# "clove") that define Brett character. Read by two Processes in fermentation.core.kinetics.brett:
#   BrettDecarboxylation: r = k_brett_decarb * X_brett * [hc]/(K_hydroxycinnamic+[hc]) * gate
#     with d(hydroxycinnamics) = -r*M_p_coumaric, d(vinylphenols) = +r*M_vinylphenol,
#     d(CO2) = +r*M_CO2 (p-coumaric C9 -> vinylphenol C8 + CO2 C1; carbon closes 9 = 8 + 1).
#   BrettVinylphenolReduction: L = k_brett_reduction * X_brett * gate * [vinylphenols], with
#     d(vinylphenols) = -L, d(ethylphenols) = +L*M_ethylphenol/M_vinylphenol (mole-for-mole C8->C8).
# Brett carries BOTH enzymes, so a dosed culture spoils POF-negative wine unaided (the canonical
# funk). 'gate' = g_SO2 * gamma(T) - the Brett environmental gate has NO pH or ethanol term (Brett
# is acid- AND ethanol-tolerant, unlike O. oeni; copying the MLF gate would arrest it where it
# thrives, decision D-40). X_brett is a constant inert catalyst in pt1 (BrettGrowth D-40 pt2 makes
# it dynamic). ALL SPECULATIVE: no per-catalyst kinetic model of this flux form is sourced (Brett
# volatile phenols are reported as bulk mg/L end-yields, not per-biomass rate constants), so these
# are tuned to a plausible slow (weeks-months) spoilage, NOT fitted.

k_brett_decarb:
  value: 5.0e-6
  unit: "mol/(g*h)"   # molar hydroxycinnamate turnover per g/L X_brett: r = k_brett_decarb*X_brett*Monod*gate
  tier: speculative
  uncertainty: { low: 1.0e-6, high: 2.0e-5, note: "order-of-magnitude target: a dosed X_brett ~0.1-0.5 g/L converts a must hydroxycinnamic pool (~50-150 mg/L) over WEEKS-MONTHS (Brett spoilage is slow), not hours - the timescale that makes an SO2/rack control meaningfully interrupt it" }
  provenance:
    source: "author estimate; Brettanomyces cinnamate decarboxylase converts hydroxycinnamic acids to vinylphenols (Chatonnet et al. 1992, J. Sci. Food Agric. 60:165-178; Dias et al. 2003, Food Microbiol. 20:377-384 - the canonical 4-ethylphenol spoilage studies)"
    conditions: "Brettanomyces bruxellensis in wine, ~20 C; specific decarboxylase activity scaling the dosed (constant, pt1) X_brett"
    notes: "Read by BrettDecarboxylation as the specific decarboxylase rate. SPECULATIVE magnitude: no per-catalyst kinetic model of our flux form is sourced (Brett phenols are reported as bulk end-yields), so it is tuned to a slow weeks-months spoilage at a realistic dose, NOT fitted. The dose X_brett (g/L) sets the absolute timescale linearly, so k_brett_decarb and a realistic pitch trade off (the growth beat D-40 pt2 makes X_brett dynamic). DIRECTION sourced (Brett decarboxylates hydroxycinnamic acids); magnitude is the speculative choice."

K_hydroxycinnamic:
  value: 5.0e-4
  unit: "mol/L"   # Michaelis-Menten half-saturation in hydroxycinnamic precursor (molar)
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 2.0e-3, note: "decarboxylase / uptake half-saturation of order ~mM; near a typical must hydroxycinnamic pool (~50-150 mg/L ~ 0.3-0.9 mM), so the term is O(1) and declines as the precursor is consumed - a genuine depletion tail, not a near-constant scale" }
  provenance:
    source: "author estimate of order the reported hydroxycinnamate-decarboxylase half-saturation (~mM range; enzyme kinetics on cinnamate decarboxylase / p-coumaric acid uptake)"
    conditions: "Brettanomyces in wine; half-saturation in the precursor Monod term of BrettDecarboxylation (mol/L, matching the [hc] the Process computes from g/L via M_p_coumaric)"
    notes: "Read by BrettDecarboxylation. Sets where the precursor Monod [hc]/(K+[hc]) rolls off, giving a near-complete conversion of the must hydroxycinnamic pool over the ferment rather than an abrupt stop. SPECULATIVE: the whole-cell precursor affinity our X_brett lumps is not the isolated-enzyme Km, taken mid-range, not fitted."

k_brett_reduction:
  value: 5.0e-2
  unit: "L/(g*h)"   # d(vinylphenols)/dt = -k_brett_reduction * X_brett * gate * [vinylphenols]
  tier: speculative
  uncertainty: { low: 1.0e-2, high: 1.5e-1, note: "held ABOVE the decarboxylase turnover so the shared vinylphenol reservoir is drained to ethylphenol faster than it fills - in Brett (which has both enzymes) the intermediate does not pile up, so ethylphenols track the decarboxylation; the reservoir only strands when Brett is absent and a POF+ yeast made the vinylphenol (D-40 pt4)" }
  provenance:
    source: "author estimate; Brettanomyces vinylphenol reductase reduces vinylphenols to ethylphenols, the second and Brett-specific step S. cerevisiae lacks (Chatonnet et al. 1992; Dias et al. 2003)"
    conditions: "Brettanomyces in wine, ~20 C; enzymatic vinylphenol reduction, first-order in vinylphenol and in the dosed (constant, pt1) X_brett, throttled by the shared Brett SO2/temperature gate"
    notes: "Read by BrettVinylphenolReduction. Set ABOVE k_brett_decarb so vinylphenol turns to ethylphenol faster than it is made - so in Brett the intermediate stays low and 4-EP accumulates (the reservoir strands only when a POF+ yeast fills it with no Brett present, the D-40 pt4 emergent case). Uses the SAME g_SO2*gamma(T) gate as the decarboxylase, so SO2 arrests both steps. Magnitude speculative; direction (Brett reduces vinylphenol to ethylphenol) sourced."

molecular_so2_inhib_brett:
  value: 2.0e-4
  unit: "g/L"   # decay scale of g_SO2 = exp(-[SO2]_molecular / molecular_so2_inhib_brett)
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 5.0e-4, note: "molecular SO2 inhibitory scale ~0.1-0.5 mg/L; ~0.5-0.8 mg/L molecular strongly suppresses Brett - the basis of the winemaker's ~0.5-0.8 mg/L molecular SO2 target to control Brettanomyces" }
  provenance:
    source: "author estimate encoding the antimicrobial action of MOLECULAR SO2 on Brettanomyces (the same molecular-SO2 antimicrobial basis as the D-22 readout; the ~0.5-0.8 mg/L molecular SO2 target is the standard Brett-control guideline, Ribereau-Gayon et al., Handbook of Enology Vol. 1)"
    conditions: "Brettanomyces in wine; exponential decay scale of the molecular-SO2 inhibition gate on the decarboxylase/reductase rates"
    notes: "Read by brett_environmental_gate: g_SO2 = exp(-[SO2]_molecular / s), where [SO2]_molecular (g/L) is partitioned from the dosed free SO2 at the SOLVED pH (D-22). Scale ~0.2 mg/L: g_SO2 ~ 0.018 at 0.8 mg/L molecular (strong suppression), ~1 when undosed. Taken equal to molecular_so2_inhib_mlf - both organisms respond to molecular SO2 on a similar ~0.1-0.5 mg/L scale (a v1 simplification; a Brett-specific scale is a v2 refinement). DIRECTION strongly sourced (molecular SO2 is THE tool to control Brett); exact scale and exponential FORM speculative. This same scale is reused as the SO2 KILL scale by BrettDeath (D-40 pt3)."

T_min_brett:
  value: 283.15
  unit: "K"   # cardinal minimum (10 C) of the Rosso CTMI temperature optimum gamma(T)
  tier: speculative
  uncertainty: { low: 279.15, high: 286.15, note: "Brettanomyces growth is slow but not zero in cold cellars; T_min ~8-12 C - Brett persists (slowly) at barrel-cellar temperatures, part of why it is hard to eradicate" }
  provenance:
    source: "author estimate from Brettanomyces cardinal temperatures (grows ~10-40 C, optimum warm; slow persistence in cool cellars; Brettanomyces/Dekkera physiology reviews)"
    conditions: "Brettanomyces in wine; minimum cardinal temperature of the CTMI gamma(T) factor (stored in K, sourced in C)"
    notes: "Read by brett_environmental_gate via cardinal_temperature_factor (Rosso et al. 1993 CTMI). 10 C. Below it gamma(T)=0. DIRECTION sourced (cold slows Brett); exact cardinal speculative. CTMI uses only temperature DIFFERENCES, so K and C give identical gamma (D-3)."

T_opt_brett:
  value: 305.15
  unit: "K"   # cardinal optimum (32 C) where gamma(T) = 1 - WARMER than O. oeni's 23 C
  tier: speculative
  uncertainty: { low: 298.15, high: 308.15, note: "Brettanomyces optimum ~25-32 C, distinctly WARMER than O. oeni MLF (~20-25 C) - warm cellars/late-season barrels favour Brett" }
  provenance:
    source: "author estimate from Brettanomyces growth optimum reports (~28-32 C; distinctly warmer than the O. oeni MLF optimum)"
    conditions: "Brettanomyces in wine; optimum cardinal temperature of the CTMI gamma(T) factor (stored in K, sourced in C)"
    notes: "Read by brett_environmental_gate via cardinal_temperature_factor. 32 C, where gamma(T)=1 (k_brett_decarb/k_brett_reduction read unscaled there). At a 20 C cellar gamma ~0.6, at a cool 15 C barrel cellar ~0.4 - so Brett is SLOW but active at cellar temperatures and faster in a warm room, the realistic direction. WARMER optimum than O. oeni is the load-bearing contrast (Brett is a warm-tolerant spoiler). Exact optimum speculative; a warm optimum ~28-32 C is well-established."

T_max_brett:
  value: 318.15
  unit: "K"   # cardinal maximum (45 C) of the CTMI temperature optimum gamma(T)
  tier: speculative
  uncertainty: { low: 313.15, high: 322.15, note: "Brettanomyces growth ceases by ~40-45 C; T_max ~45 C" }
  provenance:
    source: "author estimate from Brettanomyces upper cardinal temperature (growth ceases ~40-45 C)"
    conditions: "Brettanomyces in wine; maximum cardinal temperature of the CTMI gamma(T) factor (stored in K, sourced in C)"
    notes: "Read by brett_environmental_gate via cardinal_temperature_factor. 45 C. Above it gamma(T)=0. Far above any normal wine ferment/cellar, so it shapes only the high-T tail; exact value speculative, direction (a finite upper limit exists) sound."

# -- BRETT GROWTH (Brettanomyces biomass, wine-only, decision D-40 pt2) --------------------------
# BrettGrowth (fermentation.core.kinetics.brett) makes the X_brett catalyst DYNAMIC:
#   dX_brett/dt = mu_max_brett * X_brett * aa/(K_aa_brett+aa) * g_SO2*gamma(T)
# Because the decarboxylase/reductase are linear in X_brett, growth makes the volatile-phenol
# spoilage ACCELERATE as the population multiplies over the months a barrel sits. Nitrogen-anchored
# on the amino-acid pool (D-32, autolysis-refilled D-34); the carbon shortfall is drawn from
# ETHANOL, not sugar (owner fork, D-40) - the mechanistic reason Brett thrives in a DRY finished
# wine (its post-AF/barrel niche), where a sugar-anchored growth (MLF's) could not run. NO sugar
# Monod - growth is gated only by amino-acid fuel + the SO2/temperature environment, so a post-AF
# pitch_brett into a high-ethanol wine grows rather than sitting inert. X_brett is now weighted as
# real biomass in total_carbon/total_nitrogen (Brett ~ yeast composition, a v1 simplification).
# Gated at compile on amino_acids_gpl>0 (NOT the pitch - the X_brett<=0 guard handles that).
# ALL SPECULATIVE: no per-catalyst kinetic model of Brett growth of this form is sourced.

mu_max_brett:
  value: 8.0e-3
  unit: "1/h"   # Brett max specific growth rate: dX_brett/dt = mu_max_brett*X_brett*Monod(aa)*gate
  tier: speculative
  uncertainty: { low: 2.0e-3, high: 2.0e-2, note: "Brett is a SLOW grower (a defining trait vs S. cerevisiae); a specific growth rate ~2e-3 - 2e-2 /h gives a doubling time of ~1.5-15 d, so a small barrel inoculum multiplies over WEEKS-MONTHS - the timescale on which Brett spoilage worsens, and on which an SO2 addition can still catch it" }
  provenance:
    source: "author estimate; Brettanomyces bruxellensis is a characteristically slow-growing spoilage yeast (doubling times of days, much slower than S. cerevisiae; Brettanomyces/Dekkera physiology reviews, e.g. Wedral et al. 2010, the Brettanomyces review)"
    conditions: "Brettanomyces in wine, ~20 C; max specific growth rate scaling X_brett, read unscaled at the temperature optimum (gamma(T)=1) and near-saturating amino acids"
    notes: "Read by BrettGrowth as the Brett mu_max. SPECULATIVE: no kinetic model of our amino-acid-anchored, ethanol-carbon-sourced growth form is sourced (Brett growth is reported as bulk OD/CFU timescales), so it is tuned to a realistic slow (days-doubling) buildup, NOT fitted. Kept LOW to encode Brett's defining slow growth: the population builds over the months a barrel ages, so the spoilage worsens with time and an SO2 addition partway through can still arrest it. Gated by the same g_SO2*gamma(T) as the phenol Processes (no sugar Monod - Brett grows in a dry wine on ethanol carbon), so SO2/temperature throttle growth too."

K_aa_brett:
  value: 5.0e-3
  unit: "g/L"   # amino-acid half-saturation in the Brett growth Monod term aa/(K_aa_brett+aa)
  tier: speculative
  uncertainty: { low: 1.0e-3, high: 2.0e-2, note: "amino-acid availability half-saturation; ramps Brett growth up from an empty pool and down as amino acids are exhausted, over a typical autolysis-refilled ~0.01-0.1 g/L amino-acid range" }
  provenance:
    source: "author estimate of order the reported yeast amino-acid uptake half-saturation (~mg/L range); no Brett-specific value sourced"
    conditions: "Brettanomyces in wine; half-saturation in the smooth availability gate aa/(K_aa_brett+aa) on the Brett growth rate"
    notes: "Read by BrettGrowth: gate(aa) = aa/(K_aa_brett+aa) ramps Brett growth up from an empty amino-acid pool and down to zero as amino acids are exhausted (the same smooth-Monod shape the MLF growth and yeast swap use, keeping the RHS C1 for the BDF solver). A SEPARATE parameter from K_aa_mlf (the per-organism design lets them diverge); an estimate, hence speculative. Brett famously scavenges trace nutrients, so it is taken of the same order but not tuned to a source."

K_E_brett:
  value: 2.0
  unit: "g/L"   # ethanol half-saturation in the Brett growth Monod term E/(K_E_brett+E)
  tier: speculative
  uncertainty: { low: 0.5, high: 5.0, note: "ethanol-availability half-saturation; small vs any finished wine (~80-120 g/L ethanol) so the Monod is ~1 across the normal range and only ramps growth down toward an unfermented must (E~0). Bounds the near-zero crossing, not the working range" }
  provenance:
    source: "author estimate; Brettanomyces grows on ethanol as a carbon/energy source, so growth scales with ethanol availability (Brettanomyces/Dekkera physiology reviews, e.g. Wedral et al. 2010). No Brett-specific half-saturation sourced"
    conditions: "Brettanomyces in wine; half-saturation in the smooth availability gate E/(K_E_brett+E) on the Brett growth rate"
    notes: "Read by BrettGrowth: gate(E) = E/(K_E_brett+E) makes growth ~0 in an unfermented must (E~0) and ~1 in a finished wine (E >> K_E_brett) - Brett's post-AF/barrel niche - AND is the smooth shadow of the E<=0 growth guard (like aa/(K_aa_brett+aa) shadows the amino-acid guard and (1-X/K) shadows the carrying-capacity cap), so the BDF Jacobian never straddles an on/off step at E=0 during primary AF. Kept small so it does not otherwise change growth in the working ethanol range."

# Brett carrying capacity - the logistic ceiling on X_brett (decision D-40 pt2).
# Unlike MLF, Brett growth has NO sugar Monod and NO ethanol wall to self-arrest (that is its
# dry-wine, ethanol-tolerant niche), so the amino-acid Monod alone is not a brake: an autolysis-
# refilled amino-acid pool would let X_brett grow exponentially with no ceiling and drive the pool
# negative on a solver step. This intrinsic logistic factor (1 - X_brett/K) - the same lumped form
# as the D-30 yeast biomass_carrying_capacity - bounds X_brett to a realistic Brett cell density,
# which keeps the amino-acid draw rate small so the pool depletes SMOOTHLY to a positive residual.
# Real Brett saturates at a finite density (nutrient/quorum limits); the cap value is an estimate.
brett_carrying_capacity:
  value: 0.5
  unit: "g/L"   # logistic carrying capacity K in the Brett growth brake (1 - X_brett/K)
  tier: speculative
  uncertainty: { low: 0.1, high: 1.0, note: "Brett spoilage populations of ~1e6-1e7 CFU/mL correspond to a dry biomass of order 0.05-0.5 g/L; the cap sets the plateau X_brett approaches over a barrel's months and, with it, the ceiling on volatile-phenol production and on the amino-acid draw" }
  provenance:
    source: "author estimate; Brettanomyces bruxellensis spoilage densities (~1e6-1e7 CFU/mL) scaled to dry cell weight (order 0.05-0.5 g/L; Brettanomyces/Dekkera physiology reviews, e.g. Wedral et al. 2010)"
    conditions: "Brettanomyces in wine; logistic carrying capacity bounding X_brett in the growth brake (1 - X_brett/brett_carrying_capacity)"
    notes: "Read by BrettGrowth: the ONLY ceiling on Brett biomass (no sugar Monod / ethanol wall, unlike MLF). Linear 1 - X/K, clamped >= 0, mirrors the D-30 biomass_carrying_capacity form but is intrinsic and always-on (not the opt-in isolable modifier D-30 is). A SEPARATE parameter from that yeast cap (per-organism). Bounds X_brett small so the amino-acid draw stays small and the pool never overshoots negative."

# -- BRETT DEATH (Brettanomyces SO2-driven kill, wine-only, decision D-40 pt3) -------------------
# BrettDeath (fermentation.core.kinetics.brett) completes the Brett arc (pt1 pathway -> pt2 growth
# -> pt3 death): it moves viable X_brett into the non-viable X_brett_dead pool when the wine is
# SULFITED, so the spoilage population DECLINES and the volatile-phenol activities that scale with
# X_brett (decarboxylase + reductase) wind down.
#   r_death = k_death_brett * X_brett * (1 - g_SO2) * arrhenius(T, E_a_death_brett, T_ref)
#   g_SO2   = exp(-[SO2]_molecular / molecular_so2_inhib_brett)   (the SAME term the metabolic gate uses)
# The driver is 1 - g_SO2 - MOLECULAR SO2 ALONE. Death is EXACTLY 0 without SO2 (g_SO2 = 1) and rises
# toward its Arrhenius ceiling as molecular SO2 accumulates. Temperature enters through the Arrhenius
# factor (warm accelerates the kill, cold slows it - the autolysis/MLF-death shape), NOT the cardinal
# gamma(T) (which -> 0 in the cold and would spuriously make cold KILL Brett; cold in fact PRESERVES
# it, part of why Brett is so hard to eradicate from a cool cellar). The transfer X_brett ->
# X_brett_dead is CARBON- AND NITROGEN-NEUTRAL (both pools weighted at the biomass fractions since
# pt2, the yeast X -> X_dead precedent D-13), so it adds no conservation code.
# WHY SO2 ALONE IS NATURAL FOR BRETT (contrast MalolacticDeath D-39): MLF death had to DROP an
# ethanol/pH toxicity driver because O. oeni's Luong ethanol wall made bacteria spuriously "die" from
# ordinary post-AF ethanol. Brett has NO such wall - the Brett gate carries no ethanol/pH term at all
# (Brett is ethanol- and acid-tolerant) - so "molecular SO2 alone kills Brett" is not a correction of
# a confounder but the DIRECTLY correct physics: the winemaker's ~0.5-0.8 mg/L molecular-SO2
# Brett-control target is the real-world expression of this term. Without SO2 (or a rack) Brett
# PERSISTS indefinitely in v1 - the honest reflection of how tenacious a barrel Brett infection is; a
# slow benign-environment senescence is a deferred v2 refinement.
# BOTH PARAMS SPECULATIVE (author estimates; no per-catalyst mortality law of this form is sourced).
# Pitch-gated at compile (brett_pitch_gpl>0), NOT amino-acid-gated - Brett dies whether or not it grew.

k_death_brett:
  value: 3.0e-2
  unit: "1/h"   # Brett specific death rate at FULL SO2 kill: r_death = k_death_brett*X_brett*(1-g_SO2)*f(T)
  tier: speculative
  uncertainty: { low: 1.0e-2, high: 8.0e-2, note: "specific mortality at a full molecular-SO2 kill => a Brett half-life of ~9-70 h; a stabilizing molecular-SO2 dose (~0.5-0.8 mg/L, the Brett-control target) crashes the population over ~1-4 d, while an unsulfited wine sees ZERO death (Brett persists in the barrel)" }
  provenance:
    source: "author estimate; molecular SO2 is the winemaker's primary tool against established Brettanomyces - maintaining ~0.5-0.8 mg/L molecular SO2 suppresses and clears it, though Brett is notably SO2-tolerant relative to other spoilage organisms (Ribereau-Gayon et al., Handbook of Enology Vol. 1, SO2 & microbial stabilization; Wedral et al. 2010, the Brettanomyces review)"
    conditions: "Brettanomyces bruxellensis in wine, ~20 C; specific death rate at a full molecular-SO2 kill (1 - g_SO2 = 1) scaling the viable X_brett, read unscaled at T_ref by the Arrhenius factor"
    notes: "Read by BrettDeath as the death magnitude at a full SO2 kill. VALUE 0.03/h => a full-kill half-life of ~23 h (ln2/0.03); at a strong molecular-SO2 dose (1-g_SO2 ~ 1) the population drops ~90% in ~3 d - a physically-reasonable SO2-kill timescale for a SO2-tolerant organism, chosen on that physics, NOT to clear a test threshold. Set BELOW k_death_mlf (0.05/h): Brett is more SO2-tolerant than O. oeni, so it dies more slowly at the same molecular SO2. Because death is EXACTLY 0 without SO2, k does not couple to the unsulfited spoilage trajectory, so it can take its true SO2-kill value. SPECULATIVE: no per-catalyst kinetic model of Brett SO2 mortality is sourced (viability is reported as CFU decline curves, not this rate constant), so it is tuned - NOT fitted. DIRECTION is sourced (molecular SO2 kills/suppresses Brett; the basis of using SO2 to control it); the magnitude is the speculative modelling choice. SIMPLIFICATION: reuses molecular_so2_inhib_brett as the kill scale (arrest-scale = kill-scale, bacteriostatic ~ bacteriocidal); a separate molecular_so2_brett_death_scale is the v2 refinement. A benign-environment baseline senescence (death without SO2) is deferred to v2."

E_a_death_brett:
  value: 60000.0
  unit: "J/mol"   # Arrhenius activation energy for the temperature dependence of Brett death
  tier: speculative
  uncertainty: { low: 40000.0, high: 90000.0, note: "generic biological/enzymatic-process activation energy (Q10 ~2 at 20 C); brackets the ~40-90 kJ/mol range the model's other enzymatic E_a (E_a_reduction 45k, E_a_autolysis 60k, E_a_death_mlf 60k, E_a_decarb 90k) span" }
  provenance:
    source: "author estimate; no sourced Arrhenius fit for Brettanomyces death rate - taken equal to E_a_death_mlf / E_a_autolysis (60 kJ/mol), a generic enzymatic/biological-process activation energy (Q10 ~2.3 at 20 C), consistent with warm accelerating and cold slowing cell mortality"
    conditions: "Brettanomyces in wine; temperature factor arrhenius(T, E_a_death_brett, T_ref) on the death rate, = 1 at T_ref (20 C)"
    notes: "Read by BrettDeath. Gives the temperature dependence of Brett mortality so that a warm sulfited wine clears the culture faster and cold PRESERVES it (dormancy) - the physically correct direction the cardinal gamma(T) cannot supply for death (gamma(T) -> 0 in the cold would make cold kill, the opposite of reality). SPECULATIVE: the magnitude is an estimate equal to the MLF death / autolysis E_a; the DIRECTION (warm accelerates, cold preserves) is sound. Uses the shared T_ref (20 C) so the factor is 1 at the wine benchmark temperature, like every other Arrhenius rate."

# -- POF+ YEAST DECARBOXYLASE (wine-only, decision D-40 pt4) -------------------------------------
# YeastPOFDecarboxylation (fermentation.core.kinetics.brett) is the YEAST half of the volatile-phenol
# story: a POF+ (phenolic-off-flavour-positive) primary S. cerevisiae strain carries the cinnamate
# decarboxylase - the SAME reaction as BrettDecarboxylation, drawing must hydroxycinnamics into
# vinylphenols + CO2 (p-coumaric C9 -> vinylphenol C8 + CO2 C1; carbon closes 9 = 8 + 1) - but NOT
# the reductase, so it FILLS the shared vinylphenol reservoir it cannot drain. With no Brett the
# vinylphenols STRAND (nothing reduces them to ethylphenol); a Brett contamination arriving later
# gets a HEAD START on the pre-filled reservoir (the emergent yeast/Brett coupling, D-26/D-31
# parallel). Rate:
#   r = k_pof_decarb * X * S_total/(K_sugar_uptake+S_total) * [hc]/(K_hydroxycinnamic+[hc])
# FLUX-COUPLED to the yeast's fermentative activity (catalyst = viable X via fermentative_flux_shape,
# NOT X_brett), so POF decarboxylation runs during active fermentation and STOPS at dryness (S->0) -
# a primary-fermentation phenomenon. Reuses K_hydroxycinnamic (same whole-cell precursor affinity as
# Brett) and K_sugar_uptake (the shared fermentative-flux half-saturation). NO Brett SO2/temperature
# gate (this is yeast metabolism during AF), and TEMPERATURE-FLAT (no E_a_pof: temperature enters via
# the AF-flux trajectory, the AcetolactateExcretion precedent; no pt4 behaviour needs POF's intrinsic
# temperature direction, so an unsourced E_a would buy nothing). Enabled by the pof_positive opt-in
# (a binary strain trait), WHOLLY INDEPENDENT of the Brett pitch; a POF-negative default wine makes
# no vinylphenol. SPECULATIVE: no per-strain POF decarboxylase rate of this flux-coupled form is
# sourced (the DIRECTION - POF+ yeast decarboxylates hydroxycinnamics to vinylphenols during AF - is
# well established, Chatonnet et al. 1992 / 1997; Suarez et al. 2007 review).
k_pof_decarb:
  value: 2.5e-6
  unit: "mol/(g*h)"   # molar hydroxycinnamate turnover per (g/L) fermentative flux: r = k_pof_decarb*flux*Monod
  tier: speculative
  uncertainty: { low: 1.0e-6, high: 2.0e-5, note: "order-of-magnitude target: a POF+ yeast converts a PARTIAL fraction (~30-70%) of a typical must hydroxycinnamic pool (~50-150 mg/L) to vinylphenols over the days-long primary fermentation, leaving a real stranded reservoir when Brett is absent (not a near-complete or near-zero conversion). Coupled to the fermentative flux (X*S/(K+S)), which is O(1-10 g/L) during AF, so this scales like the Brett decarboxylase k but off a larger, sugar-linked activity that vanishes at dryness" }
  provenance:
    source: "author estimate; POF+ Saccharomyces cerevisiae expresses a cinnamate/ferulic-acid decarboxylase (PAD1/FDC1) that converts hydroxycinnamic acids to vinylphenols during fermentation (Chatonnet et al. 1992, J. Sci. Food Agric. 60:165-178; Chatonnet et al. 1997; Suarez et al. 2007, Food Chem. 102:10-21 - the 4-ethylphenol/POF review). No per-strain flux-coupled rate of this form is sourced"
    conditions: "POF+ S. cerevisiae in wine during active fermentation, ~20 C; specific decarboxylase activity scaling the biomass-catalysed fermentative flux X*S/(K_sugar_uptake+S)"
    notes: "Read by YeastPOFDecarboxylation. Set of the same order as k_brett_decarb (both are a lumped whole-cell cinnamate-decarboxylase turnover), but multiplies the fermentative FLUX (O(1-10 g/L) during AF) rather than the dosed X_brett (O(0.1-0.5 g/L)), and shuts off at dryness - so it fills the vinylphenol reservoir during primary fermentation only. Tuned for a partial conversion of the must hydroxycinnamic pool, leaving a stranded reservoir the emergent-coupling test relies on. SPECULATIVE: magnitude an estimate; the direction (POF+ yeast makes vinylphenols during AF) is well established."
