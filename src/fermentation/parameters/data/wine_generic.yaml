# Generic wine-yeast kinetic parameters — strain Premier Cuvee (S. cerevisiae
# var. bayanus, the Prise de Mousse / EC-1118 strain).
#
# SOURCED (Milestone 1 parameter task). The growth and fermentative-uptake
# constants and their temperature sensitivity come from the keystone wine model:
#
#   Coleman, M. C., Fish, R., & Block, D. E. (2007). "Temperature-Dependent
#   Kinetic Model for Nitrogen-Limited Wine Fermentations." Appl. Environ.
#   Microbiol. 73(18): 5875-5884. doi:10.1128/aem.00670-07.
#
# Coleman's model (their eqs 1-8) is structurally close to ours: growth is Monod
# on nitrogen (mu = mu_max*N/(K_N+N)) and fermentative uptake is Michaelis-Menten
# on sugar. Its parameters are NOT tabulated at single temperatures; they are
# regressions in T (deg C), ln(param) = a0 + a1*T (+ a2*T^2 for k'_d only)
# (Table A2; "Log" is the NATURAL log — confirmed by the paper's own statement
# that mu_max ~ 0.05/h at 11 C, matching exp(-3.92 + 0.0782*11) = 0.047). We
# evaluate each regression at T_ref = 20 C (the wine benchmark temperature). One
# Table A2 exponent is typo-corrected (k'_d a1; see that entry). See
# docs/DECISIONS.md (D-12).
#
# Conditions throughout: Premier Cuvee (Red Star), diluted Chardonnay must,
# 265-300 g/L sugar, 70-350 mg N/L, isothermal 11-35 C.

# -- Growth (Monod, nitrogen-limited) -----------------------------------------

mu_max:
  value: 0.095
  unit: "1/h"
  tier: plausible
  uncertainty: { low: 0.04, high: 0.32, note: "11 C -> 0.047/h, 35 C -> 0.31/h (factor ~6); strain/T-dependent" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must, 20 C; Table A2 regression ln(mu_max) = -3.92 + 0.0782*T(degC)"
    notes: "Evaluated at T_ref = 20 C: exp(-3.92 + 0.0782*20) = 0.095/h. Was placeholder 0.33 (that is ~37 C on this regression). Range spans the measured 11-35 C window."

K_s:
  value: 5.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 25.0, note: "Monod half-saturation for sugar in the GROWTH term" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae, placeholder"
    notes: "Coleman's growth is Monod on nitrogen ONLY (no sugar term), so the literature gives no analogue for our growth-stage sugar co-limitation guard. Kept as a speculative guard that growth cannot proceed once sugar is exhausted; high K_sugar_uptake affinity means it rarely binds. Distinct from K_sugar_uptake (the fermentative-flux constant, which IS sourced)."

K_n:
  value: 0.0088
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 0.003, high: 0.03, note: "half-saturation for YAN; Coleman Fig 5a spread ~0.005-0.03 g/L" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; Table A2 ln(K_N) = -4.73 (found temperature-independent)"
    notes: "exp(-4.73) = 0.00884 g N/L. Nitrogen limitation is the textbook stuck-ferment mechanism. Coleman report K_N as the one growth constant insensitive to T and initial conditions."

# -- Fermentative sugar uptake (Michaelis-Menten, biomass-catalysed) ----------
# Decoupled from growth (decision D-9): ferments to dryness after N runs out.
# Ethanol/CO2 yields are NOT parameters in M1 — the uptake uses the theoretical
# Gay-Lussac split (core.chemistry) so carbon and mass conserve exactly (D-8);
# Y_ethanol_sugar below is the deferred Tier-2 (glycerol-diversion) hook.

q_sugar_max:
  value: 0.85
  unit: "g/g/h"   # g sugar consumed per g biomass per hour
  tier: plausible
  uncertainty: { low: 0.4, high: 2.7, note: "11 C -> 0.43, 35 C -> 2.7 g/g/h; specific fermentative uptake, strain/T-dependent" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must, 20 C; Table A2 ln(beta_max) = -2.30 + 0.0771*T(degC), ln(Y_E/S) = -0.598"
    notes: "Our uptake rate r is SUGAR consumed; Coleman eq 5 gives dS/dt = -(beta_max/Y_E/S)*[S/(K_S+S)]*X_A, so q_sugar_max = beta_max/Y_E/S = exp(-0.758)/exp(-0.598) = 0.469/0.550 = 0.85 g/g/h. (beta_max alone is the specific ETHANOL rate, eq 4; the 'g sugar' label on their Fig 3c is the loose one, eq 5 is authoritative.) CAVEAT for tuning: M1 applies this rate to TOTAL biomass with no active/inactive split, whereas Coleman's active X_A declines late — so M1 will over-catalyse the tail; revisit when fitting curves, do not pre-compensate the value here."

K_sugar_uptake:
  value: 10.3
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 5.0, high: 15.0, note: "Michaelis-Menten constant for sugar transport" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; Table A2 ln(K_S) = 2.33 (temperature-independent)"
    notes: "exp(2.33) = 10.3 g/L; the paper rounds it to '~10 g/liter'. Was placeholder 2.0."

K_repression:
  value: 2.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 5.0, note: "more-preferred-sugar conc. at half catabolite repression" }
  provenance:
    source: "author estimate"
    conditions: "beer wort sequential uptake (glucose > maltose > maltotriose)"
    notes: "Smooth catabolite repression: a higher sugar is suppressed while a more-preferred one remains. The form matches the Gee & Ramirez repression factors K'_G/(K'_G+G) etc.; their numeric constants were not accessible. Beer-only - wine has a single sugar slot, so repression never applies (kept here so the wine and beer files share one parameter set)."

Y_ethanol_sugar:
  value: 0.47
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.46, high: 0.48, note: "realised yield below 0.511 theoretical" }
  provenance:
    source: "Gay-Lussac stoichiometry; realised yield, handoff section 2.1"
    conditions: "after biomass and glycerol diversion"
    notes: "Theoretical max 0.511 g/g; realised 0.46-0.48 is well established. NOT read directly by the uptake Process: rather than swap this lower constant in (which would destroy carbon and double-count the biomass already modelled separately), the realised yield EMERGES from the explicit byproduct diversion below (decision D-16) - Y_glycerol_sugar + Y_byproduct_sugar scale the theoretical split down, giving an emergent realised Y_E ~ 0.487 that cross-checks this 0.47 (within its 0.46-0.48 band). Kept as that documented target/cross-check. NB Coleman's fitted Y_E/S ~0.55 g/g exceeds the 0.511 theoretical maximum (a fitting/measurement artefact), so we anchor to the well-established realised 0.47 rather than their value."

# -- Realised-yield byproduct diversion (decision D-16) ------------------------
# Real ferments divert a few percent of sugar carbon away from ethanol/CO2 into
# glycerol, organic acids and higher alcohols. Rather than lower Y_ethanol_sugar
# (which would destroy carbon), the uptake Process keeps the theoretical Gay-Lussac
# split and routes the diverted carbon into the Gly/Byp state pools, carbon-balanced
# by construction (D-16). These yields are sourced from MEASURED byproduct levels
# (not back-fitted from a target ABV), so the realised Y_E (~0.487) and the wine ABV
# fall out. Both default to 0 in code (theoretical core); beer carries 0.

Y_glycerol_sugar:
  value: 0.035
  unit: "g/g"   # g glycerol / g sugar consumed
  tier: plausible
  uncertainty: { low: 0.02, high: 0.05, note: "spans the 4-10 g/L dry-wine glycerol range at ~245 g/L fermentable sugar" }
  provenance:
    source: "UC Davis Waterhouse Lab 'Glycerol' (whats-in-wine); Scanes et al. 1998; Ribereau-Gayon et al., Handbook of Enology"
    conditions: "S. cerevisiae dry wine; glycerol as a fraction of sugar fermented"
    notes: "Dry wine glycerol is 4-10 g/L (Ribereau-Gayon; usual 4-9 g/L), formed at ~1:10 of the ethanol. At our ~245 g/L fermentable sugar that is Y_gly ~ 0.016-0.041 g/g; we take 0.035 (-> ~8.6 g/L, mid-range). The MAGNITUDE is well-corroborated (multiple sources, narrow range), hence plausible; the constant-fraction FORM is a simplification (glycerol is front-loaded with growth in reality, not a fixed share of every gram), noted as the speculative aspect. Booked into the Gly pool; carbon-accounted as glycerol (C3H8O3)."

Y_byproduct_sugar:
  value: 0.012
  unit: "g/g"   # g minor byproducts (succinic-equivalent) / g sugar consumed
  tier: speculative
  uncertainty: { low: 0.007, high: 0.018, note: "organic acids + polyols only (succinic + acetic + 2,3-butanediol), ~1.7-4.5 g/L; higher alcohols now in the fusels pool" }
  provenance:
    source: "author estimate lumping measured wine organic acids/polyols (succinic 0.5-1.5, acetic 0.3-0.6, 2,3-butanediol 0.5-1.5 g/L); per-g yields e.g. succinic ~0.005, acetic ~0.002 g/g"
    conditions: "S. cerevisiae dry wine; minor non-glycerol byproducts EXCLUDING higher alcohols, carbon-accounted as succinic acid (C4H6O4)"
    notes: "Glycerol is the dominant byproduct; this lump captures the rest of the ORGANIC ACIDS / POLYOLS (succinic, acetic, 2,3-butanediol), ~1.7-4.5 g/L -> Y ~ 0.007-0.018 g/g; we take 0.012 (-> ~2.9 g/L). DECISION D-19 RE-ANCHOR: was 0.014 and lumped higher alcohols too, but higher alcohols (~0.15-0.5 g/L, ~0.0017 g/g) now have their own carbon-routed `fusels` pool (booked as isoamyl alcohol), so they are carved OUT of Byp here to avoid double-counting that carbon in total_carbon - the reduction is exactly that higher-alcohol share. SPECULATIVE: still a lump of several species with a single representative carbon fraction (succinic acid), not a measured single quantity. Booked into the Byp pool. Together with Y_glycerol_sugar this gives an emergent realised Y_E ~ 0.486, consistent with the literature 0.46-0.48 (the carve-out plus the trace fusel/ester sugar draw nearly cancel, so ABV is essentially unchanged)."

must_fermentable_fraction:
  value: 0.93
  unit: "g/g"   # g fermentable hexose / g Brix-measured dissolved solids
  tier: plausible
  uncertainty: { low: 0.90, high: 0.95, note: "glucose+fructose share of ripe-must soluble solids" }
  provenance:
    source: "Ribereau-Gayon et al. 2006, Handbook of Enology (grape must composition)"
    conditions: "ripe Vitis vinifera must; fraction of refractometric soluble solids that is fermentable hexose"
    notes: "Brix measures TOTAL dissolved solids as sucrose-equivalent, but in ripe must glucose+fructose are ~90-95% of the soluble solids (the rest is organic acids, minerals, phenolics - not fermentable). brix_to_sugar_gpl therefore OVERSTATES fermentable sugar; this fraction corrects it at the compile boundary (decision D-16): fermentable S0 = brix_to_sugar_gpl(brix) * 0.93. A MUST-COMPOSITION constant, not a yeast-strain kinetic constant - it lives in this file for now but would need re-homing if a second wine strain file is added (it would duplicate). Without it, a 24 Brix must reads 263.8 g/L hexose (ABV ~15.7% even at realised yield); with it, ~245 g/L -> ABV ~14.9%, the realistic potential alcohol of 24 Brix."

# -- Ethanol inhibition (Luong wall on the uptake flux, decision D-10) ---------

ethanol_tolerance:
  value: 142.0
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 120.0, high: 150.0, note: "~15-19% ABV equivalent" }
  provenance:
    source: "Lallemand Lalvin EC-1118 / Premier Cuvee technical data sheet (alcohol tolerance 18% v/v)"
    conditions: "S. cerevisiae var. bayanus (Prise de Mousse), the strain Coleman 2007 used"
    notes: "18% v/v * 0.789 g/mL = 142 g/L. Read by EthanolInhibition as the wall E_max in f = (1 - E/E_max)^n. CAVEAT on tier: the VALUE is the strain's well-corroborated max-ABV spec (the same strain Coleman fitted), and the semantics line up (max ABV achievable ~ where rate->0 = E_max); but the Luong-wall FORM is our modelling choice, not Coleman's (they instead use an ethanol-driven death term k_d = k'_d*E). A 24 Brix must makes ~135 g/L ethanol at dryness, so this tolerance lets the strain finish - consistent with reality and NOT reverse-engineered from the benchmark."

ethanol_inhibition_exponent:
  value: 2.0
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 1.0, high: 3.0, note: "Levenspiel/Luong toxic-power exponent" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae; Levenspiel 1980 / Luong 1985 inhibition form"
    notes: "Exponent n in f = (1 - E/E_max)^n applied to the fermentative uptake flux. n=1 is the raw linear (Ghose-Tyagi) form with a derivative kink at E_max; de Andres-Toro et al. 1998 use exactly this n=1 wall (f = 1 - E/(0.5*S0)) for beer. We keep n=2 so the touchdown is C1-smooth for the BDF solver and gives a 'tolerant then collapse' viability shape; the form has literature backing but the exponent itself is our numerical choice, hence speculative."

# -- Ethanol-driven cell inactivation (the timescale brake, decision D-13) -----
# Coleman split biomass into active cells X_A and modelled an ethanol-proportional
# specific death rate (their eqs 2, 7): dX_A/dt = mu*X_A - k_d*X_A, k_d = k'_d*E.
# This cumulative loss of viable (catalytic) biomass is what sets a wine's 10-14
# day timescale; it REPLACES the instantaneous Luong wall as the validated-core
# ethanol brake (D-13). Read by EthanolInactivation, which moves mass X -> X_dead.

k_prime_d:
  value: 4.28e-5
  unit: "(g/L)^-1 h^-1"   # k_d = k'_d * E has units 1/h
  tier: plausible
  uncertainty: { low: 3.0e-5, high: 4.4e-4, note: "11 C -> 3.0e-5, 35 C -> 4.4e-4 (factor ~15, matching the paper's stated ~13x); quadratic in T" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884, Table A2"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must, 20 C; Table A2 ln(k'_d) = -9.81 - 0.108*T + 0.00478*T^2 (T in degC, QUADRATIC; a1 exponent typo-corrected - see notes)"
    notes: >-
      Evaluated at T_ref = 20 C: exp(-9.81 - 0.108*20 + 0.00478*400) = exp(-10.06)
      = 4.28e-5 (g/L)^-1 h^-1. At E=100 g/L this gives k_d = 4.3e-3/h (viable-cell
      half-life ~160 h) - the gentle tail brake that lets a 20 C ferment finish.
      Verified by reconstruction: this value reproduces Coleman's own Fig 6c
      completion at 20 C, whereas the as-printed a1 (below) stalls even their model
      at ~108 g/L residual.
      PUBLISHED-TYPO CORRECTION (a1 exponent): Table A2 prints the a1 MEAN for
      Log(k'_d) as -1.08e-3, but its printed 95% credible region is
      [-1.94e-1, -3.30e-2] (centre -1.13e-1, half-width 8.1e-2). The corrected
      -1.08e-1 sits essentially AT that centre (where a near-symmetric posterior's
      mean belongs); the as-printed -1.08e-3 lands ~1.4 half-widths beyond the upper
      bound, on the OPPOSITE side of the interval. The journal typesetting dropped
      the x10^n exponent from the a1 mean column; the true value is -1.08e-1. Three
      independent checks confirm:
      (1) -1.08e-1 reproduces the paper's stated ~13x rise in k'_d from 11->35 C
      (the as-printed -1.08e-3 gives 191x); (2) it keeps k'_d(35 C)=4.4e-4 under
      Fig 3b's 6e-4 axis (the as-printed value overshoots to 1.8e-2, ~30x off the
      plotted scale); (3) the IDENTICAL defect appears in the Log(Y_X/N) row
      (printed a1 mean -3.61 vs its CR [-4.35e-3, -2.93e-3]; corrected -3.61e-3
      reproduces Fig 4), so it is a systematic typesetting fault, not a one-off.
      k'_d is the only QUADRATIC Coleman parameter and the steepest T-dependence -
      why high temperature drives stuck fermentations. M1 is isothermal at 20 C so
      no Arrhenius modifier is attached (the quadratic does not reduce to a single
      activation energy anyway)."

# -- Arrhenius temperature dependence (per-rate, decision D-11) ----------------
# f = exp(-(E_a/R)(1/T - 1/T_ref)), normalised so the rate constant is used
# unscaled at T_ref. Coleman models temperature as a log-linear regression in T,
# not Arrhenius; we convert the local sensitivity to an equivalent activation
# energy at T_ref: matching d(ln rate)/dT gives E_a = a1 * R * T_ref^2, where a1
# is Coleman's Table A2 slope and R = 8.314462618 J/(mol K). See D-12.

E_a_growth:
  value: 55900.0
  unit: "J/mol"
  tier: plausible
  uncertainty: { low: 49000.0, high: 63000.0, note: "from Coleman a1 95% credible region 0.0698-0.0879 /degC" }
  provenance:
    source: "Derived from Coleman, Fish & Block 2007 (doi:10.1128/aem.00670-07), Table A2 ln(mu_max) slope"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; equivalent Arrhenius E_a at T_ref = 293.15 K"
    notes: "E_a = a1*R*T_ref^2 = 0.0782 * 8.314462618 * 293.15^2 = 55,900 J/mol (~Q10 2.1 near 20 C, biologically standard). Coleman's growth is slightly MORE temperature-sensitive than uptake (a1 0.0782 vs 0.0771)."

E_a_uptake:
  value: 55100.0
  unit: "J/mol"
  tier: plausible
  uncertainty: { low: 47000.0, high: 63000.0, note: "from Coleman beta_max a1 95% CR 0.0666-0.0885 /degC" }
  provenance:
    source: "Derived from Coleman, Fish & Block 2007 (doi:10.1128/aem.00670-07), Table A2 ln(beta_max) slope"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; equivalent Arrhenius E_a at T_ref = 293.15 K"
    notes: "E_a = a1*R*T_ref^2 = 0.0771 * 8.314462618 * 293.15^2 = 55,100 J/mol. A SEPARATE parameter from E_a_growth (the per-rate design lets them diverge); here they are close because Coleman's mu_max and beta_max regressions have nearly equal slopes."

T_ref:
  value: 293.15
  unit: "K"
  tier: plausible
  uncertainty: { low: 288.15, high: 298.15, note: "the temperature the rate constants are anchored to" }
  provenance:
    source: "Coleman, Fish & Block 2007 regression evaluation temperature (doi:10.1128/aem.00670-07)"
    doi: "10.1128/aem.00670-07"
    conditions: "20 C: the temperature at which mu_max and q_sugar_max are read off Coleman's T-regressions, and the wine benchmark temperature"
    notes: "Reference temperature in f = exp(-(E_a/R)(1/T - 1/T_ref)); at T = T_ref the rate constants above are used unscaled. Shared by the growth and uptake Arrhenius modifiers (D-11). 20 C is the temperature mu_max/q_sugar_max are evaluated at, so by construction the Arrhenius factor is 1 there."

# -- Biomass elemental composition (decision D-8) -----------------------------
# Empirical, shared with the growth Process and the carbon/nitrogen conservation
# checks (single source of truth). Dry-yeast formula CH1.8O0.5N0.2 (FW ~24.6):
#   C fraction = 12.011 / 24.626 = 0.488;  N fraction = 0.2*14.007 / 24.626 = 0.114.
# Corroborated by Coleman 2007: their Y_X/N ~ 9-10 g cell / g N at normal nitrogen
# implies an N fraction of ~0.10-0.11, consistent with 0.114.

biomass_C_fraction:
  value: 0.488
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.44, high: 0.50, note: "varies with growth conditions" }
  provenance:
    source: "canonical yeast elemental formula CH1.8O0.5N0.2 (Roels 1983; Heijnen)"
    conditions: "S. cerevisiae dry cell weight, carbon mass fraction"
    notes: "Well-supported across the bioprocess literature; not yet validated against our own curves."

biomass_N_fraction:
  value: 0.114
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.08, high: 0.14, note: "C:N ~4-9 depending on N status" }
  provenance:
    source: "canonical yeast elemental formula CH1.8O0.5N0.2 (Roels 1983; Heijnen)"
    conditions: "S. cerevisiae dry cell weight, nitrogen mass fraction"
    notes: "The N-REPLETE elemental reference (the regression below gives ~0.114 near 370 mg N/L). Drops under nitrogen limitation; the textbook stuck-ferment regime sits at the low end. Coleman 2007 Y_X/N ~ 9-10 g/g at normal N corroborates (1/9.5 = 0.105). For wine this static value is RECOMPUTED at compile from the Coleman Y_X/N(N_init) regression below, evaluated at the scenario's YAN (decision D-14); it is used as-is only when that regression is absent (e.g. beer)."

# -- Nitrogen-dependent biomass yield (decision D-14) -------------------------
# Coleman Fig 4 / Table A2: the cell-mass-per-nitrogen yield Y_X/N is NOT a
# constant. It rises sharply as initial YAN falls because nitrogen-starved cells
# are elementally nitrogen-poorer, so each gram of N builds more dry mass. Coleman
# regress the natural log of Y_X/N linearly on the INITIAL nitrogen (mg N/L), not
# on temperature:
#     ln(Y_X/N [g cell / g N]) = a0 + a1 * N_init(mg/L)
# The compile seam evaluates this at the scenario's YAN and sets
#     biomass_N_fraction = 1 / Y_X/N
# (in our model all assimilated nitrogen enters biomass, so Y_X/N = 1/f_N
# identically). The nitrogen atom balance stays exact because the SAME f_N feeds
# the growth Process and the total_nitrogen conservation check. This regression
# cannot be pre-baked into a single value the way the temperature regressions are
# (T_ref is fixed at 20 C; the nitrogen evaluation point is scenario-specific), so
# it is the one parameter computed at the compile boundary - see docs/DECISIONS.md
# (D-14). Without this, a nitrogen-limited must builds too little biomass and our
# wine model STICKS where Coleman's finishes (the D-13 "uptake-speed gap" was a
# misdiagnosis: at ample N our model already matches Coleman to ~10%).

biomass_N_yield_log_intercept:
  value: 3.50
  unit: "dimensionless"   # a0 in ln(Y_X/N [g cell / g N]) = a0 + a1*N_init(mg/L)
  tier: plausible
  uncertainty: { low: 3.31, high: 3.70, note: "Table A2 Log(Y_X/N) a0 5%-95% credible region" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884, Table A2 + Fig 4"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; intercept of the ln(Y_X/N) regression on initial nitrogen"
    notes: "exp(3.50) = 33.1 g cell/g N is the (unphysical) zero-nitrogen extrapolation; the slope below pulls it down across the real 70-350 mg N/L range. Checks: at 330 mg N/L (Coleman normal-N) Y_X/N = exp(3.50 - 3.61e-3*330) = 10.1 g/g; at 80 mg N/L (low-N) = 24.8 g/g - both match Fig 4."

biomass_N_yield_log_slope:
  value: -3.61e-3
  unit: "(mg N/L)^-1"
  tier: plausible
  uncertainty: { low: -4.35e-3, high: -2.93e-3, note: "Table A2 Log(Y_X/N) a1 5%-95% CR; typo-corrected exponent" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884, Table A2 + Fig 4"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; slope of the ln(Y_X/N) regression on initial nitrogen (mg/L)"
    notes: >-
      PUBLISHED-TYPO CORRECTION - the IDENTICAL defect already established for k'_d
      (decision D-13). Table A2 prints the a1 mean for Log(Y_X/N) as -3.61, but its
      95% credible region is [-4.35e-3, -2.93e-3]; -3.61 lies ~3 orders of magnitude
      outside it. The journal typesetting dropped the x10^n exponent from the mean
      column, so the true value is -3.61e-3 (it sits at the centre of the CR and
      reproduces Fig 4 at both 80 mg/L -> 24.8 g/g and 330 mg/L -> 10.1 g/g). The
      as-printed -3.61 would collapse Y_X/N to ~0 by 2 mg N/L, which is absurd.

# -- Temperature-/metabolism-driven aroma byproducts (Milestone 2, decision D-19) --
# Esters and fusel (higher) alcohols: trace pools whose run-integrated total RISES with
# temperature (warm ferments are estery/fusel-heavy). SOURCED in the D-19 sourcing step
# (2026-06-30): the load-bearing E_a ORDERING is now backed by the literature; the rate
# MAGNITUDES (k_ester/k_fusel) and the exact E_a values remain speculative
# order-of-magnitude targets (directional validation only - handoff §3.5).
#
# THE ORDERING IS SOURCED, THE MAGNITUDE IS NOT - and the split is deliberate:
#   * de Andres-Toro et al. 1998 (Math. Comput. Simul. 48(1):65-74), the canonical beer
#     byproduct model, ties ETHYL ACETATE (an ester, and exactly our `ethyl_acetate`
#     booking species) to the yeast GROWTH rate: dC_EA/dt = Y_EA * mu_x * X_A, with BOTH
#     Y_EA AND mu_x strongly-T-increasing Arrhenius factors. Read IN-SOURCE via the open
#     CC-BY reproduction Pilarski & Gerogiorgis 2022 (Processes 10(11):2400,
#     doi:10.3390/pr10112400) Table 1, which transcribes de Andres-Toro's parameters
#     verbatim [form mu_i0 = exp(A_i + B_i/T), T in K; apparent E_a = -B_i*R]:
#       Y_EA  (ester yield)  A=89.92,  B=-26589  -> apparent E_a ~ 221 kJ/mol
#       mu_X0 (growth)       A=108.31, B=-31934  -> apparent E_a ~ 265 kJ/mol
#     So ester formation is FAR more temperature-sensitive than the fermentative flux:
#     the ORDERING (E_a_ester > E_a_uptake) is robustly supported by a real fitted model.
#   * But the de Andres-Toro MAGNITUDE does NOT transfer to our constraint. Its ester
#     rides on growth, while its own sugar-uptake term mu_S0 (A=-41.92, B=+11654) has a
#     NEGATIVE apparent E_a (~ -97 kJ/mol; sugar uptake falls with T in that fit). Its
#     internal dE_a (ester minus its flux) is ~480 kJ/mol within a model whose flux E_a
#     is negative - incommensurable with our +55,100 J/mol Coleman uptake E_a. Lifting
#     its ester E_a and differencing against Coleman would splice two incompatible
#     models. de Andres-Toro's apparent E_a's are also lumped empirical-fit artifacts
#     (growth ~265, ethanol ~10.5, sugar ~-97 kJ/mol - none physical), so we do NOT
#     transcribe their magnitude.
#   * MAGNITUDE: held GENERIC and beer-grounded at ~80 kJ/mol (a modest dE_a ~25 kJ/mol
#     above E_a_uptake), NOT split per medium. For BEER this matches the warmer-is-more
#     consensus (de Andres-Toro; ales estery when warm). For WINE the picture is more
#     complex - and the honest answer is that an E_a is the WRONG lever. Primary wine data
#     now read in-source (Mouret et al. 2015, Biochem. Eng. J. 103:211-218,
#     doi:10.1016/j.bej.2015.07.017; Rollero/Mouret et al. 2014, Appl. Microbiol.
#     Biotechnol. 99:2291-2304, doi:10.1007/s00253-014-6210-9) show wine ester SYNTHESIS
#     (total production, via gas-liquid balances) is WEAK and NON-MONOTONIC in temperature
#     (isoamyl acetate quadratic, lowest ~24 C; ethyl hexanoate ~T-INDEPENDENT). The
#     strong DECREASE of wine ester LIQUID concentration with temperature is LARGELY
#     EVAPORATION ("Evaporation largely accounted for the effect of temperature on the
#     accumulation of esters in liquid" - Rollero 2014) - a gas-stripping sink this model
#     does NOT yet simulate. So NO value of E_a_esters reproduces wine ester behaviour;
#     the missing physics is a volatilization loss term (FUTURE WORK, see D-19). For WINE
#     the "warmer => more aroma" benchmark direction is therefore carried by the FUSELS,
#     not the esters. We keep one generic E_a_esters > E_a_uptake (beer-grounded) and tell
#     this wine truth in the E_a_esters note: citing Mouret/Rollero as supporting a wine
#     ester RISE would be false provenance (they show the opposite for liquid, ~flat for
#     synthesis); a generic value with an explicit "wine differs, here's how" note is not.
#
# CARBON ACCOUNTING - option (a)/a1 (decision D-19): the ester/fusel Processes route
# their carbon OUT OF SUGAR (booked as ethyl acetate / isoamyl alcohol) and total_carbon
# weights the pools, so they are real carbon-accounted state under one rule with Gly/Byp.
# The Byp double-count is resolved by carving higher alcohols out of Y_byproduct_sugar
# above (Byp = organic acids/polyols only now). Both carbon sources are bookkeeping
# stand-ins: the Ehrlich fusel skeleton is amino-acid carbon (N carries none in the
# ledger) and an ester's ethanol moiety is already counted in E - exact on the ledger,
# approximate on the metabolism.
#
# KEY ORDERING CONSTRAINT (decision D-19): each E_a below must EXCEED E_a_uptake
# (55,100 J/mol). The run-integrated byproduct total scales as
# exp(-((E_a_byproduct - E_a_uptake)/R)(1/T - 1/T_ref)); only when the difference is
# positive does the total RISE with temperature (i.e. fall off toward colder T - the
# "cleaner when colder" half of the benchmark). This ordering is consistent with the
# de Andres-Toro ester/growth coupling above and the brewing consensus, NOT a
# first-principles claim about elementary-step activation energies.

k_ester:
  value: 4.0e-4
  unit: "1/h"   # d(esters)/dt = k_ester * X * S/(K_su+S) * f(T); per-biomass ester rate
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 1.0e-3, note: "order-of-magnitude target for total esters ~50-200 mg/L at 20 C" }
  provenance:
    source: "author estimate bounded by typical wine ester levels; structurally after de Andres-Toro et al. 1998 (ethyl acetate ~ growth flux), read via Pilarski & Gerogiorgis 2022 (doi:10.3390/pr10112400)"
    conditions: "S. cerevisiae wine; ester synthesis coupled to the biomass-catalysed sugar flux"
    notes: "Read by EsterSynthesis as the specific ester-formation rate on the fermentative-flux Monod shape (shares K_sugar_uptake). At T_ref the run-integrated total is ~ (k_ester/q_sugar_max)*S0 ~ (4e-4/0.85)*245 ~ 0.12 g/L (~120 mg/L), within the typical 50-200 mg/L range for total wine esters (ethyl acetate dominant). SPECULATIVE on magnitude: de Andres-Toro forms ethyl acetate as Y_EA*mu_x*X_A (a different coupling and unit system from our flux-coupled k_ester), so it gives no directly-transferable rate constant - we keep an order-of-magnitude target landing the trace in the right band, not a sourced fit. The wine aroma model Mouret 2015 BEJ (doi:10.1016/j.bej.2015.07.017) is now read, but it parameterises aroma as two-phase production YIELDS from sugar, linear in T and N0 (not a per-flux Arrhenius rate), so it too yields no constant transferable to our k_ester form."

E_a_esters:
  value: 55100.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 40000.0, high: 70000.0, note: "WINE: set ~ E_a_uptake (55,100) so run-integrated synthesis is ~T-INDEPENDENT - the Arrhenius representation of Mouret's flat/weak wine ester production. Held BELOW the stripping sensitivity (E_a_uptake + dH_ester_volatil ~ 100k) so the sink makes LIQUID esters fall with T. Contrast beer's ~200k" }
  provenance:
    source: "WINE-specific, sourced from primary wine data: Mouret 2015 (doi:10.1016/j.bej.2015.07.017) + Rollero/Mouret 2014 (doi:10.1007/s00253-014-6210-9) - wine ester SYNTHESIS (total production) is WEAK and NON-MONOTONIC in temperature (i.e. ~flat over the ferment)"
    conditions: "S. cerevisiae wine; equivalent Arrhenius activation energy at T_ref = 293.15 K"
    notes: "D-21 REVISION (was a generic beer-grounded 80,000 under D-19): the wine/beer ester direction lives HERE, in synthesis, not in the gas-stripping sink (medium-independent once sourced - see dH_ester_volatil). MAPPING (principled, not a coincidence): run-integrated synthesis scales as arrh(E_a_esters)/arrh(E_a_uptake) (the bare-flux integral to dryness is fixed by total sugar), so it is ~T-INDEPENDENT exactly when E_a_esters ~ E_a_uptake. Mouret 2015 reports wine ester synthesis (TOTAL production) is WEAK / non-monotonic in T (isoamyl acetate quadratic, lowest ~24 C; ethyl hexanoate ~T-independent) - so we set E_a_esters ~ E_a_uptake (55,100). The physical gas-stripping sink (sensitivity E_a_uptake + dH_ester_volatil ~ 100 kJ/mol) is then STEEPER than synthesis, so it OUTRUNS synthesis on the LIQUID and wine liquid esters FALL with T (Rollero 2014 evaporation inversion), while total production stays ~flat and the stripped fraction (esters_gas) RISES with T - WITHOUT any fudged stripping E_a (the D-20 approach, retired). The warmer=>more-aroma direction for wine is carried by the FUSELS. SPECULATIVE magnitude (the flat-production direction is sourced; the exact value is not). Verified empirically (14/20/25 C): wine liquid esters fall ~73/61/50 mg/L, total ~flat 114 mg/L, gas rises 41->64."

k_fusel:
  value: 2.5e-3
  unit: "1/h"   # d(fusels)/dt = k_fusel * X * S/(K_su+S) * N/(K_n+N) * f(T)
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 1.0e-2, note: "order-of-magnitude target; trace total fusels (our run ~0.05-0.15 g/L), low end of the 150-400 mg/L wine higher-alcohol range" }
  provenance:
    source: "author estimate bounded by typical wine higher-alcohol levels; N-gate structure corroborated by Mouret 2015 (doi:10.1016/j.bej.2015.07.017) + Rollero/Mouret 2014 (doi:10.1007/s00253-014-6210-9)"
    conditions: "S. cerevisiae wine; Ehrlich fusel formation, nitrogen-gated on the fermentative flux"
    notes: "Read by FuselAlcoholsEhrlich. Higher than k_ester because the N-gate (N/(K_n+N)) front-loads fusel formation into the nitrogen-replete early ferment and so cuts the production window short - the larger rate compensates. Total wine higher alcohols are ~150-400 mg/L; our N-gated trace lands ~0.05-0.15 g/L (low end), front-loaded as Mouret/Sablayrolles observe (higher alcohols are maximal once N is exhausted at the end of growth, ~30% sugar consumption). SPECULATIVE order-of-magnitude target - the WEAKEST-sourced k of the four: no kinetic model of OUR per-flux form exists (de Andres-Toro has no fusel term; Mouret's is a yield-from-sugar form). CORROBORATION (D-19 sourcing step): Mouret 2015 + Rollero 2014 confirm higher-alcohol synthesis is OPTIMAL at ~200-300 mg N/L and NON-MONOTONIC in nitrogen - exactly the non-monotonic-N behaviour our FuselAlcoholsEhrlich knowingly simplifies to a single monotone branch (the documented reason that Process stays speculative)."

E_a_fusels:
  value: 70000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 60000.0, high: 250000.0, note: "all > E_a_uptake (55,100); below E_a_esters as the ester/fusel ratio rises with T" }
  provenance:
    source: "Direction sourced from primary wine data (Mouret 2015, doi:10.1016/j.bej.2015.07.017: higher alcohols generally produced in larger amounts at higher temperature) + brewing/enology consensus (warmer => accelerated Ehrlich amino-acid conversion => more fusels). No fusel kinetic model of our form exists (de Andres-Toro has no fusel term)"
    conditions: "S. cerevisiae wine; equivalent Arrhenius activation energy at T_ref = 293.15 K"
    notes: "Sets the temperature sensitivity of Ehrlich fusel formation (Q10 ~ 2.6 near 20 C; +36% per 15 C). Held ABOVE E_a_uptake (55,100 J/mol) so total fusels rise with T (section header), and slightly BELOW E_a_esters because warmth shifts the balance toward esters (the fusel/ester ratio falls with T). This is the FUSEL half of the wine benchmark direction - and unlike the wine esters (whose warmer=>more is confounded by evaporation; see E_a_esters), the fusel direction IS supported for total production: Mouret 2015 reports higher alcohols generally rise with T (though compound-specific/non-systematic). ORDERING (> E_a_uptake) is the sourced, load-bearing constraint; the exact magnitude is speculative and banded - no kinetic source measures a fusel-formation activation energy in our form, so this is a bounded estimate, not a fit."

# -- ESTER VOLATILIZATION (PHYSICAL Henry's-law gas-stripping sink, decision D-21) -----
# EsterVolatilization strips liquid `esters` into the `esters_gas` headspace pool on the
# evolving-CO2 stream:
#   d(esters)/dt -= k_ester_volatil * X*S/(K_su+S) * f_gas(T) * f_part(T) * esters
#     f_gas(T)  = arrhenius(T, E_a_uptake)        -> the CO2 GAS FLOW (rides Arrhenius-scaled uptake)
#     f_part(T) = arrhenius(T, dH_ester_volatil)  -> the gas/liquid PARTITION (van't Hoff Henry's-law)
# So the stripping T-sensitivity is E_a_uptake + dH_ester_volatil ~ 100 kJ/mol - and CRUCIALLY
# this is PHYSICAL and MEDIUM-INDEPENDENT (Morakul et al. 2011: the partition coefficient
# depends only on composition + temperature, the same molecule in wine and beer).
#
# D-21 SUPERSEDES D-20: D-20 used a FUDGED per-medium E_a_ester_volatil (wine 130k / beer 40k)
# to invert wine while keeping beer rising. But a SOURCED Henry's-law stripping is the same
# in both media, so it CANNOT give opposite directions alone. The wine/beer direction
# therefore lives in SYNTHESIS E_a_esters (sourced per medium: wine flat ~15k / beer steep
# ~200k), and the stripping is one shared physical mechanism. dH_ester_volatil is the SOURCED
# ethyl-acetate partition enthalpy; E_a_ester_volatil (the fudge) is RETIRED.
# Verified empirically (14/20/25 C): wine liquid esters fall ~103/61/38 mg/L; beer rise.
k_ester_volatil:
  value: 5.0e-3
  unit: "L/(g*h)"   # stripping coeff: folds q_sugar_max*co2_yield*scale*(gas-volume/Henry-prefactor) into one constant
  tier: speculative
  uncertainty: { low: 1.0e-3, high: 2.0e-2, note: "order-of-magnitude target; with the physical stripping T-sensitivity it lands wine liquid esters ~50-100 mg/L (most produced ester is stripped to esters_gas, the evaporation-dominated fate Rollero reports)" }
  provenance:
    source: "author estimate (the absolute stripping efficiency / gas-volume prefactor is not separately sourced). Mechanism + loss form per Morakul et al. 2011 (Process Biochem 46:1125-1131, gas-liquid balance, L = integral of C_gas*Q_CO2 dt) and Rollero/Mouret 2014 (doi:10.1007/s00253-014-6210-9)"
    conditions: "S. cerevisiae wine; ester stripping coupled to the CO2-evolution (fermentative-flux x arrhenius(E_a_uptake)) proxy, first-order in liquid ester"
    notes: "Read by EsterVolatilization as the stripping coefficient. The T-DEPENDENCE is now physical+sourced (E_a_uptake gas flow + dH_ester_volatil partition); this constant only sets the absolute stripping MAGNITUDE (folding q_sugar_max, co2_yield, the realised-yield scale, the gas molar volume and the Henry prefactor into one number, since the bare flux shape omits them). SPECULATIVE order-of-magnitude target. Verified empirically (14/20/25 C): wine liquid esters ~103/61/38 mg/L (fall with T) as the gas pool fills."

dH_ester_volatil:
  value: 45000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 55000.0, note: "ethyl-acetate gas/liquid partition enthalpy; Q10 ~ 1.8 at 20 C - a PHYSICAL volatility value, not a fitted lever. Same in wine and beer (molecule property)" }
  provenance:
    source: "Ethyl-acetate Henry's-law solubility constant temperature dependence d(ln kH)/d(1/T) ~ 5300-5700 K (NIST Chemistry WebBook / Sander compilation, doi:10.5194/acp-15-4399-2015) => dissolution enthalpy ~ -46 kJ/mol => gas/liquid partition rises with T with effective enthalpy ~ +45 kJ/mol"
    conditions: "ethyl acetate, gas/liquid (air/water) partition; van't Hoff form anchored at T_ref = 293.15 K"
    notes: "Sets how steeply the ethyl-acetate gas/liquid partition (Henry's-law constant) rises with temperature - the PHYSICAL volatility lever that replaced D-20's fudged E_a_ester_volatil. d(ln kH)/d(1/T) ~ 5500 K (NIST/Sander) gives a dissolution enthalpy ~ -46 kJ/mol, so the air/water partition coefficient rises with T with effective enthalpy ~ +45 kJ/mol (Q10 ~ 1.8) - a real, physical Henry's-law value, NOT tuned to invert wine. MEDIUM-INDEPENDENT (a property of the molecule): the SAME value is used in beer_generic.yaml. The wine/beer direction comes from synthesis E_a_esters, not this. SIMPLIFICATION: the full Morakul 2011 partition is also ethanol-dependent (ln k_i = F1 + F2*E - (F3+F4*E)*R*(1000/T - 1000/T_ref)); we keep only the dominant temperature (van't Hoff) lever and omit the ethanol terms (the F coefficients are not openly available). SPECULATIVE tier because the simplification + the abs value transfer are not fully validated, though the enthalpy itself is sourced."
