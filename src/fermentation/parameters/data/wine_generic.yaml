# -- Temperature-/metabolism-driven aroma byproducts (Milestone 2, decision D-19) --
# Esters and fusel (higher) alcohols: trace pools whose run-integrated total RISES with
# temperature (warm ferments are estery/fusel-heavy). SOURCED in the D-19 sourcing step
# (2026-06-30): the load-bearing E_a ORDERING is now backed by the literature; the rate
# MAGNITUDES (k_ester/k_fusel) and the exact E_a values remain speculative
# order-of-magnitude targets (directional validation only - handoff §3.5).
#
# THE ORDERING IS SOURCED, THE MAGNITUDE IS NOT - and the split is deliberate:
#   * de Andres-Toro et al. 1998 (Math. Comput. Simul. 48(1):65-74), the canonical beer
#     byproduct model, ties ETHYL ACETATE (an ester, and exactly our `ethyl_acetate`
#     booking species) to the yeast GROWTH rate: dC_EA/dt = Y_EA * mu_x * X_A, with BOTH
#     Y_EA AND mu_x strongly-T-increasing Arrhenius factors. Read IN-SOURCE via the open
#     CC-BY reproduction Pilarski & Gerogiorgis 2022 (Processes 10(11):2400,
#     doi:10.3390/pr10112400) Table 1, which transcribes de Andres-Toro's parameters
#     verbatim [form mu_i0 = exp(A_i + B_i/T), T in K; apparent E_a = -B_i*R]:
#       Y_EA  (ester yield)  A=89.92,  B=-26589  -> apparent E_a ~ 221 kJ/mol
#       mu_X0 (growth)       A=108.31, B=-31934  -> apparent E_a ~ 265 kJ/mol
#     So ester formation is FAR more temperature-sensitive than the fermentative flux:
#     the ORDERING (E_a_ester > E_a_uptake) is robustly supported by a real fitted model.
#   * But the de Andres-Toro MAGNITUDE does NOT transfer to our constraint. Its ester
#     rides on growth, while its own sugar-uptake term mu_S0 (A=-41.92, B=+11654) has a
#     NEGATIVE apparent E_a (~ -97 kJ/mol; sugar uptake falls with T in that fit). Its
#     internal dE_a (ester minus its flux) is ~480 kJ/mol within a model whose flux E_a
#     is negative - incommensurable with our +55,100 J/mol Coleman uptake E_a. Lifting
#     its ester E_a and differencing against Coleman would splice two incompatible
#     models. de Andres-Toro's apparent E_a's are also lumped empirical-fit artifacts
#     (growth ~265, ethanol ~10.5, sugar ~-97 kJ/mol - none physical), so we do NOT
#     transcribe their magnitude.
#   * MAGNITUDE: held GENERIC and beer-grounded at ~80 kJ/mol (a modest dE_a ~25 kJ/mol
#     above E_a_uptake), NOT split per medium. For BEER this matches the warmer-is-more
#     consensus (de Andres-Toro; ales estery when warm). For WINE the picture is more
#     complex - and the honest answer is that an E_a is the WRONG lever. Primary wine data
#     now read in-source (Mouret et al. 2015, Biochem. Eng. J. 103:211-218,
#     doi:10.1016/j.bej.2015.07.017; Rollero/Mouret et al. 2014, Appl. Microbiol.
#     Biotechnol. 99:2291-2304, doi:10.1007/s00253-014-6210-9) show wine ester SYNTHESIS
#     (total production, via gas-liquid balances) is WEAK and NON-MONOTONIC in temperature
#     (isoamyl acetate quadratic, lowest ~24 C; ethyl hexanoate ~T-INDEPENDENT). The
#     strong DECREASE of wine ester LIQUID concentration with temperature is LARGELY
#     EVAPORATION ("Evaporation largely accounted for the effect of temperature on the
#     accumulation of esters in liquid" - Rollero 2014) - a gas-stripping sink this model
#     does NOT yet simulate. So NO value of E_a_esters reproduces wine ester behaviour;
#     the missing physics is a volatilization loss term (FUTURE WORK, see D-19). For WINE
#     the "warmer => more aroma" benchmark direction is therefore carried by the FUSELS,
#     not the esters. We keep one generic E_a_esters > E_a_uptake (beer-grounded) and tell
#     this wine truth in the E_a_esters note: citing Mouret/Rollero as supporting a wine
#     ester RISE would be false provenance (they show the opposite for liquid, ~flat for
#     synthesis); a generic value with an explicit "wine differs, here's how" note is not.
#
# CARBON ACCOUNTING - option (a)/a1 (decision D-19): the ester/fusel Processes route
# their carbon OUT OF SUGAR (booked as ethyl acetate / isoamyl alcohol) and total_carbon
# weights the pools, so they are real carbon-accounted state under one rule with Gly/Byp.
# The Byp double-count is resolved by carving higher alcohols out of Y_byproduct_sugar
# above (Byp = organic acids/polyols only now). Both carbon sources are bookkeeping
# stand-ins: the Ehrlich fusel skeleton is amino-acid carbon (N carries none in the
# ledger) and an ester's ethanol moiety is already counted in E - exact on the ledger,
# approximate on the metabolism.
#
# KEY ORDERING CONSTRAINT (decision D-19): each E_a below must EXCEED E_a_uptake
# (55,100 J/mol). The run-integrated byproduct total scales as
# exp(-((E_a_byproduct - E_a_uptake)/R)(1/T - 1/T_ref)); only when the difference is
# positive does the total RISE with temperature (i.e. fall off toward colder T - the
# "cleaner when colder" half of the benchmark). This ordering is consistent with the
# de Andres-Toro ester/growth coupling above and the brewing consensus, NOT a
# first-principles claim about elementary-step activation energies.

# --- The three ester synthesis rates (decision D-96) -------------------------------------
# Each k is anchored INDEPENDENTLY to its own molecule's measured range in wine. This is the
# load-bearing discipline of D-96: the pre-D-96 single `k_ester` filled one lumped pool whose
# mass was booked as ethyl acetate but whose OAV was read against isoamyl acetate's threshold,
# making the fruity OAV non-physical (~761, implying ~23 mg/L isoamyl acetate against a real
# ceiling of ~1-3). Splitting that one k by a fitted 97/3-style ratio would have reproduced
# plausible numbers while smuggling back exactly the fabricated composition constant the split
# exists to remove. So the lump's composition and the total ester mass are DERIVED from three
# independently-sourced rates, never targeted. Each k inverts the run-integrated identity
# ~ (k/q_sugar_max)*S0 at that molecule's own target, then is trimmed for the stripping sink.

k_ethyl_acetate:
  value: 3.3e-4
  unit: "1/h"   # d(ethyl_acetate)/dt = k_ethyl_acetate * X * S/(K_su+S) * f(T)
  tier: speculative
  uncertainty: { low: 2.0e-4, high: 5.5e-4, note: "band spans ethyl acetate ~30-80 mg/L in the finished wine, its own typical range in sound wine" }
  provenance:
    source: "author estimate bounded by ETHYL ACETATE's own measured range in wine (~30-80 mg/L in sound wine; >150-200 mg/L reads as a volatile-acidity/spoilage fault) - Jackson, Wine Science (3rd ed.); structurally after de Andres-Toro et al. 1998 (ethyl acetate ~ growth flux), read via Pilarski & Gerogiorgis 2022 (doi:10.3390/pr10112400)"
    conditions: "S. cerevisiae wine; ATF1/alcohol-acetyltransferase acetate ester, coupled to the biomass-catalysed sugar flux"
    notes: "Read by EsterSynthesis for the `ethyl_acetate` pool. Anchored to ETHYL ACETATE ALONE, not to a share of a lumped ester total (D-96). Calibrated against the FINISHED wine with the EsterVolatilization sink active (which strips ~45% of the synthesised ester to the headspace at 20 C): a 21-day 24-Brix run at 20 C lands ~50 mg/L liquid, mid-band for this molecule's own 30-80 mg/L range. SPECULATIVE on magnitude: de Andres-Toro form ethyl acetate as Y_EA*mu_x*X_A (a different coupling and unit system from our flux-coupled k), so no directly-transferable rate constant exists; the anchor is this molecule's measured concentration band, not a fitted rate."

k_isoamyl_acetate:
  value: 5.02e-5
  unit: "L/(g*h)"   # d(isoamyl_acetate)/dt = k_isoamyl_acetate * [isoamyl_alcohol] * X * S/(K_su+S) * f(T)
  tier: speculative
  uncertainty: { low: 1.0e-5, high: 1.5e-4, note: "band spans isoamyl acetate ~0.3-4 mg/L, its own typical range in wine (the D-96 band, rescaled x20 at D-97 and x0.502 at D-99 so it pins the same CONCENTRATION span throughout: the rate stays linear in k)" }
  provenance:
    source: "author estimate bounded by ISOAMYL ACETATE's own measured range in wine (~0.1-3 mg/L; Guth 1997, J. Agric. Food Chem. 45:3027-3032 reports ~0.1-1 mg/L in Gewurztraminer/Scheurebe). The rate law's FORM is sourced separately: Fujii et al. 1998, Appl. Environ. Microbiol. 64:4076-4078 (citing Yoshioka & Hashimoto 1981, Agric. Biol. Chem. 45:2183-2190) measures ATF1's Km for isoamyl alcohol at ~29.8 mM vs 0.19 mM for acetyl-CoA, and states that 'a major rate-limiting factor for isoamyl acetate production is the amount of isoamyl alcohol'."
    conditions: "S. cerevisiae wine; ATF1 acetate ester of isoamyl alcohol, FIRST-ORDER in the `isoamyl_alcohol` precursor pool (the molecule itself since D-99, not a lump) and coupled to the biomass-catalysed sugar flux"
    notes: "Read by EsterSynthesis for the `isoamyl_acetate` pool - the BANANA note, and the pool whose OAV D-96 exists to make physical. Anchored to ISOAMYL ACETATE ALONE (D-96), calibrated post-stripping: a 21-day 24-Brix run at 20 C lands ~0.76 mg/L liquid, inside Guth's own 0.1-1 mg/L assay range for this molecule and ~30x below the ~23 mg/L the pre-D-96 lumped reading implied. That this works out to ~1.5% of ethyl acetate is a DERIVED consequence of two independent anchors, not an assumed composition - which is the whole point: the pre-D-96 alternative was to FIT that percentage. D-97 RE-ANCHORED the value 5.0e-6 -> 1.0e-4 (x20, absorbing the ~0.05 g/L `fusels` factor the new precursor term introduces) so the finished wine lands on the SAME 0.758 mg/L: the coupling changes the ester's YAN-response and time shape, NOT its calibration target. D-99 RE-ANCHORED IT AGAIN, 1.0e-4 -> 5.02e-5 (x0.502), for the same reason one decision on: speciating the fusels lump replaced an 86 mg/L stand-in pool with 172 mg/L of ACTUAL isoamyl alcohol, so the precursor factor doubled and the ester would have doubled with it. The factor is EXACT, not fitted: both rates share one shape, so it is just k_fusel_old / k_isoamyl_alcohol_new = 2.5e-3 / 4.98e-3. Same discipline both times - a precursor re-definition must not smuggle in a recalibration. WHY FIRST-ORDER, NOT A SATURABLE Km GATE: the `isoamyl_alcohol` pool runs ~1.95 mM against ATF1's measured Km ~29.8 mM (~15x below; the margin TIGHTENED from ~51x at D-97 because honest anchoring doubled the pool), i.e. still in the [S] << Km limit where the saturable form IS the linear one to ~7%. In that limit only the RATIO Vmax/Km is identifiable - scaling Km 10x and refitting Vmax gives a byte-identical trajectory - so adding the measured Km as a parameter would mint a sourced-looking constant no model output could validate. THIS k IS that identifiable ratio; the Km's real work is justifying the FORM, which is why it lives here in provenance rather than in the store. D-99 RETIRED THIS ENTRY'S LUMP CAVEAT: until then the precursor was a LUMPED pool, so reading it whole over-stated the true isoamyl-alcohol supply (~52% of the lump is actually isoamyl alcohol), the over-statement was absorbed into this k, and the YAN-response rode on the lump's composition being fixed (the D-66 caveat). The term now reads the molecule Fujii actually measured ATF1's Km for - 3-methylbutan-1-ol, CAS 123-51-3, NOT its C5 isomer 2-methylbutan-1-ol, which is a different substrate. What survives is weaker and stated in FUSEL_SPECS: all five alcohols share one N-gate, so the SPECTRUM is still fixed even though this pool is now a real molecule. Deferred: the carbon re-route (this reads `isoamyl_alcohol` but still draws carbon from S)."

k_ethyl_hexanoate:
  value: 2.6e-6
  unit: "1/h"   # d(ethyl_hexanoate)/dt = k_ethyl_hexanoate * X * S/(K_su+S) * f(T)
  tier: speculative
  uncertainty: { low: 6.0e-7, high: 6.5e-6, note: "band spans ethyl hexanoate ~0.1-1 mg/L in the finished wine, its own typical range" }
  provenance:
    source: "author estimate bounded by ETHYL HEXANOATE's own measured range in wine (~0.1-1 mg/L; Guth 1997, J. Agric. Food Chem. 45:3027-3032 reports ~0.4 mg/L, one of the highest-OAV odorants in the wines assayed)"
    conditions: "S. cerevisiae wine; EEB1/EHT1 ethyl ester of a medium-chain fatty acid, coupled to the biomass-catalysed sugar flux"
    notes: "Read by EsterSynthesis for the `ethyl_hexanoate` pool - the APPLE/PINEAPPLE half of the fruity bouquet, added at D-96 so the descriptor axis did not narrow to banana alone when the lump was split. Anchored to ETHYL HEXANOATE ALONE, calibrated post-stripping: a 21-day 24-Brix run at 20 C lands ~0.4 mg/L liquid, matching the Guth 1997 assay value for this molecule. KNOWN SIMPLIFICATION (D-96): this is an EEB1/EHT1 product, a DIFFERENT enzyme from the two ATF1 acetates, yet v1 shares their `E_a_esters` temperature shape because no separate activation energy is sourced. A per-ester E_a is the named deferred refinement; the shared shape is why this pool inherits the wine stripping-dominated temperature inversion."

E_a_esters:
  value: 55100.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 40000.0, high: 70000.0, note: "WINE: set ~ E_a_uptake (55,100) so run-integrated synthesis is ~T-INDEPENDENT - the Arrhenius representation of Mouret's flat/weak wine ester production. Held BELOW the stripping sensitivity (E_a_uptake + dH_ester_volatil ~ 100k) so the sink makes LIQUID esters fall with T. Contrast beer's ~200k" }
  provenance:
    source: "WINE-specific, sourced from primary wine data: Mouret 2015 (doi:10.1016/j.bej.2015.07.017) + Rollero/Mouret 2014 (doi:10.1007/s00253-014-6210-9) - wine ester SYNTHESIS (total production) is WEAK and NON-MONOTONIC in temperature (i.e. ~flat over the ferment)"
    conditions: "S. cerevisiae wine; equivalent Arrhenius activation energy at T_ref = 293.15 K"
    notes: "D-21 REVISION (was a generic beer-grounded 80,000 under D-19): the wine/beer ester direction lives HERE, in synthesis, not in the gas-stripping sink (medium-independent once sourced - see dH_ester_volatil). MAPPING (principled, not a coincidence): run-integrated synthesis scales as arrh(E_a_esters)/arrh(E_a_uptake) (the bare-flux integral to dryness is fixed by total sugar), so it is ~T-INDEPENDENT exactly when E_a_esters ~ E_a_uptake. Mouret 2015 reports wine ester synthesis (TOTAL production) is WEAK / non-monotonic in T (isoamyl acetate quadratic, lowest ~24 C; ethyl hexanoate ~T-independent) - so we set E_a_esters ~ E_a_uptake (55,100). The physical gas-stripping sink (sensitivity E_a_uptake + dH_ester_volatil ~ 100 kJ/mol) is then STEEPER than synthesis, so it OUTRUNS synthesis on the LIQUID and wine liquid esters FALL with T (Rollero 2014 evaporation inversion), while total production stays ~flat and the stripped fraction (esters_gas) RISES with T - WITHOUT any fudged stripping E_a (the D-20 approach, retired). The warmer=>more-aroma direction for wine is carried by the FUSELS. SPECULATIVE magnitude (the flat-production direction is sourced; the exact value is not). Verified empirically (14/20/25 C): wine liquid esters fall ~73/61/50 mg/L, total ~flat 114 mg/L, gas rises 41->64."

# =====================================================================================
# THE FIVE EHRLICH HIGHER-ALCOHOL RATE CONSTANTS (decision D-99)
# =====================================================================================
# These five replace the single lumped `k_fusel`. Each is anchored INDEPENDENTLY to its own
# molecule's measured wine concentration -- never a share of one fitted k_fusel, which would
# have smuggled back the fabricated composition constant the split exists to remove (the D-96
# rule, applied one pool over).
#
# THE ANCHOR: Wang X., Frank S. & Steinhaus M. 2024, J. Agric. Food Chem. 72(40):22250-22257
# (doi:10.1021/acs.jafc.4c06838), Table 2 -- a META-ANALYSIS reporting, per compound, a MEAN
# over N independently published wine studies. Those n's are the evidence and are recorded per
# entry below; they are also why five separately-anchored k's are sourceable at all.
#
# ! THE VALUES ARE MEANS, NOT RANGES. The meta-analysis reports mean+n, not a band. The
#   `uncertainty` bands below are therefore AUTHOR ESTIMATES around a measured mean, not
#   reported bands, and each says so. Do not read them as literature intervals.
#
# THE TOTAL RISES ~3.8x AND THAT IS THE POINT (D-99): the five means sum to ~328 mg/L against
# the old lump's ~86. The old value sat below even the SUM OF THE FIVE SPECIES' LOW ENDS, and
# k_fusel's own note already conceded it ran at "the low end of the 150-400 mg/L wine
# higher-alcohol range". Honest per-molecule anchoring CANNOT land where the lump did. The rise
# is forced by the sourcing, not chosen for an outcome -- it would be identical had no one
# looked at the OAV consequences.
#
# WHAT ALL FIVE STILL SHARE (the honest limit): one N-gate and one E_a_fusels, so the SPECTRUM
# is fixed even though the molecules are now real -- warm or starve the ferment and all five
# scale together. Per-species E_a / per-amino-acid gates would make composition dynamic and are
# DEFERRED as unsourced (see FUSEL_SPECS / fusel_rate_shape).
#
# The Mouret 2015 / Rollero 2014 non-monotonic-N corroboration below applies to ALL FIVE
# equally: it is a property of the Ehrlich pathway this file models with one monotone branch,
# which is why every one of these stays speculative.

