# Generic wine-yeast kinetic parameters — strain Premier Cuvee (S. cerevisiae
# var. bayanus, the Prise de Mousse / EC-1118 strain).
#
# SOURCED (Milestone 1 parameter task). The growth and fermentative-uptake
# constants and their temperature sensitivity come from the keystone wine model:
#
#   Coleman, M. C., Fish, R., & Block, D. E. (2007). "Temperature-Dependent
#   Kinetic Model for Nitrogen-Limited Wine Fermentations." Appl. Environ.
#   Microbiol. 73(18): 5875-5884. doi:10.1128/aem.00670-07.
#
# Coleman's model (their eqs 1-8) is structurally close to ours: growth is Monod
# on nitrogen (mu = mu_max*N/(K_N+N)) and fermentative uptake is Michaelis-Menten
# on sugar. Its parameters are NOT tabulated at single temperatures; they are
# regressions in T (deg C), ln(param) = a0 + a1*T (+ a2*T^2 for k'_d only)
# (Table A2; "Log" is the NATURAL log — confirmed by the paper's own statement
# that mu_max ~ 0.05/h at 11 C, matching exp(-3.92 + 0.0782*11) = 0.047). We
# evaluate each regression at T_ref = 20 C (the wine benchmark temperature). One
# Table A2 exponent is typo-corrected (k'_d a1; see that entry). See
# docs/DECISIONS.md (D-12).
#
# Conditions throughout: Premier Cuvee (Red Star), diluted Chardonnay must,
# 265-300 g/L sugar, 70-350 mg N/L, isothermal 11-35 C.

# -- Growth (Monod, nitrogen-limited) -----------------------------------------

mu_max:
  value: 0.095
  unit: "1/h"
  tier: plausible
  uncertainty: { low: 0.04, high: 0.32, note: "11 C -> 0.047/h, 35 C -> 0.31/h (factor ~6); strain/T-dependent" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must, 20 C; Table A2 regression ln(mu_max) = -3.92 + 0.0782*T(degC)"
    notes: "Evaluated at T_ref = 20 C: exp(-3.92 + 0.0782*20) = 0.095/h. Was placeholder 0.33 (that is ~37 C on this regression). Range spans the measured 11-35 C window."

K_s:
  value: 5.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 25.0, note: "Monod half-saturation for sugar in the GROWTH term" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae, placeholder"
    notes: "Coleman's growth is Monod on nitrogen ONLY (no sugar term), so the literature gives no analogue for our growth-stage sugar co-limitation guard. Kept as a speculative guard that growth cannot proceed once sugar is exhausted; high K_sugar_uptake affinity means it rarely binds. Distinct from K_sugar_uptake (the fermentative-flux constant, which IS sourced)."

K_n:
  value: 0.0088
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 0.003, high: 0.03, note: "half-saturation for YAN; Coleman Fig 5a spread ~0.005-0.03 g/L" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; Table A2 ln(K_N) = -4.73 (found temperature-independent)"
    notes: "exp(-4.73) = 0.00884 g N/L. Nitrogen limitation is the textbook stuck-ferment mechanism. Coleman report K_N as the one growth constant insensitive to T and initial conditions."

# -- Fermentative sugar uptake (Michaelis-Menten, biomass-catalysed) ----------
# Decoupled from growth (decision D-9): ferments to dryness after N runs out.
# Ethanol/CO2 yields are NOT parameters in M1 — the uptake uses the theoretical
# Gay-Lussac split (core.chemistry) so carbon and mass conserve exactly (D-8);
# Y_ethanol_sugar below is the deferred Tier-2 (glycerol-diversion) hook.

q_sugar_max:
  value: 0.85
  unit: "g/g/h"   # g sugar consumed per g biomass per hour
  tier: plausible
  uncertainty: { low: 0.4, high: 2.7, note: "11 C -> 0.43, 35 C -> 2.7 g/g/h; specific fermentative uptake, strain/T-dependent" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must, 20 C; Table A2 ln(beta_max) = -2.30 + 0.0771*T(degC), ln(Y_E/S) = -0.598"
    notes: "Our uptake rate r is SUGAR consumed; Coleman eq 5 gives dS/dt = -(beta_max/Y_E/S)*[S/(K_S+S)]*X_A, so q_sugar_max = beta_max/Y_E/S = exp(-0.758)/exp(-0.598) = 0.469/0.550 = 0.85 g/g/h. (beta_max alone is the specific ETHANOL rate, eq 4; the 'g sugar' label on their Fig 3c is the loose one, eq 5 is authoritative.) CAVEAT for tuning: M1 applies this rate to TOTAL biomass with no active/inactive split, whereas Coleman's active X_A declines late — so M1 will over-catalyse the tail; revisit when fitting curves, do not pre-compensate the value here."

K_sugar_uptake:
  value: 10.3
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 5.0, high: 15.0, note: "Michaelis-Menten constant for sugar transport" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; Table A2 ln(K_S) = 2.33 (temperature-independent)"
    notes: "exp(2.33) = 10.3 g/L; the paper rounds it to '~10 g/liter'. Was placeholder 2.0."

K_repression:
  value: 2.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 5.0, note: "more-preferred-sugar conc. at half catabolite repression" }
  provenance:
    source: "author estimate"
    conditions: "beer wort sequential uptake (glucose > maltose > maltotriose)"
    notes: "Smooth catabolite repression: a higher sugar is suppressed while a more-preferred one remains. The form matches the Gee & Ramirez repression factors K'_G/(K'_G+G) etc.; their numeric constants were not accessible. Beer-only - wine has a single sugar slot, so repression never applies (kept here so the wine and beer files share one parameter set)."

Y_ethanol_sugar:
  value: 0.47
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.46, high: 0.48, note: "realised yield below 0.511 theoretical" }
  provenance:
    source: "Gay-Lussac stoichiometry; realised yield, handoff section 2.1"
    conditions: "after biomass and glycerol diversion"
    notes: "Theoretical max 0.511 g/g; realised 0.46-0.48 is well established. NOT read directly by the uptake Process: rather than swap this lower constant in (which would destroy carbon and double-count the biomass already modelled separately), the realised yield EMERGES from the explicit byproduct diversion below (decision D-16) - Y_glycerol_sugar + Y_byproduct_sugar scale the theoretical split down, giving an emergent realised Y_E ~ 0.487 that cross-checks this 0.47 (within its 0.46-0.48 band). Kept as that documented target/cross-check. NB Coleman's fitted Y_E/S ~0.55 g/g exceeds the 0.511 theoretical maximum (a fitting/measurement artefact), so we anchor to the well-established realised 0.47 rather than their value."

# -- Realised-yield byproduct diversion (decision D-16) ------------------------
# Real ferments divert a few percent of sugar carbon away from ethanol/CO2 into
# glycerol, organic acids and higher alcohols. Rather than lower Y_ethanol_sugar
# (which would destroy carbon), the uptake Process keeps the theoretical Gay-Lussac
# split and routes the diverted carbon into the Gly/Byp state pools, carbon-balanced
# by construction (D-16). These yields are sourced from MEASURED byproduct levels
# (not back-fitted from a target ABV), so the realised Y_E (~0.487) and the wine ABV
# fall out. Both default to 0 in code (theoretical core); beer carries 0.

Y_glycerol_sugar:
  value: 0.035
  unit: "g/g"   # g glycerol / g sugar consumed
  tier: plausible
  uncertainty: { low: 0.02, high: 0.05, note: "spans the 4-10 g/L dry-wine glycerol range at ~245 g/L fermentable sugar" }
  provenance:
    source: "UC Davis Waterhouse Lab 'Glycerol' (whats-in-wine); Scanes et al. 1998; Ribereau-Gayon et al., Handbook of Enology"
    conditions: "S. cerevisiae dry wine; glycerol as a fraction of sugar fermented"
    notes: "Dry wine glycerol is 4-10 g/L (Ribereau-Gayon; usual 4-9 g/L), formed at ~1:10 of the ethanol. At our ~245 g/L fermentable sugar that is Y_gly ~ 0.016-0.041 g/g; we take 0.035 (-> ~8.6 g/L, mid-range). The MAGNITUDE is well-corroborated (multiple sources, narrow range), hence plausible; the constant-fraction FORM is a simplification (glycerol is front-loaded with growth in reality, not a fixed share of every gram), noted as the speculative aspect. Booked into the Gly pool; carbon-accounted as glycerol (C3H8O3)."

Y_byproduct_sugar:
  value: 0.012
  unit: "g/g"   # g minor byproducts (succinic-equivalent) / g sugar consumed
  tier: speculative
  uncertainty: { low: 0.007, high: 0.018, note: "organic acids + polyols only (succinic + acetic + 2,3-butanediol), ~1.7-4.5 g/L; higher alcohols now in the fusels pool" }
  provenance:
    source: "author estimate lumping measured wine organic acids/polyols (succinic 0.5-1.5, acetic 0.3-0.6, 2,3-butanediol 0.5-1.5 g/L); per-g yields e.g. succinic ~0.005, acetic ~0.002 g/g"
    conditions: "S. cerevisiae dry wine; minor non-glycerol byproducts EXCLUDING higher alcohols, carbon-accounted as succinic acid (C4H6O4)"
    notes: "Glycerol is the dominant byproduct; this lump captures the rest of the ORGANIC ACIDS / POLYOLS (succinic, acetic, 2,3-butanediol), ~1.7-4.5 g/L -> Y ~ 0.007-0.018 g/g; we take 0.012 (-> ~2.9 g/L). DECISION D-19 RE-ANCHOR: was 0.014 and lumped higher alcohols too, but higher alcohols (~0.15-0.5 g/L, ~0.0017 g/g) now have their own carbon-routed `fusels` pool (booked as isoamyl alcohol), so they are carved OUT of Byp here to avoid double-counting that carbon in total_carbon - the reduction is exactly that higher-alcohol share. SPECULATIVE: still a lump of several species with a single representative carbon fraction (succinic acid), not a measured single quantity. Booked into the Byp pool. Together with Y_glycerol_sugar this gives an emergent realised Y_E ~ 0.486, consistent with the literature 0.46-0.48 (the carve-out plus the trace fusel/ester sugar draw nearly cancel, so ABV is essentially unchanged)."

must_fermentable_fraction:
  value: 0.93
  unit: "g/g"   # g fermentable hexose / g Brix-measured dissolved solids
  tier: plausible
  uncertainty: { low: 0.90, high: 0.95, note: "glucose+fructose share of ripe-must soluble solids" }
  provenance:
    source: "Ribereau-Gayon et al. 2006, Handbook of Enology (grape must composition)"
    conditions: "ripe Vitis vinifera must; fraction of refractometric soluble solids that is fermentable hexose"
    notes: "Brix measures TOTAL dissolved solids as sucrose-equivalent, but in ripe must glucose+fructose are ~90-95% of the soluble solids (the rest is organic acids, minerals, phenolics - not fermentable). brix_to_sugar_gpl therefore OVERSTATES fermentable sugar; this fraction corrects it at the compile boundary (decision D-16): fermentable S0 = brix_to_sugar_gpl(brix) * 0.93. A MUST-COMPOSITION constant, not a yeast-strain kinetic constant - it lives in this file for now but would need re-homing if a second wine strain file is added (it would duplicate). Without it, a 24 Brix must reads 263.8 g/L hexose (ABV ~15.7% even at realised yield); with it, ~245 g/L -> ABV ~14.9%, the realistic potential alcohol of 24 Brix."

# -- Ethanol inhibition (Luong wall on the uptake flux, decision D-10) ---------

ethanol_tolerance:
  value: 142.0
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 120.0, high: 150.0, note: "~15-19% ABV equivalent" }
  provenance:
    source: "Lallemand Lalvin EC-1118 / Premier Cuvee technical data sheet (alcohol tolerance 18% v/v)"
    conditions: "S. cerevisiae var. bayanus (Prise de Mousse), the strain Coleman 2007 used"
    notes: "18% v/v * 0.789 g/mL = 142 g/L. Read by EthanolInhibition as the wall E_max in f = (1 - E/E_max)^n. CAVEAT on tier: the VALUE is the strain's well-corroborated max-ABV spec (the same strain Coleman fitted), and the semantics line up (max ABV achievable ~ where rate->0 = E_max); but the Luong-wall FORM is our modelling choice, not Coleman's (they instead use an ethanol-driven death term k_d = k'_d*E). A 24 Brix must makes ~135 g/L ethanol at dryness, so this tolerance lets the strain finish - consistent with reality and NOT reverse-engineered from the benchmark."

ethanol_inhibition_exponent:
  value: 2.0
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 1.0, high: 3.0, note: "Levenspiel/Luong toxic-power exponent" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae; Levenspiel 1980 / Luong 1985 inhibition form"
    notes: "Exponent n in f = (1 - E/E_max)^n applied to the fermentative uptake flux. n=1 is the raw linear (Ghose-Tyagi) form with a derivative kink at E_max; de Andres-Toro et al. 1998 use exactly this n=1 wall (f = 1 - E/(0.5*S0)) for beer. We keep n=2 so the touchdown is C1-smooth for the BDF solver and gives a 'tolerant then collapse' viability shape; the form has literature backing but the exponent itself is our numerical choice, hence speculative."

biomass_carrying_capacity:
  value: 2.5
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 2.0, high: 5.0, note: "cap must bite below the ~2.6-3.0 g/L uncapped biomass (X0 + N0/f_N) to leave residual YAN; higher = less residual" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae wine ferment; opt-in residual-nitrogen floor (decision D-30)"
    notes: "Carrying-capacity cap K in the logistic factor (1 - X/K) that BiomassCarryingCapacity multiplies onto GrowthNitrogenLimited (decision D-30). OPT-IN ONLY: the modifier is wired into the wine medium but the compile seam DISABLES it unless a scenario passes carrying_capacity_gpl, so an undosed run is byte-for-byte the validated Coleman-anchored core and this value is not read there. A residual-N floor is a deliberate DEPARTURE from Coleman 2007 (which caps nothing and strips YAN to zero at every dose - see test_coleman_reconstruction), hence speculative and off-by-default. The value 2.5 g/L was chosen in a pre-check as the cap that restores the D-29 cross-must H2S lever (~1.8x span across 80-300 mg N/L) while leaving ~0 residual at low YAN (the correct clinical picture); scenarios may override it via carrying_capacity_gpl to sweep. Form (logistic) is textbook; the value is an estimate."

# -- Amino-acid ledger (opt-in, decision D-32) --------------------------------
# The toggleable amino-acid pool that funds a fraction of biomass from assimilable
# amino acids (represented as arginine) instead of sugar+ammonium, restoring carbon/
# nitrogen honesty for the yeast that build biomass mostly from amino acids. Read by
# AminoAcidAssimilation, a carbon- and nitrogen-neutral swap (refund sugar + ammonium
# N, debit the aa pool). OPT-IN: wired into wine but disabled at the compile seam
# unless a scenario doses amino_acids_gpl, so an undosed run is byte-for-byte the core.
# Both parameters are author estimates (speculative); the swap is directional, not fit.

amino_acid_assimilation_fraction:
  value: 0.5
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.2, high: 0.8, note: "max share of biomass nitrogen sourced from amino acids at saturating aa" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae wine ferment; assimilable amino acids as a nitrogen source"
    notes: "psi in rho = psi * gate(aa) * f_N * base_dx / y_N: the maximum fraction of biomass NITROGEN sourced from the amino-acid pool when amino acids are abundant. Grape-must amino acids (excluding proline) commonly supply a large share of YAN and yeast assimilate them preferentially, so ~0.5 is a plausible mid-estimate; the value is directional (the beat is not fit to data), hence speculative. Bounded to [0,1] by construction (the swap never refunds more nitrogen than growth's draw, so no deamination branch in v1). With arginine's N-rich C:N (~1.29) vs biomass (~4.3) the carbon refund stays <= 0.30*psi of growth's sugar-carbon draw, so no value in [0,1] can create sugar (decision D-32)."

K_amino_acids:
  value: 0.1
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.05, high: 0.4, note: "Monod half-saturation for amino-acid availability; YAN scale" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae wine ferment; smooth availability gate aa/(K+aa)"
    notes: "Half-saturation in the smooth availability gate gate(aa) = aa/(K_amino_acids + aa) that ramps assimilation up from an empty pool and down to zero as amino acids are exhausted (the same smooth-Monod shape the fermentative flux uses, keeping the RHS C1 for the BDF solver). Scaled to the g/L range of assimilable nitrogen in must; an estimate, hence speculative."

# -- Must assimilable amino-acid spectrum (decision D-100) ---------------------
# The fixed fraction vector that splits a single amino_acids_gpl dose across the eight speciated
# amino-acid slots (arginine + leucine/isoleucine/valine/threonine/phenylalanine/methionine +
# amino_acids_generic), the beer wort-sugar-spectrum precedent. Proline is EXCLUDED — not assimilated
# anaerobically (excluded from YAN by definition), so the dose is an *assimilable* amino-acid dose
# and the ~48%-of-must proline fraction never enters the model. Fractions are of ASSIMILABLE amino
# acids and sum to 1.0. RECORDED FROM LITERATURE BEFORE ANY WIRING (the D-99 anti-tuning discipline:
# the spectrum is fixed by measured must profiles, never nudged toward a descriptor/OAV outcome).
# Anchored to two published Vitis vinifera profiles: Cabernet Sauvignon control (PMC6222330,
# Molecules 2018, Table 2) and 'Asprinio' must (PMC12191762, Foods 2025, Table 1). The PRECURSOR
# fractions (leu/ile/val/thr/phe/met) are stable across cultivars (~3/2/3-5/6-8/3/<1%); the large
# varietal variable is the arginine-vs-generic split (Cabernet arg 47%, Asprinio 25%), but both feed
# only the identity-agnostic consumers so that split does not bear on the D-100 tripwire. Tagged
# speculative: a representative "typical must", not a single measurement (wide varietal range).

must_aa_fraction_arginine:
  value: 0.380
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.25, high: 0.48, note: "arginine as a fraction of assimilable must AAs; Asprinio 25.5% .. Cabernet 47.4%" }
  provenance:
    source: "Cabernet Sauvignon control (PMC6222330, Molecules 2018, Tab.2) + Asprinio must (PMC12191762, Foods 2025, Tab.1), midpoint"
    conditions: "Vitis vinifera grape must; fraction of assimilable free amino acids (proline excluded, not assimilated anaerobically)"
    notes: "Arginine is the dominant yeast-assimilable amino acid in grape must; the D-32 representative species. Large varietal range (25-47%); midpoint taken. Feeds only the identity-agnostic yeast/MLF/Brett swaps (with amino_acids_generic), so its value does not affect the D-100 tripwire (which turns on the precursor pools)."

must_aa_fraction_generic:
  value: 0.430
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.34, high: 0.55, note: "the assimilable remainder (glu/ala/ser/asp/his/lys/gly/trp/tyr/cys/GABA) as a fraction of assimilable AAs" }
  provenance:
    source: "remainder after the seven named species; PMC6222330 (34.2%) + PMC12191762 (~54%)"
    conditions: "Vitis vinifera grape must; the amino_acids_generic bucket (glutamine stand-in) as a fraction of assimilable free amino acids"
    notes: "Every assimilable amino acid without its own slot, lumped as glutamine (the N-rich canonical assimilable-N proxy). Drawn by the identity-agnostic yeast/MLF/Brett swaps ALONGSIDE arginine so arginine is not the sole generic source (D-100). Does not bear on the tripwire."

must_aa_fraction_threonine:
  value: 0.067
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.05, high: 0.08, note: "threonine fraction; Asprinio 5.49% .. Cabernet 7.83%" }
  provenance:
    source: "PMC6222330 (7.83%) + PMC12191762 (5.49%), midpoint"
    conditions: "Vitis vinifera grape must; threonine as a fraction of assimilable free amino acids"
    notes: "Precursor of propanol (Ehrlich, D-99) AND sotolon (via alpha-ketobutyrate, D-87) — the load-bearing SHARED precursor whose fraction sizes the residual (real, not artifact) propanol-vs-sotolon competition that survives the D-100 split. Stable across cultivars."

must_aa_fraction_valine:
  value: 0.037
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.027, high: 0.047, note: "valine fraction; Cabernet 2.75% .. Asprinio 4.67%" }
  provenance:
    source: "PMC6222330 (2.75%) + PMC12191762 (4.67%), midpoint"
    conditions: "Vitis vinifera grape must; valine as a fraction of assimilable free amino acids"
    notes: "Precursor of isobutanol (Ehrlich, D-99) and 2-methylpropanal (thermal Strecker, D-87)."

must_aa_fraction_leucine:
  value: 0.032
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.03, high: 0.035, note: "leucine fraction; Cabernet 3.00% .. Asprinio 3.46%" }
  provenance:
    source: "PMC6222330 (3.00%) + PMC12191762 (3.46%), midpoint"
    conditions: "Vitis vinifera grape must; leucine as a fraction of assimilable free amino acids"
    notes: "Precursor of isoamyl_alcohol (Ehrlich, D-99 — the largest fusel by mass) and 3-methylbutanal (thermal Strecker, D-87)."

must_aa_fraction_phenylalanine:
  value: 0.028
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.027, high: 0.029, note: "phenylalanine fraction; Cabernet 2.73% .. Asprinio 2.88%" }
  provenance:
    source: "PMC6222330 (2.73%) + PMC12191762 (2.88%), midpoint"
    conditions: "Vitis vinifera grape must; phenylalanine as a fraction of assimilable free amino acids"
    notes: "Precursor of 2_phenylethanol (Ehrlich, D-99) AND phenylacetaldehyde (oxidative Strecker, D-75) — a shared fusel/aging precursor, though phenylacetaldehyde needs oxidative (quinone) conditions, so the two rarely draw simultaneously."

must_aa_fraction_isoleucine:
  value: 0.021
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.017, high: 0.026, note: "isoleucine fraction; Cabernet 1.69% .. Asprinio 2.53%" }
  provenance:
    source: "PMC6222330 (1.69%) + PMC12191762 (2.53%), midpoint"
    conditions: "Vitis vinifera grape must; isoleucine as a fraction of assimilable free amino acids"
    notes: "Precursor of active_amyl_alcohol (Ehrlich, D-99) and 2-methylbutanal (thermal Strecker, D-87)."

must_aa_fraction_methionine:
  value: 0.005
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 0.002, high: 0.008, note: "methionine fraction; Cabernet 0.44%, Asprinio below detection (trace)" }
  provenance:
    source: "PMC6222330 (0.44%); PMC12191762 below detection (methionine is always trace in must)"
    conditions: "Vitis vinifera grape must; methionine as a fraction of assimilable free amino acids"
    notes: "The scarcest tracked amino acid in must; sulfur-bearing precursor of methional (oxidative Strecker, D-75) and the autolytic mercaptan (D-45). Its scarcity is itself a fidelity gain: the arginine lump over-supplied methionine-derived aromas."

# -- Precursor non-Ehrlich fates (decision D-104) ------------------------------
# THE FRACTION OF EACH CONSUMED PRECURSOR THAT GOES ANYWHERE EXCEPT ITS OWN HIGHER ALCOHOL.
# Before D-104 the Ehrlich re-route was each precursor's ONLY consumer, so the model attributed
# 100% of consumed leucine to isoamyl alcohol. Real yeast send most of it to PROTEIN. These
# fractions close that gap; PrecursorNonEhrlichFates draws f/(1-f) times the re-route's own
# per-species draw, so consumed precursor splits exactly f : (1-f) between "everything else"
# and the Ehrlich alcohol.
#
# READ THE DEFINITION CAREFULLY — it is NOT the protein share, and the difference is the whole
# beat. These are a LUMP of every non-Ehrlich fate: protein incorporation + downstream amino-acid
# biosynthesis + unrecovered losses. Crepin's threonine has FOUR fates (38% protein, ~18%
# propanol, ~17% proteinogenic isoleucine, 20% unrecovered); this model has TWO, so using the
# PROTEIN share (0.38) would dump the other 44% onto propanol. Measured: the protein share gives
# propanol 55.7% catabolic against a sourced 19%, WORSE than no sink at all is bad; the lump
# gives 16.4%. The parameter answers "how much does NOT become this alcohol", nothing else.
#
# SOURCE: Crepin et al. 2017, Appl. Environ. Microbiol. 83:e02617-16 (PMC5311416) — the only
# study found that labels leu/ile/val/thr SEPARATELY in a WINE fermentation (synthetic must
# mimicking grape juice, EC1118, 240 g/L glucose, 180 mg N/L, pH 3.5, 28 C) and reports both the
# protein route and the alcohol. Rollero 2017 (the D-103 source) labels only leucine and valine
# and never measures propanol — see DECISIONS D-104.
#
# Tier: PLAUSIBLE for the four Crepin measured directly (a real per-species measurement in the
# right organism and matrix, but a single study at one must composition and one time point);
# SPECULATIVE for phenylalanine/methionine, which Crepin does not measure at all.
#
# STAND-IN CAVEAT (the D-19/D-31 discipline): the sink books the whole lump as if it became
# biomass — carbon refunded to sugar, nitrogen to ammonium. Crepin's "20% unrecovered" did NOT
# become biomass, so that share is booked to the wrong home. Carbon and nitrogen still close
# exactly (atoms only move between weighted pools); what is approximate is the DESTINATION.
#
# STATIC, and that is a real limit (decision D-104): these are measured FATES from one must, not
# rate constants, so the split does NOT respond to must composition. This retires D-100's "the
# anabolic/catabolic ratio is emergent, not a fitted fraction" FOR THIS SPLIT. The reason is
# measured, not preferred: the emergent (demand-driven) split is MONOTONICALLY INVERTED against
# Crepin — model leucine 20.9% to protein vs a measured 77-86%, model order leu<ile<val<thr vs
# Crepin's thr<val<ile<leu, exactly reversed. An emergent WRONG answer is worse than a sourced
# static one. See DECISIONS D-104 for why no biomass composition can fix the inversion.

f_non_ehrlich_leucine:
  value: 0.815
  unit: "dimensionless"
  tier: plausible
  uncertainty: { low: 0.77, high: 0.86, note: "Crepin's stated range for leucine -> protein, taken as the whole non-Ehrlich lump" }
  provenance:
    source: "Crepin et al. 2017, Appl. Environ. Microbiol. 83:e02617-16 (PMC5311416)"
    conditions: "S. cerevisiae EC1118, synthetic must mimicking grape juice, 240 g/L glucose, 180 mg N/L, pH 3.5, 28 C; [13C6]leucine tracer; end of growth phase"
    notes: "VERBATIM: 'between 77% and 86% of assimilated leucine was directed toward protein synthesis'. Midpoint 0.815. For leucine the protein share IS effectively the whole non-Ehrlich lump: no other large sink is documented for it (unlike threonine, whose catabolism also feeds proteinogenic isoleucine). Leucine is the compound this beat most changes: it is the precursor of isoamyl alcohol, ~52% of the model's fusel carbon, and the model previously sent 100% of it to Ehrlich."

f_non_ehrlich_valine:
  value: 0.62
  unit: "dimensionless"
  tier: plausible
  uncertainty: { low: 0.50, high: 0.74, note: "1 - 0.15 (KIV -> isobutanol) - 0.23 (KIC -> isoamyl); band carries the +-0.12 of the isoamyl share below, since the three shares must sum to 1" }
  provenance:
    source: "Crepin et al. 2017, Appl. Environ. Microbiol. 83:e02617-16 (PMC5311416)"
    conditions: "S. cerevisiae EC1118, synthetic must mimicking grape juice, 180 mg N/L, 28 C; [13C5]valine tracer; end of growth phase"
    notes: "VERBATIM: 'the substantial fractions of KIV and KIC derived from labeled valine, accounting for 15% and 23% of the consumed valine at the end of the growth phase (N_T), respectively, were reduced in higher alcohols'. Valine's consumption splits THREE ways: 15% -> isobutanol (via KIV), 23% -> isoamyl alcohol (via KIC, `f_valine_to_isoamyl`), and 0.62 to everything else. NOT valine's protein share (41%) — the lump definition is 'not an Ehrlich alcohol of this model', and valine now has TWO. D-111 CHANGED THIS FROM 0.85, AND IT IS A RE-PARAMETRIZATION, NOT A TUNE: until D-111 the model had no valine -> isoamyl route, so Crepin's 23% sat INSIDE this lump and was refunded to sugar as though it were protein. Building the route moves that 23% from the lump to the alcohol it actually becomes; the isobutanol share (the residue, 1 - 0.62 - 0.23 = 0.15) is UNCHANGED, which is why isobutanol's realised catabolic fraction does not move. See DECISIONS D-111."

f_valine_to_isoamyl:
  value: 0.23
  unit: "dimensionless"
  tier: plausible
  uncertainty: { low: 0.11, high: 0.37, note: "Rollero's own per-condition range across SM70/SM250/SM425 (37% / 24% / 11% of consumed valine); Crepin's 23% sits inside it" }
  provenance:
    source: "Crepin et al. 2017, Appl. Environ. Microbiol. 83:e02617-16 (PMC5311416); corroborated by Rollero et al. 2017, Microb. Biotechnol. 10:1649-1662 (PMC5658611, CC BY), Fig. 3 + Table S1"
    conditions: "S. cerevisiae, synthetic wine must; Crepin 180 mg N/L, 28 C, [13C5]valine tracer, end of growth phase; Rollero 70/250/425 mg N/L, [U-13C5]valine tracer"
    notes: "THE FRACTION OF CONSUMED VALINE THAT BECOMES ISOAMYL ALCOHOL, via alpha-ketoisovalerate -> alpha-ketoisocaproate (the leucine-biosynthesis chain elongation) -> decarboxylation -> reduction. Crepin VERBATIM: the KIC fraction derived from labeled valine accounts for '23% of the consumed valine ... reduced in higher alcohols'. TWO SOURCES, NOT RIVALS (decision D-111): Rollero's prose figure '42-45% of consumed valine was converted into alpha-ketoisocaproate' is the PARENT flux — his Fig. 3 splits KIC further into isoamyl alcohol, isovaleric acid and proteinogenic leucine (the node balances: KIV 78% -> KIC 44% + isobutanol 31% + isobutyric acid 3%; KIC 44% -> isoamyl 35% + isovaleric 0.2% + proteinogenic leucine 9%). Rollero's raw uM gives the isoamyl branch directly as labelled isoamyl / consumed valine = 23/62, 53/221, 42/376 = 37% / 24% / 11% for SM70/SM250/SM425, reproducing his figure's stated 35/23/11%. Crepin's 23% at 180 mg N/L therefore lands on Rollero's 23-24% at 250 mg N/L: independent agreement, so the value is taken as-is and the BAND is Rollero's N-range. THE VALIDATION IS A DIFFERENT DENOMINATOR AND THAT IS THE POINT (decision D-109 flagged this number as 'circular as an input'): this parameter's denominator is CONSUMED VALINE; the independent check is Rollero's isotopic enrichment of isoamyl alcohol in the 13C-valine culture (2.1-7.5%, Table S1), whose denominator is TOTAL ISOAMYL — anchored separately by k_isoamyl_alcohol. The model realises 1.80%, just under that band, and it is NOT tuned to it. Tier PLAUSIBLE, matching the other Crepin fractions (real per-species tracer measurement in the right organism and matrix, two studies, but one time point each)."

f_non_ehrlich_threonine:
  value: 0.82
  unit: "dimensionless"
  tier: plausible
  uncertainty: { low: 0.75, high: 0.88, note: "1 - (threonine -> propanol); propanol/isoleucine split within Crepin's combined 35% is not resolved" }
  provenance:
    source: "Crepin et al. 2017, Appl. Environ. Microbiol. 83:e02617-16 (PMC5311416)"
    conditions: "S. cerevisiae EC1118, synthetic must mimicking grape juice, 180 mg N/L, 28 C; [13C4]threonine tracer; end of growth phase"
    notes: "Threonine's measured fates: 38% directly to protein ('the portions of exogenous isoleucine, valine, and threonine directly recovered in proteins accounted for only 51, 41, and 38% of their consumption'), a combined 35% to 'propanol and in proteinogenic isoleucine', and 'Overall, 20% of the consumed threonine was not recovered in related proteinogenic amino acids or propanol'. The propanol/isoleucine split inside that 35% is NOT resolved by the paper; taking it as roughly even puts propanol near 18%, so the non-propanol lump is ~0.82. The uncertainty band spans the unresolved split. VALIDATION (not a fit): the paper independently reports propanol as '19% consumed threonine (labeled fraction) and 81% newly synthesized threonine' — the model at this value measures 16.4% on a Crepin-commensurate must."

f_non_ehrlich_isoleucine:
  value: 0.51
  unit: "dimensionless"
  tier: plausible
  uncertainty: { low: 0.45, high: 0.75, note: "isoleucine -> protein; the active-amyl share is unresolved, so the true lump is >= this and the band is skewed up" }
  provenance:
    source: "Crepin et al. 2017, Appl. Environ. Microbiol. 83:e02617-16 (PMC5311416)"
    conditions: "S. cerevisiae EC1118, synthetic must mimicking grape juice, 180 mg N/L, 28 C; [13C6]isoleucine tracer; end of growth phase"
    notes: "VERBATIM: 'the portions of exogenous isoleucine, valine, and threonine directly recovered in proteins accounted for only 51, 41, and 38% of their consumption'. Unlike valine and threonine, Crepin does not resolve how much of isoleucine's remaining 49% reaches ACTIVE AMYL ALCOHOL specifically rather than other fates, so this falls back to the PROTEIN share — a LOWER BOUND on the true non-Ehrlich lump (hence the up-skewed band). The model therefore over-attributes active amyl alcohol by an unknown margin; it carries no sourced odour threshold and no per-compound tracer study, so the error is unconstrained in both directions. Recorded, not estimated away."

f_non_ehrlich_phenylalanine:
  value: 0.531
  unit: "dimensionless"
  tier: plausible
  uncertainty: { low: 0.53, high: 0.975, note: "THE BAND SPANS THE BOUND AND THE MEASUREMENT, and the two ends are different KINDS of number: 0.531 is Minebois's measured PROTEIN share (a lower bound on the lump, the isoleucine pattern) and 0.975 is the measured LUMP itself, which the model cannot currently carry (see notes). DO NOT ENSEMBLE-SAMPLE THE UPPER END: above ~0.96 the D-104 sink's joint carbon refund exceeds growth's draw and CREATES SUGAR — pinned by test_the_sourced_lump_breaks_the_carbon_refund_guard" }
  provenance:
    source: "Minebois et al. 2025, Microb. Biotechnol. 18:e70087 (doi:10.1111/1751-7915.70087, PMC12008174, CC BY), Figure 6A"
    conditions: "S. cerevisiae T73, synthetic must mimicking grape juice, 300 mg N/L YAN; [U-13C]phenylalanine tracer; T4 = beginning of stationary phase (end of growth phase)"
    notes: "MEASURED AT LAST, AND SHIPPED AT A BOUND ANYWAY — read this whole note before touching the value. D-104 shipped 0.53 as an author estimate because Crepin labels leu/ile/val/thr only; Minebois 2025 labels U-13C PHENYLALANINE (plus leucine, valine, and 15N ammonium/arginine/glutamine) and is the per-compound tracer study D-104/D-116 could not find. VERBATIM (Fig. 6A caption): 'The percentages shown in the coloured boxes correspond for each species to the quantity of labelling incorporated into the proteinogenic amino acid or volatile compound, divided by the total amount of labelled amino acid consumed at that sampling point (e.g., for Valine in Sc: 47.4% = 126 mM/266 mM).' THE DENOMINATOR IS CONSUMED PHENYLALANINE — the whole reason the number is usable — and the worked example checks out (126/266 = 47.37%). Sc sends 2.5% of consumed phenylalanine to 2-phenylethanol and 53.1% to protein. THE TRUE LUMP IS THEREFORE 0.975 (= 1 - 0.025), AND THIS ENTRY DELIBERATELY DOES NOT SHIP IT. At 0.975 the D-104 sink's joint carbon refund reaches 1.125x growth's own draw — it hands back more carbon than growth ever charged, which is GLUCONEOGENESIS and fermenting yeast do not do it (the joint N refund also goes 1.095 -> 1.549x, far past the documented 'slight deamination' band). The cause is structural and is NOT this parameter's fault: the model charges ALL of its k-calibrated 2-phenylethanol to CONSUMED phenylalanine, whereas reality builds ~97% of 2-PE de novo from phenylpyruvate. Take the measured lump without the de-novo route and the sink must eat phenylalanine at ~40x the Ehrlich draw to feed an alcohol reality mostly makes from sugar. THE SOURCED VALUE AND THE MISSING PHENYLPYRUVATE ROUTE ARE INSEPARABLE — build that route and this becomes 0.975. So the value shipped is Minebois's measured PROTEIN share, 0.531, as an explicit LOWER BOUND on the lump. THAT IS THE ISOLEUCINE PATTERN BUT FOR A DIFFERENT REASON, AND THE DIFFERENCE MATTERS: isoleucine ships its protein share because the true lump is UNKNOWN; phenylalanine's is KNOWN (0.975) and shipped low only because the model cannot yet carry it. Do not 'tidy' the two into one rationale. NOTE THE UNLUCKY COINCIDENCE: 0.531 is numerically almost the 0.53 this entry carried since D-104 — but that 0.53 claimed to be 'the mean of Crepin's four measured splits', a mean that is actually 0.749, so the old number was never reproducible from its own stated method. It sat on the protein-share trap precursor_fates.py's header says this sink 'measured its way out of'. Same number, completely different standing: 0.531 is a sourced bound, 0.53 was an unreproducible guess. CROSS-VALIDATED ON A SHARED SPECIES: Minebois's valine -> isobutanol (Sc 14.6%) lands on Crepin's 15% for the same quantity, so the two studies' denominators are commensurate. THE DISAGREEMENT IS RECORDED, NOT AVERAGED (D-103): on LEUCINE they conflict badly — Minebois gives 29.3% of consumed leucine to isoamyl and 25% to protein, against Crepin's 77-86% to protein. That is why this is not tier validated; it does not impugn the denominator (valine settles that), but the two labs' leucine numbers cannot both be right. SINGLE-HOST CAVEAT: read off the PMC open-access deposit; Wiley's full text and PDF are paywalled (HTTP 402), so this was NOT independently re-read on a second host — the internal checks are the caption's worked example and the valine agreement. Strain T73 (not Crepin's EC1118), 300 mg N/L (not 180). See DECISIONS D-117."

# NO f_non_ehrlich_methionine ENTRY, deliberately (decision D-104). Methionine is the one tracked
# precursor with no Ehrlich higher alcohol (FUSEL_SPECS has no methionine entry), and this sink
# anchors to the re-route's per-species draw — so the parameter would never be read. An unread
# constant is not provenance, it is clutter that invites a future reader to wire it somewhere it
# does not belong. Methionine's own non-Ehrlich fate is a real gap, but it belongs to whatever beat
# gives methionine a catabolic route, not to this one.

# -- Yeast autolysis (opt-in, decision D-34) ----------------------------------
# The autolytic-peptide source that REFILLS the amino-acid pool from dead biomass (X_dead)
# post-AF — the second prerequisite (after the D-33 fusel re-route) the deferred MLF-with-
# growth beat needs, since the pool is empty at the MLF pitch point (D-23). YeastAutolysis is
# the first consumer of X_dead: first-order in dead biomass, it liberates the dead-cell
# nitrogen as amino acids (arginine) and routes the carbon-rich remainder to the non-
# assimilable `debris` pool (glucan) so carbon and nitrogen close separately. OPT-IN: wired
# into wine but DISABLED at the compile seam unless a scenario passes autolysis_rate_per_h
# (which also overrides k_autolysis), so an undosed wine run is byte-for-byte the validated
# core. Both parameters are author estimates (speculative); the beat is directional.

k_autolysis:
  value: 1.0e-3
  unit: "1/h"   # r = k_autolysis * arrhenius(T, E_a_autolysis) * X_dead  [g X_dead/L/h]
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 1.0e-2, note: "sur-lie autolysis timescale: 1e-3/h ~ 29 d half-life (fast end of months-long sur lie); higher = faster refill" }
  provenance:
    source: "author estimate"
    conditions: "generic S. cerevisiae wine lees; first-order autolytic release of assimilable amino acids from dead biomass (decision D-34)"
    notes: "Specific first-order rate at which dead biomass X_dead autolyses into assimilable amino acids + cell-wall debris (r = k_autolysis * f_T * X_dead). Real sur lie autolysis releases amino acids / mannoproteins over months; 1e-3/h (half-life ~29 d) puts a visible refill inside a multi-week post-AF window while staying on the slow end. OPT-IN ONLY: the YeastAutolysis Process is wired into wine but the compile seam DISABLES it unless a scenario passes autolysis_rate_per_h, which also overrides this reference so a demonstration can sweep the timescale; an undosed run does not read this value. Directional (not fit to a release curve), hence speculative."

E_a_autolysis:
  value: 60000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 40000.0, high: 90000.0, note: "enzymatic (protease/glucanase) autolysis; warmer lees clear faster. Q10 ~ 2.2 near 20 C" }
  provenance:
    source: "author estimate; generic enzymatic activation energy (warmer sur lie autolyses faster — brewing/enology consensus)"
    conditions: "S. cerevisiae wine lees; equivalent Arrhenius activation energy at T_ref = 293.15 K"
    notes: "Temperature sensitivity of autolytic amino-acid release (f_T = arrhenius(T, E_a_autolysis, T_ref)). Autolysis is driven by intracellular proteases/glucanases, so it accelerates with temperature (the reason warm lees aging clears faster) — a moderate generic enzymatic E_a ~60 kJ/mol (Q10 ~2.2). No kinetic source measures an autolysis activation energy in our form; a bounded estimate, hence speculative. DIRECTION (rises with T) is the load-bearing property; the magnitude is a banded guess."

# -- Autolytic (sur-lie reduction) H2S yield (opt-in, decision D-44) -----------
# AutolyticHydrogenSulfide (fermentation.core.kinetics.hydrogen_sulfide) feeds the SHARED h2s pool
# the sulfide dead yeast release as they self-digest — a YIELD on the SAME first-order autolysis
# flux YeastAutolysis runs: d(h2s) = y_h2s_autolysis * (k_autolysis * f_T * X_dead). It recomputes
# that producer's rate internally (the D-33 FuselAminoAcidReroute idiom) so the autolysis_rate_per_h
# opt-in — which overrides k_autolysis to sweep the sur-lie timescale (D-34) — moves peptide release
# AND sulfide release on ONE clock. THE HEADLINE (why this is the reductive-fault H2S): unlike the
# D-29 flux-linked producer, this source is first-order in X_dead (which persists post-dryness), and
# the D-42 CO2-stripping sink is flux-linked, so it gates OFF at dryness and cannot sweep this H2S —
# post-fermentation autolytic sulfide ACCUMULATES as residual, the un-stripped "reduction" that
# develops on the lees (racking/aeration/copper remediate it). OPT-IN with YeastAutolysis (both
# disabled at the compile seam unless autolysis_rate_per_h is set), wine-only. Carbon-free (h2s is on
# no ledger, D-29), so the sulfur it carries is untracked exactly as the sulfate is.
#
# MAGNITUDE — anchored on biomass sulfur content. Yeast dry biomass is ~0.1-0.4% sulfur (w/w, in
# cysteine/methionine/glutathione); if ALL of it left as H2S the ceiling would be y_max ~ 1.06 (g
# H2S/g S) * 2.5e-3 (g S/g) ~ 2.6e-3 g H2S/g biomass. Only a TRACE actually leaves as sulfide (most
# stays in released S-amino acids/peptides/GSH), so y_h2s_autolysis = 2e-5 is ~1% of that ceiling —
# for a few g/L of X_dead fully autolysed, ~tens-to-100 ug/L cumulative autolytic H2S, a clear
# reductive signal well above the ~1-2 ug/L threshold yet far below the total-S ceiling. Directional
# (not fit to a release curve) and the release fraction is a guess, hence speculative.
y_h2s_autolysis:
  value: 2.0e-5
  unit: "g/g"   # g H2S released per g dead biomass (X_dead) autolysed
  tier: speculative
  uncertainty: { low: 2.0e-6, high: 2.6e-4, note: "release fraction of biomass sulfur as H2S: 2e-6 (~0.08% of the ~2.6e-3 g H2S/g total-S ceiling) to 2.6e-4 (~10%); default 2e-5 ~ 1% of biomass S released as sulfide, the rest retained in S-amino acids/peptides/GSH" }
  provenance:
    source: "author estimate anchored on yeast biomass sulfur content (~0.1-0.4% dry weight, cysteine/methionine/glutathione; general enology/microbiology) and the reductive-fault magnitude of sur-lie H2S (~tens of ug/L; Rauhut; Swiegers et al. 2005)"
    conditions: "generic S. cerevisiae wine lees; g H2S per g dead biomass autolysed, released on the same first-order autolysis flux as the D-34 amino-acid refill"
    notes: "Read by AutolyticHydrogenSulfide as the yield on the autolysis flux (d(h2s) = y_h2s_autolysis * k_autolysis * f_T * X_dead). Ceiling y_max ~ 2.6e-3 g H2S/g biomass = ALL biomass sulfur (~2.5e-3 g S/g) leaving as H2S (1.06 g H2S/g S); the model's 2e-5 is ~1% of that ceiling — the trace released as free sulfide during self-digestion, the rest retained in released S-amino acids / peptides / glutathione (untracked). OPT-IN ONLY (disabled with YeastAutolysis unless autolysis_rate_per_h is set); an undosed run does not read this value. Directional, hence speculative."

# -- Autolytic mercaptan (thiol) yield (opt-in, decision D-45) -----------------
# AutolyticMercaptan (fermentation.core.kinetics.mercaptans) fills the carbon-bearing
# `methanethiol` pool the SAME way AutolyticHydrogenSulfide (D-44) fills h2s — a YIELD on the
# shared autolysis flux (d(methanethiol) = y_methanethiol * k_autolysis * f_T * X_dead * gate) —
# but because methanethiol carries CARBON (unlike H2S) the Process must draw that carbon from a
# tracked pool and DEAMINATE its nitrogen to N (Option A, the D-33 fusel-reroute idiom).
# (The pool was named `mercaptans` through D-109 — a plural asserting a thiol MIXTURE the mass
# balance never held; renamed to the one molecule it contains at D-110, value and band untouched.)
# Methanethiol's carbon comes from METHIONINE — the sulfur-bearing amino acid whose demethiolation
# genuinely releases the thiol. Until D-100 the model had to draw it from the lumped `amino_acids`
# pool (booked as arginine, a molecule containing NO sulfur) and carry the mismatch as a provenance
# caveat; the pool is now speciated, so the draw IS methionine and that caveat is RETIRED, not
# restated. A relative-depletion gate met/(K_i+met), K_i = K_amino_acids·must_aa_fraction_methionine
# (the D-100 rule), ramps it to 0 as the pool empties (solver-safe, can't drive methionine
# negative). Not flux-linked ⇒ accumulates un-stripped post-dryness
# (the reductive fault); copper-fined out by add_copper. OPT-IN with the D-34 autolysis Processes.
#
# MAGNITUDE — anchored on biomass METHIONINE content, and set BELOW the H2S yield (reduction is
# typically more H2S than mercaptan). Yeast biomass is ~0.4-1% methionine (w/w); if ALL of it left
# as MeSH the ceiling would be ~ (0.32 g MeSH/g methionine) * ~5e-3 ~ 1.6e-3 g MeSH/g biomass. Only
# a trace degrades to free thiol, so y_methanethiol = 1e-5 is ~0.6% of that ceiling (half the H2S
# yield), giving ~tens of ug/L cumulative thiol — a clear reductive signal above the ~2-3 ug/L
# methanethiol threshold. Directional, hence speculative.
y_methanethiol:
  value: 1.0e-5
  unit: "g/g"   # g methanethiol released per g dead biomass (X_dead) autolysed
  tier: speculative
  uncertainty: { low: 1.0e-6, high: 1.0e-4, note: "release fraction of biomass methionine as free thiol: 1e-6 (~0.06% of the ~1.6e-3 g MeSH/g methionine-ceiling) to 1e-4 (~6%); default 1e-5 ~0.6%, half the H2S yield (reduction skews to more H2S than mercaptan)" }
  provenance:
    source: "author estimate anchored on yeast biomass methionine content (~0.4-1% dry weight; general microbiology) and the reductive-fault magnitude of sur-lie mercaptans (methanethiol threshold ~2-3 ug/L; Swiegers et al. 2005; Rauhut)"
    conditions: "generic S. cerevisiae wine lees; g methanethiol per g dead biomass autolysed, released on the same first-order autolysis flux as the D-34 amino-acid refill and the D-44 H2S yield"
    notes: "Read by AutolyticMercaptan as the yield on the autolysis flux, gated by METHIONINE availability (D-100: the draw is the real sulfur-bearing precursor, and its nitrogen is deaminated to N — the pre-D-100 arginine stand-in, and the ~0.66-vs-1 mol-N-per-mol-MeSH mismatch it carried, are RETIRED; D-107 fixed the draw's stoichiometry to demethiolation's real 1:1, booking the C4 co-product to alpha_ketobutyrate). Ceiling ~1.6e-3 g MeSH/g biomass = ALL biomass methionine leaving as MeSH; the model's 1e-5 is ~0.6% of that. Set BELOW y_h2s_autolysis (2e-5) since reduction skews to H2S. Key renamed from y_mercaptan at D-110 with the pool (see header). OPT-IN ONLY (disabled with YeastAutolysis unless autolysis_rate_per_h is set). Directional, hence speculative. SCOPE, not magnitude: this yield sizes the AUTOLYTIC route ONLY. Wine MeSH has at least two further routes the model does not carry — yeast demethiolation of methionine during ACTIVE fermentation, and post-bottling anoxic formation from thioacetates/disulfides — so an autolysis-off wine reads methanethiol = 0. See the AutolyticMercaptan module docstring for why that zero is defensible young and NOT defensible for a bottle-aged wine."

# -- Ethanol-driven cell inactivation (the timescale brake, decision D-13) -----
# Coleman split biomass into active cells X_A and modelled an ethanol-proportional
# specific death rate (their eqs 2, 7): dX_A/dt = mu*X_A - k_d*X_A, k_d = k'_d*E.
# This cumulative loss of viable (catalytic) biomass is what sets a wine's 10-14
# day timescale; it REPLACES the instantaneous Luong wall as the validated-core
# ethanol brake (D-13). Read by EthanolInactivation, which moves mass X -> X_dead.

k_prime_d:
  value: 4.28e-5
  unit: "(g/L)^-1 h^-1"   # k_d = k'_d * E has units 1/h
  tier: plausible
  uncertainty: { low: 3.0e-5, high: 4.4e-4, note: "11 C -> 3.0e-5, 35 C -> 4.4e-4 (factor ~15, matching the paper's stated ~13x); quadratic in T" }
  provenance:
    source: "Coleman, Fish & Block 2007, Appl. Environ. Microbiol. 73(18):5875-5884, Table A2"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must, 20 C; Table A2 ln(k'_d) = -9.81 - 0.108*T + 0.00478*T^2 (T in degC, QUADRATIC; a1 exponent typo-corrected - see notes)"
    notes: >-
      Evaluated at T_ref = 20 C: exp(-9.81 - 0.108*20 + 0.00478*400) = exp(-10.06)
      = 4.28e-5 (g/L)^-1 h^-1. At E=100 g/L this gives k_d = 4.3e-3/h (viable-cell
      half-life ~160 h) - the gentle tail brake that lets a 20 C ferment finish.
      Verified by reconstruction: this value reproduces Coleman's own Fig 6c
      completion at 20 C, whereas the as-printed a1 (below) stalls even their model
      at ~108 g/L residual.
      PUBLISHED-TYPO CORRECTION (a1 exponent): Table A2 prints the a1 MEAN for
      Log(k'_d) as -1.08e-3, but its printed 95% credible region is
      [-1.94e-1, -3.30e-2] (centre -1.13e-1, half-width 8.1e-2). The corrected
      -1.08e-1 sits essentially AT that centre (where a near-symmetric posterior's
      mean belongs); the as-printed -1.08e-3 lands ~1.4 half-widths beyond the upper
      bound, on the OPPOSITE side of the interval. The journal typesetting dropped
      the x10^n exponent from the a1 mean column; the true value is -1.08e-1. Three
      independent checks confirm:
      (1) -1.08e-1 reproduces the paper's stated ~13x rise in k'_d from 11->35 C
      (the as-printed -1.08e-3 gives 191x); (2) it keeps k'_d(35 C)=4.4e-4 under
      Fig 3b's 6e-4 axis (the as-printed value overshoots to 1.8e-2, ~30x off the
      plotted scale); (3) the IDENTICAL defect appears in the Log(Y_X/N) row
      (printed a1 mean -3.61 vs its CR [-4.35e-3, -2.93e-3]; corrected -3.61e-3
      reproduces Fig 4), so it is a systematic typesetting fault, not a one-off.
      k'_d is the only QUADRATIC Coleman parameter and the steepest T-dependence -
      why high temperature drives stuck fermentations. M1 was isothermal at 20 C so
      no temperature modifier was attached; M2 added non-isothermal scenarios
      without revisiting this, leaving k_prime_d silently frozen at its 20 C value
      for any other temperature. D-56's Varela 2004 comparison (28 C, long
      nitrogen-limited runs) exposed the resulting gap; D-57 closes it with
      k_prime_d_a1/k_prime_d_a2 below (Coleman's own quadratic regression,
      the form a single activation energy cannot reproduce - see
      ColemanQuadraticDeathTemperature)."

