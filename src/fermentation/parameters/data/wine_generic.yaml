# -- Arrhenius temperature dependence (per-rate, decision D-11) ----------------
# f = exp(-(E_a/R)(1/T - 1/T_ref)), normalised so the rate constant is used
# unscaled at T_ref. Coleman models temperature as a log-linear regression in T,
# not Arrhenius; we convert the local sensitivity to an equivalent activation
# energy at T_ref: matching d(ln rate)/dT gives E_a = a1 * R * T_ref^2, where a1
# is Coleman's Table A2 slope and R = 8.314462618 J/(mol K). See D-12.

E_a_growth:
  value: 55900.0
  unit: "J/mol"
  tier: plausible
  uncertainty: { low: 49000.0, high: 63000.0, note: "from Coleman a1 95% credible region 0.0698-0.0879 /degC" }
  provenance:
    source: "Derived from Coleman, Fish & Block 2007 (doi:10.1128/aem.00670-07), Table A2 ln(mu_max) slope"
    doi: "10.1128/aem.00670-07"
    conditions: "Premier Cuvee, Chardonnay must; equivalent Arrhenius E_a at T_ref = 293.15 K"
    notes: "E_a = a1*R*T_ref^2 = 0.0782 * 8.314462618 * 293.15^2 = 55,900 J/mol (~Q10 2.1 near 20 C, biologically standard). Coleman's growth is slightly MORE temperature-sensitive than uptake (a1 0.0782 vs 0.0771)."

E_a_uptake:
  value: 55100.0
  unit: "J/mol"
  tier: plausible
  uncertainty: { low: 47000.0, high: 63000.0, note: "from Coleman beta_max a1 95% CR 0.0666-0.0885 /degC" }
  provenance:
