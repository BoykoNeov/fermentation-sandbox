# Tannin–anthocyanin condensation — red-wine colour stabilization + astringency softening
# (decision D-79, §4.1 aging). The DOMINANT real astringency-softening + red-colour-evolution
# mechanism the D-77/D-78 oak beats deferred and the milestone-3 plan names — now built, unblocked
# by D-78's off-every-ledger tannin/taste-pool infrastructure (though it reuses NONE of the oak
# pools — see "OAK-INDEPENDENT" below).
#
# SHARED, but WINE-ONLY in effect (the aging.yaml / oak.yaml pattern): the names below are
# collision-free and merged into every compiled scenario's ParameterSet at compile.py's
# shared_files, but only the WINE medium carries the anthocyanin/tannin state slots and wires
# TanninAnthocyaninCondensation, so the params are inert for beer. INERT until an anthocyanin+tannin
# dose (must inputs) AND a begin_aging enable (aging is post-ferment); an un-dosed / white-wine run
# is byte-for-byte the case without this beat (prime directive #3).
#
# THE PROCESS (fermentation.core.kinetics.aging.TanninAnthocyaninCondensation, WINE-ONLY):
#
#   r                      = k_polymerization * f(T) * [anthocyanin] * [tannin]   # g anthocyanin/L/h
#   d(anthocyanin)/dt      = -r
#   d(tannin)/dt           = -y_tannin_per_anthocyanin * r
#
# a BILINEAR direct condensation (the SulfiteOxidation/EllagitanninOxidation bilinear form): free
# monomeric anthocyanin and condensed grape tannin combine into a polymeric pigment, warmed by an
# Arrhenius factor f(T) = arrhenius_factor(T, E_a_polymerization, T_ref) so warm aging condenses
# faster. The polymeric-pigment PRODUCT is NOT a state slot: in v1 condensation is the SOLE fate of
# anthocyanin, so the stable pigment is exactly (anthocyanin_0 - anthocyanin(t)) and is
# reconstructed POST-HOC by analysis.polymeric_pigment_series (the iso_alpha/A420 discriminator:
# A420 HAD to integrate because O2 has competing sinks; here anthocyanin's single fate makes the
# pigment reconstructible, so it is a readout, not a slot). A future BLEACHING beat (SO2/pH
# decolorization — a SECOND anthocyanin fate to a COLOURLESS form) is what would break that identity
# and promote the pigment to a slot.
#
# THE TWO EMERGENT PAYOFFS (the D-79 spine):
#   (1) ASTRINGENCY SOFTENS. analysis.astringency_series now reads FREE tannin (tannin + oak
#       ellagitannin, both harsh); the polymeric pigment is soft and NOT counted. As tannin condenses
#       into pigment the free-tannin pool — and the astringency — declines. This is the DOMINANT
#       softening mechanism D-78's oxidative ellagitannin consumption could only contribute one
#       directional term to.
#   (2) COLOUR STABILIZES. analysis.color_series counts BOTH free anthocyanin (bright, bleachable)
#       AND the polymeric pigment (SO2/pH-STABLE): free anthocyanin declines but the stable pigment
#       rises, so total red colour is RETAINED as its form shifts from labile to stable — the young
#       purple-red → aged brick-red evolution. In v1 (no bleaching sink) the total is conserved; the
#       observable dynamic is the monomeric → polymeric SHIFT (polymeric_pigment_series).
#
# OAK-INDEPENDENT AND O2-INDEPENDENT (the D-79 correctness crux). Tannin–anthocyanin polymerization
# is a GRAPE-tannin + GRAPE-anthocyanin reaction — a steel-tank red with NO oak and NO oxygen still
# polymerizes, softens, and stabilizes its colour. So this Process gates on the grape-derived
# `anthocyanin` and `tannin` pools ONLY: it draws NO share of the shared o2 budget (unlike every
# D-71..D-78 oxidative sink) and reads NO oak pool (the oak `ellagitannin` is a DIFFERENT, oak-
# derived hydrolysable tannin — reusing it would wrongly make polymerization impossible without an
# add_oak dose). `tannin` is the grape CONDENSED (flavan-3-ol) tannin the D-78 note left the
# namespace free for; astringency_series sums it WITH oak ellagitannin because both taste harsh.
#
# OFF EVERY LEDGER (the iso_alpha / ellagitannin precedent). anthocyanin and tannin are grape-derived
# — their carbon comes from an UNTRACKED grape-solids source, so booking them as mass would demand a
# grape-phenolic carbon pool that does not exist. Both slots are off
# total_carbon/total_mass/total_nitrogen, so this Process moves NOTHING conserved (like OakExtraction
# / EllagitanninOxidation) and — a pure g/L transfer — needs NO chemistry.py species registration.
# This is also why the tannin-consumption yield is MASS-based (y_tannin_per_anthocyanin, g/g), NOT a
# molar stoichiometry: both anthocyanin and the condensed-tannin macromolecule are lumped pools with
# no clean molar mass (an M_tannin would be fake precision — the y_ellag_per_o2 precedent).
#
# SUBSTRATE-GATED ⇒ ADDS ON TOP, NO RE-BASELINE (and trivially so — it touches no o2). Doubly gated
# on anthocyanin AND tannin (zero unless BOTH are dosed), so a white wine (no anthocyanin) or a
# no-tannin run is byte-for-byte the case without this Process. Because it draws no o2 it does not
# even interact with the k_ethanol_oxidation + k_browning = 5.0e-4 always-on anchor — a wholly
# separate, non-oxidative axis (the OakExtraction diffusion-axis precedent, but on grape pools).
#
# SCOPE:
#   * DIRECT condensation (D-79) + the ACETALDEHYDE-BRIDGED (ethylidene) route (D-80, built below).
#     The bridged route — dissolved O2 -> acetaldehyde (D-71) -> ethyl-bridge linking tannin and
#     anthocyanin — is the SPLIT-LEDGER beat D-79 deferred. It was deferred because acetaldehyde is
#     ON the carbon ledger (its carbon is borrowed exactly from E by OxidativeAcetaldehyde): an
#     off-ledger pigment consuming the on-ledger acetaldehyde pool would make carbon vanish and fail
#     assert_conserved. The D-80 fix is SPLIT-LEDGER accounting — a NEW on-ledger `ethyl_bridge` state
#     slot (weighted at cf(ethylidene) in total_carbon) captures the acetaldehyde carbon, so the
#     grape bulk (anthocyanin/tannin) stays OFF the ledger while the acetaldehyde-derived C2 bridge
#     stays ON it, and total_carbon closes to machine precision (acetaldehyde C -> bridge C). This is
#     where "controlled micro-oxygenation stabilizes red colour" enters: add_oxygen -> acetaldehyde
#     -> bridging -> more pigment + softening + a LOWER oxidised-acetaldehyde note. See the
#     AcetaldehydeBridgedCondensation Process (fermentation.core.kinetics.aging) and the params below.
#   * TANNIN SELF-POLYMERIZATION (tannin–tannin condensation, the OTHER big softener) is NOT
#     modelled — anthocyanin is the limiting reagent here (tannin >> anthocyanin in real wine, ~1-4
#     g/L vs ~0.3 g/L), so A–T condensation alone draws tannin down only MODESTLY. This is the same
#     "one directional contributor, does not claim full softening" honesty D-78 established.
#   * TANNIN-ETHYL-TANNIN (acetaldehyde bridging TWO flavanols, no anthocyanin) is NOT modelled: the
#     D-80 bridged route anchors on ANTHOCYANIN (tannin-ethyl-anthocyanin only), which is exactly
#     what keeps anthocyanin's SOLE fate = pigment and so preserves the polymeric_pigment_series =
#     anthocyanin0 - anthocyanin identity. The tannin-ethyl-tannin branch is deferred alongside the
#     grape tannin self-polymerization above (both draw tannin without touching anthocyanin/colour).
#   * PIGMENT COLOUR EQUIVALENCE. Each condensed anthocyanin unit is counted as contributing the SAME
#     colour as when it was free (just now STABLE) — polymeric pigments' genuinely different (pH/SO2-
#     resistant, somewhat lower molar-absorptivity) colour is a Tier-3-beyond refinement. So total
#     colour is conserved in v1; the SHIFT monomeric→polymeric is the honest directional signal.
#   * NO A520/A420 HUE RATIO, NO SO2/pH BLEACHING of monomeric anthocyanin — later beats.
#
# TIER. ALL speculative — the condensation FORM (bilinear anthocyanin×tannin, warmer-faster,
# saturating on the limiting anthocyanin) is textbook red-wine chemistry and the warmer-faster
# ORDERING is a sourced claim, but every magnitude is an order-of-magnitude author estimate and the
# aging axis is the Tier-3 frontier. The Process floors its outputs at speculative (parameter-tier
# propagation, D-1). Load-bearing sourced claims: (1) anthocyanins and tannins condense into
# polymeric pigments that are SOFTER and colour-STABLE (Somers 1971; Ribéreau-Gayon; the young
# purple → aged brick-red / softening evolution), (2) the reaction is bimolecular (rate rises with
# both reactant concentrations), (3) warmer aging condenses faster (E_a > 0, reaction-scale).

# -- BILINEAR CONDENSATION RATE: anthocyanin + tannin -> polymeric pigment ----------------------
k_polymerization:
  value: 2.0e-3
  unit: "L/(g*h)"   # r = k_polymerization * f(T) * [anthocyanin] * [tannin]  (bilinear, both g/L)
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 8.0e-3, note: "bimolecular rate constant at T_ref = 20 C. At a ~2 g/L grape-tannin charge the pseudo-first-order anthocyanin rate k*[tannin] ~ 4.0e-3 /h => half-life ln2/(k*[tannin]) ~ 170 h ~ 1 week at high tannin, lengthening to months as anthocyanin (the limiting reagent) and tannin are drawn down — the observed months-to-years timescale over which young red wine softens and its colour stabilizes. The LOAD-BEARING claim is the FORM (bimolecular, saturating on anthocyanin) and the warmer-faster ordering, not this magnitude." }
  provenance:
    source: "author estimate anchored to the timescale over which young red wine loses harsh astringency and shifts from purple-red to stable brick-red as monomeric anthocyanins and condensed tannins polymerize into polymeric pigments (Somers 1971, 'The polymeric nature of wine pigments', Phytochemistry 10:2175; Ribéreau-Gayon et al., Handbook of Enology, on tannin–anthocyanin condensation and ageing; months-to-a-few-years at cellar temperature). The bimolecular constant folds the (acid-catalysed, C4-C8 flavylium–flavanol addition) chemistry into one lumped k."
    conditions: "generic red wine at cellar pH (~3.4-3.8) and temperature; bilinear in the free-anthocyanin and condensed-grape-tannin pools (both g/L) at T_ref = 293.15 K. Represents the aggregate direct (non-acetaldehyde-bridged) condensation, not a single adduct."
    notes: "SOURCED FORM (bimolecular direct condensation, saturating on the limiting anthocyanin, softening + colour-stabilizing) + SPECULATIVE magnitude (order-of-magnitude, banded to the months-to-years red-wine ageing timescale). The load-bearing sourced claim is the warmer-faster ordering (E_a_polymerization) and that condensation SOFTENS and STABILIZES, not this absolute rate. Acetaldehyde-bridged condensation is the deferred next beat (acetaldehyde is on the carbon ledger)."

# -- ACTIVATION ENERGY: warmer aging condenses faster (sourced ordering, REACTION-scale) --------
# REACTION-scale (~55 kJ/mol, like the oxidative-sink E_a's and E_a_ester_hydrolysis), NOT the weak
# DIFFUSION E_a_oak_extraction (20 kJ/mol): tannin–anthocyanin condensation is an acid-catalysed
# chemical reaction (flavylium–flavanol addition), so it carries the reaction-scale temperature
# sensitivity, not a diffusion one. Its OWN parameter (prime directive #2).
E_a_polymerization:
  value: 55000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 75000.0, note: "Q10 ~1.6-2.9 at 20 C. Wine polyphenol condensation activation energies ~35-75 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster condensation, so warm storage ages red wine's structure/colour faster — the well-known 'warm cellars age reds faster'); the magnitude is speculative and banded. Its OWN parameter (prime directive #2) and REACTION-scale, distinct from the weak diffusion E_a_oak_extraction." }
  provenance:
    source: "SOURCED ORDERING: tannin–anthocyanin condensation and polymeric-pigment formation accelerate with temperature (textbook Arrhenius; accelerated-ageing studies of red-wine colour/polymeric pigment; Ribéreau-Gayon Handbook of Enology). Warm storage advances the purple→brick-red colour shift and the astringency softening faster — the established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate tannin–anthocyanin condensation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster condensation) is the sourced, load-bearing claim. REACTION-scale (~55 kJ/mol), matching the oxidative siblings and the ester-hydrolysis E_a and DELIBERATELY well above the weak diffusion E_a_oak_extraction (20 kJ/mol) — condensation is a chemical reaction, oak extraction is diffusion, so separate E_a's (prime directive #2)."

# -- MASS-BASED TANNIN-CONSUMPTION YIELD: g condensed tannin spent per g anthocyanin condensed ---
# d(tannin)/dt = -y_tannin_per_anthocyanin * r  (both g/L/h). MASS-based (g/g), NOT a molar
# stoichiometry: both the anthocyanin pool and the condensed-tannin macromolecule are LUMPED pools
# with no clean molar mass, so an M_tannin/M_anthocyanin ratio would be fake precision (the
# y_ellag_per_o2 precedent). Sets HOW MUCH free tannin (and thus astringency) a given amount of
# condensed anthocyanin removes. Both slots off every ledger => this consumption moves nothing
# conserved. Central ~3 reflects that the condensed-tannin oligomer is heavier than the anthocyanin
# it binds (a ~1:1 molar adduct of a ~1000 g/mol tannin oligomer with a ~500 g/mol anthocyanin), so
# roughly a few grams of tannin condense per gram of anthocyanin — but banded wide.
y_tannin_per_anthocyanin:
  value: 3.0
  unit: "g/g"   # g condensed tannin consumed per g anthocyanin condensed; d(tannin)/dt = -y * r
  tier: speculative
  uncertainty: { low: 1.0, high: 8.0, note: "g lumped condensed grape tannin spent per g anthocyanin condensed. A ~1:1 molar tannin–anthocyanin adduct of a heavier tannin oligomer (~1000 g/mol) with anthocyanin (~500 g/mol) gives a mass ratio of order ~2; higher-oligomer tannins push it up. Central 3.0 is a mid-band estimate, banded an order of magnitude. Governs the astringency-softening MAGNITUDE (with anthocyanin the limiting reagent, total tannin removed ~ y * anthocyanin_0, a MODEST fraction of the ~1-4 g/L tannin — the 'one directional contributor' scope)." }
  provenance:
    source: "author estimate from the tannin–anthocyanin condensation stoichiometry: a roughly 1:1 molar flavanol(-oligomer)–anthocyanin adduct (Somers 1971; Ribéreau-Gayon on condensed-pigment structure), expressed as a MASS ratio because the lumped condensed-tannin macromolecule has no clean molar mass (contrast the real-molecule 2:1 SO2:O2 _SO2_PER_O2)."
    conditions: "g lumped condensed grape tannin consumed per g anthocyanin condensed, generic red wine at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude, MASS-based (no fake molar mass for the lumped tannin/anthocyanin pools — the y_ellag_per_o2 idiom). Both tannin and anthocyanin are off every ledger, so this consumption moves nothing conserved. Sets the astringency-softening rate; tannin self-polymerization (the other softener) is deferred, so this is one directional contributor. REUSED by the D-80 acetaldehyde-bridged route: the bridged adduct consumes tannin + anthocyanin in the SAME lumped mass ratio as the direct route (one shared stoichiometry, one param)."

# ============================================================================================
# D-80: THE ACETALDEHYDE-BRIDGED (ETHYLIDENE) CONDENSATION ROUTE — the split-ledger colour beat
# ============================================================================================
# The fermentation.core.kinetics.aging.AcetaldehydeBridgedCondensation Process (WINE-ONLY). The
# SECOND formation pathway to polymeric pigment (after the D-79 direct route above), and the FIRST
# link from the OXIDATIVE sub-axis (o2 -> acetaldehyde, D-71) to red-wine COLOUR:
#
#   r                     = k_acetaldehyde_bridge * f(T) * [free acetaldehyde] * [anthocyanin] * [tannin]
#   d(anthocyanin)/dt     = -r                                          # OFF-ledger (grape-derived)
#   d(tannin)/dt          = -y_tannin_per_anthocyanin * r               # OFF-ledger (reuse D-79 yield)
#   d(acetaldehyde)/dt    = -y_acetaldehyde_per_anthocyanin * r         # ON the carbon ledger (D-27/D-71)
#   d(ethyl_bridge)/dt    = +(acetaldehyde carbon consumed) / cf(ethylidene)   # ON-ledger, carbon-exact
#
# a TRILINEAR lumped termolecular step: the ethyl bridge -CH(CH3)- (from acetaldehyde) links ONE
# grape tannin unit to ONE anthocyanin unit (tannin-ethyl-anthocyanin), so the rate needs all three
# present. f(T) = arrhenius_factor(T, E_a_acetaldehyde_bridge, T_ref) (own reaction-scale E_a).
#
# THE SPLIT LEDGER (the D-80 crux, and why D-79 deferred it). One reaction straddles two ledgers:
# the grape-phenolic bulk (anthocyanin + tannin) is OFF every ledger (grape-derived, untracked — the
# iso_alpha/ellagitannin precedent), but acetaldehyde's carbon is ON the carbon ledger (borrowed
# exactly from ethanol E by OxidativeAcetaldehyde, D-71). Consuming on-ledger acetaldehyde into an
# off-ledger pigment would make carbon VANISH and fail assert_conserved (the trap D-79 named). The
# fix: a NEW on-ledger `ethyl_bridge` state slot (media.wine_schema; weighted at cf(ethylidene) in
# conservation.total_carbon) captures exactly the acetaldehyde carbon. Carbon closes to machine
# precision via the EsterHydrolysis carbon-exact split (release at cf(acetaldehyde), redeposit at
# cf(ethylidene)); the lost carbonyl O (-> water) is the standing aging-axis mass gap (total_mass
# weights only {S,E,CO2}, never asserted on an aging run — the D-71 E->acetaldehyde scope-out).
# The bridge MUST be an integrated slot, not a post-hoc readout: acetaldehyde has COMPETING fates
# (D-27 production, D-71 oxidative production, D-27 reduction to E, D-47 SO2 binding, and now
# bridging), so the bridged amount is not reconstructible from its drawdown (the A420 discriminator);
# and total_carbon = weights @ y reads state slots, so the carbon must physically live in a slot.
#
# READS FREE ACETALDEHYDE (the D-47 precedent). SO2-bound acetaldehyde is the bisulfite adduct — its
# carbonyl is blocked, so it CANNOT form the ethylidene bridge (no carbonyl for the flavanol to
# attack), exactly as AcetaldehydeReduction reduces only free acetaldehyde under SO2 (D-47). So the
# rate reads free_acetaldehyde when so2_total > 0, else total (the so2_total > 0 guard is exact — an
# unsulfited run pays no per-RHS pH solve and is byte-for-byte total). EMERGENT payoff: SO2 DELAYS
# acetaldehyde-mediated colour stabilization (bound acetaldehyde is unavailable to bridge) — a real
# winemaking fact, emergent from the shared binding equilibrium, nothing scripted.
#
# TRIPLY SUBSTRATE-GATED => adds on top, NO re-baseline. Zero unless acetaldehyde AND anthocyanin AND
# tannin are all present, so a white / no-tannin / no-acetaldehyde wine (and all beer) is
# byte-for-byte the case without this Process. Wine-only (all three grape/bridge slots are wine-only)
# + disabled at compile, enabled by begin_aging (aging is post-ferment).
#
# SCOPE: tannin-ethyl-tannin (bridging two flavanols, no anthocyanin) is deferred — anchoring on
# anthocyanin keeps its sole fate = pigment and preserves polymeric_pigment_series = antho0 - antho.
#
# TIER: ALL speculative. SOURCED FORM (acetaldehyde bridges anthocyanins and tannins into ethyl-
# linked polymeric pigments; the reaction is acid-catalysed and warmer-faster; SO2 blocks it via
# carbonyl binding — Timberlake & Bridle 1976; Es-Safi et al. 1999; Ribéreau-Gayon Handbook of
# Enology) + SPECULATIVE magnitudes (order-of-magnitude author estimates, banded).

# -- TRILINEAR BRIDGED-CONDENSATION RATE: acetaldehyde + anthocyanin + tannin -> ethyl-bridged pigment
# r = k_acetaldehyde_bridge * f(T) * [free acetaldehyde] * [anthocyanin] * [tannin]  (all g/L). Units
# L^2/(g^2*h). Set ~20x k_polymerization PER UNIT so that at a typical micro-ox acetaldehyde level
# (~0.05 g/L = 50 mg/L) the bridged pseudo-rate k_bridge*[acet] ~ 1e-3 /(g/L)/h is COMPARABLE to the
# direct k_polymerization (2e-3) — i.e. once acetaldehyde is present the bridged route contributes on
# the same order as the direct one, the sourced "acetaldehyde ACCELERATES polymerization" fact. Below
# ~mg/L acetaldehyde it is negligible (no micro-ox => direct route dominates), which is correct.
k_acetaldehyde_bridge:
  value: 4.0e-2
  unit: "L^2/(g^2*h)"   # r = k * f(T) * [free acetaldehyde] * [anthocyanin] * [tannin]  (all g/L)
  tier: speculative
  uncertainty: { low: 1.0e-2, high: 1.6e-1, note: "trilinear rate constant at T_ref = 20 C. At ~50 mg/L acetaldehyde the pseudo-bilinear constant k_bridge*[acet] ~ 2.0e-3 L/(g*h) is of order k_polymerization (2.0e-3) — so with micro-ox acetaldehyde present the bridged route condenses anthocyanin on a comparable timescale to the direct route, and jointly they shorten the months-to-years softening/colour-stabilization span. The LOAD-BEARING claim is the FORM (trilinear, needs acetaldehyde) and that acetaldehyde ACCELERATES condensation, not this magnitude. Banded an order of magnitude around ~20x k_polymerization per unit." }
  provenance:
    source: "author estimate anchored to the well-established acceleration of tannin–anthocyanin condensation by acetaldehyde: controlled micro-oxygenation / acetaldehyde addition speeds polymeric-pigment formation and colour stabilization in red wine (Timberlake & Bridle 1976, 'Interactions between anthocyanins, phenolic compounds, and acetaldehyde'; Es-Safi et al. 1999, J. Agric. Food Chem., on acetaldehyde-mediated flavanol–anthocyanin condensation; Ribéreau-Gayon et al., Handbook of Enology). The trilinear constant folds the (acetaldehyde-protonation, ethylidene carbocation, two-step flavanol/anthocyanin addition) chemistry into one lumped k."
    conditions: "generic red wine at cellar pH (~3.4-3.8) and temperature; trilinear in the free-acetaldehyde, free-anthocyanin and condensed-grape-tannin pools (all g/L) at T_ref = 293.15 K. Represents the aggregate acetaldehyde-bridged (ethylidene) condensation forming tannin-ethyl-anthocyanin pigments."
    notes: "SOURCED FORM (trilinear, acetaldehyde-accelerated, forming stable ethyl-bridged pigment) + SPECULATIVE magnitude. The load-bearing sourced claim is that acetaldehyde ACCELERATES condensation and that the product is a stable polymeric pigment (colour stabilization), not this absolute rate. LUMPED termolecular caveat: real bridging is a multi-step sequence (protonation -> carbinol -> ethylidene carbocation -> addition), collapsed to one mass-action step."

# -- ACTIVATION ENERGY: warmer aging bridges faster (sourced ordering, REACTION-scale) --------------
# Its OWN parameter (prime directive #2), distinct from E_a_polymerization (the direct route) — same
# reason E_a_ellagitannin_oxidation is distinct from E_a_oak_extraction (same molecule, separate E_a
# per mechanism): the direct and bridged condensations are DIFFERENT reactions, so a shared E_a would
# make this Process read a param whose provenance is about the other route. REACTION-scale (~55
# kJ/mol), like every other aging reaction E_a and well above the weak diffusion E_a_oak_extraction.
E_a_acetaldehyde_bridge:
  value: 55000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 75000.0, note: "Q10 ~1.6-2.9 at 20 C. Wine polyphenol condensation activation energies ~35-75 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster acetaldehyde-bridged condensation, so warm storage advances colour stabilization faster); the magnitude is speculative and banded. Its OWN parameter (prime directive #2), REACTION-scale, distinct from the direct-route E_a_polymerization and the weak diffusion E_a_oak_extraction." }
  provenance:
    source: "SOURCED ORDERING: acetaldehyde-bridged flavanol–anthocyanin condensation and ethyl-bridged pigment formation accelerate with temperature (textbook Arrhenius; accelerated-ageing / micro-oxygenation studies of red-wine colour and polymeric pigment; Ribéreau-Gayon Handbook of Enology). Warm storage advances the ethyl-bridged colour stabilization faster — the established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate acetaldehyde-bridged condensation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster) is the sourced, load-bearing claim. REACTION-scale (~55 kJ/mol). Its OWN parameter (prime directive #2), distinct from the direct-route E_a_polymerization even though numerically similar — the two are separate reactions."

# -- MASS-BASED ACETALDEHYDE-CONSUMPTION YIELD: g acetaldehyde incorporated per g anthocyanin bridged
# d(acetaldehyde)/dt = -y_acetaldehyde_per_anthocyanin * r  (both g/L/h). MASS-based (g/g): anthocyanin
# is a lumped pool with no clean molar mass (an M_anthocyanin would be fake precision — the
# y_tannin_per_anthocyanin / y_ellag_per_o2 idiom). Sets HOW MUCH acetaldehyde a given amount of
# bridged anthocyanin consumes (and thus how much ethyl-bridge carbon is booked on-ledger). Central
# ~0.09 reflects ONE acetaldehyde (44 g/mol) per anthocyanin unit (~500 g/mol) bridged: 44/500 ~ 0.088.
# UNLIKE the off-ledger tannin/anthocyanin yields, THIS yield drives an ON-LEDGER transfer (acetaldehyde
# -> ethyl_bridge), so it participates in the carbon balance — but that balance closes for ANY value of
# this yield (whatever acetaldehyde is consumed is exactly what the bridge pool gains, carbon-exact).
y_acetaldehyde_per_anthocyanin:
  value: 0.09
  unit: "g/g"   # g acetaldehyde consumed per g anthocyanin bridged; d(acetaldehyde)/dt = -y * r
  tier: speculative
  uncertainty: { low: 0.03, high: 0.2, note: "g acetaldehyde incorporated per g anthocyanin condensed via the ethyl bridge. One acetaldehyde (44 g/mol) bridges one anthocyanin unit (~500 g/mol lumped), a mass ratio ~0.09; banded to reflect the lumped-pool molar-mass uncertainty. Governs how much acetaldehyde the bridged route draws down (the emergent 'micro-ox lowers the oxidised-acetaldehyde note') and how much ethyl-bridge carbon is booked on-ledger — but total_carbon closes for ANY value (acetaldehyde carbon consumed == ethyl_bridge carbon gained)." }
  provenance:
    source: "author estimate from the ethylidene-bridge stoichiometry: one acetaldehyde forms one -CH(CH3)- bridge per tannin–anthocyanin adduct (Timberlake & Bridle 1976; Es-Safi et al. 1999), expressed as a MASS ratio because the lumped anthocyanin pool has no clean molar mass (the y_tannin_per_anthocyanin / y_ellag_per_o2 idiom)."
    conditions: "g acetaldehyde consumed per g anthocyanin bridged, generic red wine at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude, MASS-based (no fake molar mass for the lumped anthocyanin pool). UNLIKE the direct route's off-ledger yields, this drives an ON-LEDGER acetaldehyde -> ethyl_bridge transfer (the split-ledger carbon capture, D-80); carbon closes for any value, so this only sets the MAGNITUDE of the acetaldehyde drawdown, not whether carbon balances."
