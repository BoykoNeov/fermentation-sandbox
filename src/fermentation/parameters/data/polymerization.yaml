# Tannin–anthocyanin condensation — red-wine colour stabilization + astringency softening
# (decision D-79, §4.1 aging). The DOMINANT real astringency-softening + red-colour-evolution
# mechanism the D-77/D-78 oak beats deferred and the milestone-3 plan names — now built, unblocked
# by D-78's off-every-ledger tannin/taste-pool infrastructure (though it reuses NONE of the oak
# pools — see "OAK-INDEPENDENT" below).
#
# SHARED, but WINE-ONLY in effect (the aging.yaml / oak.yaml pattern): the names below are
# collision-free and merged into every compiled scenario's ParameterSet at compile.py's
# shared_files, but only the WINE medium carries the anthocyanin/tannin state slots and wires
# TanninAnthocyaninCondensation, so the params are inert for beer. INERT until an anthocyanin+tannin
# dose (must inputs) AND a begin_aging enable (aging is post-ferment); an un-dosed / white-wine run
# is byte-for-byte the case without this beat (prime directive #3).
#
# THE PROCESS (fermentation.core.kinetics.aging.TanninAnthocyaninCondensation, WINE-ONLY):
#
#   r                      = k_polymerization * f(T) * [anthocyanin] * [tannin]   # g anthocyanin/L/h
#   d(anthocyanin)/dt      = -r
#   d(tannin)/dt           = -y_tannin_per_anthocyanin * r
#
# a BILINEAR direct condensation (the SulfiteOxidation/EllagitanninOxidation bilinear form): free
# monomeric anthocyanin and condensed grape tannin combine into a polymeric pigment, warmed by an
# Arrhenius factor f(T) = arrhenius_factor(T, E_a_polymerization, T_ref) so warm aging condenses
# faster. The polymeric-pigment PRODUCT is NOT a state slot: in v1 condensation is the SOLE fate of
# anthocyanin, so the stable pigment is exactly (anthocyanin_0 - anthocyanin(t)) and is
# reconstructed POST-HOC by analysis.polymeric_pigment_series (the iso_alpha/A420 discriminator:
# A420 HAD to integrate because O2 has competing sinks; here anthocyanin's single fate makes the
# pigment reconstructible, so it is a readout, not a slot). A future BLEACHING beat (SO2/pH
# decolorization — a SECOND anthocyanin fate to a COLOURLESS form) is what would break that identity
# and promote the pigment to a slot.
#
# THE TWO EMERGENT PAYOFFS (the D-79 spine):
#   (1) ASTRINGENCY SOFTENS. analysis.astringency_series now reads FREE tannin (tannin + oak
#       ellagitannin, both harsh); the polymeric pigment is soft and NOT counted. As tannin condenses
#       into pigment the free-tannin pool — and the astringency — declines. This is the DOMINANT
#       softening mechanism D-78's oxidative ellagitannin consumption could only contribute one
#       directional term to.
#   (2) COLOUR STABILIZES. analysis.color_series counts BOTH free anthocyanin (bright, bleachable)
#       AND the polymeric pigment (SO2/pH-STABLE): free anthocyanin declines but the stable pigment
#       rises, so total red colour is RETAINED as its form shifts from labile to stable — the young
#       purple-red → aged brick-red evolution. In v1 (no bleaching sink) the total is conserved; the
#       observable dynamic is the monomeric → polymeric SHIFT (polymeric_pigment_series).
#
# OAK-INDEPENDENT AND O2-INDEPENDENT (the D-79 correctness crux). Tannin–anthocyanin polymerization
# is a GRAPE-tannin + GRAPE-anthocyanin reaction — a steel-tank red with NO oak and NO oxygen still
# polymerizes, softens, and stabilizes its colour. So this Process gates on the grape-derived
# `anthocyanin` and `tannin` pools ONLY: it draws NO share of the shared o2 budget (unlike every
# D-71..D-78 oxidative sink) and reads NO oak pool (the oak `ellagitannin` is a DIFFERENT, oak-
# derived hydrolysable tannin — reusing it would wrongly make polymerization impossible without an
# add_oak dose). `tannin` is the grape CONDENSED (flavan-3-ol) tannin the D-78 note left the
# namespace free for; astringency_series sums it WITH oak ellagitannin because both taste harsh.
#
# OFF EVERY LEDGER (the iso_alpha / ellagitannin precedent). anthocyanin and tannin are grape-derived
# — their carbon comes from an UNTRACKED grape-solids source, so booking them as mass would demand a
# grape-phenolic carbon pool that does not exist. Both slots are off
# total_carbon/total_mass/total_nitrogen, so this Process moves NOTHING conserved (like OakExtraction
# / EllagitanninOxidation) and — a pure g/L transfer — needs NO chemistry.py species registration.
# This is also why the tannin-consumption yield is MASS-based (y_tannin_per_anthocyanin, g/g), NOT a
# molar stoichiometry: both anthocyanin and the condensed-tannin macromolecule are lumped pools with
# no clean molar mass (an M_tannin would be fake precision — the y_ellag_per_o2 precedent).
#
# SUBSTRATE-GATED ⇒ ADDS ON TOP, NO RE-BASELINE (and trivially so — it touches no o2). Doubly gated
# on anthocyanin AND tannin (zero unless BOTH are dosed), so a white wine (no anthocyanin) or a
# no-tannin run is byte-for-byte the case without this Process. Because it draws no o2 it does not
# even interact with the k_ethanol_oxidation + k_browning = 5.0e-4 always-on anchor — a wholly
# separate, non-oxidative axis (the OakExtraction diffusion-axis precedent, but on grape pools).
#
# SCOPE:
#   * DIRECT condensation (D-79) + the ACETALDEHYDE-BRIDGED (ethylidene) route (D-80, built below).
#     The bridged route — dissolved O2 -> acetaldehyde (D-71) -> ethyl-bridge linking tannin and
#     anthocyanin — is the SPLIT-LEDGER beat D-79 deferred. It was deferred because acetaldehyde is
#     ON the carbon ledger (its carbon is borrowed exactly from E by OxidativeAcetaldehyde): an
#     off-ledger pigment consuming the on-ledger acetaldehyde pool would make carbon vanish and fail
#     assert_conserved. The D-80 fix is SPLIT-LEDGER accounting — a NEW on-ledger `ethyl_bridge` state
#     slot (weighted at cf(ethylidene) in total_carbon) captures the acetaldehyde carbon, so the
#     grape bulk (anthocyanin/tannin) stays OFF the ledger while the acetaldehyde-derived C2 bridge
#     stays ON it, and total_carbon closes to machine precision (acetaldehyde C -> bridge C). This is
#     where "controlled micro-oxygenation stabilizes red colour" enters: add_oxygen -> acetaldehyde
#     -> bridging -> more pigment + softening + a LOWER oxidised-acetaldehyde note. See the
#     AcetaldehydeBridgedCondensation Process (fermentation.core.kinetics.aging) and the params below.
#   * TANNIN SELF-POLYMERIZATION (tannin–tannin condensation, the OTHER big softener) is now BUILT
#     (D-84, TanninSelfPolymerization, params below): grape tannin condenses WITH ITSELF (bimolecular
#     [tannin]^2) into a soft polymer, a pure off-ledger tannin sink. So a WHITE / anthocyanin-
#     exhausted wine now softens too — astringency softening is no longer "one directional" (retiring
#     the D-78 honesty note here). Together with the anthocyanin-limited A-T condensation it makes the
#     softening multi-mechanism.
#   * TANNIN-ETHYL-TANNIN (acetaldehyde bridging TWO flavanols, no anthocyanin) is now BUILT too
#     (D-85, TanninEthylTanninCondensation, params below): the acetaldehyde-bridged analogue of D-84,
#     anchored on tannin (not anthocyanin), depositing NO pigment (colourless) — so it draws tannin
#     without touching anthocyanin/colour and preserves the D-80 anchor-on-anthocyanin accounting.
#   * PIGMENT COLOUR EQUIVALENCE. Each condensed anthocyanin unit is counted as contributing the SAME
#     colour as when it was free (just now STABLE) — polymeric pigments' genuinely different (pH/SO2-
#     resistant, somewhat lower molar-absorptivity) colour is a Tier-3-beyond refinement. So total
#     colour is conserved in v1; the SHIFT monomeric→polymeric is the honest directional signal.
#   * NO A520/A420 HUE RATIO, NO SO2/pH BLEACHING of monomeric anthocyanin — later beats.
#
# TIER. ALL speculative — the condensation FORM (bilinear anthocyanin×tannin, warmer-faster,
# saturating on the limiting anthocyanin) is textbook red-wine chemistry and the warmer-faster
# ORDERING is a sourced claim, but every magnitude is an order-of-magnitude author estimate and the
# aging axis is the Tier-3 frontier. The Process floors its outputs at speculative (parameter-tier
# propagation, D-1). Load-bearing sourced claims: (1) anthocyanins and tannins condense into
# polymeric pigments that are SOFTER and colour-STABLE (Somers 1971; Ribéreau-Gayon; the young
# purple → aged brick-red / softening evolution), (2) the reaction is bimolecular (rate rises with
# both reactant concentrations), (3) warmer aging condenses faster (E_a > 0, reaction-scale).

# -- BILINEAR CONDENSATION RATE: anthocyanin + tannin -> polymeric pigment ----------------------
k_polymerization:
  value: 2.0e-3
  unit: "L/(g*h)"   # r = k_polymerization * f(T) * [anthocyanin] * [tannin]  (bilinear, both g/L)
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 8.0e-3, note: "bimolecular rate constant at T_ref = 20 C. At a ~2 g/L grape-tannin charge the pseudo-first-order anthocyanin rate k*[tannin] ~ 4.0e-3 /h => half-life ln2/(k*[tannin]) ~ 170 h ~ 1 week at high tannin, lengthening to months as anthocyanin (the limiting reagent) and tannin are drawn down — the observed months-to-years timescale over which young red wine softens and its colour stabilizes. The LOAD-BEARING claim is the FORM (bimolecular, saturating on anthocyanin) and the warmer-faster ordering, not this magnitude." }
  provenance:
    source: "author estimate anchored to the timescale over which young red wine loses harsh astringency and shifts from purple-red to stable brick-red as monomeric anthocyanins and condensed tannins polymerize into polymeric pigments (Somers 1971, 'The polymeric nature of wine pigments', Phytochemistry 10:2175; Ribéreau-Gayon et al., Handbook of Enology, on tannin–anthocyanin condensation and ageing; months-to-a-few-years at cellar temperature). The bimolecular constant folds the (acid-catalysed, C4-C8 flavylium–flavanol addition) chemistry into one lumped k."
    conditions: "generic red wine at cellar pH (~3.4-3.8) and temperature; bilinear in the free-anthocyanin and condensed-grape-tannin pools (both g/L) at T_ref = 293.15 K. Represents the aggregate direct (non-acetaldehyde-bridged) condensation, not a single adduct."
    notes: "SOURCED FORM (bimolecular direct condensation, saturating on the limiting anthocyanin, softening + colour-stabilizing) + SPECULATIVE magnitude (order-of-magnitude, banded to the months-to-years red-wine ageing timescale). The load-bearing sourced claim is the warmer-faster ordering (E_a_polymerization) and that condensation SOFTENS and STABILIZES, not this absolute rate. The acetaldehyde-bridged condensation (D-80) and tannin self-polymerization (D-84) / tannin-ethyl-tannin (D-85) sibling softeners are built below."

# -- ACTIVATION ENERGY: warmer aging condenses faster (sourced ordering, REACTION-scale) --------
# REACTION-scale (~55 kJ/mol, like the oxidative-sink E_a's and E_a_ester_hydrolysis), NOT the weak
# DIFFUSION E_a_oak_extraction (20 kJ/mol): tannin–anthocyanin condensation is an acid-catalysed
# chemical reaction (flavylium–flavanol addition), so it carries the reaction-scale temperature
# sensitivity, not a diffusion one. Its OWN parameter (prime directive #2).
E_a_polymerization:
  value: 55000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 75000.0, note: "Q10 ~1.6-2.9 at 20 C. Wine polyphenol condensation activation energies ~35-75 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster condensation, so warm storage ages red wine's structure/colour faster — the well-known 'warm cellars age reds faster'); the magnitude is speculative and banded. Its OWN parameter (prime directive #2) and REACTION-scale, distinct from the weak diffusion E_a_oak_extraction." }
  provenance:
    source: "SOURCED ORDERING: tannin–anthocyanin condensation and polymeric-pigment formation accelerate with temperature (textbook Arrhenius; accelerated-ageing studies of red-wine colour/polymeric pigment; Ribéreau-Gayon Handbook of Enology). Warm storage advances the purple→brick-red colour shift and the astringency softening faster — the established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate tannin–anthocyanin condensation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster condensation) is the sourced, load-bearing claim. REACTION-scale (~55 kJ/mol), matching the oxidative siblings and the ester-hydrolysis E_a and DELIBERATELY well above the weak diffusion E_a_oak_extraction (20 kJ/mol) — condensation is a chemical reaction, oak extraction is diffusion, so separate E_a's (prime directive #2)."

# -- MASS-BASED TANNIN-CONSUMPTION YIELD: g condensed tannin spent per g anthocyanin condensed ---
# d(tannin)/dt = -y_tannin_per_anthocyanin * r  (both g/L/h). MASS-based (g/g), NOT a molar
# stoichiometry: both the anthocyanin pool and the condensed-tannin macromolecule are LUMPED pools
# with no clean molar mass, so an M_tannin/M_anthocyanin ratio would be fake precision (the
# y_ellag_per_o2 precedent). Sets HOW MUCH free tannin (and thus astringency) a given amount of
# condensed anthocyanin removes. Both slots off every ledger => this consumption moves nothing
# conserved. Central ~3 reflects that the condensed-tannin oligomer is heavier than the anthocyanin
# it binds (a ~1:1 molar adduct of a ~1000 g/mol tannin oligomer with a ~500 g/mol anthocyanin), so
# roughly a few grams of tannin condense per gram of anthocyanin — but banded wide.
y_tannin_per_anthocyanin:
  value: 3.0
  unit: "g/g"   # g condensed tannin consumed per g anthocyanin condensed; d(tannin)/dt = -y * r
  tier: speculative
  uncertainty: { low: 1.0, high: 8.0, note: "g lumped condensed grape tannin spent per g anthocyanin condensed. A ~1:1 molar tannin–anthocyanin adduct of a heavier tannin oligomer (~1000 g/mol) with anthocyanin (~500 g/mol) gives a mass ratio of order ~2; higher-oligomer tannins push it up. Central 3.0 is a mid-band estimate, banded an order of magnitude. Governs the astringency-softening MAGNITUDE (with anthocyanin the limiting reagent, total tannin removed ~ y * anthocyanin_0, a MODEST fraction of the ~1-4 g/L tannin via THIS route — the tannin self-polymerization (D-84) and tannin-ethyl-tannin (D-85) routes draw the rest)." }
  provenance:
    source: "author estimate from the tannin–anthocyanin condensation stoichiometry: a roughly 1:1 molar flavanol(-oligomer)–anthocyanin adduct (Somers 1971; Ribéreau-Gayon on condensed-pigment structure), expressed as a MASS ratio because the lumped condensed-tannin macromolecule has no clean molar mass (contrast the real-molecule 2:1 SO2:O2 _SO2_PER_O2)."
    conditions: "g lumped condensed grape tannin consumed per g anthocyanin condensed, generic red wine at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude, MASS-based (no fake molar mass for the lumped tannin/anthocyanin pools — the y_ellag_per_o2 idiom). Both tannin and anthocyanin are off every ledger, so this consumption moves nothing conserved. Sets the astringency-softening rate for this route; tannin self-polymerization (D-84) and tannin-ethyl-tannin (D-85) are the other softeners, so softening is multi-mechanism (no longer one-directional). REUSED by the D-80 acetaldehyde-bridged route: the bridged adduct consumes tannin + anthocyanin in the SAME lumped mass ratio as the direct route (one shared stoichiometry, one param)."

# ============================================================================================
# D-80: THE ACETALDEHYDE-BRIDGED (ETHYLIDENE) CONDENSATION ROUTE — the split-ledger colour beat
# ============================================================================================
# The fermentation.core.kinetics.aging.AcetaldehydeBridgedCondensation Process (WINE-ONLY). The
# SECOND formation pathway to polymeric pigment (after the D-79 direct route above), and the FIRST
# link from the OXIDATIVE sub-axis (o2 -> acetaldehyde, D-71) to red-wine COLOUR:
#
#   r                     = k_acetaldehyde_bridge * f(T) * [free acetaldehyde] * [anthocyanin] * [tannin]
#   d(anthocyanin)/dt     = -r                                          # OFF-ledger (grape-derived)
#   d(tannin)/dt          = -y_tannin_per_anthocyanin * r               # OFF-ledger (reuse D-79 yield)
#   d(acetaldehyde)/dt    = -y_acetaldehyde_per_anthocyanin * r         # ON the carbon ledger (D-27/D-71)
#   d(ethyl_bridge)/dt    = +(acetaldehyde carbon consumed) / cf(ethylidene)   # ON-ledger, carbon-exact
#
# a TRILINEAR lumped termolecular step: the ethyl bridge -CH(CH3)- (from acetaldehyde) links ONE
# grape tannin unit to ONE anthocyanin unit (tannin-ethyl-anthocyanin), so the rate needs all three
# present. f(T) = arrhenius_factor(T, E_a_acetaldehyde_bridge, T_ref) (own reaction-scale E_a).
#
# THE SPLIT LEDGER (the D-80 crux, and why D-79 deferred it). One reaction straddles two ledgers:
# the grape-phenolic bulk (anthocyanin + tannin) is OFF every ledger (grape-derived, untracked — the
# iso_alpha/ellagitannin precedent), but acetaldehyde's carbon is ON the carbon ledger (borrowed
# exactly from ethanol E by OxidativeAcetaldehyde, D-71). Consuming on-ledger acetaldehyde into an
# off-ledger pigment would make carbon VANISH and fail assert_conserved (the trap D-79 named). The
# fix: a NEW on-ledger `ethyl_bridge` state slot (media.wine_schema; weighted at cf(ethylidene) in
# conservation.total_carbon) captures exactly the acetaldehyde carbon. Carbon closes to machine
# precision via the EsterHydrolysis carbon-exact split (release at cf(acetaldehyde), redeposit at
# cf(ethylidene)); the lost carbonyl O (-> water) is the standing aging-axis mass gap (total_mass
# weights only {S,E,CO2}, never asserted on an aging run — the D-71 E->acetaldehyde scope-out).
# The bridge MUST be an integrated slot, not a post-hoc readout: acetaldehyde has COMPETING fates
# (D-27 production, D-71 oxidative production, D-27 reduction to E, D-47 SO2 binding, and now
# bridging), so the bridged amount is not reconstructible from its drawdown (the A420 discriminator);
# and total_carbon = weights @ y reads state slots, so the carbon must physically live in a slot.
#
# READS FREE ACETALDEHYDE (the D-47 precedent). SO2-bound acetaldehyde is the bisulfite adduct — its
# carbonyl is blocked, so it CANNOT form the ethylidene bridge (no carbonyl for the flavanol to
# attack), exactly as AcetaldehydeReduction reduces only free acetaldehyde under SO2 (D-47). So the
# rate reads free_acetaldehyde when so2_total > 0, else total (the so2_total > 0 guard is exact — an
# unsulfited run pays no per-RHS pH solve and is byte-for-byte total). EMERGENT payoff: SO2 DELAYS
# acetaldehyde-mediated colour stabilization (bound acetaldehyde is unavailable to bridge) — a real
# winemaking fact, emergent from the shared binding equilibrium, nothing scripted.
#
# TRIPLY SUBSTRATE-GATED => adds on top, NO re-baseline. Zero unless acetaldehyde AND anthocyanin AND
# tannin are all present, so a white / no-tannin / no-acetaldehyde wine (and all beer) is
# byte-for-byte the case without this Process. Wine-only (all three grape/bridge slots are wine-only)
# + disabled at compile, enabled by begin_aging (aging is post-ferment).
#
# SCOPE: this route anchors on ANTHOCYANIN (tannin-ethyl-anthocyanin), keeping its fate = pigment. The
# tannin-ethyl-tannin analogue (bridging two flavanols, no anthocyanin) is built separately (D-85).
#
# TIER: ALL speculative. SOURCED FORM (acetaldehyde bridges anthocyanins and tannins into ethyl-
# linked polymeric pigments; the reaction is acid-catalysed and warmer-faster; SO2 blocks it via
# carbonyl binding — Timberlake & Bridle 1976; Es-Safi et al. 1999; Ribéreau-Gayon Handbook of
# Enology) + SPECULATIVE magnitudes (order-of-magnitude author estimates, banded).

# -- TRILINEAR BRIDGED-CONDENSATION RATE: acetaldehyde + anthocyanin + tannin -> ethyl-bridged pigment
# r = k_acetaldehyde_bridge * f(T) * [free acetaldehyde] * [anthocyanin] * [tannin]  (all g/L). Units
# L^2/(g^2*h). Set ~20x k_polymerization PER UNIT so that at a typical micro-ox acetaldehyde level
# (~0.05 g/L = 50 mg/L) the bridged pseudo-rate k_bridge*[acet] ~ 1e-3 /(g/L)/h is COMPARABLE to the
# direct k_polymerization (2e-3) — i.e. once acetaldehyde is present the bridged route contributes on
# the same order as the direct one, the sourced "acetaldehyde ACCELERATES polymerization" fact. Below
# ~mg/L acetaldehyde it is negligible (no micro-ox => direct route dominates), which is correct.
k_acetaldehyde_bridge:
  value: 4.0e-2
  unit: "L^2/(g^2*h)"   # r = k * f(T) * [free acetaldehyde] * [anthocyanin] * [tannin]  (all g/L)
  tier: speculative
  uncertainty: { low: 1.0e-2, high: 1.6e-1, note: "trilinear rate constant at T_ref = 20 C. At ~50 mg/L acetaldehyde the pseudo-bilinear constant k_bridge*[acet] ~ 2.0e-3 L/(g*h) is of order k_polymerization (2.0e-3) — so with micro-ox acetaldehyde present the bridged route condenses anthocyanin on a comparable timescale to the direct route, and jointly they shorten the months-to-years softening/colour-stabilization span. The LOAD-BEARING claim is the FORM (trilinear, needs acetaldehyde) and that acetaldehyde ACCELERATES condensation, not this magnitude. Banded an order of magnitude around ~20x k_polymerization per unit." }
  provenance:
    source: "author estimate anchored to the well-established acceleration of tannin–anthocyanin condensation by acetaldehyde: controlled micro-oxygenation / acetaldehyde addition speeds polymeric-pigment formation and colour stabilization in red wine (Timberlake & Bridle 1976, 'Interactions between anthocyanins, phenolic compounds, and acetaldehyde'; Es-Safi et al. 1999, J. Agric. Food Chem., on acetaldehyde-mediated flavanol–anthocyanin condensation; Ribéreau-Gayon et al., Handbook of Enology). The trilinear constant folds the (acetaldehyde-protonation, ethylidene carbocation, two-step flavanol/anthocyanin addition) chemistry into one lumped k."
    conditions: "generic red wine at cellar pH (~3.4-3.8) and temperature; trilinear in the free-acetaldehyde, free-anthocyanin and condensed-grape-tannin pools (all g/L) at T_ref = 293.15 K. Represents the aggregate acetaldehyde-bridged (ethylidene) condensation forming tannin-ethyl-anthocyanin pigments."
    notes: "SOURCED FORM (trilinear, acetaldehyde-accelerated, forming stable ethyl-bridged pigment) + SPECULATIVE magnitude. The load-bearing sourced claim is that acetaldehyde ACCELERATES condensation and that the product is a stable polymeric pigment (colour stabilization), not this absolute rate. LUMPED termolecular caveat: real bridging is a multi-step sequence (protonation -> carbinol -> ethylidene carbocation -> addition), collapsed to one mass-action step."

# -- ACTIVATION ENERGY: warmer aging bridges faster (sourced ordering, REACTION-scale) --------------
# Its OWN parameter (prime directive #2), distinct from E_a_polymerization (the direct route) — same
# reason E_a_ellagitannin_oxidation is distinct from E_a_oak_extraction (same molecule, separate E_a
# per mechanism): the direct and bridged condensations are DIFFERENT reactions, so a shared E_a would
# make this Process read a param whose provenance is about the other route. REACTION-scale (~55
# kJ/mol), like every other aging reaction E_a and well above the weak diffusion E_a_oak_extraction.
E_a_acetaldehyde_bridge:
  value: 55000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 75000.0, note: "Q10 ~1.6-2.9 at 20 C. Wine polyphenol condensation activation energies ~35-75 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster acetaldehyde-bridged condensation, so warm storage advances colour stabilization faster); the magnitude is speculative and banded. Its OWN parameter (prime directive #2), REACTION-scale, distinct from the direct-route E_a_polymerization and the weak diffusion E_a_oak_extraction." }
  provenance:
    source: "SOURCED ORDERING: acetaldehyde-bridged flavanol–anthocyanin condensation and ethyl-bridged pigment formation accelerate with temperature (textbook Arrhenius; accelerated-ageing / micro-oxygenation studies of red-wine colour and polymeric pigment; Ribéreau-Gayon Handbook of Enology). Warm storage advances the ethyl-bridged colour stabilization faster — the established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate acetaldehyde-bridged condensation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster) is the sourced, load-bearing claim. REACTION-scale (~55 kJ/mol). Its OWN parameter (prime directive #2), distinct from the direct-route E_a_polymerization even though numerically similar — the two are separate reactions."

# -- MASS-BASED ACETALDEHYDE-CONSUMPTION YIELD: g acetaldehyde incorporated per g anthocyanin bridged
# d(acetaldehyde)/dt = -y_acetaldehyde_per_anthocyanin * r  (both g/L/h). MASS-based (g/g): anthocyanin
# is a lumped pool with no clean molar mass (an M_anthocyanin would be fake precision — the
# y_tannin_per_anthocyanin / y_ellag_per_o2 idiom). Sets HOW MUCH acetaldehyde a given amount of
# bridged anthocyanin consumes (and thus how much ethyl-bridge carbon is booked on-ledger). Central
# ~0.09 reflects ONE acetaldehyde (44 g/mol) per anthocyanin unit (~500 g/mol) bridged: 44/500 ~ 0.088.
# UNLIKE the off-ledger tannin/anthocyanin yields, THIS yield drives an ON-LEDGER transfer (acetaldehyde
# -> ethyl_bridge), so it participates in the carbon balance — but that balance closes for ANY value of
# this yield (whatever acetaldehyde is consumed is exactly what the bridge pool gains, carbon-exact).
y_acetaldehyde_per_anthocyanin:
  value: 0.09
  unit: "g/g"   # g acetaldehyde consumed per g anthocyanin bridged; d(acetaldehyde)/dt = -y * r
  tier: speculative
  uncertainty: { low: 0.03, high: 0.2, note: "g acetaldehyde incorporated per g anthocyanin condensed via the ethyl bridge. One acetaldehyde (44 g/mol) bridges one anthocyanin unit (~500 g/mol lumped), a mass ratio ~0.09; banded to reflect the lumped-pool molar-mass uncertainty. Governs how much acetaldehyde the bridged route draws down (the emergent 'micro-ox lowers the oxidised-acetaldehyde note') and how much ethyl-bridge carbon is booked on-ledger — but total_carbon closes for ANY value (acetaldehyde carbon consumed == ethyl_bridge carbon gained)." }
  provenance:
    source: "author estimate from the ethylidene-bridge stoichiometry: one acetaldehyde forms one -CH(CH3)- bridge per tannin–anthocyanin adduct (Timberlake & Bridle 1976; Es-Safi et al. 1999), expressed as a MASS ratio because the lumped anthocyanin pool has no clean molar mass (the y_tannin_per_anthocyanin / y_ellag_per_o2 idiom)."
    conditions: "g acetaldehyde consumed per g anthocyanin bridged, generic red wine at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude, MASS-based (no fake molar mass for the lumped anthocyanin pool). UNLIKE the direct route's off-ledger yields, this drives an ON-LEDGER acetaldehyde -> ethyl_bridge transfer (the split-ledger carbon capture, D-80); carbon closes for any value, so this only sets the MAGNITUDE of the acetaldehyde drawdown, not whether carbon balances."

# ============================================================================================
# D-81: OXIDATIVE ANTHOCYANIN FADING — the O2-coupled bleaching loss that makes colour DECLINE
# ============================================================================================
# The fermentation.core.kinetics.aging.AnthocyaninFading Process (WINE-ONLY). The SECOND fate of
# free monomeric anthocyanin (besides condensation into stable pigment, D-79/D-80): dissolved O2
# degrades it to COLOURLESS products (oxidative fading; quinone/peroxide-mediated). This is the beat
# that makes analysis.color_series GENUINELY decline and unmasks the colour-stability payoff — the
# condensed polymeric pigment SURVIVES while the free anthocyanin bleaches.
#
#   r_o2                    = k_anthocyanin_fade * f(T) * [o2] * [anthocyanin]   # g O2/L/h, this route's share
#   d(o2)/dt                = -r_o2
#   d(anthocyanin)/dt       = -y_anthocyanin_per_o2 * r_o2
#   d(faded_anthocyanin)/dt = +y_anthocyanin_per_o2 * r_o2
#
# a BILINEAR O2 sink (the SulfiteOxidation/EllagitanninOxidation form), transferring anthocyanin to
# the colourless faded_anthocyanin slot at a MASS-based yield. f(T) = arrhenius_factor(T,
# E_a_anthocyanin_fade, T_ref) (own reaction-scale E_a). A pure g/L transfer between two OFF-LEDGER
# slots, so the D-81 colour identity anthocyanin + polymeric_pigment + faded_anthocyanin ≡
# anthocyanin0 closes by construction.
#
# O2-COUPLED, so SO2 PROTECTION is EMERGENT (the D-81 crux). Fading draws the SHARED o2 budget, NOT a
# scripted g(SO2,pH) decay. "SO2 protects the colour" is true because SO2 is an ANTIOXIDANT: it
# scavenges o2 (bisulfite oxidation, SulfiteOxidation D-72), leaving less o2 to fade the anthocyanin.
# ProcessSet sums the o2 sinks and splits o2 by ki/Sum(k), so the protection FALLS OUT of the shared
# pool with nothing scripted (the D-72/D-80 "SO2 effect, emergent" signature). This is DELIBERATELY
# NOT a non-oxidative decay with an SO2 factor bolted on: SO2 does not meaningfully protect against
# thermal/hydrolytic decay, so scripting an SO2 factor onto an O2-independent rate would attribute the
# protection to the wrong pathway. The O2 coupling is the physically-honest mechanism.
#
# SUBSTRATE-GATED => adds on top, NO re-baseline. Bilinear in [anthocyanin], zero unless a red must is
# dosed, so a white / no-anthocyanin (and all-beer) run is byte-for-byte the case without this
# Process (the k_ethanol_oxidation + k_browning = 5.0e-4 anchor untouched). A red wine dosed with BOTH
# anthocyanin and o2 DOES now split its o2 one more way — the physically-correct cost of a new
# oxidative sink competing with the D-71..D-78 siblings (documented, not silent). Wine-only + disabled
# at compile, enabled by begin_aging (aging is post-ferment).
#
# SCOPE (v1): the OXIDATIVE fade only. The REVERSIBLE SO2/pH MASKING of monomeric anthocyanin
# (flavylium <=> colourless bisulfite adduct / carbinol equilibrium — the literal Somers "bleaching"
# assay) is a fast equilibrium READOUT, not a fate — built as the D-82 Somers readout below. The
# O2-INDEPENDENT (thermal/hydrolytic) fade — an anaerobic sealed red losing its monomeric colour with
# no oxygen — was deferred here as a separate pathway and is NOW BUILT (ThermalAnthocyaninFade, D-83
# below), so this Process is no longer the whole fade story: a reductive red also fades thermally.
#
# TIER: ALL speculative. SOURCED FORM (dissolved O2 oxidatively degrades anthocyanins to colourless
# products; SO2 protects as an antioxidant; warmer fades faster — Somers & Evans; Ribéreau-Gayon
# Handbook of Enology; accelerated-ageing colour studies) + SPECULATIVE magnitudes (order-of-magnitude
# author estimates, banded). Load-bearing sourced claims: (1) O2 fades free anthocyanin to colourless,
# (2) SO2 (an antioxidant) protects, (3) warmer fades faster (E_a > 0).

# -- BILINEAR OXIDATIVE-FADE RATE: o2 + anthocyanin -> colourless products ------------------------
# r_o2 = k_anthocyanin_fade * f(T) * [o2] * [anthocyanin] (both g/L). This route's SHARE of the o2
# draw. Set ~k_ellagitannin_oxidation (5.0e-3, the sibling bilinear o2*tannin sink): at a micro-ox o2
# charge and a ~0.3 g/L anthocyanin the fade is a meaningful-but-partial anthocyanin loss competing
# with condensation, so colour declines over the months-to-years span WITHOUT exhausting anthocyanin
# instantly. The LOAD-BEARING claim is the FORM (O2-limited, anthocyanin-driven) and that O2 fades
# colour, not this magnitude; banded an order of magnitude.
k_anthocyanin_fade:
  value: 5.0e-3
  unit: "L/(g*h)"   # r_o2 = k_anthocyanin_fade * f(T) * [o2] * [anthocyanin]  (bilinear, both g/L)
  tier: speculative
  uncertainty: { low: 1.0e-3, high: 2.0e-2, note: "bilinear rate constant at T_ref = 20 C, mirroring the sibling k_ellagitannin_oxidation (5.0e-3) o2-sink form. With a micro-ox o2 charge (~30 mg/L) shared across the oxidative sinks, this route fades a meaningful-but-partial fraction of a ~0.3 g/L anthocyanin dose over the months-to-years ageing span, competing with condensation into stable pigment. The LOAD-BEARING claim is the FORM (O2-limited, first-order in both o2 and anthocyanin) and that O2 fades free anthocyanin to colourless, not this absolute rate. Banded an order of magnitude." }
  provenance:
    source: "author estimate anchored to the well-established oxidative fading of free monomeric anthocyanins in red wine: dissolved O2 (via quinones/peroxide from phenolic oxidation) degrades anthocyanins to colourless products, and SO2 protects as an antioxidant (Somers & Evans 1986; Ribéreau-Gayon et al., Handbook of Enology, on anthocyanin oxidation and SO2 protection of colour; accelerated-ageing colour studies). The bilinear constant folds the multi-step O2 -> quinone -> anthocyanin oxidation cascade into one lumped mass-action k on the shared o2 pool."
    conditions: "generic red wine at cellar pH (~3.4-3.8) and temperature; bilinear in the dissolved-o2 and free-anthocyanin pools (both g/L) at T_ref = 293.15 K. Represents the aggregate O2-driven anthocyanin degradation to colourless products (NOT the reversible SO2/pH masking, the D-82 readout, and NOT the O2-independent thermal fade, the separate D-83 ThermalAnthocyaninFade pathway)."
    notes: "SOURCED FORM (O2-limited, anthocyanin-driven oxidative fade to colourless; SO2 protects EMERGENTLY by scavenging o2 via D-72) + SPECULATIVE magnitude (order-of-magnitude, banded). Same bilinear o2*driver form as k_ellagitannin_oxidation / k_so2_oxidation. Draws the SHARED o2 pool, so ProcessSet splits o2 by ki/Sum(k) and SO2 protection needs nothing scripted."

# -- ACTIVATION ENERGY: warmer fades faster (sourced ordering, REACTION-scale) -------------------
# Its OWN parameter (prime directive #2), REACTION-scale (~55 kJ/mol) like every other aging reaction
# E_a and well above the weak diffusion E_a_oak_extraction. Distinct from the condensation E_a's even
# though numerically similar — a DIFFERENT reaction (oxidative degradation, not condensation).
E_a_anthocyanin_fade:
  value: 55000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 75000.0, note: "Q10 ~1.6-2.9 at 20 C. Wine oxidation activation energies ~35-75 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster oxidative fading, so warm storage bleaches red colour faster — the 'warm cellars kill colour' fact); the magnitude is speculative and banded. Its OWN parameter (prime directive #2), REACTION-scale, distinct from the condensation E_a's and the weak diffusion E_a_oak_extraction." }
  provenance:
    source: "SOURCED ORDERING: oxidative anthocyanin degradation accelerates with temperature (textbook Arrhenius; accelerated-ageing studies of red-wine colour loss; Ribéreau-Gayon Handbook of Enology). Warm storage bleaches red colour faster — the established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2-driven anthocyanin fade at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster fade) is the sourced, load-bearing claim. REACTION-scale (~55 kJ/mol). Its OWN parameter (prime directive #2), distinct from the condensation E_a_polymerization / E_a_acetaldehyde_bridge even though numerically similar — a separate reaction (oxidative degradation)."

# -- MASS-BASED FADE YIELD: g anthocyanin faded per g O2 consumed by this route ------------------
# d(anthocyanin)/dt = -y_anthocyanin_per_o2 * r_o2 (both g/L/h). MASS-based (g/g): anthocyanin is a
# lumped pool with no clean molar mass (the y_ellag_per_o2 / y_tannin_per_anthocyanin idiom). Sets
# HOW MUCH anthocyanin a given amount of route-consumed O2 fades — a pure TRANSFER to the colourless
# faded_anthocyanin slot (faded gains exactly what anthocyanin loses), so the colour identity closes
# for ANY value. Central ~1.0 is a lumped-cascade estimate (the O2 -> quinone -> anthocyanin route is
# not a clean 1:1 O2:anthocyanin stoichiometry), banded wide.
y_anthocyanin_per_o2:
  value: 1.0
  unit: "g/g"   # g anthocyanin faded per g O2 consumed by the fade route; d(anthocyanin)/dt = -y * r_o2
  tier: speculative
  uncertainty: { low: 0.3, high: 3.0, note: "g lumped anthocyanin faded per g O2 consumed via this route. The oxidative cascade (O2 -> quinone -> anthocyanin degradation) has no clean molar O2:anthocyanin stoichiometry, so this is a lumped ROUTE yield, not a mechanism ratio; central ~1.0 banded an order of magnitude. Governs the colour-DECLINE magnitude per unit O2 exposure — but the anthocyanin->faded transfer is exact and the colour identity closes for ANY value; this only sets how fast colour falls, not whether it balances." }
  provenance:
    source: "author estimate: g free monomeric anthocyanin faded to colourless per g O2 consumed by this oxidative route, expressed as a MASS ratio because the lumped anthocyanin pool has no clean molar mass and the O2->anthocyanin cascade is multi-step (the y_ellag_per_o2 idiom). Anchored so a micro-ox O2 exposure fades a meaningful-but-partial fraction of a typical anthocyanin dose (Somers & Evans 1986; Ribéreau-Gayon Handbook of Enology)."
    conditions: "g anthocyanin faded per g O2 consumed by the fade route, generic red wine at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude, MASS-based (no fake molar mass for the lumped anthocyanin pool). Drives a pure OFF-LEDGER transfer anthocyanin -> faded_anthocyanin (both off every ledger), so it moves nothing conserved and the D-81 colour identity closes for any value — this only sets the colour-decline MAGNITUDE, not whether it balances."

# ================================================================================================
# D-83: O2-INDEPENDENT THERMAL FADE — heat degrades free anthocyanin to colourless, NO oxygen
# ================================================================================================
# The fermentation.core.kinetics.aging.ThermalAnthocyaninFade Process (WINE-ONLY). The SECOND,
# O2-INDEPENDENT fate that fades free monomeric anthocyanin to colourless — the pathway D-81's
# AnthocyaninFading explicitly deferred. Beyond the O2-driven oxidative bleaching (D-81), anthocyanin
# also degrades by a thermal/hydrolytic route needing NO oxygen: the flavylium ring opens and the
# pigment breaks down purely as a function of temperature and time. This is why a SEALED, ANAEROBIC
# red still loses its bright monomeric colour on the shelf, and why WARM STORAGE kills red colour even
# in a fully reductive bottle. It fills the SAME colourless faded_anthocyanin slot the D-81 oxidative
# fade fills — one sink, two contributing routes (oxidative + thermal).
#
#   r                       = k_anthocyanin_thermal_fade * f(T) * [anthocyanin]   # g anthocyanin/L/h
#   d(anthocyanin)/dt       = -r
#   d(faded_anthocyanin)/dt = +r
#
# FIRST-ORDER in anthocyanin alone (the EsterHydrolysis first-order form, NOT the D-81 bilinear
# o2*anthocyanin form), f(T) = arrhenius_factor(T, E_a_anthocyanin_thermal_fade, T_ref). A pure g/L
# transfer between two OFF-LEDGER slots, so the D-81 colour identity anthocyanin + polymeric_pigment +
# faded_anthocyanin ≡ anthocyanin0 still closes by construction. NO YIELD (contrast D-81): the rate is
# already g anthocyanin/L/h — there is no o2 pool to convert THROUGH — so the transfer is directly
# -r/+r. Two params only: k and E_a.
#
# O2-INDEPENDENT, so SO2 does NOT protect (the D-83 crux, the MIRROR of D-81). D-81 draws the SHARED
# o2 budget, so SO2 protects it EMERGENTLY (SO2 scavenges o2 via SulfiteOxidation D-72, leaving less to
# fade). Thermal fade touches NO o2 — it is not an oxidation — so SO2 gives NO protection: a heavily-
# sulfited red STILL fades thermally, and only COLD storage (E_a > 0) slows it. That is why this is a
# SEPARATE Process, not an SO2-insensitive term bolted onto the D-81 fade: attributing thermal loss to
# the O2/SO2 pathway would mis-explain the mechanism (the same reasoning D-81 used to REJECT scripting
# an SO2 factor onto an O2-independent rate — here honoured by keeping the O2-independent route truly
# SO2-blind). Colour loss only, to the COLOURLESS faded_anthocyanin sink — NOT browning (oxidative
# browning is PhenolicBrowning/A420, D-73; this adds no A420 and no second browning pathway).
#
# SUBSTRATE-GATED => adds on top, NO re-baseline. First-order in [anthocyanin], zero unless a red must
# is dosed, so a white / no-anthocyanin (and all-beer) run is byte-for-byte the case without this
# Process. Unlike D-81 it needs NO o2, so it also fires in a fully reductive (no add_oxygen) bottle —
# the reductive red that was FLAT under D-81 alone now genuinely declines (the D-81 "anaerobic sealed
# red holds its colour" scope-note is RETIRED by this beat). Wine-only + disabled at compile, enabled
# by begin_aging (aging is post-ferment).
#
# TIER: ALL speculative. SOURCED FORM (heat/hydrolysis degrades free anthocyanin to colourless with no
# oxygen; warmer fades faster; SO2 does NOT protect a non-oxidative route — Somers & Evans;
# Ribéreau-Gayon Handbook of Enology on anthocyanin thermal degradation; accelerated-ageing colour
# studies) + SPECULATIVE magnitudes (order-of-magnitude author estimates, banded). Load-bearing sourced
# claims: (1) anthocyanin fades to colourless WITHOUT O2, (2) warmer fades faster (E_a > 0), (3) SO2
# does not protect this route (it is not oxidative).

# -- FIRST-ORDER THERMAL-FADE RATE: anthocyanin -> colourless products, NO oxygen -----------------
# r = k_anthocyanin_thermal_fade * f(T) * [anthocyanin] (g/L). First-order (no o2 term). Set an order
# of magnitude BELOW the D-81 pseudo-first-order oxidative rate at a micro-ox o2 charge, so under
# oxygen the O2 route dominates (the usual case) while an ANAEROBIC red still slowly loses monomeric
# colour over the months-to-years span — a small-but-nonzero background fade that cold storage slows.
# The LOAD-BEARING claim is the FORM (first-order, O2-free, so it fades a reductive red) and that heat
# fades colour, not this magnitude; banded an order of magnitude.
k_anthocyanin_thermal_fade:
  value: 2.0e-5
  unit: "1/h"   # r = k_anthocyanin_thermal_fade * f(T) * [anthocyanin]  (first-order, g/L)
  tier: speculative
  uncertainty: { low: 5.0e-6, high: 8.0e-5, note: "first-order rate constant at T_ref = 20 C. Chosen an order of magnitude below the D-81 oxidative fade's pseudo-first-order rate at a micro-ox o2 charge (k_anthocyanin_fade*[o2] ~ 5e-3*0.03 ~ 1.5e-4 /h), so with oxygen present the O2 route dominates while an ANAEROBIC red still fades ~a few % per month of monomeric colour — a slow background loss cold storage suppresses. The LOAD-BEARING claim is the FORM (first-order, O2-free) and that heat fades red colour with no oxygen, not this absolute rate. Banded an order of magnitude." }
  provenance:
    source: "author estimate anchored to the thermal/hydrolytic degradation of free monomeric anthocyanins: independent of oxygen, the flavylium ring opens and the pigment breaks down to colourless products as a function of temperature and time (Somers & Evans 1986; Ribéreau-Gayon et al., Handbook of Enology, on anthocyanin thermal stability; accelerated-ageing red-colour studies show colour loss even in inert/anaerobic storage). Folds the multi-step thermal degradation cascade into one lumped first-order k."
    conditions: "generic red wine at cellar temperature; first-order in the free-anthocyanin pool (g/L) at T_ref = 293.15 K. Represents the aggregate O2-INDEPENDENT anthocyanin degradation to colourless products (distinct from the D-81 O2-driven oxidative fade and the D-82 reversible SO2/pH masking)."
    notes: "SOURCED FORM (O2-independent, first-order thermal fade to colourless; SO2 does NOT protect because it is not an oxidation) + SPECULATIVE magnitude (order-of-magnitude, banded). Deliberately NOT coupled to o2 or SO2: this is the pathway that fades a sealed, sulfited, anaerobic red — only temperature (E_a) is the lever."

# -- ACTIVATION ENERGY: warmer fades faster (sourced ordering, REACTION-scale) -------------------
# Its OWN parameter (prime directive #2), REACTION-scale (~55 kJ/mol) like every other aging reaction
# E_a. Distinct from the D-81 oxidative-fade E_a even though numerically similar — a DIFFERENT reaction
# (thermal/hydrolytic degradation, not O2-driven oxidation). The load-bearing claim is the SIGN: warm
# storage bleaches red colour faster even with no oxygen (the 'warm cellars kill colour' fact).
E_a_anthocyanin_thermal_fade:
  value: 55000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 90000.0, note: "Q10 ~1.6-3.5 at 20 C. Anthocyanin thermal-degradation activation energies span ~35-90 kJ/mol across juice/wine matrices (kinetic thermal-stability studies). The SOURCED, load-bearing claim is the SIGN (warmer => faster thermal fade, so warm storage bleaches red colour faster even anaerobically); the magnitude is speculative and banded. Its OWN parameter (prime directive #2), REACTION-scale, distinct from the D-81 E_a_anthocyanin_fade." }
  provenance:
    source: "SOURCED ORDERING: thermal/hydrolytic anthocyanin degradation accelerates with temperature (textbook Arrhenius; anthocyanin thermal-stability kinetics; Ribéreau-Gayon Handbook of Enology). Warm storage bleaches red colour faster even without oxygen — the established direction and the temperature lever for this O2-independent route."
    conditions: "equivalent Arrhenius activation energy of the aggregate O2-independent anthocyanin thermal fade at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster fade) is the sourced, load-bearing claim. REACTION-scale (~55 kJ/mol). Its OWN parameter (prime directive #2), distinct from the D-81 E_a_anthocyanin_fade even though numerically similar — a separate reaction (thermal degradation, not O2-driven oxidation)."

# ================================================================================================
# D-82 -- REVERSIBLE SO2/pH MASKING of monomeric anthocyanin: the Somers "bleaching" READOUT.
# ================================================================================================
# The committed SECOND HALF of D-81's "Both" fork (beat A: the reversible masking readout, alongside
# beat B, the D-81 irreversible oxidative fade). A fast-equilibrium READOUT, NOT a fate: no state
# slot, no d/dt, nothing consumed. Free monomeric anthocyanin sits in equilibrium between the red
# FLAVYLIUM cation (AH+) and two COLOURLESS forms that both drain the same AH+ pool -- the CARBINOL
# hemiketal (pH/hydration) and the BISULFITE ADDUCT (SO2 "bleaching"). analysis.observed_color_series
# reports the coloured fraction chi(SO2,pH) of monomeric anthocyanin PLUS the (bleach-/pH-resistant)
# polymeric_pigment counted full -- the Somers SO2-resistant-colour assay, distinct from
# analysis.color_series (which is intrinsic pigment CONTENT / potential colour, D-79/81).
#
#   chi = 1 / (1 + K_h/h + K_anthocyanin_bisulfite*[HSO3-])      # h = 10^(-pH), K_h = 10^(-pKa_flavylium_hydration)
#   observed = chi * anthocyanin*1000 + polymeric_pigment*1000   # mg/L; pigment is SO2/pH-stable
#
# COMPETITIVE single denominator (NOT a product of two fractions): carbinol and bisulfite adduct are
# PARALLEL drains THROUGH flavylium, so a product form would carry a spurious cross-term implying
# bisulfite bleaches the colourless carbinol (it cannot -- bisulfite adds only to flavylium). Reads
# FREE bisulfite (acidbase.bisulfite_so2_at_ph, AFTER acetaldehyde/keto-acid binding), never total
# SO2 -- bound SO2 cannot bleach -- so REVERSIBILITY is emergent: as SO2 is bound (D-28/D-51) or
# oxidatively consumed (D-72), free bisulfite falls and the mask LIFTS (observed colour rises),
# nothing scripted. The SO2-sign is the OPPOSITE of D-81 ("SO2 protects color_series"): different
# series, different form (reversible masking of monomeric vs irreversible fade) -- both real, no
# contradiction. SHARED but WINE-ONLY in effect (only wine carries anthocyanin/polymeric_pigment).

# -- FLAVYLIUM<=>CARBINOL HYDRATION: the pH masking (LOW pH => redder) ----------------------------
# Apparent pK of the flavylium/carbinol hydration equilibrium AH+ + H2O <=> B(carbinol) + H+: the
# coloured (flavylium) share is h/(h+K_h) in the pH-only limit (~0.14 at pH 3.4 -- only a minority of
# monomeric anthocyanin is red at wine pH, the textbook result). ~2.6 for malvidin-3-glucoside (the
# dominant red-wine anthocyanin). Applied as an APPARENT constant to the LUMPED anthocyanin pool (the
# pKa_sulfurous precedent) -- SOURCED value + wine-extrapolation caveat => plausible.
pKa_flavylium_hydration:
  value: 2.6
  unit: "pH units"
  tier: plausible
  uncertainty: { low: 2.3, high: 2.9, note: "apparent hydration pK (pK_h) of the flavylium<=>carbinol equilibrium; literature ~2.4-2.8 for malvidin-3-glucoside and related red-wine anthocyanins. Sets the pH-only coloured fraction h/(h+10^(-pK_h)): ~0.14 at pH 3.4, ~0.24 at pH 3.0, ~0.06 at pH 4.0 -- the LOW-pH-is-redder direction is the load-bearing sourced claim; the magnitude applied to the lumped pool is the extrapolation." }
  provenance:
    source: "Brouillard & Delaporte (1977) and Brouillard & Dubois (1977) on the flavylium/carbinol/chalcone equilibria of malvidin-3-glucoside; Somers (1971) and Somers & Evans on red-wine colour vs pH; Ribereau-Gayon et al., Handbook of Enology Vol. 2 (anthocyanin equilibria)."
    conditions: "apparent hydration pK applied to the lumped monomeric-anthocyanin pool at cellar pH (~3.0-4.0); an apparent constant (the pKa_sulfurous / D-22 idiom), so it affects the coloured-fraction SLOPE and magnitude, with only the LOW-pH-is-redder DIRECTION claimed fidelity-grade."
    notes: "The SOURCED, load-bearing claim is the SIGN/direction (lower pH => more red flavylium => deeper apparent colour -- the 'acidify to brighten red' fact) and the ~0.1-0.2 coloured fraction at wine pH; the exact pK on the lumped pool is the extrapolation. Only the FLAVYLIUM form is counted red (v1): the weakly-coloured quinoidal base above the flavylium pKa is ignored, so this under-counts colour above ~pH 4 (out of the wine band)."

# -- FLAVYLIUM+BISULFITE BLEACHING: the SO2 masking (more SO2 => less apparent colour) ------------
# Association constant of the flavylium+bisulfite -> colourless adduct: the unbleached share is
# 1/(1 + K*[HSO3-]) in the SO2-only limit. Literature spans ~1e4-1e5 L/mol across anthocyanins; the
# lumped-pool magnitude is speculative (only the FORM and the more-SO2-is-less-colour direction are
# sourced). Central ~2.5e4 L/mol so a ~20 mg/L free-SO2 charge (~3e-4 mol/L HSO3-) roughly halves
# the coloured monomeric fraction again on top of the pH masking -- the Somers "SO2 bleaches the
# free anthocyanin, not the polymeric pigment" observation.
K_anthocyanin_bisulfite:
  value: 2.5e4
  unit: "L/mol"
  tier: speculative
  uncertainty: { low: 5.0e3, high: 1.0e5, note: "flavylium+HSO3- association constant; literature ~1e4-1e5 L/mol across anthocyanins (Brouillard & El Hage Chahine; Timberlake & Bridle). Sets the SO2-only unbleached fraction 1/(1+K*[HSO3-]): at ~3e-4 mol/L free bisulfite (~20 mg/L free SO2) K*B ~ 7.5, so ~0.12 unbleached. The SOURCED claim is the FORM (Langmuir bleaching, more SO2 => less apparent colour, monomeric only); the lumped-pool magnitude is speculative, banded ~an order of magnitude." }
  provenance:
    source: "author estimate anchored to the flavylium-bisulfite equilibrium literature (Brouillard & El Hage Chahine 1980; Timberlake & Bridle 1967; Somers & Evans on SO2 bleaching of wine colour). Folds the flavylium+HSO3- <=> colourless sulphonic-acid adduct into one lumped association constant on the free monomeric anthocyanin pool."
    conditions: "generic red wine at cellar pH; the reactive nucleophile is FREE bisulfite HSO3- (acidbase.bisulfite_so2_at_ph, after carbonyl binding), so bound SO2 does not bleach and reversibility is emergent (D-28/D-51/D-72)."
    notes: "SOURCED FORM (reversible Langmuir bleaching of MONOMERIC anthocyanin by free bisulfite; polymeric pigment is SO2-RESISTANT and counted full) + SPECULATIVE lumped magnitude (order-of-magnitude, banded). This SO2-sign is the OPPOSITE of the D-81 fade (where SO2 PROTECTS color_series) -- a different series and a different (reversible) form, both real."

# ================================================================================================
# D-84: TANNIN SELF-POLYMERIZATION — grape tannin condenses WITH ITSELF into a soft polymer
# ================================================================================================
# The fermentation.core.kinetics.aging.TanninSelfPolymerization Process (WINE-ONLY). The first of the
# TANNIN-TANNIN axis the D-79/D-80 condensation beats deferred (their "one-directional-per-pool"
# honesty note). Beyond condensing with anthocyanin (D-79/D-80), condensed grape tannin also reacts
# WITH ITSELF: flavan-3-ol units link into larger polymers that taste SOFTER — the well-known
# "tannins polish/soften with age even with nothing else to react with" behaviour. This is why a
# WHITE wine's tannin, or a red whose anthocyanin is exhausted, STILL softens on aging — softening
# the anthocyanin-dependent routes alone cannot produce.
#
#   r            = k_tannin_self_polymerization * f(T) * [tannin]^2   # g tannin/L/h
#   d(tannin)/dt = -r
#
# BIMOLECULAR ([tannin]^2, a true SELF-reaction — second-order in the single tannin pool, distinct
# from the D-79 BILINEAR two-pool form), f(T) = arrhenius_factor(T, E_a_tannin_self_polymerization,
# T_ref). A PURE OFF-LEDGER tannin sink: the soft polymer goes to NO destination slot, consistent
# with the D-79/D-80 routes which already consume tannin as a pure sink (the polymeric_pigment they
# fill is in ANTHOCYANIN-equivalents, never tannin mass; no ledger reads tannin mass). r folds the
# lumped self-condensation stoichiometry into one sink rate. NO YIELD (a self-reaction: no second
# pool to consume at a ratio).
#
# ASTRINGENCY PAYOFF + the honesty note it retires. tannin is read as astringency
# (analysis.astringency_series, mg/L free harsh tannin); the soft polymer is excluded, so drawing
# tannin down SOFTENS the wine — exactly as the D-79 route does but WITHOUT needing anthocyanin.
# Through D-80 the astringency readout carried a standing caveat ("grape tannin self-polymerization …
# a further-deferred beat, so anthocyanin is the limiting reagent and A-T condensation softens only
# modestly"); this Process builds that beat, so a no-anthocyanin (white / tannin-only) wine now
# genuinely softens and that note is RETIRED.
#
# OFF EVERY LEDGER (grape-derived tannin, the iso_alpha/ellagitannin precedent), so it moves NOTHING
# conserved. OAK- AND O2-INDEPENDENT (grape condensed tannin, distinct from oak hydrolysable
# ellagitannin D-78; not an oxidation, draws no o2), so a steel-tank red with no oak and no oxygen
# still self-polymerizes. Consumes NO on-ledger acetaldehyde (the DIRECT route — the
# acetaldehyde-bridged tannin-ethyl-tannin variant is the separate D-85 beat), so no split-ledger
# carbon capture. SUBSTRATE-GATED on tannin => a no-tannin run is byte-for-byte the case without it.
# Wine-only + disabled at compile, enabled by begin_aging (aging is post-ferment).
#
# TIER: ALL speculative. SOURCED FORM (grape tannin self-condenses into softer polymers with age,
# warmer-faster — Ribéreau-Gayon Handbook of Enology; proanthocyanidin-polymerization literature) +
# SPECULATIVE magnitudes (order-of-magnitude author estimates, banded). Load-bearing sourced claims:
# (1) tannin self-polymerizes into a softer form WITHOUT anthocyanin, (2) warmer polymerizes faster.

# -- BIMOLECULAR SELF-CONDENSATION RATE: tannin + tannin -> soft polymer --------------------------
# r = k_tannin_self_polymerization * f(T) * [tannin]^2 (g/L). Second-order (self-reaction). Set so a
# typical young-red tannin (~2 g/L) self-polymerizes a modest fraction over the months-to-years aging
# span — a slow background softening SUBORDINATE to the anthocyanin-driven D-79 route when anthocyanin
# is present, but the DOMINANT softener once anthocyanin is exhausted or absent (a white). The
# LOAD-BEARING claim is the FORM (bimolecular, o2-free, anthocyanin-free softening) and that tannin
# softens by self-polymerization, not this magnitude; banded an order of magnitude.
k_tannin_self_polymerization:
  value: 3.0e-4
  unit: "L/(g*h)"   # r = k_tannin_self_polymerization * f(T) * [tannin]^2  (second-order, g/L)
  tier: speculative
  uncertainty: { low: 7.0e-5, high: 1.2e-3, note: "second-order self-condensation constant at T_ref = 20 C. Chosen an order of magnitude below k_polymerization (2.0e-3, the anthocyanin-driven route) PER UNIT tannin so that when anthocyanin is present the A-T condensation dominates the softening, while self-polymerization becomes the DOMINANT softener once anthocyanin is exhausted or absent (a white). At ~2 g/L tannin the pseudo-first-order rate k*[tannin] ~ 6e-4 /h softens a modest fraction over the aging span. The LOAD-BEARING claim is the FORM (bimolecular, o2/anthocyanin-free) and that tannin softens by self-polymerization, not this absolute rate. Banded an order of magnitude." }
  provenance:
    source: "author estimate anchored to the age-softening of red-wine tannin by direct proanthocyanidin self-polymerization: condensed flavan-3-ol tannins link into larger, softer-tasting polymers over time independent of anthocyanin and oxygen (Ribéreau-Gayon et al., Handbook of Enology Vol. 2, on tannin polymerization and astringency loss; proanthocyanidin-polymerization studies). Folds the multi-step self-condensation into one lumped second-order k on the grape tannin pool."
    conditions: "generic red (or tannin-dosed white) wine at cellar temperature; second-order in the grape condensed-tannin pool (g/L) at T_ref = 293.15 K. Represents the DIRECT, acetaldehyde-free self-condensation (distinct from the D-85 acetaldehyde-bridged tannin-ethyl-tannin route)."
    notes: "SOURCED FORM (bimolecular self-condensation softening tannin WITHOUT anthocyanin or oxygen; warmer-faster) + SPECULATIVE magnitude (order-of-magnitude, banded). A PURE OFF-LEDGER sink (the soft polymer goes to no slot — the D-79/D-80 tannin-is-a-pure-sink precedent), so it moves nothing conserved and softens astringency as the free-tannin pool declines."

# -- ACTIVATION ENERGY: warmer polymerizes faster (sourced ordering, REACTION-scale) -------------
# Its OWN parameter (prime directive #2), REACTION-scale (~55 kJ/mol) like every other aging reaction
# E_a. Distinct from the condensation/fade E_a's even though numerically similar — a DIFFERENT
# reaction (tannin self-condensation). The load-bearing claim is the SIGN: warm storage softens
# (polymerizes) tannin faster.
E_a_tannin_self_polymerization:
  value: 55000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 75000.0, note: "Q10 ~1.6-2.9 at 20 C. Wine condensation/polymerization activation energies ~35-75 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster tannin self-polymerization => faster softening); the magnitude is speculative and banded. Its OWN parameter (prime directive #2), REACTION-scale, distinct from the D-79/D-80/D-83 E_a's even though numerically similar." }
  provenance:
    source: "SOURCED ORDERING: tannin self-condensation/polymerization accelerates with temperature (textbook Arrhenius; proanthocyanidin-polymerization kinetics; Ribéreau-Gayon Handbook of Enology). Warm storage softens (polymerizes) tannin faster — the established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate tannin self-condensation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster polymerization/softening) is the sourced, load-bearing claim. REACTION-scale (~55 kJ/mol). Its OWN parameter (prime directive #2), distinct from E_a_polymerization / E_a_acetaldehyde_bridge / E_a_anthocyanin_fade / E_a_anthocyanin_thermal_fade even though numerically similar — a separate reaction (tannin self-condensation)."

# ================================================================================================
# D-85: TANNIN-ETHYL-TANNIN — acetaldehyde bridges TWO grape flavanols (the O2-driven softener)
# ================================================================================================
# The fermentation.core.kinetics.aging.TanninEthylTanninCondensation Process (WINE-ONLY). The
# acetaldehyde-bridged sibling of the D-84 direct self-polymerization, exactly as the D-80 bridged
# route is of the D-79 direct condensation: dissolved-O2 acetaldehyde (OxidativeAcetaldehyde, D-71)
# forms an ethylidene bridge -CH(CH3)- linking TWO grape tannin flavanols (tannin-ethyl-tannin), an
# acetaldehyde-accelerated self-condensation that SOFTENS astringency. So micro-oxygenation softens
# even an ANTHOCYANIN-FREE tannin pool (a white / tannin-only wine polymerizes faster under O2) while
# drawing acetaldehyde down -- with NO colour involved (both bridge ends are colourless flavanols).
#
#   r                  = k_tannin_ethyl_tannin * f(T) * [free acetaldehyde] * [tannin]^2   # g tannin/L/h
#   d(tannin)/dt       = -r                                       # OFF-ledger (grape-derived)
#   d(acetaldehyde)/dt = -y_acetaldehyde_per_tannin * r           # ON the carbon ledger
#   d(ethyl_bridge)/dt = +(acetaldehyde carbon consumed)/c(ethylidene)   # ON-ledger, exact
#
# The D-84 BIMOLECULAR self-condensation form ([tannin]^2) PLUS the D-80 free-acetaldehyde factor,
# f(T) = arrhenius_factor(T, E_a_tannin_ethyl_tannin, T_ref) (own reaction-scale E_a). Anchored on
# TANNIN consumption (no anthocyanin -- both ends are flavanols). A PURE OFF-LEDGER tannin sink (the
# soft tannin-ethyl-tannin polymer goes to NO slot, the D-84 precedent), so the tannin bulk moves
# nothing conserved.
#
# SPLIT LEDGER (reused verbatim from D-80). Acetaldehyde's carbon is ON the carbon ledger (borrowed
# from E at D-71), so consuming it into the off-ledger polymer would make carbon VANISH. The same
# on-ledger ethyl_bridge slot D-80 introduced captures it via the SAME carbon-exact split (release at
# c(acetaldehyde), re-deposit at c(ethylidene) -- acetaldehyde loses only its carbonyl O as water), so
# total_carbon closes to MACHINE PRECISION non-trivially (acetaldehyde down == ethyl_bridge up in
# carbon). BOTH bridged routes (D-80 anthocyanin, D-85 tannin) feed one shared ethyl_bridge pool.
#
# READS FREE acetaldehyde under SO2 (bound acetaldehyde can't bridge -- the D-47/D-80 precedent), so
# SO2 DELAYS acetaldehyde-mediated tannin softening exactly as it delays the D-80 colour
# stabilization (same shared binding equilibrium, nothing scripted). DEPOSITS NO pigment (touches no
# anthocyanin / polymeric_pigment -- the colour difference from D-80): a pure O2-driven astringency
# softener. Triply substrate-gated on acetaldehyde x tannin^2 => a no-tannin / no-acetaldehyde wine
# (and all beer) is byte-for-byte inert. Wine-only + disabled at compile, enabled by begin_aging.
#
# TIER: ALL speculative. SOURCED FORM (acetaldehyde bridges two flavanols into a softer polymer,
# O2-driven, SO2-blocked, warmer-faster -- Timberlake & Bridle 1976; Es-Safi et al. 1999;
# Ribéreau-Gayon Handbook of Enology on acetaldehyde-induced tannin polymerization) + SPECULATIVE
# magnitudes (order-of-magnitude author estimates, banded). Load-bearing sourced claims: (1)
# acetaldehyde bridges two tannin flavanols (needs acetaldehyde), (2) it softens astringency WITHOUT
# anthocyanin, (3) SO2 blocks it (free-carbonyl only), (4) warmer bridges faster.

# -- TRILINEAR BRIDGED-SELF-CONDENSATION RATE: acetaldehyde + tannin + tannin -> soft polymer ------
# r = k_tannin_ethyl_tannin * f(T) * [free acetaldehyde] * [tannin]^2 (all g/L). Units L^2/(g^2*h).
# Set ~20x k_tannin_self_polymerization PER UNIT (the D-80/D-84 ratio) so that at a typical micro-ox
# acetaldehyde level (~50 mg/L) the pseudo-bilinear constant k*[acet] is of order
# k_tannin_self_polymerization (3.0e-4) -- i.e. once acetaldehyde is present the bridged route softens
# tannin on a comparable timescale to the direct self-polymerization, and jointly they shorten the
# months-to-years softening span. The LOAD-BEARING claim is the FORM (needs acetaldehyde, bimolecular
# in tannin) and that acetaldehyde ACCELERATES tannin softening, not this magnitude.
k_tannin_ethyl_tannin:
  value: 6.0e-3
  unit: "L^2/(g^2*h)"   # r = k_tannin_ethyl_tannin * f(T) * [free acet] * [tannin]^2  (all g/L)
  tier: speculative
  uncertainty: { low: 1.5e-3, high: 2.4e-2, note: "trilinear rate constant at T_ref = 20 C. Banded an order of magnitude around ~20x k_tannin_self_polymerization (3.0e-4) PER UNIT -- the same acetaldehyde-acceleration ratio as D-80's k_acetaldehyde_bridge/k_polymerization. At ~50 mg/L acetaldehyde the pseudo-bilinear k*[acet] ~ 3.0e-4 L/(g*h) matches k_tannin_self_polymerization, so with micro-ox acetaldehyde present the bridged route softens tannin on a comparable timescale to the direct route. The LOAD-BEARING claim is the FORM (needs acetaldehyde; bimolecular in tannin) and that acetaldehyde accelerates tannin softening, not this absolute rate." }
  provenance:
    source: "author estimate anchored to acetaldehyde-induced tannin (proanthocyanidin) polymerization: acetaldehyde forms ethylidene bridges between flavan-3-ol units, accelerating tannin condensation and softening astringency (Timberlake & Bridle 1976; Es-Safi et al. 1999; Fulcrand et al.; Ribéreau-Gayon et al., Handbook of Enology Vol. 2). Folds the lumped termolecular acetaldehyde+tannin+tannin step into one mass-action k."
    conditions: "generic red (or tannin-dosed white) wine at cellar temperature; trilinear in free acetaldehyde and the grape tannin pool squared (all g/L) at T_ref = 293.15 K. Represents the acetaldehyde-BRIDGED tannin-tannin condensation (distinct from the D-84 direct, acetaldehyde-free self-condensation)."
    notes: "SOURCED FORM (acetaldehyde-bridged tannin-tannin softening, O2-driven, SO2-blocked, warmer-faster, colourless) + SPECULATIVE magnitude (order-of-magnitude, banded). Same acetaldehyde-acceleration idiom as D-80's k_acetaldehyde_bridge but on the tannin-tannin (self) reaction, so it deposits NO pigment (both ends are flavanols)."

# -- ACTIVATION ENERGY: warmer bridges faster (sourced ordering, REACTION-scale) -----------------
# Its OWN parameter (prime directive #2), REACTION-scale (~55 kJ/mol). Distinct from the D-80 bridged
# E_a and the D-84 direct E_a even though numerically similar -- a separate reaction
# (acetaldehyde-bridged tannin-tannin condensation). The load-bearing claim is the SIGN.
E_a_tannin_ethyl_tannin:
  value: 55000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 75000.0, note: "Q10 ~1.6-2.9 at 20 C. Wine condensation activation energies ~35-75 kJ/mol. The SOURCED, load-bearing claim is the SIGN (warmer => faster acetaldehyde-bridged tannin polymerization/softening); the magnitude is speculative and banded. Its OWN parameter (prime directive #2), REACTION-scale, distinct from the D-80/D-84 E_a's even though numerically similar." }
  provenance:
    source: "SOURCED ORDERING: acetaldehyde-bridged tannin condensation accelerates with temperature (textbook Arrhenius; acetaldehyde-tannin polymerization kinetics; Ribéreau-Gayon Handbook of Enology). Warm storage bridges (softens) tannin faster -- the established direction."
    conditions: "equivalent Arrhenius activation energy of the aggregate acetaldehyde-bridged tannin-tannin condensation at T_ref = 293.15 K"
    notes: "Only the DIRECTION (E_a > 0, warmer => faster) is the sourced, load-bearing claim. REACTION-scale (~55 kJ/mol). Its OWN parameter (prime directive #2), distinct from E_a_acetaldehyde_bridge / E_a_tannin_self_polymerization even though numerically similar -- a separate reaction (bridged tannin-tannin condensation)."

# -- ACETALDEHYDE YIELD: g acetaldehyde consumed per g tannin bridged (ITS OWN, not D-80's) -------
# d(acetaldehyde)/dt = -y_acetaldehyde_per_tannin * r (both g/L/h). MASS-based (g/g): the lumped tannin
# pool has no clean molar mass (the y_tannin_per_anthocyanin / y_ellag_per_o2 idiom). ITS OWN yield,
# NOT D-80's y_acetaldehyde_per_anthocyanin: one acetaldehyde bridges TWO flavanols here (a different
# lumped stoichiometry than D-80's flavanol-anthocyanin bridge), so reusing D-80's value would fake a
# shared stoichiometry the two reactions do not have (prime directive #2). Central ~0.06 g acetaldehyde
# per g tannin (a lumped ethylidene-per-tannin-pair estimate). The yield only sets the acetaldehyde
# drawdown MAGNITUDE; carbon balances for ANY value (the D-80 split-ledger property).
y_acetaldehyde_per_tannin:
  value: 0.06
  unit: "g/g"   # g acetaldehyde consumed per g tannin bridged; d(acetaldehyde)/dt = -y * r
  tier: speculative
  uncertainty: { low: 0.02, high: 0.18, note: "g acetaldehyde consumed per g tannin bridged via this route. One acetaldehyde (44 g/mol) forms one -CH(CH3)- bridge per TANNIN PAIR; expressed as a MASS ratio because the lumped tannin pool has no clean molar mass. Lower than D-80's y_acetaldehyde_per_anthocyanin (0.09) because a bridge here is shared across two tannin units (per g tannin, less acetaldehyde). Central ~0.06 banded ~an order of magnitude. Governs the acetaldehyde-drawdown magnitude -- but carbon closes for ANY value (the split-ledger transfer is exact)." }
  provenance:
    source: "author estimate from the ethylidene-bridge stoichiometry: one acetaldehyde forms one -CH(CH3)- bridge per tannin-tannin (flavanol-flavanol) adduct (Timberlake & Bridle 1976; Es-Safi et al. 1999), expressed as a MASS ratio because the lumped tannin pool has no clean molar mass (the y_tannin_per_anthocyanin / y_acetaldehyde_per_anthocyanin idiom). Its OWN value, distinct from D-80's per-anthocyanin yield -- a bridge is shared across two flavanols here."
    conditions: "g acetaldehyde consumed per g grape tannin bridged by this route, generic wine at T_ref = 293.15 K."
    notes: "SPECULATIVE magnitude, MASS-based (no fake molar mass for the lumped tannin pool). Drives the split-ledger transfer acetaldehyde (on-ledger) -> ethyl_bridge (on-ledger), so total_carbon closes for ANY value -- this only sets how fast acetaldehyde is drawn down, not whether carbon balances. ITS OWN yield (prime directive #2), distinct from D-80's y_acetaldehyde_per_anthocyanin (one acetaldehyde per two flavanols here, vs per flavanol-anthocyanin pair there)."
