# Generic ale-yeast kinetic parameters (S. cerevisiae, top-fermenting ale strain).
#
# SOURCED (Milestone 1 parameter task). It is HONESTLY THINNER than the wine
# file: the published beer models are structurally further from ours than
# Coleman's wine model is. The keystone open-access source is
#
#   Zamudio Lara, J. M., Dewasme, L., Hernandez Escoto, H., & Vande Wouwer, A.
#   (2022). "Parameter Estimation of Dynamic Beer Fermentation Models."
#   Foods 11(22): 3602. doi:10.3390/foods11223602  (CC-BY; ale fermentation,
#   Grainfather pilot plant, 17-26 C). Tables 5 and 6 are read directly.
#
# Secondary structural reference (Arrhenius form, sequential sugar uptake,
# n=1 ethanol wall) is de Andres-Toro et al. 1998, "A kinetic model for beer
# production under industrial operational conditions," Math. Comput. Simul.
# 48(1):65-74, doi:10.1016/S0378-4754(98)00147-5. Its numeric parameter table is
# paywalled and was NOT read in-source; values attributed to it below are flagged.
#
# Caveats baked into the tiers: (a) Zamudio's growth is Droop-like
# (mu = mu_max(1 - S_min/S)) and de Andres-Toro's is Monod-on-SUGAR; our growth
# is Monod-on-nitrogen, so values transfer by magnitude, not by identity.
# (b) Beer wort has real FAN (~150-250 mg N/L) so N-limited growth is defensible,
# but no cited beer model fits a nitrogen constant - K_n is transferred from the
# wine fit. (c) M1 runs are isothermal at 20 C, so the Arrhenius E_a's have NO
# effect on the benchmark (f = 1 at T_ref); they are Tier-2 readiness only.
#
# Conditions throughout: generic ale yeast, ~12-15 Plato wort, isothermal ~20 C.

# -- Growth (Monod, nitrogen-limited) -----------------------------------------

mu_max:
  value: 0.098
  unit: "1/h"
  tier: plausible
  uncertainty: { low: 0.03, high: 0.21, note: "17 C -> 0.033/h, 26 C -> 0.20/h over the ale range" }
  provenance:
    source: "Zamudio Lara et al. 2022, Foods 11(22):3602, Table 5"
    doi: "10.3390/foods11223602"
    conditions: "ale yeast, Grainfather pilot plant, 20 C; mu_max = a*ln(T[degC]) + b, a=0.40, b=-1.1 /h"
    notes: "Evaluated at 20 C: 0.40*ln(20) - 1.1 = 0.098/h. Matches the wine value (0.095/h) - both S. cerevisiae. NB their growth form is Droop-like (1 - S_min/S), so this is a max specific growth rate by magnitude, not an exact Monod mu_max."

K_s:
  value: 5.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 25.0, note: "Monod half-saturation for sugar in the GROWTH term" }
  provenance:
    source: "author estimate"
    conditions: "generic ale yeast, placeholder"
    notes: "No cited beer model fits a separate growth-stage sugar half-saturation (de Andres-Toro folds sugar activation into one Monod term; Zamudio uses a Droop S_min threshold of ~13 g/L instead). Kept as a speculative co-limitation guard, mirroring the wine file."

K_n:
  value: 0.0088
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.003, high: 0.03, note: "half-saturation for YAN; transferred from the wine fit" }
  provenance:
    source: "author estimate (transferred from Coleman 2007 wine K_N, doi:10.1128/aem.00670-07)"
    conditions: "generic ale yeast; yeast-level nitrogen affinity assumed medium-independent"
    notes: "The cited beer models (de Andres-Toro, Zamudio) use sugar-limited not nitrogen-limited growth, so no beer-specific K_n exists. Our growth Process is Monod-on-N (medium-agnostic code), so a value is required; we transfer the wine yeast value. Speculative because it is transferred, not beer-sourced."

# -- Fermentative sugar uptake (Michaelis-Menten, biomass-catalysed) -----------

q_sugar_max:
  value: 0.5
  unit: "g/g/h"
  tier: speculative
  uncertainty: { low: 0.3, high: 1.5, note: "decoupled-equivalent specific uptake; spans the realised rate up to the growth-coupled peak k_S*mu_max" }
  provenance:
    source: "Derived from Zamudio Lara et al. 2022 (doi:10.3390/foods11223602), Table 5"
    conditions: "ale yeast, 20 C; k_S = 15.3 g sugar / g biomass, mu_max ~ 0.098 /h"
    notes: "Zamudio's uptake is growth-COUPLED: dS/dt = -k_S*mu_X*X with a Droop growth rate mu_X = mu_max*(1 - S_min/S) that is sub-maximal and DECLINES as sugar falls (mu_X -> 0 near S_min ~ 13 g/L). So k_S*mu_max = 15.3*0.098 = 1.5 g/g/h is only the growth-coupled PEAK, reached transiently at high sugar and maximal growth - never a sustained rate (their own realised max at S0=88 g/L is ~1.27). Our uptake is DECOUPLED (q*X*S/(K+S): all biomass catalytic, no mu factor), so reproducing Zamudio's realised attenuation needs q at the realised specific rate, a factor ~3 below the peak: q ~ 0.5 g/g/h. SPECULATIVE - the growth-coupled -> decoupled translation is a magnitude transfer, not an identity, and Zamudio's S_min/yield were not all verified in-source; uncertainty spans the realised rate (0.3) up to the growth-coupled peak (1.5). Re-derived in the beer-benchmark work (decision D-15): the prior value 1.5 made a 1.048 wort attenuate in ~2 d, far inside the 5-7 d benchmark."

K_sugar_uptake:
  value: 12.0
  unit: "g/L"
  tier: plausible
  uncertainty: { low: 6.0, high: 18.0, note: "Michaelis-Menten constant for sugar; Zamudio CV 9%" }
  provenance:
    source: "Zamudio Lara et al. 2022, Foods 11(22):3602, Table 6 (K_S)"
    doi: "10.3390/foods11223602"
    conditions: "ale yeast, Grainfather pilot plant; sugar half-saturation of the CO2-based model"
    notes: "Directly fitted K_S = 12.0 g/L (coefficient of variation 9%). Close to Coleman's wine value (10.3 g/L), as expected for S. cerevisiae sugar transport."

K_repression:
  value: 2.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 0.5, high: 5.0, note: "more-preferred-sugar conc. at half catabolite repression" }
  provenance:
    source: "author estimate"
    conditions: "ale wort sequential uptake (glucose > maltose > maltotriose)"
    notes: "Smooth catabolite repression of the higher sugars while a more-preferred one remains. The functional form matches the Gee & Ramirez repression factors K'_G/(K'_G+G) and K'_M/(K'_M+M) (see de Andres-Toro/Gee-Ramirez reviews), but their numeric constants were not accessible in-source, so the value stays an author estimate."

Y_ethanol_sugar:
  value: 0.46
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.40, high: 0.48, note: "realised yield below 0.511 theoretical" }
  provenance:
    source: "Gay-Lussac stoichiometry; corroborated by Zamudio Lara et al. 2022 (doi:10.3390/foods11223602)"
    conditions: "ale fermentation; realised ethanol per sugar"
    notes: "Theoretical max 0.511 g/g. Zamudio Table 5 gives k_E/k_S = 6.31/15.3 = 0.41 g/g for their ale (low end, partly reflecting ~12 g/L residual sugar). NOT read directly: uptake uses the theoretical Gay-Lussac split, and beer carries ZERO byproduct diversion in M1 (see below), so beer's realised yield stays theoretical and its CO2 benchmark is unchanged. Documented cross-check only."

# -- Realised-yield byproduct diversion (decision D-16) ------------------------
# Beer also makes glycerol (~1-2 g/L) and minor byproducts, but quantifying them
# is out of M1 scope and the beer benchmarks (attenuation timescale, CO2 ratio) do
# not gate on absolute ethanol. So both diversion yields are held at ZERO: beer
# uses the pure theoretical Gay-Lussac split and the Gly/Byp pools stay empty. They
# are present (not omitted) because the shared uptake Process declares them in
# `reads`; a value is required for every medium (D-1, no silent default).

Y_glycerol_sugar:
  value: 0.0
  unit: "g/g"
  tier: speculative
  uncertainty: { low: 0.0, high: 0.02, note: "ale glycerol ~1-2 g/L if modelled; held at 0 for M1" }
  provenance:
    source: "author estimate (held at zero for M1)"
    conditions: "generic ale yeast; glycerol diversion deliberately not modelled in M1"
    notes: "Set to 0 so beer ferments by the pure theoretical split (decision D-16). Real ale glycerol is ~1-2 g/L, lower than wine; quantifying it is deferred. Zero keeps the beer attenuation and CO2-ratio benchmarks exactly as validated under the theoretical yields."

Y_byproduct_sugar:
  value: 0.0
  unit: "g/g"
  tier: speculative
  uncertainty: { low: 0.0, high: 0.02, note: "minor ale byproducts; held at 0 for M1" }
  provenance:
    source: "author estimate (held at zero for M1)"
    conditions: "generic ale yeast; minor-byproduct diversion deliberately not modelled in M1"
    notes: "Set to 0 (decision D-16): beer's minor byproducts are out of M1 scope and no beer benchmark gates on absolute ethanol. Present because the shared uptake Process requires it in `reads`."

# -- Ethanol inhibition (Luong wall on the uptake flux, decision D-10) ----------

ethanol_tolerance:
  value: 90.0
  unit: "g/L"
  tier: speculative
  uncertainty: { low: 70.0, high: 100.0, note: "~9-12.7% ABV; ale yeasts are far less tolerant than wine" }
  provenance:
    source: "author estimate (generic ale yeast alcohol tolerance ~11-12% ABV)"
    conditions: "generic top-fermenting ale strain"
    notes: "Read by EthanolInhibition as the wall E_max. A 1.048 OG wort attenuates to only ~5% ABV (~40 g/L ethanol), well below tolerance, so for the M1 beer benchmark this term is essentially non-limiting. de Andres-Toro instead tie the wall to stoichiometry (E_max = 0.5*S0); we keep a fixed strain tolerance for parity with the wine file. Speculative: no specific strain sourced."

ethanol_inhibition_exponent:
  value: 2.0
  unit: "dimensionless"
  tier: speculative
  uncertainty: { low: 1.0, high: 3.0, note: "Levenspiel/Luong toxic-power exponent" }
  provenance:
    source: "author estimate"
    conditions: "generic ale yeast; Levenspiel 1980 / Luong 1985 inhibition form"
    notes: "Exponent n in f = (1 - E/E_max)^n. de Andres-Toro et al. 1998 use n=1 (f = 1 - E/(0.5*S0)) for beer; we keep n=2 for a C1-smooth touchdown (BDF solver). Form is literature-backed, exponent is our numerical choice - speculative."

# -- Ethanol-driven cell inactivation (the timescale brake, decision D-13) -----
# Read by EthanolInactivation (moves mass X -> X_dead). Beer barely reaches its
# tolerance (~7% ABV vs wine's ~17%), so this term is far less load-bearing for
# the beer benchmark than the uptake rate is; beer's pace is set by q_sugar_max.

k_prime_d:
  value: 4.28e-5
  unit: "(g/L)^-1 h^-1"
  tier: speculative
  uncertainty: { low: 3.0e-5, high: 4.4e-4, note: "transferred from the Coleman wine fit; ale-specific value not sourced" }
  provenance:
    source: "author estimate (transferred from Coleman 2007 wine k'_d, doi:10.1128/aem.00670-07, Table A2 at 20 C)"
    conditions: "generic ale yeast; ethanol inactivation assumed yeast-generic at the species level"
    notes: "No cited beer model fits an ethanol-driven inactivation constant of our form (de Andres-Toro use a stoichiometric ethanol wall instead), so we transfer the verifiable Coleman wine value (k'_d(20 C) = 4.28e-5; see the wine file for the Table A2 a1 typo correction). Speculative because transferred, not beer-sourced. Largely inert for the M1 beer benchmark: a 1.048 OG wort makes only ~55 g/L ethanol, where k_d = 2.4e-3/h gives a viable-cell half-life of ~290 h - a negligible tail brake, not the dominant control (q_sugar_max sets beer's pace)."

# -- Arrhenius temperature dependence (per-rate, decision D-11) ----------------
# INERT for M1: runs are isothermal at T_ref so f = 1 and these never bite.
# Carried for Tier-2 readiness. We carry the verifiable wine-derived value
# (Coleman 2007) as a yeast-generic placeholder, tagged speculative.
#
# CORRECTION (D-19 sourcing step, 2026-06-30): an earlier note here claimed
# de Andres-Toro 1998 "fit E_a ~ 35 kJ/mol for growth and ethanol production (per
# secondary reports)". That secondary figure is WRONG. de Andres-Toro's primary
# table - now read IN-SOURCE via the open CC-BY reproduction Pilarski & Gerogiorgis
# 2022 (Processes 10(11):2400, doi:10.3390/pr10112400) Table 1, form
# mu_i0 = exp(A_i + B_i/T), apparent E_a = -B_i*R - gives:
#   growth  mu_X0 (A=108.31, B=-31934) -> apparent E_a ~ 265 kJ/mol
#   ethanol mu_e0 (A=3.27,   B=-1267)  -> apparent E_a ~ 10.5 kJ/mol
#   sugar   mu_S0 (A=-41.92, B=+11655) -> apparent E_a ~ -97 kJ/mol (NEGATIVE)
# None is ~35 kJ/mol. These are extreme, internally-inconsistent lumped empirical-fit
# artifacts (the model absorbs lag/growth/death transitions into each apparent E_a),
# which is precisely why we do NOT adopt de Andres-Toro's temperature sensitivity and
# carry the clean Coleman-derived value instead. The band low (30,000) below was
# justified by the now-debunked "~35 kJ/mol beer figure"; it is RETAINED unchanged here
# (M1 value/band not silently rewritten) pending a deliberate review - flagged in D-19.

E_a_growth:
  value: 55900.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 63000.0, note: "low end retained from the now-debunked '~35 kJ/mol beer figure' (see header CORRECTION); high end ~Coleman wine ~56 kJ/mol" }
  provenance:
    source: "author estimate (yeast-generic; derived from Coleman 2007 wine fit, doi:10.1128/aem.00670-07)"
    conditions: "generic ale yeast; equivalent Arrhenius E_a at T_ref = 293.15 K"
    notes: "INERT at the isothermal 20 C benchmark (f = 1 at T_ref). CORRECTION (D-19): de Andres-Toro's primary growth term has apparent E_a ~265 kJ/mol (NOT the ~35 kJ/mol secondary figure once cited here) - an extreme lumped-fit artifact (see header). We carry the clean verifiable Coleman-derived value; the band is unchanged pending a deliberate review (flagged in D-19)."

E_a_uptake:
  value: 55100.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 63000.0, note: "low end retained from the now-debunked '~35 kJ/mol beer figure' (see header CORRECTION); high end ~Coleman wine ~55 kJ/mol" }
  provenance:
    source: "author estimate (yeast-generic; derived from Coleman 2007 wine fit, doi:10.1128/aem.00670-07)"
    conditions: "generic ale yeast; equivalent Arrhenius E_a at T_ref = 293.15 K"
    notes: "INERT at the isothermal 20 C benchmark. CORRECTION (D-19): de Andres-Toro's primary ethanol-production term has apparent E_a ~10.5 kJ/mol and its sugar-uptake term is NEGATIVE (~-97 kJ/mol) - NOT the ~35 kJ/mol secondary figure once cited here (see header). We carry the clean verifiable Coleman-derived value; band unchanged pending review (flagged in D-19)."

T_ref:
  value: 293.15
  unit: "K"
  tier: plausible
  uncertainty: { low: 288.15, high: 298.15, note: "ale fermentation reference temperature" }
  provenance:
    source: "Zamudio Lara et al. 2022 fermentation conditions (doi:10.3390/foods11223602)"
    doi: "10.3390/foods11223602"
    conditions: "20 C: the temperature mu_max is evaluated at, within the ale window (Zamudio 17-26 C; de Andres-Toro 8-24 C)"
    notes: "Reference temperature in the Arrhenius factor; at T = T_ref the rate constants are used unscaled. By construction f = 1 at the 20 C beer benchmark."

# -- Biomass elemental composition (decision D-8) -----------------------------
# Same canonical S. cerevisiae formula CH1.8O0.5N0.2 as wine (ale yeast is the
# same species). Single source of truth for the conservation checks.

biomass_C_fraction:
  value: 0.488
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.44, high: 0.50, note: "varies with growth conditions" }
  provenance:
    source: "canonical yeast elemental formula CH1.8O0.5N0.2 (Roels 1983; Heijnen)"
    conditions: "S. cerevisiae dry cell weight, carbon mass fraction (ale yeast is S. cerevisiae)"
    notes: "Identical to the wine file - this is an organism-level constant, not medium-specific."

biomass_N_fraction:
  value: 0.114
  unit: "g/g"
  tier: plausible
  uncertainty: { low: 0.08, high: 0.14, note: "C:N ~4-9 depending on N status" }
  provenance:
    source: "canonical yeast elemental formula CH1.8O0.5N0.2 (Roels 1983; Heijnen)"
    conditions: "S. cerevisiae dry cell weight, nitrogen mass fraction (ale yeast is S. cerevisiae)"
    notes: "Identical to the wine file - organism-level constant."

# -- Temperature-/metabolism-driven aroma byproducts (Milestone 2, decision D-19) --
# Esters and fusel (higher) alcohols: trace pools whose run-integrated total RISES with
# temperature (ales are notably estery). SOURCED in the D-19 sourcing step (2026-06-30);
# see the wine file header for the full argument. Beer is the medium de Andres-Toro
# actually modelled, so the ester ordering source applies DIRECTLY here (their ethyl
# acetate is exactly our `ethyl_acetate` booking species). In brief:
#   * de Andres-Toro et al. 1998 form ETHYL ACETATE as dC_EA/dt = Y_EA*mu_x*X_A (read
#     in-source via the open CC-BY Pilarski & Gerogiorgis 2022, doi:10.3390/pr10112400,
#     Table 1): Y_EA=exp(89.92-26589/T) and mu_X0=exp(108.31-31934/T) give apparent
#     E_a ~221 and ~265 kJ/mol - ester formation is FAR more T-sensitive than the flux.
#     ORDERING (E_a_ester > E_a_uptake) SOURCED.
#   * MAGNITUDE not transferred: de Andres-Toro's apparent E_a's are lumped-fit
#     artifacts (their own sugar-uptake E_a is NEGATIVE, ~-97 kJ/mol), incommensurable
#     with our uptake E_a. Anchored instead to the brewing consensus (warm ferments
#     ~+50-75% esters over ~15 C => dE_a ~25 kJ/mol => E_a_ester ~80 kJ/mol).
# Values MIRROR the wine file (byproduct kinetics are yeast-generic at this stage); the
# ordering source is if anything STRONGER for beer (de Andres-Toro IS a beer model).
#
# CARBON ACCOUNTING - option (a)/a1 (decision D-19): the ester/fusel Processes route
# their carbon OUT OF SUGAR (booked as ethyl acetate / isoamyl alcohol) and total_carbon
# weights the pools. Beer needs NO Byp carve-out: its Y_byproduct_sugar is held at 0
# (minor byproducts out of M1 scope), so no higher alcohols were ever booked in beer's
# Byp to double-count. The fusel/ester pools draw their trace sugar directly; the
# CO2-ratio benchmark stays in band (the draw is ~0.3% of sugar consumed). Carried for
# both media because the shared byproduct Processes declare these in `reads`; a value is
# required per medium (D-1, no silent default).
#
# KEY ORDERING CONSTRAINT (decision D-19): each E_a must EXCEED E_a_uptake (55,100
# J/mol) so the run-integrated byproduct total rises with temperature - see the wine
# file header for the exp(-(dE_a/R)(1/T-1/T_ref)) argument. NB beer's own E_a_uptake is
# itself a speculative Coleman-carried placeholder (55,100; see that entry), so the
# constraint is relative to the value in THIS file; the de Andres-Toro ester ordering
# holds against any plausible fermentative-flux E_a.

k_ester:
  value: 4.0e-4
  unit: "1/h"   # d(esters)/dt = k_ester * X * S/(K_su+S) * f(T)
  tier: speculative
  uncertainty: { low: 1.0e-4, high: 1.0e-3, note: "order-of-magnitude target for ale ester total ~50-150 mg/L at 20 C" }
  provenance:
    source: "author estimate bounded by typical ale ester levels; structurally after de Andres-Toro et al. 1998 (ethyl acetate ~ growth flux, beer-specific), read via Pilarski & Gerogiorgis 2022 (doi:10.3390/pr10112400)"
    conditions: "ale yeast; ester synthesis coupled to the biomass-catalysed sugar flux"
    notes: "Read by EsterSynthesis. Mirrors the wine file - ester kinetics treated yeast-generic. Beer's lower fermentable sugar (~88 g/L vs wine's ~245) gives a smaller integrated ester total ~ (4e-4/0.5)*88 ~ 0.07 g/L (~70 mg/L), the right trace order for ale esters. SPECULATIVE on magnitude: de Andres-Toro form ethyl acetate as Y_EA*mu_x*X_A (a growth coupling and unit system unlike our flux-coupled k_ester), so it gives no directly-transferable rate constant - an order-of-magnitude target, not a sourced fit."

E_a_esters:
  value: 200000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 120000.0, high: 265000.0, note: "BEER: steep, de Andres-Toro ester~growth apparent E_a ~221-265 kJ/mol. Held WELL ABOVE the ester gas-stripping sensitivity (E_a_uptake + dH_ester_volatil ~ 100k) so synthesis wins and beer LIQUID esters rise with T (D-21). Contrast wine's ~15k" }
  provenance:
    source: "BEER-specific, sourced from de Andres-Toro et al. 1998 (the canonical BEER byproduct model): ethyl-acetate formation rides the strongly T-sensitive yeast GROWTH rate, apparent E_a ~221-265 kJ/mol. Read via the open CC-BY Pilarski & Gerogiorgis 2022 (doi:10.3390/pr10112400) Table 1 [Y_EA=exp(89.92-26589/T), mu_X0=exp(108.31-31934/T)]"
    conditions: "ale yeast; equivalent Arrhenius activation energy at T_ref = 293.15 K"
    notes: "D-21 REVISION (was a generic 80,000 under D-19, shared with wine): the wine/beer ester direction lives HERE, in synthesis, not in the gas-stripping sink (medium-independent once sourced - see dH_ester_volatil). Beer ester synthesis is STRONGLY T-sensitive (de Andres-Toro tie ethyl acetate to growth; apparent E_a ~221-265 kJ/mol). Held at ~200k, WELL ABOVE the physical stripping sensitivity (E_a_uptake + dH_ester_volatil ~ 100 kJ/mol), so SYNTHESIS OUTRUNS STRIPPING and beer LIQUID esters RISE with temperature - the warm-ale ester character - WITHOUT any fudged stripping E_a (the D-20 approach, retired). This applies de Andres-Toro's GROWTH-coupled E_a to our FLUX-coupled synthesis term (a transfer of the sourced ORDERING; D-19 established the ordering is sourced, the exact magnitude is not). SPECULATIVE magnitude (the ~200k is steep-but-sourced-in-direction; the exact value within 120-265k is not pinned). Verified empirically (14/20/25 C): beer liquid esters rise ~22/72/181 mg/L."

k_fusel:
  value: 2.5e-3
  unit: "1/h"   # d(fusels)/dt = k_fusel * X * S/(K_su+S) * N/(K_n+N) * f(T)
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 1.0e-2, note: "order-of-magnitude target; ale fusel total ~50-200 mg/L at 20 C" }
  provenance:
    source: "author estimate bounded by typical ale higher-alcohol levels; N-gate structure after Mouret/Sablayrolles (wine); no fusel kinetic model of our form sourced (de Andres-Toro has no fusel term)"
    conditions: "ale yeast; Ehrlich fusel formation, nitrogen-gated on the fermentative flux"
    notes: "Read by FuselAlcoholsEhrlich. Mirrors the wine file. The N-gate front-loads fusels into the nitrogen-replete early ferment; beer's higher wort YAN (~200 mg/L) keeps the gate open a touch longer than a low-N wine must. SPECULATIVE order-of-magnitude target - the WEAKEST-sourced of the four (de Andres-Toro models no higher alcohols). CORROBORATION (D-19): the wine aroma studies Mouret 2015 / Rollero 2014 confirm higher-alcohol synthesis is optimal at ~200-300 mg N/L and NON-MONOTONIC in nitrogen - the very behaviour FuselAlcoholsEhrlich knowingly simplifies to one monotone branch (why it stays speculative)."

E_a_fusels:
  value: 70000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 60000.0, high: 250000.0, note: "all > E_a_uptake (55,100); below E_a_esters as the ester/fusel ratio rises with T" }
  provenance:
    source: "brewing consensus (warmer => accelerated Ehrlich amino-acid conversion => more fusels; ester/fusel ratio rises with T). No fusel kinetic model of our form sourced (de Andres-Toro has no fusel term)"
    conditions: "ale yeast; equivalent Arrhenius activation energy at T_ref = 293.15 K"
    notes: "Temperature sensitivity of Ehrlich fusel formation (Q10 ~ 2.6 near 20 C), held ABOVE E_a_uptake so total fusels rise with T, and slightly BELOW E_a_esters because warmth shifts the balance toward esters (the fusel/ester ratio falls with T). Identical to the wine value. ORDERING (> E_a_uptake) is the sourced, load-bearing constraint; the exact magnitude is speculative and banded - the weakest-sourced E_a (no kinetic source measures a fusel activation energy in our form)."

# -- ESTER VOLATILIZATION (PHYSICAL Henry's-law gas-stripping sink, decision D-21) -----
# The SAME physical sink as wine (EsterVolatilization), with the SAME sourced, medium-
# independent partition enthalpy dH_ester_volatil - because a Henry's-law partition is a
# property of the molecule, not the beverage (Morakul et al. 2011). Beer's OPPOSITE net
# direction (liquid esters RISE with T) is NOT produced here; it comes from beer's steep
# SYNTHESIS E_a_esters (~200k, de Andres-Toro) winning over this ~100k stripping. D-21
# supersedes D-20's fudged per-medium E_a_ester_volatil (retired). See wine_generic.yaml
# and DECISIONS D-21 for the full rationale. Verified empirically (14/20/25 C): beer rise.
k_ester_volatil:
  value: 2.0e-3
  unit: "L/(g*h)"   # stripping coeff: folds q_sugar_max*co2_yield*scale*(gas-volume/Henry-prefactor) into one constant
  tier: speculative
