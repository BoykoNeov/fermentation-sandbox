# =====================================================================================
# THE FIVE EHRLICH HIGHER-ALCOHOL RATE CONSTANTS (decision D-99)
# =====================================================================================
# The beer half of the D-99 split; see wine_generic.yaml for the full rationale. Each k is
# anchored INDEPENDENTLY to its own molecule's measured BEER concentration -- never a share of
# one k_fusel, and never a share of the wine file's values either (a cross-medium ratio-split
# would be the same sin one axis over).
#
# THE ANCHOR: Wang X., Frank S. & Steinhaus M. 2024, J. Agric. Food Chem. 72(40):22250-22257
# (doi:10.1021/acs.jafc.4c06838), Table 1 -- the BEER table of the same meta-analysis, again
# per-compound MEANS over N independently published studies (n recorded per entry).
#
# ! THE VALUES ARE MEANS, NOT RANGES; the `uncertainty` bands are AUTHOR ESTIMATES around them.
#
# ! DO NOT IMPORT THAT PAPER'S OAV COLUMN. Its Table 1 divides these beer concentrations by
#   WATER odour thresholds and reports e.g. 2-phenylethanol OAV ~180. That directly
#   contradicts Meilgaard (via Holt et al. 2019), which states 2-phenylethanol is "typically
#   found below its sensory threshold in beer". Both cannot hold, and the water denominator is
#   the error: water thresholds under-read ethanolic-matrix ones by up to ~136x, inconsistently
#   across compounds (see sensory.yaml). The paper's CONCENTRATIONS are sound; its OAVs are not.
#
# BEER IS THE MEDIUM WITHOUT THRESHOLDS. Only isoamyl alcohol has a sourced in-matrix beer
# threshold (Meilgaard 1975, ~50 mg/L -- already in sensory.yaml since D-66). The other four
# are CHEMISTRY-ONLY here: real pools, real carbon, no OAV, no descriptor axis. That is the
# honest state of the literature, not a modelling shortcut -- Meilgaard 1975 and Engan 1972
# are paywalled and no open secondary reproduces their per-compound numerics with attribution.

k_propanol:
  value: 5.96e-4
  unit: "1/h"   # d(propanol)/dt = k_propanol * X * S/(K_su+S) * N/(K_n+N) * f(T)
  tier: speculative
  uncertainty: { low: 5.8e-5, high: 1.5e-3, note: "AUTHOR-ESTIMATED band (x0.2/x5) around an AUTHOR-ESTIMATED value -- deliberately the widest in the file, because nothing measured underlies it" }
