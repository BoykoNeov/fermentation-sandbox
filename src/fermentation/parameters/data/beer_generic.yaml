# -- ESTER VOLATILIZATION (PHYSICAL Henry's-law gas-stripping sink, decision D-21) -----
# The SAME physical sink as wine (EsterVolatilization), with the SAME sourced, medium-
# independent partition enthalpy dH_ester_volatil - because a Henry's-law partition is a
# property of the molecule, not the beverage (Morakul et al. 2011). Beer's OPPOSITE net
# direction (liquid esters RISE with T) is NOT produced here; it comes from beer's steep
# SYNTHESIS E_a_esters (~200k, de Andres-Toro) winning over this ~100k stripping. D-21
# supersedes D-20's fudged per-medium E_a_ester_volatil (retired). See wine_generic.yaml
# and DECISIONS D-21 for the full rationale. Verified empirically (14/20/25 C): beer rise.
k_ester_volatil:
  value: 2.0e-3
  unit: "L/(g*h)"   # stripping coeff: folds q_sugar_max*co2_yield*scale*(gas-volume/Henry-prefactor) into one constant
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 1.0e-2, note: "order-of-magnitude target for the absolute stripping magnitude; the T-dependence is physical (E_a_uptake + dH_ester_volatil)" }
  provenance:
    source: "author estimate (absolute stripping efficiency / gas-volume prefactor not separately sourced). Mechanism + loss form per Morakul et al. 2011 (Process Biochem 46:1125-1131)"
    conditions: "ale yeast; ester stripping coupled to the CO2-evolution (fermentative-flux x arrhenius(E_a_uptake)) proxy, first-order in liquid ester"
    notes: "Read by EsterVolatilization as the stripping coefficient (absolute magnitude only; the T-dependence is physical+sourced via E_a_uptake gas flow + dH_ester_volatil partition). Lower than wine's (2e-3 vs 5e-3) for a PHYSICAL reason, not tuning: k_ester_volatil folds q_sugar_max*co2_yield*scale (the gas-volume prefactor of the CO2 stream) into one constant, and beer's q_sugar_max is 0.5 vs wine's 0.85, so beer's lower stripping coefficient is expected. SPECULATIVE order-of-magnitude target (the residual efficiency/Henry prefactor is not separately sourced). Verified empirically (14/20/25 C): beer liquid esters ~22/72/181 mg/L (rise with T, synthesis-dominated)."

dH_ester_volatil:
  value: 45000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 35000.0, high: 55000.0, note: "ethyl-acetate gas/liquid partition enthalpy; Q10 ~ 1.8 at 20 C. IDENTICAL to wine - a molecule property, medium-independent" }
  provenance:
    source: "Ethyl-acetate Henry's-law solubility constant temperature dependence d(ln kH)/d(1/T) ~ 5300-5700 K (NIST Chemistry WebBook / Sander compilation, doi:10.5194/acp-15-4399-2015) => dissolution enthalpy ~ -46 kJ/mol => gas/liquid partition rises with T with effective enthalpy ~ +45 kJ/mol"
    conditions: "ethyl acetate, gas/liquid (air/water) partition; van't Hoff form anchored at T_ref = 293.15 K"
    notes: "IDENTICAL to the wine value (45,000 J/mol) by design: the ethyl-acetate gas/liquid partition is a property of the MOLECULE, the same in beer and wine (Morakul 2011). It is the PHYSICAL stripping T-lever (Q10 ~ 1.8) that replaced D-20's fudged E_a_ester_volatil. The wine/beer ester direction comes from synthesis E_a_esters (beer steep / wine flat), NOT this. Same NIST/Sander sourcing + Morakul-ethanol-term simplification as wine_generic.yaml (see there). SPECULATIVE tier (simplification + abs-value transfer), though the enthalpy is sourced."
