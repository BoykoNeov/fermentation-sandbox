    source: "author estimate"
    conditions: "ale yeast; Ehrlich fusel formation from THREONINE, nitrogen-gated on the fermentative flux. k set to land finished propan-1-ol at ~10 mg/L"
    notes: "Read by FuselAlcoholsEhrlich. *** THE ONLY UNSOURCED NUMBER IN D-99 -- the single weakest value in this beat, and it is flagged here rather than buried. *** No measured beer propan-1-ol concentration was located: Wang/Frank/Steinhaus 2024 OMITS propan-1-ol from its beer table (as it does from its wine table), and the J. Inst. Brew. reviews that would carry it (Olaniran 2017, doi:10.1002/jib.389; Engan 1972) are paywalled -- verified 402, not merely unsearched. Search snippets floating '10-30 ppm' and '~500/600 ppm' were DISCARDED: no source containing them was ever opened, so they are not data (the same discipline applied throughout D-99). Kept despite this because propan-1-ol is unquestionably present in beer and omitting the pool would misattribute its carbon to the other four -- an author estimate for a real molecule beats a silent zero. Tagged `source: author estimate` per prime directive #2, which forbids UNDOCUMENTED guesses, not guesses. IT CANNOT AFFECT ANY OUTPUT BUT THE LEDGER: chemistry-only (no sourced threshold in any matrix => no OAV => unreachable from any descriptor axis). Note this is NOT a regression -- the k_fusel it replaces was itself an author estimate, and it silently weighted this molecule's carbon at isoamyl's mass fraction (0.6813 vs propan-1-ol's true 0.5996 -- a ~14% over-book). Sourcing this is the named follow-up."

