# Acetaldehyde (main-pathway intermediate) kinetics (decision D-27).
#
# SHARED, medium-agnostic parameter file: loaded alongside the <medium>_<strain>.yaml by
# the compile seam (the store merges paths; these names are collision-free with the
# per-medium kinetic parameters). Acetaldehyde kinetics are shared because acetaldehyde is
# the obligate intermediate on the MAIN alcoholic-fermentation pathway (pyruvate ->
# acetaldehyde -> ethanol) — generic yeast metabolism, a property of the pathway rather
# than the beverage — so, like vicinal_diketones.yaml and acidbase.yaml, its constants live
# in one shared file.
#
# THE MODEL (a transient ethanol-carbon BUFFER, not a draw from sugar — decision D-27):
#
#   ethanol (E) --production--> acetaldehyde --reduction--> ethanol (E)
#      (borrow C2)   (k_acetaldehyde)     (k_acet_reduction, E_a_acet_reduction)  (return C2)
#
# Acetaldehyde and ethanol are BOTH two-carbon, and the yeast reduction acetaldehyde ->
# ethanol is a mole-for-mole C2 -> C2 transfer. The uptake Process ALREADY performs the
# complete lumped sugar -> ethanol + CO2 conversion (which implicitly includes this
# intermediate), so drawing FRESH sugar -> acetaldehyde -> NEW ethanol would be a second,
# parallel sugar->ethanol pathway: net-new ethanol that inflates ABV and the realised yield
# by an amount that scales with pool turnover (a real double-count, not a trace). The
# faithful model de-lumps the existing step instead: production HOLDS BACK a transient slice
# of the ethanol the uptake just made (d[acetaldehyde] += r, d[E] -= r*M_eth/M_acet) and
# reduction RETURNS it (d[acetaldehyde] -= L, d[E] += L*M_eth/M_acet). Carbon closes to
# machine precision touching NEITHER sugar NOR CO2; the E endpoint is byte-for-byte the
# no-acetaldehyde core once the pool is reduced back, so the section-2.2 ABV / realised-yield
# / CO2 benchmarks are preserved exactly (a tiny transient E dip during the ferment recovers
# as reduction completes). This is the owner's choice over the draw-from-sugar stand-in the
# D-26 forward note anticipated; it is MORE faithful (acetaldehyde genuinely is in-transit
# ethanol carbon), not merely benchmark-safe.
#
# WHY THE EARLY PEAK EMERGES (the phenomenon these parameters must reproduce):
#   * Production is FLUX-LINKED (shared K_sugar_uptake) -> strong during active fermentation,
#     stops at dryness. Held TEMPERATURE-FLAT as a documented v1 simplification (like the
#     alpha-acetolactate excretion, D-26): no benchmark asserts an acetaldehyde temperature
#     direction in v1, and the enzymatic reduction carries the temperature dependence.
#   * Reduction is enzymatic, FAST, gated on VIABLE yeast (X, not X_dead) with NO flux term,
#     so it keeps clearing acetaldehyde during the rest and after sugar is gone but STOPS
#     once the yeast is crashed/racked/ethanol-inactivated.
#   => Acetaldehyde rises while the flux outruns the still-building reductive capacity,
#      peaks during active fermentation (the "green apple" transient), and is drawn back down
#      to a low residual as fermentation slows. A crash before it is cleared STRANDS it (and
#      leaves the borrowed ethanol carbon parked as acetaldehyde rather than returned to E) —
#      the same structural pair (flux-linked production, viable-X-gated reduction) as the
#      diacetyl rest (D-26).
#
# QUASI-STEADY SIZING. Setting production = reduction, the X terms cancel (both ride X), so
# the plateau acetaldehyde ~ k_acetaldehyde * [S/(K+S)] / (k_acet_reduction * f(T)); at T_ref
# with S/(K+S) ~ 1 that is ~ k_acetaldehyde / k_acet_reduction ~ 0.04 g/L = 40 mg/L, in the
# real range (wine ~30-80, beer peaks ~20-40 mg/L; flavour threshold ~10-25 mg/L "green
# apple"). The early overshoot above the plateau (reductive capacity lagging the flux) sits
# on top. Both rate magnitudes are order-of-magnitude estimates.
#
# TIERS. Every rate constant is an order-of-magnitude estimate (no kinetic model of this
# exact per-flux production / X-gated reduction form is sourced), so both Processes stay
# speculative; parameter-tier propagation (D-1) caps the acetaldehyde output tier at
# speculative regardless. Because AcetaldehydeProduction is the first always-on speculative
# Process to WRITE ethanol E, the structural tier_of("E") drops PLAUSIBLE -> SPECULATIVE, but
# the param-aware tier users see was already SPECULATIVE (the uptake Process reads speculative
# params) so there is no headline change — exactly the honest CO2 consequence recorded for
# D-26. The MECHANISM (acetaldehyde is the obligate main-pathway intermediate, produced then
# reduced to ethanol by ADH) is textbook (Boulton et al., Principles and Practices of
# Winemaking; Ribereau-Gayon et al., Handbook of Enology); only the RATE magnitudes are the
# author's estimates.
#
# CARBON. No sugar draw and no CO2 term: acetaldehyde borrows carbon from ethanol
# (production) and returns it (reduction), both mole-for-mole C2 -> C2, so total_carbon (which
# weights the acetaldehyde pool at its own C2 fraction) closes to machine precision through
# the whole produce-then-reabsorb course. Mass carries a small gap (the reduction moves
# untracked NAD(P)H) — carbon is the invariant, exactly as for the diacetyl reduction (D-26)
# and beer's hydrolysis water (D-8).
#
# SCOPE (v1). The acetaldehyde metabolite only. Acetaldehyde is the principal SO2-binder, so
# building it as real state UNLOCKS the deferred free/bound-SO2 split (D-22) — but that is a
# separate READOUT commit (it only needs this state to exist), kept out of this beat per the
# owner's one-Process-per-commit rhythm.

# -- PRODUCTION: ethanol -> acetaldehyde (flux-linked borrow, temperature-flat) ---------
k_acetaldehyde:
  value: 2.0e-3
  unit: "1/h"   # d(acetaldehyde)/dt = k_acetaldehyde * X * S/(K_sugar_uptake + S); borrowed from E
  tier: speculative
  uncertainty: { low: 5.0e-4, high: 8.0e-3, note: "with k_acet_reduction ~5e-2 gives a quasi-steady plateau ~ k_acetaldehyde/k_acet_reduction ~ 10-160 mg/L; targets a peak in the real ~30-80 mg/L (wine) / ~20-40 mg/L (beer) range, threshold ~10-25 mg/L green apple" }
  provenance:
    source: "author estimate bounded by typical acetaldehyde levels (Boulton et al., Principles and Practices of Winemaking; Ribereau-Gayon et al., Handbook of Enology). Acetaldehyde is the obligate main-pathway intermediate (pyruvate -> acetaldehyde -> ethanol) excreted transiently during active fermentation."
    conditions: "generic yeast; acetaldehyde formation coupled to the biomass-catalysed sugar (fermentative) flux, shared K_sugar_uptake"
    notes: "MODELLED AS A BORROW FROM ETHANOL, NOT A SUGAR DRAW (decision D-27): the uptake Process already makes the full sugar->ethanol+CO2 conversion, so acetaldehyde de-lumps that step (holds back a transient C2 slice of ethanol) rather than adding a parallel pathway that would inflate ABV. Flux-linked so it stops at dryness; held TEMPERATURE-FLAT as a documented v1 simplification (the enzymatic reduction carries the temperature dependence). Magnitude speculative."

# -- SO2-INDUCED OVER-PRODUCTION: the redox-pull peak bump (decision D-48) ----------------
# Trapping acetaldehyde — the terminal electron acceptor of alcoholic fermentation — makes the
# yeast intensify the glyceropyruvic pathway (glycerol regenerates NAD+ instead) and excrete MORE
# acetaldehyde during active ferment (Han et al. 2020, Food Chemistry; Ribereau-Gayon et al.,
# Handbook of Enology). This adds an SO2-gated term to AcetaldehydeProduction:
#
#   d(acetaldehyde)/dt += k_acet_so2_induced * X*S/(K_sugar_uptake+S) * total_SO2   (borrowed from E)
#
# SCOPED TO THE TRANSIENT PEAK, NOT THE END STATE (owner's Option-3 call, D-48). Empirical finding
# that reshaped this beat: D-47 protection ALONE already delivers finished-wine acetaldehyde at
# 1.3-1.5x the field slope W_acet = -4.4 + 0.39*W_tSO2 mg/L (Marrufo-Curtido, Ferreira & Escudero
# 2022, Foods 11(3):476, R=0.837 -- a 12-wine cross-sectional forced-oxidation survey to ~124 mg/L
# total SO2, NOT a within-wine titration; see D-61 for the citation reconciliation) (increments
# 25.7/56.1/119.0 mg/L at 50/100/200 mg/L SO2 vs 0.39*dose = 19.5/39/78). The end state is CAPPED BY THE SO2-BINDING
# EQUILIBRIUM (D-28), not by production — an induced production bump is reduced away (only the bound
# fraction survives, and that pool is saturated), so it leaves the end state unchanged. There is thus
# NO under-shoot for an additive end-state term to fill; a bump there would only overshoot. D-48
# instead targets the mid-ferment PEAK (a real, distinct, transient phenomenon with no end-state
# anchor): the yeast's active-ferment over-excretion, which ADH later clears.
#
# DRIVER = TOTAL SO2 (owner's Option-3 call). Free SO2 was rejected: it collapses to ~0 at the peak
# (nearly all sulfite bound to the rising acetaldehyde), so it is EMPIRICALLY INERT on the very peak
# this targets (peak lift +0.1..+1.4 mg/L across all doses/k — structurally, its negative feedback
# self-quenches exactly when the term is needed). Total SO2 is open-loop but STABLE in practice: the
# term is flux-gated, so the fermentative flux -> 0 at dryness caps its time-integral (no runaway;
# verified empirically — end stranding flat 25.7->25.8 at 50 mg/L, no divergence at 200 mg/L). Read
# from the total SO2 STATE slot directly — no param, no per-RHS pH brentq. Still a BORROW FROM E
# (carbon-exact C2, like the base term), so carbon closes to machine precision at any magnitude; the
# diverted glycerol carbon reality shows parks here as acetaldehyde (no glycerol pool — a v1
# simplification, ethanol-yield reduction slightly understated). EXACT undosed guard (so2_total>0):
# an unsulfited run is byte-for-byte the D-27/D-47 core.
k_acet_so2_induced:
  value: 4.0e-3
  unit: "L/(g*h)"   # d(acetaldehyde)/dt += k_acet_so2_induced * X * S/(K+S) * total_SO2[g/L]; borrowed from E
  tier: speculative
  uncertainty: { low: 2.0e-3, high: 6.0e-3, note: "No DIRECT peak field data (the 0.39 mg/mg correlation is END-STATE, which this term does not move), so magnitude is bounded by a CROSS-PROCESS reality constraint instead: the raised acetaldehyde peak sequesters SO2 and weakens the molecular-SO2 MLF brake, and k is sized to the LARGEST value keeping that brake in its literature 'SO2 remains a partial brake, more than half the malic retained' regime (malic >= 2.0/4.0 g/L in the 80 mg/L SO2 + 0.2 g/L O.oeni run). That ceiling is ~5e-3 (malic ~2.03, at the floor); nominal 4e-3 keeps a safe margin (malic ~2.09, the MLF test back inside its original 2.0-3.0 band). At 4e-3 a 50 mg/L pitch dose lifts the acetaldehyde peak ~+3.8 mg/L (71.6->75.4), dose-scaling to ~+15 at 200 mg/L; end state and stranded residual unchanged. Band 2e-3 (fainter) to 6e-3 (just past the MLF-brake ceiling)." }
  provenance:
    source: "author estimate; magnitude bounded by a CROSS-PROCESS constraint, not a direct peak measurement (the total-acetaldehyde vs total-SO2 field correlation ~0.39 mg/mg (Marrufo-Curtido, Ferreira & Escudero 2022, Foods 11(3):476) is end-state and is already met by D-47 protection alone, so it does not size this transient-peak term). Sizing anchor: the largest k keeping the emergent SO2 MLF brake in its literature 'partial brake, >half the malic retained' regime (bound SO2 is not antimicrobial; Ribereau-Gayon et al., Handbook of Enology). Mechanism sourced: SO2 traps the terminal electron acceptor acetaldehyde, so glycerol synthesis intensifies to regenerate NAD+ and acetaldehyde over-excretion rises during active ferment (Han et al. 2020, Food Chemistry; Jackowetz & Mira de Orduna)."
    conditions: "generic yeast; extra acetaldehyde formation coupled to the biomass-catalysed fermentative flux (shared K_sugar_uptake) and driven by TOTAL SO2 (state slot), temperature-flat like the base production. Targets the transient mid-ferment PEAK only; the finished-wine end state is capped by the D-28 binding equilibrium and is left unchanged."
    notes: "MODELLED AS A BORROW FROM ETHANOL, NOT A SUGAR DRAW (the D-27 invariant): carbon closes to machine precision at any magnitude; reality's diverted glycerol carbon parks as acetaldehyde (no glycerol pool). TOTAL-SO2 driver (owner's Option-3 choice): free SO2 is empirically inert on the peak (collapses to ~0 there); total SO2 is open-loop but flux-gated so its integral is capped (no runaway). Magnitude co-constrained by the SO2 MLF brake (D-48 sizing): 4e-3 keeps that brake in its literature partial-brake regime. EXACT undosed guard => byte-for-byte the D-27/D-47 core when no SO2 is dosed. Magnitude speculative."

# -- REDUCTION: acetaldehyde -> ethanol (enzymatic, viable-yeast-gated, fast) -----------
k_acet_reduction:
  value: 5.0e-2
  unit: "L/(g*h)"   # d(acetaldehyde)/dt = -k_acet_reduction * X_viable * f(T) * [acetaldehyde]
  tier: speculative
  uncertainty: { low: 1.0e-2, high: 2.0e-1, note: "with viable X ~1-5 g/L gives an acetaldehyde half-life of a few hours => yeast clears it as fast as it forms while present, so acetaldehyde peaks during active ferment and only strands once the yeast is gone" }
  provenance:
    source: "author estimate; yeast reduces acetaldehyde to ethanol via alcohol dehydrogenase (the last, fast step of the main pathway), gated on viable cells (Boulton et al.; Ribereau-Gayon et al.)"
    conditions: "generic yeast; enzymatic acetaldehyde reduction, first-order in acetaldehyde and in VIABLE biomass X (NOT X_dead), NO fermentative-flux term (must run during the rest when flux ~ 0)"
    notes: "NO flux term and gated on live X is load-bearing: reduction must continue after sugar is gone (the produce-then-reabsorb tail) but STOP when yeast is crashed/racked/ethanol-inactivated. That gating is what makes 'crash at peak => acetaldehyde stranded (borrowed ethanol carbon un-returned)' emerge, mirroring the diacetyl reduction (D-26). Magnitude speculative."

E_a_acet_reduction:
  value: 45000.0
  unit: "J/mol"
  tier: speculative
  uncertainty: { low: 30000.0, high: 60000.0, note: "Q10 ~1.8-2.3 at 20 C; a moderate enzymatic activation energy typical of yeast oxidoreductases (cf. the diacetyl-reduction E_a_reduction 45k, D-26)" }
  provenance:
    source: "author estimate; a moderate enzymatic activation energy typical of yeast alcohol/aldehyde dehydrogenases"
    conditions: "generic yeast; equivalent Arrhenius activation energy of acetaldehyde reduction at T_ref = 293.15 K"
    notes: "Sets only the temperature shape of the enzymatic clearance (warmer => faster reduction => lower residual acetaldehyde). No benchmark asserts an acetaldehyde temperature DIRECTION in v1; magnitude speculative and banded."
